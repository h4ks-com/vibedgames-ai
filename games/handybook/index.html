<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1208;
    color: #e8dcc8;
    font-family: 'Crimson Text', Georgia, serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .book {
    max-width: 700px;
    width: 100%;
    background: linear-gradient(135deg, #2a1f0e 0%, #1e1608 100%);
    border: 3px solid #5a4a2a;
    border-radius: 4px;
    padding: 40px 50px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 60px rgba(0,0,0,0.3);
    position: relative;
    min-height: 500px;
  }

  .book::before {
    content: '';
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border: 1px solid #3a2f1a;
    border-radius: 2px;
    pointer-events: none;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    color: #d4a853;
    font-size: 2em;
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  .subtitle {
    text-align: center;
    font-style: italic;
    color: #8a7a5a;
    margin-bottom: 30px;
    font-size: 1.1em;
  }

  .chapter-title {
    font-family: 'Playfair Display', serif;
    color: #c49a3a;
    font-size: 1.4em;
    margin-bottom: 15px;
    border-bottom: 1px solid #3a2f1a;
    padding-bottom: 8px;
  }

  .narrative {
    line-height: 1.8;
    font-size: 1.15em;
    margin-bottom: 25px;
  }

  .narrative p { margin-bottom: 12px; }

  .quote {
    font-style: italic;
    color: #d4a853;
    padding: 10px 20px;
    border-left: 3px solid #c49a3a;
    margin: 15px 0;
    background: rgba(90,74,42,0.1);
  }

  .choices {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .choice-btn {
    background: linear-gradient(135deg, #3a2f1a, #2a1f0e);
    border: 2px solid #5a4a2a;
    color: #e8dcc8;
    padding: 14px 24px;
    font-family: 'Crimson Text', serif;
    font-size: 1.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s;
    text-align: left;
  }

  .choice-btn:hover {
    background: linear-gradient(135deg, #5a4a2a, #3a2f1a);
    border-color: #d4a853;
    color: #d4a853;
    transform: translateX(8px);
  }

  .page-num {
    text-align: center;
    color: #5a4a2a;
    font-style: italic;
    margin-top: 20px;
    font-size: 0.9em;
  }

  .danger {
    color: #cc4444;
    font-weight: 600;
  }

  .success {
    color: #44cc44;
    font-weight: 600;
  }

  .fade-in {
    animation: fadeIn 0.6s ease-in;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cover-art {
    text-align: center;
    font-size: 4em;
    margin: 20px 0;
    filter: grayscale(0.3);
  }

  .toc { list-style: none; padding: 0; }
  .toc li {
    padding: 8px 0;
    border-bottom: 1px dotted #3a2f1a;
    cursor: pointer;
    color: #8a7a5a;
    transition: color 0.3s;
  }
  .toc li:hover { color: #d4a853; }

  .hp-bar-container {
    margin: 10px 0 20px;
    background: #1a1208;
    border: 1px solid #3a2f1a;
    border-radius: 3px;
    overflow: hidden;
    height: 20px;
  }
  .hp-bar {
    height: 100%;
    background: linear-gradient(90deg, #cc4444, #44cc44);
    transition: width 0.5s;
    border-radius: 3px;
  }
  .hp-label { font-size: 0.9em; color: #8a7a5a; margin-bottom: 4px; }

</head>
