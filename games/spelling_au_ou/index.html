<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spellingsrace - au-ou</title>
<style>
  body { margin: 0; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  #ui, #results, #pitStop {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.9); z-index: 20; flex-direction: column; color: white;
  }
  #results, #pitStop { display: none; padding: 20px; text-align: center; }
  #pitStop { z-index: 40; background: #222; }
  
  #ui h1 { 
    font-size: 80px; letter-spacing: 8px; margin-bottom: 60px; color: #ffffff; 
    font-style: italic; margin-top: 0;
    animation: neonPulse 2s ease-in-out infinite alternate;
  }

  @keyframes neonPulse {
    from { text-shadow: 0 0 5px rgba(255,255,255,0.25); }
    to { text-shadow: 0 0 3px #fff, 0 0 10px rgba(0, 255, 136, 0.55), 0 0 18px rgba(0, 255, 136, 0.45); }
  }

  .banner-wrapper { margin-bottom: 60px; display: flex; align-items: center; justify-content: center; height: 100px; }
  #edition-banner {
    background: linear-gradient(135deg, #e66465 0%, #fbb03b 100%);
    color: #111; padding: 10px 30px; font-size: 30px; font-weight: bold;
    text-transform: uppercase; transform: rotate(-25deg); border-radius: 8px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4); white-space: nowrap;
  }

  /* General instruction text style with vertical centering */
  #instruction-p { 
    color: #888; 
    margin-bottom: 60px; 
    font-size: 14px; 
    text-transform: uppercase; 
    letter-spacing: 2px; 
    margin-top: 0; 
    display: flex; 
    align-items: center; 
    gap: 5px;
  }

  .end-subtitle {
    color: #888; 
    margin-bottom: 60px; 
    font-size: 14px; 
    text-transform: uppercase; 
    letter-spacing: 2px; 
    margin-top: 0; 
  }

  /* Modified spacing for the "Woorden om te onthouden" section */
  #txt-res-remember {
    margin-top: 40px;    /* Increased distance from items above */
    margin-bottom: 20px; /* Decreased distance from items below */
  }

  .arrow-icon {
    font-size: 26px; 
    font-weight: bold;
    line-height: 1;
    margin: 0 2px;
  }

  .btn-container { display: flex; gap: 20px; }
  .garage-bg { position: absolute; inset: 0; opacity: 0.2; pointer-events: none; background-image: repeating-linear-gradient(90deg, #444 0 50px, #333 50px 52px); }

  .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
  .stat-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    padding: 20px; border-radius: 12px; min-width: 140px; text-align: center;
    backdrop-filter: blur(5px);
  }
  .stat-value { display: block; font-size: 32px; font-weight: bold; color: #00ff88; }
  .stat-label { font-size: 10px; text-transform: uppercase; color: #888; letter-spacing: 1px; }
  
  .high-score-card { border-color: #f8ae1b; transition: all 0.3s; }
  .high-score-value { color: #f8ae1b; }

  .new-record-blink {
    animation: blinkBorder 0.5s ease-in-out 5;
  }

  @keyframes blinkBorder {
    0%, 100% { border-color: #f8ae1b; box-shadow: 0 0 5px rgba(248, 174, 27, 0.2); }
    50% { border-color: #ffffff; box-shadow: 0 0 20px rgba(248, 174, 27, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.2); transform: scale(1.05); }
  }

  .results-container { display: flex; width: 80%; justify-content: center; margin-bottom: 30px; max-height: 300px; overflow-y: auto; }
  .res-list { text-align: center; background: rgba(255,255,255,0.03); padding: 25px; border-radius: 16px; width: 100%; }
  .res-list.bad { border: 1px solid rgba(255, 255, 255, 0.1); }
  
  #wrongList { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding: 0; list-style: none; margin-top: 5px; }
  #wrongList li {
    background: linear-gradient(135deg, #2d5a27 0%, #1a3a16 100%);
    color: white; padding: 10px 20px; border-radius: 8px; font-size: 22px; font-weight: bold;
    text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: all 0.3s ease; border: 1px solid transparent;
  }

  #wrongList li.highlight {
    transform: scale(1.1);
    background: linear-gradient(135deg, #3a7a32 0%, #24521f 100%);
    border-color: #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
  }

  button {
    padding: 16px 32px; font-size: 18px; cursor: pointer; border: none;
    border-radius: 12px; font-weight: bold; transition: all 0.2s; color: white; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  button:hover { transform: translateY(-5px); filter: brightness(1.2); }
  
  .btn-normal { background: linear-gradient(135deg, #2d4c1e 0%, #4facfe 100%); }
  .btn-fast { background: linear-gradient(135deg, #f8ae1b 0%, #f7971e 100%); }
  .btn-crazy { background: linear-gradient(135deg, #cc0000 0%, #ff4b2b 100%); }

  .pit-btn { background: #444; color: white; min-width: 150px; border: 1px solid #555; }
  .pit-btn:disabled { transform: none; cursor: default; }
  
  #pauseBtn { padding: 10px 20px; font-size: 16px; background: #555; color: white; width: 100%; }
  #quitBtn { background: #822; color: white; padding: 10px 20px; font-size: 16px; width: 100%; }

  #hud { position: absolute; top: 20px; left: 0; right: 0; z-index: 10; display: flex; justify-content: space-between; padding: 0 40px; pointer-events: none; }
  .score {
    min-width: 120px; height: 50px; border-radius: 12px; display: flex;
    align-items: center; justify-content: center; font-size: 24px; font-weight: bold;
    transition: transform 0.2s; border: 2px solid transparent;
  }
  .score.bump { transform: scale(1.2); }
  .correct { background: rgba(20, 68, 68, 0.9); border-color: #00ff88; color: #00ff88; }
  .wrong { background: rgba(68, 17, 17, 0.9); border-color: #ff4444; color: #ff4444; }
  .total { background: rgba(255, 255, 255, 0.9); border-color: #ffffff; color: #111; }

  #speedometer {
    position: absolute; bottom: 40px; left: 40px; z-index: 10;
    width: 100px; height: 100px; background: rgba(0,0,0,0.7);
    border: 3px solid #444; border-radius: 50%; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    color: white; font-family: monospace;
  }
  #speedVal { font-size: 28px; font-weight: bold; color: #00ff88; }
  #speedLabel { font-size: 10px; color: #aaa; }

  #pitStopChallenge { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; z-index: 41; }
  .pit-row { display: flex; gap: 20px; align-items: center; justify-content: center; }

  #repairingOverlay {
    display: none; position: absolute; inset: 0; background: rgba(0,255,136,0.3);
    z-index: 50; align-items: center; justify-content: center;
    font-size: 48px; font-weight: bold; color: white; animation: pulse 0.5s infinite;
  }
  @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

  #audioControls {
    position: absolute; bottom: 20px; right: 20px; z-index: 30;
    background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px;
    color: white; display: flex; flex-direction: column; gap: 8px; font-size: 14px; border: 1px solid #444;
  }

  #streakToast {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(0, 255, 136, 0.9); color: #111; padding: 12px 24px;
    border-radius: 30px; font-weight: bold; font-size: 20px; pointer-events: none;
    opacity: 0; transition: opacity 0.3s; z-index: 60; text-align: center;
  }

  svg { display: block; margin: auto; background: #222; }
</style>
</head>
<body>

<div id="ui">
  <div class="garage-bg"></div>
  <h1 id="txt-main-title"></h1>
  <div class="banner-wrapper">
    <div id="edition-banner"></div>
  </div>
  <p id="instruction-p"></p>
  <div class="btn-container">
    <button class="btn-normal" onclick="startGame(LEVEL_SETTINGS.NORMAL)" id="txt-btn-normal"></button>
    <button class="btn-fast" onclick="startGame(LEVEL_SETTINGS.FAST)" id="txt-btn-fast"></button>
    <button class="btn-crazy" onclick="startGame(LEVEL_SETTINGS.CRAZY)" id="txt-btn-crazy"></button>
  </div>
</div>

<div style="position: absolute; top: 120px; left: 20px; z-index: 30; display: flex; flex-direction: column; gap: 40px; width: 160px; align-items: center;">
    <button id="pauseBtn" style="display: none;"></button>
    <button id="quitBtn" style="display: none;"></button>
</div>

<div id="pitStop">
    <div class="garage-bg"></div>
    <svg width="80" height="80" viewBox="0 0 100 100" style="background:transparent; margin-bottom:10px;">
        <path d="M10,90 L10,40 L50,10 L90,40 L90,90 Z" fill="none" stroke="#666" stroke-width="4"/>
        <rect x="30" y="50" width="40" height="40" fill="#444" stroke="#666" stroke-width="2"/>
    </svg>
    <h1 id="txt-pit-title" style="color: #ff4444; z-index: 41; margin: 0;"></h1>
    <p id="txt-pit-instr" style="z-index: 41;"></p>
    <div id="pitStopChallenge"></div>
</div>

<div id="repairingOverlay"></div>

<div id="results">
  <div class="garage-bg"></div>
  <h1 id="finishTitle"></h1>
  <p class="end-subtitle" id="txt-res-telemetry"></p>
  
  <div class="stats-grid">
    <div class="stat-card">
        <span class="stat-label" id="txt-res-score"></span>
        <span id="finalScoreDisplay" class="stat-value">0</span>
    </div>
    <div id="highScorePill" class="stat-card high-score-card">
        <span class="stat-label" id="txt-res-highscore"></span>
        <span id="highScoreDisplay" class="stat-value high-score-value">0</span>
    </div>
    <div class="stat-card">
        <span class="stat-label" id="txt-res-accuracy"></span>
        <span id="accuracyDisplay" class="stat-value">0%</span>
    </div>
  </div>

  <div class="end-subtitle" id="txt-res-remember"></div>
  <div class="results-container">
    <div class="res-list bad">
        <ul id="wrongList"></ul>
    </div>
  </div>
  <button class="btn-normal" onclick="location.reload()" id="txt-btn-restart"></button>
</div>

<div id="hud">
  <div id="scoreL" class="score correct">✔ <span id="correctScore">0</span></div>
  <div id="scoreTotal" class="score total"><span id="ptsScore">0</span></div>
  <div id="scoreR" class="score wrong">✖ <span id="wrongScore">0</span></div>
</div>

<div id="speedometer">
    <span id="speedVal">0</span>
    <span id="speedLabel"></span>
</div>

<div id="streakToast"></div>

<div id="audioControls">
    <label style="cursor:pointer"><input type="checkbox" id="musicToggle"> <b id="txt-audio-toggle"></b></label>
    <div><span id="txt-audio-vol"></span> <input type="range" id="volSlider" min="0" max="0.5" step="0.01"></div>
</div>

<svg width="700" height="800" viewBox="0 0 700 800">
  <rect x="0" y="0" width="700" height="800" fill="#2d4c1e"/>
  <rect x="90" y="0" width="520" height="800" fill="#444"/>
  <line id="centerLine" x1="350" y1="0" x2="350" y2="800" stroke="#eee" stroke-width="4" stroke-dasharray="30 30"/>
  <g id="sceneryLayer"></g>
  <g id="particleLayer"></g>
  <g id="bannerGroup"></g>
  <g id="finishLineGroup" style="display:none">
    <rect id="finishLine" x="90" y="-100" width="520" height="40" fill="white" />
    <rect x="90" y="-100" width="520" height="40" fill="none" stroke="black" stroke-width="40" stroke-dasharray="40 40" />
  </g>
  <g id="gateGroup"></g>
  <g id="carXform" transform="translate(350, 560)">
    <g id="carTilt">
        <defs>
            <radialGradient id="lightGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="white" stop-opacity="0.3" />
                <stop offset="100%" stop-color="white" stop-opacity="0" />
            </radialGradient>
        </defs>
        <path d="M-15,0 L-40,-80 L10,-80 L-5,0 Z" fill="url(#lightGrad)" />
        <path d="M15,0 L5,-80 L40,-80 L15,0 Z" fill="url(#lightGrad)" />
        <rect x="-22" y="0" width="44" height="70" rx="4" fill="#cc0000"/>
        <rect x="-18" y="12" width="36" height="15" rx="2" fill="#111" opacity="0.8"/>
        <rect x="-26" y="8" width="6" height="14" fill="#111" rx="1"/>
        <rect x="20" y="8" width="6" height="14" fill="#111" rx="1"/>
        <rect x="-26" y="48" width="6" height="14" fill="#111" rx="1"/>
        <rect x="20" y="48" width="6" height="14" fill="#111" rx="1"/>
    </g>
  </g>
</svg>

<script>
// Speed constants for different difficulty levels
const LEVEL_SETTINGS = {
    NORMAL: { base: 2.5, inc: 0.15 },
    FAST:   { base: 3.0, inc: 0.15 },
    CRAZY:  { base: 3.5, inc: 0.15 }
};

const CONFIG_TEXT = {
    MENU: {
        TITLE: "SPELLINGSRACE",
        EDITION: "au-ou editie",
        SUBTITLE_HTML: `STUREN: <span class="arrow-icon">←</span> <span class="arrow-icon">→</span> | HARDER RIJDEN: SPATIEBALK | PAUZE: P`,
        NORMAL: "Normaal",
        FAST: "Snel",
        CRAZY: "Supersnel"
    },
    HUD: {
        SPEED_UNIT: "KM/UUR",
        PAUSE: "PAUZE (P)",
        CONTINUE: "PAUZE UIT (P)",
        QUIT: "STOPPEN",
        AUDIO_TOGGLE: "MUZIEK AAN/UIT",
        AUDIO_VOL: "Volume:"
    },
    PIT_STOP: {
        TITLE: "PIT STOP",
        INSTRUCTION: "Repareer de auto door de juiste spelling van elk woord te selecteren!",
        REPAIRING: "De auto wordt gerepareerd..."
    },
    RESULTS: {
        TITLE: "RACE KLAAR",
        TELEMETRY: "RACE EVALUATIE",
        SCORE_LABEL: "Totale score",
        HIGHSCORE_LABEL: "Top Score",
        ACCURACY_LABEL: "Nauwkeurigheid",
        REMEMBER: "WOORDEN OM TE ONTHOUDEN",
        RESTART: "NIEUWE RACE"
    },
    MESSAGES: {
        SPEED_UP: "SNELLER!",
        ENGINE_TUNED: "MOTOR VERBETERD! SNELLER!",
        STREAK_BONUS: "5 WOORDEN ACHTER ELKAAR GOED!",
        CHEERS: ["Goed bezig!", "Ga zo door!", "Goed zo!", "Lekker bezig!"]
    }
};

const TOTAL_WORDS_TO_RACE = 50;
let audioCtx;
let masterVolume = localStorage.getItem('sr_vol') !== null ? parseFloat(localStorage.getItem('sr_vol')) : 0.3;
let musicEnabled = localStorage.getItem('sr_music') !== null ? localStorage.getItem('sr_music') === 'true' : true;
let musicGain;
let isPaused = false;
let racingInterval;
let endMusicInterval = null;
let endStep = 0;

function initUI() {
    document.getElementById("txt-main-title").textContent = CONFIG_TEXT.MENU.TITLE;
    document.getElementById("edition-banner").textContent = CONFIG_TEXT.MENU.EDITION;
    document.getElementById("instruction-p").innerHTML = CONFIG_TEXT.MENU.SUBTITLE_HTML;
    document.getElementById("txt-btn-normal").textContent = CONFIG_TEXT.MENU.NORMAL;
    document.getElementById("txt-btn-fast").textContent = CONFIG_TEXT.MENU.FAST;
    document.getElementById("txt-btn-crazy").textContent = CONFIG_TEXT.MENU.CRAZY;
    document.getElementById("pauseBtn").textContent = CONFIG_TEXT.HUD.PAUSE;
    document.getElementById("quitBtn").textContent = CONFIG_TEXT.HUD.QUIT;
    document.getElementById("speedLabel").textContent = CONFIG_TEXT.HUD.SPEED_UNIT;
    document.getElementById("txt-pit-title").textContent = CONFIG_TEXT.PIT_STOP.TITLE;
    document.getElementById("txt-pit-instr").textContent = CONFIG_TEXT.PIT_STOP.INSTRUCTION;
    document.getElementById("repairingOverlay").textContent = CONFIG_TEXT.PIT_STOP.REPAIRING;
    document.getElementById("finishTitle").textContent = CONFIG_TEXT.RESULTS.TITLE;
    document.getElementById("txt-res-telemetry").textContent = CONFIG_TEXT.RESULTS.TELEMETRY;
    document.getElementById("txt-res-score").textContent = CONFIG_TEXT.RESULTS.SCORE_LABEL;
    document.getElementById("txt-res-highscore").textContent = CONFIG_TEXT.RESULTS.HIGHSCORE_LABEL;
    document.getElementById("txt-res-accuracy").textContent = CONFIG_TEXT.RESULTS.ACCURACY_LABEL;
    document.getElementById("txt-res-remember").textContent = CONFIG_TEXT.RESULTS.REMEMBER;
    document.getElementById("txt-btn-restart").textContent = CONFIG_TEXT.RESULTS.RESTART;
    document.getElementById("txt-audio-toggle").textContent = CONFIG_TEXT.HUD.AUDIO_TOGGLE;
    document.getElementById("txt-audio-vol").textContent = CONFIG_TEXT.HUD.AUDIO_VOL;
    document.getElementById("volSlider").value = masterVolume;
    document.getElementById("musicToggle").checked = musicEnabled;
}
window.onload = initUI;

function playInstrument(freq, type, vol, decay, time) {
    if (!musicEnabled || freq === 0 || isPaused) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, time);
    g.gain.setValueAtTime(0, time); g.gain.linearRampToValueAtTime(vol, time + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, time + decay);
    osc.connect(g); g.connect(musicGain);
    osc.start(time); osc.stop(time + decay);
}

function initMusic() {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    musicGain = audioCtx.createGain(); musicGain.connect(audioCtx.destination);
    musicGain.gain.value = masterVolume;
    let step = 0; const stepsPerBar = 16; const totalBars = 64;
    racingInterval = setInterval(() => {
        if (isPaused) return;
        const now = audioCtx.currentTime;
        const currentBar = Math.floor(step / stepsPerBar) % totalBars;
        const localStep = step % stepsPerBar;
        if (localStep % 4 === 0) playInstrument(60, 'sine', 0.4, 0.2, now);
        if (localStep === 4 || localStep === 12) playInstrument(150, 'square', 0.1, 0.1, now);
        const progressions = [[55, 55, 65, 55, 48, 48, 55, 43],[55, 62, 65, 55, 51, 55, 51, 48]];
        const prog = progressions[Math.floor(currentBar / 8) % progressions.length];
        const bassFreq = prog[Math.floor(localStep / 2) % prog.length];
        if (localStep % 2 === 0) playInstrument(bassFreq, 'sawtooth', 0.18, 0.25, now);
        const melody = [220, 0, 261, 0, 329, 0, 392, 440, 0, 392, 0, 329, 0, 261, 220, 0];
        const note = melody[localStep % 16];
        if (note > 0 && currentBar >= 2 && currentBar < 8) playInstrument(note * 2, 'triangle', 0.06, 0.4, now);
        if (currentBar >= 8) {
            const soloScale = [440, 493, 523, 587, 659, 783, 880];
            if (localStep % 2 === 0 || (currentBar % 2 === 1 && Math.random() > 0.5)) {
                const soloNote = soloScale[Math.floor(Math.random() * soloScale.length)];
                playInstrument(soloNote, 'sawtooth', 0.1, 0.2, now);
            }
        }
        step++;
    }, 125); 
}

function playGoldenFinish() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const CHORDS = [
        { root: 174.61, notes: [174.61, 220.00, 261.63, 311.13] }, 
        { root: 207.65, notes: [207.65, 261.63, 311.13, 349.23] }, 
        { root: 233.08, notes: [233.08, 293.66, 349.23] },        
        { root: 261.63, notes: [261.63, 329.63, 392.00] },         
        { root: 207.65, notes: [207.65, 233.08, 293.66, 349.23] }  
    ];
    const tempo = (60 / 145 / 2) * 1000;
    endMusicInterval = setInterval(() => {
        if (!musicEnabled) return;
        const now = audioCtx.currentTime;
        const chordIdx = Math.floor(endStep / 8) % CHORDS.length;
        const chord = CHORDS[chordIdx]; const localStep = endStep % 8;
        if (localStep % 4 === 0) playInstrument(50, 'sine', 0.5, 0.3, now);
        if (localStep % 2 === 0) playInstrument(chord.root / 2, 'triangle', 0.15, 0.2, now);
        if (localStep % 3 !== 0) {
            const melodyNote = chord.notes[Math.floor(Math.random() * chord.notes.length)] * 2;
            playInstrument(melodyNote, 'sawtooth', 0.04, 0.15, now);
        }
        endStep++;
    }, tempo);
}

function playSound(isCorrect) {
  if (!audioCtx || isPaused) return;
  const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  if (isCorrect) {
    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  } else {
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  }
  osc.start(); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  osc.stop(audioCtx.currentTime + 0.3);
}

function playStreakSound() {
    if (!audioCtx || isPaused) return;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.06));
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime + (i * 0.06));
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (i * 0.06) + 0.2);
        osc.start(audioCtx.currentTime + (i * 0.06)); osc.stop(audioCtx.currentTime + (i * 0.06) + 0.2);
    });
}

function playCheerSound() {
    if (!audioCtx || isPaused) return;
    const now = audioCtx.currentTime; const bufferSize = audioCtx.sampleRate * 1.5;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
    const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
    const noiseFilter = audioCtx.createBiquadFilter(); noiseFilter.type = 'bandpass';
    noiseFilter.frequency.setValueAtTime(1000, now); noiseFilter.Q.value = 0.5;
    const noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0, now);
    noiseGain.gain.linearRampToValueAtTime(0.2, now + 0.1);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
    noise.connect(noiseFilter); noiseFilter.connect(noiseGain);
    noiseGain.connect(audioCtx.destination); noise.start();
}

function showToast(text, color = "rgba(0, 255, 136, 0.9)") {
    const toast = document.getElementById("streakToast");
    toast.textContent = text; toast.style.background = color; toast.style.opacity = "1";
    setTimeout(() => { toast.style.opacity = "0"; }, 2000);
}

let wordBase = [["hij sjouwt","hij sjauwt"], ["kou","kau"], ["jou","jau"], ["wenkbrauw","wenkbrouw"], ["restaurant","restourant"], ["Paul (naam)","Poul (naam)"], ["Laura (naam)","Loura (naam)"], ["klauwen","klouwen"], ["fauna","founa"], ["automaat","outomaat"], ["auto","outo"], ["auteur","outeur"], ["augustus","ougustus"], ["augurken","ougurken"], ["augurk","ougurk"], ["astronaut","astronout"], ["applaus","applous"], ["au (pijn)","ou (pijn)"], ["ik zou","ik zau"], ["zij wou","zij wau"], ["vouwen","vauwen"], ["vertrouwelijk","vertrauwelijk"], ["veelvoud","veelvaud"], ["toeschouwer","toeschauwer"], ["oudst","audst"], ["ouderwets","auderwets"], ["oerwoud","oerwaud"], ["nou","nau"], ["juffrouw","juffrauw"], ["inhoud","inhaud"], ["huishouding","huishauding"], ["huishouden","huishauden"], ["houding","hauding"], ["ik hou van jou","ik hau van jou"], ["brouwerij","brauwerij"], ["wenkbrauwen","wenkbrouwen"], ["rauwkost","rouwkost"], ["astronauten","astronouten"]];

const sceneryLayer = document.getElementById("sceneryLayer");
const particleLayer = document.getElementById("particleLayer");
const carXform = document.getElementById("carXform");
const carTilt = document.getElementById("carTilt");
const finishLineGroup = document.getElementById("finishLineGroup");

let carX, carVX, carTiltAngle = 0, gateY, index, baseSpeed, speedIncrement, currentSpeed, dashOffset = 0, active = false;
let scoreC = 0, scoreW = 0, scoreTotal = 0, streak = 0, pendingMistakes = [];
let historyW = [], sceneryItems = [], particles = [], bannerY = -900, bannerText = "", isBoosting = false, correctBoost = 0;
let finishLineY = -200, gameEnded = false, currentPair = {};

function spawnDirt(color = "#ffffff") {
    const p = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    p.setAttribute("r", 4 + Math.random() * 6); p.setAttribute("fill", color); 
    particleLayer.appendChild(p);
    particles.push({ el: p, x: carX + (Math.random()-0.5)*20, y: 620, life: 1.0 });
}

// startGame refactored to use settings object
function startGame(settings) {
  for (let i = wordBase.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [wordBase[i], wordBase[j]] = [wordBase[j], wordBase[i]];
  }
  document.getElementById("ui").style.display = "none";
  document.getElementById("pauseBtn").style.display = "block";
  document.getElementById("quitBtn").style.display = "block";
  initMusic();
  baseSpeed = settings.base; 
  speedIncrement = settings.inc;
  carX = 350; carVX = 0; gateY = -150; index = 0; active = true;
  sceneryItems = Array.from({length: 15}, (_, i) => createSceneryItem(i * 80));
  updateHUD(); setupPair(); requestAnimationFrame(loop);
}

function loop() {
  if (!active || isPaused) { if(active) requestAnimationFrame(loop); return; }
  let speedMultiplier = isBoosting ? 1.5 : 1.0;
  if (correctBoost > 0) { speedMultiplier = 2.0; correctBoost--; }
  currentSpeed = (baseSpeed * speedMultiplier);
  document.getElementById("speedVal").textContent = Math.round(currentSpeed * 25);
  dashOffset -= currentSpeed;
  document.getElementById("centerLine").setAttribute("stroke-dashoffset", dashOffset);
  if (pendingMistakes.length > 0 && Math.random() > 0.5) spawnDirt("#555555");
  if (Math.random() > 0.7) spawnDirt();
  for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.y += currentSpeed * 0.5; p.life -= 0.03;
      p.el.setAttribute("transform", `translate(${p.x}, ${p.y}) scale(${1 + (1-p.life)})`);
      p.el.setAttribute("opacity", p.life);
      if (p.life <= 0) { p.el.remove(); particles.splice(i, 1); }
  }
  carX += carVX; carX = Math.max(140, Math.min(560, carX));
  carTiltAngle += (carVX * 1.5 - carTiltAngle) * 0.1;
  carXform.setAttribute("transform", `translate(${carX}, 560)`);
  carTilt.setAttribute("transform", `rotate(${carTiltAngle})`);
  sceneryItems.forEach(item => {
    item.y += currentSpeed;
    if (item.y > 850) { item.y = -50; item.x = (Math.random() < 0.5 ? "left" : "right") === "left" ? Math.random() * 70 : 630 + Math.random() * 70; }
    item.element.setAttribute("transform", `translate(${item.x}, ${item.y})`);
  });
  if (bannerText !== "") {
    bannerY += currentSpeed;
    document.getElementById("bannerGroup").innerHTML = `<rect x="150" y="${bannerY}" width="400" height="60" fill="rgba(0,255,136,0.2)" rx="30" stroke="#00ff88" stroke-width="2"/><text x="350" y="${bannerY+40}" text-anchor="middle" fill="white" font-size="28" font-weight="bold">${bannerText}</text>`;
    if (bannerY > 900) bannerText = "";
  }
  if (index >= TOTAL_WORDS_TO_RACE) {
    finishLineGroup.style.display = "block"; finishLineY += currentSpeed;
    finishLineGroup.setAttribute("transform", `translate(0, ${finishLineY})`);
    if (finishLineY > 650 && !gameEnded) { gameEnded = true; setTimeout(endGame, 500); }
  } else {
    gateY += currentSpeed;
    if (gateY > 540 && !currentPair.resolved) resolveGate();
    if (gateY > 650) {
        index++;
        if (index > 0 && index % 10 === 0) { 
            baseSpeed += speedIncrement; bannerText = CONFIG_TEXT.MESSAGES.SPEED_UP; 
            bannerY = -400; showToast(CONFIG_TEXT.MESSAGES.ENGINE_TUNED, "#f8ae1b");
        }
        if (index >= TOTAL_WORDS_TO_RACE) gateY = -1000;
        else { 
            if (index % 5 === 0 && bannerText === "") { 
                bannerText = CONFIG_TEXT.MESSAGES.CHEERS[Math.floor(Math.random()*CONFIG_TEXT.MESSAGES.CHEERS.length)]; 
                bannerY = -400; 
            } 
            gateY = -150; setupPair(); 
        }
    }
    drawGates();
  }
  requestAnimationFrame(loop);
}

function resolveGate() {
  const choice = carX < 350 ? "left" : "right";
  currentPair.resolved = true; currentPair.hitSide = choice;
  const pairData = wordBase[index % wordBase.length];
  if (choice === currentPair.correctSide) {
    playSound(true); scoreC++; streak++; scoreTotal += 10;
    if (streak === 5) { 
        scoreTotal += 20; playStreakSound(); playCheerSound();
        showToast(CONFIG_TEXT.MESSAGES.STREAK_BONUS); streak = 0; 
    }
    bumpScore("scoreTotal"); correctBoost = 30; 
  } else {
    playSound(false); scoreW++; streak = 0; historyW.push(pairData[0]); 
    pendingMistakes.push(pairData); bumpScore("scoreR");
    if (pendingMistakes.length >= 4) enterPitStop();
  }
  updateHUD();
}

function enterPitStop() {
    isPaused = true;
    const pitUI = document.getElementById("pitStop");
    const challengeArea = document.getElementById("pitStopChallenge");
    pitUI.style.display = "flex"; challengeArea.innerHTML = "";
    pendingMistakes.forEach((pair) => {
        const row = document.createElement("div"); row.className = "pit-row";
        const isLeftCorrect = Math.random() < 0.5;
        const btnL = document.createElement("button"); btnL.className = "pit-btn"; btnL.textContent = isLeftCorrect ? pair[0] : pair[1];
        btnL.onclick = () => fixMistake(btnL, isLeftCorrect);
        const btnR = document.createElement("button"); btnR.className = "pit-btn"; btnR.textContent = isLeftCorrect ? pair[1] : pair[0];
        btnR.onclick = () => fixMistake(btnR, !isLeftCorrect);
        row.appendChild(btnL); row.appendChild(btnR); challengeArea.appendChild(row);
    });
}

function fixMistake(btn, isCorrect) {
    if (isCorrect) {
        playSound(true); btn.style.background = "#00ff88"; btn.style.color = "#111";
        [...btn.parentElement.getElementsByTagName("button")].forEach(b => b.disabled = true);
        const fixed = document.querySelectorAll("#pitStopChallenge button:disabled[style*='background: rgb(0, 255, 136)']").length;
        if (fixed === 4) {
            document.getElementById("repairingOverlay").style.display = "flex";
            setTimeout(exitPitStop, 1500);
        }
    } else {
        btn.style.color = "#ff4444"; btn.disabled = true;
    }
}

function exitPitStop() {
    pendingMistakes = []; document.getElementById("pitStop").style.display = "none";
    document.getElementById("repairingOverlay").style.display = "none"; isPaused = false;
}

function setupPair() {
  const pair = wordBase[index % wordBase.length];
  const leftIsCorrect = Math.random() < 0.5;
  currentPair = { left: leftIsCorrect ? pair[0] : pair[1], right: leftIsCorrect ? pair[1] : pair[0], correctSide: leftIsCorrect ? "left" : "right", resolved: false, hitSide: null };
}

function drawGates() {
  const g = document.getElementById("gateGroup"); g.innerHTML = "";
  if (index >= TOTAL_WORDS_TO_RACE) return;
  const makeG = (x, y, label, side) => {
    let color = "rgba(0, 102, 102, 0.8)";
    if (currentPair.resolved && currentPair.hitSide === side) color = (side === currentPair.correctSide) ? "#00aa44" : "#aa0000";
    return `<g transform="translate(${x},${y})"><rect width="200" height="60" rx="14" fill="${color}" stroke="white" stroke-width="2"/><text x="100" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="white">${label}</text></g>`;
  };
  g.innerHTML = makeG(120, gateY, currentPair.left, "left") + makeG(400, gateY, currentPair.right, "right");
}

function updateHUD() {
  document.getElementById("correctScore").textContent = scoreC;
  document.getElementById("wrongScore").textContent = scoreW;
  document.getElementById("ptsScore").textContent = scoreTotal;
}

function bumpScore(id) {
    const el = document.getElementById(id); el.classList.add("bump");
    setTimeout(() => el.classList.remove("bump"), 200);
}

function cyclePills() {
    const pills = document.querySelectorAll("#wrongList li");
    if (pills.length === 0) return;
    let currentIdx = 0;
    function highlightNext() {
        if (gameEnded) { 
            pills.forEach(p => p.classList.remove("highlight"));
            pills[currentIdx].classList.add("highlight");
            setTimeout(() => {
                pills[currentIdx].classList.remove("highlight");
                currentIdx = (currentIdx + 1) % pills.length;
                setTimeout(highlightNext, 250); 
            }, 1000);
        }
    }
    highlightNext();
}

function endGame() { 
    active = false; clearInterval(racingInterval);
    document.getElementById("pauseBtn").style.display = "none";
    document.getElementById("quitBtn").style.display = "none";
    document.getElementById("results").style.display = "flex"; 
    const accuracy = Math.round((scoreC / (scoreC + scoreW)) * 100) || 0;
    
    // session storage
    const savedHighScore = parseInt(sessionStorage.getItem('sr_highscore')) || 0;
    const highPill = document.getElementById("highScorePill");
    
    if (scoreTotal > savedHighScore) {
        sessionStorage.setItem('sr_highscore', scoreTotal);
        document.getElementById("highScoreDisplay").textContent = scoreTotal;
        highPill.classList.add("new-record-blink");
    } else {
        document.getElementById("highScoreDisplay").textContent = savedHighScore;
        highPill.classList.remove("new-record-blink");
    }

    document.getElementById("finalScoreDisplay").textContent = scoreTotal;
    document.getElementById("accuracyDisplay").textContent = accuracy + "%";
    document.getElementById("wrongList").innerHTML = [...new Set(historyW)].map(w => `<li>${w}</li>`).join(''); 
    playGoldenFinish();
    cyclePills();
}

function createSceneryItem(yPos) {
    const side = Math.random() < 0.5 ? "left" : "right";
    const x = side === "left" ? Math.random() * 70 : 630 + Math.random() * 70;
    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.innerHTML = `<circle r="12" fill="#1a3300"/><rect x="-2" y="0" width="4" height="10" fill="#4d2600"/>`;
    g.setAttribute("transform", `translate(${x}, ${yPos})`);
    sceneryLayer.appendChild(g);
    return { element: g, y: yPos, x: x };
}

function togglePause() { 
    isPaused = !isPaused; 
    document.getElementById("pauseBtn").textContent = isPaused ? CONFIG_TEXT.HUD.CONTINUE : CONFIG_TEXT.HUD.PAUSE; 
}

document.getElementById("volSlider").addEventListener("input", (e) => {
    masterVolume = parseFloat(e.target.value);
    localStorage.setItem('sr_vol', masterVolume);
    if(musicGain) musicGain.gain.value = masterVolume;
    e.target.blur();
});

document.getElementById("musicToggle").addEventListener("change", (e) => {
    musicEnabled = e.target.checked;
    localStorage.setItem('sr_music', musicEnabled);
    e.target.blur();
});

document.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "p") togglePause();
  if (isPaused) return;
  if (e.key === "ArrowLeft") carVX = -7;
  if (e.key === "ArrowRight") carVX = 7;
  if (e.code === "Space") {
    e.preventDefault();
    isBoosting = true;
  }
  if (e.key === "+" || e.key === "=") { 
    masterVolume = Math.min(0.5, masterVolume + 0.02); 
    document.getElementById("volSlider").value = masterVolume;
    localStorage.setItem('sr_vol', masterVolume);
    if(musicGain) musicGain.gain.value = masterVolume; 
  }
  if (e.key === "-" || e.key === "_") { 
    masterVolume = Math.max(0, masterVolume - 0.02); 
    document.getElementById("volSlider").value = masterVolume;
    localStorage.setItem('sr_vol', masterVolume);
    if(musicGain) musicGain.gain.value = masterVolume; 
  }
});
document.addEventListener("keyup", e => {
    if (e.key === "ArrowLeft" || e.key === "ArrowRight") carVX = 0;
    if (e.code === "Space") isBoosting = false;
});
document.getElementById("pauseBtn").addEventListener("click", togglePause);
document.getElementById("quitBtn").addEventListener("click", () => location.reload());
</script>
