<canvas id="game"></canvas>

<script>
// ---------- Configuration ----------
const CONFIG = {
  WORLD_SIZE: 5000,
  TICK_RATE: 20, // server tick Hz
  CLIENT_RENDER_RATE: 60,
  PELLET_MASS: 1,
  PELLET_COUNT: 1200,
  PLAYER_START_MASS: 20,
  SPLIT_FORCE: 12,
  SPLIT_MIN_MASS: 10,
  EJECT_MASS: 2,
  EJECT_SPEED: 10,
  MASS_LOSS_PER_SEC: 0.0,
  MERGE_TIME: 7.0, // seconds
  MAX_CELLS_PER_PLAYER: 16,
  SERVER_SNAPSHOT_RATE: 20,
  SAFE_SPAWN_DISTANCE: 400,
  MAX_PLAYERS: 256
};

// ---------- Utility ----------
function uid(prefix='id'){return prefix+Math.random().toString(36).slice(2,9)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dist2(a,b){let dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy}
function now(){return performance.now()}
function rnd(min,max){return min + Math.random()*(max-min)}
function angleToVec(a){return {x:Math.cos(a),y:Math.sin(a)}}
function vecLen(v){return Math.hypot(v.x,v.y)}
function normalize(v){let l=vecLen(v)||1; return {x:v.x/l,y:v.y/l}}
function massToRadius(m){return Math.sqrt(m)*4} // tunable

// ---------- Server code string for download ----------
const SERVER_JS = `
// AgarClone - Node authoritative server (simplified)
// Run: node server.js
const WebSocket = require('ws');
const http = require('http');
const PORT = process.env.PORT || 8080;
const TICK = 50; // ms => 20hz
const WORLD= {SIZE:5000};
const PELLET_MASS = 1;
const START_MASS = 20;
const MAX_PLAYERS=512;

// Simple structures
let clients = {}; // id -> ws, player state
let cells = {}; // entity id -> {owner,x,y,vx,vy,mass,mergeLock}
let pellets = [];
let seq = 0;

function spawnPellet(){
  return {id:'p'+Math.random().toString(36).slice(2,9), x:Math.random()*WORLD.SIZE, y:Math.random()*WORLD.SIZE, mass:PELLET_MASS};
}
for(let i=0;i<800;i++) pellets.push(spawnPellet());

function safeSpawn(){
  // naive: random
  return {x:Math.random()*WORLD.SIZE, y:Math.random()*WORLD.SIZE};
}

const server = http.createServer();
const wss = new WebSocket.Server({server});
wss.on('connection', (ws, req) => {
  const id = 'c'+Math.random().toString(36).slice(2,9);
  ws.playerId = id;
  clients[id] = {ws, inputs:[], lastPing:Date.now()};
  const pos = safeSpawn();
  const cid = 'cell_'+id;
  cells[cid] = {id:cid, owner:id, x:pos.x, y:pos.y, vx:0, vy:0, mass:START_MASS, mergeLock: Date.now()+7000};
  ws.send(JSON.stringify({type:'welcome', id}));
  console.log('connect',id);
  ws.on('message', (data) => {
    // basic validation
    try{
      const msg = JSON.parse(data.toString());
      if(msg.type==='input'){
        // rate limit and sanity
        if(msg.seq && clients[id]) clients[id].inputs.push(msg);
      } else if(msg.type==='ping') {
        ws.send(JSON.stringify({type:'pong', t:msg.t}));
      } else if(msg.type==='setname'){
        clients[id].name = String(msg.name).slice(0,32);
      }
    }catch(e){}
  });
  ws.on('close', ()=>{delete clients[id]; /* remove cells */ for(let k in cells) if(cells[k].owner===id) delete cells[k];});
});

function broadcast(snapshot){
  const s = JSON.stringify({type:'snapshot', t:Date.now(), snapshot});
  wss.clients.forEach(c => { if(c.readyState===WebSocket.OPEN) c.send(s); });
}

function physicsTick(){
  // apply inputs
  for(const pid in clients){
    const cl=clients[pid];
    // process inputs
    while(cl.inputs.length){
      const input = cl.inputs.shift();
      // find player's cells
      for(const cid in cells){
        const c = cells[cid];
        if(c.owner!==pid) continue;
        // input move: set velocity
        if(input.move){
          const a = input.move.angle;
          const spd = 100 / (Math.sqrt(c.mass)); // simple speed function
          c.vx = Math.cos(a)*spd;
          c.vy = Math.sin(a)*spd;
        }
        if(input.action==='split'){
          // validate mass and cooldown
          if(c.mass>10){
            const newMass = c.mass/2;
            c.mass = newMass;
            const angle = input.move ? input.move.angle : 0;
            const nid='cell_'+Math.random().toString(36).slice(2,9);
            cells[nid]={id:nid,owner:pid,x:c.x+Math.cos(angle)*20,y:c.y+Math.sin(angle)*20,vx:Math.cos(angle)*12,vy:Math.sin(angle)*12,mass:newMass,mergeLock:Date.now()+7000};
          }
        }
        if(input.action==='eject'){
          if(c.mass>3){
            c.mass -= 2;
            const angle = input.move ? input.move.angle : 0;
            const pellet = spawnPellet();
            pellet.x = c.x + Math.cos(angle)*(massToRadius(c.mass)+10);
            pellet.y = c.y + Math.sin(angle)*(massToRadius(c.mass)+10);
            pellet.vx = Math.cos(angle)*6;
            pellet.vy = Math.sin(angle)*6;
            pellets.push(pellet);
          }
        }
      }
    }
  }

  // move cells
  for(const id in cells){
    const c = cells[id];
    c.x += c.vx * (TICK/1000);
    c.y += c.vy * (TICK/1000);
    // bounds
    c.x = Math.max(0, Math.min(WORLD.SIZE, c.x));
    c.y = Math.max(0, Math.min(WORLD.SIZE, c.y));
    // friction
    c.vx *= 0.98;
    c.vy *= 0.98;
  }

  // pellets move
  for(const p of pellets){
    if(p.vx||p.vy){ p.x+=p.vx*(TICK/1000); p.y+=p.vy*(TICK/1000); p.vx*=0.96; p.vy*=0.96;}
  }

  // collisions: cells eat pellets
  for(let i=pellets.length-1;i>=0;i--){
    const p=pellets[i];
    for(const cid in cells){
      const c=cells[cid];
      const r = Math.hypot(c.x-p.x,c.y-p.y);
      if(r < massToRadius(c.mass)){
        c.mass += p.mass*0.9;
        pellets.splice(i,1);
        break;
      }
    }
  }

  // cells eat other cells (simple)
  for(const aId in cells){
    const A = cells[aId];
    for(const bId in cells){
      if(aId===bId) continue;
      const B = cells[bId];
      if(A.owner===B.owner) continue;
      const dx=A.x-B.x, dy=A.y-B.y;
      const d2 = dx*dx+dy*dy;
      const ra = massToRadius(A.mass), rb = massToRadius(B.mass);
      if(d2 < (ra-rb)*(ra-rb) && A.mass > B.mass*1.25){
        // A consumes B
        A.mass += B.mass*0.9;
        delete cells[bId];
      }
    }
  }

  // ensure pellet count
  while(pellets.length < 800) pellets.push(spawnPellet());

  // snapshot broadcast
  const snap = {cells:Object.values(cells), pellets:pellets.slice(0,200)};
  broadcast(snap);
}

setInterval(physicsTick, TICK);
server.listen(PORT, ()=> console.log('Server listening',PORT));

function massToRadius(m){return Math.sqrt(m)*4;}
`;

// Dockerfile string
const DOCKERFILE = `
FROM node:18-alpine
WORKDIR /usr/src/app
COPY server.js .
RUN npm init -y
RUN npm i ws
EXPOSE 8080
CMD ["node","server.js"]
`;

const CIYML = `

// tests.js
const TESTSJS = `
// Minimal unit tests (node)

const {massToRadius} = require('./server.js') || {};
// Example unit: radius increases with mass
assert(massToRadius(16) > massToRadius(4));

// ---------- Download helpers ----------
function downloadFile(name, content){
  const blob = new Blob([content], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
document.getElementById('dlServer').onclick = ()=> { document.getElementById('filePreview').value = SERVER_JS; downloadFile('server.js', SERVER_JS); }
document.getElementById('dlDocker').onclick = ()=> { document.getElementById('filePreview').value = DOCKERFILE; downloadFile('Dockerfile', DOCKERFILE); }
document.getElementById('dlK8s').onclick = ()=> { document.getElementById('filePreview').value = K8S; downloadFile('k8s.yaml', K8S); }
document.getElementById('dlCI').onclick = ()=> { document.getElementById('filePreview').value = CIYML; downloadFile('.github/workflows/ci.yml', CIYML); }
document.getElementById('dlTests').onclick = ()=> { document.getElementById('filePreview').value = TESTSJS; downloadFile('tests.js', TESTSJS); }

// ---------- Mock authoritative server (runs in-browser) ----------
class MockServer {
  constructor(opts={}){
    this.tickRate = opts.tickRate || CONFIG.TICK_RATE;
    this.worldSize = CONFIG.WORLD_SIZE;
    this.clients = new Map(); // id -> {queue, ws}
    this.cells = {}; // id -> cell
    this.pellets = [];
    for(let i=0;i<CONFIG.PELLET_COUNT;i++) this.pellets.push(this.spawnPellet());
    this._tickId = null;
    this._lastTick=0;
    this.start();
  }
  spawnPellet(){
    return {id:'pel_'+uid(), x:Math.random()*this.worldSize, y:Math.random()*this.worldSize, mass:CONFIG.PELLET_MASS, vx:0, vy:0};
  }
  connect(client){
    const id = client.id || uid('p');
    client.id = id;
    client._server = this;
    this.clients.set(id, client);
    // create starter cell
    const pos = this.safeSpawn();
    const cid = 'cell_'+id;
    this.cells[cid] = {id:cid, owner:id, x:pos.x, y:pos.y, vx:0, vy:0, mass:CONFIG.PLAYER_START_MASS, mergeLock: now()+CONFIG.MERGE_TIME*1000};
    // send welcome with world info
    client.onmessage({type:'welcome', id, world:{size:this.worldSize}, tickRate:this.tickRate});
    return id;
  }
  safeSpawn(){
    // try to spawn away from big cells
    for(let tries=0;tries<20;tries++){
      const x=Math.random()*this.worldSize,y=Math.random()*this.worldSize;
      let ok=true;
      for(const k in this.cells){
        const c=this.cells[k];
        if((c.mass>40) && ((c.x-x)*(c.x-x)+(c.y-y)*(c.y-y) < CONFIG.SAFE_SPAWN_DISTANCE*CONFIG.SAFE_SPAWN_DISTANCE)){ ok=false;break;}
      }
      if(ok) return {x,y};
    }
    return {x:Math.random()*this.worldSize,y:Math.random()*this.worldSize};
  }
  start(){
    if(this._tickId) return;
    const tickMs = 1000/this.tickRate;
    this._lastTick=now();
    this._tickId = setInterval(()=>this.tick(), tickMs);
  }
  stop(){ clearInterval(this._tickId); this._tickId=null;}
  tick(){
    const dt = 1/this.tickRate;
    // process queued inputs per client
    for(const [id,client] of this.clients){
      while(client._inputs && client._inputs.length){
        const inp = client._inputs.shift();
        this.processInput(id, inp);
      }
    }
    // physics
    for(const id in this.cells){
      const c=this.cells[id];
      c.x += c.vx*dt;
      c.y += c.vy*dt;
      c.vx *= 0.98; c.vy *= 0.98;
      // bounds
      c.x = clamp(c.x,0,this.worldSize); c.y = clamp(c.y,0,this.worldSize);
      // mass loss
      if(CONFIG.MASS_LOSS_PER_SEC>0){ c.mass = Math.max(1, c.mass - CONFIG.MASS_LOSS_PER_SEC*dt); }
    }
    // move pellets
    for(const p of this.pellets){ p.x += (p.vx||0)*dt; p.y += (p.vy||0)*dt; p.vx*=0.97; p.vy*=0.97; }
    // collisions pellet->cell
    for(let i=this.pellets.length-1;i>=0;i--){
      const p=this.pellets[i];
      let eaten=false;
      for(const cid in this.cells){
        const c=this.cells[cid];
        const r = massToRadius(c.mass);
        if((c.x-p.x)*(c.x-p.x)+(c.y-p.y)*(c.y-p.y) < r*r){
          c.mass += p.mass*0.9;
          this.pellets.splice(i,1);
          eaten=true;break;
        }
      }
      if(!eaten) {
        // respawn if out of bounds
        if(p.x<0||p.y<0||p.x>this.worldSize||p.y>this.worldSize) this.pellets.splice(i,1);
      }
    }
    while(this.pellets.length<CONFIG.PELLET_COUNT) this.pellets.push(this.spawnPellet());
    // cell vs cell - consumption
    const keys = Object.keys(this.cells);
    for(let i=0;i<keys.length;i++){
      for(let j=i+1;j<keys.length;j++){
        const A=this.cells[keys[i]], B=this.cells[keys[j]];
        if(!A||!B) continue;
        const dx=A.x-B.x, dy=A.y-B.y;
        const d2=dx*dx+dy*dy;
        const ra=massToRadius(A.mass), rb=massToRadius(B.mass);
        if(d2 < (ra-rb)*(ra-rb)){
          if(A.mass > B.mass*1.15){
            A.mass += B.mass*0.9; delete this.cells[B.id];
          } else if(B.mass > A.mass*1.15){
            B.mass += A.mass*0.9; delete this.cells[A.id];
          }
        }
      }
    }
    // merging same-owner
    for(const aId in this.cells){
      const A=this.cells[aId];
      for(const bId in this.cells){
        if(aId===bId) continue;
        const B=this.cells[bId];
        if(A.owner!==B.owner) continue;
        if(now() < A.mergeLock || now() < B.mergeLock) continue;
        const dx=A.x-B.x, dy=A.y-B.y;
        if(dx*dx+dy*dy < (massToRadius(A.mass)+massToRadius(B.mass))**2 * 0.25){
          // merge
          A.mass += B.mass;
          delete this.cells[bId];
        }
      }
    }
    // build snapshot (limited)
    const snap = {cells:Object.values(this.cells).map(c=>({id:c.id,owner:c.owner,x:c.x,y:c.y,mass:c.mass})), pellets:this.pellets.slice(0,200), t:Date.now()};
    for(const [id,client] of this.clients){
      client.onmessage({type:'snapshot', snap});
    }
  }
  processInput(playerId, msg){
    // basic validation
    if(typeof msg !== 'object') return;
    // handle actions per owned cells
    for(const cid in this.cells){
      const c=this.cells[cid];
      if(c.owner !== playerId) continue;
      if(msg.move){
        const a = msg.move.angle;
        if(typeof a !== 'number' || !isFinite(a)) continue;
        const spd = 120/Math.sqrt(c.mass);
        c.vx = Math.cos(a)*spd;
        c.vy = Math.sin(a)*spd;
      }
      if(msg.action==='split'){
        if(c.mass > CONFIG.SPLIT_MIN_MASS && Object.values(this.cells).filter(x=>x.owner===playerId).length < CONFIG.MAX_CELLS_PER_PLAYER){
          const newMass = c.mass/2;
          c.mass = newMass;
          const angle = msg.move ? msg.move.angle : 0;
          const nid = 'cell_'+uid();
          this.cells[nid] = {id:nid, owner:playerId, x:c.x+Math.cos(angle)*massToRadius(c.mass), y:c.y+Math.sin(angle)*massToRadius(c.mass), vx:Math.cos(angle)*CONFIG.SPLIT_FORCE, vy:Math.sin(angle)*CONFIG.SPLIT_FORCE, mass:newMass, mergeLock: now()+CONFIG.MERGE_TIME*1000};
        }
      }
      if(msg.action==='eject'){
        if(c.mass > CONFIG.EJECT_MASS+1){
          c.mass -= CONFIG.EJECT_MASS;
          const angle = msg.move ? msg.move.angle : 0;
          const pel = this.spawnPellet();
          pel.x = c.x + Math.cos(angle)*(massToRadius(c.mass)+4);
          pel.y = c.y + Math.sin(angle)*(massToRadius(c.mass)+4);
          pel.vx = Math.cos(angle)*CONFIG.EJECT_SPEED;
          pel.vy = Math.sin(angle)*CONFIG.EJECT_SPEED;
          this.pellets.push(pel);
        }
      }
    }
  }
}

// ---------- Client (browser) ----------
class Client {
  constructor(canvas){
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.minimap = document.getElementById('minimap');
    this.minimap.width = 160; this.minimap.height = 120;
    this.mctx = this.minimap.getContext('2d');

    this.id = uid('cl');
    this.name = 'Player';
    this.color = '#60c3ff';
    this.server = null;
    this.cells = {}; // local predicted cells
    this.serverCells = {}; // authoritative
    this.pellets = [];
    this.inputSeq = 0;
    this.pendingInputs = [];
    this.snapshots = []; // for interpolation
    this.camera = {x:CONFIG.WORLD_SIZE/2,y:CONFIG.WORLD_SIZE/2,zoom:1};
    this.spectating = false;
    this.followId = null;
    this.lastPing=0;
    this.lastSnapshotTime=0;

    this.controls = {mouseX:0,mouseY:0, angle:0, pressingSplit:false, pressingEject:false};
    this.bindEvents();
    this.resize();
    window.addEventListener('resize', ()=>this.resize());
    this._renderLoop();
  }

  connectToMock(server){
    this.server = server;
    this.server.connect(this);
  }

  // emulate WebSocket message handler
  onmessage(msg){
    if(msg.type==='welcome'){
      this.id = msg.id;
      this.camera.zoom = 1;
    } else if(msg.type==='snapshot'){
      this.receiveSnapshot(msg.snap);
    }
  }

  send(msg){
    if(!this.server) return;
    // stamp seq
    msg.seq = ++this.inputSeq;
    this.pendingInputs.push(msg);
    // send to server (queue)
    if(!this._sendQueue) this._sendQueue=[];
    this._sendQueue.push(msg);
    if(this.server && this.server.clients){
      // direct push into server client's inputs
      const clientProxy = {id:this.id, _inputs:this._sendQueue, onmessage:(m)=>this.onmessage(m)};
      if(!this.server.clients.has(this.id)) this.server.connect(clientProxy);
      // the server now owns this clientProxy; we clear our queue
      this._sendQueue=[];
    } else if(this.server){
      // server is MockServer; push to its client instance
      if(!this.server.clients.has(this.id)){
        const clientProxy = {id:this.id, _inputs:[], onmessage:(m)=>this.onmessage(m)};
        this.server.clients.set(this.id, clientProxy);
      }
      const cl = this.server.clients.get(this.id);
      cl._inputs.push(msg);
    }
  }

  receiveSnapshot(snap){
    // Add to buffer
    this.snapshots.push({t:Date.now(), snap});
    if(this.snapshots.length>20) this.snapshots.shift();
    this.lastSnapshotTime = Date.now();
    // update serverCells quickly for reconciliation
    this.serverCells = {};
    for(const c of snap.cells){
      this.serverCells[c.id]=c;
    }
    this.pellets = snap.pellets;
    // reconcile predicted cells
    this.reconcile();
  }

  reconcile(){
    // find our cells in server snapshot by owner
    for(const sid in this.serverCells){
      const sc = this.serverCells[sid];
      if(sc.owner===this.id){
        // replace local predicted cell of same id
        this.cells[sid] = {id:sc.id,x:sc.x,y:sc.y,mass:sc.mass};
      }
    }
    // drop pending inputs (we don't track per cell seq in this simple impl)
    this.pendingInputs=[];
  }

  bindEvents(){
    const c=this.canvas;
    c.addEventListener('mousemove', (e)=>{
      const rect = c.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      this.controls.mouseX = mx; this.controls.mouseY = my;
      const world = this.screenToWorld(mx,my);
      const cam = this.camera;
      const dx = world.x - cam.x, dy = world.y - cam.y;
      this.controls.angle = Math.atan2(dy,dx);
    });
    c.addEventListener('wheel', (e)=>{ e.preventDefault(); this.camera.zoom *= e.deltaY>0?0.95:1.05; this.camera.zoom = clamp(this.camera.zoom,0.2,3); });
    window.addEventListener('keydown', (e)=>{
      if(e.code==='Space'){ this.doSplit(); }
      if(e.key==='<'){ this.doEject(); }
    });
    document.getElementById('btnSplit').addEventListener('click', ()=>this.doSplit());
    document.getElementById('btnEject').addEventListener('click', ()=>this.doEject());
    document.getElementById('btnLocal').addEventListener('click', ()=> {
      const name = document.getElementById('name').value || 'Player';
      const color = document.getElementById('color').value || '#60c3ff';
      this.name = name; this.color=color;
      // start local mock server if not exists
      if(!window._mockServer) window._mockServer = new MockServer({tickRate:CONFIG.TICK_RATE});
      this.connectToMock(window._mockServer);
    });
    document.getElementById('btnSpec').addEventListener('click', ()=>{ this.spectating = !this.spectating; document.getElementById('btnSpec').textContent = this.spectating ? 'Stop Spectate':'Spectate'; });
    document.getElementById('color').addEventListener('input',(e)=>this.color=e.target.value);
    document.getElementById('name').addEventListener('change',(e)=>{ this.name = e.target.value; });
  }

  doSplit(){
    this.send({move:{angle:this.controls.angle}, action:'split'});
  }
  doEject(){ this.send({move:{angle:this.controls.angle}, action:'eject'}); }

  screenToWorld(sx,sy){
    const w = this.canvas.width, h=this.canvas.height;
    const zx = this.camera.zoom;
    const wx = this.camera.x + (sx - w/2)/zx;
    const wy = this.camera.y + (sy - h/2)/zx;
    return {x:wx,y:wy};
  }

  updateCamera(){
    if(this.spectating){
      // follow largest player on server snapshot
      let top = null;
      for(const k in this.serverCells){
        const c = this.serverCells[k];
        if(!top || c.mass > top.mass) top = c;
      }
      if(top){ this.camera.x = top.x; this.camera.y = top.y; }
      return;
    }
    // follow first of our cells
    for(const k in this.serverCells){
      const c = this.serverCells[k];
      if(c.owner===this.id){ this.camera.x = c.x; this.camera.y = c.y; return;}
    }
    // else keep manual camera
  }

  interpolateSnapshot(alpha){
    if(this.snapshots.length<2) return;
    // linear interpolate between last two
    const a = this.snapshots[this.snapshots.length-2];
    const b = this.snapshots[this.snapshots.length-1];
    const out = {cells:[], pellets: b.snap.pellets};
    const ta = a.t, tb = b.t;
    const t = ta + alpha*(tb-ta);
    const frac = (t - ta)/Math.max((tb-ta),1);
    const byId = {};
    for(const c of a.snap.cells) byId[c.id]={a:c};
    for(const c of b.snap.cells){
      if(!byId[c.id]) byId[c.id]={a:c};
      byId[c.id].b = c;
    }
    for(const id in byId){
      const row = byId[id];
      const A = row.a, B = row.b || row.a;
      const cx = A.x + (B.x-A.x)*frac;
      const cy = A.y + (B.y-A.y)*frac;
      const cm = A.mass + (B.mass-A.mass)*frac;
      out.cells.push({id,idOwner: B.owner, x:cx,y:cy,mass:cm});
    }
    return out;
  }

  _renderLoop(){
    const loop = ()=>{
      this._render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }

  _render(){
    const c=this.canvas, ctx=this.ctx;
    if(!c) return;
    const w = c.width = window.innerWidth;
    const h = c.height = window.innerHeight;
    // background
    ctx.fillStyle = '#071018';
    ctx.fillRect(0,0,w,h);

    // process continuous movement input: send movement at tick rate frequency
    if(this.server && (Date.now()%Math.round(1000/CONFIG.TICK_RATE) < 20)){
      this.send({move:{angle:this.controls.angle}});
    }

    // interpolation
    const snap = this.interpolateSnapshot(0.8) || {cells:[],pellets:this.pellets};
    // draw pellets
    ctx.save();
    // camera transform
    ctx.translate(w/2, h/2);
    ctx.scale(this.camera.zoom, this.camera.zoom);
    ctx.translate(-this.camera.x, -this.camera.y);

    // grid
    ctx.strokeStyle='rgba(255,255,255,0.02)';
    ctx.lineWidth=1;
    for(let gx=0;gx<CONFIG.WORLD_SIZE;gx+=500){
      ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,CONFIG.WORLD_SIZE); ctx.stroke();
    }
    for(let gy=0;gy<CONFIG.WORLD_SIZE;gy+=500){
      ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(CONFIG.WORLD_SIZE,gy); ctx.stroke();
    }

    for(const p of snap.pellets){
      const r = massToRadius(p.mass);
      ctx.fillStyle='#ffef9a';
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
    }

    // draw cells
    const sorted = snap.cells.slice().sort((a,b)=>b.mass-a.mass);
    for(const cl of sorted){
      const r = massToRadius(cl.mass);
      const isMe = (cl.idOwner===this.id || (this.serverCells[cl.id] && this.serverCells[cl.id].owner===this.id));
      // skin
      ctx.fillStyle = isMe ? this.color : '#88cc88';
      ctx.strokeStyle = '#001b20';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(cl.x,cl.y,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
      // name & mass
      ctx.fillStyle='rgba(0,0,0,0.7)';
      ctx.font = `${Math.max(10, Math.min(20, r/2))}px Arial`;
      ctx.textAlign='center';
      ctx.fillText((cl.idOwner===this.id?this.name:'Bot')+" "+Math.floor(cl.mass), cl.x, cl.y+4);
    }

    // crosshair
    const camWorld = this.screenToWorld(this.controls.mouseX,this.controls.mouseY);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.arc(camWorld.x,camWorld.y,16,0,Math.PI*2); ctx.stroke();

    ctx.restore();

    // UI overlays
    this.updateCamera();
    this.drawLeaderboard(sorted);
    this.drawMinimap(sorted);
    // ping indicator (mock)
    document.getElementById('ping').textContent = Math.round(Math.random()*80);
  }

  drawLeaderboard(sorted){
    const lb = document.getElementById('leaderboard');
    lb.innerHTML = '';
    for(let i=0;i<10;i++){
      const cell = sorted[i];
      if(!cell) break;
      const li = document.createElement('li');
      const name = (cell.idOwner===this.id) ? this.name : ('Player'+cell.idOwner.slice(-3));
      li.textContent = `${name} (${Math.floor(cell.mass)})`;
      lb.appendChild(li);
    }
  }

  drawMinimap(sorted){
    const ctx = this.mctx;
    const W=this.minimap.width, H=this.minimap.height;
    ctx.fillStyle='#031319';
    ctx.fillRect(0,0,W,H);
    const scaleX = W/CONFIG.WORLD_SIZE, scaleY = H/CONFIG.WORLD_SIZE;
    // pellets
    ctx.fillStyle='#ffd37a';
    for(const p of this.pellets.slice(0,200)){
      ctx.fillRect(p.x*scaleX, p.y*scaleY, 2,2);
    }
    // players
    for(const c of sorted.slice(0,60)){
      ctx.fillStyle = (c.idOwner===this.id) ? this.color : '#a8ffa8';
      ctx.fillRect(c.x*scaleX-2, c.y*scaleY-2, 4,4);
    }
  }
}

// ---------- Init ----------
const canvas = document.getElementById('game');
const client = new Client(canvas);

// lightweight expose for debugging
window._client = client;
window._mockServer = window._mockServer || null;

// basic helpers used above
function massToRadius(m){return Math.sqrt(m)*4;}
</script>
