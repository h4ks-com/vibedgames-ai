<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minran & h4tch: The Ultimate Game Collection</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated;cursor:default}
#ui{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;pointer-events:none;z-index:5}
#ui *{pointer-events:auto}
.btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;backdrop-filter:blur(10px);transition:all .2s}
.btn:hover{background:rgba(255,255,255,0.2);transform:scale(1.05)}
#info{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#bbb;padding:6px 20px;border-radius:20px;font-size:12px;z-index:5;backdrop-filter:blur(10px);display:none;white-space:nowrap}
</style>
</head>
<body>
<div id="ui">
  <button class="btn" id="backBtn" onclick="toMenu()" style="display:none">← Menu</button>
  <button class="btn" id="muteBtn" onclick="toggleMute()">🔊</button>
</div>
<div id="info"></div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=Math.min(900,window.innerWidth);H=Math.min(640,window.innerHeight-4);C.width=W;C.height=H}
resize();window.addEventListener('resize',resize);

// Audio
const ACtx=new(window.AudioContext||window.webkitAudioContext)();
let muted=false;
function toggleMute(){muted=!muted;document.getElementById('muteBtn').textContent=muted?'🔇':'🔊'}
function sfx(freq,dur,type='square',vol=0.1){
  if(muted)return;try{const o=ACtx.createOscillator(),g=ACtx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;g.gain.exponentialRampToValueAtTime(0.001,ACtx.currentTime+dur);o.connect(g);g.connect(ACtx.destination);o.start();o.stop(ACtx.currentTime+dur)}catch(e){}
}
function sfxHit(){sfx(200,0.1);sfx(400,0.08,'sawtooth',0.07)}
function sfxJump(){sfx(300,0.15);setTimeout(()=>sfx(500,0.1),50)}
function sfxScore(){sfx(800,0.1);setTimeout(()=>sfx(1200,0.15),80)}
function sfxHurt(){sfx(100,0.2,'sawtooth',0.12)}
function sfxWin(){[0,100,200,300,400].forEach((d,i)=>setTimeout(()=>sfx(400+i*100,0.2,'sine',0.08),d))}

// Input
const keys={};let mouseX=0,mouseY=0,mouseDown=false,clicked=false;
document.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()});
document.addEventListener('keyup',e=>keys[e.code]=false);
C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();mouseX=(e.clientX-r.left)*(W/r.width);mouseY=(e.clientY-r.top)*(H/r.height)});
C.addEventListener('mousedown',e=>{mouseDown=true;clicked=true});
C.addEventListener('mouseup',()=>mouseDown=false);
C.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0],r=C.getBoundingClientRect();mouseX=(t.clientX-r.left)*(W/r.width);mouseY=(t.clientY-r.top)*(H/r.height);mouseDown=true;clicked=true},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=C.getBoundingClientRect();mouseX=(t.clientX-r.left)*(W/r.width);mouseY=(t.clientY-r.top)*(H/r.height)},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();mouseDown=false},{passive:false});

let state='menu',curGame=null,score=0,hiScores={},t=0;

// Particles
let parts=[],floats=[];
function addP(x,y,c,n=6){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7-2,l:25+Math.random()*20,c,s:2+Math.random()*3})}
function addF(x,y,txt,c='#fff'){floats.push({x,y,txt,c,l:50,vy:-2})}
function updParts(){parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.l--;p.s*=.97});parts=parts.filter(p=>p.l>0);floats.forEach(f=>{f.y+=f.vy;f.l--});floats=floats.filter(f=>f.l>0)}
function drwParts(){parts.forEach(p=>{X.globalAlpha=p.l/40;X.fillStyle=p.c;X.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s)});floats.forEach(f=>{X.globalAlpha=f.l/50;X.fillStyle=f.c;X.font='bold 15px sans-serif';X.textAlign='center';X.fillText(f.txt,f.x,f.y)});X.globalAlpha=1;X.textAlign='left'}

// ===== CHARACTER DRAWING =====
function drawMinran(cx,cy,sc=1,face=1,pose='idle',flash=false){
  X.save();X.translate(cx,cy);X.scale(sc*face,sc);
  if(flash)X.globalAlpha=0.5+Math.sin(t*0.5)*0.4;
  const bob=pose==='idle'?Math.sin(t*0.08)*2:0;
  // Shadow
  X.fillStyle='rgba(0,0,0,0.2)';X.beginPath();X.ellipse(0,5,16,5,0,0,Math.PI*2);X.fill();
  // Bunny slippers
  X.fillStyle='#ffb6d9';
  X.beginPath();X.ellipse(-8,0+bob,10,6,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(8,0-bob,10,6,0,0,Math.PI*2);X.fill();
  // Slipper ears
  X.fillStyle='#fff';
  [[-11,-6+bob,-0.3],[-5,-7+bob,0.3],[5,-7-bob,-0.3],[11,-6-bob,0.3]].forEach(([ex,ey,er])=>{
    X.beginPath();X.ellipse(ex,ey,3,6,er,0,Math.PI*2);X.fill();
    X.fillStyle='#ff8ab5';X.beginPath();X.ellipse(ex,ey+2,1.5,3,er,0,Math.PI*2);X.fill();X.fillStyle='#fff';
  });
  // Legs
  X.fillStyle='#ffcc99';X.fillRect(-9,-8,6,10);X.fillRect(3,-8,6,10);
  // Bathrobe
  const rw=pose==='punch'||pose==='kick'?1:Math.sin(t*0.06)*1;
  X.fillStyle='#ff85b3';X.beginPath();
  X.moveTo(-15+rw,-5);X.lineTo(-19,-22);X.quadraticCurveTo(-20,-50,0,-53);X.quadraticCurveTo(20,-50,19,-22);X.lineTo(15-rw,-5);X.closePath();X.fill();
  X.strokeStyle='#ff5c99';X.lineWidth=1.5;X.stroke();
  // Robe collar
  X.fillStyle='#ffb6d9';X.beginPath();X.moveTo(-10,-50);X.quadraticCurveTo(0,-46,10,-50);X.quadraticCurveTo(0,-44,-10,-50);X.fill();
  // Belt
  X.strokeStyle='#ff4081';X.lineWidth=2.5;X.beginPath();X.moveTo(-13,-20);X.quadraticCurveTo(0,-18,13,-20);X.stroke();
  X.fillStyle='#ff4081';X.beginPath();X.arc(0,-19,3.5,0,Math.PI*2);X.fill();
  // Belt tails
  X.strokeStyle='#ff4081';X.lineWidth=2;X.beginPath();X.moveTo(2,-19);X.lineTo(10,-12);X.stroke();X.beginPath();X.moveTo(3,-19);X.lineTo(12,-14);X.stroke();
  // Head
  X.fillStyle='#ffcc99';X.beginPath();X.arc(0,-59,11,0,Math.PI*2);X.fill();
  // Hair
  X.fillStyle='#1a1a2e';X.beginPath();X.arc(0,-63,12,Math.PI+0.2,-0.2);X.fill();
  X.beginPath();X.arc(-9,-55,5,0.5,2.5);X.fill();X.beginPath();X.arc(9,-55,5,0.6,2.6);X.fill();
  // Eyes
  X.fillStyle='#fff';X.beginPath();X.ellipse(-4,-60,3.5,3,0,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(4,-60,3.5,3,0,0,Math.PI*2);X.fill();
  X.fillStyle='#2a1a3e';X.beginPath();X.arc(-3,-60,2,0,Math.PI*2);X.fill();X.beginPath();X.arc(5,-60,2,0,Math.PI*2);X.fill();
  // Eye shine
  X.fillStyle='#fff';X.beginPath();X.arc(-2.5,-61,0.8,0,Math.PI*2);X.fill();X.beginPath();X.arc(5.5,-61,0.8,0,Math.PI*2);X.fill();
  // Brows
  X.strokeStyle='#1a1a2e';X.lineWidth=2.5;
  X.beginPath();X.moveTo(-8,-64.5);X.lineTo(-1,-63);X.stroke();
  X.beginPath();X.moveTo(8,-64.5);X.lineTo(1,-63);X.stroke();
  // Mouth
  X.strokeStyle='#cc6666';X.lineWidth=1.5;X.beginPath();X.arc(0,-54,3.5,0.15,Math.PI-0.15);X.stroke();
  // Blush
  X.fillStyle='rgba(255,150,150,0.25)';X.beginPath();X.ellipse(-7,-56,3,2,0,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(7,-56,3,2,0,0,Math.PI*2);X.fill();
  // Arms
  X.strokeStyle='#ffcc99';X.lineWidth=5;X.lineCap='round';
  if(pose==='punch'){X.beginPath();X.moveTo(13,-40);X.lineTo(32,-44);X.stroke();X.fillStyle='#ffcc99';X.beginPath();X.arc(32,-44,5,0,Math.PI*2);X.fill();X.strokeStyle='#ffcc99';X.lineWidth=4;X.beginPath();X.moveTo(-13,-40);X.lineTo(-17,-28);X.stroke();
    if(t%30<15){X.fillStyle='#ffff0066';X.font='bold 10px sans-serif';X.fillText('POW!',24,-52)}}
  else if(pose==='kick'){X.strokeStyle='#ffcc99';X.lineWidth=6;X.beginPath();X.moveTo(8,-10);X.lineTo(38,-13);X.stroke();X.fillStyle='#ffb6d9';X.beginPath();X.ellipse(38,-13,10,6,0,0,Math.PI*2);X.fill();X.fillStyle='#fff';X.beginPath();X.ellipse(34,-19,3,6,-0.3,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(40,-20,3,6,0.3,0,Math.PI*2);X.fill();
    X.strokeStyle='#ffcc99';X.lineWidth=4;X.beginPath();X.moveTo(-13,-40);X.lineTo(-20,-50);X.stroke();X.beginPath();X.moveTo(13,-40);X.lineTo(16,-50);X.stroke()}
  else if(pose==='jump'){X.beginPath();X.moveTo(13,-40);X.lineTo(20,-52);X.stroke();X.beginPath();X.moveTo(-13,-40);X.lineTo(-20,-52);X.stroke()}
  else if(pose==='cook'){X.beginPath();X.moveTo(13,-40);X.lineTo(26,-32);X.stroke();X.beginPath();X.moveTo(-13,-40);X.lineTo(-22,-32);X.stroke();X.fillStyle='#aaa';X.fillRect(23,-37,8,12);X.fillStyle='#777';X.fillRect(22,-37,10,3)}
  else if(pose==='shoot'){X.beginPath();X.moveTo(13,-40);X.lineTo(32,-42);X.stroke();X.fillStyle='#555';X.fillRect(29,-46,16,5);X.fillStyle='#888';X.fillRect(29,-44,4,2)}
  else if(pose==='sneak'){X.beginPath();X.moveTo(13,-40);X.lineTo(10,-28);X.stroke();X.beginPath();X.moveTo(-13,-40);X.lineTo(-10,-28);X.stroke()}
  else{X.beginPath();X.moveTo(13,-40);X.lineTo(17,-27);X.stroke();X.beginPath();X.moveTo(-13,-40);X.lineTo(-17,-27);X.stroke()}
  X.restore();
}

function drawH4tch(cx,cy,sc=1,face=1,pose='idle'){
  X.save();X.translate(cx,cy);X.scale(sc*face,sc);
  const bob=Math.sin(t*0.07)*1.5;
  // Shadow
  X.fillStyle='rgba(0,0,0,0.25)';X.beginPath();X.ellipse(0,8,20,6,0,0,Math.PI*2);X.fill();
  // Royal boots
  X.fillStyle='#2a0a3a';X.fillRect(-10,0+bob,8,10);X.fillRect(2,0-bob,8,10);
  X.fillStyle='#ffd700';X.fillRect(-10,-1+bob,8,3);X.fillRect(2,-1-bob,8,3);
  // Royal robe (purple)
  X.fillStyle='#6a0dad';X.beginPath();
  X.moveTo(-18,-5);X.lineTo(-22,-25);X.quadraticCurveTo(-22,-55,0,-58);X.quadraticCurveTo(22,-55,22,-25);X.lineTo(18,-5);X.closePath();X.fill();
  X.strokeStyle='#4a0080';X.lineWidth=2;X.stroke();
  // Gold trim
  X.strokeStyle='#ffd700';X.lineWidth=2;X.beginPath();X.moveTo(-18,-5);X.lineTo(-22,-25);X.quadraticCurveTo(-22,-55,0,-58);X.stroke();X.beginPath();X.moveTo(18,-5);X.lineTo(22,-25);X.quadraticCurveTo(22,-55,0,-58);X.stroke();
  // Taco crown
  X.fillStyle='#ffd700';
  X.beginPath();X.moveTo(-14,-68);X.lineTo(-16,-82);X.lineTo(-8,-74);X.lineTo(0,-86);X.lineTo(8,-74);X.lineTo(16,-82);X.lineTo(14,-68);X.closePath();X.fill();
  X.strokeStyle='#daa520';X.lineWidth=1.5;X.stroke();
  // Gems on crown
  X.fillStyle='#e94560';X.beginPath();X.arc(0,-76,3,0,Math.PI*2);X.fill();
  X.fillStyle='#00bfff';X.beginPath();X.arc(-8,-73,2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(8,-73,2,0,Math.PI*2);X.fill();
  // Taco on crown tip
  X.fillStyle='#d4a017';X.beginPath();X.ellipse(0,-90,8,5,0,0.3,Math.PI-0.3);X.fill();
  X.fillStyle='#4CAF50';X.beginPath();X.ellipse(0,-91,5,3,0,0,Math.PI*2);X.fill();
  // Head
  X.fillStyle='#ffcc99';X.beginPath();X.arc(0,-64,12,0,Math.PI*2);X.fill();
  // Hair (shorter, dark)
  X.fillStyle='#222';X.beginPath();X.arc(0,-68,13,Math.PI+0.1,-0.1);X.fill();
  // Sunglasses
  X.fillStyle='#111';X.beginPath();X.ellipse(-5,-65,5,4,0,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(5,-65,5,4,0,0,Math.PI*2);X.fill();
  X.strokeStyle='#333';X.lineWidth=2;X.beginPath();X.moveTo(0,-65);X.lineTo(0,-65);X.stroke();
  X.beginPath();X.moveTo(-10,-65);X.lineTo(-14,-64);X.stroke();X.beginPath();X.moveTo(10,-65);X.lineTo(14,-64);X.stroke();
  // Lens glare
  X.fillStyle='rgba(255,255,255,0.3)';X.beginPath();X.ellipse(-6,-66.5,2,1.5,-0.3,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(4,-66.5,2,1.5,-0.3,0,Math.PI*2);X.fill();
  // Smirk
  X.strokeStyle='#aa6644';X.lineWidth=1.5;X.beginPath();X.arc(2,-58,4,0,0.8);X.stroke();
  // Beard stubble
  X.fillStyle='rgba(50,50,50,0.15)';
  for(let i=0;i<8;i++){X.fillRect(-5+i*1.5,-55,1,3)}
  // Scepter
  if(pose!=='fight'){
    X.strokeStyle='#8B4513';X.lineWidth=4;X.beginPath();X.moveTo(20,-55);X.lineTo(24,-15);X.stroke();
    X.fillStyle='#ffd700';X.beginPath();X.arc(20,-58,5,0,Math.PI*2);X.fill();
    X.fillStyle='#d4a017';X.beginPath();X.ellipse(20,-61,6,3,0,0.3,Math.PI-0.3);X.fill();
  }
  // Arms
  X.strokeStyle='#ffcc99';X.lineWidth=5;X.lineCap='round';
  if(pose==='fight'){X.beginPath();X.moveTo(14,-42);X.lineTo(30,-46);X.stroke();X.fillStyle='#ffcc99';X.beginPath();X.arc(30,-46,5,0,Math.PI*2);X.fill();X.strokeStyle='#ffcc99';X.beginPath();X.moveTo(-14,-42);X.lineTo(-18,-30);X.stroke()}
  else if(pose==='command'){X.beginPath();X.moveTo(14,-42);X.lineTo(28,-50);X.stroke();X.beginPath();X.moveTo(-14,-42);X.lineTo(-25,-35);X.stroke()}
  else{X.beginPath();X.moveTo(14,-42);X.lineTo(18,-28);X.stroke();X.beginPath();X.moveTo(-14,-42);X.lineTo(-18,-28);X.stroke()}
  X.restore();
}

// ===== GAMES =====
const GAMES=[
  {title:"KUNG FU: NEW YORK",icon:"🥊",genre:"Beat 'em Up",col:"#ff6b9d",bg:['#0f1a3a','#1a2a5a','#0a0f2a'],
   desc:"Battle through Manhattan! h4tch sent ninja assassins!",
   init(){return{px:W/4,py:0,vy:0,face:1,hp:100,maxHp:100,pose:'idle',atkT:0,atk:'',enemies:[],spawnT:0,wave:1,kills:0,score:0,combo:0,comboT:0,scrollX:0,groundY:H-80,buildings:[]}},
   update(g){
     const p=g;const gy=p.groundY;
     if(p.buildings.length===0)for(let i=0;i<30;i++)p.buildings.push({x:i*80,h:60+Math.random()*180,w:55+Math.random()*30});
     if(p.atkT>0)p.atkT--;if(p.atkT<=0)p.pose='idle';
     if(p.comboT>0){p.comboT--;if(p.comboT<=0)p.combo=0}
     if(keys.ArrowLeft||keys.KeyA){p.px-=5;p.face=-1}
     if(keys.ArrowRight||keys.KeyD){p.px+=5;p.face=1}
     if((keys.ArrowUp||keys.KeyW)&&p.py>=gy){p.vy=-13;sfxJump()}
     if(keys.Space&&p.atkT<=0){p.pose='punch';p.atkT=14;p.atk='punch';keys.Space=false}
     if((keys.ShiftLeft||keys.ShiftRight)&&p.atkT<=0){p.pose='kick';p.atkT=16;p.atk='kick';keys.ShiftLeft=keys.ShiftRight=false}
     p.vy+=0.6;p.py+=p.vy;if(p.py>=gy){p.py=gy;p.vy=0}
     if(p.px>W*0.6)p.scrollX=p.px-W*0.6;p.px=Math.max(20,p.px);
     // Attack
     if(p.atkT===7){
       const reach=p.atk==='kick'?60:42,dmg=p.atk==='kick'?18+g.wave*2:12+g.wave;
       p.enemies.forEach(e=>{if(e.hp<=0)return;const dx=(e.x-(p.px-p.scrollX))*p.face;
         if(dx>0&&dx<reach&&Math.abs(e.y-p.py)<50){
           e.hp-=dmg;e.stun=18;e.vx=p.face*-7;e.vy=-4;
           addP(e.x,e.y-30,p.atk==='kick'?'#ffb6d9':'#ffff00',12);sfxHit();
           p.combo++;p.comboT=90;const pts=10*Math.min(p.combo,6);p.score+=pts;score=pts+p.score;
           addF(e.x,e.y-75,`-${dmg}`,'#ff4444');
           if(p.combo>1)addF(e.x+25,e.y-90,`${p.combo}x`,'#ffdd00');
           if(e.hp<=0){p.kills++;p.score+=50;addF(e.x,e.y-55,'KO!','#ff6b9d');addP(e.x,e.y-30,'#e94560',20);sfxScore()}
         }});
     }
     // Spawn
     p.spawnT--;const alive=p.enemies.filter(e=>e.hp>0).length;
     if(p.spawnT<=0&&alive<3+Math.min(p.wave,8)){
       const side=Math.random()>0.5?1:-1;
       const ex=side>0?p.px-p.scrollX+W*0.6+50:p.px-p.scrollX-50;
       const types=['thug','ninja','brute'];
       const tp=types[Math.floor(Math.random()*Math.min(types.length,1+Math.floor(p.wave/2)))];
       p.enemies.push({x:ex,y:gy,hp:25+p.wave*10,maxHp:25+p.wave*10,vx:0,vy:0,stun:0,face:-side,type:tp,atkT:0});
       p.spawnT=Math.max(20,55-p.wave*3);
     }
     if(p.kills>=5+p.wave*4){p.wave++;p.kills=0;p.hp=Math.min(p.maxHp,p.hp+25);addF(W/2,H/2-50,`WAVE ${p.wave}!`,'#ffdd00');sfxWin()}
     p.enemies.forEach(e=>{
       if(e.hp<=0)return;
       if(e.stun>0){e.stun--;e.vy+=0.6;e.x+=e.vx;e.y+=e.vy;e.vx*=0.88;if(e.y>=gy)e.y=gy;return}
       const dist=Math.abs(e.x-(p.px-p.scrollX));
       e.face=(p.px-p.scrollX)>e.x?1:-1;
       if(dist>65)e.vx=e.face*(e.type==='ninja'?2.5:e.type==='brute'?1.2:1.8);
       else e.vx*=0.85;
       e.x+=e.vx;e.x=Math.max(-50,Math.min(W+50,e.x));
       if(e.y>=gy)e.y=gy;
       if(dist<55&&e.atkT<=0){e.atkT=40}
       if(e.atkT>0){e.atkT--;if(e.atkT===20&&dist<60){const dmg=e.type==='brute'?12:e.type==='ninja'?8:6;
         if(p.hp>0){p.hp-=dmg;addF(p.px,p.py-75,`-${dmg}`,'#ff0000');addP(p.px,p.py-30,'#ff0000',6);sfxHurt()}}}
     });
     p.enemies=p.enemies.filter(e=>e.hp>0||e.stun>-30);
     score=p.score;if(p.hp<=0){state='over'}
   },
   draw(ctx,g){
     const gy=g.groundY;
     // Sky
     const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#0a0f2a');sky.addColorStop(0.5,'#1a2a5a');sky.addColorStop(1,'#0f1a3a');ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
     // Moon
     ctx.fillStyle='#ffd70022';ctx.beginPath();ctx.arc(W*0.85,H*0.12,50,0,Math.PI*2);ctx.fill();
     ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(W*0.85,H*0.12,18,0,Math.PI*2);ctx.fill();
     // Stars
     for(let i=0;i<25;i++){ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(t*0.03+i)*0.2})`;ctx.fillRect((i*137+50)%W,(i*89+20)%(gy-50),1.5,1.5)}
     // Buildings

   },
   draw(ctx,g){
     ctx.fillStyle='#001a00';ctx.fillRect(0,0,W,H);
     ctx.strokeStyle='#00ff4108';for(let i=0;i<W;i+=35){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke()}for(let i=0;i<H;i+=35){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke()}
     ctx.strokeStyle='#00ff41';ctx.lineWidth=1;ctx.beginPath();ctx.arc(mouseX,mouseY,12,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(mouseX-16,mouseY);ctx.lineTo(mouseX-6,mouseY);ctx.moveTo(mouseX+6,mouseY);ctx.lineTo(mouseX+16,mouseY);ctx.moveTo(mouseX,mouseY-16);ctx.lineTo(mouseX,mouseY-6);ctx.moveTo(mouseX,mouseY+6);ctx.lineTo(mouseX,mouseY+16);ctx.stroke();
     drawMinran(g.px,g.py,1.8,mouseX>g.px?1:-1,'shoot');
     g.bullets.forEach(b=>{ctx.fillStyle='#00ff41';ctx.shadowColor='#00ff41';ctx.shadowBlur=6;ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0});
     g.bugs.forEach(bug=>{ctx.fillStyle='#2a4a2a';ctx.beginPath();ctx.ellipse(bug.x,bug.y,bug.sz,bug.sz*0.7,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a3a1a';ctx.beginPath();ctx.arc(bug.x+bug.sz*0.5,bug.y,bug.sz*0.4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#00ff41';ctx.beginPath();ctx.arc(bug.x+bug.sz*0.6,bug.y-1.5,1.5,0,Math.PI*2);ctx.fill();for(let l=0;l<3;l++){ctx.strokeStyle='#1a3a1a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(bug.x-bug.sz*0.4+l*bug.sz*0.3,bug.y-bug.sz*0.5);ctx.lineTo(bug.x-bug.sz-l*2,bug.y-bug.sz);ctx.stroke();ctx.beginPath();ctx.moveTo(bug.x-bug.sz*0.4+l*bug.sz*0.3,bug.y+bug.sz*0.5);ctx.lineTo(bug.x-bug.sz-l*2,bug.y+bug.sz);ctx.stroke()}});
     ctx.fillStyle='#00ff41';ctx.font='13px sans-serif';ctx.fillText(`Wave ${g.wave} | Kills ${g.kills}/${4+g.wave*3}`,15,26);
   },
   controls:"WASD: Move | Mouse: Aim | Click: Shoot"},
  {title:"ROOFTOP RUMBLE",icon:"💥",genre:"Fighting",col:"#e94560",bg:['#050510','#1a1030','#050510'],
   desc:"Best of 3 rounds! h4tch is the final boss!",
   init(){return{px:W*0.3,py:0,ex:W*0.7,ey:0,php:100,ehp:100,pvy:0,evy:0,pface:1,patk:0,eatk:0,ppose:'idle',epose:'idle',round:1,pw:0,ew:0,rt:60*3,aiT:0,aiAct:'idle',isH4tch:false}},
   update(g){
     const gy=H-80;
     const isFinal=g.round===3&&!g.isH4tch;
     if(g.patk>0)g.patk--;if(g.patk<=0)g.ppose='idle';
     if(g.eatk>0)g.eatk--;else g.epose='idle';
     if(keys.ArrowLeft||keys.KeyA){g.px=Math.max(25,g.px-5);g.pface=-1}
     if(keys.ArrowRight||keys.KeyD){g.px=Math.min(W-25,g.px+5);g.pface=1}
     if((keys.ArrowUp||keys.KeyW)&&g.py>=gy){g.pvy=-13;sfxJump()}
     if(keys.Space&&g.patk<=0){g.ppose='punch';g.patk=14;keys.Space=false}
     if((keys.ShiftLeft||keys.ShiftRight)&&g.patk<=0){g.ppose='kick';g.patk=16;keys.ShiftLeft=keys.ShiftRight=false}
     g.pvy+=0.6;g.py+=g.pvy;if(g.py>=gy){g.py=gy;g.pvy=0}
     // Enemy AI
     g.aiT--;if(g.aiT<=0){const d=Math.abs(g.px-g.ex),r=Math.random();
       if(d>80)g.aiAct='approach';
       else if(isFinal){
         if(r<0.25)g.aiAct='punch';else if(r<0.45)g.aiAct='kick';else if(r<0.6){g.aiAct='jump';g.evy=-13}else if(r<0.75)g.aiAct='taco';else if(r<0.88)g.aiAct='retreat';else g.aiAct='block';
       }else{if(r<0.35)g.aiAct='punch';else if(r<0.55)g.aiAct='kick';else if(r<0.7){g.aiAct='jump';g.evy=-12}else if(r<0.85)g.aiAct='retreat';else g.aiAct='block'}
       g.aiT=15+Math.random()*20}
     if(g.aiAct==='approach')g.ex+=(g.px>g.ex?2.8:-2.8);
     else if(g.aiAct==='retreat')g.ex-=(g.px>g.ex?2.2:-2.2);
     else if(g.aiAct==='punch'&&g.eatk<=0){g.epose='punch';g.eatk=14}
     else if(g.aiAct==='kick'&&g.eatk<=0){g.epose='kick';g.eatk=16}
     else if(g.aiAct==='taco'&&g.eatk<=0){g.epose='punch';g.eatk=20}// taco throw anim reuse
     g.evy+=0.6;g.ex+=0;g.ey+=g.evy;if(g.ey>=gy){g.ey=gy;g.evy=0}
     g.ex=Math.max(25,Math.min(W-25,g.ex));
     // Player hit enemy
     if(g.patk===7){const reach=g.ppose==='kick'?55:40,dmg=g.ppose==='kick'?14:9;const dx=(g.ex-g.px)*g.pface;
       if(dx>0&&dx<reach&&Math.abs(g.py-g.ey)<50&&g.aiAct!=='block'){g.ehp-=dmg;addP(g.ex,g.ey-30,'#ffdd00',8);addF(g.ex,g.ey-55,`-${dmg}`,'#ffdd00');sfxHit()}
       else if(dx>0&&dx<reach){addP(g.ex,g.ey-30,'#8888ff',5);addF(g.ex,g.ey-55,'BLOCK','#8888ff');sfx(250,0.08)}}
     // Enemy hit player (taco projectile for h4tch)
     if(g.aiAct==='taco'&&g.eatk===10){g.php-=10;addP(g.px,g.py,'#ff8c00',8);addF(g.px,g.py-55,'-10','#f00');sfxHurt()}
     else if(g.eatk===7&&g.aiAct!=='taco'){const dx2=(g.px-g.ex)*(g.px>g.ex?1:-1);if(Math.abs(g.px-g.ex)<45&&Math.abs(g.py-g.ey)<50&&dx2>0){g.php-=7;addP(g.px,g.py,'#f44',8);addF(g.px,g.py-55,'-7','#f00');sfxHurt()}}
     if(g.ehp<=0){g.pw++;addF(W/2,H/2-60,`Round ${g.round} - MINRAN WINS!`,'#ff6b9d');sfxWin();g.round++;if(g.pw>=2||g.round>3){state='win'}else this.resetRound(g)}
     if(g.php<=0){g.ew++;addF(W/2,H/2-60,`Round ${g.round} - OPPONENT WINS!`,'#e94560');sfxHurt();g.round++;if(g.ew>=2||g.round>3){state='over'}else this.resetRound(g)}
     if(g.rt>0)g.rt--;else{if(g.php>=g.ehp){g.pw++;addF(W/2,H/2-60,'TIME! MINRAN!','#ff6b9d')}else{g.ew++;addF(W/2,H/2-60,'TIME! OPPONENT!','#e94560')}g.round++;if(g.pw>=2||g.ew>=2||g.round>3){state=g.pw>=2?'win':'over'}else this.resetRound(g)}
     score=g.pw*100+g.php;
   },
   resetRound(g){g.px=W*0.3;g.py=0;g.ex=W*0.7;g.ey=0;g.php=100;g.ehp=100;g.pvy=0;g.evy=0;g.patk=0;g.eatk=0;g.ppose='idle';g.epose='idle';g.rt=60*3;g.aiT=0;if(g.round===3)g.isH4tch=true},
   draw(ctx,g){
     const gy=H-80;
     ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
     // Rooftop
     ctx.fillStyle='#222';ctx.fillRect(0,gy,W,H-gy);ctx.fillStyle='#444';ctx.fillRect(0,gy,W,3);
     ctx.fillStyle='#0a0a15';for(let i=0;i<8;i++)ctx.fillRect(i*W/8+10,gy+15,W/8-20,H-gy-30);
     // City lights
     for(let i=0;i<15;i++){ctx.fillStyle=`hsl(${30+Math.random()*30},100%,70%,${0.1+Math.random()*0.15})`;ctx.fillRect(Math.random()*W,gy+20+Math.random()*(H-gy-30),4,4)}
     // HP bars
     ctx.fillStyle='#222';ctx.fillRect(40,15,280,18);ctx.fillStyle='#ff6b9d';ctx.fillRect(40,15,280*(g.php/100),18);ctx.strokeStyle='#fff2';ctx.strokeRect(40,15,280,18);
     ctx.fillStyle='#222';ctx.fillRect(W-320,15,280,18);ctx.fillStyle='#e94560';ctx.fillRect(W-320,15,280*(g.ehp/100),18);ctx.strokeRect(W-320,15,280,18);
     ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.fillText('MINRAN',45,29);ctx.textAlign='right';ctx.fillText(g.isH4tch?'KING h4tch':'OPPONENT',W-45,29);ctx.textAlign='center';
     ctx.fillStyle='#ffdd00';ctx.font='bold 14px sans-serif';ctx.fillText(`Round ${Math.min(g.round,3)} | ${g.pw}-${g.ew} | ${Math.ceil(g.rt/60)}s`,W/2,50);
     // Fighters
     drawMinran(g.px,g.py,2.2,g.pface,g.ppose);
     if(g.isH4tch){drawH4tch(g.ex,g.ey,2.5,g.px>g.ex?-1:1,g.eatk>10?'fight':'command');
       // h4tch taco throw effect
       if(g.aiAct==='taco'&&g.eatk>5&&g.eatk<18){const prog=(20-g.eatk)/10;const tx=g.ex+(g.px-g.ex)*prog;const ty=g.ey-40+Math.sin(prog*Math.PI)*-30;
         ctx.save();ctx.translate(tx,ty);ctx.rotate(t*0.3);ctx.fillStyle='#d4a017';ctx.beginPath();ctx.ellipse(0,0,12,7,0,0.3,Math.PI-0.3);ctx.fill();ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.ellipse(0,-2,8,4,0,0,Math.PI*2);ctx.fill();ctx.restore()}}
     else{ctx.save();ctx.translate(g.ex,g.ey);ctx.scale(g.px>g.ex?-1:1,1);
       ctx.fillStyle='#e94560';ctx.beginPath();ctx.moveTo(-12,0);ctx.lineTo(-15,-35);ctx.quadraticCurveTo(-15,-48,0,-50);ctx.quadraticCurveTo(15,-48,15,-35);ctx.lineTo(12,0);ctx.closePath();ctx.fill();
       ctx.fillStyle='#ffcc99';ctx.beginPath();ctx.arc(0,-56,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(-3,-59,6,3);ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(-3,-57,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3,-57,1.5,0,Math.PI*2);ctx.fill();
       ctx.strokeStyle='#ffcc99';ctx.lineWidth=4;ctx.lineCap='round';
       if(g.epose==='punch'){ctx.beginPath();ctx.moveTo(12,-38);ctx.lineTo(28,-42);ctx.stroke();ctx.beginPath();ctx.moveTo(-12,-38);ctx.lineTo(-16,-28);ctx.stroke()}
       else if(g.epose==='kick'){ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(8,-10);ctx.lineTo(28,-13);ctx.stroke();ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-12,-38);ctx.lineTo(-16,-46);ctx.stroke()}
       else{ctx.beginPath();ctx.moveTo(12,-38);ctx.lineTo(16,-26);ctx.stroke();ctx.beginPath();ctx.moveTo(-12,-38);ctx.lineTo(-16,-26);ctx.stroke()}
       ctx.restore()}
     if(g.isH4tch){ctx.fillStyle='#ffd700';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('👑 FINAL BOSS: KING h4tch 👑',W/2,H-15);ctx.textAlign='left'}
   },
   controls:"← → Move | ↑ Jump | SPACE Punch | SHIFT Kick | h4tch is Round 3 boss!"}
];

function hpPct(phase){return phase===1?'#4CAF50':phase===2?'#ff8c00':'#e94560'}

// ===== MENU =====
let hover=-1;
function drawMenu(){
  X.fillStyle='#050510';X.fillRect(0,0,W,H);
  for(let i=0;i<40;i++){X.fillStyle=`rgba(255,107,157,${0.015+Math.sin(t*0.015+i)*0.015})`;X.beginPath();X.arc((i*137+t*0.15)%W,(i*97+t*0.1)%H,1.5+Math.sin(i)*1.5,0,Math.PI*2);X.fill()}
  // Title
  X.save();X.shadowColor='#ff6b9d';X.shadowBlur=25;X.fillStyle='#ff6b9d';X.font='bold 32px sans-serif';X.textAlign='center';
  X.fillText('🐰 MINRAN GAME COLLECTION 🐰',W/2,42);X.shadowBlur=0;
  X.fillStyle='#ffd700';X.font='bold 16px sans-serif';X.fillText('Featuring h4tch — King of Taco Kingdom 👑',W/2,68);
  X.restore();
  // Grid
  const cols=5,rows=2,cw=Math.min(145,(W-40)/cols),ch=Math.min(210,(H-160)/rows),gap=10;
  const sx=(W-(cols*cw+(cols-1)*gap))/2,sy=90;
  hover=-1;
  GAMES.forEach((g,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    const cx=sx+col*(cw+gap),cy=sy+row*(ch+gap);
    const hov=mouseX>cx&&mouseX<cx+cw&&mouseY>cy&&mouseY<cy+ch;
    if(hov)hover=i;
    X.fillStyle=hov?'#1a1a3a':'#0d0d20';X.strokeStyle=hov?g.col:'#222';X.lineWidth=hov?2:1;
    X.beginPath();X.roundRect(cx,cy,cw,ch,10);X.fill();X.stroke();
    // Glow
    if(hov){X.fillStyle=g.col+'15';X.beginPath();X.roundRect(cx,cy,cw,ch,10);X.fill()}
    // Icon
    X.fillStyle=g.col+'30';X.beginPath();X.arc(cx+cw/2,cy+40,24,0,Math.PI*2);X.fill();
    X.fillStyle=g.col;X.font='20px sans-serif';X.textAlign='center';X.fillText(g.icon,cx+cw/2,cy+47);
    // Title
    X.fillStyle=hov?'#fff':'#bbb';X.font='bold 10px sans-serif';
    const words=g.title.split(': ');if(words.length>1){X.fillText(words[0]+':',cx+cw/2,cy+78);X.fillText(words[1],cx+cw/2,cy+91)}else X.fillText(g.title,cx+cw/2,cy+85);
    X.fillStyle='#777';X.font='9px sans-serif';X.fillText(g.genre,cx+cw/2,cy+106);
    const hs=hiScores[g.title]||0;if(hs>0){X.fillStyle='#ffdd00';X.font='9px sans-serif';X.fillText(`★ ${hs}`,cx+cw/2,cy+122)}
    // h4tch badge for relevant games
    if([1,6,9].includes(i)){X.fillStyle='#ffd700';X.font='9px sans-serif';X.fillText('👑 h4tch',cx+cw/2,cy+ch-12)}
    if(hov){X.fillStyle='#fff8';X.font='9px sans-serif';X.fillText('PLAY ▶',cx+cw/2,cy+ch-25)}
  });
  X.textAlign='left';
  drawMinran(W*0.35,H-30,2,1,'idle');
  drawH4tch(W*0.65,H-30,2,-1,'command');
}

function toMenu(){state='menu';curGame=null;parts=[];floats=[];document.getElementById('backBtn').style.display='none';document.getElementById('info').style.display='none'}
function startGame(i){curGame=i;GAMES[i].gs=GAMES[i].init();state='play';parts=[];floats=[];score=0;document.getElementById('backBtn').style.display='block';document.getElementById('info').style.display='block';document.getElementById('info').textContent=GAMES[i].controls}

C.addEventListener('click',()=>{
  if(state==='menu'&&hover>=0)startGame(hover);
  else if(state==='over'||state==='win'){
    if(curGame!==null){const ti=GAMES[curGame].title;if(!hiScores[ti]||score>hiScores[ti])hiScores[ti]=score}
    toMenu()}
  clicked=false;
});

function drawOverlay(title,col){
  X.fillStyle='rgba(0,0,0,0.75)';X.fillRect(0,0,W,H);
  X.save();X.shadowColor=col;X.shadowBlur=25;X.fillStyle=col;X.font='bold 44px sans-serif';X.textAlign='center';X.fillText(title,W/2,H/2-35);X.shadowBlur=0;
  X.fillStyle='#fff';X.font='22px sans-serif';X.fillText(`Score: ${score}`,W/2,H/2+10);
  X.fillStyle='#888';X.font='14px sans-serif';X.fillText('Click to return to menu',W/2,H/2+45);X.textAlign='left';
}

// ===== LOOP =====
function loop(){
  t++;X.clearRect(0,0,W,H);
  if(state==='menu'){drawMenu()}
  else if(state==='play'){
    const g=GAMES[curGame];g.update(g.gs);updParts();g.draw(X,g.gs);drwParts();
    X.fillStyle='#fff';X.font='bold 13px sans-serif';X.fillText(`Score: ${score}`,W-130,22);
  }else if(state==='over'){GAMES[curGame].draw(X,GAMES[curGame].gs);drwParts();drawOverlay('GAME OVER','#e94560')}
  else if(state==='win'){GAMES[curGame].draw(X,GAMES[curGame].gs);drwParts();drawOverlay('🏆 VICTORY! 🏆','#ffd700')}
  clicked=false;requestAnimationFrame(loop);
}
loop();
</script>
