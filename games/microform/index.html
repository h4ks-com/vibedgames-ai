<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Win</title>
<style>html,body{height:100%;margin:0;font-family:sans-serif;background:#6b8ebd}#desk{position:relative;height:100%}.win{position:absolute;background:#c0c0c0;border:2px solid #404;width:340px;height:220px;min-width:200px;min-height:120px;box-sizing:border-box}.t{height:26;background:linear-gradient(#00f,#006);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 6px;cursor:grab}.m{display:flex;gap:4px;padding:4px;background:#e0e0e0;border-bottom:2px solid #404}.menu{position:relative;padding:2px 8px;background:#e8e8e8;border:1px solid #808;cursor:pointer}.dd{position:absolute;left:0;top:100%;background:#fff;border:2px solid #404;display:none;min-width:110px;z-index:9}.it{padding:4px 10px;cursor:pointer}.it:hover{background:#06f;color:#fff}.c{padding:8px;box-sizing:border-box;height:calc(100% - 26px - 36px);overflow:auto}.r{width:12px;height:12px;position:absolute;right:2px;bottom:2px;cursor:se-resize;background:#cfc;border:1px solid #404}</style>
</head><body><div id=desk></div><script>
(()=>{let z=100,i=1;const desk=document.getElementById('desk');
window.createFormWindow=(x=60,y=60,t='Untitled')=>{const id='w'+(i++),w=document.createElement('div');w.className='win';w.id=id;w.style.left=x+'px';w.style.top=y+'px';w.style.zIndex=++z;
w.innerHTML=`<div class=t><span>${t}</span><span style="cursor:pointer" class=xc>X</span></div>
<div class=m>
<div class=menu>File<div class=dd><div class=it data-a=new>New</div><div class=it data-a=save>Save</div><div class=it data-a=close>Close</div></div></div>
<div class=menu>Edit<div class=dd><div class=it data-a=undo>Undo</div><div class=it data-a=clear>Clear</div><div class=it data-a=dup>Duplicate</div></div></div>
<div class=menu>About<div class=dd><div class=it data-a=about>About</div></div></div>
</div>
<div class=c><form><label>Name</label><input name=name><label>Email</label><input name=email><label>Details</label><textarea name=details style="width:100%"></textarea><div style="margin-top:8px"><button type=button class=ok>Submit</button><button type=button class=cl>Cancel</button></div></form></div><div class=r></div>`;
desk.appendChild(w);
const tbar=w.querySelector('.t');tbar.addEventListener('mousedown',startDrag);
function startDrag(e){e.preventDefault();bring(w);let ox=e.clientX-w.offsetLeft,oy=e.clientY-w.offsetTop;function m(ev){w.style.left=(ev.clientX-ox)+'px';w.style.top=(ev.clientY-oy)+'px'}function u(){window.removeEventListener('mousemove',m);window.removeEventListener('mouseup',u)}window.addEventListener('mousemove',m);window.addEventListener('mouseup',u)}
function bring(el){el.style.zIndex=++z}
w.addEventListener('mousedown',()=>bring(w));
w.querySelector('.xc').onclick=()=>w.remove();
w.querySelector('.ok').onclick=()=>{console.log(Object.fromEntries(new FormData(w.querySelector('form'))));flash('Saved')};
w.querySelector('.cl').onclick=()=>{w.querySelector('form').reset();flash('Cleared')};
function flash(s){const b=document.createElement('div');b.textContent=s;Object.assign(b.style,{position:'absolute',right:6,top:30,background:'#006',color:'#fff',padding:'4px',zIndex:9999});w.appendChild(b);setTimeout(()=>b.remove(),1200)}
// resize
const rh=w.querySelector('.r');rh.addEventListener('mousedown',startR);
function startR(e){e.preventDefault();bring(w);let sx=e.clientX,sy=e.clientY,sw=w.offsetWidth,sh=w.offsetHeight;function m(ev){w.style.width=Math.max(200,sw+(ev.clientX-sx))+'px';w.style.height=Math.max(120,sh+(ev.clientY-sy))+'px'}function u(){window.removeEventListener('mousemove',m);window.removeEventListener('mouseup',u)}window.addEventListener('mousemove',m);window.addEventListener('mouseup',u)}
// menus
w.querySelectorAll('.menu').forEach(m=>m.addEventListener('click',e=>{e.stopPropagation();const d=m.querySelector('.dd');w.querySelectorAll('.dd').forEach(x=>x!==d&&(x.style.display='none'));d.style.display=d.style.display==='block'?'none':'block';bring(w)}));
w.querySelectorAll('.it').forEach(it=>it.addEventListener('click',e=>{e.stopPropagation();const a=it.dataset.a;w.querySelectorAll('.dd').forEach(d=>d.style.display='none');if(a==='new')createFormWindow(w.offsetLeft+30,w.offsetTop+30);if(a==='save'){console.log(Object.fromEntries(new FormData(w.querySelector('form'))));flash('Saved')}if(a==='close')w.remove();if(a==='undo')flash('Undo');if(a==='clear'){w.querySelector('form').reset();flash('Cleared')}if(a==='dup'){const nw=createFormWindow(w.offsetLeft+20,w.offsetTop+20,w.querySelector('.t span').textContent);const fd=new FormData(w.querySelector('form'));for(const [k,v] of fd) nw.querySelector('[name=\"'+k+'\"]').value=v}if(a==='about')alert('About '+w.id)}));
document.addEventListener('click',()=>document.querySelectorAll('.dd').forEach(d=>d.style.display='none'));
return w;
};
createFormWindow(80,80,'Contact');createFormWindow(200,140,'Feedback');
})();
</script></body></html>
