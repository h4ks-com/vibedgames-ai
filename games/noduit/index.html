<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mattf's Liefdesavontuur in Duitsland 💕🇩🇪</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; font-family:'Nunito',sans-serif; overflow:hidden; height:100vh; }
#game { width:100vw; height:100vh; position:relative; }

/* TITLE SCREEN */
#title-screen { position:absolute; inset:0; background:linear-gradient(135deg,#0f0c29,#302b63,#24243e); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; transition:opacity 1s; }
#title-screen h1 { font-family:'Press Start 2P',monospace; font-size:28px; color:#ff6b9d; text-shadow:0 0 20px #ff6b9d; margin-bottom:10px; text-align:center; line-height:1.6; }
#title-screen h2 { color:#c44569; font-size:16px; margin-bottom:40px; }
#title-screen .lang-badges { display:flex; gap:10px; margin-bottom:40px; }
.lang-badge { padding:8px 16px; border-radius:20px; font-size:14px; font-weight:700; }
.lang-badge.nl { background:#ff6348; color:#fff; }
.lang-badge.de { background:#ffd32a; color:#333; }
.lang-badge.pt { background:#0be881; color:#333; }
.lang-badge.zh { background:#e056fd; color:#fff; }
#start-btn { font-family:'Press Start 2P',monospace; font-size:18px; padding:20px 50px; background:linear-gradient(45deg,#ff6b9d,#c44569); color:#fff; border:none; border-radius:50px; cursor:pointer; box-shadow:0 0 30px rgba(255,107,157,0.5); transition:all 0.3s; }
#start-btn:hover { transform:scale(1.1); box-shadow:0 0 50px rgba(255,107,157,0.8); }
.hearts { position:absolute; font-size:30px; animation:float 3s ease-in-out infinite; opacity:0.3; }
@keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-30px) rotate(15deg)} }

/* GAME SCREEN */
#game-screen { display:none; position:absolute; inset:0; }
#scene-bg { position:absolute; inset:0; transition:background 1s; }
.city { background:linear-gradient(180deg,#2c3e50 0%,#3498db 30%,#95a5a6 70%,#2ecc71 70%,#27ae60 100%); }
.park { background:linear-gradient(180deg,#74b9ff 0%,#a29bfe 30%,#55efc4 60%,#00b894 100%); }
.restaurant { background:linear-gradient(180deg,#2d3436 0%,#636e72 40%,#dfe6e9 60%,#b2bec3 100%); }
.cafe { background:linear-gradient(180deg,#fdcb6e 0%,#f39c12 30%,#e17055 60%,#d63031 100%); }
.castle { background:linear-gradient(180deg,#6c5ce7 0%,#a29bfe 30%,#dfe6e9 60%,#b2bec3 100%); }
.bridge { background:linear-gradient(180deg,#fd79a8 0%,#e84393 20%,#74b9ff 50%,#0984e3 100%); }
.sunset { background:linear-gradient(180deg,#e17055 0%,#fdcb6e 30%,#fab1a0 50%,#ff7675 100%); }

#player { position:absolute; bottom:25%; left:50%; transform:translateX(-50%); z-index:10; transition:all 0.5s; font-size:60px; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
#npc { position:absolute; bottom:25%; right:20%; z-index:10; font-size:60px; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5)); transition:all 0.5s; }

#dialogue-box { position:absolute; bottom:5%; left:5%; right:5%; background:rgba(0,0,0,0.85); border:3px solid #ff6b9d; border-radius:15px; padding:20px 25px; z-index:50; display:none; min-height:120px; }
#dialogue-box .speaker { font-weight:700; font-size:16px; margin-bottom:8px; }
#dialogue-box .speaker.mattf { color:#74b9ff; }
#dialogue-box .speaker.npc { color:#ff6b9d; }
#dialogue-box .speaker.narrator { color:#ffeaa7; font-style:italic; }
#dialogue-box .text { color:#dfe6e9; font-size:15px; line-height:1.6; }
#dialogue-box .lang-tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; margin-left:8px; vertical-align:middle; }
.lang-tag.nl { background:#ff6348; color:#fff; }
.lang-tag.de { background:#ffd32a; color:#333; }
.lang-tag.pt { background:#0be881; color:#333; }
.lang-tag.zh { background:#e056fd; color:#fff; }
#dialogue-box .translation { color:#636e72; font-size:13px; font-style:italic; margin-top:6px; }

#choices { position:absolute; bottom:35%; left:5%; right:5%; z-index:50; display:none; }
.choice-btn { display:block; width:100%; padding:15px 20px; margin:8px 0; background:rgba(255,107,157,0.2); border:2px solid #ff6b9d; border-radius:12px; color:#fff; font-size:15px; font-family:'Nunito',sans-serif; cursor:pointer; text-align:left; transition:all 0.3s; }
.choice-btn:hover { background:rgba(255,107,157,0.5); transform:translateX(10px); }

#hud { position:absolute; top:10px; left:10px; right:10px; z-index:50; display:none; }
#hud .location { background:rgba(0,0,0,0.7); color:#ffeaa7; padding:8px 16px; border-radius:20px; font-size:14px; display:inline-block; }
#hud .chapter { float:right; background:rgba(0,0,0,0.7); color:#ff6b9d; padding:8px 16px; border-radius:20px; font-size:14px; }
#hearts-hud { position:absolute; top:50px; left:15px; font-size:24px; z-index:50; display:none; }
#minimap { position:absolute; top:15px; right:15px; background:rgba(0,0,0,0.7); padding:10px; border-radius:10px; z-index:50; display:none; }
#minimap .dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin:2px; }
#minimap .dot.active { background:#ff6b9d; box-shadow:0 0 8px #ff6b9d; }
#minimap .dot.done { background:#00b894; }
#minimap .dot.locked { background:#636e72; }

#next-btn { position:absolute; bottom:8px; right:15px; background:#ff6b9d; color:#fff; border:none; padding:8px 20px; border-radius:20px; cursor:pointer; font-family:'Nunito',sans-serif; font-size:13px; display:none; z-index:55; }

/* PARTICLES */
.heart-particle { position:absolute; font-size:20px; animation:heartFloat 2s ease-out forwards; pointer-events:none; z-index:5; }
@keyframes heartFloat { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-100px) scale(0.3)} }

/* ENDING */
#ending { display:none; position:absolute; inset:0; background:rgba(0,0,0,0.95); z-index:200; flex-direction:column; align-items:center; justify-content:center; }
#ending h1 { font-family:'Press Start 2P',monospace; font-size:22px; color:#ff6b9d; text-align:center; line-height:1.8; margin-bottom:20px; }
#ending p { color:#dfe6e9; font-size:16px; text-align:center; max-width:600px; line-height:1.8; }
#ending .stats { margin:20px 0; display:flex; gap:20px; }
#ending .stat { background:rgba(255,107,157,0.2); padding:15px 25px; border-radius:15px; text-align:center; }
#ending .stat .val { font-size:28px; color:#ff6b9d; font-weight:700; }
#ending .stat .label { font-size:12px; color:#636e72; margin-top:5px; }
</style>
</head>
<body>
<div id="game">
  <!-- TITLE -->
  <div id="title-screen">
    <div class="hearts" style="top:10%;left:10%">❤️</div>
    <div class="hearts" style="top:20%;right:15%;animation-delay:1s">💕</div>
    <div class="hearts" style="bottom:20%;left:20%;animation-delay:0.5s">💗</div>
    <div class="hearts" style="bottom:30%;right:10%;animation-delay:1.5s">💖</div>
    <h1>Mattf's Liefdesavontuur<br>in Duitsland</h1>
    <h2>🇩🇪 Eine Liebesgeschichte 🇩🇪</h2>
    <div class="lang-badges">
      <span class="lang-badge nl">🇳🇱 Nederlands</span>
      <span class="lang-badge de">🇩🇪 Deutsch</span>
      <span class="lang-badge pt">🇧🇷 Português</span>
      <span class="lang-badge zh">🇨🇳 中文</span>
    </div>
    <button id="start-btn" onclick="startGame()">▶ SPELEN</button>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div id="scene-bg"></div>
    <div id="player">🧑‍💻</div>
    <div id="npc">👩</div>
    <div id="hud">
      <span class="location" id="location-name">📍 Berlijn</span>
      <span class="chapter" id="chapter-name">📖 Hoofdstuk 1</span>
    </div>
    <div id="hearts-hud">❤️❤️❤️❤️❤️</div>
    <div id="minimap" id="minimap"></div>
    <div id="dialogue-box">
      <div class="speaker" id="speaker-name"></div>
      <div class="text" id="dialogue-text"></div>
      <div class="translation" id="dialogue-translation"></div>
    </div>
    <div id="choices"></div>
    <button id="next-btn" onclick="advanceDialogue()">Volgende ▶</button>
  </div>

  <!-- ENDING -->
  <div id="ending">
    <h1 id="ending-title"></h1>
    <p id="ending-text"></p>
    <div class="stats">
      <div class="stat"><div class="val" id="stat-hearts">❤️ 5</div><div class="label">Liefdespunten</div></div>
      <div class="stat"><div class="val" id="stat-langs">4</div><div class="label">Talen gesproken</div></div>
      <div class="stat"><div class="val" id="stat-places">6</div><div class="label">Plaatsen bezocht</div></div>
    </div>
  </div>
</div>

<script>
let hearts = 5;
let scene = 0;
let dialogueIndex = 0;
let currentScene = [];
let scenes = [];
let langsSpoken = new Set();
let placesVisited = new Set();

function startGame() {
  document.getElementById('title-screen').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('hearts-hud').style.display = 'block';
    document.getElementById('minimap').style.display = 'block';
    loadScene(0);
  }, 1000);
}

function updateHearts() {
  document.getElementById('hearts-hud').innerHTML = '❤️'.repeat(hearts) + '🖤'.repeat(5 - hearts);
}

function updateMinimap() {
  const mm = document.getElementById('minimap');
  const totalScenes = scenes.length;
  let html = '';
  for (let i = 0; i < totalScenes; i++) {
    let cls = i === scene ? 'active' : (i < scene ? 'done' : 'locked');
    html += `<span class="dot ${cls}" title="Scene ${i+1}"></span>`;
  }
  mm.innerHTML = html;
}

function setScene(bg, location, chapter, playerEmoji, npcEmoji) {
  const bgEl = document.getElementById('scene-bg');
  bgEl.className = bg;
  document.getElementById('location-name').textContent = '📍 ' + location;
  document.getElementById('chapter-name').textContent = '📖 ' + chapter;
  document.getElementById('player').textContent = playerEmoji;
  document.getElementById('npc').textContent = npcEmoji;
  placesVisited.add(location);
  spawnHearts();
}

function spawnHearts() {
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart-particle';
      h.textContent = ['❤️','💕','💗','💖','🌸'][Math.floor(Math.random()*5)];
      h.style.left = Math.random()*100 + '%';
      h.style.bottom = '30%';
      document.getElementById('game-screen').appendChild(h);
      setTimeout(() => h.remove(), 2000);
    }, i * 400);
  }
}

function showDialogue(speaker, text, lang, translation) {
  const box = document.getElementById('dialogue-box');
  box.style.display = 'block';
  const nameEl = document.getElementById('speaker-name');
  nameEl.textContent = speaker;
  nameEl.className = 'speaker ' + (speaker === 'Mattf' ? 'mattf' : speaker.includes('Verteller') ? 'narrator' : 'npc');
  
  let textHTML = text;
  if (lang) {
    textHTML += ` <span class="lang-tag ${lang}">${{nl:'NL',de:'DE',pt:'PT',zh:'ZH'}[lang]}</span>`;
    langsSpoken.add(lang);
  }
  document.getElementById('dialogue-text').innerHTML = textHTML;
  document.getElementById('dialogue-translation').textContent = translation ? '(' + translation + ')' : '';
  document.getElementById('next-btn').style.display = 'block';
}

function showChoices(choices) {
  const box = document.getElementById('choices');
  box.innerHTML = '';
  box.style.display = 'block';
  document.getElementById('next-btn').style.display = 'none';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = c.text;
    btn.onclick = () => {
      box.style.display = 'none';
      document.getElementById('dialogue-box').style.display = 'none';
      if (c.hearts) { hearts = Math.min(5, hearts + c.hearts); updateHearts(); }
      if (c.next !== undefined) loadScene(c.next);
      else if (c.action) c.action();
    };
    box.appendChild(btn);
  });
}

function loadScene(idx) {
  scene = idx;
  dialogueIndex = 0;
  updateMinimap();
  if (idx >= scenes.length) { showEnding(); return; }
  const s = scenes[idx];
  setScene(s.bg, s.location, s.chapter, s.player || '🧑‍💻', s.npc || '👩');
  if (s.intro) {
    showDialogue('🎭 Verteller', s.intro, null, null);
    document.getElementById('next-btn').onclick = () => {
      document.getElementById('dialogue-box').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      dialogueIndex = 0;
      playDialogue(s.dialogues);
    };
  } else {
    playDialogue(s.dialogues);
  }
}

function playDialogue(dialogues) {
  if (dialogueIndex >= dialogues.length) return;
  const d = dialogues[dialogueIndex];
  if (d.type === 'choice') {
    showChoices(d.choices);
    return;
  }
  showDialogue(d.speaker, d.text, d.lang, d.translation);
  document.getElementById('next-btn').onclick = () => advanceDialogue();
  document.getElementById('next-btn').style.display = 'block';
}

function advanceDialogue() {
  dialogueIndex++;
  if (scene >= scenes.length) { showEnding(); return; }
  const dialogues = scenes[scene].dialogues;
  if (dialogueIndex >= dialogues.length) {
    document.getElementById('dialogue-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    if (scene + 1 < scenes.length) loadScene(scene + 1);
    else showEnding();
    return;
  }
  playDialogue(dialogues);
}

function showEnding() {
  document.getElementById('game-screen').style.display = 'none';
  const end = document.getElementById('ending');
  end.style.display = 'flex';
  
  const isGoodEnding = hearts >= 4;
  document.getElementById('ending-title').textContent = isGoodEnding ? 
    '💕 Mattf heeft de ware liefde gevonden! 💕' : 
    '💔 Het avontuur gaat verder... 💔';
  document.getElementById('ending-text').textContent = isGoodEnding ?
    'Mattf ontdekte dat liefde geen grenzen kent. Door Duitsland, met woorden in vier talen, vond hij een connectie die verder gaat dan taal. 🌍❤️' :
    'Mattf leert nog steeds. Maar elk avontuur brengt hem dichter bij de liefde. Probeer opnieuw en maak betere keuzes! 🌟';
  
  document.getElementById('stat-hearts').textContent = '❤️ ' + hearts;
  document.getElementById('stat-langs').textContent = langsSpoken.size;
  document.getElementById('stat-places').textContent = placesVisited.size;
}

// ==================== STORY ====================
scenes = [
  // SCENE 0: Aankomst in Berlijn
  {
    bg: 'city', location: 'Berlijn Hauptbahnhof', chapter: 'Hoofdstuk 1: De Aankomst',
    player: '🧑‍💻', npc: '🚂',
    intro: 'Mattf stapt uit de trein op Berlijn Hauptbahnhof. De grote stad lonkt. Hij is hier voor werk, maar misschien vindt hij meer...',
    dialogues: [
      { speaker:'Mattf', text:'Wow, Berlijn is nog groter dan ik dacht!', lang:'nl', translation:'Wow, Berlin is even bigger than I thought!' },
      { speaker:'Mattf', text:'Ich muss zuerst ein Hotel finden...', lang:'de', translation:'I need to find a hotel first...' },
      { speaker:'🎭 Verteller', text:'Terwijl Mattf de stationshal doorloopt, valt zijn oog op een vrouw met een boek over kunstgeschiedenis.', lang:'nl', translation:'As Mattf walks through the station hall, his eye falls on a woman with a book about art history.' },
      { type:'choice', choices:[
        { text:'🌸 "Hallo, mooi boek! Ben je ook naar de kunstgalerie?" (Nederlands)', next:1, hearts:1 },
        { text:'🎨 "Entschuldigung, ist das ein Kunstbuch? Ich liebe Kunst!" (Duits)', next:1, hearts:1 },
        { text:'📱 Even kijken op Google Maps... (negeren)', next:2, hearts:-1 }
      ]}
    ]
  },
  // SCENE 1: De Ontmoeting - Kunstgalerie
  {
    bg: 'cafe', location: 'Gemäldegalerie Berlijn', chapter: 'Hoofdstuk 1: De Ontmoeting',
    player: '🧑‍💻', npc: '👩‍🎨',
    intro: 'De vrouw glimlacht en nodigt Mattf uit om samen de galerie te bezoeken.',
    dialogues: [
      { speaker:'👩‍🎨', text:'Hallo! Ik ben Elara. Ik woon hier in Berlijn. Jij bent Nederlands?', lang:'nl', translation:'Hello! I\'m Elara. I live here in Berlin. Are you Dutch?' },
      { speaker:'Mattf', text:'Ja! Ik ben Mattf. Ik ben hier voor werk, maar ik wil de stad ook verkennen.', lang:'nl', translation:'Yes! I\'m Mattf. I\'m here for work, but I want to explore the city too.' },
      { speaker:'Elara', text:'Das ist wunderbar! Berlin ist eine tolle Stadt für Kunst und Kultur.', lang:'de', translation:'That\'s wonderful! Berlin is a great city for art and culture.' },
      { speaker:'Mattf', text:'De schilderijen hier zijn prachtig. Wat is jouw favoriet?', lang:'nl', translation:'The paintings here are beautiful. What\'s your favorite?' },
      { speaker:'Elara', text:'Olá! Na verdade, eu sou meio portuguesa também! Adoro Vermeer!', lang:'pt', translation:'Hello! Actually, I\'m part Portuguese too! I love Vermeer!' },
      { speaker:'🎭 Verteller', text:'Mattf is verrast — Elara spreekt niet alleen Duits en Nederlands, maar ook Portugees!', lang:'nl', translation:'Mattf is surprised — Elara speaks not only German and Dutch, but also Portuguese!' },
      { type:'choice', choices:[
        { text:'🌹 "Você é incrível! Quero saber mais sobre você." (Portugees)', next:3, hearts:2 },
        { text:'☕ "Zullen we een koffie drinken en verder praten?" (Nederlands)', next:3, hearts:1 },
      ]}
    ]
  },
  // SCENE 2: Alleen in de stad
  {
    bg: 'city', location: 'Berlijn - Alexanderplatz', chapter: 'Hoofdstuk 1: Alleen',
    player: '🧑‍💻', npc: '🌃',
    intro: 'Mattf loopt alleen door Berlijn. Misschien had hij toch moeten praten met die vrouw...',
    dialogues: [
      { speaker:'Mattf', text:'Hmm, misschien was dat een fout. Ze leek erg aardig.', lang:'nl', translation:'Hmm, maybe that was a mistake. She seemed really nice.' },
      { speaker:'Mattf', text:'Ich fühle mich ein bisschen einsam in dieser großen Stadt...', lang:'de', translation:'I feel a bit lonely in this big city...' },
      { speaker:'🎭 Verteller', text:'Mattf besluit naar een café te gaan. Daar ziet hij een bekend gezicht...', lang:'nl', translation:'Mattf decides to go to a café. There he sees a familiar face...' },
      { type:'choice', choices:[
        { text:'😊 Naar het café gaan', next:3, hearts:0 },
      ]}
    ]
  },
  // SCENE 3: Koffie en Gesprekken
  {
    bg: 'cafe', location: 'Café Einstein - Berlijn', chapter: 'Hoofdstuk 2: De vonk',
    player: '🧑‍💻', npc: '👩‍🎨',
    intro: 'In het beroemde Café Einstein zitten Mattf en Elara samen. De koffie stoomt en de gesprekken vloeien.',
    dialogues: [
      { speaker:'Elara', text:'Ich habe in Porto studiert, bevor ich nach Berlin kam.', lang:'de', translation:'I studied in Porto before coming to Berlin.' },
      { speaker:'Mattf', text:'O que você estudou em Porto? Arquitetura?', lang:'pt', translation:'What did you study in Porto? Architecture?' },
      { speaker:'Elara', text:'Sim! E depois fiz mestrado em história da arte aqui em Berlim.', lang:'pt', translation:'Yes! And then I did a master\'s in art history here in Berlin.' },
      { speaker:'Mattf', text:'Dat is echt fascinerend! Ik werk in de IT, maar kunst heeft altijd mijn interesse gehad.', lang:'nl', translation:'That\'s really fascinating! I work in IT, but art has always interested me.' },
      { speaker:'Elara', text:'你知道吗？艺术和编程其实很相似。都是关于创造力的。', lang:'zh', translation:'Did you know? Art and programming are actually very similar. Both are about creativity.' },
      { speaker:'Mattf', text:'哇，你说中文？太厉害了！', lang:'zh', translation:'Wow, you speak Chinese? That\'s amazing!' },
      { speaker:'Elara', text:'Ik studeerde een jaar in Shanghai! 🇨🇳', lang:'nl', translation:'I studied for a year in Shanghai!' },
      { speaker:'🎭 Verteller', text:'Mattf is onder de indruk. Elara spreekt vier talen en heeft over de hele wereld gereisd. Dit is geen gewone vrouw...', lang:'nl', translation:'Mattf is impressed. Elara speaks four languages and has traveled the world. This is no ordinary woman...' },
      { type:'choice', choices:[
        { text:'🌹 "Zullen we morgen samen naar het park gaan? Ik wil je beter leren kennen."', next:4, hearts:2 },
        { text:'🌙 "Het is al laat... zullen we wat eten?"', next:4, hearts:1 },
      ]}
    ]
  },
  // SCENE 4: Romantisch Park
  {
    bg: 'park', location: 'Tiergarten - Berlijn', chapter: 'Hoofdstuk 2: Het Park',
    player: '🧑‍💻', npc: '👩‍🎨',
    intro: 'De volgende dag. Tiergarten is prachtig in het najaar. Mattf en Elara wandelen samen langs de bospaden.',
    dialogues: [
      { speaker:'Elara', text:'Die Bäume sind so schön im Herbst, findest du nicht?', lang:'de', translation:'The trees are so beautiful in autumn, don\'t you think?' },
      { speaker:'Mattf', text:'Ja, het is alsof de natuur zelf een schilderij maakt. Net als in de galerie gisteren.', lang:'nl', translation:'Yes, it\'s as if nature itself is making a painting. Just like in the gallery yesterday.' },
      { speaker:'Elara', text:'Tu es très romantique, Mattf... oh sorry, dat was Frans! 😄', lang:'nl', translation:'You are very romantic, Mattf... oh sorry, that was French!' },
      { speaker:'Mattf', text:'Haha! Vier talen is niet genoeg voor je, hè? 😄', lang:'nl', translation:'Haha! Four languages isn\'t enough for you, huh?' },
      { speaker:'Elara', text:'我们在一起很合得来，不是吗？', lang:'zh', translation:'We get along really well together, don\'t we?' },
      { speaker:'Mattf', text:'是的，我觉得我们之间有一种特别的连接。', lang:'zh', translation:'Yes, I feel a special connection between us.' },
