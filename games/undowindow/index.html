<!doctype html><html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><style>
body{margin:0;font-family:system-ui;background:#111;color:#eee}#bar{padding:8px;background:#0b0b0b;border-bottom:1px solid #222}button{padding:6px 8px;border-radius:6px;border:0;background:#222;color:#fff;cursor:pointer}#s{position:fixed;inset:40px;overflow:hidden}.w{position:absolute;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.6);min-width:180px;min-height:120px;resize:both;display:flex;flex-direction:column;overflow:hidden}.t{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 6px;cursor:grab}.c{padding:8px;overflow:auto}.b{width:28px;height:24px;border:0;background:rgba(255,255,255,.06);border-radius:6px}
.e{min-height:60px;outline:none;user-select:text}
</style><body><div id=bar><button id=n>New</button></div><div id=s></div><script>
(()=>{let s=document.getElementById('s'),n=document.getElementById('n'),z=100,i=0;
const F=['serif','sans-serif','monospace'];function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function h(){return' hsl('+rnd(0,359)+' '+rnd(40,80)+'% '+rnd(18,70)+'%)'}
function create(){
 i++;var w=document.createElement('div');w.className='w';w.style.width=rnd(220,420)+'px';w.style.height=rnd(140,380)+'px';
 var R=s.getBoundingClientRect();w.style.left=rnd(8,Math.max(8,R.width-200))+'px';w.style.top=rnd(8,Math.max(8,R.height-150))+'px';
 var bg=h(),t=h(),txt=h(),fg=h(),fs=rnd(12,20)+'px',ff=F[rnd(0,2)];w.style.background=bg;w.style.color=fg;w.style.fontFamily=ff;w.style.fontSize=fs;
 w.innerHTML='<div class=t style="background:'+t+';color:'+fg+'"><span>Win '+i+'</span><span><button class=b id=add>＋</button><button class=b id=cl>✕</button></span></div><div class=c style="background:'+txt+';color:'+fg+';font-size:'+fs+'"><div class=e contenteditable=true>Editable text '+i+'</div><div style="margin-top:8px"><button class=sp>Spawn</button> <button class=cc>Close</button> <button class=undo>Undo</button> <button class=redo>Redo</button></div></div>';
 w.style.zIndex=++z; s.appendChild(w);
 // undo stack per window
 const ed=w.querySelector('.e'),undo=[],MAX=80;let p=-1;
 function pushState(){
   const v=ed.innerHTML;
   if(undo[p]===v) return;
   undo.splice(p+1); undo.push(v); if(undo.length>MAX) undo.shift();
   p=undo.length-1;
 }
 pushState();
 ed.addEventListener('input',()=>pushState());
 function setState(idx){ if(idx<0||idx>=undo.length) return; p=idx; ed.innerHTML=undo[p]; placeCaretEnd(ed); }
 function undoFn(){ if(p>0) setState(p-1) }
 function redoFn(){ if(p<undo.length-1) setState(p+1) }
 function placeCaretEnd(el){el.focus(); var r=document.createRange(); r.selectNodeContents(el); r.collapse(false); var s=window.getSelection(); s.removeAllRanges(); s.addRange(r)}
 w.querySelector('.undo').addEventListener('click',undoFn);
 w.querySelector('.redo').addEventListener('click',redoFn);
 ed.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()=='z'){e.preventDefault();undoFn()} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()=='y'){e.preventDefault();redoFn()}});
 // drag
 var tb=w.querySelector('.t'),drag=false,ox=0,oy=0,pid=null;
 tb.addEventListener('pointerdown',function(e){ if(e.target.closest('button'))return; drag=true; pid=e.pointerId; var r=w.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top; tb.setPointerCapture&&tb.setPointerCapture(pid); w.style.zIndex=++z});
 tb.addEventListener('pointerup',function(e){ drag=false; tb.releasePointerCapture&&tb.releasePointerCapture(e.pointerId); pid=null});
 document.addEventListener('pointermove',function(e){ if(!drag||pid!=null&&e.pointerId!==pid) return; var R=s.getBoundingClientRect(),nx=e.clientX-ox-R.left,ny=e.clientY-oy-R.top; w.style.left=Math.max(-120,Math.min(nx,R.width-80))+'px'; w.style.top=Math.max(-120,Math.min(ny,R.height-40))+'px'});
 // controls
 w.querySelector('#cl').addEventListener('click',e=>{e.stopPropagation();w.remove()});
 w.querySelector('.cc').addEventListener('click',e=>{e.stopPropagation();w.remove()});
 w.querySelector('#add').addEventListener('click',e=>{e.stopPropagation();create()});
 w.querySelector('.sp').addEventListener('click',e=>{e.stopPropagation();create()});
}
n.addEventListener('click',create);create();create();
})();
</script></body></html>
