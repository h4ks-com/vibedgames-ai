<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slopify - Suno Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
        .container { max-width: 100%; margin: 0 auto; padding: 0 15px; }
        .header {
            background: #1a1a1a; padding: 15px 0; border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .share-btn {
            background: none; border: 1px solid #555; color: #aaa; cursor: pointer;
            padding: 6px 14px; border-radius: 20px; font-size: 13px; transition: all 0.2s;
        }
        .share-btn:hover { background: #333; color: #fff; border-color: #888; }
        .player { background: #1a1a1a; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .current-track { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .track-image { width: 80px; height: 80px; border-radius: 8px; background: #333; min-width: 80px; object-fit: cover; }
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: #888; font-size: 14px; }
        .player-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
        .control-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 10px; border-radius: 50%; transition: background 0.3s; }
        .control-btn:hover { background: #333; }
        .control-btn.active { color: #1db954; }
        .play-btn { font-size: 32px; background: #1db954; color: #fff; }
        .play-btn:hover { background: #1ed760; }
        .progress-bar { margin-bottom: 15px; cursor: pointer; }
        .progress { width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: #1db954; width: 0%; transition: width 0.1s; position: relative; }
        .time { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 20px; }
        .lyrics-section { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; max-height: 200px; overflow-y: auto; }
        .lyrics { font-size: 14px; line-height: 1.6; text-align: center; font-style: italic; color: #ccc; }
        .lyrics-line { margin-bottom: 8px; opacity: 0.6; transition: all 0.3s; }
        .lyrics-line.active { opacity: 1; color: #1db954; font-size: 16px; transform: scale(1.02); }
        .library { margin-top: 30px; }
        .library h2 { font-size: 22px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .track-list { max-height: 500px; overflow-y: auto; }
        .track-item { display: flex; align-items: center; gap: 12px; padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .track-item:hover { background: rgba(255,255,255,0.08); }
        .track-item.active { background: rgba(29,185,84,0.15); }
        .track-cover {
            width: 44px; height: 44px; border-radius: 5px; background: #282828;
            object-fit: cover; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; color: #555; font-size: 16px; overflow: hidden;
        }
        .track-cover img { width: 100%; height: 100%; object-fit: cover; }
