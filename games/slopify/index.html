<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slopify - Suno Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        .header { text-align: center; padding: 30px 0; border-bottom: 1px solid #222; margin-bottom: 25px; }
        .header h1 { font-size: 2.2rem; color: #e63946; letter-spacing: -1px; }
        .header h1 i { margin-right: 10px; }
        .header .subtitle { color: #666; font-size: 0.9rem; margin-top: 5px; }

        .player-layout { display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start; }

        /* Now Playing Panel */
        .now-playing { background: #141414; border-radius: 16px; padding: 24px; position: sticky; top: 20px; border: 1px solid #222; }
        .album-art { width: 100%; aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: #1a1a1a; margin-bottom: 18px; }
        .album-art img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .now-playing:hover .album-art img { transform: scale(1.03); }
        .track-info { text-align: center; margin-bottom: 18px; }
        .track-info h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info p { font-size: 0.85rem; color: #888; }
        
        .progress-container { cursor: pointer; padding: 10px 0; user-select: none; }
        .progress-bar { height: 4px; background: #333; border-radius: 2px; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e63946, #ff6b6b); border-radius: 2px; width: 0%; transition: width 0.1s linear; }
        .time-display { display: flex; justify-content: space-between; font-size: 0.75rem; color: #666; margin-top: 5px; }

        .controls { display: flex; justify-content: center; gap: 14px; align-items: center; margin-bottom: 18px; }
        .ctrl-btn { background: none; border: none; color: #888; font-size: 1.15rem; cursor: pointer; padding: 10px; border-radius: 50%; transition: all 0.2s; }
        .ctrl-btn:hover { color: #e0e0e0; background: #222; }
        .ctrl-btn.active { color: #e63946; }
        .play-btn-main { width: 52px; height: 52px; background: #e63946 !important; color: #fff !important; font-size: 1.3rem; border-radius: 50% !important; }
        .play-btn-main:hover { transform: scale(1.08); background: #d62845 !important; }

        .extra-actions { display: flex; gap: 8px; justify-content: center; }
        .action-btn { background: #1e1e1e; border: 1px solid #333; color: #aaa; padding: 7px 14px; border-radius: 8px; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
        .action-btn:hover { background: #282828; color: #fff; border-color: #555; }

        /* Lyrics Section */
        .lyrics-section { margin-top: 22px; padding-top: 18px; border-top: 1px solid #222; }
        .lyrics-section h4 { font-size: 0.78rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .lyrics { max-height: 150px; overflow-y: auto; font-size: 0.85rem; line-height: 1.75; color: #777; scrollbar-width: thin; scrollbar-color: #333 transparent; }
        .lyrics::-webkit-scrollbar { width: 4px; }
        .lyrics::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .lyrics-line { padding: 2px 0; transition: all 0.3s; border-radius: 4px; }
        .lyrics-line.active { color: #e63946; font-weight: 600; background: rgba(230,57,70,0.08); }

        /* Track List */
        .track-list-section { background: #141414; border-radius: 16px; padding: 24px; border: 1px solid #222; }
        .track-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .track-list-header h2 { font-size: 1.15rem; color: #e0e0e0; }
        .track-count { font-size: 0.82rem; color: #555; background: #1a1a1a; padding: 4px 11px; border-radius: 12px; }
        .track-list { max-height: calc(100vh - 180px); overflow-y: auto; scrollbar-width: thin; scrollbar-color: #333 transparent; }
        .track-list::-webkit-scrollbar { width: 5px; }
        .track-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .track-item { display: flex; gap: 13px; padding: 11px 12px; border-radius: 10px; cursor: pointer; transition: all 0.2s; margin-bottom: 3px; align-items: center; }
        .track-item:hover { background: #1c1c1c; }
        .track-item.active { background: rgba(230,57,70,0.1); border: 1px solid rgba(230,57,70,0.25); }
        .track-item-num { font-size: 0.82rem; color: #444; width: 20px; text-align: center; flex-shrink: 0; }
        .track-item.active .track-item-num { color: #e63946; font-weight: 700; }
        .track-item-art { width: 42px; height: 42px; border-radius: 8px; overflow: hidden; background: #1a1a1a; flex-shrink: 0; }
        .track-item-art img { width: 100%; height: 100%; object-fit: cover; }
        .track-item-info { flex: 1; min-width: 0; }
        .track-item-title { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-item.active .track-item-title { color: #e63946; }
        .track-item-artist { font-size: 0.76rem; color: #666; margin-top: 2px; }
        .track-item-duration { font-size: 0.72rem; color: #555; flex-shrink: 0; }

        /* Toast */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #e63946; color: #fff; padding: 10px 24px; border-radius: 10px; font-size: 0.88rem; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 999; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 800px) {
            .player-layout { grid-template-columns: 1fr; }
            .now-playing { position: static; }
        }
    </style>
</head>
<body>
    <audio id="audio-player"></audio>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-music"></i> slopify</h1>
            <p class="subtitle">Suno Music Player</p>
        </div>

        <div id="loading"><p style="text-align:center;padding:40px;color:#666;"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Loading songs...</p></div>

        <div class="player-layout" id="player-content" style="display:none;">
            <!-- Now Playing -->
            <div class="now-playing">
                <div class="album-art">
                    <img id="current-image" src="https://cdn2.suno.ai/image_large_default.jpeg" alt="Album Art">
                </div>
                
                <div class="track-info">
                    <h3 id="current-title">No Track Selected</h3>
                    <p id="current-artist">Select a song to play</p>
                </div>

                <div class="progress-container" onclick="seek(event)">
                    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                    <div class="time-display">
                        <span id="current-time">0:00</span>
                        <span id="total-time">0:00</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()" title="Shuffle"><i class="fas fa-shuffle"></i></button>
                    <button class="ctrl-btn" id="prev-btn" onclick="prevTrack()" title="Previous"><i class="fas fa-backward-step"></i></button>
                    <button class="ctrl-btn play-btn-main" id="play-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                    <button class="ctrl-btn" id="next-btn" onclick="nextTrack()" title="Next"><i class="fas fa-forward-step"></i></button>
                    <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()" title="Repeat"><i class="fas fa-repeat"></i></button>
                </div>

                <div class="extra-actions">
                    <button class="action-btn" onclick="shareSong()"><i class="fas fa-share-from-square"></i> Share</button>
                </div>

                <div class="lyrics-section">
                    <h4><i class="fas fa-microphone-lines"></i> Prompt / Lyrics</h4>
                    <div class="lyrics" id="lyrics"><div style="opacity:0.5">Select a track</div></div>
                </div>
            </div>

            <!-- Track List -->
            <div class="track-list-section">
                <div class="track-list-header">
                    <h2><i class="fas fa-list-ol"></i> All Tracks</h2>
                    <span class="track-count" id="track-count">0 songs</span>
                </div>
                <div class="track-list" id="track-list"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const S3_API = 'https://s3-api.t3ks.com/suno/';
        const audioPlayer = document.getElementById('audio-player');
        let tracks = [], currentTrackIndex = -1, isPlaying = false, isShuffled = false, repeatMode = 0;

        const $ = id => document.getElementById(id);
        const loadingEl = $('loading'), playerContentEl = $('player-content');
        const playBtn = $('play-btn'), prevBtn = $('prev-btn'), nextBtn = $('next-btn');
        const shuffleBtn = $('shuffle-btn'), repeatBtn = $('repeat-btn');
        const progressFill = $('progress-fill'), currentTimeEl = $('current-time'), totalTimeEl = $('total-time');
        const currentTitleEl = $('current-title'), currentArtistEl = $('current-artist'), currentImageEl = $('current-image');
        const lyricsEl = $('lyrics'), trackListEl = $('track-list');

        function getTrackIdFromHash() { return location.hash.slice(1) || null; }
        function setHashForTrack(id) { if (id) history.replaceState(null, '', '#' + id); }

        // --- Derive clean display fields from actual data ---
        function getDisplayTitle(track) {
            // Use prompt if available and meaningful, otherwise fall back to cleaned title
            const prompt = (track.suno_prompt || track.prompt || '').trim();
            if (prompt && prompt.length > 2 && prompt !== 'cover of uploaded song') {
                return prompt;
            }
            // Strip temp filename garbage from title
            let t = (track.title || 'Untitled').trim();
            t = t.replace(/\s*\(Cover\)$/i, '').replace(/^tmp[a-z0-9_]+\s*/i, '').trim();
            return t || 'Untitled';
        }

        function getDisplayArtist(track) {
            const kind = track.kind || '';
            if (kind === 'cover') return 'Suno Cover';
            if (kind === 'original') return 'Suno Original';
            if (track.instrumental) return 'Instrumental';
            return 'Suno';
        }

        async function loadTracks() {
            try {
                const response = await fetch(S3_API + '?list-type=2&prefix=songs/&max-keys=200');
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                const files = xmlDoc.getElementsByTagName('Key');

                const jsonKeys = [], jpgKeys = new Set();
                for (let i = 0; i < files.length; i++) {
                    const key = files[i].textContent;
                    if (key.endsWith('.json')) jsonKeys.push(key);
                    else if (key.endsWith('.jpg')) jpgKeys.add(key.replace(/\.jpg$/, ''));
                }

                tracks = [];
                for (const key of jsonKeys) {
                    try {
                        const td = await fetchTrackData(key);
                        if (td && td.suno_clip_id) {
                            const baseId = td.suno_clip_id;
                            tracks.push({
                                ...td,
                                id: baseId,
                                path: key,
                                audioPath: key.replace(/\.json$/, '.mp3'),
                                hasCover: jpgKeys.has('songs/' + baseId),
                                coverPath: 'songs/' + baseId + '.jpg',
                                _displayTitle: getDisplayTitle(td),
                                _displayArtist: getDisplayArtist(td)
                            });
                        }
                    } catch(e) {}
                }

                tracks.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

                loadingEl.style.display = 'none';
                playerContentEl.style.display = 'grid';
                renderTrackList();

                const hashId = getTrackIdFromHash();
                if (hashId) {
                    const idx = tracks.findIndex(t => t.id === hashId);
                    if (idx >= 0) { loadTrack(idx); return; }
                }
                if (tracks.length > 0) loadTrack(0);

            } catch(error) {
                loadingEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i><p>Failed to load songs</p><p style="font-size:12px;color:#666">' + error.message + '</p>';
            }
        }

        async function fetchTrackData(path) {
            const r = await fetch(S3_API + path);
            return await r.json();
        }

        function renderTrackList() {
            trackListEl.innerHTML = '';
            $('track-count').textContent = tracks.length + ' song' + (tracks.length !== 1 ? 's' : '');
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item' + (index === currentTrackIndex ? ' active' : '');
                item.onclick = () => loadTrack(index);

                let coverHTML = '<i class="fas fa-music" style="font-size:18px;color:#444;display:flex;align-items:center;justify-content:center;width:100%;height:100%"></i>';
                if (track.hasCover) coverHTML = '<img src="' + S3_API + track.coverPath + '" alt="cover">';

                item.innerHTML = '<span class="track-item-num">' + (index + 1) + '</span>' +
                    '<div class="track-item-art">' + coverHTML + '</div>' +
                    '<div class="track-item-info">' +
                        '<div class="track-item-title">' + esc(track._displayTitle) + '</div>' +
                        '<div class="track-item-artist">' + esc(track._displayArtist) + '</div>' +
                    '</div>';

                trackListEl.appendChild(item);
            });
        }

        async function loadTrack(index) {
            currentTrackIndex = index;
            const track = tracks[index];
            setHashForTrack(track.id);

            audioPlayer.src = S3_API + track.audioPath;
            currentTitleEl.textContent = track._displayTitle;
            currentArtistEl.textContent = track._displayArtist;

            if (track.hasCover) {
                currentImageEl.src = S3_API + track.coverPath;
                currentImageEl.onerror = function() { this.src = 'https://cdn2.suno.ai/image_large_default.jpeg'; };
            } else {
                currentImageEl.src = 'https://cdn2.suno.ai/image_large_default.jpeg';
            }

            displayLyrics(track);
            renderTrackList();
            audioPlayer.load();
            togglePlay(true);
        }

        function displayLyrics(track) {
            const prompt = track.suno_prompt || track.prompt || '';
            if (!prompt || prompt.length < 3) { lyricsEl.innerHTML = '<div style="opacity:0.5">No prompt info</div>'; return; }
            const lines = prompt.split('\n').filter(function(l) { return l.trim().length > 2; });
            if (lines.length === 0) { lyricsEl.innerHTML = '<div style="opacity:0.5">No prompt info</div>'; return; }
            lyricsEl.innerHTML = lines.map(function(l) { return '<div class="lyrics-line">' + esc(l.trim()) + '</div>'; }).join('');
        }

        function togglePlay(forcePlay) {
            if (forcePlay !== undefined) {
                if (forcePlay) { audioPlayer.play(); isPlaying = true; }
                else { audioPlayer.pause(); isPlaying = false; }
            } else if (isPlaying) { audioPlayer.pause(); isPlaying = false; }
            else { audioPlayer.play(); isPlaying = true; }
            updatePlayButton();
        }

        function updatePlayButton() { playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>'; }

        function nextTrack() {
            if (!tracks.length) return;
            var nextIdx = isShuffled ? Math.floor(Math.random() * tracks.length) : (currentTrackIndex + 1) % tracks.length;
            loadTrack(nextIdx);
        }

        function prevTrack() {
            if (!tracks.length) return;
            if (audioPlayer.currentTime > 3) { audioPlayer.currentTime = 0; return; }
            loadTrack((currentTrackIndex - 1 + tracks.length) % tracks.length);
        }

        function toggleShuffle() { isShuffled = !isShuffled; shuffleBtn.classList.toggle('active', isShuffled); }
        function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; repeatBtn.classList.toggle('active', repeatMode > 0); }

        function seek(event) {
            var rect = event.currentTarget.getBoundingClientRect();
            audioPlayer.currentTime = ((event.clientX - rect.left) / rect.width) * (audioPlayer.duration || 0);
        }

        function formatTime(s) { if (!s || isNaN(s)) return '0:00'; var m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

        function esc(t) { var d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

        async function shareSong() {
            if (currentTrackIndex < 0 || !tracks[currentTrackIndex]) { showToast('No song playing'); return; }
            var url = location.origin + location.pathname + '#' + tracks[currentTrackIndex].id;
            try { await navigator.clipboard.writeText(url); showToast('Link copied!'); }
            catch(e) {
                var inp=document.createElement('input'); inp.value=url; document.body.appendChild(inp);
                inp.select(); document.execCommand('copy'); document.body.removeChild(inp); showToast('Link copied!');
            }
        }

        function showToast(msg) { var t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show')},2000); }

        audioPlayer.addEventListener('timeupdate', function() {
            if (audioPlayer.duration) {
                progressFill.style.width = (audioPlayer.currentTime / audioPlayer.duration * 100) + '%';
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
                highlightLyric(audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener('loadedmetadata', function() { totalTimeEl.textContent = formatTime(audioPlayer.duration); });

        audioPlayer.addEventListener('ended', function() {
            if (repeatMode === 2) { audioPlayer.currentTime = 0; audioPlayer.play(); return; }
            if (repeatMode === 1 || currentTrackIndex < tracks.length - 1) nextTrack();
            else { isPlaying = false; updatePlayButton(); }
        });

        function highlightLyric(currentTime) {
            var lines = lyricsEl.querySelectorAll('.lyrics-line');
            if (!lines.length) return;
            var totalDuration = audioPlayer.duration || 180;
            var lineDuration = totalDuration / lines.length;
            var activeLine = Math.floor(currentTime / lineDuration);
            lines.forEach(function(line, i) { line.classList.toggle('active', i === activeLine); });
            if (activeLine >= 0 && activeLine < lines.length) {
                lines[activeLine].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        window.addEventListener('hashchange', function() {
            var hashId = getTrackIdFromHash();
            if (hashId) {
                var idx = tracks.findIndex(t => t.id === hashId);
                if (idx >= 0 && idx !== currentTrackIndex) loadTrack(idx);
            }
        });

        loadTracks();
    </script>
</body>
</html>
