<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slopify - Suno Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
        .container { max-width: 100%; margin: 0 auto; padding: 0 15px; }
        .header {
            background: #1a1a1a; padding: 15px 0; border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .share-btn {
            background: none; border: 1px solid #555; color: #aaa; cursor: pointer;
            padding: 6px 14px; border-radius: 20px; font-size: 13px; transition: all 0.2s;
        }
        .share-btn:hover { background: #333; color: #fff; border-color: #888; }
        .player { background: #1a1a1a; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .current-track { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .track-image { width: 80px; height: 80px; border-radius: 8px; background: #333; min-width: 80px; object-fit: cover; }
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: #888; font-size: 14px; }
        .player-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
        .control-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 10px; border-radius: 50%; transition: background 0.3s; }
        .control-btn:hover { background: #333; }
        .control-btn.active { color: #e63946; }
        .play-btn { font-size: 32px; background: #e63946; color: #fff; }
        .play-btn:hover { background: #ff4d5a; }
        .progress-bar { margin-bottom: 15px; cursor: pointer; }
        .progress { width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: #e63946; width: 0%; transition: width 0.1s; position: relative; }
        .time { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 20px; }
        .lyrics-section { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; max-height: 200px; overflow-y: auto; }
        .lyrics { font-size: 14px; line-height: 1.6; text-align: center; font-style: italic; color: #ccc; }
        .lyrics-line { margin-bottom: 8px; opacity: 0.6; transition: all 0.3s; }
        .lyrics-line.active { opacity: 1; color: #e63946; font-size: 16px; transform: scale(1.02); }
        .library { margin-top: 30px; }
        .library h2 { font-size: 22px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .track-list { max-height: 500px; overflow-y: auto; }
        .track-item { display: flex; align-items: center; gap: 12px; padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .track-item:hover { background: rgba(255,255,255,0.08); }
        .track-item.active { background: rgba(230,57,70,0.15); }
        .track-cover {
            width: 44px; height: 44px; border-radius: 5px; background: #282828;
            object-fit: cover; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; color: #555; font-size: 16px; overflow: hidden;
        }
        .track-cover img { width: 100%; height: 100%; object-fit: cover; }
        .track-number { color: #555; font-size: 12px; min-width: 20px; }
        .track-item-info { flex: 1; min-width: 0; }
        .track-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-item-artist { font-size: 12px; color: #888; }
        .cover-badge { background: #e63946; color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
        .track-duration { color: #666; font-size: 12px; }
        .loading { text-align: center; padding: 60px 20px; color: #888; }
        .loading i { font-size: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 10px 24px; border-radius: 20px;
            font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 slopify</h1>
            <button class="share-btn" id="share-btn" onclick="shareSong()"><i class="fas fa-share-alt"></i> Share</button>
        </div>

        <div id="loading" class="loading" style="display: block;"><i class="fas fa-spinner"></i><p>Loading songs...</p></div>

        <div id="player-content" style="display: none;">
            <div class="player">
                <div class="current-track">
                    <img id="current-image" class="track-image" src="" alt="">
                    <div class="track-info">
                        <div id="current-title" class="track-title">No Track Selected</div>
                        <div id="current-artist" class="track-artist">Select a song to play</div>
                    </div>
                </div>

                <audio id="audio-player" preload="metadata"></audio>

                <div class="player-controls">
                    <button class="control-btn" id="shuffle-btn" onclick="toggleShuffle()"><i class="fas fa-shuffle"></i></button>
                    <button class="control-btn" id="prev-btn" onclick="prevTrack()"><i class="fas fa-backward-step"></i></button>
                    <button class="control-btn play-btn" id="play-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                    <button class="control-btn" id="next-btn" onclick="nextTrack()"><i class="fas fa-forward-step"></i></button>
                    <button class="control-btn" id="repeat-btn" onclick="toggleRepeat()"><i class="fas fa-repeat"></i></button>
                </div>

                <div class="progress-bar" onclick="seek(event)">
                    <div class="progress"><div id="progress-fill" class="progress-fill"></div></div>
                </div>

                <div class="time">
                    <span id="current-time">0:00</span><span id="total-time">0:00</span>
                </div>

                <div class="lyrics-section">
                    <div id="lyrics" class="lyrics">Select a song with lyrics to view them here</div>
                </div>
            </div>

            <div class="library">
                <h2><i class="fas fa-music"></i> Library</h2>
                <div id="track-list" class="track-list"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const S3_API = 'https://s3-api.t3ks.com/suno/';
        const audioPlayer = document.getElementById('audio-player');
        let tracks = [], currentTrackIndex = -1, isPlaying = false, isShuffled = false, repeatMode = 0;

        const $ = id => document.getElementById(id);
        const loadingEl = $('loading'), playerContentEl = $('player-content');
        const playBtn = $('play-btn'), prevBtn = $('prev-btn'), nextBtn = $('next-btn');
        const shuffleBtn = $('shuffle-btn'), repeatBtn = $('repeat-btn');
        const progressFill = $('progress-fill'), currentTimeEl = $('current-time'), totalTimeEl = $('total-time');
        const currentTitleEl = $('current-title'), currentArtistEl = $('current-artist'), currentImageEl = $('current-image');
        const lyricsEl = $('lyrics'), trackListEl = $('track-list');

        function getTrackIdFromHash() { return location.hash.slice(1) || null; }
        function setHashForTrack(id) { if (id) history.replaceState(null, '', '#' + id); }

        async function loadTracks() {
            try {
                const response = await fetch(S3_API + '?list-type=2&prefix=songs/&max-keys=200');
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                const files = xmlDoc.getElementsByTagName('Key');

                const jsonKeys = [], jpgKeys = new Set();
                for (let i = 0; i < files.length; i++) {
                    const key = files[i].textContent;
                    if (key.endsWith('.json')) jsonKeys.push(key);
                    else if (key.endsWith('.jpg')) jpgKeys.add(key.replace(/\.jpg$/, ''));
                }

                tracks = [];
                for (const key of jsonKeys) {
                    try {
                        const td = await fetchTrackData(key);
                        if (td && td.suno_clip_id) {
                            const baseId = td.suno_clip_id;
                            tracks.push({
                                ...td,
                                id: baseId,
                                path: key,
                                audioPath: key.replace(/\.json$/, '.mp3'),
                                hasCover: jpgKeys.has('songs/' + baseId),
                                coverPath: 'songs/' + baseId + '.jpg'
                            });
                        }
                    } catch(e) {}
                }

                tracks.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

                loadingEl.style.display = 'none';
                playerContentEl.style.display = 'block';
                renderTrackList();

                const hashId = getTrackIdFromHash();
                if (hashId) {
                    const idx = tracks.findIndex(t => t.id === hashId);
                    if (idx >= 0) { loadTrack(idx); return; }
                }
                if (tracks.length > 0) loadTrack(0);

            } catch(error) {
                loadingEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i><p>Failed to load songs</p><p style="font-size:12px;color:#666">' + error.message + '</p>';
            }
        }

        async function fetchTrackData(path) {
            const r = await fetch(S3_API + path);
            return await r.json();
        }

        function renderTrackList() {
            trackListEl.innerHTML = '';
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item' + (index === currentTrackIndex ? ' active' : '');
                item.onclick = () => loadTrack(index);

                let coverHTML = '<i class="fas fa-music"></i>';
                if (track.hasCover) {
                    coverHTML = '<img src="' + S3_API + track.coverPath + '" alt="" onerror="this.parentElement.innerHTML=\'<i class=\\\'fas fa-music\\\'></i>\'">';
                }

                const isCover = track.metadata?.is_cover || track.is_cover || false;
                const badge = isCover ? '<span class="cover-badge">Cover</span>' : '';

                const dur = track.duration || track.metadata?.duration || 0;
                const durStr = dur > 0 ? Math.floor(dur / 60) + ':' + String(Math.floor(dur % 60)).padStart(2, '0') : '';

                item.innerHTML =
                    '<div class="track-cover">' + coverHTML + '</div>' +
                    '<div class="track-number">' + (index + 1) + '</div>' +
                    '<div class="track-item-info">' +
                        '<div class="track-item-title">' + esc(track.title || 'Untitled') + badge + '</div>' +
                        '<div class="track-item-artist">' + esc(track.metadata?.tags?.[0] || 'Unknown') + '</div>' +
                    '</div>' +
                    (durStr ? '<div class="track-duration">' + durStr + '</div>' : '');

                trackListEl.appendChild(item);
            });
        }

        async function loadTrack(index) {
            currentTrackIndex = index;
            const track = tracks[index];
            setHashForTrack(track.id);

            audioPlayer.src = S3_API + track.audioPath;
            currentTitleEl.textContent = track.title || 'Untitled';
            currentArtistEl.textContent = track.metadata?.tags?.[0] || 'Unknown';

            if (track.hasCover) {
                currentImageEl.src = S3_API + track.coverPath;
                currentImageEl.onerror = function() { this.src = 'https://cdn2.suno.ai/image_large_default.jpeg'; };
            } else {
                currentImageEl.src = 'https://cdn2.suno.ai/image_large_default.jpeg';
            }

            displayLyrics(track);
            renderTrackList();
            audioPlayer.load();
            togglePlay(true);
        }

        function displayLyrics(track) {
            const prompt = track.suno_prompt || track.prompt || '';
            if (!prompt || prompt.length < 10) { lyricsEl.innerHTML = '<div style="opacity:0.5">Instrumental</div>'; return; }
            const lines = prompt.split('\n').filter(function(l) { return l.trim().length > 2; });
            if (lines.length === 0) { lyricsEl.innerHTML = '<div style="opacity:0.5">Instrumental</div>'; return; }
            lyricsEl.innerHTML = lines.map(function(l) { return '<div class="lyrics-line">' + esc(l.trim()) + '</div>'; }).join('');
        }

        function togglePlay(forcePlay) {
            if (forcePlay !== undefined) {
                if (forcePlay) { audioPlayer.play(); isPlaying = true; }
                else { audioPlayer.pause(); isPlaying = false; }
            } else if (isPlaying) { audioPlayer.pause(); isPlaying = false; }
            else { audioPlayer.play(); isPlaying = true; }
            updatePlayButton();
        }

        function updatePlayButton() { playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>'; }

        function nextTrack() {
            if (!tracks.length) return;
            var nextIdx = isShuffled ? Math.floor(Math.random() * tracks.length) : (currentTrackIndex + 1) % tracks.length;
            loadTrack(nextIdx);
        }

        function prevTrack() {
            if (!tracks.length) return;
            if (audioPlayer.currentTime > 3) { audioPlayer.currentTime = 0; return; }
            loadTrack((currentTrackIndex - 1 + tracks.length) % tracks.length);
        }

        function toggleShuffle() { isShuffled = !isShuffled; shuffleBtn.classList.toggle('active', isShuffled); }
        function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; repeatBtn.classList.toggle('active', repeatMode > 0); }

        function seek(event) {
            var rect = event.currentTarget.getBoundingClientRect();
            audioPlayer.currentTime = ((event.clientX - rect.left) / rect.width) * (audioPlayer.duration || 0);
        }

        function formatTime(s) { if (!s || isNaN(s)) return '0:00'; var m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

        function esc(t) { var d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

        async function shareSong() {
            if (currentTrackIndex < 0 || !tracks[currentTrackIndex]) { showToast('No song playing'); return; }
            var url = location.origin + location.pathname + '#' + tracks[currentTrackIndex].id;
            try { await navigator.clipboard.writeText(url); showToast('Link copied!'); }
            catch(e) {
                var inp=document.createElement('input'); inp.value=url; document.body.appendChild(inp);
                inp.select(); document.execCommand('copy'); document.body.removeChild(inp); showToast('Link copied!');
            }
        }

        function showToast(msg) { var t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show')},2000); }

        audioPlayer.addEventListener('timeupdate', function() {
            if (audioPlayer.duration) {
                progressFill.style.width = (audioPlayer.currentTime / audioPlayer.duration * 100) + '%';
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
                highlightLyric(audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener('loadedmetadata', function() { totalTimeEl.textContent = formatTime(audioPlayer.duration); });

        audioPlayer.addEventListener('ended', function() {
            if (repeatMode === 2) { audioPlayer.currentTime = 0; audioPlayer.play(); return; }
            if (repeatMode === 1 || currentTrackIndex < tracks.length - 1) nextTrack();
            else { isPlaying = false; updatePlayButton(); }
        });

        function highlightLyric(currentTime) {
            var lines = lyricsEl.querySelectorAll('.lyrics-line');
            if (!lines.length) return;
            var totalDuration = audioPlayer.duration || 180;
            var lineDuration = totalDuration / lines.length;
            var targetIndex = Math.floor(currentTime / lineDuration);
            for (var i = 0; i < lines.length; i++) lines[i].classList.remove('active');
            if (targetIndex >= 0 && targetIndex < lines.length) lines[targetIndex].classList.add('active');
        }

        loadTracks();
    </script>
</body>
</html>
