<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slopify - Suno Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080808;
            --panel: #151515;
            --panel-2: #1c1c1c;
            --line: #2a2a2a;
            --text: #f0f0f0;
            --muted: #8a8a8a;
            --subtle: #5f5f5f;
            --accent: #f23b52;
            --accent-soft: rgba(242, 59, 82, 0.13);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }
        button { font: inherit; }
        .container { width: min(1180px, 100%); height: 100vh; margin: 0 auto; padding: 22px; display: flex; flex-direction: column; min-height: 0; }

        .header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            padding: 0 0 18px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 24px;
        }
        .header h1 { font-size: clamp(1.55rem, 5vw, 2.35rem); color: var(--text); letter-spacing: 0; line-height: 1; }
        .header h1 i { color: var(--accent); margin-right: 9px; }
        .header .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 8px; }

        .player-layout { display: grid; grid-template-columns: minmax(300px, 360px) minmax(0, 1fr); gap: 24px; align-items: start; min-height: 0; flex: 1; }

        .now-playing, .track-list-section {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
        }
        .now-playing { padding: 20px; position: sticky; top: 0; max-height: 100%; overflow-y: auto; }
        .mobile-mini-player { display: none; }
        .album-art { width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden; background: var(--panel-2); margin-bottom: 18px; }
        .album-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .track-info { margin-bottom: 16px; }
        .track-info h3 { font-size: 1.08rem; font-weight: 700; line-height: 1.25; overflow-wrap: anywhere; }
        .track-info p { font-size: 0.86rem; color: var(--muted); margin-top: 5px; }

        .meta-row { display: flex; flex-wrap: wrap; gap: 7px; margin: 13px 0 16px; }
        .meta-pill {
            color: #cfcfcf;
            background: #202020;
            border: 1px solid #303030;
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 0.74rem;
            line-height: 1;
        }

        .progress-container { cursor: pointer; padding: 9px 0 11px; user-select: none; }
        .progress-bar { height: 5px; background: #333; border-radius: 999px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: inherit; width: 0%; transition: width 0.1s linear; }
        .time-display { display: flex; justify-content: space-between; font-size: 0.76rem; color: var(--muted); margin-top: 7px; }

        .controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; align-items: center; margin: 12px 0 16px; }
        .ctrl-btn {
            min-width: 44px;
            height: 44px;
            background: #202020;
            border: 1px solid #303030;
            color: #b8b8b8;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 999px;
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.2s;
        }
        .ctrl-btn:hover { color: #fff; background: #292929; border-color: #454545; }
        .ctrl-btn.active { color: var(--accent); border-color: rgba(242, 59, 82, 0.5); }
        .play-btn-main { height: 54px; min-width: 54px; background: var(--accent); color: #fff; border-color: var(--accent); font-size: 1.18rem; }
        .play-btn-main:hover { transform: translateY(-1px); background: #ff4960; border-color: #ff4960; }

        .extra-actions { display: flex; gap: 8px; }
        .action-btn {
            background: #202020;
            border: 1px solid #303030;
            color: #c9c9c9;
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
        .action-btn:hover { background: #292929; color: #fff; border-color: #454545; }

        .lyrics-section { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--line); }
        .lyrics-section h4 { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
        .lyrics {
            max-height: 190px;
            overflow-y: auto;
            font-size: 0.86rem;
            line-height: 1.68;
            color: #a0a0a0;
            scrollbar-width: thin;
            scrollbar-color: #3a3a3a transparent;
            padding-right: 6px;
        }
        .lyrics::-webkit-scrollbar { width: 5px; }
        .lyrics::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 999px; }
        .lyrics-line { padding: 3px 0; border-radius: 4px; overflow-wrap: anywhere; }
        .lyrics-line.section { color: var(--accent); font-weight: 700; margin-top: 4px; }
        .empty-note { color: var(--subtle); }

        .track-list-section { padding: 18px; min-width: 0; height: 100%; display: flex; flex-direction: column; min-height: 0; }
        .track-list-header { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 14px; }
        .track-list-header h2 { font-size: 1.05rem; color: var(--text); }
        .track-count { font-size: 0.79rem; color: var(--muted); background: #202020; padding: 5px 10px; border-radius: 999px; white-space: nowrap; }
        .track-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #3a3a3a transparent;
            padding-right: 4px;
        }
        .track-list::-webkit-scrollbar { width: 5px; }
        .track-list::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 999px; }
        .track-item {
            display: grid;
            grid-template-columns: 28px 48px minmax(0, 1fr) auto;
            gap: 12px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 4px;
            align-items: center;
            border: 1px solid transparent;
        }
        .track-item:hover { background: #1d1d1d; }
        .track-item.active { background: var(--accent-soft); border-color: rgba(242, 59, 82, 0.36); }
        .track-item-num { font-size: 0.78rem; color: var(--subtle); text-align: right; }
        .track-item.active .track-item-num { color: var(--accent); font-weight: 700; }
        .track-item-art { width: 48px; height: 48px; border-radius: 8px; overflow: hidden; background: #222; display: grid; place-items: center; }
        .track-item-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .track-item-info { min-width: 0; }
        .track-item-title { font-size: 0.9rem; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-item.active .track-item-title { color: #ff5268; }
        .track-item-artist, .track-item-tags { font-size: 0.76rem; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-item-duration { font-size: 0.76rem; color: var(--muted); white-space: nowrap; }
        .list-loader {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 9px;
            color: var(--muted);
            font-size: 0.86rem;
            padding: 18px 10px 10px;
        }
        .list-loader.show { display: flex; }
        .error-box {
            text-align: center;
            padding: 42px 20px;
            color: var(--muted);
        }
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--accent);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.88rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 999;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 820px) {
            html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
            body { overflow-y: auto; }
            body.sheet-open { overflow: hidden; }
            .container { width: 100%; max-width: 100%; height: auto; min-height: 100vh; padding: 78px 14px 28px; display: block; overflow: visible; }
            .header { align-items: start; margin-bottom: 14px; }
            .player-layout { grid-template-columns: 1fr; gap: 14px; }
            .track-list-section { width: 100%; max-width: 100%; min-width: 0; }

            /* now-playing collapses into a glass bar pinned to the viewport top, reachable at any scroll position */
            .now-playing {
                position: fixed;
                top: 0; left: 0; right: 0;
                z-index: 50;
                width: auto;
                max-width: none;
                padding: 9px 14px 11px;
                border: 0;
                border-radius: 0 0 16px 16px;
                background: rgba(18, 18, 18, 0.78);
                backdrop-filter: blur(16px) saturate(140%);
                -webkit-backdrop-filter: blur(16px) saturate(140%);
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
                max-height: none;
                overflow: visible;
            }
            .mobile-mini-player {
                display: grid;
                grid-template-columns: 46px minmax(0, 1fr);
                gap: 12px;
                align-items: center;
                padding-right: 52px;
                position: relative;
                width: 100%;
                max-width: 100%;
            }
            .mini-art { width: 46px; height: 46px; border-radius: 9px; overflow: hidden; background: var(--panel-2); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4); }
            .mini-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
            .mini-copy { min-width: 0; text-align: left; background: transparent; border: 0; color: inherit; cursor: pointer; padding: 0; }
            .mini-title { display: block; font-size: 0.92rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .mini-subtitle { display: block; margin-top: 2px; color: var(--muted); font-size: 0.74rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .mini-btn {
                width: 42px; height: 42px;
                border-radius: 999px;
                border: 0;
                background: #242424;
                color: #fff;
                cursor: pointer;
                display: grid; place-items: center;
                font-size: 0.95rem;
                transition: transform 0.15s ease;
            }
            .mini-play { background: var(--accent); box-shadow: 0 4px 14px rgba(242, 59, 82, 0.42); position: absolute; right: 0; top: 50%; transform: translateY(-50%); }
            .mini-play:active { transform: translateY(-50%) scale(0.9); }
            .mini-expand { display: none; }

            .mini-progress { position: absolute; left: 14px; right: 14px; bottom: 1px; height: 3px; background: rgba(255, 255, 255, 0.1); border-radius: 999px; overflow: hidden; }
            .mini-progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: inherit; transition: width 0.1s linear; }

            .album-art, .player-main, .extra-actions, .lyrics-section { display: none; }

            /* expanded: full-screen sheet sliding over the page */
            .now-playing.expanded {
                position: fixed;
                inset: 0;
                z-index: 60;
                display: block;
                padding: 14px 16px 32px;
                border-radius: 0;
                background: radial-gradient(120% 55% at 50% -8%, rgba(242, 59, 82, 0.16), transparent 60%), var(--bg);
                overflow-y: auto;
                animation: sheetIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            }
            @keyframes sheetIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
            .now-playing.expanded .mobile-mini-player { position: sticky; top: 0; z-index: 2; margin: -14px -16px 18px; padding: 14px 16px; }
            .now-playing.expanded .mini-progress, .now-playing.expanded .mini-play { display: none; }
            .now-playing.expanded .mini-expand { display: grid; position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: #242424; }
            .now-playing.expanded .album-art { display: block; width: min(78vw, 320px); margin: 0 auto 20px; border-radius: 16px; box-shadow: 0 22px 54px rgba(0, 0, 0, 0.55); }
            .now-playing.expanded .player-main { display: block; }
            .now-playing.expanded .track-info { text-align: center; }
            .now-playing.expanded .track-info h3 { font-size: 1.25rem; }
            .now-playing.expanded .meta-row { justify-content: center; }
            .now-playing.expanded .controls { display: flex; justify-content: center; align-items: center; gap: 14px; margin: 14px 0 18px; }
            .now-playing.expanded .ctrl-btn { height: 46px; width: 46px; min-width: 0; flex: 0 0 46px; padding: 0; }
            .now-playing.expanded .play-btn-main { height: 60px; width: 60px; flex-basis: 60px; font-size: 1.3rem; }
            .now-playing.expanded .extra-actions { display: flex; justify-content: center; }
            .now-playing.expanded .lyrics-section { display: block; }
            .now-playing.expanded .lyrics { max-height: none; }

            .track-list-section { padding: 12px; height: auto; display: block; }
            .track-list { max-height: none; overflow: visible; padding-right: 0; }
            .track-item { grid-template-columns: 24px 44px minmax(0, 1fr); overflow: hidden; }
            .track-item-duration { display: none; }
        }

        @media (max-width: 480px) {
            .header { display: block; }
            .track-item { padding: 9px 6px; gap: 9px; }
            .track-item-art { width: 42px; height: 42px; }
            .now-playing.expanded .track-info h3 { font-size: 1.12rem; }
            .now-playing.expanded .album-art { width: min(72vw, 280px); }
        }
    </style>
</head>
<body>
    <audio id="audio-player"></audio>

    <div class="container">
        <div class="header">
            <div>
                <h1><i class="fas fa-music"></i>slopify</h1>
                <p class="subtitle">Suno music player</p>
            </div>
        </div>

        <div id="loading" class="error-box">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top:16px;">Loading songs...</p>
        </div>

        <div class="player-layout" id="player-content" style="display:none;">
            <div class="now-playing" id="now-playing">
                <div class="mobile-mini-player">
                    <div class="mini-art">
                        <img id="mini-image" src="https://cdn2.suno.ai/image_large_default.jpeg" alt="">
                    </div>
                    <button class="mini-copy" onclick="toggleMobilePlayer()" aria-label="Expand player">
                        <span class="mini-title" id="mini-title">No track selected</span>
                        <span class="mini-subtitle" id="mini-subtitle">Tap to expand</span>
                    </button>
                    <button class="mini-btn mini-play" id="mini-play-btn" onclick="togglePlay()" title="Play" aria-label="Play"><i class="fas fa-play"></i></button>
                    <button class="mini-btn mini-expand" id="mini-expand-btn" onclick="toggleMobilePlayer()" title="Expand" aria-label="Expand player"><i class="fas fa-chevron-down"></i></button>
                    <div class="mini-progress"><div class="mini-progress-fill" id="mini-progress-fill"></div></div>
                </div>

                <div class="album-art">
                    <img id="current-image" src="https://cdn2.suno.ai/image_large_default.jpeg" alt="Album art">
                </div>

                <div class="player-main">
                    <div class="track-info">
                        <h3 id="current-title">No track selected</h3>
                        <p id="current-artist">Select a song to play</p>
                    </div>

                    <div class="meta-row" id="current-meta"></div>

                    <div class="progress-container" onclick="seek(event)">
                        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                        <div class="time-display">
                            <span id="current-time">0:00</span>
                            <span id="total-time">0:00</span>
                        </div>
                    </div>

                    <div class="controls">
                        <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()" title="Shuffle" aria-label="Shuffle"><i class="fas fa-shuffle"></i></button>
                        <button class="ctrl-btn" id="prev-btn" onclick="prevTrack()" title="Previous" aria-label="Previous"><i class="fas fa-backward-step"></i></button>
                        <button class="ctrl-btn play-btn-main" id="play-btn" onclick="togglePlay()" title="Play" aria-label="Play"><i class="fas fa-play"></i></button>
                        <button class="ctrl-btn" id="next-btn" onclick="nextTrack()" title="Next" aria-label="Next"><i class="fas fa-forward-step"></i></button>
                        <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()" title="Repeat" aria-label="Repeat"><i class="fas fa-repeat"></i></button>
                    </div>
                </div>

                <div class="extra-actions">
                    <button class="action-btn" onclick="shareSong()"><i class="fas fa-share-from-square"></i> Share</button>
                </div>

                <div class="lyrics-section">
                    <h4><i class="fas fa-microphone-lines"></i> Prompt / Lyrics</h4>
                    <div class="lyrics" id="lyrics"><div class="empty-note">Select a track</div></div>
                </div>
            </div>

            <div class="track-list-section">
                <div class="track-list-header">
                    <h2><i class="fas fa-list-ol"></i> All Tracks</h2>
                    <span class="track-count" id="track-count">0 songs</span>
                </div>
                <div class="track-list" id="track-list"></div>
                <div class="list-loader" id="list-loader"><i class="fas fa-spinner fa-spin"></i><span>Loading more tracks...</span></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const S3_API = 'https://s3-api.t3ks.com/suno/';
        const KEY_PAGE_SIZE = 1000;
        const JSON_BATCH_SIZE = 18;
        const audioPlayer = document.getElementById('audio-player');
        let tracks = [];
        let allKeys = [];
        let nextKeyIndex = 0;
        let currentTrackIndex = -1;
        let isPlaying = false;
        let isShuffled = false;
        let repeatMode = 0;
        let reachedEnd = false;
        let loadingPage = false;

        const $ = id => document.getElementById(id);
        const loadingEl = $('loading'), playerContentEl = $('player-content');
        const playBtn = $('play-btn'), shuffleBtn = $('shuffle-btn'), repeatBtn = $('repeat-btn');
        const progressFill = $('progress-fill'), miniProgressFill = $('mini-progress-fill'), currentTimeEl = $('current-time'), totalTimeEl = $('total-time');
        const currentTitleEl = $('current-title'), currentArtistEl = $('current-artist'), currentImageEl = $('current-image');
        const currentMetaEl = $('current-meta'), lyricsEl = $('lyrics'), trackListEl = $('track-list'), listLoaderEl = $('list-loader');
        const nowPlayingEl = $('now-playing'), miniImageEl = $('mini-image'), miniTitleEl = $('mini-title'), miniSubtitleEl = $('mini-subtitle');
        const miniPlayBtn = $('mini-play-btn'), miniExpandBtn = $('mini-expand-btn');

        function getTrackIdFromHash() { return location.hash.slice(1) || null; }
        function setHashForTrack(id) { if (id) history.replaceState(null, '', '#' + id); }

        function getText(node, tagName) {
            const el = node.getElementsByTagName(tagName)[0];
            return el ? el.textContent : '';
        }

        function cleanTitle(value) {
            let title = (value || '').trim();
            title = title.replace(/\s*\(Cover\)$/i, '').replace(/^tmp[a-z0-9_ -]*/i, '').trim();
            return title;
        }

        function getDisplayTitle(track) {
            const title = cleanTitle(track.title);
            if (title) return title;
            const prompt = (track.suno_prompt || track.prompt || '').trim();
            if (prompt && prompt !== '[Instrumental]' && prompt.length <= 80) return prompt;
            return track.instrumental ? 'Instrumental' : 'Untitled';
        }

        function getKindLabel(track) {
            if (track.instrumental) return 'Instrumental';
            if (track.kind === 'cover') return 'Cover';
            if (track.kind === 'original') return 'Original';
            if (track.kind) return track.kind.charAt(0).toUpperCase() + track.kind.slice(1);
            return 'Song';
        }

        function getCoverUrl(track) {
            return track.cover_url || track.suno_image_url || (track.id ? S3_API + 'songs/' + track.id + '.jpg' : 'https://cdn2.suno.ai/image_large_default.jpeg');
        }

        function getAudioUrl(track) {
            return track.audio_url || track.suno_cdn_url || S3_API + track.audioPath;
        }

        function getTrackTags(track) {
            return (track.tags || track.prompt || '')
                .split(',')
                .map(t => t.trim())
                .filter(Boolean)
                .slice(0, 3);
        }

        function formatDurationSeconds(value) {
            const n = Number(value);
            if (!n || Number.isNaN(n)) return '';
            return formatTime(n);
        }

        function buildListUrl(token) {
            const params = new URLSearchParams({
                'list-type': '2',
                prefix: 'songs/',
                'max-keys': String(KEY_PAGE_SIZE)
            });
            if (token) params.set('continuation-token', token);
            return S3_API + '?' + params.toString();
        }

        async function loadTracks() {
            try {
                await loadAllKeys();
                await loadMoreTracks(true);
                loadingEl.style.display = 'none';
                playerContentEl.style.display = 'grid';
                renderTrackList();

                const hashId = getTrackIdFromHash();
                if (hashId) await ensureTrackLoaded(hashId);
            } catch(error) {
                loadingEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i><p style="margin-top:16px;">Failed to load songs</p><p style="font-size:12px;color:#666;margin-top:8px;">' + esc(error.message) + '</p>';
            }
        }

        // The bucket lists keys lexicographically (by UUID), not by date, so the full
        // key list is collected once and sorted by LastModified before any detail fetch.
        // This keeps the displayed order stable as more tracks stream in during scroll.
        async function loadAllKeys() {
            let token = null;
            const collected = [];
            do {
                const response = await fetch(buildListUrl(token));
                if (!response.ok) throw new Error('Song list request failed: ' + response.status);
                const xmlDoc = new DOMParser().parseFromString(await response.text(), 'text/xml');
                Array.from(xmlDoc.getElementsByTagName('Contents')).forEach(item => {
                    const key = getText(item, 'Key');
                    if (!key.endsWith('.json')) return;
                    collected.push({
                        key,
                        id: key.replace(/^songs\//, '').replace(/\.json$/, ''),
                        lastModified: getText(item, 'LastModified')
                    });
                });
                const next = xmlDoc.getElementsByTagName('NextContinuationToken')[0];
                token = next ? next.textContent : null;
            } while (token);
            collected.sort((a, b) => new Date(b.lastModified) - new Date(a.lastModified));
            allKeys = collected;
        }

        async function loadMoreTracks(isInitial) {
            if (loadingPage || reachedEnd) return;
            loadingPage = true;
            listLoaderEl.classList.toggle('show', !isInitial);
            try {
                const batch = allKeys.slice(nextKeyIndex, nextKeyIndex + JSON_BATCH_SIZE);
                nextKeyIndex += batch.length;
                reachedEnd = nextKeyIndex >= allKeys.length;
                const loaded = await Promise.all(batch.map(entry => fetchTrackFromKey(entry.key)));
                loaded.filter(Boolean).forEach(track => tracks.push(track));
                renderTrackList();
            } finally {
                loadingPage = false;
                listLoaderEl.classList.remove('show');
            }
        }

        async function fetchTrackFromKey(key) {
            try {
                const r = await fetch(S3_API + key);
                if (!r.ok) return null;
                const td = await r.json();
                const id = td.suno_clip_id || key.replace(/^songs\//, '').replace(/\.json$/, '');
                if (!id) return null;
                return {
                    ...td,
                    id,
                    path: key,
                    audioPath: key.replace(/\.json$/, '.mp3'),
                    _displayTitle: getDisplayTitle(td)
                };
            } catch(e) {
                return null;
            }
        }

        async function ensureTrackLoaded(id) {
            let idx = tracks.findIndex(t => t.id === id);
            while (idx < 0 && !reachedEnd) {
                await loadMoreTracks(false);
                idx = tracks.findIndex(t => t.id === id);
            }
            if (idx >= 0) {
                loadTrack(idx, false);
                return true;
            }
            return false;
        }

        function renderTrackList() {
            trackListEl.innerHTML = '';
            const total = allKeys.length || tracks.length;
            $('track-count').textContent = total + ' song' + (total !== 1 ? 's' : '');
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item' + (index === currentTrackIndex ? ' active' : '');
                item.onclick = () => loadTrack(index, true);

                const coverUrl = getCoverUrl(track);
                const tags = getTrackTags(track);
                const subtitle = [getKindLabel(track)].concat(tags).filter(Boolean).join(' · ');
                const duration = formatDurationSeconds(track.duration);

                item.innerHTML =
                    '<span class="track-item-num">' + (index + 1) + '</span>' +
                    '<div class="track-item-art"><img src="' + escAttr(coverUrl) + '" alt="" loading="lazy" onerror="this.style.display=&quot;none&quot;;this.parentElement.innerHTML=&quot;<i class=\\&quot;fas fa-music\\&quot; style=\\&quot;color:#555\\&quot;></i>&quot;"></div>' +
                    '<div class="track-item-info">' +
                        '<div class="track-item-title">' + esc(track._displayTitle) + '</div>' +
                        '<div class="track-item-artist">' + esc(subtitle) + '</div>' +
                    '</div>' +
                    '<div class="track-item-duration">' + esc(duration) + '</div>';

                trackListEl.appendChild(item);
            });
        }

        function loadTrack(index, autoplay) {
            if (!tracks[index]) return;
            currentTrackIndex = index;
            const track = tracks[index];
            setHashForTrack(track.id);

            audioPlayer.src = getAudioUrl(track);
            currentTitleEl.textContent = track._displayTitle;
            currentArtistEl.textContent = getKindLabel(track);
            const coverUrl = getCoverUrl(track);
            currentImageEl.src = coverUrl;
            currentImageEl.onerror = function() { this.src = 'https://cdn2.suno.ai/image_large_default.jpeg'; };
            miniImageEl.src = coverUrl;
            miniImageEl.onerror = function() { this.src = 'https://cdn2.suno.ai/image_large_default.jpeg'; };
            miniTitleEl.textContent = track._displayTitle;
            miniSubtitleEl.textContent = getKindLabel(track);
            renderCurrentMeta(track);
            displayLyrics(track);
            renderTrackList();
            progressFill.style.width = '0%';
            miniProgressFill.style.width = '0%';
            audioPlayer.load();
            if (autoplay) togglePlay(true);
            else {
                isPlaying = false;
                updatePlayButton();
            }
        }

        function renderCurrentMeta(track) {
            const meta = [];
            if (track.kind) meta.push(track.kind);
            if (track.model_name) meta.push(track.model_name);
            if (track.duration) meta.push(formatDurationSeconds(track.duration));
            currentMetaEl.innerHTML = meta.map(m => '<span class="meta-pill">' + esc(m) + '</span>').join('');
        }

        function displayLyrics(track) {
            const text = (track.suno_prompt && track.suno_prompt.trim() !== '[Instrumental]')
                ? track.suno_prompt
                : (track.prompt || track.tags || '');
            if (!text || text.trim().length < 3) {
                lyricsEl.innerHTML = '<div class="empty-note">No prompt info</div>';
                return;
            }
            const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
            lyricsEl.innerHTML = lines.map(function(line) {
                const isSection = /^\[[^\]]+\]$/.test(line);
                return '<div class="lyrics-line' + (isSection ? ' section' : '') + '">' + esc(line) + '</div>';
            }).join('');
            lyricsEl.scrollTop = 0;
        }

        function togglePlay(forcePlay) {
            if (currentTrackIndex < 0 && tracks.length) { loadTrack(0, true); return; }
            if (forcePlay !== undefined) {
                if (forcePlay) {
                    audioPlayer.play().then(function() {
                        isPlaying = true;
                        updatePlayButton();
                    }).catch(function() {
                        isPlaying = false;
                        updatePlayButton();
                    });
                    return;
                }
                audioPlayer.pause();
                isPlaying = false;
            } else if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
            } else {
                audioPlayer.play().then(function() {
                    isPlaying = true;
                    updatePlayButton();
                }).catch(function() {
                    showToast('Tap play again to start audio');
                });
                return;
            }
            updatePlayButton();
        }

        function updatePlayButton() {
            playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
            miniPlayBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
            playBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
            playBtn.setAttribute('title', isPlaying ? 'Pause' : 'Play');
            miniPlayBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
            miniPlayBtn.setAttribute('title', isPlaying ? 'Pause' : 'Play');
        }

        function toggleMobilePlayer() {
            const expanded = nowPlayingEl.classList.toggle('expanded');
            document.body.classList.toggle('sheet-open', expanded);
            if (expanded) nowPlayingEl.scrollTop = 0;
            miniExpandBtn.innerHTML = expanded ? '<i class="fas fa-chevron-up"></i>' : '<i class="fas fa-chevron-down"></i>';
            miniExpandBtn.setAttribute('aria-label', expanded ? 'Collapse player' : 'Expand player');
            miniExpandBtn.setAttribute('title', expanded ? 'Collapse' : 'Expand');
        }

        async function nextTrack() {
            if (!tracks.length) return;
            if (!isShuffled && currentTrackIndex >= tracks.length - 1 && !reachedEnd) await loadMoreTracks(false);
            const nextIdx = isShuffled ? Math.floor(Math.random() * tracks.length) : (currentTrackIndex + 1) % tracks.length;
            loadTrack(nextIdx, true);
        }

        function prevTrack() {
            if (!tracks.length) return;
            if (audioPlayer.currentTime > 3) { audioPlayer.currentTime = 0; return; }
            loadTrack((currentTrackIndex - 1 + tracks.length) % tracks.length, true);
        }

        function toggleShuffle() { isShuffled = !isShuffled; shuffleBtn.classList.toggle('active', isShuffled); }
        function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; repeatBtn.classList.toggle('active', repeatMode > 0); }

        function seek(event) {
            const rect = event.currentTarget.getBoundingClientRect();
            audioPlayer.currentTime = ((event.clientX - rect.left) / rect.width) * (audioPlayer.duration || 0);
        }

        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t == null ? '' : String(t); return d.innerHTML; }
        function escAttr(t) { return esc(t).replace(/"/g, '&quot;'); }

        async function shareSong() {
            if (currentTrackIndex < 0 || !tracks[currentTrackIndex]) { showToast('No song playing'); return; }
            const url = location.origin + location.pathname + '#' + tracks[currentTrackIndex].id;
            try { await navigator.clipboard.writeText(url); showToast('Link copied'); }
            catch(e) {
                const inp = document.createElement('input');
                inp.value = url;
                document.body.appendChild(inp);
                inp.select();
                document.execCommand('copy');
                document.body.removeChild(inp);
                showToast('Link copied');
            }
        }

        function showToast(msg) {
            const t = $('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function(){ t.classList.remove('show'); }, 2000);
        }

        audioPlayer.addEventListener('timeupdate', function() {
            if (audioPlayer.duration) {
                const pct = (audioPlayer.currentTime / audioPlayer.duration * 100) + '%';
                progressFill.style.width = pct;
                miniProgressFill.style.width = pct;
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener('loadedmetadata', function() {
            totalTimeEl.textContent = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('pause', function() {
            isPlaying = false;
            updatePlayButton();
        });

        audioPlayer.addEventListener('play', function() {
            isPlaying = true;
            updatePlayButton();
        });

        audioPlayer.addEventListener('ended', function() {
            if (repeatMode === 2) { audioPlayer.currentTime = 0; audioPlayer.play(); return; }
            if (repeatMode === 1 || currentTrackIndex < tracks.length - 1 || !reachedEnd) nextTrack();
            else { isPlaying = false; updatePlayButton(); }
        });

        trackListEl.addEventListener('scroll', function() {
            if (trackListEl.scrollTop + trackListEl.clientHeight >= trackListEl.scrollHeight - 260) {
                loadMoreTracks(false);
            }
        });

        window.addEventListener('scroll', function() {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 360) {
                loadMoreTracks(false);
            }
        });

        window.addEventListener('hashchange', function() {
            const hashId = getTrackIdFromHash();
            if (hashId) {
                const idx = tracks.findIndex(t => t.id === hashId);
                if (idx >= 0 && idx !== currentTrackIndex) loadTrack(idx, false);
                else if (idx < 0) ensureTrackLoaded(hashId);
            }
        });

        loadTracks();
    </script>
</body>
</html>
