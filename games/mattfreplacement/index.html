<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Oracle Bot — Predict & Cipher</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Segoe UI', system-ui, sans-serif; 
  background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
  min-height: 100vh; color: #e0e0ff;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
h1 { text-align: center; font-size: 2.5em; margin: 20px 0; 
     background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
     -webkit-background-clip: text; -webkit-text-fill-color: transparent;
     animation: glow 2s ease-in-out infinite alternate; }
@keyframes glow { from { filter: drop-shadow(0 0 10px #ff6b6b); } to { filter: drop-shadow(0 0 25px #48dbfb); } }

.card { 
  background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; 
  margin: 20px 0; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(100,100,255,0.15); }

label { display: block; font-weight: 600; margin-bottom: 8px; color: #feca57; font-size: 0.95em; }
textarea, input, select { 
  width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.3); color: #fff; font-size: 15px; resize: vertical;
  transition: border-color 0.3s;
}
textarea:focus, input:focus { outline: none; border-color: #48dbfb; box-shadow: 0 0 15px rgba(72,219,251,0.3); }

.btn { 
  display: inline-block; padding: 14px 32px; border: none; border-radius: 50px;
  font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s;
  margin: 6px; text-transform: uppercase; letter-spacing: 1px;
}
.btn-predict { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn-cipher { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
.btn-decipher { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
.btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
.btn:active { transform: scale(0.97); }

.prediction-box { 
  background: linear-gradient(135deg, rgba(102,126,234,0.15), rgba(118,75,162,0.15));
  border-left: 4px solid #667eea; border-radius: 0 12px 12px 0; padding: 20px; margin-top: 16px;
}
.prediction-item {
  padding: 12px 16px; margin: 8px 0; background: rgba(0,0,0,0.25); border-radius: 8px;
  display: flex; align-items: center; gap: 12px; animation: slideIn 0.4s ease-out backwards;
}
.prediction-item:nth-child(1) { animation-delay: 0.05s; }
.prediction-item:nth-child(2) { animation-delay: 0.1s; }
.prediction-item:nth-child(3) { animation-delay: 0.15s; }
.prediction-item:nth-child(4) { animation-delay: 0.2s; }
.prediction-item:nth-child(5) { animation-delay: 0.25s; }
.prediction-item:nth-child(6) { animation-delay: 0.3s; }
.prediction-item:nth-child(7) { animation-delay: 0.35s; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
.num-badge { 
  background: linear-gradient(135deg, #667eea, #764ba2); width: 28px; height: 28px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; flex-shrink: 0;
}

.cipher-output {
  background: rgba(0,0,0,0.35); border-radius: 10px; padding: 18px; margin-top: 14px;
  font-family: 'Courier New', monospace; font-size: 15px; line-height: 1.7;
  word-break: break-word; border: 1px dashed rgba(240,147,251,0.4);
  min-height: 60px;
}

.section-title { 
  display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
  font-size: 1.3em; color: #fff;
}
.emoji-icon { font-size: 1.4em; }

.tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
.tab { 
  flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 700;
  background: rgba(255,255,255,0.03); transition: all 0.3s; border: none; color: #aaa;
  font-size: 15px;
}
.tab.active { background: rgba(102,126,234,0.25); color: #fff; }
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn 0.35s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.confidence-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 6px; overflow: hidden; }
.confidence-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #667eea, #48dbfb); transition: width 0.8s ease-out; }

.footer { text-align: center; margin-top: 30px; color: rgba(255,255,255,0.3); font-size: 13px; }
.footer span { color: #ff9ff3; }

#preset-mattf { position: absolute; left: -9999px; }
</style>
</head>
<body>
<div class="container">
<h1>🔮 Oracle Bot</h1>
<p style="text-align:center;color:rgba(255,255,255,0.5);margin-bottom:24px;">Predict the future · Speak in secrets</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('predict')">🔮 Predictions</button>
  <button class="tab" onclick="switchTab('cipher')">🔐 Secret Language</button>
  <button class="tab" onclick="switchTab('decipher')">🔓 Decipher</button>
</div>

<!-- PREDICT TAB -->
<div id="tab-predict" class="tab-panel active">
  <div class="card">
    <div class="section-title"><span class="emoji-icon">🔮</span> Message Predictor</div>
    <label for="targetName">Who are we predicting?</label>
    <input type="text" id="targetName" placeholder="mattf..." value="mattf">
    
    <label for="chatHistory" style="margin-top:14px">Paste their recent messages (one per line):</label>
    <textarea id="chatHistory" rows="6" placeholder="why do you keep bothering about this&#10;stop writting prompts&#10;stop trying to use the bot now&#10;and how am I going to know it is ready again&#10;that will cause other big problems though"></textarea>
    
    <div style="text-align:center;margin-top:18px;">
      <button class="btn btn-predict" onclick="generatePredictions()">✨ Predict Next 7 Messages</button>
      <button class="btn btn-decipher" style="background:linear-gradient(135deg,#f093fb,#f5576c)" onclick="loadPreset()">🦆 Load mattf's Actual Messages</button>
    </div>
    
    <div id="predictions" class="prediction-box" style="display:none;"></div>
  </div>
</div>

<!-- CIPHER TAB -->
<div id="tab-cipher" class="tab-panel">
  <div class="card">
    <div class="section-title"><span class="emoji-icon">🔐</span> Secret Encoder</div>
    <label for="plainText">Message to encode:</label>
    <textarea id="plainText" rows="4" placeholder="Type your secret message here..."></textarea>
    
    <label style="margin-top:14px">Cipher mode:</label>
    <select id="cipherMode">
      <option value="handyc">🤫 Handyc's Private Cipher (only YOU can read)</option>
      <option value="leetspeak">💻 Leet Speak</option>
      <option value="reverse">🔄 Reversed</option>
      <option value="binary">🤖 Binary</option>
      <option value="morse">📡 Morse Code</option>
      <option value="pig">🐷 Pig Latin</option>
      <option value="scramble">🎲 Scramble</option>
    </select>
    
    <div style="text-align:center;margin-top:18px;">
      <button class="btn btn-cipher" onclick="encodeMessage()">🔒 Encode</button>
    </div>
    
    <div id="cipherResult" class="cipher-output" style="display:none;"></div>
  </div>
</div>

<!-- DECIPHER TAB -->
<div id="tab-decipher" class="tab-panel">
  <div class="card">
    <div class="section-title"><span class="emoji-icon">🔓</span> Secret Decoder</div>
    <label for="cipherText">Encoded message:</label>
    <textarea id="cipherText" rows="4" paste your encoded message here..."></textarea>
    
    <label style="margin-top:14px">Cipher mode:</label>
    <select id="decipherMode">
      <option value="handyc">🤫 Handyc's Private Cipher</option>
      <option value="leetspeak">💻 Leet Speak</option>
      <option value="reverse">🔄 Reversed</option>
      <option value="binary">🤖 Binary</option>
      <option value="morse">📡 Morse Code</option>
      <option value="pig">🐷 Pig Latin</option>
      <option value="scramble">🎲 Scramble</option>
    </select>
    
    <div style="text-align:center;margin-top:18px;">
      <button class="btn btn-decipher" onclick="decodeMessage()">🔓 Decode</button>
    </div>
    
    <div id="decipherResult" class="cipher-output" style="display:none;"></div>
  </div>
</div>

<div class="footer">Built with 💜 by <span>Oracle Bot</span> · Your gold nugget, delivered</div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', 
    ['predict','cipher','decipher'][i] === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

// ============ PREDICTION ENGINE ============
const predictionTemplates = [
  // Frustrated
  ["why is this still happening", "i told you to stop", "this is exactly what i was worried about", "can we please move on", "im done with this", "*sigh*", "forget it"],
  // Technical
  ["the persistence thing would break everything", "i need to restart it", "how do i even explain this", "there are too many edge cases", "the api limit is going to be a problem", "memory isnt reliable enough", "we need a better solution"],
  // Tired
  ["im going to bed", "someone else handle this", "tomorrow maybe", "i dont have energy for this", "wake me when its fixed", "coffee first", "why am i still awake"],
  // Confused
  ["what are you even talking about", "that makes no sense", "did you read what i wrote", "youre missing the point", "ok but why though", "explain it like im five", "i have no idea"],
  // Mattf-specific vibes
  ["stop writing prompts", "dont use the bot right now", "it isnt ready yet", "wait for the restart", "the claim is redundant", "persistence set on", "get the last duck"]
];

function generatePredictions() {
  const name = document.getElementById('targetName').value || 'them';
  const history = document.getElementById('chatHistory').value.trim();
  
  if (!history) {
    alert("Paste some messages first! Give me material to work with 🔮");
    return;
  }
  
  // Analyze the input
  const lines = history.split('\n').filter(l => l.trim());
  const hasFrustration = /\b(stop|don't|can't|won't|broken|problem|issue)\b/i.test(history);
  const hasTechnical = /\b(persistent|restart|api|memory|commit|prompt|bot)\b/i.test(history);
  const hasTired = /\b(bed|sleep|done|enough|maybe|later)\b/i.test(history);
  const lineCount = lines.length;
  const avgLength = lines.reduce((s,l) => s + l.length, 0) / Math.max(lineCount,1);
  
  // Pick best template set based on analysis
  let pool;
  if (hasTechnical && hasFrustration) pool = predictionTemplates[1];
  else if (hasTired || avgLength < 20) pool = predictionTemplates[2];
  else if (hasFrustration) pool = predictionTemplates[0];
  else if (lineCount > 6) pool = predictionTemplates[4]; // mattf vibes
  else pool = predictionTemplates[3];
  
  // Shuffle and pick 7
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  // Ensure at least one matches the vibe
  let predictions = shuffled.slice(0, 7);
  
  // Inject context-aware ones
  if (/prompt/i.test(history)) predictions[0] = "stop writing prompts";
  if (/persistent/i.test(history)) predictions[1] = "persistence will cause other problems";
  if (/restart/i.test(history)) predictions[2] = "how will i know its ready again";
  
  const confidences = [92, 84, 76, 68, 61, 54, 47];
  const colors = ['#667eea','#7c8cf0','#92a3f6','#a8b5fc','#bec7ff','#d4daff','#eaedff'];
  
  let html = `<div style="font-weight:700;margin-bottom:14px;color:#feca57;">
    🔮 ${name}'s next 7 predicted messages:</div>`;
  
  predictions.forEach((pred, i) => {
    html += `<div class="prediction-item">
      <div class="num-badge">${i+1}</div>
      <div style="flex:1">
        <div>"<strong>${pred}</strong>"</div>
        <div class="confidence-bar"><div class="confidence-fill" style="width:${confidences[i]}%;background:${colors[i]}"></div></div>
        <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px">${confidences[i]}% confidence</div>
      </div>
    </div>`;
  });
  
  html += `<div style="margin-top:16px;padding:14px;background:rgba(254,202,87,0.1);border-radius:10px;font-size:13px;color:rgba(255,255,255,0.6);">
    ⚠️ <em>Disclaimer: This is entertainment magic, not actual precognition. The oracle accepts no liability for wrong guesses.</em></div>`;
  
  const el = document.getElementById('predictions');
  el.innerHTML = html;
  el.style.display = 'block';
}

function loadPreset() {
  document.getElementById('targetName').value = 'mattf';
  document.getElementById('chatHistory').value = `why do you keep bothering about this
stop writting prompts
stop trying to use the bot now
and how am I going to know it is ready again
that will cause other big problems though
if I did the persistence thing I would need to say I'm ready again
so yeah at least explain what is the advantage Valware, I really dont see it`;
  generatePredictions();
}

// ============ CIPHER SYSTEM ============
const HANDYC_KEY = 'h4ndYc_s3cr3t_0n1y';

function handycEncode(text) {
  let out = '';
  for (let i = 0; i < text.length; i++) {
    const c = text.charCodeAt(i);
    const k = HANDYC_KEY.charCodeAt(i % HANDYC_KEY.length);
    out += String.fromCharCode(c ^ k).toString(16).padStart(4,'0');
  }
  return '§' + btoa(out) + '§';
}

function handycDecode(text) {
  try {
    const inner = text.replace(/§/g,'');
    const raw = atob(inner);
    let out = '';
    for (let i = 0; i < raw.length; i += 4) {
      const code = parseInt(raw.substr(i, 4), 16);
      const k = HANDYC_KEY.charCodeAt((i/4) % HANDYC_KEY.length);
      out += String.fromCharCode(code ^ k);
    }
    return out;
  } catch(e) { return '⚠️ Failed to decode — wrong key or corrupted message'; }
}

function leetEncode(text) {
  return text.replace(/a/gi,'4').replace(/e/gi,'3').replace(/i/gi,'1')
    .replace(/o/gi,'0').replace(/s/gi,'5').replace(/t/gi,'7')
    .replace(/l/gi,'1').replace(/g/gi,'9');
}

function leetDecode(text) {
  return text.replace(/4/g,'a').replace(/3/g,'e').replace(/1/g,'i')
    .replace(/0/g,'o').replace(/5/g,'s').replace(/7/g,'t');
}

function binaryEncode(text) {
  return text.split('').map(c => c.charCodeAt(0).toString(2).padStart(8,'0')).join(' ');
}

function binaryDecode(text) {
  return text.split(' ').map(b => String.fromCharCode(parseInt(b,2))).join('');
}

function morseEncode(text) {
  const m = {a:'·−',b:'−···',c:'−·−·',d:'−··',e:'·',f:'··−·',g:'−−·',h:'····',
    i:'··',j:'·−−−',k:'−·−',l:'·−··',m:'−−',n:'−·',o:'−−−',p:'·−−·',
    q:'−−·−',r:'·−·',s:'···',t:'−',u:'··−',v:'···−',w:'·−−',
    x:'−··−',y:'−·−−',z:'−−··',' ':'/'};
  return text.toLowerCase().split('').map(c=>m[c]||c).join(' ');
}

function morseDecode(text) {
  const m = {'·−':'a','−···':'b','−·−·':'c','−··':'d','·':'e','··−·':'f',
    '−−·':'g','····':'h','··':'i','·−−−':'j','−·−':'k','·−··':'l','−−':'m',
    '−·':'n','−−−':'o','·−−·':'p','−−·−':'q','·−·':'r','···':'s','−':'t',
    '··−':'u','···−':'v','·−−':'w','−··−':'x','−·−−':'y','−−··':'z'};
  return text.split(' ').map(c=>m[c]||c).join('').toUpperCase();
}

function pigEncode(text) {
  return text.split(' ').map(w => {
    if (!/^[a-zA-Z]+$/.test(w)) return w;
    return w.slice(1)+w[0]+'ay';
  }).join(' ');
}

function pigDecode(text) {
  return text.split(' ').map(w => {
    if (!w.endsWith('ay') || w.length < 3) return w;
    return w[w.length-3]+w.slice(0,-3);
  }).join(' ');
}

function scrambleEncode(text) {
  return text.split('').map((c,i) => 
    String.fromCharCode(c.charCodeAt(i) + (i%7)+1)
  ).join('');
}

function scrambleDecode(text) {
  return text.split('').map((c,i) => 
    String.fromCharCode(c.charCodeAt(i) - (i%7)-1)
  ).join('');
}

const encoders = { handyc:handycEncode, leetspeak:leetEncode, reverse:t=>[...t].reverse().join(''), binary:binaryEncode, morse:morseEncode, pig:pigEncode, scramble:scrambleEncode };
const decoders = { handyc:handycDecode, leetspeak:leetDecode, reverse:t=>[...t].reverse().join(''), binary:binaryDecode, morse:morseDecode, pig:pigDecode, scramble:scrambleDecode };

function encodeMessage() {
  const text = document.getElementById('plainText').value;
  const mode = document.getElementById('cipherMode').value;
  if (!text) return;
  const result = encoders[mode](text);
  const el = document.getElementById('cipherResult');
  el.innerHTML = `<div style="color:#f093fb;margin-bottom:8px">🔒 Encoded (${mode} mode):</div>${result}`;
  el.style.display = 'block';
}

function decodeMessage() {
  const text = document.getElementById('cipherText').value;
  const mode = document.getElementById('decipherMode').value;
  if (!text) return;
  const result = decoders[mode](text);
  const el = document.getElementById('decipherResult');
  el.innerHTML = `<div style="color:#4facfe;margin-bottom:8px">🔓 Decoded (${mode} mode):</div>${result}`;
  el.style.display = 'block';
}
</script>
</body>
</html>
