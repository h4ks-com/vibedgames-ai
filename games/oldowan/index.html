const W = 640, H = 480;
// offscreen buffer lets us do screen-shake without re-drawing

// CGA/EGA-inspired 16-color palette
const P = ['#000000','#0000AA','#00AA00','#00AAAA','#AA0000','#AA00AA','#AA5500','#AAAAAA',
           '#555555','#5555FF','#55FF55','#55FFFF','#FF5555','#FF55FF','#FFFF55','#FFFFFF'];

function rect(x,y,w,h,c){G.fillStyle=P[c];G.fillRect(x|0,y|0,w|0,h|0);}
function pset(x,y,c){G.fillStyle=P[c];G.fillRect(x|0,y|0,1,1);}
function pset2(x,y,c){G.fillStyle=P[c];G.fillRect(x|0,y|0,2,2);}
function clr(c){G.fillStyle=P[c||0];G.fillRect(0,0,W,H);}
function box(x,y,w,h,fg,bg){ if(bg!==undefined)rect(x,y,w,h,bg); rect(x,y,w,2,fg); rect(x,y+h-2,w,2,fg); rect(x,y,2,h,fg); rect(x+w-2,y,2,h,fg); }
function box1(x,y,w,h,fg,bg){ if(bg!==undefined)rect(x,y,w,h,bg); rect(x,y,w,1,fg); rect(x,y+h-1,w,1,fg); rect(x,y,1,h,fg); rect(x+w-1,y,1,h,fg); }
function line(x0,y0,x1,y1,c){
  let dx=Math.abs(x1-x0),sx=x0<x1?1:-1;
  let dy=-Math.abs(y1-y0),sy=y0<y1?1:-1;
  let err=dx+dy,e2;
  while(true){ pset(x0,y0,c); if(x0===x1&&y0===y1)break; e2=2*err; if(e2>=dy){err+=dy;x0+=sx;} if(e2<=dx){err+=dx;y0+=sy;} }
}

// Font stack: bold, mono, slightly oversized for readability.
// Text is rendered natively by the browser, then blitted without smoothing
// so it stays crisp at 640x480 but still reads as "old school" next to our
// chunky sprites.
const FONT_MAIN = '"Courier New","DejaVu Sans Mono","Consolas",monospace';

// draw text with subtle outline for legibility over any background
function text(s,x,y,c,sz,outline){
  const size = sz||16;
  G.font = 'bold '+size+'px '+FONT_MAIN;
  if(outline!==false){
    G.fillStyle = P[0];
    // 4-way cheap outline
    G.fillText(s,x+1,y); G.fillText(s,x-1,y); G.fillText(s,x,y+1); G.fillText(s,x,y-1);
  }
  G.fillStyle = P[c==null?15:c];
  G.fillText(s,x,y);
}
function textPlain(s,x,y,c,sz){
  G.font = 'bold '+(sz||16)+'px '+FONT_MAIN;
  G.fillStyle = P[c==null?15:c];
  G.fillText(s,x,y);
}
function textC(s,y,c,sz,outline){
  const size = sz||18;
  G.font = 'bold '+size+'px '+FONT_MAIN;
  const w = G.measureText(s).width;
  text(s,((W-w)/2)|0,y,c,size,outline);
}
function textW(s,x,y,w,c,sz,lh){
  const size = sz||16;
  const lineH = lh||(size+4);
  G.font = 'bold '+size+'px '+FONT_MAIN;
  const words = s.split(' ');
  let line='', ly=y;
  for(const word of words){
    const tryLine = line?line+' '+word:word;
    if(G.measureText(tryLine).width > w){
      text(line,x,ly,c,size);
      ly += lineH;
      line = word;
    } else line = tryLine;
  }
  if(line) text(line,x,ly,c,size);
  return ly + lineH;
}
// big "logo" / title text
function textTitle(s,y,c){
  const size=56;
  G.font = 'bold '+size+'px '+FONT_MAIN;
  const w = G.measureText(s).width;
  const x = ((W-w)/2)|0;
  // thick shadow
  G.fillStyle = P[0];
  for(let dx=-2;dx<=2;dx++) for(let dy=-2;dy<=2;dy++) if(dx||dy) G.fillText(s,x+dx,y+dy);
  G.fillStyle = P[c==null?14:c];
  G.fillText(s,x,y);
  G.fillStyle = P[15];
  G.fillText(s,x-1,y-1);
}

// AUDIO - PC-speaker style beeper
// ============================================================
let AC, MASTER, mute=false, bgmTimer=null, bgmIdx=0;
function audioInit(){
  if(AC) return;
  try{ AC = new (window.AudioContext||window.webkitAudioContext)();
       MASTER = AC.createGain(); MASTER.gain.value=0.5; MASTER.connect(AC.destination); }catch(e){}
}
function beep(freq,dur,type,vol){
  if(!AC||mute) return;
  const o=AC.createOscillator(); const gn=AC.createGain();
  o.type=type||'square'; o.frequency.value=freq;
  const t=AC.currentTime;
  gn.gain.setValueAtTime(0,t);
  gn.gain.linearRampToValueAtTime(vol==null?0.12:vol, t+0.004);
  gn.gain.exponentialRampToValueAtTime(0.0001, t+(dur||0.1));
  o.connect(gn); gn.connect(MASTER);
  o.start(t); o.stop(t+(dur||0.1)+0.02);
}
function noise(dur,vol){
  if(!AC||mute) return;
  const bs=AC.sampleRate*(dur||0.15)|0;
  const buf=AC.createBuffer(1,bs,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bs;i++) d[i]=(Math.random()*2-1)*(1-i/bs);
  const src=AC.createBufferSource(); src.buffer=buf;
  const gn=AC.createGain(); gn.gain.value=vol==null?0.18:vol;
  src.connect(gn); gn.connect(MASTER);
  src.start();
}
function nt(n){
  if(n===0) return 0;
  const m=(''+n).match(/^([A-G])([#b]?)(-?\d)$/);
  if(!m) return 0;
  const base={C:0,D:2,E:4,F:5,G:7,A:9,B:11}[m[1]];
  const sh=m[2]==='#'?1:m[2]==='b'?-1:0;
  return 440*Math.pow(2,(base+sh+(+m[3]-4)*12-9)/12);
}

let curBGM=null;
function bgmStart(track){
  bgmStop();
  if(!AC||mute) return;
  curBGM=track; bgmIdx=0;
  const step = ()=>{
    if(curBGM!==track) return;
    const n = track[bgmIdx%track.length];
    bgmIdx++;
    if(n[0]!==0){
      const o=AC.createOscillator(); const gn=AC.createGain();
      o.type='square'; o.frequency.value=nt(n[0]);
      const t=AC.currentTime;
      gn.gain.setValueAtTime(0,t);
      gn.gain.linearRampToValueAtTime(0.035,t+0.01);
      gn.gain.exponentialRampToValueAtTime(0.001,t+0.22*n[1]);
      o.connect(gn); gn.connect(MASTER);
      o.start(t); o.stop(t+0.25*n[1]+0.02);
    }
    bgmTimer = setTimeout(step, 220*n[1]);
  };
  step();
}
function bgmStop(){ if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;} curBGM=null; }

function drawSpr(name,x,y,s,flip){
  const spr=SPR[name]; if(!spr) return;
  s=s||1;
  for(let ry=0;ry<spr.length;ry++){
    const row=spr[ry];
    for(let rx=0;rx<row.length;rx++){
      const ch=row[rx];
      if(ch===' ') continue;
      const ci=parseInt(ch,16);
      if(isNaN(ci)) continue;
      const dx = flip ? x + (row.length-1-rx)*s : x + rx*s;
      rect(dx,y+ry*s,s,s,ci);
    }
  }
}

let STATE = 'title';
let FRAME = 0;
let G_pending_combat = null;
let G_msg = '';
let G_msgQueue = [];
let G_flash = 0;
let G_shake = 0;

const PLAYER = {
  name:'', hp:60, hpmax:60, hu:80, th:80, en:100, skl:0,
  day:1, dist:0, dest:180, inv:{}, equipped:'digstick',
  karma:0, charmed:false, sick:0, alive:true, causeofdeath:'',
};

function E(k){ return Object.assign({},ENEMIES[k]); }
function pickEnemy(keys){ return E(keys[(Math.random()*keys.length)|0]); }
function rnd(a,b){ return (a + Math.random()*(b-a+1))|0; }
function roll(d){ return 1 + (Math.random()*d)|0; }

function addItem(p,k,n){
  n = n==null?1:n;
  p.inv[k] = (p.inv[k]||0) + n;
  SFX.pickup();
  pushMsg('+'+n+' '+ITEMS[k].n);
}
function hasItem(p,k,n){ return (p.inv[k]||0) >= (n||1); }
function consumeItem(p,k,n){
  n=n==null?1:n;
  if(!hasItem(p,k,n)) return false;
  p.inv[k]-=n;
  if(p.inv[k]<=0) delete p.inv[k];
  if(p.equipped===k && !p.inv[k]) p.equipped='digstick';
  return true;
}
function totalWeight(p){
  let w=0;
  for(const k in p.inv){ if(ITEMS[k]) w += (ITEMS[k].w||0)*p.inv[k]; }
  return w;
}
function pushMsg(m){ if(m) G_msgQueue.push(m); }

const KEYS = {};
const PRESSED = {};
window.addEventListener('keydown',e=>{
  audioInit();
  const k=e.key.toLowerCase();
  if(!KEYS[k]) PRESSED[k]=true;
  KEYS[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' ','enter','escape','tab'].includes(k)) e.preventDefault();
  if(k==='m'){ mute=!mute; if(mute)bgmStop(); else startStateBGM(); }
});
window.addEventListener('keyup',e=>{ KEYS[e.key.toLowerCase()]=false; });
CV.addEventListener('click',()=>{ audioInit(); CV.focus(); });
function anyKey(){ for(const k in PRESSED) if(PRESSED[k]) return k; return null; }
function consumeKey(k){ delete PRESSED[k]; }
function pollKey(){ const k=anyKey(); if(k) consumeKey(k); return k; }

function drawLandscape(kind){
  clr(0);
  switch(kind){
    case 'savanna': drawSavanna(); break;
    case 'wood':    drawWoodland(); break;
    case 'river':   drawRiver(); break;
    case 'plain':   drawPlain(); break;
    case 'rock':    drawRock(); break;
    case 'lava':    drawLava(); break;
    case 'gorge':   drawGorge(); break;
    case 'water':   drawRiver(); break;
    case 'storm':   drawStorm(); break;
    case 'stars':   drawStars(); break;
    case 'baobab':  drawSavanna(); drawBaobab(380,180); break;
    default:        drawSavanna();
  }
}

  drawSpr(frame===0?'player':'player_walk', 80, 300, 5);

function doTravelMenu(){
  drawTravelMenu();
  const k=pollKey();
  if(!k) return;
  if(k==='arrowup'||k==='w'){ menuIdx=(menuIdx+TRAVEL_MENU.length-1)%TRAVEL_MENU.length; SFX.menu(); }
  else if(k==='arrowdown'||k==='s'){ menuIdx=(menuIdx+1)%TRAVEL_MENU.length; SFX.menu(); }
  else if(k>='1'&&k<='9'){ const i=+k-1; if(i<TRAVEL_MENU.length){menuIdx=i; pickTravelOption(TRAVEL_MENU[i].k);} }
  else if(k==='enter'||k===' '){ pickTravelOption(TRAVEL_MENU[menuIdx].k); }
}

function pickTravelOption(k){
  SFX.select();
  if(k==='continue'){ travelPhase=1; walkTicks=0; parallax=0; }
  else if(k==='rest'){ STATE='rest'; }
  else if(k==='forage'){ STATE='forage'; }
  else if(k==='craft'){ STATE='craft'; craftIdx=0; }
  else if(k==='inv'){ STATE='inv'; invIdx=0; }
  else if(k==='status'){ STATE='status'; }
}

function doTravelWalk(){
  drawTravelBG();
  drawHud();
  textC('...  T R A V E L I N G  ...', 20, 15, 22);
  parallax += 2.4;
  walkTicks++;
  if(walkTicks%10===0) SFX.step();
  if(walkTicks>60){
    const dd = rnd(3,6) - Math.max(0, (totalWeight(PLAYER)-14)/4 | 0);
    PLAYER.dist = Math.min(PLAYER.dest, PLAYER.dist + Math.max(1,dd));
    PLAYER.day++;
    PLAYER.hu -= rnd(5,9);
    PLAYER.th -= rnd(6,10);
    PLAYER.en -= rnd(4,7);
    if(PLAYER.sick>0){ PLAYER.hp -= Math.ceil(PLAYER.sick/6); PLAYER.sick--; }
    if(PLAYER.hu<=0){ PLAYER.hu=0; PLAYER.hp-=3; }
    if(PLAYER.th<=0){ PLAYER.th=0; PLAYER.hp-=4; }
    if(PLAYER.en<=0){ PLAYER.en=0; PLAYER.hp-=2; }
    checkDeath('the long miles');
    if(!PLAYER.alive) return;
    if(PLAYER.dist >= PLAYER.dest){ STATE='victory'; bgmStop(); SFX.win(); return; }
    const r=Math.random();
    if(r<0.72){ startEvent(); }
    else{ travelPhase=0; pushMsg('A quiet day passes.'); }
  }
}

let CUR_EVENT = null;
let evtIdx=0;
function startEvent(){
  const st = currentStage();
  const pool = EVENTS.filter(e => e.terr.includes(st.kind));
  if(pool.length===0){ travelPhase=0; return; }
  const total = pool.reduce((s,e)=>s+(e.weight||1),0);
  let r = Math.random()*total;
  let picked = pool[0];
  for(const e of pool){ r -= (e.weight||1); if(r<=0){ picked=e; break; } }
  CUR_EVENT = picked;
  STATE = 'event';
  evtIdx = 0;
  SFX.menu();
}

function doEvent(){
  const e = CUR_EVENT;
  const st = currentStage();
  drawLandscape(e.art||st.kind);
  box(30,30,W-60,H-HUD_H-60,15,0);
  textC('- TRAIL EVENT -', 50, 14, 24);
  const last = textW(e.txt, 50, 100, W-100, 15, 18, 24);
  const optsY = Math.max(last+16, 230);
  for(let i=0;i<e.opts.length;i++){
    const o=e.opts[i];
    const sel=i===evtIdx;
    const y=optsY+i*34;
    if(sel){ rect(40,y-4,W-80,30,1); text('>',48,y,14,22); }
    text((i+1)+'. '+o.lbl, 72, y, sel?14:15, 20);
  }
  drawHud();
  const k=pollKey();
  if(!k) return;
  if(k==='arrowup'||k==='w'){ evtIdx=(evtIdx+e.opts.length-1)%e.opts.length; SFX.menu(); }
  else if(k==='arrowdown'||k==='s'){ evtIdx=(evtIdx+1)%e.opts.length; SFX.menu(); }
  else if(k>='1'&&k<='9'){ const i=+k-1; if(i<e.opts.length){ evtIdx=i; resolveEvent(e.opts[i]); } }
  else if(k==='enter'||k===' '){ resolveEvent(e.opts[evtIdx]); }
}

function resolveEvent(opt){
  SFX.select();
  const msg = opt.fn(PLAYER) || '';
  if(msg) pushMsg(msg);
  if(G_pending_combat){ startCombat(G_pending_combat.enemy, G_pending_combat.reward); G_pending_combat=null; return; }
  checkDeath('the dangers of the trail');
  if(!PLAYER.alive) return;
  travelPhase=0;
  STATE='travel';
}

function doCombat(){
  drawCombat();
  if(COMBAT.playerAnim>0) COMBAT.playerAnim--;
  if(COMBAT.playerAnim<0) COMBAT.playerAnim++;
  if(COMBAT.enemyAnim>0) COMBAT.enemyAnim--;
  if(COMBAT.enemyAnim<0) COMBAT.enemyAnim++;

  if(COMBAT.turn==='enemy'){ enemyTurn(); return; }
  if(COMBAT.turn==='end'){ endCombat(); return; }

  const k = pollKey();
  if(!k) return;
  if(cmbSubmenu==='item'){
    if(k==='escape'||k==='backspace'){ cmbSubmenu=null; SFX.back(); return; }
    const usable=[];
    for(const ik in PLAYER.inv){ const it=ITEMS[ik]; if(it.heal||it.food||it.drink||it.throw||it.wep) usable.push(ik); }
    if(k==='arrowleft'||k==='a'){ cmbItemIdx=(cmbItemIdx+usable.length-1)%Math.max(1,usable.length); SFX.menu(); }
    else if(k==='arrowright'||k==='d'){ cmbItemIdx=(cmbItemIdx+1)%Math.max(1,usable.length); SFX.menu(); }
    else if(k>='1'&&k<='9'){ const i=+k-1; if(i<usable.length){cmbItemIdx=i; applyCombatItem(usable[i]); cmbSubmenu=null;} }
    else if(k==='enter'||k===' '){ if(usable[cmbItemIdx]){ applyCombatItem(usable[cmbItemIdx]); cmbSubmenu=null;} }
    return;
  }
  if(k==='arrowleft'||k==='a'){ cmbIdx=(cmbIdx+COMBAT_MENU.length-1)%COMBAT_MENU.length; SFX.menu(); }
  else if(k==='arrowright'||k==='d'){ cmbIdx=(cmbIdx+1)%COMBAT_MENU.length; SFX.menu(); }
  else if(k>='1'&&k<='9'){ const i=+k-1; if(i<COMBAT_MENU.length){ cmbIdx=i; pickCombat(COMBAT_MENU[i].k);} }
  else if(k==='enter'||k===' '){ pickCombat(COMBAT_MENU[cmbIdx].k); }
}

function pickCombat(k){
  SFX.select();
  if(k==='attack'){ playerAttack(); }
  else if(k==='throw'){ playerThrow(); }
  else if(k==='defend'){ playerDefend(); }
  else if(k==='item'){ cmbSubmenu='item'; cmbItemIdx=0; }
  else if(k==='flee'){ playerFlee(); }
}

function addLog(m){ COMBAT.log.push(m); if(COMBAT.log.length>20) COMBAT.log.shift(); }
function playerAttack(){
  const wep = ITEMS[PLAYER.equipped] || {atk:[1,2], n:'fists'};
  const hitRoll = roll(20) + PLAYER.skl + (PLAYER.charmed?2:0);
  const dodge = 10 + COMBAT.e.def;
  if(hitRoll >= dodge){
    const dmg = rnd(wep.atk?wep.atk[0]:1, wep.atk?wep.atk[1]:2) + ((hitRoll===20)?3:0);
    COMBAT.ehp -= dmg;
    addLog('You strike with '+wep.n+' ('+dmg+')'+(hitRoll===20?' CRIT!':''));
    SFX.hit(); if(hitRoll===20) SFX.crit();
    COMBAT.enemyAnim = -10;
    G_shake = 4;
  } else { addLog('You miss!'); SFX.miss(); }
  nextTurn();
}
function playerThrow(){
  if(!consumeItem(PLAYER,'thrownstone',1) && !consumeItem(PLAYER,'flake',1) && !consumeItem(PLAYER,'obsidian',1) && !consumeItem(PLAYER,'shell_edge',1)){
    addLog('Nothing to throw!');
    return;
  }
  const hr = roll(20) + 2;
  if(hr >= 10 + COMBAT.e.def){
    const d = rnd(1,5) + PLAYER.skl;
    COMBAT.ehp -= d;
    addLog('Stone hits! ('+d+')');
    SFX.stone();
    COMBAT.enemyAnim = -8;
  } else { addLog('Stone flies wide.'); SFX.miss(); }
  nextTurn();
}
function playerDefend(){
  COMBAT.defending = true;
  addLog('You raise your guard.');
  PLAYER.en = Math.min(100, PLAYER.en+3);
  nextTurn();
}
function applyCombatItem(k){
  const it=ITEMS[k];
  if(it.heal){ PLAYER.hp=Math.min(PLAYER.hpmax,PLAYER.hp+it.heal); consumeItem(PLAYER,k,1); addLog('You eat '+it.n+'. +'+it.heal+' HP'); SFX.heal(); }
  else if(it.food){ PLAYER.hu=Math.min(100,PLAYER.hu+it.food); consumeItem(PLAYER,k,1); addLog('You eat '+it.n); SFX.heal(); }
  else if(it.drink){ PLAYER.th=Math.min(100,PLAYER.th+it.drink); consumeItem(PLAYER,k,1); addLog('You drink.'); SFX.heal(); }
  else if(it.wep){ PLAYER.equipped = k; addLog('You wield '+it.n); SFX.select(); }
  else if(it.throw){ consumeItem(PLAYER,k,1); const d=rnd(1,5); COMBAT.ehp-=d; addLog('You hurl '+it.n+'! ('+d+')'); SFX.stone(); COMBAT.enemyAnim=-8; }
  nextTurn();
}
function playerFlee(){
  const hr = roll(20) + Math.floor(PLAYER.en/15) - COMBAT.e.spd;
  if(hr >= 8){
    addLog('You flee!'); COMBAT.fled = true;
    PLAYER.en = Math.max(0, PLAYER.en-15);
    COMBAT.turn='end';
  } else { addLog('Cannot escape!'); SFX.miss(); nextTurn(); }
}
function nextTurn(){
  if(COMBAT.ehp<=0){ COMBAT.turn='end'; addLog('The '+COMBAT.e.n+' falls!'); return; }
  COMBAT.turn='enemy'; COMBAT.enemyTimer = 40;
}
function enemyTurn(){
  if(COMBAT.enemyTimer===undefined){ COMBAT.enemyTimer=40; return; }
  COMBAT.enemyTimer--;
  if(COMBAT.enemyTimer>0) return;
  const e = COMBAT.e;
  const hr = roll(20) + 4;
  if(hr >= 12 - (PLAYER.skl)){
    let dmg = rnd(e.atk[0], e.atk[1]);
    if(hasItem(PLAYER,'cloak')) dmg=Math.max(1,dmg-2);
    else if(hasItem(PLAYER,'hide')) dmg=Math.max(1,dmg-1);
    if(COMBAT.defending) dmg=Math.max(1,(dmg/2)|0);
    PLAYER.hp -= dmg;
    addLog(e.n+' hits you! ('+dmg+')');
    SFX.hit();
    COMBAT.playerAnim = 10; G_shake = 4;
    if(e.venom && Math.random()<0.5){ PLAYER.sick = (PLAYER.sick||0) + 6*e.venom; addLog('VENOM flows through your veins!'); }
  } else { addLog(e.n+' misses.'); SFX.miss(); }
  COMBAT.defending = false;
  COMBAT.turn='choose';
  COMBAT.enemyTimer=undefined;
  if(PLAYER.hp<=0){ PLAYER.causeofdeath = 'the fangs of '+e.n; PLAYER.alive=false; STATE='dead'; bgmStop(); SFX.die(); }
}
function endCombat(){
  if(!COMBAT.fled && COMBAT.ehp<=0){
    const e = COMBAT.e;
    const drops = Object.assign({}, COMBAT.reward);
    if(e.art==='sabertoothcat'||e.art==='lion'||e.art==='leopard'){ drops.hide=(drops.hide||0)+1; drops.rawmeat=(drops.rawmeat||0)+2; drops.boneclub=(drops.boneclub||0)+(Math.random()<0.3?1:0); }
    if(e.art==='hyena'||e.art==='dog'){ drops.hide=(drops.hide||0)+1; drops.boneclub=(drops.boneclub||0)+(Math.random()<0.2?1:0); }
    if(e.art==='hippo'){ drops.rawmeat=(drops.rawmeat||0)+4; drops.hide=(drops.hide||0)+2; }
    if(e.art==='croc'){ drops.rawmeat=(drops.rawmeat||0)+3; drops.hide=(drops.hide||0)+1; }
    if(e.art==='elephant'){ drops.rawmeat=(drops.rawmeat||0)+6; drops.boneclub=(drops.boneclub||0)+1; drops.marrow=(drops.marrow||0)+3; }
    if(e.art==='hominid'){ drops.flake=(drops.flake||0)+rnd(1,3); drops.chopper=(drops.chopper||0)+(Math.random()<0.5?1:0); drops.hammerstone=(drops.hammerstone||0)+(Math.random()<0.3?1:0); }
    if(e.art==='snake'){ drops.rawmeat=(drops.rawmeat||0)+1; }
    if(e.art==='baboon'){ drops.rawmeat=(drops.rawmeat||0)+1; drops.hide=(drops.hide||0)+(Math.random()<0.4?1:0); }
    if(e.art==='bird'){ drops.rawmeat=(drops.rawmeat||0)+1; }
    for(const k in drops){ if(drops[k]>0) addItem(PLAYER,k,drops[k]); }
    PLAYER.skl += 1;
    pushMsg('Victory! +1 skill.');
  }
  bgmStop(); bgmStart(BGM_TRAVEL);
  COMBAT=null;
  checkDeath('the trail');
  if(!PLAYER.alive) return;
  STATE='travel'; travelPhase=0;
}

function doGather(){
  PLAYER.en -= 8; PLAYER.day++;
  PLAYER.hu -= 4; PLAYER.th -= 4;
  const st = currentStage();
  const pool = st.kind==='river'?['shell_edge','cord','water']:
               st.kind==='wood'?['figs','tuber','herb','cord','termite']:
               st.kind==='savanna'||st.kind==='plain'?['tuber','berries','termite','locust']:
               st.kind==='rock'||st.kind==='lava'?['ochre','obsidian','herb']:
               ['tuber','berries'];
  const k = pool[(Math.random()*pool.length)|0];
  const n = rnd(1,3);
  addItem(PLAYER,k,n);
  if(Math.random()<0.15){
    const opts = ['adder','hyena','baboon'];
    const en = E(opts[(Math.random()*opts.length)|0]);
    pushMsg('Foraging disturbed something!');
    startCombat(en, {}); return;
  }
  pushMsg('Gathered '+n+' '+ITEMS[k].n);
  STATE='travel'; travelPhase=0;
}
function doHunt(){
  PLAYER.en -= 12; PLAYER.day++;
  PLAYER.hu -= 6; PLAYER.th -= 6;
  const st = currentStage();
  const hr = roll(20) + PLAYER.skl + (hasItem(PLAYER,'boneclub')?2:0);
  if(hr >= 14){
    const n = rnd(1,3);
    addItem(PLAYER,'rawmeat',n);
    if(hasItem(PLAYER,'hammerstone')||hasItem(PLAYER,'chopper')) addItem(PLAYER,'marrow',1);
    if(Math.random()<0.2) addItem(PLAYER,'hide',1);
    pushMsg('Good hunt! Meat secured.');
    STATE='travel'; travelPhase=0;
  } else if(hr >= 8){
    addItem(PLAYER,'rawmeat',1);
    pushMsg('Small kill. A hare or rodent.');
    STATE='travel'; travelPhase=0;
  } else {
    pushMsg('The hunt goes badly!');
    const opts = st.kind==='river'?['croc','hippo']:
                 st.kind==='rock'||st.kind==='lava'?['leopard','hyena']:
                 ['hyena','leopard','lion','megantereon','wilddog'];
    startCombat(E(opts[(Math.random()*opts.length)|0]), {});
  }
}

   fn:p=>{ if(consumeItem(p,'tinder',1)){ if(Math.random()<0.35+p.skl*0.05){ addItem(p,'ember',1); return 'Sparks catch! EMBERS born.';} return 'The tinder chars but dies.';} return 'Needs dry tinder.';}},
  {id:'thrownstone', name:'GATHER THROWING STONES', req:{},
   fn:p=>{ p.en-=2; const n=rnd(2,4); addItem(p,'thrownstone',n); return 'Gathered '+n+' throwing stones.';}},
];
let craftIdx = 0;
function doCraft(){
  drawLandscape(currentStage().kind);
  for(let i=0;i<W;i+=3) for(let j=0;j<H;j+=3) pset2(i,j,0);
  box(20,20,W-40,H-HUD_H-40,15,0);
  textC('- KNAP  STONE -', 40, 14, 28);
  text('Select a recipe. Costs materials.', 40, 80, 7, 16);
  for(let i=0;i<CRAFT_RECIPES.length;i++){
    const r = CRAFT_RECIPES[i]; const sel=i===craftIdx;
    const x = 40 + (i%2)*290;
    const y = 110 + ((i/2)|0)*30;
    if(sel) rect(x-4,y-3,285,24,1);
    text((i+1)+'.'+r.name, x, y, sel?14:15, 16);
  }
  const r = CRAFT_RECIPES[craftIdx];
  rect(30,H-HUD_H-110,W-60,90,1);
  box1(30,H-HUD_H-110,W-60,90,15);
  text(r.name, 48, H-HUD_H-100, 14, 22);
  const reqs = Object.keys(r.req).map(k=>(r.req[k]||1)+'x '+ITEMS[k].n).join(',  ');
  text('Needs: '+(reqs||'nothing'), 48, H-HUD_H-70, 7, 16);
  const have = Object.keys(r.req).every(k=>hasItem(PLAYER,k,r.req[k]||1));
  text(have?'You have enough to try.':'You lack materials.', 48, H-HUD_H-46, have?11:13, 16);
  textC('[ENTER] make     [ESC] back', H-HUD_H-20, 7, 16);
  drawHud();
  const k = pollKey();
  if(!k) return;
  if(k==='escape'){ STATE='travel'; SFX.back(); return; }
  if(k==='arrowup'||k==='w'){ craftIdx=(craftIdx-2+CRAFT_RECIPES.length)%CRAFT_RECIPES.length; SFX.menu();}
  else if(k==='arrowdown'||k==='s'){ craftIdx=(craftIdx+2)%CRAFT_RECIPES.length; SFX.menu();}
  else if(k==='arrowleft'||k==='a'){ craftIdx=(craftIdx+CRAFT_RECIPES.length-1)%CRAFT_RECIPES.length; SFX.menu();}
  else if(k==='arrowright'||k==='d'){ craftIdx=(craftIdx+1)%CRAFT_RECIPES.length; SFX.menu();}
  else if(k>='1'&&k<='9'){ const i=+k-1; if(i<CRAFT_RECIPES.length){craftIdx=i;} }
  else if(k==='enter'||k===' '){
    const rr = CRAFT_RECIPES[craftIdx];
    SFX.knap();
    pushMsg(rr.fn(PLAYER));
  }
}

// ============================================================
// GAME OVER
// ============================================================
function drawDead(){
  clr(0);
  drawLandscape('stars');
  for(let i=0;i<W;i+=3) for(let j=0;j<H;j+=3) pset2(i,j,0);
  box(40,70,W-80,H-160,15,4);
  textC('YOU HAVE DIED', 100, 12, 40);
  textC(PLAYER.name.toUpperCase(), 160, 15, 26);
  textC('killed by '+(PLAYER.causeofdeath||'the trail'), 200, 13, 20);
  textC('Day '+PLAYER.day+',  '+PLAYER.dist+' of '+PLAYER.dest+' leagues', 240, 7, 18);
  textC('Skill: '+PLAYER.skl, 270, 11, 18);
  // bone pile
  rect(W/2-48,310,96,8,7);
  rect(W/2-36,300,72,10,7);
  rect(W/2-24,286,48,10,7);
  rect(W/2-8,274,16,12,7);
  textC('Your bones will teach the next hunter.', 355, 8, 18);
  if((FRAME/30|0)%2===0) textC('[ENTER] start again', 395, 11, 22);
  const k=pollKey();
  if(k==='enter'||k===' '||k==='escape'){ resetGame(); STATE='title'; startStateBGM(); }
}

// ============================================================
// VICTORY
// ============================================================
let winTicks = 0;
function drawWin(){
  drawLandscape('gorge');
  winTicks++;
  if(winTicks<90 && winTicks%20===0) SFX.win();
  box(50,60,W-100,H-130,15,0);
  textC('THE OLDUVAI GORGE', 90, 14, 32);
  textC('You have arrived.', 140, 15, 22);
  textW('Makers of tools from every band sit in the red shade. Old women knap with blurring hands. Young ones run the cores up from the streambed.',
        80, 190, W-160, 7, 18, 24);
  textW('An elder places in your palm a fresh HAMMERSTONE, heavy and cool.',
        80, 290, W-160, 11, 18, 24);
  textC('"Go home. Make sharp things."', 355, 14, 22);
  textC('Skill: '+PLAYER.skl+'    Day: '+PLAYER.day+'    Karma: '+(PLAYER.karma||0), 390, 11, 18);
  if((FRAME/30|0)%2===0) textC('[ENTER] begin another journey', H-HUD_H+30, 11, 18);
  const k=pollKey();
  if(k==='enter'||k===' '||k==='escape'){ resetGame(); STATE='title'; startStateBGM(); }
}

// ============================================================
// RESET / DEATH
// ============================================================
function resetGame(){
  PLAYER.hp=60; PLAYER.hpmax=60;
  PLAYER.hu=80; PLAYER.th=80; PLAYER.en=100;
  PLAYER.skl=0; PLAYER.day=1; PLAYER.dist=0; PLAYER.dest=180;
  PLAYER.inv={}; PLAYER.equipped='digstick';
  PLAYER.karma=0; PLAYER.charmed=false; PLAYER.sick=0;
  PLAYER.alive=true; PLAYER.name=''; PLAYER.causeofdeath='';
  nameBuf=''; introIdx=0; setupIdx=0;
  menuIdx=0; travelPhase=0; winTicks=0;
}
function applyPack(pk){
  Object.assign(PLAYER, pk.stats);
  for(const k in pk.items){ PLAYER.inv[k] = pk.items[k]; }
  if(PLAYER.inv.chopper) PLAYER.equipped='chopper';
  else if(PLAYER.inv.hammerstone) PLAYER.equipped='hammerstone';
  else if(PLAYER.inv.digstick) PLAYER.equipped='digstick';
  else if(PLAYER.inv.flake) PLAYER.equipped='flake';
  else PLAYER.equipped='flake';
}
function checkDeath(cause){
  if(PLAYER.hp<=0){
    PLAYER.alive=false;
    PLAYER.causeofdeath = PLAYER.causeofdeath || cause;
    STATE='dead'; bgmStop(); SFX.die();
  }
}
function startStateBGM(){
  if(mute) return;
  if(STATE==='title') bgmStart(BGM_TITLE);
  else if(STATE==='combat') bgmStart(BGM_COMBAT);
  else bgmStart(BGM_TRAVEL);
}

// ============================================================
// MAIN LOOP
// ============================================================
function tick(){
  FRAME++;
  clr(0);
  switch(STATE){
    case 'title':
      drawTitle();
      { const k=pollKey();
        if(k==='enter'||k===' '){ STATE='intro'; SFX.select(); }
      } break;
    case 'intro':
      drawIntro();
      { const k=pollKey();
        if(k==='enter'||k===' '){ introIdx++; SFX.select(); if(introIdx>=INTRO_TEXT.length){ STATE='name'; nameBuf=''; } }
        else if(k==='escape'){ STATE='title'; SFX.back(); }
      } break;
    case 'name':
      drawName();
      { const k=pollKey();
        if(!k) break;
        if(k==='enter'){ if(nameBuf.trim().length>0){ PLAYER.name=nameBuf.trim().toUpperCase(); STATE='setup'; SFX.select(); } }
        else if(k==='escape'){ STATE='intro'; introIdx=INTRO_TEXT.length-1; SFX.back(); }
        else if(k==='backspace'){ nameBuf=nameBuf.slice(0,-1); SFX.menu(); }
        else if(k.length===1 && /[a-z ]/i.test(k) && nameBuf.length<10){ nameBuf += k.toUpperCase(); SFX.menu(); }
      } break;
    case 'setup':
      drawSetup();
      { const k=pollKey();
        if(!k) break;
        if(k==='arrowup'||k==='w'){ setupIdx=(setupIdx+SETUP_PACKS.length-1)%SETUP_PACKS.length; SFX.menu(); }
        else if(k==='arrowdown'||k==='s'){ setupIdx=(setupIdx+1)%SETUP_PACKS.length; SFX.menu(); }
        else if(k>='1'&&k<='9'){ const i=+k-1; if(i<SETUP_PACKS.length) setupIdx=i; }
        else if(k==='enter'||k===' '){ applyPack(SETUP_PACKS[setupIdx]); STATE='travel'; travelPhase=0; bgmStop(); bgmStart(BGM_TRAVEL); SFX.select(); }
        else if(k==='escape'){ STATE='name'; SFX.back(); }
      } break;
    case 'travel':
      if(travelPhase===0) doTravelMenu(); else if(travelPhase===1) doTravelWalk();
      break;
    case 'event':   doEvent(); break;
    case 'combat':  doCombat(); break;
    case 'inv':     doInventory(); break;
    case 'status':  doStatus(); break;
    case 'rest':    doRest(); break;
    case 'forage':  doForage(); break;
    case 'craft':   doCraft(); break;
    case 'dead':    drawDead(); break;
    case 'victory': drawWin(); break;
  }

  // flash
  if(G_flash>0){ for(let i=0;i<W*H/8;i++){ const x=(Math.random()*W)|0,y=(Math.random()*H)|0; pset2(x,y,15);} G_flash--; }

  // present with optional shake
  let sx=0, sy=0;
  if(G_shake>0){ sx=(Math.random()*6-3)|0; sy=(Math.random()*6-3)|0; G_shake--; }
  CTX.fillStyle='#000'; CTX.fillRect(0,0,W,H);
  CTX.drawImage(BS, sx, sy);

  for(const k in PRESSED) PRESSED[k]=false;
  requestAnimationFrame(tick);
}

document.addEventListener('keydown',()=>{ audioInit(); if(!curBGM) startStateBGM(); },{once:true});
document.addEventListener('click',()=>{ audioInit(); if(!curBGM) startStateBGM(); },{once:true});
requestAnimationFrame(tick);

})();
</script>
