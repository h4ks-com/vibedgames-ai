<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebRTC Video</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
h1 { margin-bottom: 16px; font-size: 1.4em; }
#video-container { position: relative; width: 100%; max-width: 640px; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; margin-bottom: 16px; }
video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
#status { margin-bottom: 12px; font-size: 0.85em; color: #aaa; text-align: center; word-break: break-all; max-width: 640px; }
.controls { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 640px; }
.btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; font-weight: 600; transition: 0.2s; }
.btn-broadcast { background: #e74c3c; color: white; }
.btn-broadcast:hover { background: #c0392b; }
.btn-watch { background: #3498db; color: white; }
.btn-watch:hover { background: #2980b9; }
.btn-copy { background: #2ecc71; color: white; }
.btn-copy:hover { background: #27ae60; }
.btn-stop { background: #555; color: white; }
.room-input { display: flex; gap: 8px; }
.room-input input { flex: 1; padding: 12px; border: 1px solid #444; border-radius: 8px; background: #222; color: #eee; font-size: 1em; }
.share-box { display: none; background: #1a1a2a; border: 1px solid #333; border-radius: 8px; padding: 14px; margin-top: 8px; word-break: break-all; }
.share-box label { font-size: 0.8em; color: #888; display: block; margin-bottom: 4px; }
.share-box code { color: #2ecc71; font-size: 0.85em; }
#viewer-count { display: none; margin-top: 8px; font-size: 0.85em; color: #2ecc71; }
</style>
</head>
<body>
<h1>📹 WebRTC Video</h1>
<div id="video-container">
  <video id="video" autoplay playsinline muted></video>
</div>
<div id="status">Click a button to start.</div>

<div class="controls">
  <button class="btn btn-broadcast" id="btn-broadcast" onclick="startBroadcast()">🎬 Activate Webcam & Start Broadcasting</button>
  
  <button class="btn btn-stop" id="btn-stop" style="display:none" onclick="stopAll()">⏹️ Stop</button>

  <div class="room-input">
    <input type="text" id="room-input" placeholder="Enter Room ID to watch...">
    <button class="btn btn-watch" onclick="startWatch()">👁️ Watch</button>
  </div>

  <div class="share-box" id="share-box">
    <label>Your Room ID:</label>
    <code id="room-id-display"></code>
    <br><br>
    <label>Share link:</label>
    <code id="share-link"></code>
    <br><br>
    <button class="btn btn-copy" onclick="copyLink()">📋 Copy Share Link</button>
  </div>

  <div id="viewer-count"></div>
</div>

<script>
let peer = null;
let localStream = null;
let isBroadcaster = false;
let calls = [];
let dataConns = [];

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function getRoomIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('room');
}

async function startBroadcast() {
  try {
    setStatus("Requesting webcam access...");
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('video').srcObject = localStream;
    isBroadcaster = true;
    setStatus("Webcam active! Creating room...");

    const roomId = generateRoomId();
    peer = new Peer(roomId, {
      debug: 1,
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun2.l.google.com:19302' },
          { urls: 'stun:stun3.l.google.com:19302' },
          { urls: 'stun:stun4.l.google.com:19302' },
          { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
          { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
          { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
        ]
      }
    });

    peer.on('open', function(id) {
      setStatus("Broadcasting! Waiting for viewers...");
      document.getElementById('btn-broadcast').style.display = 'none';
      document.getElementById('btn-stop').style.display = 'block';
      const shareBox = document.getElementById('share-box');
      shareBox.style.display = 'block';
      document.getElementById('room-id-display').textContent = id;
      const shareLink = window.location.origin + window.location.pathname + '?room=' + id;
      document.getElementById('share-link').textContent = shareLink;

      const newUrl = window.location.pathname + '?room=' + id;
      window.history.replaceState({}, '', newUrl);
    });

    peer.on('connection', function(conn) {
      dataConns.push(conn);
      conn.on('open', function() {
        updateViewerCount();
      });
      conn.on('close', function() {
        dataConns = dataConns.filter(c => c !== conn);
        updateViewerCount();
      });
    });

    peer.on('call', function(call) {
      // This shouldn't happen for broadcaster, but handle gracefully
      call.answer(localStream);
    });

    // When a viewer's data connection arrives, call them with our stream
    peer.on('connection', function(conn) {
      conn.on('open', function() {
        // Viewer is connected, now call them with our stream
        if (localStream) {
          const call = peer.call(conn.peer, localStream);
          if (call) {
            calls.push(call);
            call.on('close', function() {
              calls = calls.filter(c => c !== call);
            });
          }
        } else {
          console.error("ERROR: localStream is null when trying to call viewer!");
        }
      });
    });

    peer.on('error', function(err) {
      console.error("PeerJS error:", err);
      setStatus("Error: " + err.type + " — " + err.message);
    });

  } catch (err) {
    console.error("getUserMedia error:", err);
    setStatus("Camera error: " + err.message);
  }
}

function startWatch() {
  let roomId = document.getElementById('room-input').value.trim();
  if (!roomId) {
    setStatus("Please enter a Room ID.");
    return;
  }
  watchRoom(roomId);
}

function watchRoom(roomId) {
  setStatus("Connecting to room " + roomId + "...");

  // Viewer gets a random peer ID
  peer = new Peer({
    debug: 1,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
        { urls: 'stun:stun4.l.google.com:19302' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
      ]
    }
  });

  peer.on('open', function(myId) {
    setStatus("Connected as viewer. Joining room " + roomId + "...");

    // Connect to broadcaster via data connection (signals them to call us)
    const conn = peer.connect(roomId);
    dataConns.push(conn);

    conn.on('open', function() {
      setStatus("Joined room. Waiting for video stream...");
    });
    conn.on('error', function(err) {
      setStatus("Connection error: " + err.message);
    });
  });

  // When the broadcaster calls us, answer WITHOUT a stream (we just want to receive)
  peer.on('call', function(call) {
    call.answer(); // No local stream — viewer doesn't send video
    call.on('stream', function(remoteStream) {
      document.getElementById('video').srcObject = remoteStream;
      setStatus("✅ Watching broadcast live!");
      document.getElementById('btn-broadcast').style.display = 'none';
      document.getElementById('btn-stop').style.display = 'block';
    });
    call.on('close', function() {
      setStatus("Broadcast ended.");
    });
    call.on('error', function(err) {
      setStatus("Stream error: " + err.message);
    });
  });

  peer.on('error', function(err) {
    console.error("PeerJS error:", err);
    if (err.type === 'peer-unavailable') {
      setStatus("Room not found. Make sure the broadcaster is online.");
    } else {
      setStatus("Error: " + err.type + " — " + err.message);
    }
  });
}

function stopAll() {
  calls.forEach(c => c.close());
  dataConns.forEach(c => c.close());
  calls = [];
  dataConns = [];
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  if (peer) {
    peer.destroy();
    peer = null;
  }
  document.getElementById('video').srcObject = null;
  document.getElementById('btn-broadcast').style.display = 'block';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('share-box').style.display = 'none';
  document.getElementById('viewer-count').style.display = 'none';
  isBroadcaster = false;
  setStatus("Stopped.");
}

function copyLink() {
  const link = document.getElementById('share-link').textContent;
  navigator.clipboard.writeText(link).then(() => {
    setStatus("Link copied to clipboard!");
  }).catch(() => {
    setStatus("Copy failed — select and copy manually.");
  });
}

function updateViewerCount() {
  const count = dataConns.filter(c => c.open).length;
  const el = document.getElementById('viewer-count');
  if (isBroadcaster && count > 0) {
    el.style.display = 'block';
    el.textContent = '👁️ ' + count + ' viewer' + (count > 1 ? 's' : '') + ' watching';
  } else {
    el.style.display = 'none';
  }
}

function generateRoomId() {
  return 'vc-' + Math.random().toString(36).substring(2, 8) + '-' + Math.random().toString(36).substring(2, 8) + '-' + Math.random().toString(36).substring(2, 8);
}

// Auto-watch if room is in URL
window.addEventListener('load', function() {
  const roomId = getRoomIdFromUrl();
  if (roomId) {
    document.getElementById('room-input').value = roomId;
    watchRoom(roomId);
  }
});
</script>
</body>
</html>
