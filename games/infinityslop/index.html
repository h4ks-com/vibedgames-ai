<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>AI Website</title>
</head>
<body>
  <div class="body">Loading....</div>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
  <script>
    function request(navPrompt){
    fetch(`https://text.pollinations.ai/${encodeURI(`Hello, make html site of landing page for person named doesnm. Output only html, nothing else. Every link should contain attribute data-prompt which contain prompt for page it's located. ${navPrompt ? `Current navigation prompt is "${navPrompt}", it should affect the page content.`: '.'} Your response will be inserted in div with class body so don't include html,head,body and etc tags, also don't include code blocks`)}. Nonce: ${Date.now()}`).then(r => r.text() ).then(t => document.querySelector(".body").innerHTML = t).catch(console.error)
      document.querySelectorAll("a").forEach(e => e.addEventListener("click", function(){
        e.preventDefault()
      document.querySelector(".body").innerText = "Loading...";
      request(this.dataset.prompt)
    }))
    }
    request(null)
  </script>
</body>
</html>
