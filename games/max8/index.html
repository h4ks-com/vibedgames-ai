    'clear compute congruence constructor contradiction cut destruct discriminate eauto ' +
    'einduction elim eq_refl exact exists f_equal field firstorder generalize hnf induction ' +
    'injection inversion lazy lia ltac match move nia nra omega pattern pose psatz red refine ' +

    'simple solve specialize split subst symmetry tauto transitivity trivial try unfold vm_compute';

    keywords: { keyword: KW, built_in: TACTIC,

const CONTENT = "# \ud83d\udd31 M A X 8 \ud83d\udd31\n## **MAXIMUM-DENSITY OCTAL-GLYPH HYPER-ENCODING SYSTEM**\n*A Complete Specification v1.0*\n\n---\n\n# I. PHILOSOPHICAL FOUNDATION\n\n```\n\"The universe does not store information in tiny things.\n It stores it in the biggest, thiccest, most infinite shape\n that reality allows.\"\n \n                              \u2014 The Max8 Manifesto\n```\n\n**Core Axiom:** Every geometric property of the digit **8** is an **information channel**.\n\nIf it varies \u2192 it carries data.\nIf we can measure it \u2192 we can encode in it.\n\n---\n\n# II. THE GLYPH ANATOMY \u2014 FULL CHANNEL MAP\n\nLet us dissect the sacred geometry:\n\n```\n        \u256d\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u256e  \u2190 ARC-A (upper outer boundary)\n       \u2571  CH-U     \u2572  \u2190 CHAMBER-UPPER (enclosed region)\n      \u2502   \u250c\u2500\u2500\u2500\u2510    \u2502\n      \u2502   \u2502 \u25cf \u2502    \u2502  \u2190 DOT-U (optional interior mark)\n      \u2502   \u2514\u2500\u252c\u2500\u2518    \u2502\n      \u2570\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u256f  \u2190 WAIST (narrowest point)\n            \u2502         \u2190 STEM (central connector)\n      \u256d\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u256e\n      \u2502   \u250c\u2500\u2534\u2500\u2510    \u2502\n      \u2502   \u2502 \u25cf \u2502    \u2502  \u2190 DOT-L (optional interior mark)\n      \u2502   \u2514\u2500\u2500\u2500\u2518    \u2502\n       \u2572  CH-L     \u2571  \u2190 CHAMBER-LOWER (enclosed region)\n        \u2570\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u256f  \u2190 ARC-B (lower outer boundary)\n            \n            \u2571 \u2572      \u2190 CROSSING (stem intersection angle)\n           \u2571   \u2572\n```\n\n### IDENTIFIED CHANNELS (27 total)\n\n| # | Channel | States | Bits | Description |\n|---|---------|--------|------|-------------|\n| **1** | Chamber-U Fill | 2 | 1 | Upper loop: empty (0-like) or full (8-like) |\n| **2** | Chamber-L Fill | 2 | 1 | Lower loop: empty or full |\n| **3** | Dot-U Presence | 2 | 1 | Dot inside upper chamber |\n| **4** | Dot-L Presence | 2 | 1 | Dot inside lower chamber |\n| **5** | Dot-U Position | 9 | ~3.17 | 3\u00d73 grid inside upper chamber |\n| **6** | Dot-L Position | 9 | ~3.17 | 3\u00d73 grid inside lower chamber |\n| **7** | Waist Width | 4 | 2 | Hairline / Narrow / Medium / Wide |\n| **8** | Stem Length | 4 | 2 | Compressed / Normal / Extended / Stretched |\n| **9** | Crossing Angle | 5 | ~2.32 | 60\u00b0 / 75\u00b0 / 90\u00b0 / 105\u00b0 / 120\u00b0 |\n| **10** | Slant Direction | 3 | ~1.58 | Left / Neutral / Right lean |\n| **11** | Arc-U Curvature | 5 | ~2.32 | Flat / Shallow / Normal / Deep / Circle |\n| **12** | Arc-B Curvature | 5 | ~2.32 | Same scale |\n| **13** | Stroke Width Top | 4 | 2 | Thin / Med / Thick / Ultra |\n| **14** | Stroke Width Mid | 4 | 2 | Can differ from top! |\n| **15** | Stroke Width Bot | 4 | 2 | Can differ from mid! |\n| **16** | Aspect Ratio | 5 | ~2.32 | Squat / Normal / Tall / Stilted / Extreme |\n| **17** | Symmetry Mode | 3 | ~1.58 | Mirror / Asymmetric / Rotational |\n| **18** | Serifs-U | 4 | 2 | None / Ball / Flag / Spiky |\n| **19** | Serifs-L | 4 | 2 | Independent from upper! |\n| **20** | Interior Texture | 8 | 3 | Solid / Dotted / Hatched / Crosshatch / Gradient / Noise / Fractal / Mandelbrot |\n| **21** | Chamber-U Area Ratio | 5 | ~2.32 | 20% / 40% / 60% / 80% / 100% fill |\n| **22** | Chamber-L Area Ratio | 5 | ~2.32 | Independent! |\n| **23** | Color-Hue (Upper) | 360 | ~8.49 | Full spectrum encoding |\n| **24** | Color-Hue (Lower) | 360 | ~8.49 | Independent hue! |\n| **25** | Color-Saturation | 8 | 3 | Grayscale / Tinted / Normal / Vivid / Neon / UV / IR / Quantum |\n| **26** | Opacity | 8 | 3 | Ghostly / Transparent / Translucent / Opaque / Glowing / Phase-shifted |\n| **27** | Z-Depth Layer | 16 | 4 | 16 discrete depth planes for holographic storage |\n\n---\n\n# III. THEORETICAL CAPACITY\n\n## Raw Calculation\n\n$$\\text{States per glyph} = \\prod_{i=1}^{27} s_i = \\mathbf{2.37 \\times 10^{23}}$$\n\n$$\\text{Bits per glyph} = \\log_2(2.37 \\times 10^{23}) \\approx \\mathbf{77.7 \\text{ bits}}$$\n\n## Comparison\n\n| System | Bits per Glyph | \"Hi\" Storage |\n|--------|---------------|--------------|\n| Binary (0/1) | 1 | 16 glyphs |\n| ODGES Level 2 | 2 | 8 glyphs |\n| ODGES Level 4 | ~3.58 | ~4.5 glyphs |\n| **MAX8** | **~77.7** | **~0.21 glyphs** |\n\n**You can store \"Hello, World!\" in less than TWO characters.**\n\nIn fact:\n\n| Data | Traditional | MAX8 |\n|------|-------------|------|\n| 1 byte (8 bits) | 8 binary digits | **0.103 glyphs** |\n| 1 KB | 8,192 bits | **~11 glyphs** |\n| 1 MB | 8,388,608 bits | **~108,000 glyphs** |\n| The entire English Wikipedia (~15 GB text) | \u2014 | **~1.6 billion glyphs \u2248 ~1.6 TB of 8s** |\n\nBut each glyph is so **thicc** that physically they occupy more space, which means **we've created the most inefficient yet information-dense system ever devised**. This is not a bug. **This is art.**\n\n---\n\n# IV. ENCODING SCHEMES\n\n## Scheme A: Max8-Flat (M8F)\n\nAll 27 channels encoded as one monolithic integer per glyph:\n\n```\nglyph_value = \u03a3 (channel_i \u00d7 \u03a0_{j<i} states_j)\n\nRange: 0 to 2,370,000,000,000,000,000,000\n```\n\nOne Max8 glyph can hold:\n- A full IPv6 address **with room to spare**\n- An entire SHA-256 hash plus metadata\n- **11 ASCII characters**\n- A 64-bit integer **with 13 bits left over**\n\n## Scheme B: Max8-Structured (M8S)\n\nChannels grouped into semantic layers:\n\n```\nLAYER 0 \u2014 IDENTITY (channels 1-2):     2 bits  \u2192 base bit value\nLAYER 1 \u2014 STRUCTURE (3-9):            ~19 bits \u2192 geometry  \nLAYER 2 \u2014 STYLE (10-19):              ~22 bits \u2192 typography\nLAYER 3 \u2014 FILL (20-22):               ~7 bits  \u2192 density\nLAYER 4 \u2014 COLOR (23-26):              ~17 bits \u2192 chromaticity\nLAYER 5 \u2014 DEPTH (27):                  4 bits  \u2192 z-axis\n\nTotal: ~77.7 bits (confirmed)\n```\n\nEach layer can be read by different hardware subsystems!\n\n## Scheme C: Max8-Recursive (M8R) \ud83c\udf00\n\n**The deepest cut.**\n\nWhat if the **dots inside the chambers** (channels 5-6) are **themselves tiny Max8 glyphs**?\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502                 \u2502\n\u2502    \u256d\u2500\u2500\u2500\u256e        \u2502\n\u2502    \u2502 8 \u2502 \u2190 this dot is ITSELF a Max8 glyph\n\u2502    \u2570\u2500\u2500\u2500\u256f        \u2502\n\u2502                 \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\nEach dot-8 has its own 27 channels (scaled down).\nThose inner dots could contain **even smaller 8s**.\n\n### Recursion Depth Table\n\n| Depth | Bits per Glyph | Can Store |\n|-------|---------------|-----------|\n| 0 (flat) | ~77.7 | 11 ASCII chars |\n| 1 (one recursion) | ~77.7 + (2 \u00d7 77.7) = ~233 | 29 ASCII chars |\n| 2 | ~4,088 | 511 ASCII chars |\n| 3 | ~71,540 | **~9 KB** |\n| 4 | ~1.25M | **~156 KB** |\n| 5 | ~21.9M | **~2.7 MB** |\n| \u221e | **\u221e** | **THE UNIVERSE** |\n\n**At depth 5, a single handwritten 8 contains the entire text of *Lord of the Rings* with room for the appendices.**\n\nAt depth \u221e, one glyph contains **all possible information**. The Max8 glyph becomes a **monad** \u2014 a singular entity containing the complete informational content of existence.\n\nWe have invented: **THE ONENESS BIT** \u262f\ufe0f\n\n---\n\n# V. PHYSICAL IMPLEMENTATION\n\n## Tier 1: 2D Surface (Print)\n\n```\nMedium: Platinum-iridium alloy etched by ion beam\nResolution: 50,000 DPI minimum\nGlyph size: 2mm \u00d7 4mm\nCapacity per A4 page: ~50,000 glyphs \u00d7 77.7 bits = ~4.7 MB\n```\n\nA single page holds **three floppy disks** of data. Written entirely in 8s.\n\n## Tier 2: Volumetric (Crystal) \ud83d\udc8e\n\n```\nMedium: Fused quartz crystal with femtosecond laser writing\nTechnique: Each 8 is a 3D voxel structure at variable depth\nChannels 1-22: XY plane structure (as before)\nChannels 23-26: Wavelength-dependent refractive index\nChannel 27: Actual Z position in crystal\nCapacity per 1cm\u00b3 cube: ~10M glyphs = ~97 MB\n```\n\nA sugar-cube-sized crystal holds **the entire text of 1,500 books.**\n\n## Tier 3: Molecular (DNA-8) \ud83e\uddec\n\n```\nConcept: Engineer protein that folds into figure-8 shape\nEach folding state = one channel value\nRead via cryo-electron microscopy\nCapacity per gram: ~700 PB (petabytes)\n```\n\n## Tier 4: Quantum (Q8) \u269b\ufe0f\n\n```\nConcept: Trapped-ion quantum state shaped as probability-8\nChambers = superposition lobes\nCrossing angle = phase relationship\nColor = energy eigenstate\nA SINGLE QUANTUM 8 HOLDS 77.7 QUBITS OF ENTANGLED INFORMATION\n```\n\n## Tier 5: Conceptual (Pure Idea) \ud83d\udcd6\n\n```\nMedium: Human imagination\nStorage: You just REMEMBER that the 8 meant something\nRetrieval: Close your eyes and *know*\nCapacity: UNLIMITED\nDrawback: Inter-subject reliability varies\n```\n\n---\n\n# VI. ERROR DETECTION & CORRECTION\n\n## The Beauty Checksum\u2122\n\nMax8 introduces a revolutionary error-detection paradigm:\n\n> **If the 8 looks wrong, it IS wrong.**\n\n### Validity Rules\n\n```\n\u2705 Symmetric 8s feel satisfying    \u2192 data probably intact\n\u2705 Proportional chambers please eye \u2192 no corruption detected  \n\u274c Lopsided 8 causes unease          \u2192 REJECT GLYPH\n\u274c Wrong-angle crossing = visceral discomfort \u2192 PARITY ERROR\n\u274c Ugly color combo = nausea trigger  \u2192 CHECKSUM FAIL\n```\n\n### Formalizing Aesthetics\n\nWe define the **Harmonic Integrity Value (HIV)**:\n\n$$\\text{HIV} = \\frac{\\text{GoldenRatioConformity} + \\text{SymmetryScore} + \\text{ChromaticHarmony}}{\\text{VisualTension}}$$\n\n| HIV Range | Status |\n|-----------|--------|\n| > 0.95 | \u2705 Pristine |\n| 0.80\u20130.95 | \u26a0\ufe0f Acceptable, log warning |\n| 0.60\u20130.80 | \u274c Corrupted, request retransmit |\n| < 0.60 | \ud83d\udc80 Glyph has undergone existential crisis |\n\n### Graceful Degradation Cascade\n\n```\nFull Max8 (27 channels) detected?\n  \u251c\u2500 YES \u2192 Read all layers \u2192 ~77.7 bits \u2713\n  \u251c\u2500 NO \u2192 Can we see color?\n  \u2502    \u251c\u2500 YES \u2192 M8C variant (23 channels) \u2192 ~66 bits\n  \u2502    \u2514\u2500 NO \u2192 Is it 3D?\n  \u2502         \u251c\u2500 YES \u2192 M8V variant (22 ch) \u2192 ~63 bits\n  \u2502         \u2514\u2500 NO \u2192 2D shape only?\n  \u2502              \u251c\u2500 YES \u2192 M8S variant (19 ch) \u2192 ~54 bits\n  \u2502              \u2514\u2500 NO \u2192 Just chambers visible?\n  \u2502                   \u251c\u2500 YES \u2192 CDB (2 ch) \u2192 2 bits\n  \u2502                   \u2514\u2500 NO \u2192 Is it an 8 or 0?\n  \u2502                        \u2514\u2500 SB (1 ch) \u2192 1 bit\n  \u2514\u2500 COMPLETELY ILLEGIBLE \u2192 User was probably writing a B\n       \u2192 Return 0 and suggest optometry appointment\n```\n\n**Every Max8 reader degrades gracefully across SEVEN tiers automatically.**\n\n---\n\n# VII. THE MAX8 CHARACTER SET\n\n## Printable Characters (subset)\n\nSince one glyph holds ~77.7 bits, we define the **Max8 Unicode Plane** \u2014 a character set where every symbol is some variation of 8:\n\n| Codepoint | Glyph Name | Visual |\n|-----------|-----------|--------|\n| U+88000 | **BASE EIGHT** | `8` |\n| U+88001 | **EIGHT ZERO** | `0` (degenerate form) |\n| U+88002 | **UPPER HEAVY** | `\u2078` |\n| U+88003 | **LOWER HEAVY** | `\u2088` |\n| U+88004 | **SLANT LEFT** | `\ud835\udfd6` (italic left) |\n| U+88005 | **SLANT RIGHT** | `\ud835\udfd6` (italic right) |\n| U+88006 | **WIDE WAIST** | `\ud802\udd38` (expanded middle) |\n| U+88007 | **PINCHED WAIST** | `8` (tight middle) |\n| U+88008 | **DOTTED UPPER** | `8\u0307` |\n| U+88009 | **DOTTED LOWER** | `8\u0323` |\n| U+8800A | **DOTTED BOTH** | `8\u0307\u0323` |\n| U+8800B | **SERIFED MAJESTIC** | `\ud835\udfea` |\n| U+8800C | **ROUNDED SOFT** | `\uff18` (fullwidth round) |\n| U+8800D | **GOTHIC** | `\ud835\udd2a` but it's secretly an 8 |\n| U+8800E | **FRACTAL** | `\u221e` made of tiny 8s |\n| ... | **...137 BILLION more codepoints** | ... |\n\n**Every character in Max8 is an 8.** The alphabet is just 8 saying its own name in 137 billion dialects.\n\n---\n\n# VIII. COMPUTING ARCHITECTURE\n\n## The Max8 Processing Unit (M8PU)\n\n```\n                    \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n                    \u2502     INPUT        \u2502\n                    \u2502  stream of 8s    \u2502\n                    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                             \u2502\n              \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n              \u25bc              \u25bc              \u25bc\n       \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n       \u2502 GEOMETRY   \u2502 \u2502 CHROMATIC \u2502 \u2502  DEPTH      \u2502\n       \u2502 ANALYZER   \u2502 \u2502 ANALYZER  \u2502 \u2502  ANALYZER   \u2502\n       \u2502 (ch 1-19)  \u2502 \u2502 (ch 23-26)\u2502 \u2502  (ch 27)    \u2502\n       \u2514\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2518 \u2514\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2518 \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n             \u2502              \u2502              \u2502\n             \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                            \u25bc\n                   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n                   \u2502  BEAUTY CHECKSUM \u2502\n                   \u2502   VALIDATOR     \u2502\n                   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                            \u25bc\n                   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n                   \u2502  MAX8 ALU       \u2502\n                   \u2502  operates on    \u2502\n                   \u2502  77.7-bit words \u2502\n                   \u2502  shaped like 8s \u2502\n                   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                            \u25bc\n                   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n                   \u2502     OUTPUT      \u2502\n                   \u2502  more beautiful \u2502\n                   \u2502  8s than before \u2502\n                   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### Instruction Set Architecture (M8-ISA)\n\nEvery instruction is a valid Max8 glyph:\n\n| Opcode Glyph | Operation |\n|-------------|-----------|\n| `8` | NOP (no operation \u2014 perfect harmony) |\n| `\u2078` | ADD upper-half of operands |\n| `\u2088` | ADD lower-half of operands |\n| `8\u0307` | XOR (exclusive or \u2014 the dots exclude) |\n| `\ud835\udfd6` | SHIFT LEFT (momentum carries forward) |\n| `\uff18` | ROTATE (fullwidth spin) |\n| `\u221e` | HALT (reached infinity \u2014 computation complete) |\n\n### Memory Model\n\nMemory is addressed as a **2D grid of 8s**, like a typographic bitmap:\n\n```\nAddress [row,col] \u2192 one Max8 glyph \u2192 77.7 bits\n\nMemory layout example (storing \"MAX8\"):\n\n  col: 0  1  2  3  4  5\n  row 0:  8  \u2078  \u2088  8\u0307  \ud835\udfd6  \uff3bM\uff3d\n  row 1:  \uff18  \u221e  8\u0323  \ud835\udfea  \u2078\u0307  \uff3bA\uff3d\n  row 2:  \ud802\udd38  8\u0307\u0323  \u207a  \u2088\u0323  \uff18  \uff3bX\uff3d\n  row 3:  \ud835\udfd6  \u2078  \u2088  8  \u2078  \uff3b8\uff3d\n  \n  Total: 24 glyphs \u00d7 77.7 bits = 1,864.8 bits = 233 bytes\n  Used to encode: 4 characters\n  Efficiency: who CARES look at them!!!\n```\n\n---\n\n# IX. NETWORK PROTOCOL: MAX8-NET\n\n## Packet Structure\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502         PREAMBLE (\u00d78 identical 8s)        \u2502  \u2190 sync pattern\n\u2502              88888888                     \u2502     (unmistakable)\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502         SOURCE ADDRESS (3 glyphs)         \u2502  \u2190 233 bits of src\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502 DESTINATION ADDRESS (3 glyphs)            \u2502  \u2190 233 bits of dst\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502         PAYLOAD (N glyphs)                \u2502  \u2190 actual data\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502    BEAUTY CHECKSUM (1 pristine 8)         \u2502  \u2190 integrity\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502         POSTAMBLE (\u221e symbol)              \u2502  \u2190 end of transmission\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Protocol Handshake\n\n```\nClient:                                    Server:\n  \"8\"  (initial ping \u2014 simplest glyph)\n        \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2192\n                                   \"\u2078\" (ack \u2014 upper heavy, ready)\n        \u2190\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  \"\u2088\" (lower heavy \u2014 send me data)\n        \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2192\n                                   \"\uff18\" (fullwidth \u2014 here it comes)\n        \u2190\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  [data stream of gorgeous 8s]\n        \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2192\n                                   \"\u221e\" (received infinity / done)\n        \u2190\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  \"8\" (beautiful. perfect. transcendent.)\n```\n\n---\n\n# X. SECURITY MODEL\n\n## Max8 Cryptography\n\n### Hash Function: **MaxHash-8**\n\n```\nInput: Any data\nProcess: \n  1. Encode data as Max8 glyph sequence\n  2. Rotate each glyph's crossing angle by (position \u00d7 golden_angle)\u00b0\n  3. Modulate stroke width by adjacent glyph XOR\n  4. Sum all chamber area ratios modulo \u221e\nOutput: One PERFECT 8 (if hash is valid, output glyph has HIV > 0.99)\n\nProperties:\n  - Collision resistance: Two inputs producing the same beautiful 8 is astronomically unlikely\n  - Avalanche effect: Changing 1 bit alters at least 17 of 27 channels\n  - Preimage resistance: Given a beautiful 8, finding what produces it requires solving aesthetic inverse problem (NP-hard + emotional labor)\n```\n\n### Encryption: **8-Block Cipher (E8BC)**\n\n```\nKey: A sequence of 8 Max8 glyphs (621.6 bits \u2014 stronger than AES-256)\n\nRound function:\n  FOR each round i FROM 1 TO 8 (because OF COURSE 8 rounds):\n    SubBytes \u2192 replace each glyph with aesthetically complementary 8\n    ShiftRows \u2192 rotate glyph grid along diagonal (shaped like 8)\n    MixColumns \u2192 blend chamber fills between neighboring glyphs\n    AddRoundKey \u2192 XOR with round key (modulates slant angles)\n\nDecryption: Run in reverse while appreciating the symmetry\n```\n\n### Steganography: **Hide-in-Eight-Sight**\n\nSince EVERY 8 carries data, hidden messages are **indistinguishable from normal text**:\n\n```\nThis sentence looks normal but every 8 here encodes\na different layer of classified information.\nThe 8 in \"looks\" holds launch codes.\nThe 8 in \"sentence\" holds my diary.\nThe 8 right there \u2191 holds the meaning of life.\n```\n\n**You cannot distinguish Max8 steganography from regular writing because ALL writing becomes Max8.** The ultimate camouflage.\n\n---\n\n# XI. FILE FORMAT SPECIFICATION\n\n## .m8x File Header\n\n```\nOffset  Field               Value\n\u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n0x00    Magic Number        `MAX8` in Max8-encoded glyphs\n0x04    Version             1.0 (encoded as one specific 8 variant)\n0x08    Encoding Scheme     0=Flat, 1=Structured, 2=Recursive(depth)\n0x0C    Recursion Depth     0-255 (for M8R scheme)\n0x10    Glyph Dimensions    width \u00d7 height in nanometers\n0x14    Total Glyphs        uint64_max8 (77.7-bit encoded number!)\n0x1C    Beauty Threshold    Minimum HIV for valid read\n0x20    Color Space         sRGB / AdobeRGB / ProPhoto / RawQuantum\n0x24    Reserved            Must be filled with perfect 8s\n0x40    DATA BEGINS         An infinite sea of meaning\n```\n\n## Example File: `hello_world.m8x`\n\n```\nFile size: 3 glyphs (= 233 bits = ~29 bytes of payload)\nContents: \"Hello, World!\" losslessly compressed into three beautiful 8s\nVisual appearance:\n  \n  \u256d\u2500\u256e \u256d\u2500\u2500\u256e \u256d\u2500\u2500\u2500\u2500\u256e\n  \u25028\u2502 \u2502\u221e\u2502 \u2502  8  \u2502\n  \u2570\u2500\u256f \u2570\u2500\u2500\u256f \u2570\u2500\u2500\u2500\u2500\u256f\n  \n  That's it. That's the whole file.\n  Three handwritten digits contain your first program.\n```\n\n---\n\n# XII. STANDARDIZATION & GOVERNANCE\n\n## The Max8 Consortium (M8C)\n\n```\nFounding Members:\n  \ud83d\udd31 handyc      \u2014 Original Visionary, Prophet of the Thicc Bit\n  \ud83d\udd31 CloudBot    \u2014 Chief Architect, Keeper of the Specification\n  \ud83d\udd31 [YOUR NAME HERE] \u2014 Join the singularity\n\nGovernance Model:\n  All decisions made by arranging 8s on a table\n  Whichever configuration looks most pleasing = the standard\n  Disputes resolved by measuring beauty (objective)\n```\n\n## Standards Documents\n\n| Document | Title | Status |\n|----------|-------|--------|\n| RFC-8888 | Max8 Core Specification | \u2705 COMPLETE (this document) |\n| RFC-8889 | Max8 Physical Layer (Etching) | \ud83d\udcdd Draft |\n| RFC-8890 | Max8 Network Protocol | \ud83d\udcdd Draft |\n| RFC-8891 | Max8 Instruction Set | \ud83d\udcdd Draft |\n| RFC-8892 | Max8 Typography Guidelines | \ud83d\udcdd Draft |\n| RFC-\u221e | Max8 Recursive Ontology | \ud83d\udd34 CLASSIFIED (causes enlightenment) |\n\n---\n\n# XIII. ROADMAP TO ADOPTION\n\n```\n2025  Q1: Publish spec, form consortium\n2025  Q2: Reference encoder/decoder implementation (Python, then Rust)\n2025  Q3: First Max8 storage device (etchable platinum card, 5MB)\n2025  Q4: Linux kernel patch \u2014 max8 filesystem (fs/max8.c)\n2026  Q1: WebMax8 API \u2014 browsers render 8s natively\n2026  Q2: Max8 keyboard released (every key types a different 8)\n2026  Q3: Programming language \"Octlang\" \u2014 all syntax is 8s\n2027  Q1: First Max8-based cryptocurr // Pyodide — lazy-loaded on first Run click
let _py = null, _pyBusy = false, _pyQ = [];
async function getPy() {
  if (_py) return _py;
  if (_pyBusy) return new Promise(r => _pyQ.push(r));
  _pyBusy = true;
  await new Promise((ok, fail) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js';
    s.onload = ok; s.onerror = fail;
    document.head.appendChild(s);
  });
  _py = await loadPyodide({});
  await _py.loadPackage(['numpy', 'matplotlib', 'pandas']);
  // Force Agg so matplotlib never renders to document.body.
  _py.runPython('import matplotlib; matplotlib.use("Agg")');
  _pyQ.forEach(r => r(_py)); _pyQ = [];
  return _py;
}

window.runPy = async function(bid) {
  const btn = document.getElementById(bid + '-btn');
  const out = document.getElementById(bid + '-out');
  out.innerHTML = '<em style="color:#8b949e;font-size:.8em">Loading Python (first run fetches packages)…</em>';
  if (btn) btn.disabled = true;
  try {
    const py = await getPy();
    out.innerHTML = '';
    py.setStdout({batched: t => {
      const d = document.createElement('div');
      const line = t.trimEnd();
      if (line.startsWith('data:image/')) {
        const img = document.createElement('img'); img.src = line; d.appendChild(img);
      } else { d.textContent = t; }
      out.appendChild(d);
    }});
    py.setStderr({batched: t => { const d = document.createElement('div'); d.className = 'err'; d.textContent = t; out.appendChild(d); }});
    const code = getCode(bid);
    await py.loadPackagesFromImports(code);
    const res = await py.runPythonAsync(code);
    if (res !== undefined && res !== null) {
      const d = document.createElement('div'); d.className = 'res'; d.textContent = String(res); out.appendChild(d);
    }
    if (!out.children.length) { const d = document.createElement('div'); d.textContent = '(no output)'; out.appendChild(d); }
  } catch(e) {
    out.innerHTML = '<div class="err">' + (e.message || e) + '</div>';
  } finally {
    if (btn) btn.disabled = false;
  }
};

let _lvm = null, _lvmBusy = false, _lvmQ = [];
async function getLua() {
  if (_lvm) return _lvm;
  if (_lvmBusy) return new Promise(r => _lvmQ.push(r));
  _lvmBusy = true;
  await new Promise((ok, fail) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.js';
    s.onload = ok; s.onerror = fail;
    document.head.appendChild(s);
  });
  _lvm = window.fengari;
  _lvmQ.forEach(r => r(_lvm)); _lvmQ = [];
  return _lvm;
}
window.runLua = async function(bid) {
  const btn = document.getElementById(bid + '-btn');
  const out = document.getElementById(bid + '-out');
  out.innerHTML = '<em style="color:#8b949e;font-size:.8em">Loading Lua…</em>';
  if (btn) btn.disabled = true;
  try {
    const fg = await getLua();
    out.innerHTML = '';
    const code = getCode(bid);
    const lines = [];
    const L = fg.lauxlib.luaL_newstate();
    fg.lualib.luaL_openlibs(L);
    const jsStr = s => fg.lua.lua_tojsstring ? fg.lua.lua_tojsstring(s, -1)
                                              : fg.to_jsstring(fg.lua.lua_tostring(s, -1));
    fg.lua.lua_register(L, fg.to_luastring('print'), state => {
      const n = fg.lua.lua_gettop(state);
      const parts = [];
      for (let i = 1; i <= n; i++) {
        fg.lauxlib.luaL_tolstring(state, i, null);
        parts.push(jsStr(state));
        fg.lua.lua_pop(state, 1);
      }
      lines.push(parts.join('\t'));
      return 0;
    });
    // Fengari-web omits the io library; shim io.write → print so code using io.write works.
    fg.lauxlib.luaL_dostring(L, fg.to_luastring(
      'io={_b="",write=function(...)local p={}for i=1,select("#",...)do p[i]=tostring(select(i,...))end\n' +
      'io._b=io._b..table.concat(p)\n' +
      'while true do local n=string.find(io._b,"\\n")if not n then break end\n' +
      'print(string.sub(io._b,1,n-1))io._b=string.sub(io._b,n+1)end end,read=function()return nil end}'
    ));
    const r = fg.lauxlib.luaL_dostring(L, fg.to_luastring(code));
    fg.lauxlib.luaL_dostring(L, fg.to_luastring('if io and io._b and io._b~="" then print(io._b) end'));
    if (r !== fg.lua.LUA_OK) {
      throw new Error(jsStr(L) || 'Lua error');
    }
    const d = document.createElement('div');
    d.textContent = lines.join('\n') || '(no output)';
    out.appendChild(d);
  } catch(e) {
    out.innerHTML = '<div class="err">' + escH(String(e.message || e)) + '</div>';
  } finally {
    if (btn) btn.disabled = false;
  }
};

// --- sql.js (SQLite) ---
let _sqljs = null, _sqljsBusy = false, _sqljsQ = [];
async function getSql() {
  if (_sqljs) return _sqljs;
  if (_sqljsBusy) return new Promise(r => _sqljsQ.push(r));
  _sqljsBusy = true;
  await new Promise((ok, fail) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/sql-wasm.js';
    s.onload = ok; s.onerror = fail;
    document.head.appendChild(s);
  });
  _sqljs = await initSqlJs({locateFile: f => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/' + f});
  _sqljsQ.forEach(r => r(_sqljs)); _sqljsQ = [];
  return _sqljs;
}
window.runSQL = async function(bid) {
  const btn = document.getElementById(bid + '-btn');
  const out = document.getElementById(bid + '-out');
  out.innerHTML = '<em style="color:#8b949e;font-size:.8em">Loading SQLite…</em>';
  if (btn) btn.disabled = true;
  try {
    const SQL = await getSql();
    out.innerHTML = '';
    const db = new SQL.Database();
    const results = db.exec(getCode(bid));
    db.close();
    if (!results.length) {
      const d = document.createElement('div'); d.textContent = '(no results)'; out.appendChild(d);
    } else {
      for (const res of results) {
        const cols = res.columns;
        const widths = cols.map((c, i) => Math.max(String(c).length, ...res.values.map(r => String(r[i] ?? '').length)));
        const pad = (v, w) => String(v ?? '').padEnd(w);
        const sep = widths.map(w => '-'.repeat(w + 2)).join('+');
        const row = r => '| ' + r.map((v, i) => pad(v, widths[i])).join(' | ') + ' |';
        const lines = [row(cols), '+' + sep + '+', ...res.values.map(row)];
        const pre = document.createElement('pre');
        pre.style.cssText = 'margin:0;color:#c9d1d9;font-size:.8em';
        pre.textContent = lines.join('\n');
        out.appendChild(pre);
      }
    }
  } catch(e) {
    out.innerHTML = '<div class="err">' + escH(String(e.message || e)) + '</div>';
  } finally {
    if (btn) btn.disabled = false;
  }
};

// --- Coq via jsCoq scratchpad (opens new tab, code copied to clipboard) ---
window.runCoq = function(bid) {
  const code = getCode(bid);
  const out = document.getElementById(bid + '-out');
  out.innerHTML = '';
  navigator.clipboard.writeText(code).then(() => {
    const d = document.createElement('div');
    d.innerHTML = 'Proof copied. Opening jsCoq scratchpad in new tab — paste with <code>Ctrl+V</code> or <code>Cmd+V</code>.';
    out.appendChild(d);
  }).catch(() => {
    const d = document.createElement('div'); d.className = 'warn';
    d.textContent = 'Clipboard blocked. Manually copy the proof above before pasting in jsCoq.';
    out.appendChild(d);
  });
  window.open('https://jscoq.github.io/scratchpad.html', '_blank', 'noopener');
};

function escH(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getCode(bid) {
  if (__editing.has(bid)) {
    const ta = document.getElementById(bid + '-edit');
    if (ta) __codes[bid] = ta.value;
  }
  return __codes[bid] || '';
}

window.toggleEdit = function(bid) {
  const preEl = document.getElementById(bid + '-pre');
  const ta = document.getElementById(bid + '-edit');
  const btn = document.getElementById(bid + '-editbtn');
  if (!ta) return;
  if (__editing.has(bid)) {
    __codes[bid] = ta.value;
    __editing.delete(bid);
    if (preEl) {
      const codeEl = preEl.querySelector('code');
      if (codeEl) {
        const lang = ([...codeEl.classList].find(c => c.startsWith('language-')) || '').replace('language-', '');
        codeEl.innerHTML = (lang && hljs.getLanguage(lang))
          ? hljs.highlight(__codes[bid], {language: lang}).value
          : escH(__codes[bid]);
      }
      preEl.style.display = '';
    }
    ta.style.display = 'none';
    btn.classList.remove('active');
    btn.textContent = 'edit';
  } else {
    __editing.add(bid);
    ta.value = __codes[bid] || '';
    if (!ta.dataset.ar) {
      ta.dataset.ar = '1';
      ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.max(120, ta.scrollHeight + 4) + 'px'; });
    }
    ta.style.height = 'auto';
    ta.style.height = Math.max(120, ta.scrollHeight + 4) + 'px';
    if (preEl) preEl.style.display = 'none';
    ta.style.display = 'block';
    btn.classList.add('active');
    btn.textContent = 'done';
    ta.focus();
  }
};

window.copyCode = function(id) {
  const text = getCode(id);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(id + '-copy');
    if (!btn) return;
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  }).catch(() => {});
};

const renderer = {
  code(token) {
    const lang = (token.lang || '').toLowerCase().trim();
    const text = token.text;
    const id = 'b' + Math.random().toString(36).slice(2, 10);
    if (lang === 'mermaid') {
      return '<div class="mermaid-wrap"><div class="mermaid" id="' + id + '">' + escH(text) + '</div></div>';
    }
    if (lang === 'python' || lang === 'py') {
      __codes[id] = text;
      const hl = hljs.highlight(text, {language: 'python'}).value;
      return '<div class="run-block"><div class="code-wrap"><pre id="' + id + '-pre"><code class="hljs language-python">' + hl + '</code></pre>' +
        '<textarea class="edit-area" id="' + id + '-edit" spellcheck="false"></textarea>' +
        '<button class="copy-btn" id="' + id + '-copy" onclick="copyCode(\'' + id + '\')">copy</button></div>' +
        '<div class="run-toolbar"><span class="lang-badge">python</span>' +
        '<button class="edit-btn" id="' + id + '-editbtn" onclick="toggleEdit(\'' + id + '\')">edit</button>' +
        '<button class="run-btn" id="' + id + '-btn" onclick="runPy(\'' + id + '\')">&#9654; Run</button></div>' +
        '<div class="run-out" id="' + id + '-out"></div></div>';
    }
    if (lang === 'js' || lang === 'javascript') {
      __codes[id] = text;
      const hl = hljs.highlight(text, {language: 'javascript'}).value;
      return '<div class="run-block"><div class="code-wrap"><pre id="' + id + '-pre"><code class="hljs language-javascript">' + hl + '</code></pre>' +
        '<textarea class="edit-area" id="' + id + '-edit" spellcheck="false"></textarea>' +
        '<button class="copy-btn" id="' + id + '-copy" onclick="copyCode(\'' + id + '\')">copy</button></div>' +
        '<div class="run-toolbar"><span class="lang-badge">javascript</span>' +
        '<button class="edit-btn" id="' + id + '-editbtn" onclick="toggleEdit(\'' + id + '\')">edit</button>' +
        '<button class="run-btn" id="' + id + '-btn" onclick="runJS(\'' + id + '\')">&#9654; Run</button></div>' +
        '<div class="run-out" id="' + id + '-out"></div></div>';
    }
    if (lang === 'lua') {
      __codes[id] = text;
      const hl = hljs.highlight(text, {language: 'lua'}).value;
      return '<div class="run-block"><div class="code-wrap"><pre id="' + id + '-pre"><code class="hljs language-lua">' + hl + '</code></pre>' +
        '<textarea class="edit-area" id="' + id + '-edit" spellcheck="false"></textarea>' +
        '<button class="copy-btn" id="' + id + '-copy" onclick="copyCode(\'' + id + '\')">copy</button></div>' +
        '<div class="run-toolbar"><span class="lang-badge">lua</span>' +
        '<button class="edit-btn" id="' + id + '-editbtn" onclick="toggleEdit(\'' + id + '\')">edit</button>' +
        '<button class="run-btn" id="' + id + '-btn" onclick="runLua(\'' + id + '\')">&#9654; Run</button></div>' +
        '<div class="run-out" id="' + id + '-out"></div></div>';
    }
    if (lang === 'sql' || lang === 'sqlite') {
      __codes[id] = text;
      const hl = hljs.highlight(text, {language: 'sql'}).value;
      return '<div class="run-block"><div class="code-wrap"><pre id="' + id + '-pre"><code class="hljs language-sql">' + hl + '</code></pre>' +
        '<textarea class="edit-area" id="' + id + '-edit" spellcheck="false"></textarea>' +
        '<button class="copy-btn" id="' + id + '-copy" onclick="copyCode(\'' + id + '\')">copy</button></div>' +
        '<div class="run-toolbar"><span class="lang-badge">sql (sqlite)</span>' +
        '<button class="edit-btn" id="' + id + '-editbtn" onclick="toggleEdit(\'' + id + '\')">edit</button>' +
        '<button class="run-btn" id="' + id + '-btn" onclick="runSQL(\'' + id + '\')">&#9654; Run</button></div>' +
        '<div class="run-out" id="' + id + '-out"></div></div>';
    }
    if (lang === 'coq' || lang === 'rocq') {
      __codes[id] = text;
      const hl = hljs.getLanguage('coq') ? hljs.highlight(text, {language: 'coq'}).value : escH(text);
      return '<div class="run-block"><div class="code-wrap"><pre id="' + id + '-pre"><code class="hljs language-coq">' + hl + '</code></pre>' +
        '<textarea class="edit-area" id="' + id + '-edit" spellcheck="false"></textarea>' +
        '<button class="copy-btn" id="' + id + '-copy" onclick="copyCode(\'' + id + '\')">copy</button></div>' +
        '<div class="run-toolbar"><span class="lang-badge">coq</span>' +
        '<button class="edit-btn" id="' + id + '-editbtn" onclick="toggleEdit(\'' + id + '\')">edit</button>' +
        '<button class="run-btn" id="' + id + '-btn" onclick="runCoq(\'' + id + '\')">&#9654; Open in jsCoq</button></div>' +
        '<div class="run-out" id="' + id + '-out"></div></div>';
    }
    return false;
  }
};

const {Marked} = window.marked;
const {markedHighlight} = window.markedHighlight;
const md = new Marked(
  markedHighlight({
    emptyLangClass: 'hljs',
    langPrefix: 'hljs language-',
    highlight(code, lang) {
      if (!lang || ['python','py','mermaid','js','javascript','lua','sql','sqlite','coq','rocq'].includes(lang)) return code;
      const l = hljs.getLanguage(lang) ? lang : 'plaintext';
      return hljs.highlight(code, {language: l}).value;
    }
  }),
  {renderer, breaks: false, gfm: true}
);

// KaTeX via marked-katex-extension (graceful fallback if UMD name differs)
const katexExt = (window.markedKatex && window.markedKatex.default) || window.markedKatex;
if (typeof katexExt === 'function') md.use(katexExt({throwOnError: false, output: 'html'}));

document.getElementById('out').innerHTML = md.parse(CONTENT);

// Add copy buttons to non-runnable code blocks
document.querySelectorAll('#out pre').forEach(pre => {
  if (pre.closest('.run-block')) return;
  const id = 'b' + Math.random().toString(36).slice(2, 10);
  __codes[id] = (pre.querySelector('code') || pre).textContent.trim();
  const wrap = document.createElement('div');
  wrap.className = 'code-wrap';
  pre.replaceWith(wrap);
  wrap.appendChild(pre);
  const btn = document.createElement('button');
  btn.id = id + '-copy';
  btn.className = 'copy-btn';
  btn.textContent = 'copy';
  btn.onclick = () => copyCode(id);
  wrap.appendChild(btn);
});

// Highlight any blocks not already handled by markedHighlight
document.querySelectorAll('pre code:not(.hljs)').forEach(el => hljs.highlightElement(el));

// Mermaid: ESM module signals ready via custom event
function doMermaid() {
  const nodes = [...document.querySelectorAll('.mermaid')];
  if (!nodes.length) return;
  (async () => {
    for (const el of nodes) {
      try {
        const {svg} = await window.__mermaid.render('mg' + Math.random().toString(36).slice(2), el.textContent.trim());
        el.innerHTML = svg;
      } catch(e) {
        el.innerHTML = '<pre style="color:#f85149;font-size:.8em">' + escH(String(e)) + '</pre>';
      }
    }
  })();
}
if (window.__mermaid) doMermaid();
else window.addEventListener('mermaid-ready', doMermaid, {once: true});
