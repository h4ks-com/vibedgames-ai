<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐌 Basically Okay Birds 😐</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 50%, #98D8AA 100%);
  font-family: 'Comic Sans MS', cursive;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#game-container {
  position: relative;
  width: 100%;
  max-width: 900px;
  height: 70vh;
  margin-top: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.15);
  overflow: hidden;
}
#ui {
  text-align: center;
  padding: 15px;
  color: #556B2F;
  z-index: 10;
}
#level-title {
  font-size: 28px;
  margin-bottom: 5px;
}
#subtitle {
  font-size: 14px;
  color: #6B8E23;
  font-style: italic;
}
.bird {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  cursor: pointer;
  transition: transform 2s ease;
  animation: breathe 4s ease-in-out infinite;
  user-select: none;
}
.bird:hover { transform: scale(1.15); }
.bird.chilled {
  background: #90EE90 !important;
  box-shadow: 0 0 20px rgba(144,238,144,0.5);
  animation: peaceful 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
@keyframes peaceful {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-3px) rotate(2deg); }
  75% { transform: translateY(3px) rotate(-2deg); }
}
.thought-bubble {
  position: absolute;
  background: white;
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 11px;
  color: #444;
  max-width: 160px;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.thought-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 20px;
  border-width: 8px 8px 0;
  border-style: solid;
  border-color: white transparent transparent;
}
.bird:hover .thought-bubble { opacity: 1; }
.pig {
  position: absolute;
  bottom: 30px;
  font-size: 40px;
  animation: pigVibe 6s ease-in-out infinite;
}
@keyframes pigVibe {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  50% { transform: translateX(10px) rotate(1deg); }
}
.cloud {
  position: absolute;
  font-size: 48px;
  opacity: 0.7;
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift {
  from { transform: translateX(-80px); }
  to { transform: translateX(calc(100vw + 80px)); }
}
.confetti-piece {
  position: fixed;
  font-size: 18px;
  animation: singleFall 4s ease-in forwards;
  pointer-events: none;
  z-index: 200;
}
@keyframes singleFall {
  0% { top: -20px; opacity: 1; transform: rotate(0deg); }
  100% { top: 110vh; opacity: 0; transform: rotate(360deg); translateX(30px); }
}
#victory-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.92);
  z-index: 500;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
#victory-overlay h1 { font-size: 36px; color: #556B2F; margin-bottom: 10px; }
#victory-overlay p { font-size: 16px; color: #6B8E23; max-width: 400px; line-height: 1.6; }
#victory-overlay button {
  margin-top: 20px;
  padding: 12px 28px;
  font-size: 16px;
  background: #98D8AA;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  color: #2F4F2F;
  font-family: inherit;
}
#victory-overlay button:hover { background: #7BC87F; }
#progress-bar {
  width: 300px;
  height: 8px;
  background: rgba(255,255,255,0.4);
  border-radius: 4px;
  margin: 10px auto;
  overflow: hidden;
}
#progress-fill {
  height: 100%;
  background: #90EE90;
  width: 0%;
  transition: width 0.5s;
  border-radius: 4px;
}
.leaf {
  position: absolute;
  font-size: 16px;
  animation: leafFall linear infinite;
  pointer-events: none;
}
@keyframes leafFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(70vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div id="ui">
  <div id="level-title">🐌 Basically Okay Birds</div>
  <div id="subtitle">Loading...</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="game-container"></div>

<div id="victory-overlay">
  <h1>✨ Level Complete ✨</h1>
  <p id="victory-text">...</p>
  <button onclick="nextLevel()">Continue (or don't)</button>
</div>

<script>
const LEVELS = [
  { name: "Mildly Pleased", subtitle: "A small good thing happened", birds: 3, thoughts: ["nice weather today", "coffee was decent", "found a penny"] },
  { name: "Content", subtitle: "Someone got a good parking spot", birds: 4, thoughts: ["close spot, nice", "i remembered my keys", "the AC feels nice"] },
  { name: "Fine", subtitle: "Everything is adequate", birds: 4, thoughts: ["it's fine", "this is okay", "no complaints really"] },
  { name: "Alright", subtitle: "A bird considers getting coffee. Decides it's not urgent.", birds: 5, thoughts: ["maybe coffee later", "i should water plants soon", "lunch was alright"] },
  { name: "Okay", subtitle: "Clouds drift by at a reasonable pace", birds: 5, thoughts: ["clouds are nice", "tuesday is a day", "my socks match"] },
  { name: "Decent", subtitle: "Someone remembered to water their plant. Nice.", birds: 6, thoughts: ["plant is alive", "good job me", "it's coming along"] },
  { name: "Acceptable", subtitle: "The WiFi is working normally. No complaints.", birds: 6, thoughts: ["wifi works", "pages load fine", "streaming is smooth"] },
  { name: "Reasonable", subtitle: "A bird thinks about going for a walk tomorrow. Maybe.", birds: 7, thoughts: ["walk tomorrow maybe", "should call mom", "need groceries eventually"] },
  { name: "Satisfactory", subtitle: "Lunch was neither good nor bad. It was lunch.", birds: 7, thoughts: ["that was lunch", "ate some food", "full now i guess"] },
  { name: "Basically Okay", subtitle: "Existential acceptance. This is life. It continues.", birds: 8, thoughts: ["this is life", "it continues", "and that's... okay", "we're all doing our best"] },
];

const BIRD_COLORS = ['#FFB347', '#FF6B6B', '#4ECDC4', '#95E1D3', '#DDA0DD', '#F0E68C', '#87CEEB', '#FF9AA2'];
const BIRD_EMOJIS = ['🐦', '🐤', '🐥', '🪿'];
let currentLevel = 0;
let birds = [];
let gameInterval = null;

const container = document.getElementById('game-container');
const levelTitle = document.getElementById('level-title');
const subtitle = document.getElementById('subtitle');
const progressFill = document.getElementById('progress-fill');

function spawnCloud() {
  const cloud = document.createElement('div');
  cloud.className = 'cloud';
  cloud.textContent = '☁️';
  cloud.style.top = Math.random() * 35 + '%';
  cloud.style.fontSize = (Math.random() * 30 + 35) + 'px';
  cloud.style.animationDuration = (Math.random() * 40 + 50) + 's';
  container.appendChild(cloud);
  setTimeout(() => cloud.remove(), 95000);
}

function spawnLeaf() {
  const leaf = document.createElement('div');
  leaf.className = 'leaf';
  leaf.textContent = ['🍃','🌿','🍂'][Math.floor(Math.random()*3)];
  leaf.style.left = Math.random() * 90 + '%';
  leaf.style.animationDuration = (Math.random() * 8 + 8) + 's';
  container.appendChild(leaf);
  setTimeout(() => leaf.remove(), 17000);
}

function createBird(index, total) {
  const bird = document.createElement('div');
  bird.className = 'bird';
  bird.innerHTML = BIRD_EMOJIS[index % BIRD_EMOJIS.length] + 
    '<div class="thought-bubble">' + LEVELS[currentLevel].thoughts[index % LEVELS[currentLevel].thoughts.length] + '</div>';
  
  const color = BIRD_COLORS[index % BIRD_COLORS.length];
  bird.style.background = color;
  bird.style.left = 5 + (index / total) * 75 + Math.random() * 10 + '%';
  bird.style.top = 15 + Math.random() * 45 + '%';
  
  bird.dataset.calmed = 'false';
  bird.dataset.calmTime = (Math.random() * 8000 + 6000) + currentLevel * 500;
  
  return bird;
}

function spawnPig() {
  const pig = document.createElement('div');
  pig.className = 'pig';
  pig.textContent = '🐷';
  pig.style.left = 40 + Math.random() * 25 + '%';
  container.appendChild(pig);
}

function updateProgress() {
  if (!birds.length) return;
  const calmed = birds.filter(b => b.dataset.calmed === 'true').length;
  progressFill.style.width = (calmed / birds.length * 100) + '%';
  
  if (calmed === birds.length && birds.length > 0) {
    clearInterval(gameInterval);
    setTimeout(showVictory, 600);
  }
}

function showVictory() {
  const overlay = document.getElementById('victory-overlay');
  const text = document.getElementById('victory-text');
  
  const messages = [
    "Everyone is basically okay now. Good job doing nothing.",
    "The birds have achieved a state of mild contentment.",
    "Nothing happened, and that turned out fine.",
    "You participated by not participating. Well done.",
    "The pigs are still there. They're also okay with it.",
    "This is what winning looks like, apparently.",
    "All birds have reached baseline emotional stability.",
    "And... that's it. That's the whole thing.",
  ];
  text.textContent = messages[currentLevel % messages.length];
  overlay.style.display = 'flex';
  
  // ONE single piece of confetti
  const confetti = document.createElement('div');
  confetti.className = 'confetti-piece';
  confetti.textContent = ['🎊','✨','🌟','💫'][currentLevel % 4];
  confetti.style.left = Math.random() * 80 + 10 + '%';
  document.body.appendChild(confetti);
  setTimeout(() => confetti.remove(), 4500);
}

function nextLevel() {
  document.getElementById('victory-overlay').style.display = 'none';
  currentLevel++;
  if (currentLevel >= LEVELS) {
    currentLevel = 0;
  }
  startLevel();
}

function startLevel() {
  container.innerHTML = '';
  birds = [];
  clearInterval(gameInterval);
  
  const lvl = LEVELS[currentLevel];
  levelTitle.textContent = `Lv${currentLevel+1}: ${lvl.name} ${['😐','🙂','😊','😌','🧘','☕','🌱','🍃','🌿','🕊️'][currentLevel]}`;
  subtitle.textContent = lvl.subtitle;
  progressFill.style.width = '0%';
  
  for (let i = 0; i < lvl.birds; i++) {
    const bird = createBird(i, lvl.birds);
    container.appendChild(bird);
    birds.push(bird);
  }
  
  spawnPig();
  
  // Spawn clouds occasionally
  for (let i = 0; i < 3; i++) setTimeout(spawnCloud, i * 3000);
  setInterval(spawnCloud, 18000);
  
  // Occasional leaf
  setInterval(spawnLeaf, 7000);
  
  gameInterval = setInterval(() => {
    let allCalmed = true;
    birds.forEach((bird, i) => {
      if (bird.dataset.calmed === 'false') {
        bird.dataset.calmTime -= 250;
        if (bird.dataset.calmTime <= 0) {
          bird.classList.add('chilled');
          bird.dataset.calmed = 'true';
          // Update thought to something more peaceful
          const bubble = bird.querySelector('.thought-bubble');
          const calmThoughts = ["ahh", "nice", "okay then", "feeling better", "all good", "*exhales*", "yep", ":)", "fine"];
          bubble.textContent = calmThoughts[i % calmThoughts.length];
        } else {
          allCalmed = false;
        }
      }
    });
    updateProgress();
    
    // Random cloud
    if (Math.random() < 0.01) spawnCloud();
  }, 250);
}

startLevel();
</script>
</body>
</html>
