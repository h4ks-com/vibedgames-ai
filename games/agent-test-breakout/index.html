<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
canvas { border: 2px solid #444; border-radius: 4px; display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 480, H = 640;
canvas.width = W; canvas.height = H;

// Game state
let state = 'start'; // start, playing, won, lost
let score = 0, lives = 3;

// Paddle
const paddle = { w: 80, h: 12, x: 0, y: 0, speed: 7 };
paddle.x = (W - paddle.w) / 2;
paddle.y = H - 40;

// Ball
let ball = { x: W/2, y: paddle.y - 8, r: 6, dx: 4, dy: -4 };

// Bricks
const COLS = 8, ROWS = 6, BRICK_W = 52, BRICK_H = 18, PAD = 4, TOP = 60, LEFT = 0;
LEFT = (W - (COLS * (BRICK_W + PAD) - PAD)) / 2;
const brickColors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6'];
let bricks = [];

function initBricks() {
  bricks = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      bricks.push({
        x: LEFT + c * (BRICK_W + PAD),
        y: TOP + r * (BRICK_H + PAD),
        w: BRICK_W, h: BRICK_H,
        color: brickColors[r],
        alive: true
      });
    }
  }
}

// Particles
let particles = [];
function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      dx: (Math.random() - 0.5) * 6,
      dy: (Math.random() - 0.5) * 6,
      life: 30,
      color
    });
  }
}

// Input
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; if (['ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });

let mouseX = W / 2;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
}, { passive: false });

canvas.addEventListener('click', () => {
  if (state === 'start' || state === 'won' || state === 'lost') startGame();
});

function startGame() {
  score = 0; lives = 3;
  initBricks();
  resetBall();
  state = 'playing';
}

function resetBall() {
  ball.x = W / 2;
  ball.y = paddle.y - ball.r - 2;
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
  const speed = 5;
  ball.dx = Math.cos(angle) * speed;
  ball.dy = Math.sin(angle) * speed;
}

function update() {
  if (state !== 'playing') return;

  // Paddle movement
  const targetX = mouseX - paddle.w / 2;
  paddle.x += (targetX - paddle.x) * 0.3;
  if (keys['ArrowLeft']) paddle.x -= paddle.speed;
  if (keys['ArrowRight']) paddle.x += paddle.speed;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

  // Ball movement
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall collisions
  if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
  if (ball.x + ball.r >= W) { ball.x = W - ball.r; ball.dx = -Math.abs(ball.dx); }
  if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

  // Bottom
  if (ball.y + ball.r > H + 20) {
    lives--;
    if (lives <= 0) { state = 'lost'; return; }
    resetBall();
  }

  // Paddle collision
  if (
    ball.dy > 0 &&
    ball.y + ball.r >= paddle.y &&
    ball.y + ball.r <= paddle.y + paddle.h + 4 &&
    ball.x >= paddle.x &&
    ball.x <= paddle.x + paddle.w
  ) {
    const hit = (ball.x - paddle.x) / paddle.w; // 0..1
    const angle = (hit - 0.5) * Math.PI * 0.7; // -63° to +63°
    const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
    const newSpeed = Math.min(speed + 0.02, 8);
    ball.dx = Math.sin(angle) * newSpeed;
    ball.dy = -Math.cos(angle) * newSpeed;
    ball.y = paddle.y - ball.r;
  }

  // Brick collisions
  for (const b of bricks) {
    if (!b.alive) continue;
    if (
      ball.x + ball.r > b.x &&
      ball.x - ball.r < b.x + b.w &&
      ball.y + ball.r > b.y &&
      ball.y - ball.r < b.y + b.h
    ) {
      b.alive = false;
      score += 10;

      // Determine side hit
      const overlapLeft = (ball.x + ball.r) - b.x;
      const overlapRight = (b.x + b.w) - (ball.x - ball.r);
      const overlapTop = (ball.y + ball.r) - b.y;
      const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
      if (minOverlap === overlapLeft || minOverlap === overlapRight) ball.dx = -ball.dx;
      else ball.dy = -ball.dy;

      spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);
      break;
    }
  }

  // Check win
  if (bricks.every(b => !b.alive)) state = 'won';

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.dx; p.y += p.dy;
    p.dy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 3);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, b.h / 2 - 2);
  }

  // Paddle
  const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  grad.addColorStop(0, '#eee');
  grad.addColorStop(1, '#999');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
  ctx.fill();

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(ball.x - 2, ball.y - 2, ball.r * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = '16px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Score: ' + score, 12, 30);
  ctx.textAlign = 'right';
  ctx.fillText('Lives: ' + '♥'.repeat(lives), W - 12, 30);

  // Overlays
  if (state === 'start') {
    drawOverlay('BREAKOUT', 'Click or tap to start');
  } else if (state === 'won') {
    drawOverlay('YOU WIN!', 'Score: ' + score + ' — Click to play again');
  } else if (state === 'lost') {
    drawOverlay('GAME OVER', 'Score: ' + score + ' — Click to retry');
  }
}

function drawOverlay(title, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 40px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(title, W/2, H/2 - 20);
  ctx.font = '18px "Segoe UI", sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.fillText(sub, W/2, H/2 + 25);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

initBricks();
loop();
</script>
</body>
</html>
