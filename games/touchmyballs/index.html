<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Touch My Balls — Game</title>
<style>
  :root{
    --bg:#0b1020;
    --panel:#0f1a2b;
    --accent:#ffd166;
    --accent-2:#06d6a0;
    --muted:#9fb4c8;
    --win:#8ce99a;
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
  }
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#061021,#0b1020);color:#e6f7ff}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px;gap:18px}
  header{display:flex;align-items:center;gap:18px}
  .logo{
    width:56px;height:56px;border-radius:12px;background:linear-gradient(180deg,#14333d,#071217);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.03);
    box-shadow:0 6px 18px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
  }
  .title{font-size:20px;font-weight:800;letter-spacing:0.4px}
  .subtitle{color:var(--muted);font-size:13px;margin-top:4px}
  .toolbar{display:flex;gap:10px;margin-left:18px}
  .btn{
    background:linear-gradient(90deg,var(--accent),#ff9f1c);border:none;padding:10px 14px;border-radius:10px;font-weight:700;color:#051018;cursor:pointer;box-shadow:0 6px 12px rgba(0,0,0,0.3)
  }
  .btn.secondary{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04);box-shadow:none}
  .status{display:flex;gap:12px;align-items:center;color:var(--muted);font-weight:600}
  .panel{
    width:100%;max-width:1100px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.02);
    box-shadow:0 8px 28px rgba(2,6,23,0.6);
    display:flex;flex-direction:column;gap:12px;
  }
  .hud{display:flex;justify-content:space-between;align-items:center;gap:12px}
  .hud-left{display:flex;gap:12px;align-items:center}
  .stat{background:rgba(255,255,255,0.02);padding:10px 12px;border-radius:10px;color:var(--muted);font-weight:700;min-width:110px;text-align:center}
  .game-area{
    position:relative;height:68vh;min-height:360px;border-radius:12px;background:
    radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.02), transparent 10%),
    linear-gradient(180deg,#071426,#04121a);overflow:hidden;border:1px solid rgba(255,255,255,0.02)
  }
  .ball{
    position:absolute;display:flex;align-items:center;justify-content:center;color:#05231c;font-weight:800;
    cursor:pointer;user-select:none;touch-action:none;border-radius:999px;
    box-shadow:0 6px 18px rgba(2,6,23,0.6);
    transition:transform .18s ease,opacity .2s ease;
    border:2px solid rgba(255,255,255,0.03);
  }
  .ball.pop{transform:scale(0.6) translateY(6px);opacity:0.0;pointer-events:none}
  .target{font-size:12px;color:var(--panel);opacity:0.95}
  .overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(180deg,rgba(2,6,23,0.3),rgba(2,6,23,0.6));z-index:40;
    backdrop-filter: blur(6px);gap:12px;padding:20px;text-align:center;
  }
  .overlay.hidden{display:none}
  .overlay h2{font-size:28px;margin:0}
  .overlay p{margin:0;color:var(--muted)}
  .confetti{position:absolute;inset:0;pointer-events:none;z-index:50;overflow:hidden}
  .confetti .piece{
    position:absolute;width:10px;height:14px;opacity:0.95;border-radius:2px;will-change:transform,opacity;
    animation:fall 1200ms linear forwards;
  }
  @keyframes fall{to{transform:translateY(120vh) rotate(720deg);opacity:0}}
  .footer{color:var(--muted);font-size:12px;text-align:center;margin-top:6px}
  @media (max-width:720px){
    .hud{flex-direction:column;align-items:stretch}
    header{flex-direction:column;align-items:flex-start}
    .toolbar{margin-left:0}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo" aria-hidden="true">
      <!-- jail grate -->
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3.5" y="3.5" width="17" height="17" rx="3" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
        <g fill="#ffd166">
          <rect x="7.2" y="4.6" width="1.8" height="14.8" rx=".9"/>
          <rect x="11.4" y="4.6" width="1.8" height="14.8" rx=".9"/>
          <rect x="15.6" y="4.6" width="1.8" height="14.8" rx=".9"/>
          <rect x="4.6" y="7.2" width="14.8" height="1.8" rx=".9"/>
          <rect x="4.6" y="11.4" width="14.8" height="1.8" rx=".9"/>
        </g>
      </svg>
    </div>
    <div>
      <div class="title">Touch My Balls</div>
      <div class="subtitle">Touch all 30 balls as fast as you can. Mobile friendly!</div>
    </div>
    <div class="toolbar">
      <button class="btn" id="startBtn">Start Game</button>
      <button class="btn secondary" id="resetBest">Reset Best</button>
    </div>
  </header>

  <div class="panel" role="main">
    <div class="hud">
      <div class="hud-left">
        <div class="stat" id="remaining">Remaining: 30</div>
        <div class="stat" id="time">Time: 0.00s</div>
        <div class="stat" id="best">Best: —</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="status">Target: <div style="margin-left:8px;padding:6px 10px;border-radius:8px;background:var(--accent);color:#051018;font-weight:800">30 Balls</div></div>
      </div>
    </div>

    <div class="game-area" id="area" aria-label="Game area where balls appear">
      <!-- balls created here -->
      <div class="overlay" id="overlay">
        <h2>Touch My Balls</h2>
        <p>Touch 30 balls to win. Press Start to begin, then tap the balls. Good luck!</p>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn" id="overlayStart">Start</button>
          <button class="btn secondary" id="overlayHow">How to Play</button>
        </div>
      </div>
      <div class="confetti" id="confetti"></div>
    </div>
  </div>

  <div class="footer">Made with playful pixels. No real balls harmed.</div>
</div>

<script>
(() => {
  const TOTAL = 30;
  const area = document.getElementById('area');
  const remainingEl = document.getElementById('remaining');
  const timeEl = document.getElementById('time');
  const bestEl = document.getElementById('best');
  const startBtn = document.getElementById('startBtn');
  const resetBestBtn = document.getElementById('resetBest');
  const overlay = document.getElementById('overlay');
  const overlayStart = document.getElementById('overlayStart');
  const overlayHow = document.getElementById('overlayHow');
  const confettiRoot = document.getElementById('confetti');

  let balls = [];
  let hits = 0;
  let started = false;
  let startTime = 0;
  let timerRaf = null;
  let best = localStorage.getItem('tmb_best') ? parseFloat(localStorage.getItem('tmb_best')) : null;

  function formatTime(t){
    return t.toFixed(2) + 's';
  }
  function updateBestDisplay(){
    bestEl.textContent = best ? 'Best: ' + formatTime(best) : 'Best: —';
  }
  updateBestDisplay();

  function rand(min, max){ return Math.random()*(max-min)+min; }

  function placeBalls(){
    clearBalls();
    const rect = area.getBoundingClientRect();
    const pad = 6;
    for(let i=0;i<TOTAL;i++){
      const size = Math.floor(rand(44,86));
      const ball = document.createElement('div');
      ball.className = 'ball';
      ball.style.width = size + 'px';
      ball.style.height = size + 'px';
      // random bright-ish color
      const hue = Math.floor(rand(180,340));
      const sat = Math.floor(rand(60,90));
      const light = Math.floor(rand(48,70));
      ball.style.background = `hsl(${hue} ${sat}% ${light}%)`;
      // ensure within area
      const maxLeft = Math.max(0, rect.width - size - pad);
      const maxTop = Math.max(0, rect.height - size - pad);
      ball.style.left = Math.floor(rand(pad, maxLeft)) + 'px';
      ball.style.top = Math.floor(rand(pad, maxTop)) + 'px';
      ball.setAttribute('data-idx', i);
      ball.innerHTML = `<div class="target">${i+1}</div>`;
      // pointer events for touch & mouse
      ball.addEventListener('pointerdown', onBallTouch, {passive:false});
      area.appendChild(ball);
      balls.push(ball);
    }
  }

  function clearBalls(){
    balls.forEach(b => b.removeEventListener('pointerdown', onBallTouch));
    balls.forEach(b => b.remove());
    balls = [];
  }

  function onBallTouch(e){
    e.preventDefault();
    if(!started) startTimer();
    const ball = e.currentTarget;
    if(ball.classList.contains('pop')) return;
    ball.classList.add('pop');
    hitEffect(ball);
    hits++;
    remainingEl.textContent = 'Remaining: ' + Math.max(0, TOTAL - hits);
    playBeep();
    if(hits >= TOTAL) win();
  }

  function hitEffect(ball){
    // little random wobble then fade handled by CSS
    setTimeout(()=>{ ball.remove(); }, 180);
  }

  function startTimer(){
    if(started) return;
    started = true;
    startTime = performance.now();
    timerRaf = requestAnimationFrame(updateTimer);
    startBtn.textContent = 'Restart';
  }

  function updateTimer(){
    const now = performance.now();
    const elapsed = (now - startTime)/1000;
    timeEl.textContent = 'Time: ' + formatTime(elapsed);
    timerRaf = requestAnimationFrame(updateTimer);
  }

  function stopTimer(){
    if(timerRaf) cancelAnimationFrame(timerRaf);
    timerRaf = null;
    started = false;
  }

  function resetGame(){
    stopTimer();
    hits = 0;
    remainingEl.textContent = 'Remaining: ' + TOTAL;
    timeEl.textContent = 'Time: 0.00s';
    clearConfetti();
    placeBalls();
    overlay.classList.add('hidden');
    startBtn.textContent = 'Restart';
  }

  function win(){
    stopTimer();
    const elapsed = (performance.now() - startTime)/1000;
    // update best
    if(!best || elapsed < best){
      best = elapsed;
      localStorage.setItem('tmb_best', best.toString());
    }
    updateBestDisplay();
    // show overlay victory
    overlay.classList.remove('hidden');
    overlay.innerHTML = `<h2>YOU WIN!</h2><p>Touched all ${TOTAL} balls in ${formatTime(elapsed)}.</p><p style="color:var(--muted);margin-top:6px">Best: ${best?formatTime(best):'—'}</p><div style="display:flex;gap:8px;margin-top:12px"><button class="btn" id="playAgain">Play Again</button><button class="btn secondary" id="closeOverlay">Close</button></div>`;
    document.getElementById('playAgain').addEventListener('click', ()=>{ resetGame(); });
    document.getElementById('closeOverlay').addEventListener('click', ()=>{ overlay.classList.add('hidden'); });
    burstConfetti();
    playWinSound();
  }

  // Simple beep using WebAudio
  let audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
    }
  }
  function playBeep(){
    ensureAudio();
    if(!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = rand(600,1000);
    g.gain.value = 0.0001;
    o.connect(g); g.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    g.gain.exponentialRampToValueAtTime(0.12, now+0.001);
    g.gain.exponentialRampToValueAtTime(0.001, now+0.12);
    o.start(now);
    o.stop(now+0.13);
  }
  function playWinSound(){
    ensureAudio();
    if(!audioCtx) return;
    const now = audioCtx.currentTime;
    for(let i=0;i<4;i++){
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.frequency.value = 400 + i*120;
      o.type = i%2===0?'sine':'triangle';
      o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.12, now+0.01 + i*0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now+0.28 + i*0.02);
      o.start(now + i*0.03);
      o.stop(now + 0.35 + i*0.02);
    }
  }

  // confetti
  function burstConfetti(){
    clearConfetti();
    const count = 80;
    const colors = ['#ffd166','#06d6a0','#118ab2','#ef476f','#8338ec'];
    const w = area.clientWidth;
    for(let i=0;i<count;i++){
      const p = document.createElement('div');
      p.className = 'piece';
      p.style.left = Math.random()*w + 'px';
      p.style.top = (-Math.random()*40 - 10) + 'px';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.transform = `rotate(${Math.random()*360}deg)`;
      p.style.animationDuration = (900 + Math.random()*700) + 'ms';
      p.style.opacity = (0.8 + Math.random()*0.2);
      confettiRoot.appendChild(p);
    }
    setTimeout(clearConfetti, 1600);
  }
  function clearConfetti(){ confettiRoot.innerHTML = ''; }

  // UI handlers
  startBtn.addEventListener('click', ()=>{ resetGame(); });
  overlayStart.addEventListener('click', ()=>{ resetGame(); });
  overlayHow.addEventListener('click', ()=>{
    alert('Tap or click any ball to pop it. Pop all 30 as fast as you can. On mobile, use your finger to touch them. Good luck!');
  });

  resetBestBtn.addEventListener('click', ()=>{
    if(confirm('Reset best time?')){ localStorage.removeItem('tmb_best'); best = null; updateBestDisplay(); }
  });

  // initialize
  placeBalls();
  remainingEl.textContent = 'Remaining: ' + TOTAL;

  // handle resize: reposition remaining balls to stay inside
  window.addEventListener('resize', ()=>{
    // re-clamp positions
    const rect = area.getBoundingClientRect();
    balls.forEach(b => {
      const size = b.offsetWidth;
      const maxLeft = Math.max(0, rect.width - size - 6);
      const maxTop = Math.max(0, rect.height - size - 6);
      const curLeft = parseFloat(b.style.left) || 0;
      const curTop = parseFloat(b.style.top) || 0;
      b.style.left = Math.min(curLeft, maxLeft) + 'px';
      b.style.top = Math.min(curTop, maxTop) + 'px';
    });
  });

  // accessibility: allow keyboard "click" focus of balls (tabindex)
  function enableKeyboardSupport(){
    balls.forEach(b => {
      b.setAttribute('tabindex','0');
      b.addEventListener('keydown', e => {
        if(e.key === 'Enter' || e.key === ' ') onBallTouch({preventDefault:()=>{}, currentTarget:b});
      });
    });
  }
  // call after initial placement
  enableKeyboardSupport();

  // start audio on first user gesture to ensure sounds work on mobile
  function resumeAudio(){
    ensureAudio();
    if(audioCtx && audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
    window.removeEventListener('pointerdown', resumeAudio);
  }
  window.addEventListener('pointerdown', resumeAudio, {passive:true});

})();
</script>
</body>
</html>
