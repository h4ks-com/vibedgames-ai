<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌧️ Raindrops</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 50%, #2a2a4a 100%);
  overflow: hidden;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
}
canvas { display: block; }
.welcome {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  z-index: 10;
}
.welcome h1 {
  font-size: 4rem;
  color: transparent;
  background: linear-gradient(135deg, #7ec8e3, #a8e6cf, #dcedc1);
  -webkit-background-clip: text;
  background-clip: text;
  text-shadow: 0 0 40px rgba(126,200,227,0.3);
  animation: glow 3s ease-in-out infinite alternate;
}
.welcome p {
  color: rgba(255,255,255,0.6);
  font-size: 1.2rem;
  margin-top: 10px;
  letter-spacing: 3px;
}
@keyframes glow {
  from { filter: drop-shadow(0 0 20px rgba(126,200,227,0.4)); }
  to { filter: drop-shadow(0 0 40px rgba(168,230,207,0.6)); }
}
.stats {
  position: fixed;
  bottom: 20px;
  left: 20px;
  color: rgba(255,255,255,0.5);
  font-size: 0.85rem;
  font-family: monospace;
}
.click-hint {
  position: fixed;
  bottom: 20px;
  right: 20px;
  color: rgba(255,255,255,0.4);
  font-size: 0.85rem;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="welcome">
  <h1>🌧️ raindrops 🌧️</h1>
  <p>welcome to h4ks</p>
</div>
<div class="stats" id="stats"></div>
<div class="click-hint">click anywhere for splash ✨</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Raindrop {
  constructor(x, y, isSplash = false) {
    this.x = x || Math.random() * W;
    this.y = y || -20;
    this.speed = Math.random() * 8 + 12;
    this.length = Math.random() * 25 + 15;
    this.opacity = Math.random() * 0.5 + 0.3;
    this.thickness = Math.random() * 2 + 0.5;
    this.wind = (Math.random() - 0.5) * 2;
    this.isSplash = isSplash;
    
    if (isSplash) {
      this.particles = [];
      const count = Math.floor(Math.random() * 8) + 6;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI / count) * i + Math.random() * 0.5;
        const speed = Math.random() * 4 + 2;
        this.particles.push({
          x: this.x,
          y: this.y,
          vx: Math.cos(angle) * speed,
          vy: -Math.sin(angle) * speed * 1.5,
          life: 1,
          size: Math.random() * 2 + 1
        });
      }
      this.life = 1;
    }
  }

  update() {
    if (this.isSplash) {
      this.life -= 0.03;
      this.particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life = this.life;
      });
      return this.life > 0;
    }
    
    this.y += this.speed;
    this.x += this.wind;
    
    if (this.y > H) {
      if (Math.random() > 0.7) {
        splashes.push(new Raindrop(this.x, H - 5, true));
      }
      return false;
    }
    return true;
  }

  draw() {
    if (this.isSplash) {
      this.particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(168, 230, 207, ${p.life * 0.8})`;
        ctx.fill();
      });
      return;
    }
    
    const grad = ctx.createLinearGradient(this.x, this.y - this.length, this.x, this.y);
    grad.addColorStop(0, `rgba(126, 200, 227, 0)`);
    grad.addColorStop(0.5, `rgba(126, 200, 227, ${this.opacity * 0.5})`);
    grad.addColorStop(1, `rgba(168, 230, 207, ${this.opacity})`);
    
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - this.length);
    ctx.lineTo(this.x + this.wind * 2, this.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = this.thickness;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
}

// Ripple effect class
class Ripple {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.radius = 0;
    this.maxRadius = Math.random() * 60 + 40;
    this.life = 1;
    this.speed = Math.random() * 2 + 1.5;
  }
  
  update() {
    this.radius += this.speed;
    this.life = 1 - (this.radius / this.maxRadius);
    return this.life > 0;
  }
  
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(126, 200, 227, ${this.life * 0.5})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

const drops = [];
const splashes = [];
const ripples = [];
let totalDrops = 0;

function spawnDrop() {
  drops.push(new Raindrop());
  totalDrops++;
}

// Initial burst
for (let i = 0; i < 80; i++) {
  setTimeout(() => spawnDrop(), i * 30);
}

setInterval(() => {
  if (drops.length < 150) spawnDrop();
}, 60);

canvas.addEventListener('click', (e) => {
  // Big splash on click
  for (let i = 0; i < 3; i++) {
    splashes.push(new Raindrop(
      e.clientX + (Math.random() - 0.5) * 30,
      e.clientY + (Math.random() - 0.5) * 30,
      true
    ));
  }
  ripples.push(new Ripple(e.clientX, e.clientY));
  // Spawn extra rain around click
  for (let i = 0; i < 15; i++) {
    const d = new Raindrop(
      e.clientX + (Math.random() - 0.5) * 100,
      e.clientY - Math.random() * 100
    );
    d.speed *= 1.5;
    drops.push(d);
  }
});

function drawBackground() {
  // Subtle gradient shift based on time
  const t = Date.now() * 0.0001;
  const r1 = Math.sin(t) * 5 + 10;
  const b1 = Math.cos(t * 0.7) * 10 + 30;
  
  ctx.fillStyle = `rgba(${r1}, ${r1}, ${26 + b1}, 0.1)`;
  ctx.fillRect(0, 0, W, H);
}

function animate() {
  ctx.fillStyle = 'rgba(10, 10, 26, 0.25)';
  ctx.fillRect(0, 0, W, H);
  
  // Update and draw drops
  for (let i = drops.length - 1; i >= 0; i--) {
    if (!drops[i].update()) drops.splice(i, 1);
    else drops[i].draw();
  }
  
  // Splashes
  for (let i = splashes.length - 1; i >= 0; i--) {
    if (!splashes[i].update()) splashes.splice(i, 1);
    else splashes[i].draw();
  }
  
  // Ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    if (!ripples[i].update()) ripples.splice(i, 1);
    else ripples[i].draw();
  }
  
  document.getElementById('stats').textContent = 
    `💧 ${drops.length} drops | 💥 ${splashes.length} splashes | 🔵 ${ripples.length} ripples | ☔ ${totalDrops} total`;
  
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
