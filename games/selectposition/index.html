<!doctype html><html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><style>
body{margin:0;font-family:system-ui;background:#111;color:#eee}#bar{padding:8px;background:#0b0b0b;border-bottom:1px solid #222}button{padding:6px 8px;border-radius:6px;border:0;background:#222;color:#fff;cursor:pointer}#s{position:fixed;inset:40px;overflow:hidden}
.w{position:absolute;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.6);min-width:180px;min-height:160px;resize:both;display:flex;flex-direction:column;overflow:hidden}
.t{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 6px;cursor:grab}
.c{padding:8px;overflow:auto;flex:1 1 auto}
.b{width:28px;height:24px;border:0;background:rgba(255,255,255,.06);border-radius:6px}
.e{min-height:60px;outline:none;user-select:text}
.list{max-height:90px;overflow:auto;border-top:1px solid rgba(255,255,255,.03);padding:6px;background:rgba(0,0,0,.06);font-size:13px}
.li{display:flex;gap:8px;align-items:center;padding:6px;border-radius:6px;background:rgba(0,0,0,.12);margin-bottom:6px}
.sw{width:16px;height:12px;border-radius:3px;flex:0 0 16px}
.lt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meta{opacity:.8;font-size:12px;margin-left:8px}
</style><body><div id=bar><button id=n>New</button></div><div id=s></div><script>
(()=>{const s=document.getElementById('s'),n=document.getElementById('n');let z=100,i=0;const F=['serif','sans-serif','monospace'];
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function h(){return' hsl('+rnd(0,359)+' '+rnd(50,85)+'% '+rnd(30,70)+'%)'}
function hi(){return'hsla('+rnd(0,359)+','+rnd(60,90)+'%,'+rnd(45,65)+'%,.9)'}
function create(){
 i++;const w=document.createElement('div');w.className='w';w.style.width=rnd(220,420)+'px';w.style.height=rnd(180,420)+'px';
 const R=s.getBoundingClientRect();w.style.left=rnd(8,Math.max(8,R.width-200))+'px';w.style.top=rnd(8,Math.max(8,R.height-150))+'px';
 const bg=h(),t=h(),txt=h(),fg=h(),fs=rnd(12,20)+'px',ff=F[rnd(0,2)];w.style.background=bg;w.style.color=fg;w.style.fontFamily=ff;w.style.fontSize=fs;
 w.innerHTML=
 `<div class=t style="background:${t};color:${fg}"><span>Win ${i}</span><span><button class=b id=add>＋</button><button class=b id=cl>✕</button></span></div>
  <div class=c style="background:${txt};color:${fg};font-size:${fs}">
    <div class=e contenteditable=true>Editable text ${i} — select parts and click Highlight.</div>
    <div style="margin-top:8px">
      <button class=sp>Spawn</button> <button class=cc>Close</button> <button class=hi>Highlight</button> <button class=undo>Undo</button> <button class=redo>Redo</button>
    </div>
    <div class=list></div>
  </div>`;
 w.style.zIndex=++z; s.appendChild(w);
 const ed=w.querySelector('.e'),list=w.querySelector('.list'),undo=[],MAX=120;let p=-1;
 function push(v){v=v===undefined?ed.innerHTML:v; if(undo[p]===v) return; undo.splice(p+1); undo.push(v); if(undo.length>MAX) undo.shift(); p=undo.length-1; rebuildList();}
 function setState(idx){ if(idx<0||idx>=undo.length) return; p=idx; ed.innerHTML=undo[p]; rebuildList(); placeCaretEnd(ed) }
 function undoFn(){ if(p>0) setState(p-1) }
 function redoFn(){ if(p<undo.length-1) setState(p+1) }
 function placeCaretEnd(el){el.focus();const r=document.createRange();r.selectNodeContents(el);r.collapse(false);const s=window.getSelection();s.removeAllRanges();s.addRange(r)}
 function rebuildList(){
   list.innerHTML=''; const spans=ed.querySelectorAll('span[data-hid]'); spans.forEach(sp=>{
     const id=sp.dataset.hid, text=sp.textContent.trim(), start=sp.dataset.hstart, end=sp.dataset.hend;
     const li=document.createElement('div'); li.className='li'; li.dataset.hid=id;
     const sw=document.createElement('span'); sw.className='sw'; sw.style.background=sp.dataset.hcolor||sp.style.background;
     const lt=document.createElement('div'); lt.className='lt'; lt.textContent=text;
     const meta=document.createElement('div'); meta.className='meta'; meta.textContent=`[${start}-${end}]`;
     const rm=document.createElement('button'); rm.textContent='✕'; rm.className='b'; rm.style.marginLeft='auto';
     rm.addEventListener('click',e=>{ e.stopPropagation(); const ssp=ed.querySelector('span[data-hid="'+id+'"]'); if(ssp){ const frag=document.createDocumentFragment(); while(ssp.firstChild) frag.appendChild(ssp.firstChild); ssp.replaceWith(frag); push(); } li.remove(); });
     li.appendChild(sw); li.appendChild(lt); li.appendChild(meta); li.appendChild(rm); list.appendChild(li);
   });
 }
 push();
 ed.addEventListener('input',()=>push());
 w.querySelector('.undo').addEventListener('click',undoFn);
 w.querySelector('.redo').addEventListener('click',redoFn);
 ed.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()=='z'){e.preventDefault();undoFn()} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()=='y'){e.preventDefault();redoFn()}});
 function computeOffset(root,targetNode,offsetInNode){
   let count=0; let found=false;
   function walk(node){
     if(node===targetNode){
       if(node.nodeType===3) { count+=offsetInNode; found=true; return; }
       // element node: sum textContent of child nodes up to offsetInNode
       for(let i=0;i<offsetInNode;i++){ const ch=node.childNodes[i]; if(ch) count+=ch.textContent.length; } found=true; return;
     }
     if(node.nodeType===3) count+=node.nodeValue.length;
     for(let c of node.childNodes){ if(found) return; walk(c); if(found) return; }
   }
   walk(root);
   return count;
 }
 // highlight
 w.querySelector('.hi').addEventListener('click',ev=>{
   ev.stopPropagation(); const sel=window.getSelection(); if(!sel.rangeCount) return; const r=sel.getRangeAt(0); if(r.collapsed) return; if(!w.contains(r.commonAncestorContainer)) return;
   try{
     // compute offsets in terms of plain text of ed BEFORE change
     const start=computeOffset(ed,r.startContainer,r.startOffset);
     const end=computeOffset(ed,r.endContainer,r.endOffset);
     const stext=ed.textContent.slice(Math.min(start,end),Math.max(start,end));
     const frag=r.extractContents(); const sp=document.createElement('span'); const col=hi(); const id='h'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
     sp.style.background=col; sp.style.padding='0 .08em'; sp.style.borderRadius='3px';
     sp.dataset.hid=id; sp.dataset.hcolor=col; sp.dataset.hstart=Math.min(start,end); sp.dataset.hend=Math.max(start,end);
     sp.appendChild(frag); r.insertNode(sp);
     sel.removeAllRanges(); const nr=document.createRange(); nr.setStartAfter(sp); nr.collapse(true); sel.addRange(nr);
     push();
   }catch(e){}
 });
 // drag
 const tb=w.querySelector('.t');let drag=false,ox=0,oy=0,pid=null;
 tb.addEventListener('pointerdown',e=>{ if(e.target.closest('button'))return; drag=true; pid=e.pointerId; const r=w.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top; tb.setPointerCapture&&tb.setPointerCapture(pid); w.style.zIndex=++z; });
 tb.addEventListener('pointerup',e=>{ drag=false; tb.releasePointerCapture&&tb.releasePointerCapture(e.pointerId); pid=null; });
 document.addEventListener('pointermove',e=>{ if(!drag||pid!=null&&e.pointerId!==pid) return; const R=s.getBoundingClientRect(); let nx=e.clientX-ox-R.left, ny=e.clientY-oy-R.top; w.style.left=Math.max(-140,Math.min(nx,R.width-80))+'px'; w.style.top=Math.max(-140,Math.min(ny,R.height-40))+'px';});
 // controls
 w.querySelector('#cl').addEventListener('click',e=>{e.stopPropagation();w.remove()});
 w.querySelector('.cc').addEventListener('click',e=>{e.stopPropagation();w.remove()});
 w.querySelector('#add').addEventListener('click',e=>{e.stopPropagation();create()});
 w.querySelector('.sp').addEventListener('click',e=>{e.stopPropagation();create()});
}
n.addEventListener('click',create);create();create();
})();
</script></body></html>
