<!doctype html>
<html><head><meta charset="utf-8"><title>Mini Sheets</title>
<style>
body{font-family:sans-serif;margin:10px}
button{margin:0 6px 6px 0}
.win{position:absolute;width:420px;height:260px;border:1px solid #444;background:#fff;box-shadow:2px 2px 8px rgba(0,0,0,.2);resize:both;overflow:auto}
.h{background:#2d89ef;color:#fff;padding:6px;cursor:move;display:flex;align-items:center;justify-content:space-between}
.controls{padding:6px;border-top:1px solid #ddd;background:#f6f6f6}
table{border-collapse:collapse;width:100%;table-layout:fixed}
td{border:1px solid #ccc;width:120px;height:28px;overflow:hidden;padding:4px;box-sizing:border-box}
td:focus{outline:2px solid #2d89ef}
</style></head><body>
<button id="spawn">New Sheet</button>
<script>
let idc=0,off=20
document.getElementById('spawn').addEventListener('click',create)
function create(){
  idc++; const id='w'+idc
  const w=document.createElement('div');w.className='win';w.id=id
  w.style.left=off*idc+'px';w.style.top=off*idc+'px'
  w.innerHTML=`
  <div class="h"><span>Sheet ${idc}</span><div><button data-act=close>✖</button></div></div>
  <div class="controls">
    <button data-act=addRow>Add Row</button><button data-act=delRow>Delete Row</button>
    <button data-act=addCol>Add Col</button><button data-act=delCol>Delete Col</button>
    <button data-act=export>Export CSV</button>
  </div>
  <div style="padding:6px"><table><tbody></tbody></table></div>`
  document.body.appendChild(w);drag(w)
  const tb=w.querySelector('tbody')
  for(let r=0;r<5;r++){const tr=document.createElement('tr')
    for(let c=0;c<3;c++){const td=document.createElement('td');td.contentEditable=true;td.spellcheck=false;td.tabIndex=0;tr.appendChild(td)}
    tb.appendChild(tr)
  }
  w.querySelectorAll('button').forEach(b=>b.addEventListener('click',e=>act(e,w)))
  w.querySelector('table').addEventListener('keydown',e=>nav(e,tb))
}
function act(e,w){
  const a=e.currentTarget.dataset.act, tb=w.querySelector('tbody')
  if(a=='close'){w.remove();return}
  if(a=='addRow'){const tr=document.createElement('tr'),cols=(tb.rows[0]?tb.rows[0].cells.length:1)
    for(let i=0;i<cols;i++){const td=document.createElement('td');td.contentEditable=true;td.spellcheck=false;td.tabIndex=0;tr.appendChild(td)}
    tb.appendChild(tr);return}
  if(a=='delRow'){if(tb.rows.length>1)tb.deleteRow(tb.rows.length-1);return}
  if(a=='addCol'){for(let r=0;r<tb.rows.length;r++){const td=document.createElement('td');td.contentEditable=true;td.spellcheck=false;td.tabIndex=0;tb.rows[r].appendChild(td)}return}
  if(a=='delCol'){const cols=(tb.rows[0]?tb.rows[0].cells.length:0);if(cols>1)for(let r=0;r<tb.rows.length;r++)tb.rows[r].deleteCell(cols-1);return}
  if(a=='export'){let s='',rows=tb.rows.length
    for(let r=0;r<rows;r++){const cells=tb.rows[r].cells,arr=[]
      for(let c=0;c<cells.length;c++){let v=cells[c].innerText.replace(/\r\n/g,'\n').replace(/\n/g,'\\n'); if(v.includes('"')||v.includes(',')||v.includes('\\n')) v='"'+v.replace(/"/g,'""')+'"'; arr.push(v)}
      s+=arr.join(',')+(r<rows-1?'\n':'')}
    const b=new Blob([s],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='sheet.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u)
  }
}
function nav(e,tb){
  const td=e.target.closest('td'); if(!td) return
  const tr=td.parentElement,r=tr.sectionRowIndex,c=td.cellIndex,rows=tb.rows.length,cols=(tb.rows[0]?tb.rows[0].cells.length:0)
  let nr=r,nc=c,handled=false
  if(e.key==='ArrowLeft'){nc=Math.max(0,c-1);handled=true}
  else if(e.key==='ArrowRight'){nc=Math.min(cols-1,c+1);handled=true}
  else if(e.key==='ArrowUp'){nr=Math.max(0,r-1);handled=true}
  else if(e.key==='ArrowDown'){nr=Math.min(rows-1,r+1);handled=true}
  else if(e.key==='Tab'){
    if(e.shiftKey){ if(c>0) nc=c-1; else if(r>0){nr=r-1;nc=tb.rows[nr].cells.length-1} }
    else { if(c<cols-1) nc=c+1; else if(r<rows-1){nr=r+1;nc=0} }
    if(nr!==r||nc!==c){handled=true}
  }
  if(handled){ e.preventDefault(); const dest=tb.rows[nr].cells[nc]; if(dest){ dest.focus(); placeEnd(dest) } }
}
function placeEnd(el){el.focus(); if(window.getSelection&&document.createRange){const r=document.createRange(),s=window.getSelection();r.selectNodeContents(el);r.collapse(false);s.removeAllRanges();s.addRange(r)}}
function drag(el){
  const h=el.querySelector('.h');let sx,sy,ox,oy,dragging=false
  h.addEventListener('mousedown',e=>{
    if(e.target.tagName==='BUTTON') return
    dragging=true;sx=e.clientX;sy=e.clientY;ox=parseInt(getComputedStyle(el).left)||0;oy=parseInt(getComputedStyle(el).top)||0
    document.addEventListener('mousemove',m);document.addEventListener('mouseup',u)
  })
  function m(e){ if(!dragging) return; el.style.left=(ox+e.clientX-sx)+'px'; el.style.top=(oy+e.clientY-sy)+'px' }
  function u(){ dragging=false; document.removeEventListener('mousemove',m);document.removeEventListener('mouseup',u) }
}
</script></body></html>
