<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sloptube - AI Video Catalog</title>
<style>
:root {
  --bg: #090a0f;
  --surface: #11131b;
  --surface-raised: #171a24;
  --surface-hover: #202431;
  --border: #292e3c;
  --border-strong: #3a4051;
  --text: #f2f3f7;
  --text-muted: #a5aaba;
  --text-subtle: #717789;
  --accent: #f43f73;
  --accent-strong: #ff5b8c;
  --cyan: #5bd8e6;
  --shadow: 0 18px 44px rgba(0, 0, 0, .26);
}
* { box-sizing: border-box; }
html { background: var(--bg); }
body {
  min-width: 320px;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.45;
}
button, input { font: inherit; }
button { color: inherit; }
:focus-visible { outline: 2px solid var(--cyan); outline-offset: 3px; }
.site-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  min-height: 68px;
  padding: 12px max(20px, calc((100vw - 1520px) / 2));
  gap: 28px;
  background: rgba(9, 10, 15, .9);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 0;
  border: 0;
  background: transparent;
  color: var(--text);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0;
  cursor: pointer;
}
.brand-mark {
  display: grid;
  width: 28px;
  height: 22px;
  place-items: center;
  border-radius: 5px;
  background: var(--accent);
  color: #fff;
  font-size: 12px;
  line-height: 1;
}
.search-shell { position: relative; flex: 1; max-width: 590px; }
.search-shell span {
  position: absolute;
  top: 50%;
  left: 14px;
  color: var(--text-subtle);
  transform: translateY(-51%);
  pointer-events: none;
}
.search-shell input {
  width: 100%;
  height: 40px;
  padding: 0 14px 0 42px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  transition: border-color .16s, background .16s;
}
.search-shell input::placeholder { color: var(--text-subtle); }
.search-shell input:hover { border-color: var(--border-strong); }
.search-shell input:focus { border-color: var(--accent); outline: 0; }
.menu { position: relative; margin-left: auto; flex: none; }
.menu-btn { display: grid; place-items: center; width: 40px; height: 40px; padding: 0; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; transition: border-color .15s, background .15s; }
.menu-btn:hover { border-color: var(--border-strong); background: var(--surface-raised); }
.menu-btn .burger, .menu-btn .burger::before, .menu-btn .burger::after { content: ""; display: block; width: 16px; height: 2px; border-radius: 2px; background: var(--text-muted); transition: background .15s; }
.menu-btn .burger { position: relative; }
.menu-btn .burger::before { position: absolute; top: -5px; left: 0; }
.menu-btn .burger::after { position: absolute; top: 5px; left: 0; }
.menu-btn:hover .burger, .menu-btn:hover .burger::before, .menu-btn:hover .burger::after { background: var(--text); }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
.menu-panel { position: absolute; top: calc(100% + 10px); right: 0; width: 250px; padding: 8px; border: 1px solid var(--border-strong); border-radius: 9px; background: var(--surface-raised); box-shadow: var(--shadow); z-index: 30; }
.menu-panel[hidden] { display: none; }
.menu-info { display: flex; flex-direction: column; gap: 3px; padding: 8px 10px 11px; margin-bottom: 6px; border-bottom: 1px solid var(--border); }
.menu-info strong { font-size: 14px; font-weight: 750; }
.menu-info span { color: var(--text-subtle); font-size: 12px; }
.menu-item { display: flex; align-items: center; gap: 9px; width: 100%; min-height: 40px; padding: 0 10px; border: 0; border-radius: 6px; background: transparent; color: var(--text); font-size: 13px; font-weight: 650; text-align: left; cursor: pointer; }
.menu-item:hover:not(:disabled) { background: var(--surface-hover); }
.menu-item:disabled { color: var(--text-subtle); cursor: default; }
.menu-item.danger { color: var(--accent-strong); }
.menu-item.danger:hover:not(:disabled) { background: rgba(244, 63, 115, .12); }
.menu-item .mini-spin { width: 14px; height: 14px; border: 2px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
.catalog-shell, .watch-shell { max-width: 1520px; margin: 0 auto; padding: 38px 28px 56px; }
.catalog-intro { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 26px; }
.eyebrow { margin: 0 0 5px; color: var(--accent-strong); font-size: 12px; font-weight: 750; letter-spacing: .08em; text-transform: uppercase; }
h1, h2, p { margin-top: 0; }
h1 { margin-bottom: 4px; font-size: 28px; line-height: 1.2; letter-spacing: 0; }
.catalog-copy { margin: 0; color: var(--text-muted); font-size: 14px; }
.result-count { color: var(--text-muted); font-size: 14px; white-space: nowrap; }
.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 25px; padding: 2px 1px; }
.filter-chip {
  flex: none;
  min-height: 32px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--surface);
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 650;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
}
.filter-chip:hover { border-color: var(--border-strong); background: var(--surface-raised); color: var(--text); }
.filter-chip.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(244px, 1fr)); gap: 22px 16px; }
.video-card {
  min-width: 0;
  padding: 8px 8px 12px;
  overflow: visible;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  text-align: left;
  cursor: pointer;
  transition: border-color .18s, background .18s, transform .18s;
}
.thumb {
  position: relative;
  overflow: hidden;
  width: 100%;
  aspect-ratio: 16 / 9;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface-raised);
  box-shadow: 0 0 0 0 rgba(244, 63, 115, 0);
  transition: transform .18s ease, border-color .18s, box-shadow .18s;
}
.thumb video { position: relative; z-index: 1; width: 100%; height: 100%; object-fit: cover; vertical-align: top; }
.thumb-fallback {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: grid;
  place-items: center;
  background: #1b2030;
  color: var(--text-subtle);
  opacity: 0;
  transition: opacity .18s;
}
.thumb-fallback::after { content: "\26A0"; font-size: 24px; line-height: 1; }
.related-thumb .thumb-fallback::after { font-size: 16px; }
.preview-error .thumb-fallback { opacity: 1; }
.thumb::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 48%, rgba(0, 0, 0, .46)); opacity: .58; }
.play-icon {
  position: absolute;
  z-index: 1;
  top: 50%;
  left: 50%;
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  border: 1px solid rgba(255, 255, 255, .6);
  border-radius: 50%;
  background: rgba(10, 11, 16, .56);
  color: #fff;
  font-size: 15px;
  opacity: 0;
  transform: translate(-50%, -43%);
  transition: opacity .18s, transform .18s, background .18s;
}
.video-card:hover, .video-card:focus-visible { border-color: var(--border-strong); background: var(--surface-raised); transform: translateY(-2px); }
.video-card:hover .thumb, .video-card:focus-visible .thumb { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.video-card:hover .play-icon, .video-card:focus-visible .play-icon { opacity: 1; transform: translate(-50%, -50%); }
.video-card:hover .play-icon { background: var(--accent); }
.card-info { padding: 10px 2px 0; }
.card-title { display: -webkit-box; overflow: hidden; margin: 0 0 4px; -webkit-box-orient: vertical; -webkit-line-clamp: 2; font-size: 14px; font-weight: 700; line-height: 1.35; }
.card-meta { overflow: hidden; color: var(--text-subtle); font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
.tag-row { display: flex; gap: 5px; overflow: hidden; margin-top: 7px; }
.tag { flex: none; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; color: var(--text-subtle); font-size: 11px; line-height: 1.25; }
.loading, .empty { padding: 72px 24px; color: var(--text-muted); text-align: center; }
.loading-dot { display: inline-block; width: 8px; height: 8px; margin-right: 8px; border-radius: 50%; background: var(--accent); animation: pulse .9s infinite alternate; }
@keyframes pulse { to { opacity: .32; transform: scale(.72); } }
.empty h2 { margin-bottom: 6px; color: var(--text); font-size: 20px; }
.empty p { margin: 0; }
.startup-loader { display: grid; min-height: 360px; place-items: center; padding: 32px 0; }
.startup-content { display: grid; justify-items: center; gap: 10px; color: var(--text-muted); text-align: center; }
.startup-mark { display: grid; width: 42px; height: 42px; place-items: center; border: 2px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
.startup-mark::after { content: ""; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
@keyframes spin { to { transform: rotate(360deg); } }
.startup-title { margin: 4px 0 0; color: var(--text); font-size: 16px; font-weight: 750; }
.startup-copy { margin: 0; font-size: 13px; }
.catalog-footer { min-height: 48px; padding: 26px 0 0; color: var(--text-subtle); font-size: 13px; text-align: center; }
.scroll-sentinel { height: 1px; }

/* Full page player */
.watch-shell { max-width: 1640px; padding-top: 28px; }
.watch-topline { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
.watch-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.back-link, .theater-toggle, .nav-btn, .autoplay-toggle {
  min-height: 34px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--surface);
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 650;
  cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
}
.back-link:hover, .theater-toggle:hover, .nav-btn:hover:not(:disabled), .autoplay-toggle:hover { border-color: var(--border-strong); background: var(--surface-raised); color: var(--text); }
.nav-btn:disabled { opacity: .4; cursor: default; }
.autoplay-toggle.on { border-color: var(--accent); background: rgba(244, 63, 115, .12); color: var(--accent-strong); }
.autoplay-toggle.on:hover { background: rgba(244, 63, 115, .18); color: var(--accent-strong); }
.filter-chip.fav-toggle.active { border-color: var(--accent); background: rgba(244, 63, 115, .14); color: var(--accent-strong); }
.watch-actions { margin: 15px 0 3px; }
.like-btn { display: inline-flex; align-items: center; gap: 8px; min-height: 38px; padding: 0 16px; border: 1px solid var(--border-strong); border-radius: 999px; background: var(--surface); color: var(--text); font-size: 14px; font-weight: 650; cursor: pointer; transition: border-color .15s, background .15s, color .15s; }
.like-btn:hover { border-color: var(--accent); background: var(--surface-raised); }
.like-btn .like-icon { font-size: 15px; line-height: 1; color: var(--text-subtle); transition: color .15s; }
.like-btn.liked { border-color: var(--accent); color: var(--accent-strong); }
.like-btn.liked .like-icon { color: var(--accent-strong); }
.watch-layout { display: grid; grid-template-columns: minmax(0, 1fr) 350px; gap: 26px; align-items: start; }
.player-stage { overflow: hidden; border: 1px solid var(--border); border-radius: 7px; background: #000; box-shadow: var(--shadow); }
.player-stage video { display: block; width: 100%; max-height: calc(100vh - 210px); aspect-ratio: 16 / 9; background: #000; }
.watch-details { padding-top: 18px; }
.watch-title { max-width: 950px; margin: 0 0 9px; font-size: 23px; line-height: 1.28; }
.watch-meta { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-bottom: 16px; color: var(--text-subtle); font-size: 13px; }
.watch-description { max-width: 920px; margin: 0; color: var(--text-muted); font-size: 14px; line-height: 1.6; }
.manifest-line { margin: 14px 0 0; }
.manifest-link { display: inline-flex; align-items: center; min-height: 32px; padding: 0 10px; border: 1px solid var(--border-strong); border-radius: 5px; color: var(--cyan); font-size: 12px; font-weight: 700; text-decoration: none; }
.manifest-link:hover { border-color: var(--cyan); background: rgba(91, 216, 230, .08); color: #a5eff5; }
.watch-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 18px; }
.watch-tags .tag { color: var(--text-muted); }
.related-panel { min-width: 0; }
.related-heading { display: flex; align-items: baseline; justify-content: space-between; margin: 0 0 12px; font-size: 16px; }
.related-heading span { color: var(--text-subtle); font-size: 12px; font-weight: 500; }
.related-list { display: grid; gap: 12px; }
.related-item { display: grid; grid-template-columns: 142px minmax(0, 1fr); gap: 10px; padding: 0; border: 0; background: transparent; text-align: left; cursor: pointer; }
.related-thumb { position: relative; overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--border); border-radius: 5px; background: var(--surface-raised); }
.related-thumb video { position: relative; z-index: 1; width: 100%; height: 100%; object-fit: cover; vertical-align: top; }
.related-title { display: -webkit-box; overflow: hidden; margin: 1px 0 5px; -webkit-box-orient: vertical; -webkit-line-clamp: 2; color: var(--text); font-size: 13px; font-weight: 700; line-height: 1.35; }
.related-meta { color: var(--text-subtle); font-size: 12px; }
.related-item:hover .related-thumb, .related-item:focus-visible .related-thumb { border-color: var(--accent); }
.related-item:hover .related-title { color: var(--accent-strong); }
.related-item.up-next .related-title { color: var(--accent-strong); }
.up-next-badge { position: absolute; z-index: 2; top: 5px; left: 5px; padding: 2px 6px; border-radius: 3px; background: var(--accent); color: #fff; font-size: 10px; font-weight: 750; letter-spacing: .04em; text-transform: uppercase; }
.new-pill { position: fixed; left: 50%; bottom: 26px; z-index: 40; display: inline-flex; align-items: center; gap: 7px; min-height: 42px; padding: 0 20px; border: 0; border-radius: 999px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 12px 34px rgba(0, 0, 0, .45); transform: translateX(-50%); transition: background .15s; }
.new-pill[hidden] { display: none; }
.new-pill:hover { background: var(--accent-strong); }
body.theater .watch-shell { max-width: none; padding: 18px 28px 48px; }
body.theater .watch-layout { display: block; }
body.theater .player-column { max-width: 1320px; margin: 0 auto; }
body.theater .player-stage video { max-height: calc(100vh - 150px); }
body.theater .related-panel { display: none; }

@media (max-width: 860px) {
  .site-header { gap: 16px; padding: 11px 16px; }
  .catalog-shell, .watch-shell { padding: 26px 16px 44px; }
  .watch-layout { grid-template-columns: minmax(0, 1fr); }
  .related-list { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
  .related-item { display: block; }
  .related-info { padding-top: 7px; }
}
@media (max-width: 600px) {
  .site-header { min-height: 56px; gap: 12px; }
  .brand { font-size: 18px; }
  .brand-mark { width: 24px; height: 20px; }
  .search-shell { order: 3; flex-basis: 100%; max-width: none; }
  .catalog-intro { display: block; margin-bottom: 20px; }
  .result-count { display: block; margin-top: 8px; }
  h1 { font-size: 24px; }
  .video-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px 10px; }
  .card-title { font-size: 13px; }
  .tag-row { display: none; }
  .watch-topline { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .back-link { flex: 1; }
  .watch-controls { width: 100%; }
  .watch-controls .nav-btn { flex: 1; }
  .watch-controls .autoplay-toggle, .watch-controls .theater-toggle { flex: 1; }
  .back-link, .theater-toggle, .nav-btn, .autoplay-toggle { min-height: 40px; padding: 0 10px; }
  .like-btn { width: 100%; justify-content: center; min-height: 44px; }
  .watch-title { margin-bottom: 8px; font-size: 20px; }
  .watch-details { padding-top: 14px; }
  .watch-meta { gap: 6px 12px; margin-bottom: 15px; }
  .watch-description { font-size: 14px; line-height: 1.65; }
  .manifest-line { margin-top: 16px; }
  .manifest-link { width: 100%; justify-content: center; min-height: 38px; }
  .watch-tags { gap: 5px; margin-top: 16px; }
  .related-panel { margin-top: 26px; padding-top: 20px; border-top: 1px solid var(--border); }
  .related-heading { margin-bottom: 14px; }
  .related-list { grid-template-columns: 1fr; }
  .related-item { display: grid; grid-template-columns: 132px minmax(0, 1fr); min-height: 75px; }
  .related-title { font-size: 14px; }
  body.theater .site-header { display: none; }
  body.theater .watch-shell { padding: 10px 0 32px; }
  body.theater .watch-topline { padding: 0 12px; }
  body.theater .player-stage { border-right: 0; border-left: 0; border-radius: 0; }
  body.theater .watch-details { display: none; }
}
</style>
</head>
<body>
<header class="site-header">
  <button class="brand" type="button" onclick="goHome()" aria-label="Sloptube home"><span class="brand-mark">&#9654;</span>Sloptube</button>
  <label class="search-shell" for="search"><span>&#8981;</span><input type="search" id="search" placeholder="Search titles, tags, and descriptions" autocomplete="off"></label>
  <div class="menu" id="menu"></div>
</header>

<main id="app"></main>
<button type="button" id="newPill" class="new-pill" hidden></button>

<script>
const S3 = 'https://s3-api.t3ks.com/video-mcp/';
const CONFIG_KEY = 'sloptube:config';
function readConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)) || {}; }
  catch (_) { return {}; }
}
function saveConfig(patch) {
  const next = { ...readConfig(), ...patch };
  try { localStorage.setItem(CONFIG_KEY, JSON.stringify(next)); } catch (_) {}
  return next;
}
const FAVORITES_KEY = 'sloptube:favorites';
function readFavorites() {
  try { const arr = JSON.parse(localStorage.getItem(FAVORITES_KEY)); return new Set(Array.isArray(arr) ? arr : []); }
  catch (_) { return new Set(); }
}
function saveFavorites() {
  try { localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favorites])); } catch (_) {}
}
let allVideos = [];
let records = [];
let activeCategory = 'all';
let searchTerm = '';
let theaterMode = readConfig().theater === true;
let autoplay = readConfig().autoplay !== false;
const favorites = readFavorites();
let favoritesOnly = false;
let thumbnailObserver;
let loadMoreObserver;
let isIndexing = true;
let isLoadingMore = false;
let isSyncing = false;
let menuOpen = false;
let pendingIndex = null;
let lastSyncedAt = null;
let indexCount = 0;
let allLoaded = false;
let loadingAll = false;
let newCount = 0;
const loadedManifestKeys = new Set();
const MANIFEST_BATCH_SIZE = 30;
const INDEX_KEY = 'sloptube:index';
const SYNC_THROTTLE_MS = 15000;
const SYNC_POLL_MS = 60000;

const app = document.getElementById('app');
const searchInput = document.getElementById('search');
const menu = document.getElementById('menu');
const newPill = document.getElementById('newPill');

function escapeHtml(value = '') {
  return String(value).replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[char]);
}

function formatDate(value) {
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return 'Unknown date';
  const days = Math.floor((Date.now() - date.getTime()) / 86400000);
  if (days <= 0) return 'Today';
  if (days === 1) return 'Yesterday';
  if (days < 30) return `${days} days ago`;
  return new Intl.DateTimeFormat(undefined, { month: 'short', day: 'numeric', year: 'numeric' }).format(date);
}

function formatAgo(ms) {
  if (!ms) return 'never';
  const secs = Math.floor((Date.now() - ms) / 1000);
  if (secs < 10) return 'just now';
  if (secs < 60) return `${secs}s ago`;
  const mins = Math.floor(secs / 60);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function getVideoId() {
  const params = new URLSearchParams(location.hash.slice(1));
  return params.get('watch');
}

function visibleVideos() {
  const query = searchTerm.trim().toLowerCase();
  return allVideos.filter(video => {
    if (favoritesOnly && !favorites.has(video._id)) return false;
    if (activeCategory !== 'all' && video.category !== activeCategory) return false;
    if (!query) return true;
    return [video.title, video.description, video.category, ...(video.tags || [])]
      .some(value => String(value || '').toLowerCase().includes(query));
  });
}

function categories() {
  return [...new Set(allVideos.map(video => video.category).filter(Boolean))].sort((a, b) => a.localeCompare(b));
}

function displayTitle(video) {
  return video.title || 'Untitled video';
}

function isFiltering() {
  return favoritesOnly || activeCategory !== 'all' || !!searchTerm.trim();
}

function watchQueue(video) {
  let list = visibleVideos();
  if (!list.some(item => item._id === video._id)) list = allVideos.slice();
  const idx = list.findIndex(item => item._id === video._id);
  return { list, idx };
}

function videoCard(video) {
  const tags = (video.tags || []).slice(0, 3).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
  return `<button class="video-card" type="button" data-watch="${encodeURIComponent(video._id)}" aria-label="Play ${escapeHtml(displayTitle(video))}">
    <div class="thumb"><span class="thumb-fallback"></span><video class="thumbnail-video" data-src="${S3}${encodeURIComponent(video.video)}" preload="none" muted loop playsinline aria-hidden="true"></video><span class="play-icon">&#9654;</span></div>
    <div class="card-info"><p class="card-title">${escapeHtml(displayTitle(video))}</p><div class="card-meta">${escapeHtml(video.category || 'Uncategorized')} &middot; ${formatDate(video._modified)}</div>${tags ? `<div class="tag-row">${tags}</div>` : ''}</div>
  </button>`;
}

function renderCatalog() {
  document.body.classList.remove('theater');
  searchInput.parentElement.hidden = false;
  const videos = visibleVideos();
  const cats = categories();
  const filterButtons = ['all', ...cats].map(category => `<button class="filter-chip ${activeCategory === category ? 'active' : ''}" type="button" data-category="${escapeHtml(category)}">${category === 'all' ? 'All videos' : escapeHtml(category)}</button>`).join('');
  const favChip = `<button class="filter-chip fav-toggle ${favoritesOnly ? 'active' : ''}" type="button" data-fav-toggle aria-pressed="${favoritesOnly}">${favoritesOnly ? '&#9829;' : '&#9825;'} Favorites${favorites.size ? ` (${favorites.size})` : ''}</button>`;
  const isStarting = !allVideos.length && (isIndexing || isLoadingMore || loadingAll);
  const hasMore = records.some(record => !loadedManifestKeys.has(record.key));
  const filtering = isFiltering();
  const resultLabel = isIndexing ? `Indexing ${indexCount}…`
    : filtering ? `${videos.length} ${videos.length === 1 ? 'match' : 'matches'}`
    : `${records.length} videos`;
  const startupMessage = isIndexing ? 'Building the video index' : 'Loading the latest videos';
  app.innerHTML = `<section class="catalog-shell">
    <div class="catalog-intro"><div><p class="eyebrow">Independent AI video archive</p><h1>Latest videos</h1><p class="catalog-copy">Newest releases appear first. Search the full catalog or narrow it by category.</p></div><div class="result-count">${resultLabel}</div></div>
    <div class="filter-bar" aria-label="Video categories">${favChip}${filterButtons}</div>
    ${videos.length ? `<div class="video-grid">${videos.map(videoCard).join('')}</div>`
      : isStarting ? `<div class="startup-loader" aria-live="polite"><div class="startup-content"><span class="startup-mark"></span><p class="startup-title">${startupMessage}</p><p class="startup-copy">Preparing the newest releases for you.</p></div></div>`
      : (filtering && loadingAll) ? `<div class="startup-loader" aria-live="polite"><div class="startup-content"><span class="startup-mark"></span><p class="startup-title">Searching all videos…</p><p class="startup-copy">Scanning the full catalog for matches.</p></div></div>`
      : favoritesOnly ? `<div class="empty"><h2>No favorites yet</h2><p>Open a video and tap Like to save it here.</p></div>`
      : `<div class="empty"><h2>No matching videos</h2><p>Try a different search or category.</p></div>`}
    ${filtering && loadingAll && videos.length ? '<div class="catalog-footer"><span class="loading-dot"></span>Searching all videos…</div>'
      : (isLoadingMore && allVideos.length ? '<div class="catalog-footer"><span class="loading-dot"></span>Loading more videos</div>' : '')}
    ${hasMore && !isIndexing && !filtering ? '<div class="scroll-sentinel" id="scrollSentinel" aria-hidden="true"></div>' : ''}
  </section>`;
  mountThumbs();
  initInfiniteScroll();
}

function relatedVideos(video) {
  const tags = new Set(video.tags || []);
  return allVideos.filter(candidate => candidate._id !== video._id).map(candidate => ({
    video: candidate,
    score: (candidate.category && candidate.category === video.category ? 5 : 0) + (candidate.tags || []).reduce((total, tag) => total + (tags.has(tag) ? 1 : 0), 0)
  })).sort((a, b) => b.score - a.score || new Date(b.video._modified) - new Date(a.video._modified)).slice(0, 10).map(item => item.video);
}

function relatedItem(video, isNext) {
  return `<button type="button" class="related-item${isNext ? ' up-next' : ''}" data-watch="${encodeURIComponent(video._id)}"><div class="related-thumb"><span class="thumb-fallback"></span><video class="thumbnail-video" data-src="${S3}${encodeURIComponent(video.video)}" preload="none" muted loop playsinline aria-hidden="true"></video>${isNext ? '<span class="up-next-badge">Next</span>' : ''}</div><div class="related-info"><div class="related-title">${escapeHtml(displayTitle(video))}</div><div class="related-meta">${escapeHtml(video.category || 'Uncategorized')} &middot; ${formatDate(video._modified)}</div></div></button>`;
}

function renderWatch(video) {
  loadMoreObserver?.disconnect();
  searchInput.parentElement.hidden = true;
  document.body.classList.toggle('theater', theaterMode);
  const { list, idx } = watchQueue(video);
  const hasPrev = idx > 0;
  const hasNext = idx >= 0 && idx < list.length - 1;
  let queue = idx >= 0 ? list.slice(idx + 1, idx + 13) : [];
  if (!queue.length) queue = relatedVideos(video);
  const liked = favorites.has(video._id);
  const tags = (video.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
  app.innerHTML = `<section class="watch-shell">
    <div class="watch-topline">
      <button type="button" class="back-link" onclick="goHome()">&#8592; All videos</button>
      <div class="watch-controls">
        <button type="button" class="nav-btn" onclick="playAdjacent(-1)"${hasPrev ? '' : ' disabled'} aria-label="Previous video">&#9198;&#65038; Prev</button>
        <button type="button" class="nav-btn" onclick="playAdjacent(1)"${hasNext ? '' : ' disabled'} aria-label="Next video">Next &#9197;&#65038;</button>
        <button type="button" class="autoplay-toggle ${autoplay ? 'on' : ''}" onclick="toggleAutoplay()" aria-pressed="${autoplay}">Autoplay ${autoplay ? 'on' : 'off'}</button>
        <button type="button" class="theater-toggle" onclick="toggleTheater()">${theaterMode ? 'Exit theater' : 'Theater mode'}</button>
      </div>
    </div>
    <div class="watch-layout"><div class="player-column"><div class="player-stage"><video src="${S3}${encodeURIComponent(video.video)}" controls autoplay playsinline></video></div><div class="watch-details"><h1 class="watch-title">${escapeHtml(displayTitle(video))}</h1><div class="watch-meta"><span>${escapeHtml(video.category || 'Uncategorized')}</span><span>${formatDate(video._modified)}</span></div><div class="watch-actions"><button type="button" class="like-btn ${liked ? 'liked' : ''}" onclick="toggleFavorite('${encodeURIComponent(video._id)}')" aria-pressed="${liked}"><span class="like-icon">${liked ? '&#9829;' : '&#9825;'}</span><span class="like-label">${liked ? 'Liked' : 'Like'}</span></button></div><p class="watch-description">${escapeHtml(video.description || 'No description is available for this video.')}</p><p class="manifest-line"><a class="manifest-link" href="${S3}${encodeURIComponent(video._id)}" target="_blank" rel="noopener noreferrer" aria-label="Open manifest JSON in a new tab">Open manifest JSON &#8599;</a></p>${tags ? `<div class="watch-tags">${tags}</div>` : ''}</div></div>
      <aside class="related-panel"><h2 class="related-heading">Up next <span>${autoplay ? 'Autoplay on' : 'Autoplay off'}</span></h2><div class="related-list">${queue.length ? queue.map((item, i) => relatedItem(item, i === 0 && hasNext)).join('') : '<p class="card-meta">More videos will appear here as the catalog loads.</p>'}</div></aside>
    </div>
  </section>`;
  mountThumbs();
  const player = app.querySelector('.player-stage video');
  if (player) {
    player.addEventListener('ended', onPlayerEnded);
    player.play?.().catch(() => {});
  }
}

function loadThumb(preview) {
  if (preview.dataset.loaded) return;
  preview.dataset.loaded = 'true';
  const thumb = preview.closest('.thumb, .related-thumb');
  thumb?.classList.remove('preview-error');
  const markReady = () => thumb?.classList.add('preview-ready');
  preview.addEventListener('loadeddata', markReady, { once: true });
  preview.addEventListener('seeked', markReady, { once: true });
  preview.addEventListener('loadedmetadata', () => {
    const d = preview.duration;
    if (Number.isFinite(d) && d > 0) {
      const poster = Math.min(Math.max(d * 0.1, 1), d - 0.05);
      preview.dataset.poster = String(poster);
      preview.currentTime = poster;
    }
  }, { once: true });
  preview.addEventListener('error', () => {
    if (preview.getAttribute('src')) thumb?.classList.add('preview-error');
  }, { once: true });
  preview.src = preview.dataset.src;
  preview.load();
}

function releaseThumb(preview) {
  if (!preview.dataset.loaded || preview.dataset.hover) return;
  preview.pause();
  preview.removeAttribute('src');
  preview.load();
  delete preview.dataset.loaded;
  preview.closest('.thumb, .related-thumb')?.classList.remove('preview-ready', 'preview-error');
}

function wireHover(preview) {
  const card = preview.closest('.video-card, .related-item');
  if (!card || card.dataset.hoverWired) return;
  card.dataset.hoverWired = '1';
  const start = () => { preview.dataset.hover = '1'; loadThumb(preview); preview.play().catch(() => {}); };
  const stop = () => {
    delete preview.dataset.hover;
    preview.pause();
    const poster = parseFloat(preview.dataset.poster);
    if (Number.isFinite(poster)) preview.currentTime = poster;
  };
  card.addEventListener('pointerenter', start);
  card.addEventListener('pointerleave', stop);
  card.addEventListener('focusin', start);
  card.addEventListener('focusout', stop);
}

function observeThumbs(scope) {
  if (!('IntersectionObserver' in window)) {
    scope.querySelectorAll('.thumbnail-video').forEach(loadThumb);
    return;
  }
  if (!thumbnailObserver) {
    thumbnailObserver = new IntersectionObserver(entries => entries.forEach(entry => {
      if (entry.isIntersecting) loadThumb(entry.target);
      else releaseThumb(entry.target);
    }), { rootMargin: '700px 0px' });
  }
  scope.querySelectorAll('.thumbnail-video').forEach(preview => {
    thumbnailObserver.observe(preview);
    wireHover(preview);
  });
}

function mountThumbs() {
  thumbnailObserver?.disconnect();
  thumbnailObserver = null;
  observeThumbs(app);
}

function initInfiniteScroll() {
  loadMoreObserver?.disconnect();
  const sentinel = document.getElementById('scrollSentinel');
  if (!sentinel || !('IntersectionObserver' in window)) return;
  loadMoreObserver = new IntersectionObserver(entries => {
    if (entries.some(entry => entry.isIntersecting)) loadNextManifestBatch();
  }, { rootMargin: '1400px 0px' });
  loadMoreObserver.observe(sentinel);
}

function renderApp() {
  const id = getVideoId();
  const selected = allVideos.find(video => video._id === id);
  if (id && selected) renderWatch(selected);
  else renderCatalog();
  updatePill();
}

function goHome() {
  history.pushState('', '', location.pathname + location.search);
  menuOpen = false;
  adoptPending();
  renderApp();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  maybeSync();
}

function openVideo(id) {
  menuOpen = false;
  location.hash = `watch=${encodeURIComponent(id)}`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function adoptPending() {
  if (!pendingIndex) return;
  const fresh = pendingIndex;
  pendingIndex = null;
  newCount = 0;
  updatePill();
  adoptIndex(fresh).then(() => { if (!getVideoId()) renderCatalog(); });
}

function updatePill() {
  if (!newPill) return;
  if (newCount > 0 && !getVideoId()) {
    newPill.innerHTML = `&#8593; ${newCount} new video${newCount === 1 ? '' : 's'}`;
    newPill.hidden = false;
  } else {
    newPill.hidden = true;
  }
}

function updateMenu() {
  if (!menu) return;
  const countLabel = isIndexing ? `${indexCount} indexing` : `${records.length} videos`;
  const syncedLabel = isIndexing ? 'building index…' : `updated ${formatAgo(lastSyncedAt)}`;
  const busy = isSyncing || isIndexing;
  menu.innerHTML = `
    <button class="menu-btn" type="button" aria-haspopup="true" aria-expanded="${menuOpen}" aria-label="Catalog menu" onclick="toggleMenu(event)">
      ${isSyncing ? '<span class="spinner"></span>' : '<span class="burger"></span>'}
    </button>
    <div class="menu-panel" role="menu"${menuOpen ? '' : ' hidden'}>
      <div class="menu-info"><strong>${countLabel}</strong><span>${syncedLabel}</span></div>
      <button class="menu-item" type="button" role="menuitem" onclick="manualRefresh(event)"${busy ? ' disabled' : ''}>${isSyncing ? '<span class="mini-spin"></span>Syncing…' : '&#8635; Refresh newest'}</button>
      <button class="menu-item danger" type="button" role="menuitem" onclick="clearIndex(event)"${busy ? ' disabled' : ''}>&#10005; Clear &amp; rebuild</button>
    </div>`;
}

function toggleMenu(event) {
  event.stopPropagation();
  menuOpen = !menuOpen;
  updateMenu();
}

function manualRefresh(event) {
  event.stopPropagation();
  syncCatalog(true);
}

function clearIndex(event) {
  event.stopPropagation();
  menuOpen = false;
  try { localStorage.removeItem(INDEX_KEY); } catch (_) {}
  pendingIndex = null;
  lastSyncedAt = null;
  window.scrollTo({ top: 0 });
  rebuildIndex();
}

function toggleTheater() {
  theaterMode = !theaterMode;
  saveConfig({ theater: theaterMode });
  document.body.classList.toggle('theater', theaterMode);
  const toggle = document.querySelector('.theater-toggle');
  if (toggle) toggle.textContent = theaterMode ? 'Exit theater' : 'Theater mode';
}

function playAdjacent(dir) {
  const video = allVideos.find(item => item._id === getVideoId());
  if (!video) return;
  const { list, idx } = watchQueue(video);
  const target = idx >= 0 ? list[idx + dir] : null;
  if (target) openVideo(target._id);
}

function onPlayerEnded() {
  if (autoplay) playAdjacent(1);
}

function toggleAutoplay() {
  autoplay = !autoplay;
  saveConfig({ autoplay });
  const btn = document.querySelector('.autoplay-toggle');
  if (btn) {
    btn.classList.toggle('on', autoplay);
    btn.setAttribute('aria-pressed', String(autoplay));
    btn.textContent = `Autoplay ${autoplay ? 'on' : 'off'}`;
  }
  const heading = document.querySelector('.related-heading span');
  if (heading) heading.textContent = autoplay ? 'Autoplay on' : 'Autoplay off';
}

function toggleFavorite(encodedId) {
  const id = decodeURIComponent(encodedId);
  if (favorites.has(id)) favorites.delete(id);
  else favorites.add(id);
  saveFavorites();
  const liked = favorites.has(id);
  const btn = document.querySelector('.like-btn');
  if (btn) {
    btn.classList.toggle('liked', liked);
    btn.setAttribute('aria-pressed', String(liked));
    btn.querySelector('.like-icon').innerHTML = liked ? '&#9829;' : '&#9825;';
    btn.querySelector('.like-label').textContent = liked ? 'Liked' : 'Like';
  }
}

function readIndex() {
  try {
    const raw = JSON.parse(localStorage.getItem(INDEX_KEY));
    if (raw && Array.isArray(raw.records) && raw.records.length) return raw;
  } catch (_) {}
  return null;
}

function writeIndex(recs) {
  try { localStorage.setItem(INDEX_KEY, JSON.stringify({ records: recs, syncedAt: Date.now() })); } catch (_) {}
}

function indexSignature(recs) {
  return `${recs.length}|${recs[0]?.key || ''}|${recs[0]?.modified || ''}`;
}

async function fetchFullIndex(onProgress) {
  const all = [];
  let marker = '';
  do {
    const page = await fetchManifestIndexPage(marker);
    all.push(...page.records);
    marker = page.truncated ? page.nextMarker : '';
    if (onProgress) onProgress(all.length);
  } while (marker);
  all.sort((a, b) => new Date(b.modified) - new Date(a.modified));
  return all;
}

async function loadVideos() {
  const cached = readIndex();
  if (cached) {
    records = cached.records;
    lastSyncedAt = cached.syncedAt || null;
    isIndexing = false;
    updateMenu();
    renderApp();
    await primeManifests();
    maybeSync();
    return;
  }
  await rebuildIndex();
}

async function rebuildIndex() {
  isIndexing = true;
  indexCount = 0;
  records = [];
  allVideos = [];
  loadedManifestKeys.clear();
  allLoaded = false;
  loadingAll = false;
  pendingIndex = null;
  updateMenu();
  renderCatalog();
  try {
    records = await fetchFullIndex(count => { indexCount = count; updateMenu(); renderCatalog(); });
    if (!records.length) throw new Error('No video manifests found');
    writeIndex(records);
    lastSyncedAt = Date.now();
    isIndexing = false;
    updateMenu();
    renderApp();
    await primeManifests();
  } catch (error) {
    isIndexing = false;
    updateMenu();
    app.innerHTML = `<div class="empty"><h2>Unable to load the catalog</h2><p>${escapeHtml(error.message)}. Refresh to try again.</p></div>`;
  }
}

async function primeManifests() {
  const id = getVideoId();
  const selected = id && records.find(record => record.key === id);
  if (selected && !loadedManifestKeys.has(selected.key)) {
    await loadManifestPool([selected], 1);
    renderApp();
  }
  await loadNextManifestBatch();
}

function maybeSync() {
  if (isSyncing) return;
  if (lastSyncedAt && Date.now() - lastSyncedAt < SYNC_THROTTLE_MS) return;
  syncCatalog(false);
}

async function syncCatalog(manual) {
  if (isSyncing) return;
  isSyncing = true;
  updateMenu();
  try {
    const fresh = await fetchFullIndex();
    if (fresh.length) {
      writeIndex(fresh);
      lastSyncedAt = Date.now();
      const changed = indexSignature(fresh) !== indexSignature(records);
      if (manual) {
        await adoptIndex(fresh);
        pendingIndex = null;
        newCount = 0;
        if (!getVideoId()) renderCatalog();
      } else if (changed) {
        const knownKeys = new Set(records.map(record => record.key));
        const added = fresh.filter(record => !knownKeys.has(record.key)).length;
        if (getVideoId()) {
          pendingIndex = fresh;
        } else if (!isFiltering() && window.scrollY < 240) {
          await adoptIndex(fresh);
          pendingIndex = null;
          newCount = 0;
          renderCatalog();
        } else {
          pendingIndex = fresh;
          newCount = added;
        }
      }
    }
  } catch (_) {
    /* A failed background sync keeps the current catalog intact. */
  } finally {
    isSyncing = false;
    updateMenu();
    updatePill();
  }
}

async function adoptIndex(fresh) {
  const knownKeys = new Set(records.map(record => record.key));
  const added = fresh.filter(record => !knownKeys.has(record.key));
  records = fresh;
  const toLoad = added.filter(record => !loadedManifestKeys.has(record.key));
  if (toLoad.length) await loadManifestPool(toLoad, 6);
  allLoaded = !records.some(record => !loadedManifestKeys.has(record.key));
  return added.length;
}

async function fetchManifestIndexPage(marker) {
  const url = new URL(S3);
  url.searchParams.set('max-keys', '200');
  if (marker) url.searchParams.set('marker', marker);
  const response = await fetch(url);
  if (!response.ok) throw new Error(`Catalog request failed (${response.status})`);
  const xml = await response.text();
  const documentXml = new DOMParser().parseFromString(xml, 'text/xml');
  const nextMarker = documentXml.querySelector('NextMarker')?.textContent || '';
  return {
    records: [...documentXml.querySelectorAll('Contents')].map(node => ({
      key: node.querySelector('Key')?.textContent,
      modified: node.querySelector('LastModified')?.textContent
    })).filter(entry => entry.key?.endsWith('.json')),
    nextMarker,
    truncated: documentXml.querySelector('IsTruncated')?.textContent === 'true'
  };
}

async function loadNextManifestBatch() {
  if (isIndexing || isLoadingMore) return;
  const batch = records.filter(record => !loadedManifestKeys.has(record.key)).slice(0, MANIFEST_BATCH_SIZE);
  if (!batch.length) return;
  isLoadingMore = true;
  await loadManifestPool(batch, 6);
  isLoadingMore = false;
  if (getVideoId()) { renderApp(); return; }
  const grid = app.querySelector('.video-grid');
  if (grid && !isFiltering()) appendNewCards();
  else renderCatalog();
}

async function loadAllManifests() {
  if (allLoaded || loadingAll || isIndexing) return;
  loadingAll = true;
  if (isFiltering()) renderCatalog();
  while (isFiltering()) {
    const batch = records.filter(record => !loadedManifestKeys.has(record.key)).slice(0, 60);
    if (!batch.length) break;
    await loadManifestPool(batch, 8);
    if (isFiltering()) renderCatalog();
  }
  allLoaded = !records.some(record => !loadedManifestKeys.has(record.key));
  loadingAll = false;
  if (isFiltering()) renderCatalog();
}

function appendNewCards() {
  const grid = app.querySelector('.video-grid');
  if (!grid) { renderCatalog(); return; }
  const fresh = visibleVideos().slice(grid.children.length);
  if (fresh.length) {
    const holder = document.createElement('div');
    holder.innerHTML = fresh.map(videoCard).join('');
    [...holder.children].forEach(card => {
      grid.appendChild(card);
      observeThumbs(card);
    });
  }
  const count = app.querySelector('.result-count');
  if (count) count.textContent = `${records.length} videos`;
  const hasMore = records.some(record => !loadedManifestKeys.has(record.key));
  if (!hasMore) {
    app.querySelector('#scrollSentinel')?.remove();
    return;
  }
  const sentinel = app.querySelector('#scrollSentinel');
  if (sentinel && sentinel.getBoundingClientRect().top < window.innerHeight + 1400) loadNextManifestBatch();
}

async function loadManifestPool(entries, concurrency) {
  let next = 0;
  async function worker() {
    while (next < entries.length) {
      const entry = entries[next++];
      if (loadedManifestKeys.has(entry.key)) continue;
      loadedManifestKeys.add(entry.key);
      try {
        const response = await fetch(S3 + entry.key);
        if (!response.ok) continue;
        const data = await response.json();
        if (data && data.video && data.title) {
          allVideos.push({ ...data, _id: entry.key, _modified: entry.modified });
          allVideos.sort((a, b) => new Date(b._modified) - new Date(a._modified));
        }
      } catch (_) { /* A malformed manifest should not block the catalog. */ }
    }
  }
  await Promise.all(Array.from({ length: concurrency }, worker));
}

app.addEventListener('click', event => {
  if (event.target.closest('[data-fav-toggle]')) {
    favoritesOnly = !favoritesOnly;
    renderCatalog();
    if (isFiltering()) loadAllManifests();
    return;
  }
  const category = event.target.closest('[data-category]');
  if (category) {
    activeCategory = category.dataset.category;
    renderCatalog();
    if (isFiltering()) loadAllManifests();
    return;
  }
  const video = event.target.closest('[data-watch]');
  if (video) openVideo(decodeURIComponent(video.dataset.watch));
});

searchInput.addEventListener('input', event => {
  searchTerm = event.target.value;
  if (getVideoId()) return;
  renderCatalog();
  if (isFiltering()) loadAllManifests();
});

document.addEventListener('click', event => {
  if (menuOpen && !event.target.closest('#menu')) { menuOpen = false; updateMenu(); }
});
document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && menuOpen) { menuOpen = false; updateMenu(); }
});

window.addEventListener('hashchange', () => {
  menuOpen = false;
  if (!getVideoId()) adoptPending();
  renderApp();
  if (!getVideoId()) maybeSync();
});

newPill.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (pendingIndex) adoptPending();
  else { newCount = 0; updatePill(); }
});

setInterval(() => { if (!document.hidden && !isIndexing) maybeSync(); }, SYNC_POLL_MS);
document.addEventListener('visibilitychange', () => { if (!document.hidden) maybeSync(); });
window.addEventListener('focus', () => maybeSync());

updateMenu();
renderApp();
loadVideos();
</script>
</body>
</html>
