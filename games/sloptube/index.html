<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sloptube — AI Video Catalog</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a2e;
  --border: #2a2a3e;
  --text: #e0e0ec;
  --text-dim: #8888a0;
  --accent: #ff3366;
  --accent2: #7c3aed;
  --accent3: #06b6d4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
}
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  display: flex; align-items: center; gap: 1rem;
  flex-wrap: wrap;
}
.logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
.search-bar { flex: 1; min-width: 180px; max-width: 400px; position: relative; }
.search-bar input {
  width: 100%; padding: 0.5rem 0.75rem 0.5rem 2.2rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 0.9rem;
}
.search-bar input:focus { outline: none; border-color: var(--accent); }
.search-bar .icon { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 1rem; }
.filter-chips { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.chip {
  padding: 0.3rem 0.7rem; border-radius: 999px; font-size: 0.8rem;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s; color: var(--text-dim);
  user-select: none;
}
.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.2rem;
}
.video-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}
.video-card:hover { transform: translateY(-3px); border-color: var(--accent2); }
.video-thumb {
  width: 100%; aspect-ratio: 16/9; background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.video-thumb video { width: 100%; height: 100%; object-fit: cover; }
.play-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
}
.video-card:hover .play-overlay { opacity: 1; }
.play-overlay svg { width: 48px; height: 48px; fill: var(--accent); }
.card-body { padding: 0.7rem; }
.card-title { font-size: 0.9rem; font-weight: 600; line-height: 1.3; margin-bottom: 0.3rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-desc { font-size: 0.78rem; color: var(--text-dim); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 0.4rem; }
.card-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; }
.tag { font-size: 0.68rem; padding: 0.15rem 0.45rem; border-radius: 4px; background: var(--surface2); color: var(--text-dim); }
.cat-badge { font-size: 0.65rem; padding: 0.1rem 0.5rem; border-radius: 4px; background: var(--accent2); color: #fff; display: inline-block; margin-bottom: 0.3rem; }
.loading { text-align: center; padding: 3rem; color: var(--text-dim); font-size: 1.1rem; }
.error { text-align: center; padding: 2rem; color: var(--accent); }

/* Modal Player */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center;
  padding: 1rem;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 900px; width: 100%;
  max-height: 92vh; overflow-y: auto;
}
.modal video { width: 100%; border-radius: 16px 16px 0 0; background: #000; }
.modal-body { padding: 1.2rem; }
.modal-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
.modal-desc { color: var(--text-dim); margin-bottom: 0.75rem; line-height: 1.5; }
.modal-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
.modal-close {
  position: absolute; top: 1.5rem; right: 1.5rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 50%; width: 36px; height: 36px;
  color: var(--text); font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 210;
}
.modal-close:hover { background: var(--accent); }
.stats { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.5rem; }
.empty { text-align: center; padding: 4rem 1rem; color: var(--text-dim); }
.empty h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
@media (max-width: 600px) {
  header { padding: 0.5rem 0.8rem; }
  .logo { font-size: 1.1rem; }
  .search-bar { min-width: 120px; }
  main { padding: 0.8rem; }
  .video-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🎬 Sloptube</div>
  <div class="search-bar">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="Search videos...">
  </div>
  <div class="filter-chips" id="filters"></div>
</header>

<main>
  <div class="loading" id="status">Loading videos...</div>
  <div class="video-grid" id="grid" style="display:none;"></div>
  <div class="empty" id="empty" style="display:none;">
    <h2>No videos found</h2>
    <p>Try a different search or filter.</p>
  </div>
</main>

<div class="modal-overlay" id="modal">
  <div style="position:relative;width:100%;max-width:900px;display:flex;justify-content:center;">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal" id="modalContent"></div>
  </div>
</div>

<script>
const S3 = 'https://s3-api.t3ks.com/video-mcp/';
let allVideos = [];
let activeCategory = 'all';
let searchTerm = '';

async function loadVideos() {
  try {
    const res = await fetch(S3);
    const xml = await res.text();
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const keys = [...doc.querySelectorAll('Key')].map(k => k.textContent);
    const jsonKeys = keys.filter(k => k.endsWith('.json'));
    
    const fetched = await Promise.all(jsonKeys.map(async k => {
      try {
        const r = await fetch(S3 + k);
        return await r.json();
      } catch(e) { return null; }
    }));
    
    allVideos = fetched.filter(v => v && v.video);
    
    // Build category filters
    const cats = new Set();
    allVideos.forEach(v => { if (v.category) cats.add(v.category); });
    renderFilters([...cats].sort());
    
    renderGrid();
  } catch(e) {
    document.getElementById('status').innerHTML = '<div class="error">Failed to load: ' + e.message + '</div>';
  }
}

function renderFilters(categories) {
  const container = document.getElementById('filters');
  let html = '<div class="chip active" onclick="setCategory(\'all\', this)">All</div>';
  html += categories.map(c => `<div class="chip" onclick="setCategory('${c}', this)">${c}</div>`).join('');
  container.innerHTML = html;
}

function setCategory(cat, el) {
  activeCategory = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const status = document.getElementById('status');
  
  let filtered = allVideos.filter(v => {
    if (activeCategory !== 'all' && v.category !== activeCategory) return false;
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      return (v.title||'').toLowerCase().includes(s) ||
             (v.description||'').toLowerCase().includes(s) ||
             (v.tags||[]).some(t => t.toLowerCase().includes(s));
    }
    return true;
  });
  
  status.style.display = 'none';
  
  if (filtered.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  
  empty.style.display = 'none';
  grid.style.display = 'grid';
  
  grid.innerHTML = filtered.map((v, i) => {
    const idx = allVideos.indexOf(v);
    const tags = (v.tags||[]).slice(0,4).map(t => `<span class="tag">${t}</span>`).join('');
    const cat = v.category ? `<span class="cat-badge">${v.category}</span>` : '';
    return `
      <div class="video-card" onclick="openModal(${idx})">
        <div class="video-thumb">
          <video src="${S3}${v.video}" preload="metadata" muted></video>
          <div class="play-overlay">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
        <div class="card-body">
          ${cat}
          <div class="card-title">${v.title || 'Untitled'}</div>
          <div class="card-desc">${v.description || ''}</div>
          <div class="card-tags">${tags}</div>
        </div>
      </div>`;
  }).join('');
}

function openModal(idx) {
  const v = allVideos[idx];
  const tags = (v.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
  const cat = v.category ? `<span class="cat-badge">${v.category}</span>` : '';
  document.getElementById('modalContent').innerHTML = `
    <video src="${S3}${v.video}" controls autoplay playsinline></video>
    <div class="modal-body">
      ${cat}
      <div class="modal-title">${v.title || 'Untitled'}</div>
      <div class="modal-desc">${v.description || 'No description.'}</div>
      <div class="modal-tags">${tags || '<span class="tag">no tags</span>'}</div>
      <div class="stats">Source: <a href="${S3}${v.video}" style="color:var(--accent3)" target="_blank">${v.video}</a></div>
    </div>`;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modalContent').innerHTML = '';
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  renderGrid();
});

loadVideos();
</script>
</body>
</html>
