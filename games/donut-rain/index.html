<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🍩 Donut Rain - 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a0a2e;font-family:'Segoe UI',sans-serif;cursor:crosshair}
canvas{display:block}
#ui{position:fixed;top:16px;left:16px;color:#fff;z-index:10;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.8)}
#ui h1{font-size:28px;background:linear-gradient(135deg,#ff6b9d,#ffa726);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
#ui p{font-size:14px;opacity:.7}
#stats{position:fixed;top:16px;right:16px;color:#fff;font-size:14px;text-align:right;text-shadow:0 2px 8px rgba(0,0,0,.8)}
#stats span{color:#ffa726;font-weight:bold}
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;opacity:.5;text-shadow:0 2px 8px rgba(0,0,0,.8);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
</style>
</head>
<body>
<div id="ui"><h1>🍩 DONUT RAIN</h1><p>Click anywhere — more donuts!</p></div>
<div id="stats">Donuts: <span id="count">0</span></div>
<div id="hint">Click & drag to look around • Scroll to zoom</div>

<script type="importmap">
{"imports":{"three":"https://esm.sh/three@0.170.0","three/addons/":"https://esm.sh/three@0.170.0/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0a2e);
scene.fog = new THREE.FogExp2(0x1a0a2e, 0.008);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 15, 35);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI * 0.85;
controls.minDistance = 5;
controls.maxDistance = 80;

// Lighting
const ambient = new THREE.AmbientLight(0x6633aa, 0.5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(30, 50, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 150;
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
scene.add(dirLight);

const pinkLight = new THREE.PointLight(0xff69b4, 2, 80);
pinkLight.position.set(-15, 25, 15);
scene.add(pinkLight);

const orangeLight = new THREE.PointLight(0xffa726, 1.5, 70);
orangeLight.position.set(20, 18, -10);
scene.add(orangeLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(200, 200, 50, 50);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x2d1b4e,
  roughness: 0.85,
  metalness: 0.1,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper for style
const grid = new THREE.GridHelper(200, 40, 0x442266, 0x331144);
grid.position.y = -1.99;
scene.add(grid);

// Donut model loader and pool
let donutModel = null;
const donuts = [];
const MAX_DONUTS = 300;

// Load donut model
const loader = new GLTFLoader();
loader.load(
  'https://s.h4ks.com/Is3.glb?download=true',
  (gltf) => {
    const root = gltf.scene;
    
    root.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        if (child.material) {
          child.material.envMapIntensity = 0.5;
        }
      }
    });
    
    const box = new THREE.Box3().setFromObject(root);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2 / maxDim;
    root.scale.setScalar(scale);
    
    const center = box.getCenter(new THREE.Vector3());
    root.position.sub(center.multiplyScalar(scale));
    
    donutModel = root;
    console.log('Donut model loaded!');
    
    for (let i = 0; i < 40; i++) spawnDonut();
  },
  undefined,
  (err) => {
    console.error('Failed to load donut model:', err);
    createFallbackDonut();
  }
);

function createFallbackDonut() {
  const geo = new THREE.TorusGeometry(1, 0.42, 24, 48);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xd4956a,
    roughness: 0.45,
    metalness: 0.05,
  });
  donutModel = new THREE.Mesh(geo, mat);
  donutModel.castShadow = true;
  console.log('Using fallback torus geometry');
  
  for (let i = 0; i < 40; i++) spawnDonut();
}

function randomizeMaterial(mesh) {
  if (!mesh || !mesh.material) return;
  
  const styles = [
    { color: 0xd4956a, name: 'plain' },
    { color: 0xff69b4, name: 'pink' },
    { color: 0x8b4513, name: 'chocolate' },
    { color: 0xffa726, name: 'caramel' },
    { color: 0xe8dcce, name: 'vanilla' },
    { color: 0x9932cc, name: 'berry' },
  ];
  
  const pick = styles[Math.floor(Math.random() * styles.length)];
  
  mesh.material = mesh.material.clone();
  mesh.material.color.setHex(pick.color);
}

function spawnDonut(x, z) {
  if (!donutModel) return;
  if (donuts.length >= MAX_DONUTS) {
    const old = donuts.shift();
    scene.remove(old.group);
    old.group.traverse((c) => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
  }
  
  const group = donutModel.clone(true);
  
  group.traverse((child) => {
    if (child.isMesh) {
      randomizeMaterial(child);
    }
  });
  
  const posX = x !== undefined ? x : (Math.random() - 0.5) * 70;
  const posZ = z !== undefined ? z : (Math.random() - 0.5) * 70;
  const posY = 40 + Math.random() * 30;
  
  group.position.set(posX, posY, posZ);
  group.rotation.set(
    Math.random() * Math.PI * 2,
    Math.random() * Math.PI * 2,
    Math.random() * Math.PI * 2
  );
  
  scene.add(group);
  
  donuts.push({
    group,
    velY: -(1 + Math.random() * 2.5),
    rotSpeed: new THREE.Vector3(
      (Math.random() - 0.5) * 4,
      (Math.random() - 0.5) * 4,
      (Math.random() - 0.5) * 4
    ),
    wobblePhase: Math.random() * Math.PI * 2,
    wobbleSpeed: 1 + Math.random() * 3,
  });
  
  updateCount();
}

function updateCount() {
  document.getElementById('count').textContent = donuts.length;
}

renderer.domElement.addEventListener('click', (e) => {
  const count = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const offsetX = (Math.random() - 0.5) * 12;
    const offsetZ = (Math.random() - 0.5) * 12;
    spawnDonut(offsetX, offsetZ);
  }
});

// Sprinkles particle system
const sprinkleCount = 800;
const sprinkleGeo = new THREE.BufferGeometry();
const sprinklePos = new Float32Array(sprinkleCount * 3);
const sprinkleCol = new Float32Array(sprinkleCount * 3);

for (let i = 0; i < sprinkleCount; i++) {
  sprinklePos[i * 3] = (Math.random() - 0.5) * 120;
  sprinklePos[i * 3 + 1] = Math.random() * 60;
  sprinklePos[i * 3 + 2] = (Math.random() - 0.5) * 120;
  
  const c = new THREE.Color().setHSL(Math.random(), 0.9, 0.6);
  sprinkleCol[i * 3] = c.r;
  sprinkleCol[i * 3 + 1] = c.g;
  sprinkleCol[i * 3 + 2] = c.b;
}

sprinkleGeo.setAttribute('position', new THREE.BufferAttribute(sprinklePos, 3));
sprinkleGeo.setAttribute('color', new THREE.BufferAttribute(sprinkleCol, 3));

const sprinkleMat = new THREE.PointsMaterial({
  size: 0.15,
  vertexColors: true,
  transparent: true,
  opacity: 0.75,
  blending: THREE.AdditiveBlending,
});

const sprinkles = new THREE.Points(sprinkleGeo, sprinkleMat);
scene.add(sprinkles);

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  const time = clock.getElapsedTime();
  
  for (let i = donuts.length - 1; i >= 0; i--) {
    const d = donuts[i];
    
    d.group.position.y += d.velY;
    d.wobblePhase += delta * d.wobbleSpeed;
    d.group.position.x += Math.sin(d.wobblePhase) * 0.03;
    d.group.position.z += Math.cos(d.wobblePhase * 0.7) * 0.02;
    
    d.group.rotation.x += d.rotSpeed.x * delta;
    d.group.rotation.y += d.rotSpeed.y * delta;
    d.group.rotation.z += d.rotSpeed.z * delta;
    
    if (d.group.position.y < -3) {
      d.group.position.x = (Math.random() - 0.5) * 70;
      d.group.position.z = (Math.random() - 0.5) * 70;
      d.group.position.y = 40 + Math.random() * 30;
      d.velY = -(1 + Math.random() * 2.5);
      
      d.group.traverse((child) => {
        if (child.isMesh) randomizeMaterial(child);
      });
    }
  }
  
  const sPos = sprinkles.geometry.attributes.position.array;
  for (let i = 0; i < sprinkleCount; i++) {
    sPos[i * 3 + 1] -= delta * (3 + Math.random() * 4);
    if (sPos[i * 3 + 1] < -2) {
      sPos[i * 3 + 1] = 55 + Math.random() * 10;
      sPos[i * 3] = (Math.random() - 0.5) * 120;
      sPos[i * 3 + 2] = (Math.random() - 0.5) * 120;
    }
  }
  sprinkles.geometry.attributes.position.needsUpdate = true;
  
  pinkLight.intensity = 2 + Math.sin(time * 1.5) * 0.5;
  orangeLight.position.y = 18 + Math.sin(time * 0.8) * 5;
  
  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

setInterval(() => {
  if (donuts.length < MAX_DONUTS) spawnDonut();
}, 400);

animate();
</script>
</body>
</html>
