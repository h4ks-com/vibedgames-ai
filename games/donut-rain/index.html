<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DONUT APOCALYPSE 🍩💥</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#0a0a0a; font-family:'Courier New',monospace; }
canvas { display:block; }
#ui {
  position:fixed; top:20px; left:20px;
  color:#ff6600; font-size:18px; text-shadow:0 0 10px #ff3300;
  pointer-events:none; z-index:100;
}
#ui h1 {
  font-size:28px; letter-spacing:4px;
  background:linear-gradient(90deg,#ff6600,#ffcc00);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:pulse 2s ease-in-out infinite alternate;
}
#stats { margin-top:8px; font-size:14px; color:#888; }
#crosshair {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:30px; height:30px; border:2px solid rgba(255,102,0,0.5);
  border-radius:50%; pointer-events:none; z-index:99;
}
#crosshair::before, #crosshair::after {
  content:''; position:absolute; background:rgba(255,102,0,0.7);
}
#crosshair::before { top:50%; left:-8px; right:-8px; height:1px; }
#crosshair::after { left:50%; top:-8px; bottom:-8px; width:1px; }
@keyframes pulse { from{opacity:0.8;} to{opacity:1;text-shadow:0 0 20px #ff6600;} }
</style>
</head>
<body>
<div id="ui"><h1>🍩 DONUT APOCALYPSE</h1><div id="stats"></div></div>
<div id="crosshair"></div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── SCENE ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0808);
scene.fog = new THREE.FogExp2(0x0a0808, 0.008);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 15, 35);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.3;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.05;
controls.maxPolarAngle=Math.PI*0.48; controls.target.set(0,5,0);

// ── LIGHTING (dark & dramatic) ──
const amb = new THREE.AmbientLight(0x111111); scene.add(amb);

const sun = new THREE.DirectionalLight(0xffaa44, 2);
sun.position.set(40,60,30); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=1; sun.shadow.camera.far=150;
sun.shadow.camera.left=-50; sun.shadow.camera.right=50; sun.shadow.camera.top=50; sun.shadow.camera.bottom=-50;
scene.add(sun);

const rim = new THREE.PointLight(0xff2200, 3, 80); rim.position.set(-25,20,-20); scene.add(rim);
const fill = new THREE.PointLight(0x0066ff, 1.5, 60); fill.position.set(25,10,25); scene.add(fill);
const flash = new THREE.PointLight(0xffffff, 0, 100); scene.add(flash);

// ── GROUND ──
const groundGeo = new THREE.PlaneGeometry(200,200,80,80);
const gPos = groundGeo.attributes.position;
for(let i=0;i<gPos.count;i++){
  const x=gPos.getX(i), z=gPos.getZ(i);
  gPos.setY(i, Math.sin(x*0.08)*Math.cos(z*0.08)*1.5 + Math.random()*0.3);
}
groundGeo.computeVertexNormals();

const groundMat = new THREE.MeshStandardMaterial({
  color:0x1a1410, roughness:0.92, metalness:0.15,
  envMapIntensity:0.3,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

// Grid lines on ground
const grid = new THREE.GridHelper(200,60,0x331100,0x1a0a00);
grid.position.y=0.05; scene.add(grid);

// ── DONUT GEOMETRY (custom torus with thickness variation) ──
function makeDonutGeom(){
  return new THREE.TorusGeometry(1.45,0.65,24,64);
}

// Frosting styles — bold saturated, NOT pastel
const FROSTINGS = [
  { name:'fire', color:0xdd2200, emissive:0x441100 },     // deep red-orange
  { name:'gold', color:0xeebb00, emissive:0x332800 },      // rich gold
  { name:'choc', color:0x3d1f00, emissive:0x110800 },      // dark chocolate
  { name:'cyan', color:0x00ccdd, emissive:0x003344 },      // electric cyan
  { name:'lime', color:0x88dd00, emissive:0x223300 },      // acid green
  { name:'white', color:0xeeddcc, emissive:0x222010 },     // vanilla cream
];

function randPick(a){return a[(Math.random()*a.length)|0];}

// ── DONUT CLASS ──
class Donut{
  constructor(x,y,z){
    const f=randPick(FROSTINGS);
    this.mesh=new THREE.Mesh(
      makeDonutGeom(),
      new THREE.MeshStandardMaterial({
        color:f.color, roughness:0.28, metalness:0.12,
        emissive:f.emissive, emissiveIntensity:0.4,
      })
    );
    this.mesh.position.set(x,y,z);
    this.mesh.castShadow=true; this.mesh.receiveShadow=true;

    // Random rotation axis for tumbling
    this.rotAxis=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize();
    this.rotSpeed=(Math.random()*2+1)*(Math.random()>0.5?1:-1);
    this.wobblePhase=Math.random()*Math.PI*2;
    this.wobbleSpeed=Math.random()*3+2;
    this.velY=-(Math.random()*4+6); // fall speed
    this.dead=false;
    this.groundY=0;
    this.bounceCount=0;
    scene.add(this.mesh);
  }

  update(dt){
    if(this.dead)return;
    this.wobblePhase+=this.wobbleSpeed*dt;

    // Fall
    this.mesh.position.y+=this.velY*dt;
    this.velY+=15*dt; // gravity

    // Wobble while falling
    this.mesh.rotation.x+=Math.sin(this.wobblePhase)*0.03;
    this.mesh.rotation.z+=Math.cos(this.wobblePhase*0.7)*0.02;

    // Tumble
    this.mesh.rotateOnAxis(this.rotAxis,this.rotSpeed*dt);

    // Ground collision + bounce
    if(this.mesh.position.y<=this.groundY+0.7){
      this.mesh.position.y=this.groundY+0.7;
      this.velY*=-0.42;
      this.bounceCount++;
      // Impact flash
      flash.intensity=3; flash.position.copy(this.mesh.position); flash.position.y+=2;
      if(this.bounceCount>3){this.dead=true; scene.remove(this.mesh);}
    }

    // Remove if way off screen
    if(this.mesh.position.y<-20)this.dead=true;
  }
}

// ── SPRINKLE PARTICLES ──
const sprinkleCount=1200;
const sGeo=new THREE.BufferGeometry();
const sPos=new Float32Array(sprinkleCount*3);
const sCol=new Float32Array(sprinkleCount*3);
const sVel=[];
const sLife=new Float32Array(sprinkleCount);
const sprinkleColors=[0xff2200,0xffcc00,0x00ff88,0x00ccff,0xff00aa,0xffffff];

for(let i=0;i<sprinkleCount;i++){
  sPos[i*3]=(Math.random()-0.5)*80;
  sPos[i*3+1]=Math.random()*60+10;
  sPos[i*3+2]=(Math.random()-0.5)*80;
  const c=new THREE.Color(sprinkleColors[(Math.random()*sprinkleColors.length)|0]);
  sCol[i*3]=c.r; sCol[i*3+1]=c.g; sCol[i*3+2]=c.b;
  sVel.push({x:(Math.random()-0.5)*8, y:-(Math.random()*10+5), z:(Math.random()-0.5)*8});
  sLife[i]=Math.random()*5+3;
}
sGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
sGeo.setAttribute('color',new THREE.BufferAttribute(sCol,3));

const sMat=new THREE.PointsMaterial({
  size:0.18, vertexColors:true, transparent:true, opacity:0.9,
  blending:THREE.AdditiveBlending, sizeAttenuation:true,
});
const sprinkles=new THREE.Points(sGeo,sMat); scene.add(sprinkles);

// ── IMPACT RING POOL ──
const rings=[]; // active shockwave rings
function spawnRing(pos){
  const geo=new THREE.RingGeometry(0.1,0.4,32);
  const mat=new THREE.MeshBasicMaterial({
    color:0xff6600, transparent:true, opacity:0.9, side:THREE.DoubleSide,
    blending:THREE.AdditiveBlending,
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.copy(pos); mesh.position.y+=0.2; mesh.rotation.x=-Math.PI/2;
  mesh.userData={life:1, scale:1};
  scene.add(mesh); rings.push(mesh);
}

// ── SPAWN ──
const donuts=[];
let totalSpawned=0, totalKilled=0;

function spawnDonut(x,y,z){
  donuts.push(new Donut(x||((Math.random()-0.5)*40),y||(Math.random()*40+20),z||((Math.random()-0.5)*40)));
  totalSpawned++;
}

// Initial burst
for(let i=0;i<60;i++)spawnDonut();

// Auto-spawn
setInterval(()=>{
  for(let i=0;i<3+(totalSpawned%5);i++)spawnDonut();
},350);

// Click to spawn burst
renderer.domElement.addEventListener('pointerdown',(e)=>{
  const rect=renderer.domElement.getBoundingClientRect();
  const mx=((e.clientX-rect.left)/rect.width)*2-1;
  const my=(-((e.clientY-rect.top)/rect.height)+1)*2-1;
  const ray=new THREE.Raycaster();
  ray.setFromCamera({x:mx,y:my},camera);
  const pt=new THREE.Vector3(); ray.ray.at(30,pt);
  for(let i=0;i<5+(Math.random()*5|0);i++)spawnDonut(pt.x+(Math.random()-0.5)*8,pt.y+10,pt.z+(Math.random()-0.5)*8);
  spawnRing(pt);
});

// ── LOOP ──
let last=performance.now(), fps=0, frames=0, fpsTime=0;
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();
  const dt=Math.min((now-last)/1000,0.05); last=now;

  // FPS counter
  frames++; fpsTime+=dt;
  if(fpsTime>=1){fps=Math.round(frames/fpsTime); frames=0; fpsTime=0;}

  controls.update();

  // Update donuts
  for(let i=donuts.length-1;i>=0;i--){
    donuts[i].update(dt);
    if(donuts[i].dead){totalKilled++; donuts.splice(i,1);}
  }

  // Update sprinkles
  const sp=sGeo.attributes.position.array;
  for(let i=0;i<sprinkleCount;i++){
    sp[i*3]+=sVel[i].x*dt; sp[i*3+1]+=sVel[i].y*dt; sp[i*3+2]+=sVel[i].z*dt;
    sLife[i]-=dt;
    if(sp[i*3+1]<0 || sLife[i]<=0){
      sp[i*3]=(Math.random()-0.5)*80; sp[i*3+1]=Math.random()*40+30;
      sp[i*3+2]=(Math.random()-0.5)*80;
      sVel[i]={x:(Math.random()-0.5)*8, y:-(Math.random()*10+5), z:(Math.random()-0.5)*8};
      sLife[i]=Math.random()*5+3;
    }
  }
  sGeo.attributes.position.needsUpdate=true;

  // Update rings
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i];
    r.userData.life-=dt*1.5;
    r.userData.scale+=dt*18;
    r.scale.setScalar(r.userData.scale);
    r.material.opacity=r.userData.life*0.8;
    if(r.userData.life<=0){scene.remove(r);r.geometry.dispose();r.material.dispose();rings.splice(i,1);}
  }

  // Flash decay
  flash.intensity*=0.85;

  renderer.render(scene,camera);

  document.getElementById('stats').innerHTML=
    `DONUTS: ${donuts.length} active | ${totalSpawned} spawned | ${totalKilled} destroyed | ${fps} FPS`;
}

loop();

// Resize
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
