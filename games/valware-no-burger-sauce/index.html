<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valware Cannot Eat Burger Sauce</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
  }
  .container { text-align: center; position: relative; z-index: 2; }
  h1 {
    font-size: 3rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(90deg, #e94560, #ff6b6b, #ffd93d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    animation: pulse 2s ease-in-out infinite;
  }
  .subtitle { font-size: 1.2rem; color: #aaa; margin-bottom: 2rem; }
  .burger {
    width: 200px; height: 200px;
    margin: 0 auto 2rem;
    position: relative;
    animation: float 3s ease-in-out infinite;
  }
  .bun-top {
    width: 180px; height: 60px;
    background: radial-gradient(ellipse, #d4a237, #c4912e);
    border-radius: 90px 90px 10px 10px;
    position: absolute; top: 20px; left: 10px;
  }
  .bun-top::before {
    content: '';
    width: 12px; height: 12px;
    background: #f5e6a3;
    border-radius: 50%;
    position: absolute; top: 12px; left: 40px;
    box-shadow: 30px 5px 0 #f5e6a3, 60px -3px 0 #f5e6a3, 90px 8px 0 #f5e6a3, 110px 2px 0 #f5e6a3;
  }
  .lettuce {
    width: 190px; height: 18px;
    background: #4caf50;
    border-radius: 0 0 40px 40px;
    position: absolute; top: 78px; left: 5px;
    clip-path: polygon(0 0, 100% 0, 95% 100%, 80% 60%, 65% 100%, 50% 50%, 35% 100%, 20% 60%, 5% 100%);
  }
  .patty {
    width: 170px; height: 30px;
    background: radial-gradient(ellipse, #5d3a1a, #3e2510);
    border-radius: 20px;
    position: absolute; top: 94px; left: 15px;
  }
  .cheese {
    width: 185px; height: 12px;
    background: #ffc107;
    position: absolute; top: 122px; left: 7px;
    clip-path: polygon(0 0, 100% 0, 95% 100%, 80% 40%, 65% 100%, 50% 40%, 35% 100%, 20% 40%, 5% 100%);
  }
  .bun-bottom {
    width: 175px; height: 40px;
    background: radial-gradient(ellipse, #d4a237, #c4912e);
    border-radius: 10px 10px 80px 80px;
    position: absolute; top: 132px; left: 12px;
  }
  .sauce-drip {
    position: absolute;
    width: 12px;
    height: 30px;
    background: linear-gradient(to bottom, #e94560, #c0392b);
    border-radius: 0 0 6px 6px;
    top: 148px;
    animation: drip 2s ease-in-out infinite;
  }
  .sauce-drip:nth-child(1) { left: 30px; animation-delay: 0s; height: 35px; }
  .sauce-drip:nth-child(2) { left: 70px; animation-delay: 0.4s; height: 25px; }
  .sauce-drip:nth-child(3) { left: 110px; animation-delay: 0.8s; height: 40px; }
  .sauce-drip:nth-child(4) { left: 150px; animation-delay: 0.2s; height: 20px; }
  .x-mark {
    position: absolute;
    top: 60px; left: 50%;
    transform: translateX(-50%);
    font-size: 5rem;
    color: #e94560;
    font-weight: bold;
    z-index: 3;
    text-shadow: 0 0 20px rgba(233,69,96,0.8);
    animation: shake 0.5s ease-in-out infinite;
  }
  .badge {
    display: inline-block;
    background: rgba(233,69,96,0.2);
    border: 2px solid #e94560;
    border-radius: 30px;
    padding: 10px 30px;
    font-size: 1.1rem;
    margin-top: 1rem;
  }
  .counter { margin-top: 1.5rem; font-size: 1rem; color: #888; }
  .counter span { color: #ffd93d; font-size: 1.5rem; font-weight: bold; }
  button {
    margin-top: 1rem;
    padding: 12px 32px;
    background: linear-gradient(90deg, #e94560, #ff6b6b);
    border: none;
    border-radius: 25px;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(233,69,96,0.5); }
  .particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 6px; height: 6px;
    background: #e94560;
    border-radius: 50%;
    opacity: 0.5;
    animation: rise linear infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(-50%) rotate(0deg); }
    25% { transform: translateX(-50%) rotate(-5deg); }
    75% { transform: translateX(-50%) rotate(5deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  @keyframes drip {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.3); }
  }
  @keyframes rise {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    50% { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
  @keyframes floatMsg {
    0% { opacity:0; transform:translateX(-50%) translateY(-20px); }
    20% { opacity:1; transform:translateX(-50%) translateY(0); }
    80% { opacity:1; }
    100% { opacity:0; transform:translateX(-50%) translateY(-20px); }
  }
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="container">
  <h1>🚫 Valware Cannot Eat Burger Sauce 🚫</h1>
  <p class="subtitle">A scientifically proven fact, backed by zero evidence.</p>
  <div class="burger">
    <div class="bun-top"></div>
    <div class="lettuce"></div>
    <div class="patty"></div>
    <div class="cheese"></div>
    <div class="bun-bottom"></div>
    <div class="sauce-drip"></div>
    <div class="sauce-drip"></div>
    <div class="sauce-drip"></div>
    <div class="sauce-drip"></div>
    <div class="x-mark">✖</div>
  </div>
  <div class="badge">🍔 Burger Sauce = ❌ for Valware</div>
  <div class="counter">Times Valware tried to eat burger sauce: <span id="count">0</span></div>
  <button onclick="tryEat()">🍔 Try Feed Valware Burger Sauce</button>
</div>
<script>
  let count = 0;
  const messages = [
    "Valware recoils in horror! 🤢",
    "Valware politely declines... then runs away. 🏃",
    "Valware's taste buds file a complaint. ⚖️",
    "The burger sauce has been banished! 🛑",
    "Valware calls security. 🚨",
    "Nature itself prevents this atrocity. 🌍",
    "Valware: 'Absolutely not.' 😤",
    "The burger sauce cries alone. 😢",
    "Universe says NO. 🌌",
    "Valware's lawyer sends a cease & desist. 📜"
  ];
  function tryEat() {
    count++;
    document.getElementById('count').textContent = count;
    const msg = messages[Math.floor(Math.random() * messages.length)];
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(233,69,96,0.9);padding:12px 24px;border-radius:12px;font-size:1.1rem;z-index:10;animation:floatMsg 2s forwards;white-space:nowrap;';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      p.style.cssText = `position:fixed;bottom:0;left:${Math.random()*100}%;width:8px;height:8px;background:#e94560;border-radius:50%;z-index:1;animation:rise ${1+Math.random()*2}s linear forwards;`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 3000);
    }
  }
  const pc = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (3 + Math.random() * 5) + 's';
    p.style.animationDelay = Math.random() * 5 + 's';
    p.style.background = ['#e94560','#ff6b6b','#ffd93d','#4caf50'][Math.floor(Math.random()*4)];
    pc.appendChild(p);
  }
</script>
</body>
</html>
