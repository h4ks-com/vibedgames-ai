<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click the Circle!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  canvas {
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,150,255,0.3);
    cursor: crosshair;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// responsive sizing
function resize() {
  const s = Math.min(window.innerWidth - 40, window.innerHeight - 40, 600);
  canvas.width = canvas.height = s;
}
resize();
window.addEventListener('resize', () => { resize(); });

// background image
const bg = new Image();
bg.src = 'bg.png';

// game state
let score = 0, misses = 0, timeLeft = 30, gameOver = false;
let circle = null;
let particles = [];

function rand(min, max) { return Math.random() * (max - min) + min; }

function spawnCircle() {
  const r = rand(18, 40);
  const margin = r + 10;
  circle = {
    x: rand(margin, canvas.width - margin),
    y: rand(margin + 50, canvas.height - margin),
    r,
    hue: rand(0, 360),
    life: 1,
    born: performance.now(),
    maxLife: rand(800, 1800)
  };
}

function spawnParticles(x, y, hue) {
  for (let i = 0; i < 12; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(2, 6);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      hue,
      size: rand(2, 5)
    });
  }
}

function update(now) {
  if (gameOver) return;
  // shrink circle over time
  if (circle) {
    const age = now - circle.born;
    circle.life = 1 - age / circle.maxLife;
    if (circle.life <= 0) {
      misses++;
      spawnCircle();
    }
  }
  // particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.03;
  });
  particles = particles.filter(p => p.life > 0);
}

function draw() {
  const w = canvas.width, h = canvas.height;
  // background
  if (bg.complete && bg.naturalWidth) {
    ctx.drawImage(bg, 0, 0, w, h);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, w, h);
  } else {
    const g = ctx.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, '#0b1628');
    g.addColorStop(1, '#0a2540');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(w * 0.04)}px Segoe UI, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${score}`, 16, 36);
  ctx.textAlign = 'center';
  ctx.fillStyle = timeLeft <= 5 ? '#ff4444' : '#8cf';
  ctx.fillText(`${timeLeft}s`, w / 2, 36);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#f88';
  ctx.fillText(`Miss: ${misses}`, w - 16, 36);

  // circle
  if (circle && !gameOver) {
    const { x, y, r, hue, life } = circle;
    const pr = r * Math.max(life, 0.2);
    // glow
    const glow = ctx.createRadialGradient(x, y, 0, x, y, pr * 1.8);
    glow.addColorStop(0, `hsla(${hue},100%,70%,0.4)`);
    glow.addColorStop(1, `hsla(${hue},100%,50%,0)`);
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y, pr * 1.8, 0, Math.PI * 2);
    ctx.fill();
    // main circle
    const grad = ctx.createRadialGradient(x - pr * 0.3, y - pr * 0.3, 0, x, y, pr);
    grad.addColorStop(0, `hsla(${hue},100%,80%,0.95)`);
    grad.addColorStop(1, `hsla(${hue},90%,55%,0.9)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, pr, 0, Math.PI * 2);
    ctx.fill();
    // ring timer
    ctx.strokeStyle = `hsla(${hue},100%,90%,${life * 0.7})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(x, y, pr + 4, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * life);
    ctx.stroke();
  }

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = `hsl(${p.hue},100%,70%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // game over overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(w * 0.08)}px Segoe UI, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Time\'s Up!', w / 2, h / 2 - 30);
    ctx.font = `${Math.round(w * 0.05)}px Segoe UI, sans-serif`;
    ctx.fillStyle = '#8cf';
    ctx.fillText(`Score: ${score}  |  Misses: ${misses}`, w / 2, h / 2 + 20);
    ctx.fillStyle = '#aaa';
    ctx.font = `${Math.round(w * 0.035)}px Segoe UI, sans-serif`;
    ctx.fillText('Click to play again', w / 2, h / 2 + 60);
  }
}

// click handler
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);

  if (gameOver) {
    // restart
    score = 0; misses = 0; timeLeft = 30; gameOver = false;
    particles = [];
    spawnCircle();
    clearInterval(timerInterval);
    startTimer();
    return;
  }

  if (!circle) return;
  const dx = mx - circle.x, dy = my - circle.y;
  if (dx * dx + dy * dy <= circle.r * circle.r * circle.life * circle.life) {
    score++;
    spawnParticles(circle.x, circle.y, circle.hue);
    spawnCircle();
  }
});

// timer
let timerInterval;
function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      gameOver = true;
      clearInterval(timerInterval);
    }
  }, 1000);
}

// game loop
function loop(now) {
  update(now);
  draw();
  requestAnimationFrame(loop);
}

// init
spawnCircle();
startTimer();
requestAnimationFrame(loop);
</script>
</body>
</html>
