<!doctype html><html><meta charset=utf-8><style>
body{background:#3a6;font-family:ms sans serif;margin:8px}
.note{position:absolute;width:260px;border:2px outset #ccc;background:#ddd;box-shadow:2px 2px 0 #000}
.title{background:#000;color:#fff;padding:4px 6px;cursor:move;user-select:none}
.menu{display:flex;background:#c0c0c0;padding:3px 4px;border-bottom:2px solid #fff;gap:8px}
.mbtn{position:relative;padding:1px 6px;border:1px solid transparent;background:transparent;cursor:pointer;font-size:13px}
.mbtn:hover{border-color:#000}
.drop{position:absolute;left:0;top:100%;background:#fff;border:2px outset #ccc;display:none;min-width:110px;z-index:9}
.drop div{padding:4px 8px;cursor:pointer}
.drop div:hover{background:#006; color:#fff}
.content textarea{width:100%;height:120px;border:none;background:#fff;padding:6px;box-sizing:border-box;resize:none}
</style><body>
<script>
function createNote(x,y,t){
 t=t||"Note";
 const n=document.createElement('div');n.className='note';n.style.left=x+'px';n.style.top=y+'px';
 n.innerHTML=`<div class=title>${t}</div>
 <div class=menu>
 <div class=mbtn>File<div class=drop>
  <div data-act=new>New</div><div data-act=close>Close</div>
 </div></div>
 <div class=mbtn>Edit<div class=drop>
  <div data-act=clear>Clear</div><div data-act=copy>Copy</div>
 </div></div>
 <div class=mbtn>About<div class=drop>
  <div data-act=about>About</div>
 </div></div>
 </div>
 <div class=content><textarea></textarea></div>`;
 document.body.appendChild(n);
 // dropdown toggle
 n.querySelectorAll('.mbtn').forEach(b=>{
   b.onclick=e=>{ e.stopPropagation(); closeAll(); b.querySelector('.drop').style.display='block';}
 });
 document.addEventListener('click',closeAll);
 function closeAll(){ document.querySelectorAll('.drop').forEach(d=>d.style.display='none') }
 // actions
 n.querySelectorAll('[data-act]').forEach(el=>{
   el.onclick=e=>{
     e.stopPropagation();
     const act=el.getAttribute('data-act');
     const ta=n.querySelector('textarea');
     if(act=='close')n.remove();
     if(act=='new')createNote(x+20,y+20,t);
     if(act=='clear')ta.value='';
     if(act=='copy'){ta.select();document.execCommand('copy')}
     if(act=='about')alert(t+' — simple note');
     closeAll();
   }
 });
 // drag
 const title=n.querySelector('.title');
 title.onmousedown=ev=>{
   ev.preventDefault(); let dx=ev.clientX-n.offsetLeft, dy=ev.clientY-n.offsetTop;
   function move(e){ n.style.left=(e.clientX-dx)+'px'; n.style.top=(e.clientY-dy)+'px' }
   function up(){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up)}
   document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
 };
 return n;
}
window.createNote=createNote;
createNote(60,60,'My Note');createNote(320,90);
</script>
</body></html>
