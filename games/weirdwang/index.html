<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOM MOVIEPOSTER 9000 — Wang Tiles</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#0a0a0a;--fg:#e0e0e0;--accent:#00ff41;--accent2:#7fff00;--border:#222; }
  body { background:var(--bg);color:var(--fg);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden; }
  body::after { content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.015) 2px,rgba(0,255,65,0.015) 4px); }
  .header { text-align:center;padding:30px 20px 10px; }
  .header h1 { font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,4vw,2.2rem);font-weight:900;
    color:var(--accent);text-shadow:0 0 20px rgba(0,255,65,0.5),0 0 40px rgba(0,255,65,0.2);letter-spacing:3px; }
  .header .sub { font-size:0.75rem;color:#666;margin-top:5px; }
  .controls { display:flex;justify-content:center;gap:10px;padding:15px;flex-wrap:wrap; }
  .controls button { background:transparent;border:1px solid var(--accent);color:var(--accent);
    padding:8px 18px;font-family:'JetBrains Mono',monospace;font-size:0.75rem;cursor:pointer;
    transition:all 0.2s;text-transform:uppercase;letter-spacing:1px; }
  .controls button:hover,.controls button.active { background:var(--accent);color:#000;box-shadow:0 0 15px rgba(0,255,65,0.4); }
  .section { padding:20px;max-width:1400px;margin:0 auto; }
  .section-title { font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--accent2);
    margin-bottom:15px;padding-bottom:8px;border-bottom:1px solid var(--border);letter-spacing:2px; }
  .poster-container { display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin-bottom:20px; }
  .poster-square { width:280px;height:280px;border-radius:6px;overflow:hidden;
    border:2px solid var(--accent);box-shadow:0 0 30px rgba(0,255,65,0.15);position:relative; }
  .poster-square img { width:100%;height:100%;object-fit:cover;display:block; }
  .poster-label { position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);
    font-size:0.65rem;padding:6px;text-align:center;color:var(--accent); }
  .tile-grid { display:grid;grid-template-columns:repeat(8,1fr);gap:3px;max-width:680px;margin:0 auto 30px; }
  .wang-tile { aspect-ratio:1;position:relative;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;
    border-radius:2px;overflow:hidden; }
  .wang-tile:hover { transform:scale(1.15);z-index:10;box-shadow:0 0 15px rgba(0,255,65,0.5); }
  .wang-tile .tile-img { position:absolute;inset:0; }
  .wang-tile .tile-id { position:absolute;top:1px;left:3px;font-size:6px;
    color:rgba(255,255,255,0.8);text-shadow:0 0 2px #000;z-index:2;pointer-events:none; }
  .edge { position:absolute;z-index:1; }
  .edge-top { top:0;left:0;right:0;height:5px; }
  .edge-bottom { bottom:0;left:0;right:0;height:5px; }
  .edge-left { top:0;bottom:0;left:0;width:5px; }
  .edge-right { top:0;bottom:0;right:0;width:5px; }
  .tiling-controls { display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;align-items:center; }
  .tiling-controls label { font-size:0.75rem;color:#888; }
  .tiling-controls select,.tiling-controls input { background:#1a1a1a;border:1px solid var(--border);
    color:var(--fg);padding:5px 8px;font-family:'JetBrains Mono',monospace;font-size:0.75rem; }
  .tiling-canvas-wrap { overflow:auto;max-width:100%;border:1px solid var(--border);
    border-radius:6px;background:#050505;padding:10px; }
  .tiling-canvas { display:inline-grid;gap:0;margin:0 auto; }
  .color-legend { display:flex;gap:8px;flex-wrap:wrap;margin:15px 0;justify-content:center; }
  .legend-item { display:flex;align-items:center;gap:4px;font-size:0.65rem;color:#888; }
  .legend-swatch { width:14px;height:14px;border-radius:2px;border:1px solid #333; }
  .stats { display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin:10px 0; }
  .stat { text-align:center; }
  .stat .val { font-family:'Orbitron',sans-serif;font-size:1.4rem;color:var(--accent); }
  .stat .label { font-size:0.6rem;color:#555;text-transform:uppercase; }
  .tooltip { display:none;position:fixed;background:rgba(0,0,0,0.95);border:1px solid var(--accent);
    color:var(--fg);padding:8px 12px;font-size:0.7rem;border-radius:4px;z-index:10000;pointer-events:none;max-width:250px; }
  .tooltip .tt-title { color:var(--accent);font-weight:bold;margin-bottom:4px; }
  .tooltip .tt-edges { display:grid;grid-template-columns:auto auto;gap:2px 10px;font-size:0.65rem; }
  .tooltip .tt-dir { color:#888;text-align:right; }
  .hidden { display:none !important; }
  @media(max-width:600px) { .tile-grid{max-width:95vw;} .wang-tile .tile-id{font-size:5px;} }
</style>
</head>
<body>

<div class="header">
  <h1>☠ TOM MOVIEPOSTER 9000 ☠</h1>
  <div class="sub">WANG TILE GENERATOR — 64 TILES — RADIOACTIVE BEES EDITION</div>
</div>

<div class="controls">
  <button data-tab="tiles" class="active">64 TILES</button>
  <button data-tab="tiling">TILING ENGINE</button>
  <button data-tab="poster">POSTER</button>
  <button id="btn-regen">⟳ REGENERATE</button>
</div>

<div class="stats">
  <div class="stat"><div class="val">64</div><div class="label">Wang Tiles</div></div>
  <div class="stat"><div class="val">8</div><div class="label">Edge Colors</div></div>
  <div class="stat"><div class="val">∞</div><div class="label">Tilable</div></div>
  <div class="stat"><div class="val">8×8</div><div class="label">Grid</div></div>
</div>

<div class="color-legend" id="color-legend"></div>

<!-- POSTER SECTION -->
<div class="section hidden" id="sec-poster">
  <div class="section-title">▸ SOURCE POSTER (SQUARED)</div>
  <div class="poster-container">
    <div class="poster-square">
      <img id="poster-img" src="HES.jpg">
      <div class="poster-label">RADIOACTIVE BEES EDITION</div>
    </div>
  </div>
</div>

<!-- TILE SET SECTION -->
<div class="section" id="sec-tiles">
  <div class="section-title">▸ COMPLETE WANG TILE SET (64 TILES)</div>
  <div class="tile-grid" id="tile-grid"></div>
</div>

<!-- TILING SECTION -->
<div class="section hidden" id="sec-tiling">
  <div class="section-title">▸ INTERACTIVE WANG TILING</div>
  <div class="tiling-controls">
    <label>Grid:</label>
    <select id="tiling-size">
      <option value="8">8×8</option>
      <option value="12">12×12</option>
      <option value="16" selected>16×16</option>
      <option value="24">24×24</option>
      <option value="32">32×32</option>
      <option value="48">48×48</option>
    </select>
    <label>Tile px:</label>
    <select id="tiling-px">
      <option value="20">20</option>
      <option value="30">30</option>
      <option value="40" selected>40</option>
      <option value="60">60</option>
      <option value="80">80</option>
    </select>
    <label>Algorithm:</label>
    <select id="tiling-algo">
      <option value="periodic">Periodic</option>
      <option value="random" selected>Random Match</option>
      <option value="wave">Wave-like</option>
    </select>
    <button id="btn-tile">⟳ TILE</button>
    <button id="btn-animate">▶ ANIMATE</button>
  </div>
  <div class="tiling-canvas-wrap">
    <div class="tiling-canvas" id="tiling-canvas"></div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-edges"></div>
</div>

<script>
const POSTER = 'HES.jpg';
const N = 8, COLORS = 8;

const EC = ['#0a0a0a','#1a3a1a','#2d6b2d','#3f9f3f','#00ff41','#7fff00','#adff2f','#ffff00'];
const CN = ['Void','Dark Rad','Forest','Green','Matrix','Chartreuse','Acid','Toxic'];

// ── Tile data ──
let tiles = [];
let posterMap = [];

function makeTiles() {
  tiles = [];
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      tiles.push({
        id: r * N + c, row: r, col: c,
        top: r % COLORS, right: c % COLORS,
        bottom: (r + 1) % COLORS, left: (c + N - 1) % COLORS
      });
}

function shuffleMap() {
  posterMap = Array.from({length: N*N}, (_,i) => i);
  for (let i = posterMap.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [posterMap[i], posterMap[j]] = [posterMap[j], posterMap[i]];
  }
}

function posterPos(t) {
  const idx = posterMap[t.id];
  return { pr: Math.floor(idx / N), pc: idx % N };
}

// ── Tiling algorithms ──
function gridPeriodic(size) {
  return Array.from({length: size}, (_, r) =>
    Array.from({length: size}, (_, c) => tiles[(r % N) * N + (c % N)])
  );
}

function gridRandom(size) {
  const g = [];
  for (let r = 0; r < size; r++) {
    g[r] = [];
    for (let c = 0; c < size; c++) {
      const nT = r > 0 ? g[r-1][c].bottom : null;
      const nL = c > 0 ? g[r][c-1].right : null;
      g[r][c] = pickTile(null, null, nT, nL);
    }
  }
  return g;
}

function gridWave(size, phase) {
  const g = [];
  for (let r = 0; r < size; r++) {
    g[r] = [];
    for (let c = 0; c < size; c++) {
      const pr = Math.floor((Math.sin(r * 0.3 + phase) * 0.5 + 0.5) * N) % N;
      const pc = Math.floor((Math.cos(c * 0.3 + phase * 0.7) * 0.5 + 0.5) * N) % N;
      const nT = r > 0 ? g[r-1][c].bottom : null;
      const nL = c > 0 ? g[r][c-1].right : null;
      g[r][c] = pickTile(pr, pc, nT, nL);
    }
  }
  return g;
}

function pickTile(pr, pc, nT, nL) {
  let cands = tiles.filter(t => {
    if (nT !== null && t.top !== nT) return false;
    if (nL !== null && t.left !== nL) return false;
    return true;
  });
  if (!cands.length) cands = tiles.filter(t => nT === null || t.top === nT);
  if (!cands.length) cands = tiles;
  if (pr !== null && pc !== null) {
    const p = cands.find(t => t.row === pr && t.col === pc);
    if (p) return p;
  }
  return cands[Math.floor(Math.random() * cands.length)];
}

// ── DOM helpers ──
function makeTileEl(t, px) {
  const div = document.createElement('div');
  div.className = 'wang-tile';
  if (px) { div.style.width = px + 'px'; div.style.height = px + 'px'; }
  const {pr, pc} = posterPos(t);
  const bgX = (pc / N) * 100, bgY = (pr / N) * 100;
  const ew = px ? Math.max(2, px * 0.1) : 5;
  div.innerHTML =
    '<div class="tile-img" style="background-image:url(\'' + POSTER + '\');background-size:' + (N*100) + '% ' + (N*100) + '%;background-position:' + bgX + '% ' + bgY + '%"></div>' +
    '<div class="edge edge-top" style="height:' + ew + 'px;background:' + EC[t.top] + '"></div>' +
    '<div class="edge edge-bottom" style="height:' + ew + 'px;background:' + EC[t.bottom] + '"></div>' +
    '<div class="edge edge-left" style="width:' + ew + 'px;background:' + EC[t.left] + '"></div>' +
    '<div class="edge edge-right" style="width:' + ew + 'px;background:' + EC[t.right] + '"></div>' +
    (px ? '' : '<div class="tile-id">#' + t.id + '</div>');
  div.addEventListener('mouseenter', function(e) { showTip(e, t); });
  div.addEventListener('mousemove', moveTip);
  div.addEventListener('mouseleave', hideTip);
  return div;
}

// ── Tile set grid ──
function renderTileSet() {
  const grid = document.getElementById('tile-grid');
  grid.innerHTML = '';
  tiles.forEach(t => grid.appendChild(makeTileEl(t, null)));
}

// ── Tiling canvas ──
function renderTiling(phase) {
  const size = +document.getElementById('tiling-size').value;
  const px = +document.getElementById('tiling-px').value;
  const algo = document.getElementById('tiling-algo').value;
  const canvas = document.getElementById('tiling-canvas');
  canvas.style.gridTemplateColumns = 'repeat(' + size + ',' + px + 'px)';
  canvas.innerHTML = '';
  let g;
  if (algo === 'periodic') g = gridPeriodic(size);
  else if (algo === 'random' && phase === undefined) g = gridRandom(size);
  else g = gridWave(size, phase || 0);
  for (let r = 0; r < size; r++)
    for (let c = 0; c < size; c++)
      canvas.appendChild(makeTileEl(g[r][c], px));
}

// ── Animation ──
let animId = null;
function animateTiling() {
  const btn = document.getElementById('btn-animate');
  if (animId) { cancelAnimationFrame(animId); animId = null; btn.textContent = '▶ ANIMATE'; return; }
  btn.textContent = '■ STOP';
  let phase = 0;
  function loop() {
    phase += 0.08;
    const size = +document.getElementById('tiling-size').value;
    const px = +document.getElementById('tiling-px').value;
    const canvas = document.getElementById('tiling-canvas');
    const g = gridWave(size, phase);
    const kids = canvas.children;
    let idx = 0;
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        const el = kids[idx++];
        if (!el) continue;
        const t = g[r][c];
        const {pr, pc} = posterPos(t);
        const img = el.querySelector('.tile-img');
        img.style.backgroundPosition = ((pc/N)*100) + '% ' + ((pr/N)*100) + '%';
        el.querySelector('.edge-top').style.background = EC[t.top];
        el.querySelector('.edge-bottom').style.background = EC[t.bottom];
        el.querySelector('.edge-left').style.background = EC[t.left];
        el.querySelector('.edge-right').style.background = EC[t.right];
      }
    }
    animId = requestAnimationFrame(loop);
  }
  loop();
}

// ── Tabs ──
function showTab(name) {
  ['poster','tiles','tiling'].forEach(s => {
    document.getElementById('sec-' + s).classList.toggle('hidden', s !== name);
  });
  document.querySelectorAll('[data-tab]').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  if (name === 'tiling' && !animId) renderTiling();
}

// ── Tooltip ──
const tip = document.getElementById('tooltip');
function showTip(e, t) {
  tip.querySelector('.tt-title').textContent = 'Tile #' + t.id + ' (' + t.row + ',' + t.col + ')';
  tip.querySelector('.tt-edges').innerHTML =
    ['Top',t.top,'Right',t.right,'Bottom',t.bottom,'Left',t.left].reduce(function(h,v,i) {
      if (i%2===0) return h + '<span class="tt-dir">' + v + '</span>';
      return h + '<span style="color:' + EC[v] + '">■ ' + v + ' (' + CN[v] + ')</span>';
    }, '');
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) { tip.style.left = (e.clientX+15)+'px'; tip.style.top = (e.clientY+15)+'px'; }
function hideTip() { tip.style.display = 'none'; }

// ── Init ──
makeTiles();
shuffleMap();

// Legend
document.getElementById('color-legend').innerHTML = EC.map(function(c,i) {
  return '<div class="legend-item"><div class="legend-swatch" style="background:'+c+'"></div>'+i+': '+CN[i]+'</div>';
}).join('');

// Tab buttons
document.querySelectorAll('[data-tab]').forEach(function(b) {
  b.addEventListener('click', function() { showTab(b.dataset.tab); });
});

// Tiling buttons
document.getElementById('btn-tile').addEventListener('click', function() {
  if (animId) { cancelAnimationFrame(animId); animId = null; document.getElementById('btn-animate').textContent = '▶ ANIMATE'; }
  renderTiling();
});
document.getElementById('btn-animate').addEventListener('click', animateTiling);

// Regenerate
document.getElementById('btn-regen').addEventListener('click', function() {
  shuffleMap();
  renderTileSet();
  if (!document.getElementById('sec-tiling').classList.contains('hidden')) renderTiling();
});

// Start
renderTileSet();
</script>
</body>
</html>
