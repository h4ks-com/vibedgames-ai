<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍝 Genocide of Italian Brainrot 🤖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 20;
            pointer-events: auto;
            background: rgba(0,0,0,0.95);
            padding: clamp(15px, 4vw, 40px);
            border-radius: 15px;
            border: 3px solid #ff0000;
            max-width: 90vw;
        }
        h1 {
            font-size: clamp(22px, 5vw, 44px);
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(255,0,0,0.8);
            color: #fff;
        }
        .btn {
            padding: clamp(12px, 3vw, 18px) clamp(20px, 5vw, 35px);
            font-size: clamp(14px, 4vw, 22px);
            background: linear-gradient(45deg, #ff0000, #ff6600);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
        }
        p { font-size: clamp(12px, 3vw, 16px); opacity: 0.9; line-height: 1.6; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div>Score: <span id="score">0</span></div>
            <div>Creatures: <span id="creatures">0</span></div>
        </div>
        <div id="startScreen">
            <h1>🍝 GENOCIDE OF ITALIAN BRAINROT 🤖</h1>
            <p>Destroy all AI-generated Italian creatures!</p>
            <p><strong>Tap / Click</strong> to shoot</p>
            <button class="btn" onclick="startGame()">START EXTERMINATION</button>
        </div>
    </div>

    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var scoreEl = document.getElementById('score');
        var creaturesEl = document.getElementById('creatures');
        var startScreen = document.getElementById('startScreen');

        var gameRunning = false;
        var score = 0;
        var creatures = [];
        var particles = [];
        var projectiles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        var TYPES = [
            { name: "Tortellini Terror", emoji: "🤖", color: "#FF6B6B", hp: 30, spd: 2, pts: 100 },
            { name: "Lasagna Lord", emoji: "👹", color: "#4ECDC4", hp: 60, spd: 1.5, pts: 200 },
            { name: "Pizza Monster", emoji: "🍕", color: "#FFE66D", hp: 40, spd: 2.5, pts: 150 },
            { name: "Gelatinous Blob", emoji: "💩", color: "#95E1D3", hp: 80, spd: 1, pts: 300 },
            { name: "Carbonara Beast", emoji: "🐙", color: "#F38181", hp: 50, spd: 2, pts: 180 },
            { name: "Risotto Reaper", emoji: "💀", color: "#AA96DA", hp: 70, spd: 1.8, pts: 250 },
            { name: "Cannoli Crusher", emoji: "🥨", color: "#FCBAD3", hp: 35, spd: 2.2, pts: 120 },
            { name: "Bolognai Berserker", emoji: "👾", color: "#FFFFD2", hp: 90, spd: 1.2, pts: 350 }
        ];

        function Creature(t) {
            this.t = t;
            this.x = Math.random() * (canvas.width - 80) + 40;
            this.y = Math.random() * (canvas.height - 80) + 40;
            this.vx = (Math.random() - 0.5) * t.spd * 2;
            this.vy = (Math.random() - 0.5) * t.spd * 2;
            this.hp = t.hp;
            this.maxHp = t.hp;
            this.r = Math.max(28, Math.min(55, t.hp / 2));
        }

        Creature.prototype.update = function() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x <= this.r || this.x >= canvas.width - this.r) { this.vx *= -1; this.x = Math.max(this.r, Math.min(canvas.width - this.r, this.x)); }
            if (this.y <= this.r || this.y >= canvas.height - this.r) { this.vy *= -1; this.y = Math.max(this.r, Math.min(canvas.height - this.r, this.y)); }
        };

        Creature.prototype.draw = function() {
            // Glitch effect
            if (Math.random() > 0.92) ctx.translate((Math.random()-0.5)*8, 0);

            // Body
            var g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
            g.addColorStop(0, this.t.color);
            g.addColorStop(1, '#111');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
            ctx.fill();

            // AI eyes
            ctx.fillStyle = '#0f0';
            ctx.shadowColor = '#0f0';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(this.x - this.r/3, this.y - this.r/4, this.r/7, 0, Math.PI*2);
            ctx.arc(this.x + this.r/3, this.y - this.r/4, this.r/7, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Emoji
            ctx.font = this.r + 'px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.t.emoji, this.x, this.y + this.r/5);

            // Health bar for tough ones
            if (this.t.hp > 45) {
                var bw = this.r * 1.6;
                var bh = 5;
                var pct = this.hp / this.t.hp;
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x - bw/2, this.y - this.r - 12, bw, bh);
                ctx.fillStyle = pct > 0.5 ? '#0f0' : pct > 0.25 ? '#ff0' : '#f00';
                ctx.fillRect(this.x - bw/2, this.y - this.r - 12, bw * pct, bh);
            }

            if (Math.random() > 0.92) ctx.setTransform(1,0,0,1,0,0);
        };

        Creature.prototype.hit = function(dmg) {
            this.hp -= dmg;
            return this.hp <= 0;
        };

        function Particle(x, y, c) {
            this.x = x; this.y = y; this.c = c;
            this.vx = (Math.random()-0.5)*10;
            this.vy = (Math.random()-0.5)*10;
            this.life = 1;
            this.decay = Math.random()*0.03+0.02;
            this.s = Math.random()*7+2;
        }
        Particle.prototype.update = function() {
            this.x += this.vx; this.y += this.vy;
            this.life -= this.decay;
            this.vx *= 0.97; this.vy *= 0.97;
        };
        Particle.prototype.draw = function() {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.fillStyle = this.c;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        };

        function Projectile(x, y, tx, ty) {
            this.x = x; this.y = y;
            var a = Math.atan2(ty-y, tx-x);
            this.vx = Math.cos(a)*14;
            this.vy = Math.sin(a)*14;
            this.r = 5;
            this.alive = true;
        }
        Projectile.prototype.update = function() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < -20 || this.x > canvas.width+20 || this.y < -20 || this.y > canvas.height+20) this.alive = false;
        };
        Projectile.prototype.draw = function() {
            ctx.fillStyle = '#f44';
            ctx.shadowColor = '#f00';
            ctx.shadowBlur = 12;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        };

        function spawn() {
            var t = TYPES[Math.floor(Math.random()*TYPES.length)];
            creatures.push(new Creature(t));
            creaturesEl.textContent = creatures.length;
        }

        function explode(x, y, c, n) {
            for (var i = 0; i < n; i++) particles.push(new Particle(x, y, c));
        }

        function shoot(tx, ty) {
            projectiles.push(new Projectile(canvas.width/2, canvas.height - 30, tx, ty));
        }

        function collisions() {
            for (var i = projectiles.length-1; i >= 0; i--) {
                var p = projectiles[i];
                if (!p.alive) continue;
                for (var j = creatures.length-1; j >= 0; j--) {
                    var c = creatures[j];
                    var dx = p.x - c.x, dy = p.y - c.y;
                    if (Math.sqrt(dx*dx+dy*dy) < c.r + p.r) {
                        p.alive = false;
                        if (c.hit(25)) {
                            explode(c.x, c.y, c.t.color, 30);
                            score += c.t.pts;
                            scoreEl.textContent = score;
                            creatures.splice(j, 1);
                            creaturesEl.textContent = creatures.length;
                            setTimeout(spawn, 600);
                        } else {
                            explode(p.x, p.y, '#fff', 6);
                        }
                        break;
                    }
                }
            }
            projectiles = projectiles.filter(function(p){ return p.alive; });
        }

        function bg() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#151515';
            ctx.lineWidth = 1;
            for (var x = 0; x < canvas.width; x += 35) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
            for (var y = 0; y < canvas.height; y += 35) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
        }

        function loop() {
            if (!gameRunning) return;
            bg();
            for (var i = 0; i < creatures.length; i++) { creatures[i].update(); creatures[i].draw(); }
            particles = particles.filter(function(p){ return p.life > 0; });
            for (var j = 0; j < particles.length; j++) { particles[j].update(); particles[j].draw(); }
            for (var k = 0; k < projectiles.length; k++) { projectiles[k].update(); projectiles[k].draw(); }
            collisions();
            requestAnimationFrame(loop);
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameRunning = true;
            score = 0;
            scoreEl.textContent = '0';
            creatures = []; particles = []; projectiles = [];
            for (var i = 0; i < 5; i++) spawn();
            setInterval(function(){ if (creatures.length < 8 && gameRunning) spawn(); }, 2000);
            loop();
        }

        function handleInput(cx, cy) {
            if (!gameRunning) return;
            var r = canvas.getBoundingClientRect();
            shoot(cx - r.left, cy - r.top);
        }

        canvas.addEventListener('click', function(e){ handleInput(e.clientX, e.clientY); });
        canvas.addEventListener('touchstart', function(e){ e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });
    </script>
</body>
</html>
