<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mattf cellular automaton — class 4 hex grid</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; height: 100vh; }
#time-display { color: #DC143C; font-size: 2.4em; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 20px rgba(220,20,60,0.6), 0 0 40px rgba(220,20,60,0.3); padding: 12px 24px; z-index: 10; text-align: center; border-bottom: 2px solid rgba(220,20,60,0.3); width: 100%; background: rgba(5,5,10,0.9); position: relative; }
#time-display::after { content: '— everything mattf ever said or did —'; display: block; font-size: 0.35em; color: #666; letter-spacing: 1px; margin-top: 4px; font-weight: normal; }
#canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
canvas { image-rendering: pixelated; }
#controls { position: fixed; bottom: 16px; right: 16px; z-index: 20; display: flex; gap: 8px; align-items: center; }
button { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #e0e0e0; border: 1px solid #333; padding: 8px 18px; cursor: pointer; font-family: inherit; font-size: 13px; border-radius: 6px; transition: all 0.2s; letter-spacing: 1px; }
button:hover { background: linear-gradient(135deg, #DC143C, #8B0000); border-color: #DC143C; box-shadow: 0 0 15px rgba(220,20,60,0.4); transform: scale(1.05); }
#stats { position: fixed; bottom: 16px; left: 16px; color: #444; font-size: 11px; z-index: 20; line-height: 1.6; }
#palette-preview { position: fixed; top: 80px; right: 16px; z-index: 20; display: flex; gap: 3px; }
.palette-swatch { width: 22px; height: 22px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 0 8px currentColor; }
</style>
</head>
<body>

<div id="time-display" idt="">INITIALIZING...</div>
<div id="canvas-wrap"><canvas id="c"></canvas></div>

<div id="palette-preview"></div>
<div id="controls">
  <span style="color:#555;font-size:11px;">K=4 | HEX | CLASS-4</span>
  <button onclick="rerollPalette()">🎲 REROLL PALETTE</button>
  <button onclick="reseed()">🌱 RESEED</button>
</div>
<div id="stats">iter: <span id="iter-count">0</span><br>cells: <span id="cell-count">0</span><br>entropy: <span id="entropy-val">0</span></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const timeEl = document.getElementById('time-display');
const iterEl = document.getElementById('iter-count');
const cellEl = document.getElementById('cell-count');
const entEl = document.getElementById('entropy-val');
const previewEl = document.getElementById('palette-preview');

let W, H, HEX_R = 7, COLS, ROWS;
let grid, nextGrid;
let iter = 0;
let startTime = new Date();
let palette;

// Hex axial coordinates: flat-topped
function hexToPixel(q, r) {
  const x = HEX_R * 1.5 * q;
  const y = HEX_R * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r);
  return [x, y];
}

function pixelToHex(x, y) {
  const q = (2/3 * x) / HEX_R;
  const r = (-1/3 * x + Math.sqrt(3)/3 * y) / HEX_R;
  return hexRound(q, r);
}

function hexRound(q, r) {
  let s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds) rr = -rq - rs;
  return [rq, rr];
}

// Axial hex neighbors (6 directions for flat-topped)
const HEX_DIRS = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];

function getIdx(q, r) {
  return q + r * COLS;
}

function inBounds(q, r) {
  return q >= 0 && q < COLS && r >= 0 && r < ROWS;
}

function getNeighborCount(q, r, targetState) {
  let count = 0;
  for (const [dq, dr] of HEX_DIRS) {
    const nq = q + dq, nr = r + dr;
    if (inBounds(nq, nr) && grid[getIdx(nq, nr)] === targetState) count++;
  }
  return count;
}

function getAllNeighborStates(q, r) {
  const counts = [0,0,0,0];
  for (const [dq, dr] of HEX_DIRS) {
    const nq = q + dq, nr = r + dr;
    if (inBounds(nq, nr)) {
      const s = grid[getIdx(nq, nr)];
      if (s >= 0 && s < 4) counts[s]++;
    }
  }
  return counts;
}

// Class 4 rule: complex behavior with localized structures, gliders, chaos
// Uses a totalistic-like rule with state-dependent transitions
function stepCell(q, r) {
  const state = grid[getIdx(q, r)];
  const nCounts = getAllNeighborStates(q, r);
  
  // Count neighbors of each state
  const totalActive = nCounts[1] + nCounts[2] + nCounts[3];
  const sameNeighbors = nCounts[state];
  
  // Class 4 rule table — designed for emergent complexity
  // State 0 (dead): birth conditions
  if (state === 0) {
    if (nCounts[1] === 2 || nCounts[2] === 1 || nCounts[3] === 1 || totalActive === 3) {
      // Birth into most common neighbor state
      if (nCounts[3] > 0 && Math.random() < 0.25) return 3;
      if (nCounts[2] > 0 && Math.random() < 0.35) return 2;
      return 1;
    }
    return 0;
  }
  
  // States 1-3: survival/mutation/death with glider-supporting rules
  if (state === 1) {
    if (sameNeighbors >= 1 && sameNeighbors <= 3) return 1;
    if (totalActive <= 1) return 0; // underpopulation
    if (totalActive >= 5) return 0; // overpopulation
    if (nCounts[2] >= 2) return 2; // mutation from state 2 pressure
    if (nCounts[3] >= 2 && Math.random() < 0.15) return 3;
    return 1;
  }
  
  if (state === 2) {
    if (sameNeighbors >= 1 && sameNeighbors <= 4) return 2;
    if (totalActive <= 1) return 0;
    if (totalActive >= 6) return 0;
    if (nCounts[1] >= 3) return 1;
    if (nCounts[3] >= 2 && Math.random() < 0.12) return 3;
    return 2;
  }
  
  if (state === 3) {
    if (sameNeighbors >= 1 && sameNeighbors <= 3) return 3;
    if (totalActive <= 2) return 0;
    if (totalActive >= 5) return 0;
    if (Math.random() < 0.08) return Math.floor(Math.random() * 3) + 1; // decay randomly
    return 3;
  }
  
  return state;
}

function generatePalette() {
  const palettes = [
    ['#0a0a0f','#1a1a3e','#dc143c','#ffd700'],
    ['#0d1117','#00ff88','#ff6b35','#f72585'],
    ['#0b090a','#2d00f7','#fa0078','#fe9f00'],
    ['#0a0a12','#06ffa5','#ff2e63','#ffea00'],
    ['#050510','#7209b7','#f72585','#4cc9f0'],
    ['#0a0f0a','#39ff14','#ff073a','#ffff00'],
    ['#0f0a0a','#e63946','#f4a261','#2a9d8f'],
    ['#080810','#00b4d8','#ef476f','#ffd166'],
    ['#0a0a0a','#bf00ff','#00ffbf','#ffbf00'],
    ['#0f0f0f','#00ffc8','#ff006e','#ccff00'],
    ['#070714','#ff3366','#33ff99','#ffff33'],
    ['#0a0010','#ff00aa','#00aaff','#aaff00'],
    ['#000a0a','#ff5500','#00ff55','#5500ff'],
    ['#100a05','#ffdd00','#ff6600','#00ddff'],
    ['#050010','#aa00ff','#00ffaa','#ffaa00'],
  ];
  return palettes[Math.floor(Math.random() * palettes.length)];
}

function rerollPalette() {
  palette = generatePalette();
  updatePreview();
  document.body.style.background = palette[0];
}

function updatePreview() {
  previewEl.innerHTML = palette.map(c => `<div class="palette-swatch" style="background:${c};color:${c}"></div>`).join('');
}

function reseed() {
  initGrid();
  iter = 0;
  startTime = new Date();
  updateTimeDisplay();
}

function initGrid() {
  grid = new Uint8Array(COLS * ROWS);
  nextGrid = new Uint8Array(COLS * ROWS);
  
  // Random seed with bias toward interesting patterns
  for (let i = 0; i < grid.length; i++) {
    const r = Math.random();
    if (r < 0.52) grid[i] = 0;
    else if (r < 0.78) grid[i] = 1;
    else if (r < 0.92) grid[i] = 2;
    else grid[i] = 3;
  }
  
  // Inject some structured seeds for class 4 behavior
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  for (let dq = -5; dq <= 5; dq++) {
    for (let dr = -5; dr <= 5; dr++) {
      const q = cx + dq, r = cy + dr;
      if (inBounds(q, r)) {
        const dist = Math.abs(dq) + Math.abs(dr);
        if (dist <= 3) grid[getIdx(q,r)] = (dq*7 + dr*13 + dist*17) % 3 + 1;
      }
    }
  }
  
  // Random walkers
  for (let w = 0; w < 8; w++) {
    let qx = Math.floor(Math.random() * COLS);
    let rx = Math.floor(Math.random() * ROWS);
    for (let step = 0; step < 15; step++) {
      if (inBounds(qx, rx)) grid[getIdx(qx,rx)] = (w % 3) + 1;
      const d = HEX_DIRS[Math.floor(Math.random() * 6)];
      qx += d[0]; rx += d[1];
    }
  }
}

function resize() {
  W = window.innerWidth;
  H = window.innerHeight - 80;
  canvas.width = W;
  canvas.height = H;
  HEX_R = Math.max(5, Math.min(11, Math.floor(W / 120)));
  COLS = Math.floor(W / (HEX_R * 1.75)) + 2;
  ROWS = Math.floor(H / (HEX_R * 1.55)) + 2;
  initGrid();
  iter = 0;
  startTime = new Date();
  updateTimeDisplay();
}

function drawHex(x, y, r, color) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const px = x + r * Math.cos(angle);
    const py = y + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function render() {
  ctx.fillStyle = palette[0];
  ctx.fillRect(0, 0, W, H);
  
  const offsetY = 40;
  
  for (let r = 0; r < ROWS; r++) {
    for (let q = 0; q < COLS; q++) {
      const state = grid[getIdx(q, r)];
      if (state === 0) continue;
      const [px, py] = hexToPixel(q, r);
      drawHex(px + COLS * HEX_R * 0.5, py + offsetY + ROWS * HEX_R * 0.45, HEX_R - 0.8, palette[state]);
    }
  }
}

function simulate() {
  for (let r = 0; r < ROWS; r++) {
    for (let q = 0; q < COLS; q++) {
      nextGrid[getIdx(q, r)] = stepCell(q, r);
    }
  }
  const tmp = grid; grid = nextGrid; nextGrid = tmp;
  iter++;
  iterEl.textContent = iter;
  
  // Stats
  let active = 0, hist = [0,0,0,0];
  for (let i = 0; i < grid.length; i++) {
    if (grid[i] !== 0) active++;
    hist[grid[i]]++;
  }
  cellEl.textContent = active;
  
  // Entropy approximation
  let entropy = 0;
  for (let h of hist) {
    if (h > 0) {
      const p = h / grid.length;
      entropy -= p * Math.log2(p);
    }
  }
  entEl.textContent = entropy.toFixed(3);
}

function updateTimeDisplay() {
  const t = startTime;
  const pad = n => String(n).padStart(2,'0');
  timeEl.textContent = `${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}.${String(t.getMilliseconds()).padStart(3,'0')}`;
}

function tick() {
  simulate();
  render();
  updateTimeDisplay();
}

// Init
rerollPalette();
resize();
window.addEventListener('resize', resize);

// Start the eternal iteration
setInterval(tick, 1000);
render(); // Initial frame

</script>
</body>
</html>
