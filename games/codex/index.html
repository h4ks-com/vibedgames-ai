<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Codex — Zopo</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { margin: 0; padding: 24px 12px 60px; background: #1b1410; color: #d8c391;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, "Hoefler Text", Georgia, serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: min(900px, 100%); display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  header h1 { margin: 0; font-weight: 500; font-size: 18px; letter-spacing: 0.3em; text-transform: uppercase; }
  a.home { color: #d8c391; text-decoration: none; opacity: 0.7; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; }
  a.home:hover { opacity: 1; }
  .controls { width: min(900px, 100%); display: flex; gap: 12px; margin-bottom: 18px; }
  button { background: transparent; color: #d8c391; border: 1px solid #5a4632;
    padding: 6px 14px; font-family: inherit; font-size: 12px;
    letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; }
  button:hover { border-color: #d8c391; }
  .page {
    width: min(900px, 100%);
    background: #ebd9af;
    color: #1b1410;
    padding: 50px 60px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.65);
    position: relative;
    background-image: radial-gradient(ellipse at center, transparent 60%, rgba(60,40,20,0.18) 100%);
  }
  .common { font-size: 28px; margin: 0 0 4px; font-weight: 500; }
  .latin { font-size: 17px; font-style: italic; margin: 0 0 28px; opacity: 0.7; }
  .grid { display: grid; grid-template-columns: 220px 1fr; gap: 30px; }
  .figure { background: #d6c08a; border: 1px solid #8a7050; padding: 12px; }
  .figure svg { display: block; width: 100%; height: 220px; }
  .figcap { margin-top: 8px; font-size: 11px; font-style: italic; text-align: center; opacity: 0.7; }
  .text { font-size: 15px; line-height: 1.7; }
  .text h3 { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; margin: 16px 0 6px; opacity: 0.6; font-weight: 500; }
  .text p { margin: 0; }
  .taxon { margin-top: 24px; display: grid; grid-template-columns: auto 1fr; gap: 4px 16px; font-size: 13px; }
  .taxon dt { font-style: italic; opacity: 0.6; }
  .taxon dd { margin: 0; }
  .footer { margin-top: 36px; border-top: 1px solid #8a7050; padding-top: 12px; font-size: 11px; opacity: 0.55; display: flex; justify-content: space-between; font-style: italic; }
</style>
</head>
<body>
<header>
  <h1>Codex</h1>
  <a class="home" href="index.html">↩ gallery</a>
</header>

<div class="controls">
  <button id="next">next entry</button>
</div>

<div class="page" id="page"></div>

<script>
// ────────────────────────────────────────────────────────────────────────────
// Codex — invented natural-history catalog
// ────────────────────────────────────────────────────────────────────────────
function rng(seed) {
  let a = seed >>> 0;
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = a;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function pick(a, r) { return a[Math.floor(r() * a.length)]; }

// Latin / pseudo-Latin
const G_PRE = ["Lyr","Aur","Pter","Crypt","Helio","Noct","Aeg","Stell","Syl","Plat","Pelag","Calig","Anthr","Glaux","Mel","Phaen","Trich","Dorm","Vesp","Chrys","Lim","Pen","Hesp"];
const G_MID = ["o","io","a","ae","oe","ī","u","y"];
const G_SUF = ["lurus","saurus","pteryx","phorus","cephalus","lops","rhynchus","pterix","mimus","callus","gnathus","derma","pterus","lepis","stoma","gaster","odon","gnatha","theca"];
const S_SUF = ["albifrons","occulta","minor","major","palustris","sylvestris","aurifera","mendax","tenebrosa","argentea","longicauda","cinerea","nivalis","obscura","glabra","crepuscularis","fulgens","umbratilis","cyanopthalma","septentrionalis","patavina"];

const COMMONS = {
  beetle:  ["The Salt Beetle","Pharmacist's Beetle","Lantern Beetle","Hooded Walker","Iron Carapace","Sail-bearer","Locksmith Beetle"],
  fish:    ["Glass Whisker","Marsh Diviner","Night Pelagic","Cathedral Fish","Three-tailed Sweeper","Blind Verger","Long Lacquer"],
  bird:    ["Hesperian Crier","Stitchbird","Veiled Pipit","Elder Stridor","Coalbird","Letter-bearer","Mourning Whistler"],
  moth:    ["Letter Moth","Inkwing","Silver Hierophant","Glass Lantern Moth","Veiled Pteranthus","Salt-eater Moth","The Compositor"],
  deep:    ["Polite Anglerfish","Quiet Pulse","Lamp of Gerlach","The Confessor","Long Anchorite","Shipwreck Cluster","Slow Verger"],
  reptile: ["Ironback Skink","Patient Lizard","Reading Gecko","Glass Skink","Sundial Lizard","Saint's Newt"],
};

const HABITATS = [
  "the salt fens north of {place}",
  "old library cellars of {place}",
  "tidal caves between {place} and the open sea",
  "the chalk uplands of {place}",
  "freshwater quarries near {place}",
  "abandoned grain silos in the {place} basin",
  "alpine scree above the {place} treeline",
  "the lower naves of the cathedral at {place}",
  "stranded saltmarsh near {place}",
  "moss-banks along the {place} road",
];
const PLACES = ["Vidin","Plovdiv","Konstanz","Trondheim","Aix","Iquitos","Halifax","Lübeck","Salina","Almaty","Patmos","Galway","Riga","Trieste","Karaganda"];

const HABITS = [
  "Solitary, mostly nocturnal, surfaces only after rain.",
  "Forms small colonies of three to five; the largest individual eats first.",
  "Inert by day; assembles into elaborate processions after dusk.",
  "Hunts by patience: lies still for hours, then moves with surprising speed.",
  "Travels in pairs that appear to communicate with rapid clicks.",
  "Migrates seasonally, but no two migrations follow the same route.",
  "Makes a low, almost inaudible humming when threatened.",
  "Tolerates human presence; in some districts considered a household guest.",
  "Reclusive; the type specimen was acquired in trade with a fisherman who would say nothing about it.",
];
const DIETS = [
  "Insects, lichen, occasionally fallen fruit.",
  "Small fish, eggs of other fish, the discarded scales of larger predators.",
  "Almost exclusively the seeds of one introduced grass.",
  "Carrion, when available; otherwise patient at burrow entrances.",
  "Algal mats and the slow worms that feed on them.",
  "A single species of moth, which it calls down with a sustained note.",
  "Whatever it can fit in its mouth — a versatility that has not made it abundant.",
];
const NOTES = [
  "Reported by R. Halverson (1881) but considered apocryphal until specimens reached Leiden in 1907.",
  "The species name honours the apothecary M. Penzo, whose notebooks first described its diurnal habits.",
  "Local names suggest the creature has been known for centuries; the Latin binomial is recent.",
  "The juvenile form was, for a long time, classified as a separate species.",
  "Highly variable in colouration; the type drawing favours an unusually dark specimen.",
  "Believed extinct in 1939; rediscovered after the war in a single drainage ditch.",
  "Population estimates remain unreliable; the field census of 1996 produced more counts than animals.",
  "Three subspecies are sometimes recognised; some authorities recognise none.",
];

function expand(t, r) {
  return t.replace(/\{(\w+)\}/g, (_, k) => k === "place" ? pick(PLACES, r) : "");
}
function makeBinomial(r) {
  const g = pick(G_PRE,r) + pick(G_MID,r) + pick(G_SUF,r);
  const s = pick(S_SUF, r);
  return capitalize(g) + " " + s;
}
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ────────────────────────────────────────────────────────────────────────────
// Creature illustrations — one drawer per type, parametric
// ────────────────────────────────────────────────────────────────────────────
const ns = "http://www.w3.org/2000/svg";
function newSvg() {
  const s = document.createElementNS(ns, "svg");
  s.setAttribute("viewBox", "0 0 220 220");
  return s;
}
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

function drawBeetle(r) {
  const svg = newSvg();
  const cx = 110, cy = 120;
  const inkL = "#1b1410", inkF = pick(["#3a2a1a","#2a3a3a","#5a3a2a","#4a2a3a","#6a4a2a"], r);
  // body (oval)
  svg.appendChild(el("ellipse",{cx,cy,rx:50,ry:70,fill:inkF,stroke:inkL,"stroke-width":1}));
  // segmentation
  svg.appendChild(el("path",{d:`M${cx-50} ${cy-20} q50 -8 100 0`,fill:"none",stroke:inkL,"stroke-width":1,opacity:0.5}));
  svg.appendChild(el("line",{x1:cx,y1:cy-70,x2:cx,y2:cy+70,stroke:inkL,"stroke-width":1,opacity:0.6}));
  // head
  svg.appendChild(el("ellipse",{cx,cy:cy-72,rx:25,ry:20,fill:inkF,stroke:inkL,"stroke-width":1}));
  // antennae
  svg.appendChild(el("path",{d:`M${cx-12} ${cy-86} q-20 -10 -34 -34`,fill:"none",stroke:inkL,"stroke-width":1.4}));
  svg.appendChild(el("path",{d:`M${cx+12} ${cy-86} q20 -10 34 -34`,fill:"none",stroke:inkL,"stroke-width":1.4}));
  // eyes
  svg.appendChild(el("circle",{cx:cx-8,cy:cy-72,r:2,fill:inkL}));
  svg.appendChild(el("circle",{cx:cx+8,cy:cy-72,r:2,fill:inkL}));
  // legs (3 per side)
  for (let i = 0; i < 3; i++) {
    const y = cy - 30 + i * 40;
    svg.appendChild(el("path",{d:`M${cx-45} ${y} q-30 ${(i-1)*8} -50 ${20 + i*4}`,fill:"none",stroke:inkL,"stroke-width":1.4}));
    svg.appendChild(el("path",{d:`M${cx+45} ${y} q30 ${(i-1)*8} 50 ${20 + i*4}`,fill:"none",stroke:inkL,"stroke-width":1.4}));
  }
  // markings
  for (let i = 0; i < 6; i++) {
    svg.appendChild(el("circle",{cx:cx + (r()-0.5) * 60, cy:cy + (r()-0.5)*100, r: 1.5 + r()*2, fill:inkL, opacity: 0.4}));
  }
  return svg;
}

function drawFish(r) {
  const svg = newSvg();
  const inkL = "#1b1410", inkF = pick(["#3a4a5a","#5a3a2a","#3a3a3a","#5a5a3a","#5a4a6a"], r);
  // body
  svg.appendChild(el("path",{d:"M40 110 q60 -70 130 0 q-30 80 -130 0 z",fill:inkF,stroke:inkL,"stroke-width":1.2}));
  // tail
  svg.appendChild(el("path",{d:"M170 110 l30 -30 l-10 30 l10 30 z",fill:inkF,stroke:inkL,"stroke-width":1.2}));
  // dorsal fin
  svg.appendChild(el("path",{d:"M90 70 q20 -25 50 -10 l-12 14 z",fill:inkF,stroke:inkL,"stroke-width":1}));
  // bottom fin
  svg.appendChild(el("path",{d:"M100 145 q15 20 40 8 l-10 -12 z",fill:inkF,stroke:inkL,"stroke-width":1}));
  // eye
  svg.appendChild(el("circle",{cx:60,cy:108,r:5,fill:"#ebd9af",stroke:inkL}));
  svg.appendChild(el("circle",{cx:60,cy:108,r:2,fill:inkL}));
  // gill
  svg.appendChild(el("path",{d:"M80 95 q-2 15 0 30",fill:"none",stroke:inkL,"stroke-width":1}));
  // scales
  for (let yi = 0; yi < 4; yi++) {
    for (let xi = 0; xi < 7; xi++) {
      const x = 80 + xi * 14, y = 92 + yi * 12 + (xi%2)*5;
      svg.appendChild(el("path",{d:`M${x} ${y} q5 -4 10 0`,fill:"none",stroke:inkL,"stroke-width":0.6,opacity:0.6}));
    }
  }
  return svg;
}

function drawBird(r) {
  const svg = newSvg();
  const inkL = "#1b1410", inkF = pick(["#5a4a3a","#3a3a2a","#7a5a3a","#4a2a2a","#5a5a5a"], r);
  // body (egg shape)
  svg.appendChild(el("ellipse",{cx:110,cy:130,rx:45,ry:60,fill:inkF,stroke:inkL}));
  // head
  svg.appendChild(el("circle",{cx:110,cy:65,r:28,fill:inkF,stroke:inkL}));
  // beak
  svg.appendChild(el("path",{d:"M137 65 l40 -4 l-40 8 z",fill:"#caa84a",stroke:inkL}));
  // eye
  svg.appendChild(el("circle",{cx:124,cy:60,r:4,fill:"#ebd9af",stroke:inkL}));
  svg.appendChild(el("circle",{cx:125,cy:60,r:1.6,fill:inkL}));
  // wing
  svg.appendChild(el("path",{d:"M70 110 q-10 50 30 70 q15 -45 -30 -70 z",fill:inkF,stroke:inkL,"stroke-width":1}));
  // legs
  svg.appendChild(el("path",{d:"M95 188 q-2 14 -10 22 m0 0 l-6 0 m6 0 l4 4",fill:"none",stroke:inkL,"stroke-width":1.4}));
  svg.appendChild(el("path",{d:"M125 188 q2 14 10 22 m0 0 l6 0 m-6 0 l-4 4",fill:"none",stroke:inkL,"stroke-width":1.4}));
  // small markings
  for (let i = 0; i < 8; i++) {
    svg.appendChild(el("path",{d:`M${90 + r()*40} ${130 + r()*40} q3 -2 6 0`,fill:"none",stroke:inkL,"stroke-width":0.5,opacity:0.6}));
  }
  return svg;
}

function drawMoth(r) {
  const svg = newSvg();
  const inkL = "#1b1410", inkF = pick(["#5a4a3a","#3a3a2a","#7a5a3a","#4a2a2a"], r);
  const accent = pick(["#caa84a","#7a1a1a","#1f4a8a","#5a3a6a","#7a5a3a"], r);
  // body
  svg.appendChild(el("ellipse",{cx:110,cy:115,rx:8,ry:50,fill:inkL}));
  // head
  svg.appendChild(el("circle",{cx:110,cy:65,r:8,fill:inkL}));
  // antennae
  svg.appendChild(el("path",{d:"M105 60 q-10 -20 -30 -28",fill:"none",stroke:inkL,"stroke-width":1}));
  svg.appendChild(el("path",{d:"M115 60 q10 -20 30 -28",fill:"none",stroke:inkL,"stroke-width":1}));
  // wings (mirrored)
  for (const side of [-1, 1]) {
    const tx = 110 + side * 40;
    const wing = el("path", {
      d: `M110 90 q${side*60} -40 ${side*70} 10 q${side*-10} 30 ${side*-50} 30 q${side*-10} -10 ${side*-20} -40 z`,
      fill: inkF, stroke: inkL, "stroke-width": 1
    });
    svg.appendChild(wing);
    // accent eye-spots
    svg.appendChild(el("circle",{cx:tx,cy:108,r:8,fill:accent,opacity:0.85}));
    svg.appendChild(el("circle",{cx:tx,cy:108,r:3,fill:inkL}));
    // hindwing
    svg.appendChild(el("path", {
      d: `M110 130 q${side*40} 10 ${side*50} 35 q${side*-10} 10 ${side*-30} 5 q${side*-10} -10 ${side*-20} -40 z`,
      fill: inkF, stroke: inkL, "stroke-width": 1
    }));
  }
  return svg;
}

function drawDeep(r) {
  const svg = newSvg();
  const inkL = "#1b1410", inkF = pick(["#1f1a3a","#3a1a2a","#0a1f2a","#2a1a1a"], r);
  // body
  svg.appendChild(el("path",{d:"M40 130 q40 -50 110 -10 q40 30 0 60 q-40 30 -100 0 q-30 -20 -10 -50 z",fill:inkF,stroke:inkL,"stroke-width":1.2}));
  // teeth
  for (let i = 0; i < 7; i++) {
    const x = 70 + i * 12;
    svg.appendChild(el("path",{d:`M${x} 145 l4 8 l4 -8 z`,fill:"#ebd9af",stroke:inkL,"stroke-width":0.6}));
  }
  // eye (large, white)
  svg.appendChild(el("circle",{cx:130,cy:120,r:8,fill:"#ebd9af",stroke:inkL}));
  svg.appendChild(el("circle",{cx:132,cy:120,r:3,fill:inkL}));
  // angler lure
  svg.appendChild(el("path",{d:"M150 100 q20 -30 40 -25",fill:"none",stroke:inkL,"stroke-width":1}));
  svg.appendChild(el("circle",{cx:190,cy:75,r:6,fill:"#caa84a",opacity:0.8}));
  svg.appendChild(el("circle",{cx:190,cy:75,r:12,fill:"#caa84a",opacity:0.18}));
  // tail
  svg.appendChild(el("path",{d:"M40 130 l-20 -20 l5 30 l-5 30 z",fill:inkF,stroke:inkL}));
  // small fins
  svg.appendChild(el("path",{d:"M100 90 q-4 -20 4 -20 l4 16 z",fill:inkF,stroke:inkL}));
  return svg;
}

function drawReptile(r) {
  const svg = newSvg();
  const inkL = "#1b1410", inkF = pick(["#3a4a2a","#5a4a3a","#4a3a2a","#5a5a3a"], r);
  // body undulating
  svg.appendChild(el("path",{d:"M30 140 q40 -30 80 -20 q40 10 80 -30 q-40 60 -80 50 q-40 -10 -80 30 z",fill:inkF,stroke:inkL,"stroke-width":1}));
  // legs
  for (const [x, y] of [[60, 138],[150, 122]]) {
    svg.appendChild(el("path",{d:`M${x} ${y} l-12 24 m12 -24 l-4 28`,fill:"none",stroke:inkL,"stroke-width":1.4}));
    svg.appendChild(el("path",{d:`M${x+10} ${y-8} l14 22 m-14 -22 l8 26`,fill:"none",stroke:inkL,"stroke-width":1.4}));
  }
  // head
  svg.appendChild(el("path",{d:"M180 100 l30 -10 l-12 22 z",fill:inkF,stroke:inkL}));
  svg.appendChild(el("circle",{cx:200,cy:100,r:2,fill:inkL}));
  // scale pattern
  for (let i = 0; i < 30; i++) {
    svg.appendChild(el("circle",{cx:50 + r()*150, cy:90 + r()*60, r:1+r()*1.5, fill:inkL, opacity:0.4}));
  }
  return svg;
}

const DRAWERS = { beetle:drawBeetle, fish:drawFish, bird:drawBird, moth:drawMoth, deep:drawDeep, reptile:drawReptile };

const TAXA = {
  beetle:  ["Arthropoda","Insecta","Coleoptera"],
  fish:    ["Chordata","Actinopterygii","Cypriniformes"],
  bird:    ["Chordata","Aves","Passeriformes"],
  moth:    ["Arthropoda","Insecta","Lepidoptera"],
  deep:    ["Chordata","Actinopterygii","Lophiiformes"],
  reptile: ["Chordata","Reptilia","Squamata"],
};
const FAMILIES = ["Lyronychidae","Crepuscularidae","Pterygostomidae","Veredictidae","Hesperiidae","Patavinidae","Glaucidae","Stridulidae"];

function entry() {
  const seed = Math.floor(Math.random() * 1e9);
  const r = rng(seed);
  const types = Object.keys(DRAWERS);
  const type = pick(types, r);
  const binom = makeBinomial(r);
  const common = pick(COMMONS[type], r);
  const taxa = TAXA[type];
  const family = pick(FAMILIES, r);
  const habitat = expand(pick(HABITATS, r), r);
  const habits = pick(HABITS, r);
  const diet = pick(DIETS, r);
  const note = pick(NOTES, r);
  const sz = pick(["6–9 mm","12–16 cm","wingspan 38–46 mm","standard length 7–11 cm","total length up to 70 cm","body length 22–28 mm"], r);
  const status = pick(["Vulnerable","Insufficiently known","Locally common","Of restricted range","Of conservation concern","Probably extinct"], r);

  const svg = DRAWERS[type](rng(seed + 1));
  const page = document.getElementById("page");
  page.innerHTML = "";
  page.insertAdjacentHTML("beforeend", `
    <h2 class="common">${common}</h2>
    <div class="latin">${binom}</div>
    <div class="grid">
      <div>
        <div class="figure" id="fig"></div>
        <div class="figcap">Plate ${20 + Math.floor(r()*200)}. After a specimen in the collection of ${pick(["Leiden","Tring","Berlin","Coimbra","St. Andrews"], r)}.</div>
        <dl class="taxon">
          <dt>Phylum</dt><dd>${taxa[0]}</dd>
          <dt>Class</dt><dd>${taxa[1]}</dd>
          <dt>Order</dt><dd>${taxa[2]}</dd>
          <dt>Family</dt><dd>${family}</dd>
          <dt>Size</dt><dd>${sz}</dd>
          <dt>Status</dt><dd>${status}</dd>
        </dl>
      </div>
      <div class="text">
        <h3>Description</h3>
        <p>A ${type === "deep" ? "small bathypelagic" : type === "moth" ? "modest, mostly nocturnal" : "compact"} ${type === "bird" ? "passerine" : type === "fish" ? "freshwater fish" : type === "moth" ? "lepidopteran" : type === "deep" ? "anglerfish" : type === "reptile" ? "lizard" : "beetle"} of unmistakable
          appearance. ${pick(["The dorsal pattern recalls weather-eaten copper.","The carapace, when dry, makes a faint papery sound.","Coloration ranges from grey to a pale umber.","The fringe of the wings is unusually long for the family.","The young differ from adults in nearly every respect."], r)}</p>
        <h3>Habitat</h3>
        <p>Restricted to ${habitat}. ${pick(["Recorded between October and March only.","Active throughout the year, but elusive.","Tolerates a wide range of salinity.","Prefers shaded ground litter."], r)}</p>
        <h3>Habits &amp; diet</h3>
        <p>${habits} ${diet}</p>
        <h3>Notes</h3>
        <p>${note}</p>
      </div>
    </div>
    <div class="footer">
      <span>Codex Generalis · entry ${1900 + Math.floor(r()*900)}</span>
      <span>${pick(["recorded by H. Daniels","ill. by E. Voss","collected by S. Ibarra","ed. M. Aalto"], r)}</span>
    </div>
  `);
  document.getElementById("fig").appendChild(svg);
}

document.getElementById("next").addEventListener("click", entry);
entry();
</script>
</body>
</html>
