<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BNA Exact-Date Search Links</title>
<style>
  :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;background:#f6f8fb;color:#0b1724}
  *{box-sizing:border-box}
  body{margin:0;padding:20px}
  .wrap{max-width:980px;margin:0 auto}
  header{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px}
  h1{margin:0;font-size:20px}
  label{font-weight:700}
  .controls{display:flex;gap:8px;align-items:center;margin-top:8px;width:100%}
  input[type=date]{padding:8px;border-radius:8px;border:1px solid #d7def0;background:#fff}
  button{padding:9px 12px;border-radius:8px;border:0;background:#0066ff;color:#fff;cursor:pointer;font-weight:700}
  .actions{margin-left:auto;display:flex;gap:8px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
  .card{background:#fff;padding:12px;border-radius:10px;border:1px solid #e6eefc;min-height:120px;display:flex;flex-direction:column;justify-content:space-between}
  .card h2{margin:0;font-size:14px;color:#214f9f}
  .date{font-size:13px;color:#516074;margin-top:6px}
  .links{display:flex;gap:8px;align-items:center;margin-top:10px}
  a.link{padding:8px 10px;border-radius:8px;background:#eef6ff;border:1px solid #d8eaff;color:#0546a6;text-decoration:none;font-weight:700}
  button.small{padding:7px 9px;border-radius:8px;background:#0b63ff;color:#fff;border:0;cursor:pointer;font-weight:700}
  .smalltxt{font-size:13px;color:#6b7785;margin-top:6px}
  @media (max-width:860px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>British Newspaper Archive — Exact-Date Search Links</h1>
      <div class="smalltxt">Generate searches for exact historic dates at selected year offsets.</div>
    </div>

    <div class="controls" style="width:100%">
      <label for="date">Input date</label>
      <input id="date" type="date" value="2026-02-22" />
      <button id="gen">Generate</button>

      <div class="actions">
        <button id="openAll">Open all</button>
        <button id="copyAll">Copy all URLs</button>
      </div>
    </div>
  </header>

  <main>
    <div class="grid" id="grid">
      <div class="card" data-offset="50">
        <div>
          <h2>50 years earlier</h2>
          <div class="date" id="date-50">—</div>
        </div>
        <div class="links">
          <a id="link-50" class="link" href="#" target="_blank" rel="noopener noreferrer">Open search</a>
          <button class="small" data-copy="50">Copy</button>
        </div>
      </div>

      <div class="card" data-offset="100">
        <div>
          <h2>100 years earlier</h2>
          <div class="date" id="date-100">—</div>
        </div>
        <div class="links">
          <a id="link-100" class="link" href="#" target="_blank" rel="noopener noreferrer">Open search</a>
          <button class="small" data-copy="100">Copy</button>
        </div>
      </div>

      <div class="card" data-offset="200">
        <div>
          <h2>200 years earlier</h2>
          <div class="date" id="date-200">—</div>
        </div>
        <div class="links">
          <a id="link-200" class="link" href="#" target="_blank" rel="noopener noreferrer">Open search</a>
          <button class="small" data-copy="200">Copy</button>
        </div>
      </div>

      <div class="card" data-offset="250">
        <div>
          <h2>250 years earlier</h2>
          <div class="date" id="date-250">—</div>
        </div>
        <div class="links">
          <a id="link-250" class="link" href="#" target="_blank" rel="noopener noreferrer">Open search</a>
          <button class="small" data-copy="250">Copy</button>
        </div>
      </div>

      <div class="card" data-offset="300">
        <div>
          <h2>300 years earlier</h2>
          <div class="date" id="date-300">—</div>
        </div>
        <div class="links">
          <a id="link-300" class="link" href="#" target="_blank" rel="noopener noreferrer">Open search</a>
          <button class="small" data-copy="300">Copy</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  function pad(n){ return String(n).padStart(2,'0'); }
  function fmtIso(d){ return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
  function subtractYears(date, years){
    var y = date.getFullYear() - years;
    var m = date.getMonth();
    var out = new Date(date);
    out.setFullYear(y);
    if (out.getMonth() !== m){
      out = new Date(y, m+1, 0);
    }
    out.setHours(0,0,0,0);
    return out;
  }
  function buildUrlForDate(d){
    var s = fmtIso(d);
    return 'https://www.britishnewspaperarchive.co.uk/search/results/' + s + '/' + s + '?retrievecountrycounts=false&sortorder=score';
  }

  var offsets = [50,100,200,250,300];

  function setCard(offset, dateObj, url){
    var id = String(offset);
    var dateEl = document.getElementById('date-' + id);
    var linkEl = document.getElementById('link-' + id);
    dateEl.textContent = fmtIso(dateObj);
    linkEl.href = url;
  }

  function generate(){
    var input = document.getElementById('date').value;
    if (!input) { alert('Select a date'); return; }
    var base = new Date(input + 'T00:00:00');
    if (isNaN(base.getTime())) { alert('Invalid date'); return; }
    offsets.forEach(function(off){
      var target = subtractYears(base, off);
      var url = buildUrlForDate(target);
      setCard(off, target, url);
    });
  }

  function copyText(text){
    if (!navigator.clipboard){
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(e){}
      document.body.removeChild(ta);
      return;
    }
    navigator.clipboard.writeText(text).catch(function(){});
  }

  document.getElementById('gen').addEventListener('click', generate);
  window.addEventListener('load', generate);

  document.querySelectorAll('button[data-copy]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var off = btn.getAttribute('data-copy');
      var url = document.getElementById('link-' + off).href;
      copyText(url);
      var orig = btn.textContent;
      btn.textContent = 'Copied';
      setTimeout(function(){ btn.textContent = orig; }, 1200);
    });
  });

  document.getElementById('openAll').addEventListener('click', function(){
    offsets.forEach(function(off){
      var u = document.getElementById('link-' + off).href;
      if (u && u !== '#') window.open(u, '_blank');
    });
  });

  document.getElementById('copyAll').addEventListener('click', function(){
    var lines = offsets.map(function(off){
      return off + ' years: ' + document.getElementById('link-' + off).href;
    }).join('\n');
    copyText(lines);
    var btn = this;
    var orig = btn.textContent;
    btn.textContent = 'Copied';
    setTimeout(function(){ btn.textContent = orig; }, 1200);
  });

  document.getElementById('date').addEventListener('keydown', function(e){
    if (e.key === 'Enter') generate();
  });
})();
</script>
</body>
</html>
