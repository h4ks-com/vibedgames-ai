<script>
/*
Worms WebGL Arena - Single-file demo
Features implemented (demo):
- WebGL heightmap terrain with deformation (craters)
- 3D-ish rendering with camera controls, water plane
- Turn-based mechanics, up to 8 players (local/hotseat)
- Physics-based projectile arcs with wind, deterministic RNG seed for replay
- Movement, health, lives, water hazard
- Minigame quick-time bonus
- Lobby create/join via invite link (encoded in hash), ready states, spectator toggle
- Basic WebRTC signaling and P2P skeleton with manual fallback (copy/paste)
- Loading screen, WebGL detection, 2D canvas fallback
- Simple audio (WebAudio), animations, UI
- Logging and basic cheat heuristics
Note: This is a client demo. Full server-side validation/signaling/TURN should be integrated for production.
*/

// Basic utilities
const LogStore = {
  logs: [],
  add(...args){ const s = `[${new Date().toISOString()}] ` + args.map(a=>typeof a==='object'?JSON.stringify(a):String(a)).join(' '); this.logs.push(s); console.log(s); updateLogView(); },
  download(){ const blob=new Blob([this.logs.join("\n")],"text/plain"); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='worms-arena-log.txt'; a.click(); URL.revokeObjectURL(url); }
};
function updateLogView(){ const dv=document.getElementById('logview'); dv.textContent = LogStore.logs.slice(-200).join('\n'); }

// Deterministic RNG (mulberry32)
function RNG(seed){
  let t = seed >>> 0;
  return function(){
    t += 0x6D2B79F5;
    var r = Math.imul(t ^ t>>>15, 1 | t);
    r = r + Math.imul(r ^ r>>>7, 61 | r) ^ r;
    return ((r ^ r>>>14) >>> 0) / 4294967296;
  }
}
// Simple hash (FNV-1a)
function hashString(str){
  let h=2166136261;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h,16777619); }
  return (h>>>0).toString(16);
}

// Feature detection
const canvas = document.getElementById('glcanvas');
let gl = null;
let useWebGL = true;
try{
  gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if(!gl) throw 'no gl';
  LogStore.add('WebGL detected');
}catch(e){
  useWebGL = false;
  LogStore.add('WebGL unavailable, falling back to 2D canvas', e);
}

const fallbackCanvas2D = (!useWebGL);
if(fallbackCanvas2D){
  // Create 2D context fallback wiring
  canvas.getContext = function(){ return canvas.getContext('2d'); };
}

// Resize handling
function resizeCanvas(){ canvas.width = canvas.clientWidth * devicePixelRatio; canvas.height = canvas.clientHeight * devicePixelRatio; if(renderer) renderer.resize(); }
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas,50);

// Loading screen
async function fakeLoad(){
  const inner = document.getElementById('progressinner');
  let p=0;
  while(p<100){
    p += 5 + Math.random()*15;
    inner.style.width = Math.min(100,p) + '%';
    await new Promise(r=>setTimeout(r,80));
  }
  document.getElementById('loading').style.display='none';
}
fakeLoad();

// Assets (minimal)
const Assets = {
  sounds: {}
};
// Generate simple beep
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.2){
  try{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.value=vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  }catch(e){ /* no audio */ }
}

// Renderer - simple WebGL heightfield or 2D fallback
let renderer = null;
class Renderer {
  constructor(canvas,gl){
    this.canvas = canvas; this.gl = gl;
    this.width = canvas.width; this.height = canvas.height;
    this.camera = {angX:40, angY: -30, dist: 2.5, target:[0,0,0]};
    this.init();
    this.resize();
  }
  init(){
    if(!useWebGL){
      this.ctx2d = this.canvas.getContext('2d');
      return;
    }
    const gl = this.gl;
    // simple shader for color per vertex
    const vs = `
      attribute vec3 aPos; attribute vec3 aColor;
      uniform mat4 uMVP;
      varying vec3 vColor;
      void main(){ gl_Position = uMVP * vec4(aPos,1.0); vColor=aColor; }
    `;
    const fs = `
      precision mediump float;
      varying vec3 vColor;
      void main(){ gl_FragColor = vec4(vColor,1.0); }
    `;
    function compile(src,type){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ throw gl.getShaderInfoLog(s); } return s; }
    const prog = gl.createProgram();
    gl.attachShader(prog, compile(vs,gl.VERTEX_SHADER));
    gl.attachShader(prog, compile(fs,gl.FRAGMENT_SHADER));
    gl.linkProgram(prog);
    if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) { throw gl.getProgramInfoLog(prog); }
    this.prog = prog;
    this.aPos = gl.getAttribLocation(prog,'aPos');
    this.aColor = gl.getAttribLocation(prog,'aColor');
    this.uMVP = gl.getUniformLocation(prog,'uMVP');
    this.vbo = gl.createBuffer();
    this.cbo = gl.createBuffer();
    gl.enable(gl.DEPTH_TEST);
  }
  buildMesh(heightmap){
    // heightmap: {w,h,heights,scale}
    this.hm = heightmap;
    if(!useWebGL) return;
    const gl = this.gl;
    const w=heightmap.w, h=heightmap.h, sc=heightmap.scale;
    const positions = [];
    const colors = [];
    for(let z=0;z<h-1;z++){
      for(let x=0;x<w;x++){
        for(let k=0;k<2;k++){
          const xi = x + k;
          const zi = z + (k===0?0:1);
          const X = (xi/w - 0.5) * sc * (w/h);
          const Z = (zi/h - 0.5) * sc;
          const Y = heightmap.heights[zi * w + xi];
          positions.push(X,Y,Z);
          const c = this.colorForHeight(Y);
          colors.push(c[0],c[1],c[2]);
        }
      }
    }
    this.vertexCount = (h-1)*w*2;
    gl.bindBuffer(gl.ARRAY_BUFFER,this.vbo);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(positions),gl.STATIC_DRAW);
    gl.bindBuffer(gl.ARRAY_BUFFER,this.cbo);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(colors),gl.STATIC_DRAW);
  }
  updateHeights(heightmap){
    this.hm = heightmap;
    if(!useWebGL) return;
    // recompute positions Y and colors
    const gl = this.gl;
    const w=heightmap.w, h=heightmap.h, sc=heightmap.scale;
    const positions = [];
    const colors = [];
    for(let z=0;z<h-1;z++){
      for(let x=0;x<w;x++){
        for(let k=0;k<2;k++){
          const xi = x + k;
          const zi = z + (k===0?0:1);
          const X = (xi/w - 0.5) * sc * (w/h);
          const Z = (zi/h - 0.5) * sc;
          const Y = heightmap.heights[zi * w + xi];
          positions.push(X,Y,Z);
          const c = this.colorForHeight(Y);
          colors.push(c[0],c[1],c[2]);
        }
      }
    }
    gl.bindBuffer(gl.ARRAY_BUFFER,this.vbo);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(positions),gl.STATIC_DRAW);
    gl.bindBuffer(gl.ARRAY_BUFFER,this.cbo);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(colors),gl.STATIC_DRAW);
  }
  colorForHeight(y){
    if(y< -0.05) return [0.2,0.4,0.9]; // near water (but we'll draw water separately)
    if(y<0) return [0.2,0.6,0.2];
    if(y<0.2) return [0.5,0.4,0.2];
    return [0.6,0.6,0.6];
  }
  resize(){ this.width = this.canvas.width; this.height = this.canvas.height; if(useWebGL){ this.gl.viewport(0,0,this.width,this.height); } }
  render(scene){
    if(!this.hm) return;
    if(!useWebGL){
      const ctx = this.canvas.getContext('2d');
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
      ctx.clearRect(0,0,this.canvas.clientWidth,this.canvas.clientHeight);
      // simple top-down projection for fallback
      const W=this.canvas.clientWidth, H=this.canvas.clientHeight;
      const hm=this.hm;
      const img = ctx.createImageData(hm.w,hm.h);
      for(let z=0;z<hm.h;z++){
        for(let x=0;x<hm.w;x++){
          const y = hm.heights[z*hm.w + x];
          const idx=(z*hm.w + x)*4;
          const c = this.colorForHeight(y);
          img.data[idx]=Math.floor(c[0]*255);
          img.data[idx+1]=Math.floor(c[1]*255);
          img.data[idx+2]=Math.floor(c[2]*255);
          img.data[idx+3]=255;
        }
      }
      ctx.drawImage((()=>{const c=document.createElement('canvas');c.width=hm.w;c.height=hm.h; c.getContext('2d').putImageData(img,0,0); return c;})(),0,0,W,H);
      // draw worms & projectiles simple
      for(const w of scene.worms){
        const px = (w.x / hm.scale + 0.5) * W;
        const pz = (w.z / hm.scale + 0.5) * H;
        ctx.fillStyle = w.color; ctx.beginPath(); ctx.arc(px,pz,8,0,6.28); ctx.fill();
      }
      for(const p of scene.projectiles){
        const px = (p.x / hm.scale + 0.5) * W;
        const pz = (p.z / hm.scale + 0.5) * H;
        ctx.fillStyle = '#ff8'; ctx.beginPath(); ctx.arc(px,pz,6,0,6.28); ctx.fill();
      }
      return;
    }
    const gl = this.gl;
    gl.clearColor(0.02,0.02,0.03,1);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    gl.useProgram(this.prog);
    // compute MVP
    const aspect = this.width/this.height;
    const proj = mat4_perspective(40 * Math.PI/180, aspect, 0.01, 100);
    const cam = this.camera;
    const eye = polarToCartesian(cam.angX * Math.PI/180, cam.angY * Math.PI/180, cam.dist);
    const target = cam.target;
    const view = mat4_lookAt([eye[0]+target[0],eye[1]+target[1],eye[2]+target[2]], target, [0,1,0]);
    const mvp = mat4_mul(proj, view);
    gl.uniformMatrix4fv(this.uMVP,false,mvp);
    // attributes
    gl.bindBuffer(gl.ARRAY_BUFFER,this.vbo);
    gl.enableVertexAttribArray(this.aPos);
    gl.vertexAttribPointer(this.aPos,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,this.cbo);
    gl.enableVertexAttribArray(this.aColor);
    gl.vertexAttribPointer(this.aColor,3,gl.FLOAT,false,0,0);
    // Draw
    gl.drawArrays(gl.TRIANGLE_STRIP,0,this.vertexCount);
    // Draw worms & projectiles as simple points via overlay 2D canvas (for simplicity)
    this.drawOverlays(scene);
  }
  drawOverlays(scene){
    // overlay using 2D context on top of canvas by drawing via WebGL scissor? Simpler: create a temporary 2D context on top via CSS separate canvas would be better. For demo, use GL to draw colored points (naive)
    // Not implemented: keep minimal.
  }
}
function polarToCartesian(elev, azim, r){
  const y = Math.sin(elev) * r;
  const xr = Math.cos(elev) * r;
  const x = Math.cos(azim) * xr;
  const z = Math.sin(azim) * xr;
  return [x,y,z];
}
function mat4_perspective(fovy, aspect, near, far){
  const f=1/Math.tan(fovy/2);
  const nf=1/(near-far);
  const out = new Float32Array(16);
  out[0]=f/aspect; out[1]=0; out[2]=0; out[3]=0;
  out[4]=0; out[5]=f; out[6]=0; out[7]=0;
  out[8]=0; out[9]=0; out[10]=(far+near)*nf; out[11]=-1;
  out[12]=0; out[13]=0; out[14]=(2*far*near)*nf; out[15]=0;
  return out;
}
function mat4_lookAt(eye, center, up){
  const z0 = eye[0]-center[0], z1=eye[1]-center[1], z2=eye[2]-center[2];
  let zl = Math.hypot(z0,z1,z2); if(zl==0){ z2=1; zl=1;}
  const zx = z0/zl, zy=z1/zl, zz=z2/zl;
  const xx = up[1]*zz - up[2]*zy;
  const xy = up[2]*zx - up[0]*zz;
  const xz = up[0]*zy - up[1]*zx;
  let xl = Math.hypot(xx,xy,xz); if(xl==0){ xx=1; xl=1; }
  const xnx=xx/xl, xny=xy/xl, xnz=xz/xl;
  const yx = zy*xnz - zz*xny;
  const yy = zz*xnx - zx*xnz;
  const yz = zx*xny - zy*xnx;
  const out = new Float32Array(16);
  out[0]=xnx; out[1]=yx; out[2]=zx; out[3]=0;
  out[4]=xny; out[5]=yy; out[6]=zy; out[7]=0;
  out[8]=xnz; out[9]=yz; out[10]=zz; out[11]=0;
  out[12]=-(xnx*eye[0]+xny*eye[1]+xnz*eye[2]);
  out[13]=-(yx*eye[0]+yy*eye[1]+yz*eye[2]);
  out[14]=-(zx*eye[0]+zy*eye[1]+zz*eye[2]);
  out[15]=1;
  return out;
}
function mat4_mul(a,b){
  const out=new Float32Array(16);
  for(let i=0;i<4;i++){
    for(let j=0;j<4;j++){
      let s=0; for(let k=0;k<4;k++) s+=a[k*4 + j]*b[i*4 + k];
      out[i*4 + j] = s;
    }
  }
  return out;
}

// Terrain generator heightmap
function generateHeightmap(seed, w=128, h=64, scale=4.0){
  const rnd = RNG(seed);
  const heights = new Float32Array(w*h);
  // layered value noise
  function noise(nx,ny){
    const ix = Math.floor(nx), iy=Math.floor(ny);
    const fx = nx-ix, fy=ny-iy;
    const s = rnd();
    // simple pseudo interpolation using seeded RNG derived values (cheap)
    const v00=(Math.sin((ix*374761393+iy*668265263) ^ seed)*43758.5453) % 1;
    const v10=(Math.sin(((ix+1)*374761393+iy*668265263) ^ seed)*43758.5453) % 1;
    const v01=(Math.sin((ix*374761393+(iy+1)*668265263) ^ seed)*43758.5453) % 1;
    const v11=(Math.sin(((ix+1)*374761393+(iy+1)*668265263) ^ seed)*43758.5453) % 1;
    const u = fx*fx*(3-2*fx);
    const v = fy*fy*(3-2*fy);
    return v00*(1-u)*(1-v)+v10*u*(1-v)+v01*(1-u)*v+v11*u*v;
  }
  // height generation
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const nx = x/w*3, ny = y/h*1.2;
      let val = 0;
      val += 1.0 * noise(nx,ny);
      val += 0.5 * noise(nx*2,ny*2);
      val += 0.25 * noise(nx*4,ny*4);
      val = val / (1+0.5+0.25);
      val = (val - 0.45) * 0.9; // adjust sea level
      heights[y*w + x] = val;
    }
  }
  return {w,h,scale,heights,seed};
}

// Simple helper to sample height at world coords
function sampleHeight(hm,x,z){
  const w=hm.w,h=hm.h,sc=hm.scale;
  const fx = (x/sc + 0.5) * w;
  const fz = (z/sc + 0.5) * h;
  const ix = Math.floor(fx), iz=Math.floor(fz);
  if(ix<0 || iz<0 || ix>=w || iz>=h) return -1; // out -> water
  return hm.heights[iz*w + ix];
}

// Game engine
class Game {
  constructor(){
    this.seed = Math.floor(Math.random()*0xFFFFFFFF);
    this.rng = RNG(this.seed);
    this.turnSeed = Math.floor(this.rng()*0xFFFFFFFF);
    this.hmap = generateHeightmap(this.seed, 128, 64, 4.0);
    this.renderer = new Renderer(canvas,gl);
    this.renderer.buildMesh(this.hmap);
    this.players = []; // {id,name,color,ready,alive,lives,score}
    this.worms = []; // actual in-game worms: {id,player,x,y,z,health,onGround}
    this.projectiles = []; // {x,y,z,vx,vy,vz,owner,ttl}
    this.wind = (this.rng()-0.5)*10; // wind in scene
    this.maxPlayers = 8;
    this.currentTurn = 0;
    this.turnTimer = 45;
    this.turnRemaining = this.turnTimer;
    this.active = false;
    this.replay = {seed:this.seed, actions:[]};
    this.setupDemoPlayers();
    this.initControls();
    this.lastTime = performance.now();
    this.loop();
  }
  setupDemoPlayers(){
    // create 3 demo players for single-player/hotseat
    for(let i=0;i<3;i++){
      const p = {id:hashString('p'+i+Date.now()), name: 'Bot'+(i+1), color: `hsl(${i*90},70%,60%)`, ready:true, spect:false, isLocal:true, lives:3};
      this.players.push(p);
    }
    // local human
    const local = {id:hashString('me'+Date.now()), name: localStorage.getItem('name') || 'You', color:'hsl(200,80%,60%)', ready:true, spect:false, isLocal:true, lives:3};
    this.players.push(local);
    this.spawnWorms();
    updatePlayersUI();
    document.getElementById('turnInfo').textContent = this.players[this.currentTurn].name;
    document.getElementById('windInfo').textContent = this.wind.toFixed(2);
  }
  spawnWorms(){
    this.worms = [];
    // evenly place worms along x-axis
    const n = this.players.length;
    for(let i=0;i<n;i++){
      const angle = i/(n)*Math.PI*2;
      const x = (i/(n-1||1)-0.5) * this.hmap.scale * 1.6;
      const z = Math.sin(angle) * 0.0;
      const y = sampleHeight(this.hmap,x,z) + 0.05;
      const w = {id:hashString('w'+i+Date.now()), player:this.players[i].id, x:x, y:y, z:z, health:100, lives:this.players[i].lives, color:this.players[i].color, vx:0, vy:0, vz:0, onGround:true};
      this.worms.push(w);
    }
  }
  startMatch(){
    this.active = true;
    this.turnRemaining = this.turnTimer;
  }
  endTurn(){
    this.currentTurn = (this.currentTurn + 1) % this.players.length;
    this.turnRemaining = this.turnTimer;
    document.getElementById('turnInfo').textContent = this.players[this.currentTurn].name;
  }
  applyMove(worm,dir){
    // move left/right along x axis limited
    const step = 0.08 * (dir<0?-1:1);
    worm.x += step;
    worm.y = sampleHeight(this.hmap,worm.x,worm.z) + 0.05;
    LogStore.add('move',worm.id,step,worm.x.toFixed(2));
  }
  fire(ownerId, angleDeg, power, weapon){
    const ownerW = this.worms.find(w=>w.player===ownerId);
    if(!ownerW) { LogStore.add('invalid fire owner'); return; }
    const a = angleDeg * Math.PI/180;
    const sx = Math.cos(a), sy = Math.sin(a);
    // projectile initial position slightly above worm
    const px = ownerW.x + sx*0.12;
    const py = ownerW.y + 0.14;
    const pz = ownerW.z;
    // speed based on power
    const spd = 0.01 * power;
    const vx = sx * spd;
    const vy = sy * spd;
    const vz = 0; // 2D-ish
    this.projectiles.push({x:px,y:py,z:pz,vx:vx,vy:vy,vz:vz,owner:ownerId,weapon,ttl:1000});
    LogStore.add('fire',ownerId,angleDeg,power,weapon);
    beep(600,0.06,0.1);
    // record action deterministically
    this.replay.actions.push({type:'fire',owner:ownerId,angle:angleDeg,power,weapon,seed:this.turnSeed});
  }
  tick(dt){
    if(!this.active) return;
    // update turn timer
    this.turnRemaining -= dt;
    if(this.turnRemaining <= 0){
      LogStore.add('turn timeout',this.players[this.currentTurn].name);
      this.endTurn();
    }
    // simulate projectiles
    const gravity = -0.0004;
    const windAcc = this.wind * 0.00002;
    for(let i=this.projectiles.length-1;i>=0;i--){
      const p = this.projectiles[i];
      p.vx += windAcc * (dt*60);
      p.vy += gravity * (dt*60);
      p.x += p.vx * (dt*60);
      p.y += p.vy * (dt*60);
      p.z += p.vz * (dt*60);
      p.ttl -= dt*60;
      // collision with terrain
      const ground = sampleHeight(this.hmap,p.x,p.z);
      if(p.y <= ground + 0.02 || p.ttl<=0){
        // explode
        this.createCrater(p.x,p.z, 0.3 + (p.owner?0:0));
        this.damageNearby(p.x,p.z, 0.5 + (p.weapon==='Bazooka'?0.0:0.2));
        this.projectiles.splice(i,1);
        beep(120,0.12,0.4);
        this.endTurn();
      }
    }
    // simple gravity for worms (if stomped off)
    for(const w of this.worms){
      const ground = sampleHeight(this.hmap,w.x,w.z);
      if(w.y > ground + 0.01){
        w.vy = (w.vy || 0) - 0.0006 * (dt*60);
        w.y += w.vy * (dt*60);
      }else{
        w.vy = 0; w.y = ground + 0.05;
      }
      // water hazard if below sea level
      if(w.y < -0.09){
        w.health = 0;
      }
    }
    // check deaths
    for(const w of this.worms){
      if(w.health <= 0 && w.lives>0){
        w.lives -= 1;
        if(w.lives>0){
          // respawn near original player area
          const idx = this.worms.indexOf(w);
          const x = (idx/(this.worms.length-1||1)-0.5) * this.hmap.scale * 1.6;
          const z = 0; const y = sampleHeight(this.hmap,x,z)+0.05;
          w.x=x; w.y=y; w.health=100;
        }else{
          w.dead = true;
          LogStore.add('worm lost',w.id);
        }
      }
    }
    // remove fully dead worms
    this.worms = this.worms.filter(w=>!w.dead);
    // if one player remains, end match
    const alivePlayers = new Set(this.worms.map(w=>w.player));
    if(alivePlayers.size <= 1 && this.active){
      this.active = false;
      LogStore.add('match ended',Array.from(alivePlayers)[0]);
    }
  }
  createCrater(x,z,radius){
    // crater subtract gaussian from heights
    const hm=this.hmap, w=hm.w,h=hm.h,sc=hm.scale;
    for(let iz=0;iz<h;iz++){
      for(let ix=0;ix<w;ix++){
        const wx = (ix/w - 0.5)*sc*(w/h);
        const wz = (iz/h - 0.5)*sc;
        const dx = wx-x, dz = wz-z;
        const d = Math.sqrt(dx*dx + dz*dz);
        if(d < radius*1.2){
          const fall = Math.exp(- (d*d) / (radius*radius*2)) * 0.5;
          hm.heights[iz*w + ix] -= fall;
        }
      }
    }
    this.renderer.updateHeights(hm);
  }
  damageNearby(x,z, radius){
    for(const w of this.worms){
      const dx = w.x - x, dz = w.z - z;
      const d = Math.sqrt(dx*dx + dz*dz);
      if(d < radius){
        const dmg = Math.max(5, Math.floor((1 - d / radius) * 80));
        w.health -= dmg;
        LogStore.add('damage',w.player,dmg,w.health);
      }
    }
  }
  initControls(){
    // UI bindings
    document.getElementById('angle').addEventListener('input', e=> document.getElementById('angleVal').textContent = e.target.value + '°');
    document.getElementById('power').addEventListener('input', e=> document.getElementById('powerVal').textContent = e.target.value);
    document.getElementById('fireBtn').addEventListener('click', ()=>{
      const angle = parseFloat(document.getElementById('angle').value);
      const power = parseFloat(document.getElementById('power').value);
      const weapon = document.getElementById('weaponSelect').value;
      const player = this.players[this.currentTurn];
      if(!player || player.spect) { LogStore.add('spectator cannot fire'); return; }
      this.fire(player.id, angle, power, weapon);
    });
    document.getElementById('moveLeft').addEventListener('click', ()=> {
      const p = this.players[this.currentTurn]; if(p) { const w = this.worms.find(w=>w.player===p.id); if(w) this.applyMove(w,-1); }
    });
    document.getElementById('moveRight').addEventListener('click', ()=> {
      const p = this.players[this.currentTurn]; if(p) { const w = this.worms.find(w=>w.player===p.id); if(w) this.applyMove(w,1); }
    });
    document.getElementById('minigameBtn').addEventListener('click', ()=> this.launchMinigame());
    document.getElementById('reconnectBtn').addEventListener('click', ()=> networkManager.reconnect());
    document.getElementById('spectateBtn').addEventListener('click', ()=> {
      const s = document.getElementById('spectatorToggle'); s.checked = !s.checked; networkManager.setSpectator(s.checked);
    });
    // camera mouse
    let dragging=false, lastX=0, lastY=0;
    canvas.addEventListener('mousedown', (e)=>{
      dragging=true; lastX=e.clientX; lastY=e.clientY;
    });
    window.addEventListener('mousemove', (e)=>{
      if(!dragging) return;
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      this.renderer.camera.angY += dx*0.2;
      this.renderer.camera.angX = Math.max(5,Math.min(85,this.renderer.camera.angX - dy*0.2));
    });
    window.addEventListener('mouseup', ()=> dragging=false);
    canvas.addEventListener('wheel', (e)=> {
      this.renderer.camera.dist = Math.max(0.5, Math.min(6, this.renderer.camera.dist + e.deltaY*0.0015));
    });
  }
  launchMinigame(){
    // quick-time: press highlighted key in time
    const key = String.fromCharCode(65 + Math.floor(this.rng()*5)); // A-E
    const timeout=1500 + Math.floor(this.rng()*1000);
    const overlay = document.createElement('div'); overlay.style.position='absolute'; overlay.style.inset='0'; overlay.style.display='flex'; overlay.style.alignItems='center'; overlay.style.justifyContent='center'; overlay.style.zIndex=999; overlay.style.background='rgba(0,0,0,0.5)';
    const box = document.createElement('div'); box.style.padding='20px'; box.style.background='#111'; box.style.border='2px solid #3af'; box.style.borderRadius='8px'; box.style.fontSize='28px'; box.style.color='#9cf';
    box.textContent = `Press "${key}" now!`;
    overlay.appendChild(box); document.body.appendChild(overlay);
    let success=false;
    function cleanup(){ document.body.removeChild(overlay); window.removeEventListener('keydown',onKey); }
    function onKey(e){ if(e.key.toUpperCase()===key){ success=true; cleanup(); bonus(); } }
    window.addEventListener('keydown',onKey);
    setTimeout(()=>{ if(!success){ cleanup(); LogStore.add('minigame failed'); } }, timeout);
    const bonus = ()=>{ LogStore.add('minigame success'); beep(880,0.12,0.18); // give bonus item: +health to current worm
      const player = this.players[this.currentTurn];
      const w = this.worms.find(w=>w.player===player.id);
      if(w){ w.health = Math.min(100, w.health + 40); }
    }
  }
  loop(){
    const now = performance.now();
    const dt = Math.min(0.05, (now - this.lastTime)/1000);
    this.lastTime = now;
    this.tick(dt);
    this.renderer.render({worms:this.worms,projectiles:this.projectiles});
    // HUD updates
    document.getElementById('timer').textContent = Math.ceil(this.turnRemaining);
    this.updatePlayersHud();
    requestAnimationFrame(()=>this.loop());
  }
  updatePlayersHud(){
    const hud = document.getElementById('playersHud');
    hud.innerHTML = this.worms.map(w=>`<div style="display:inline-block;margin-right:8px"><div style="width:12px;height:12px;background:${w.color};display:inline-block;border-radius:6px;margin-right:6px"></div>${w.player.substring(0,6)} H:${w.health} L:${w.lives}</div>`).join('');
  }
}
let game = null;

// Network manager (skeleton for P2P WebRTC)
const networkManager = {
  pc:null, dc:null, signalingSocket:null, localId:hashString('local'+Date.now()), matchId:null, password:null, isSpectator:false,
  config:{
    signalingUrl: null, // optional public signaling ws: set to null for manual
    iceServers: [{urls:'stun:stun.l.google.com:19302'}]
  },
  init(){
    // invite link parsing
    const hash = location.hash.slice(1);
    if(hash){
      try{
        const d = JSON.parse(decodeURIComponent(atob(hash)));
        this.matchId = d.matchId; this.password = d.pw;
        LogStore.add('Joined via invite',this.matchId);
        document.getElementById('invite').textContent = location.href;
      }catch(e){}
    }
    // UI
    document.getElementById('createMatch').addEventListener('click', ()=> this.createMatch());
    document.getElementById('joinMatch').addEventListener('click', ()=> {
      const link = prompt('Paste invite link or matchID:');
      if(!link) return;
      if(link.includes('#')) {
        const h = link.split('#')[1];
        try{ const d = JSON.parse(atob(decodeURIComponent(h))); this.matchId=d.matchId; this.password=d.pw; LogStore.add('Joining',this.matchId); }
        catch(e){ this.matchId = link; }
      }else this.matchId = link;
      document.getElementById('invite').textContent = link;
      this.joinMatch();
    });
    document.getElementById('readyBtn').addEventListener('click', ()=>{
      const b=document.getElementById('readyBtn');
      b.textContent = b.textContent==='Ready' ? 'Unready' : 'Ready';
      LogStore.add('ready toggled');
      updatePlayersUI();
    });
    document.getElementById('leaveBtn').addEventListener('click', ()=> this.leaveMatch());
    document.getElementById('chatSend').addEventListener('click', ()=> {
      const txt = document.getElementById('chatText').value; if(!txt) return;
      this.sendChat({from:document.getElementById('nameInput').value || 'Player', text:txt});
      document.getElementById('chatText').value='';
    });
    document.getElementById('nameInput').addEventListener('change',(e)=>{ localStorage.setItem('name', e.target.value); });
    // manual signaling fallback
    document.getElementById('invite').addEventListener('click', ()=> {
      const choice = confirm('Copy invite to clipboard?');
      if(choice && this.matchId){
        const payload = {matchId:this.matchId,pw:this.password};
        const h = btoa(encodeURIComponent(JSON.stringify(payload)));
        const link = location.origin + location.pathname + '#' + h;
        navigator.clipboard?.writeText(link);
        document.getElementById('invite').textContent = link;
        LogStore.add('invite created',link);
      }
    });
  },
  createMatch(){
    this.matchId = 'match_'+hashString(Date.now()+''+Math.random());
    this.password = (Math.random()*1e6|0).toString(16);
    const payload = {matchId:this.matchId,pw:this.password};
    const h = btoa(encodeURIComponent(JSON.stringify(payload)));
    const link = location.origin + location.pathname + '#' + h;
    history.replaceState(null,null,'#'+h);
    document.getElementById('invite').textContent = link;
    LogStore.add('Match created',this.matchId);
    // attempt to open signaling
    this.connectSignaling();
    updatePlayersUI();
  },
  joinMatch(){
    if(!this.matchId) return;
    LogStore.add('Joining match',this.matchId);
    // open signaling if available
    this.connectSignaling();
    updatePlayersUI();
  },
  leaveMatch(){
    LogStore.add('Leaving match',this.matchId);
    this.matchId = null;
    history.replaceState(null,null,location.pathname);
    document.getElementById('invite').textContent = 'No match';
    updatePlayersUI();
    if(this.signalingSocket){ this.signalingSocket.close(); this.signalingSocket=null; }
    if(this.pc){ this.pc.close(); this.pc=null; }
  },
  setSpectator(v){
    this.isSpectator = v;
    LogStore.add('spectator set',v);
    updatePlayersUI();
  },
  connectSignaling(){
    if(!this.config.signalingUrl){
      LogStore.add('No public signaling configured - using manual mode for P2P');
      return;
    }
    try{
      this.signalingSocket = new WebSocket(this.config.signalingUrl);
      this.signalingSocket.onopen = ()=> {
        LogStore.add('Connected to signaling server');
        this.signalingSocket.send(JSON.stringify({t:'join',match:this.matchId,id:this.localId}));
      };
      this.signalingSocket.onmessage = (e)=> {
        const msg = JSON.parse(e.data);
        if(msg.t==='offer') this.handleOffer(msg);
        if(msg.t==='answer') this.handleAnswer(msg);
        if(msg.t==='ice') this.handleICE(msg);
      };
    }catch(e){ LogStore.add('signaling error',e); }
  },
  async createPeer(){
    const pc = new RTCPeerConnection({iceServers:this.config.iceServers});
    pc.onicecandidate = e=> {
      if(e.candidate && this.signalingSocket){
        this.signalingSocket.send(JSON.stringify({t:'ice',c:e.candidate,match:this.matchId,id:this.localId}));
      }
    };
    const dc = pc.createDataChannel('game');
    dc.onopen = ()=> { LogStore.add('DataChannel open'); };
    dc.onmessage = (ev)=> { this.onMessage(JSON.parse(ev.data)); };
    this.dc = dc; this.pc = pc;
    return {pc,dc};
  },
  async handleOffer(msg){
    // manual fallback: offer in msg.sdp or user pasted
    LogStore.add('offer received via signaling');
    const pc = new RTCPeerConnection({iceServers:this.config.iceServers});
    pc.ondatachannel = (ev)=> { this.dc = ev.channel; this.dc.onmessage = (e)=>this.onMessage(JSON.parse(e.data)); this.dc.onopen=()=>LogStore.add('DC open'); };
    pc.onicecandidate = e=> { if(e.candidate && this.signalingSocket) this.signalingSocket.send(JSON.stringify({t:'ice',c:e.candidate,match:this.matchId,id:this.localId})); };
    await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    this.pc = pc;
    // send answer via signaling
    if(this.signalingSocket) this.signalingSocket.send(JSON.stringify({t:'answer',sdp:pc.localDescription,match:this.matchId,id:this.localId}));
  },
  async handleAnswer(msg){
    LogStore.add('answer received');
    if(this.pc) await this.pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
  },
  async handleICE(msg){
    if(this.pc) { try{ await this.pc.addIceCandidate(msg.c); }catch(e){ LogStore.add('ICE add failed',e); } }
  },
  onMessage(msg){
    // handle inbound data messages (chat, state, actions)
    if(msg.type==='chat'){ appendChat(msg.from, msg.text); }
    if(msg.type==='state'){ LogStore.add('state sync',msg); }
  },
  sendChat(obj){
    appendChat(obj.from,obj.text);
    if(this.dc && this.dc.readyState === 'open') this.dc.send(JSON.stringify({type:'chat',from:obj.from,text:obj.text}));
    if(this.signalingSocket) this.signalingSocket.send(JSON.stringify({t:'chat',match:this.matchId,from:obj.from,text:obj.text}));
  },
  reconnect(){
    LogStore.add('reconnect requested');
    // naive reconnect: reload or re-init connection
    if(this.signalingSocket){ this.signalingSocket.close(); this.signalingSocket=null; }
    if(this.pc){ this.pc.close(); this.pc=null; }
    this.connectSignaling();
  }
};

// Chat UI helpers
function appendChat(from, text){
  const log = document.getElementById('chatlog');
  const el = document.createElement('div'); el.innerHTML = `<strong>${escapeHtml(from)}:</strong> ${escapeHtml(text)}`;
  log.appendChild(el); log.scrollTop = log.scrollHeight;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// UI players update
function updatePlayersUI(){
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  const players = game ? game.players : [];
  for(const p of players){
    const d = document.createElement('div'); d.className='playerRow';
    d.innerHTML = `<div>${escapeHtml(p.name)} <span class="small">(${p.id.substr(0,6)})</span></div><div style="text-align:right"><span style="display:inline-block;width:12px;height:12px;background:${p.color};border-radius:6px;margin-right:6px"></span><button class="btn small readyBtn">${p.ready? 'Ready':'Not Ready'}</button></div>`;
    list.appendChild(d);
  }
}

// Initial boot
function startDemo(){
  game = new Game();
  renderer = game.renderer;
  updatePlayersUI();
}
networkManager.init();
startDemo();

// Controls for logs
document.getElementById('downloadLog').addEventListener('click', ()=> LogStore.download());
document.getElementById('clearLog').addEventListener('click', ()=> { LogStore.logs=[]; updateLogView(); });

// Basic cheat heuristics (client-side)
function cheatCheck(state){
  // Validate physics step lengths, projectiles count, RNG seeds
  if(state.projectiles && state.projectiles.length > 20) LogStore.add('cheat-suspect: too many projectiles', state.projectiles.length);
  if(!state.seed) LogStore.add('cheat-suspect: missing seed');
}

// Basic reconnect/resume via localStorage
window.addEventListener('beforeunload', ()=> {
  try{ localStorage.setItem('worms_arena_save', JSON.stringify({seed:game.seed,players:game.players,worms:game.worms,matchId:networkManager.matchId})); }catch(e){}
});
window.addEventListener('load', ()=> {
  try{
    const s = localStorage.getItem('worms_arena_save');
    if(s){ const obj = JSON.parse(s);
      if(obj && confirm('Resume previous session?')){ LogStore.add('Resuming session'); networkManager.matchId = obj.matchId; }
    }
  }catch(e){}
});

// Simple UI extras
document.getElementById('spectatorToggle').addEventListener('change', (e)=> networkManager.setSpectator(e.target.checked));

// Small automation: if all ready start match
setInterval(()=> {
  if(!game) return;
  const allReady = game.players.length>1 && game.players.every(p=>p.ready);
  if(allReady && !game.active) { game.startMatch(); LogStore.add('match started'); }
},1000);

// Minimal cheat-server placeholder validation function (simulate)
function serverValidateAction(action){
  // deterministic seed matching
  if(action.seed && action.seed !== game.turnSeed) { LogStore.add('server-validate: seed mismatch',action); return false; }
  return true;
}

// Final logging
LogStore.add('Demo initialized', {seed: game?game.seed:null});

// End of single-file demo
</script>
