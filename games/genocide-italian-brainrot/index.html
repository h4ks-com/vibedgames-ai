<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍝 Genocide of Italian Brainrot 🤖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none; /* Prevent mobile zoom/scroll */
        }
        
        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available; /* iOS fix */
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 800px;
            max-height: 600px;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }
        
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 20;
            pointer-events: auto;
        }
        
        h1 {
            font-size: clamp(24px, 5vw, 48px);
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(255,0,0,0.8);
            animation: glitch 2s infinite;
        }
        
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
            96% { transform: translate(-2px, -2px); }
            98% { transform: translate(2px, 2px); }
        }
        
        .btn {
            padding: 15px 30px;
            font-size: clamp(16px, 4vw, 24px);
            background: linear-gradient(45deg, #ff0000, #ff6600);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 20px;
            touch-action: manipulation;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,0,0,0.6);
        }
        
        p {
            font-size: clamp(12px, 3vw, 18px);
            opacity: 0.9;
            line-height: 1.6;
        }

        /* Mobile-specific adjustments */
        @media (max-width: 768px) {
            #ui {
                font-size: 14px;
                top: 5px;
                left: 5px;
            }
            
            #gameContainer {
                max-width: 100vw;
                max-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div>Score: <span id="score">0</span></div>
            <div>Creatures: <span id="creatures">0</span></div>
        </div>
        <div id="startScreen">
            <h1>🍝 GENOCIDE OF ITALIAN BRAINROT 🤖</h1>
            <p>Destroy all AI-generated Italian creatures!<br><br>
               Click/Tap to shoot<br>
               Exterminate the AI slop plague!</p>
            <button class="btn" onclick="startGame()">START EXTERMINATION</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const creaturesEl = document.getElementById('creatures');
        const startScreen = document.getElementById('startScreen');

        // Game state
        let gameRunning = false;
        let score = 0;
        let creatures = [];
        let particles = [];
        let projectiles = [];

        // Responsive canvas sizing
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth || window.innerWidth;
            canvas.height = container.clientHeight || window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Creature types (Italian brainrot AI slop)
        const creatureTypes = [
            { name: "Tortellini Terror", emoji: "🤖", color: "#FF6B6B", health: 30, speed: 2, points: 100 },
            { name: "Lasagna Lord", emoji: "👹", color: "#4ECDC4", health: 60, speed: 1.5, points: 200 },
            { name: "Pizza Monster", emoji: "🍕", color: "#FFE66D", health: 40, speed: 2.5, points: 150 },
            { name: "Gelatinous Blob", emoji: "💩", color: "#95E1D3", health: 80, speed: 1, points: 300 },
            { name: "Carbonara Beast", emoji: "🐙", color: "#F38181", health: 50, speed: 2, points: 180 },
            { name: "Risotto Reaper", emoji: "💀", color: "#AA96DA", health: 70, speed: 1.8, points: 250 },
            { name: "Cannoli Crusher", emoji: "🥨", color: "#FCBAD3", health: 35, speed: 2.2, points: 120 },
            { name: "Bolognai Berserker", emoji: "👾", color: "#FFFFD2", health: 90, speed: 1.2, points: 350 }
        ];

        class Creature {
            constructor(type) {
                this.type = type;
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = Math.random() * (canvas.height - 60) + 30;
                this.vx = (Math.random() - 0.5) * type.speed * 2;
                this.vy = (Math.random() - 0.5) * type.speed * 2;
                this.health = type.health;
                this.maxHealth = type.health;
                this.size = Math.max(25, Math.min(50, type.health / 2)); // Responsive size
                this.angle = 0;
                this.glitchOffset = 0;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.angle += 0.02;
                this.glitchOffset = Math.sin(Date.now() * 0.01) * 5;

                // Bounce off walls
                if (this.x <= this.size || this.x >= canvas.width - this.size) {
                    this.vx *= -1;
                    this.x = Math.max(this.size, Math.min(canvas.width - this.size, this.x));
                }
                if (this.y <= this.size || this.y >= canvas.height - this.size) {
                    this.vy *= -1;
                    this.y = Math.max(this.size, Math.min(canvas.height - this.size, this.y));
                }
            }

            draw() {
                ctx.save();
                
                // AI glitch effect
                if (Math.random() > 0.95) {
                    ctx.translate(this.glitchOffset, 0);
                }

                // Body with gradient
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, this.type.color);
                gradient.addColorStop(1, '#000000');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Glowing eyes (AI indicator)
                ctx.fillStyle = '#00FF00';
                ctx.shadowColor = '#00FF00';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(this.x - this.size/3, this.y - this.size/4, this.size/6, 0, Math.PI * 2);
                ctx.arc(this.x + this.size/3, this.y - this.size/4, this.size/6, 0, Math.PI * 2);
                ctx.fill();

                // Emoji face
                ctx.shadowBlur = 0;
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.type.emoji, this.x, this.y + this.size/6);

                // Health bar for tough creatures
                if (this.maxHealth > 40) {
                    const barWidth = this.size * 1.5;
                    const barHeight = 6;
                    const healthPercent = this.health / this.maxHealth;
                    
                    ctx.fillStyle = '#333';
                    ctx.fillRect(this.x - barWidth/2, this.y - this.size - 15, barWidth, barHeight);
                    
                    ctx.fillStyle = healthPercent > 0.5 ? '#00FF00' : healthPercent > 0.25 ? '#FFFF00' : '#FF0000';
                    ctx.fillRect(this.x - barWidth/2, this.y - this.size - 15, barWidth * healthPercent, barHeight);
                }

                ctx.restore();
            }

            hit(damage) {
                this.health -= damage;
                return this.health <= 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
                this.size = Math.random() * 6 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class Projectile {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                const angle = Math.atan2(targetY - y, targetX - x);
                const speed = 12;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = 5;
                this.active = true;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Deactivate if off screen
                if (this.x < 0 || this.x > canvas.width || 
                    this.y < 0 || this.y > canvas.height) {
                    this.active = false;
                }
            }

            draw() {
                ctx.fillStyle = '#FF4444';
                ctx.shadowColor = '#FF0000';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function spawnCreature() {
            const type = creatureTypes[Math.floor(Math.random() * creatureTypes.length)];
            creatures.push(new Creature(type));
            creaturesEl.textContent = creatures.length;
        }

        function createExplosion(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function shoot(targetX, targetY) {
            // Shoot from bottom center of screen
            const startX = canvas.width / 2;
            const startY = canvas.height - 20;
            projectiles.push(new Projectile(startX, startY, targetX, targetY));
        }

        function checkCollisions() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                if (!proj.active) continue;

                for (let j = creatures.length - 1; j >= 0; j--) {
                    const creature = creatures[j];
                    const dx = proj.x - creature.x;
                    const dy = proj.y - creature.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < creature.size + proj.size) {
                        proj.active = false;
                        
                        if (creature.hit(25)) {
                            createExplosion(creature.x, creature.y, creature.type.color, 30);
                            score += creature.type.points;
                            scoreEl.textContent = score;
                            creatures.splice(j, 1);
                            creaturesEl.textContent = creatures.length;
                            
                            // Spawn new creature to keep action going
                            setTimeout(spawnCreature, 500);
                        } else {
                            createExplosion(proj.x, proj.y, '#FFFFFF', 5);
                        }
                        
                        break; // One projectile hits one creature
                    }
                }
            }

            // Remove inactive projectiles
            projectiles = projectiles.filter(p => p.active);
        }

        function drawBackground() {
            // Dark digital background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid effect
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            const gridSize = 40;
            
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Subtle scanlines
            ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
            for (let y = 0; y < canvas.height; y += 4) {
                ctx.fillRect(0, y, canvas.width, 2);
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            drawBackground();

            // Update and draw creatures
            creatures.forEach(creature => {
                creature.update();
                creature.draw();
            });

            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Update and draw projectiles
            projectiles.forEach(proj => {
                proj.update();
                proj.draw();
            });

            // Check collisions
            checkCollisions();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameRunning = true;
            score = 0;
            scoreEl.textContent = score;
            creatures = [];
            particles = [];
            projectiles = [];

            // Spawn initial creatures
            for (let i = 0; i < 5; i++) {
                spawnCreature();
            }

            // Continuous spawning
            setInterval(() => {
                if (creatures.length < 8 && gameRunning) {
                    spawnCreature();
                }
            }, 2000);

            gameLoop();
        }

        // Input handlers (mouse + touch)
        function handleInput(clientX, clientY) {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            shoot(x, y);
        }

        // Mouse events
        canvas.addEventListener('click', (e) => {
            handleInput(e.clientX, e.clientY);
        });

        // Touch events (mobile)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevent scrolling/zooming
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY);
        }, { passive: false });

        // Prevent context menu on long press (mobile)
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
