<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genocide of Italian Brainrot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            cursor: crosshair;
        }
        canvas {
            display: block;
            background: linear-gradient(45deg, #1a0033, #330066);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
        }
        #score {
            font-size: 24px;
            color: #ff0066;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            color: #ff0066;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            text-align: center;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #ffcc00;
            font-size: 16px;
            z-index: 10;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 20;
        }
        #gameOver h2 {
            color: #ff0066;
            font-size: 48px;
            margin-bottom: 20px;
        }
        #restart {
            background: #ff0066;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="title">🍝 GENOCIDE OF ITALIAN BRAINROT 🤖</div>
    <div id="ui">
        <div id="score">Score: 0</div>
    </div>
    <div id="instructions">Click to shoot the Italian brainrot creatures!</div>
    <canvas id="gameCanvas"></canvas>
    <div id="gameOver">
        <h2>MISSION COMPLETE</h2>
        <p>You've exterminated the Italian brainrot plague!</p>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button id="restart">RESTART GENOCIDE</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const restartButton = document.getElementById('restart');

        // Game setup
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game state
        let score = 0;
        let gameRunning = true;
        let mouseX = 0;
        let mouseY = 0;

        // Italian brainrot creatures (AI slop entities)
        const creatures = [];
        const particles = [];
        const bullets = [];

        // Creature types with Italian names and properties
        const creatureTypes = [
            { name: "Tortellini Terror", color: "#ff6b6b", size: 30, speed: 2, points: 10 },
            { name: "Lasagna Lord", color: "#4ecdc4", size: 40, speed: 1.5, points: 15 },
            { name: "Pizza Monster", color: "#ffe66d", size: 35, speed: 2.5, points: 20 },
            { name: "Gelatinous Blob", color: "#a8e6cf", size: 25, speed: 3, points: 25 },
            { name: "Carbonara Beast", color: "#ff8b94", size: 45, speed: 1, points: 30 }
        ];

        class Creature {
            constructor() {
                const type = creatureTypes[Math.floor(Math.random() * creatureTypes.length)];
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.type = type;
                this.vx = (Math.random() - 0.5) * type.speed;
                this.vy = (Math.random() - 0.5) * type.speed;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.alive = true;
                this.slopLevel = Math.random() * 0.5 + 0.5; // AI slop intensity
            }

            update() {
                if (!this.alive) return;

                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;

                // Bounce off walls
                if (this.x <= this.type.size || this.x >= canvas.width - this.type.size) {
                    this.vx = -this.vx;
                }
                if (this.y <= this.type.size || this.y >= canvas.height - this.type.size) {
                    this.vy = -this.vy;
                }

                // Keep in bounds
                this.x = Math.max(this.type.size, Math.min(canvas.width - this.type.size, this.x));
                this.y = Math.max(this.type.size, Math.min(canvas.height - this.type.size, this.y));
            }

            draw() {
                if (!this.alive) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Draw AI slop creature (glitchy, distorted shape)
                ctx.fillStyle = this.type.color;
                ctx.globalAlpha = this.slopLevel;
                
                // Create distorted AI-slop-looking shape
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const radius = this.type.size + Math.sin(angle * 3) * 10 * this.slopLevel;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    
                    if (i === 0) {
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.fill();

                // Add AI noise
                for (let i = 0; i < 5; i++) {
                    const noiseX = (Math.random() - 0.5) * this.type.size;
                    const noiseY = (Math.random() - 0.5) * this.type.size;
                    const noiseSize = Math.random() * 10;
                    
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.3})`;
                    ctx.fillRect(noiseX, noiseY, noiseSize, noiseSize);
                }

                ctx.restore();

                // Draw creature name
                ctx.fillStyle = "#ffffff";
                ctx.font = "12px Arial";
                ctx.textAlign = "center";
                ctx.fillText(this.type.name, this.x, this.y - this.type.size - 10);
            }

            hit() {
                this.alive = false;
                score += this.type.points;
                scoreElement.textContent = `Score: ${score}`;
                
                // Create explosion particles
                for (let i = 0; i < 10; i++) {
                    particles.push(new Particle(this.x, this.y, this.type.color));
                }

                // Check win condition
                const aliveCreatures = creatures.filter(c => c.alive);
                if (aliveCreatures.length === 0) {
                    endGame();
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.color = color;
                this.life = 1.0;
                this.decay = 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 4, 4);
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                const angle = Math.atan2(targetY - y, targetX - x);
                this.vx = Math.cos(angle) * 8;
                this.vy = Math.sin(angle) * 8;
                this.life = 100;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }

            draw() {
                ctx.fillStyle = "#ff0066";
                ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
            }
        }

        // Initialize creatures
        function spawnCreatures() {
            for (let i = 0; i < 15; i++) {
                creatures.push(new Creature());
            }
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            // Shoot from center of screen
            bullets.push(new Bullet(canvas.width / 2, canvas.height / 2, clickX, clickY));
        });

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;

            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw creatures
            creatures.forEach(creature => {
                creature.update();
                creature.draw();
            });

            // Update and draw bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.update();
                bullet.draw();

                // Check collision with creatures
                creatures.forEach(creature => {
                    if (creature.alive) {
                        const dx = bullet.x - creature.x;
                        const dy = bullet.y - creature.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < creature.type.size) {
                            creature.hit();
                            bullets.splice(i, 1);
                            break;
                        }
                    }
                });

                // Remove dead bullets
                if (bullet.life <= 0) {
                    bullets.splice(i, 1);
                }
            }

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.update();
                particle.draw();

                if (particle.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Draw crosshair at mouse position
            ctx.strokeStyle = "#ff0066";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(mouseX - 10, mouseY);
            ctx.lineTo(mouseX + 10, mouseY);
            ctx.moveTo(mouseX, mouseY - 10);
            ctx.lineTo(mouseX, mouseY + 10);
            ctx.stroke();

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
        }

        function restart() {
            score = 0;
            scoreElement.textContent = `Score: ${score}`;
            gameRunning = true;
            gameOverElement.style.display = 'none';
            creatures.length = 0;
            bullets.length = 0;
            particles.length = 0;
            spawnCreatures();
            gameLoop();
        }

        // Event listeners
        restartButton.addEventListener('click', restart);

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Start game
        spawnCreatures();
        gameLoop();
    </script>
</body>
</html>
