<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Digital Flip Book</title>
<style>
  :root{
    --book-width: 441px;
    --book-height: 623px;
    --page-bg: #fffdf8;
    --paper-edge: #e6dcca;
    --shadow: rgba(0,0,0,0.25);
    --accent: #2b6cb0;
    --radius: 6px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;margin-left: 10%;background:linear-gradient(180deg,#e9eef6 0%, #f7f9fc 100%);display:flex;align-items:center;justify-content:center}
  .scene{width:calc(var(--book-width) + 40px); display:flex;flex-direction:column;align-items:center;gap:18px}
  .book-wrap{perspective:2000px; width:var(--book-width); height:var(--book-height); position:relative;}
  .book{
    width:100%; height:100%; position:relative; transform-style:preserve-3d;
    margin:0 auto;
  }

  .page{
    width:100%; height:100%; position:absolute; top:0; left:0;
    transform-style:preserve-3d;
    transition: transform 900ms cubic-bezier(.2,.9,.3,1), z-index 0ms linear 0ms;
    transform-origin: left center;
    cursor: pointer;
    border-radius: var(--radius);
    box-shadow: 0 8px 30px rgba(20,30,50,0.12);
  }

  .page-layer{
    position:absolute; inset:0; border-radius:inherit; overflow:hidden;
    display:flex; flex-direction:column;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .front{
    background: linear-gradient(180deg, #ffffff 0%, var(--page-bg) 100%);
    padding:36px;
    border-left: 10px solid var(--paper-edge);
  }

  .back{
    background: linear-gradient(180deg,#fbfbfb 0%, #f2f2f2 100%);
    transform: rotateY(180deg);
    padding:36px;
    border-right: 10px solid var(--paper-edge);
  }

  .page .content{width:100%;height:100%;overflow:auto}
  .page h1{margin:0 0 6px;font-size:28px;color:var(--accent)}
  .page h2{margin:0 0 8px;font-size:18px;color:#333}
  .page p{margin:0 0 12px;color:#333;line-height:1.4}
  .page .meta{font-size:12px;color:#666;margin-top:auto}

  /* Back face subtle style */
  .page .back .content{color:#222}
  .page .back h1{color:#444}

  /* When flipped - rotated away (to left) */
  .page.flipped{
    transform: rotateY(-180deg);
    z-index:1;
  }

  /* Stacking - lower index on top */
  /* We'll set z-index via inline style in JS for reliability */

  /* A soft gradient on flipping to mimic page shading */
  .page::after{
    content:"";
    position:absolute; inset:0;
    pointer-events:none;
    background: linear-gradient(90deg, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0) 15%, rgba(0,0,0,0) 85%, rgba(0,0,0,0.03) 100%);
    opacity:0;
    transition:opacity 300ms;
    border-radius:inherit;
  }
  .page.flipped::after{ opacity:0.7; transform: translateZ(0); }

  /* Controls and hotspots */
  .hotspots{position:absolute; inset:0; pointer-events:none}
  .hotspot{position:absolute; top:0; bottom:0; width:50%; pointer-events:auto}
  .hotspot.left{left:0}
  .hotspot.right{right:0}
  .hotspot:hover{cursor:pointer}
  .controls{display:flex;gap:12px; align-items:center}
  .btn{
    background:#fff; border:1px solid #d6dce7; padding:8px 12px; border-radius:6px;
    color:#203040; font-weight:600; box-shadow:0 6px 18px rgba(20,30,50,0.06);
    user-select:none;
  }
  .pager{font-size:14px;color:#333; padding:6px 10px; background:transparent}
  .hint{font-size:12px;color:#64748b}
  /* Responsive */
  @media (max-width:800px){
    :root{--book-width:360px; --book-height:520px}
    .scene{width:calc(var(--book-width) + 40px)}
  }

  /* Nice inner decorations for some pages */
  .decor{opacity:0.06; font-weight:800; font-size:120px; position:absolute; right:20px; top:20px; transform:rotate(-12deg); color:#000}
  .note{background:#fff7d6;padding:10px;border-radius:8px;margin:10px 0;border:1px dashed #f0d58a}
</style>
</head>
<body>
<div class="scene" aria-hidden="false">
  <div class="book-wrap" id="wrap">
    <div class="book" id="book">
      <!-- Pages will be injected here by JS -->
    </div>
    <div class="hotspots" aria-hidden="true">
      <div class="hotspot left" id="hot-left" title="Previous"></div>
      <div class="hotspot right" id="hot-right" title="Next"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="prevBtn">◀ Previous</button>
    <div class="pager" id="pager">Page 1 / 6</div>
    <button class="btn" id="nextBtn">Next ▶</button>
    <div style="width:12px"></div>
    <div class="hint">Tip: Click the right or left side of the book, or use ← → keys</div>
  </div>
</div>

<script>
(function(){
  // Page contents: each entry contains front and optional custom back HTML.
  const pagesData = [
    { front: `<div class="content"><h1>Cover</h1><h2>My Digital Flip Book</h2><p>Welcome — click to turn the page.</p><div class="meta">Author: Sample · 2026</div></div>`, back: `<div class="content"><h1>Inside Cover</h1><p style="margin-top:12px">This book demonstrates a CSS/JS page-flip effect. Each page is full HTML/CSS markup — style it any way you like.</p></div>` },
    { front: `<div class="content"><h1>Chapter 1</h1><h2>Getting Started</h2><p>Start by exploring how pages flip from right to left. You can add images, styles, lists — anything HTML supports.</p><div class="note">Pro tip: Put interactive elements on pages, they remain functional.</div></div>` },
    { front: `<div class="content"><h1>Design</h1><h2>Styling Pages</h2><p>Use backgrounds, shadows, and fonts to make the pages feel tactile. This sample uses 3D transforms and backface visibility.</p></div>` },
    { front: `<div class="content"><h1>Content</h1><h2>Rich HTML Inside</h2><p>Each page is a DOM node — embed code, tables, forms, or even small animations inside a page.</p></div>` },
    { front: `<div class="content"><h1>About</h1><h2>Implementation Notes</h2><p>The flip is a rotateY transform with a preserved 3D context. JS toggles classes to animate.</p></div>` },
    { front: `<div class="content"><h1>Back Cover</h1><h2>Thank You</h2><p>That's it — the last page. Click the left side to go back.</p></div>`, back:`<div class="content"><h1>End</h1><p class="meta">© Sample Flip Book</p></div>` }
  ];

  const bookEl = document.getElementById('book');
  const pagerEl = document.getElementById('pager');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const hotLeft = document.getElementById('hot-left');
  const hotRight = document.getElementById('hot-right');

  // Build pages DOM: page0 top, pageN bottom.
  const total = pagesData.length;
  const pages = [];
  for(let i=0;i<total;i++){
    const p = document.createElement('div');
    p.className = 'page';
    p.dataset.index = i;
    // inner front/back
    const front = document.createElement('div');
    front.className = 'page-layer front';
    front.innerHTML = pagesData[i].front || `<div class="content"><h1>Page ${i+1}</h1></div>`;

    const back = document.createElement('div');
    back.className = 'page-layer back';
    // by default, back shows the next page front (for realism). Last page uses provided back or blank.
    if (pagesData[i].back) {
      back.innerHTML = pagesData[i].back;
    } else {
      // If there's a next page, use its front as back preview; else empty
      back.innerHTML = (pagesData[i+1] && pagesData[i+1].front) ? pagesData[i+1].front : `<div class="content"><h1></h1></div>`;
    }

    p.appendChild(front);
    p.appendChild(back);

    // set stacking z-index: lower index higher z to simulate top page first
    // We'll place index 0 on top (highest z), so z = total - index
    p.style.zIndex = (total - i).toString();

    bookEl.appendChild(p);
    pages.push(p);
  }

  // State: how many pages are flipped (pages 0..flipped-1 are flipped)
  let flipped = 0;

  // Update pager text
  function updatePager(){
    const current = Math.min(flipped + 1, total);
    pagerEl.textContent = `Page ${current} / ${total}`;
  }
  updatePager();

  // Turn to next page
  function next(){
    if(flipped >= total-1) return; // Prevent flipping last back into nothing
    const target = pages[flipped];
    // ensure transform-origin left before flipping
    target.style.transformOrigin = 'left center';
    // small timeout to ensure origin applied before transition
    requestAnimationFrame(()=> {
      target.classList.add('flipped');
    });
    flipped++;
    updatePager();
  }

  // Turn to previous page
  function prev(){
    if(flipped <= 0) return;
    // page to unflip is flipped-1
    const target = pages[flipped-1];
    // set origin to right to make flip-back realistic
    //target.style.transformOrigin = 'right center';
    target.style.transformOrigin = 'left center';
    // remove flipped class to rotate back
    target.classList.remove('flipped');
    flipped--;
    updatePager();
  }

  // Attach click handlers for hotspots
  hotRight.addEventListener('click', next);
  hotLeft.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);

  // Allow clicking on a top page to flip forward
  bookEl.addEventListener('click', function(e){
    // avoid clicks on hotspots double-firing — use event target detection
    // compute click x relative to book center
    const rect = bookEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x > rect.width/2) next();
    else prev();
  });

  // Keyboard navigation
  window.addEventListener('keydown', function(e){
    if(e.key === 'ArrowRight') next();
    if(e.key === 'ArrowLeft') prev();
  });

  // For accessibility: enable swipe gestures on touch devices
  let touchStartX = 0;
  bookEl.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].clientX;
  }, {passive:true});
  bookEl.addEventListener('touchend', function(e){
    if(!touchStartX) return;
    const dx = (e.changedTouches[0].clientX - touchStartX);
    if(Math.abs(dx) > 40){
      if(dx < 0) next(); else prev();
    }
    touchStartX = 0;
  });

  // Prevent selecting text while dragging the page
  bookEl.addEventListener('dragstart', e => e.preventDefault());

  // Optional: animate z-index after flip so that flipped pages sit under the rest
  pages.forEach((p, idx) => {
    p.addEventListener('transitionend', (ev) => {
      if(ev.propertyName !== 'transform') return;
      // If page is flipped, move it under the stack (lower z)
      if(p.classList.contains('flipped')) {
        p.style.zIndex = (1 + idx).toString(); // put flipped pages lower
      } else {
        p.style.zIndex = (total - idx).toString();
      }
    });
  });

  // Initial: small tilt for depth
  bookEl.style.transform = 'rotateX(0.6deg)';

  // Expose for console debugging if desired
  window._flipbook = { next, prev, pages, data: pagesData };
})();
</script>
</body>
</html>
