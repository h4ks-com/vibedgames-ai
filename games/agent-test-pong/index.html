<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace;color:#fff}
canvas{border:2px solid #0f0;display:block}
</style>
</head>
<body>
<canvas id="c" width="600" height="400"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
let score=0,best=+localStorage.getItem('pong-best')||0;
const paddle={w:10,h:70,x:20,y:H/2-35,speed:5};
const ball={x:W/2,y:H/2,r:6,vx:4,vy:3};
let keys={},running=true;

document.addEventListener('keydown',e=>{keys[e.key]=true});
document.addEventListener('keyup',e=>{keys[e.key]=false});

function reset(){
  ball.x=W/2;ball.y=H/2;
  ball.vx=(Math.random()>.5?1:-1)*(3+Math.random()*2);
  ball.vy=(Math.random()-.5)*6;
  paddle.y=H/2-paddle.h/2;
  score=0;running=true;
}

function update(){
  if(!running)return;
  if(keys['ArrowUp']||keys['w'])paddle.y=Math.max(0,paddle.y-paddle.speed);
  if(keys['ArrowDown']||keys['s'])paddle.y=Math.min(H-paddle.h,paddle.y+paddle.speed);
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y-ball.r<0||ball.y+ball.r>H)ball.vy*=-1;
  if(ball.x-ball.r<0){ball.vx=Math.abs(ball.vx);ball.x=ball.r}
  if(ball.x+ball.r>=paddle.x&&ball.x-ball.r<=paddle.x+paddle.w&&ball.y>=paddle.y&&ball.y<=paddle.y+paddle.h){
    ball.vx=-Math.abs(ball.vx)-.3;score++;ball.x=paddle.x+paddle.w+ball.r;
    ball.vy+=((ball.y-(paddle.y+paddle.h/2))/(paddle.h/2))*2;
  }
  if(ball.x>W+ball.r){
    running=false;
    if(score>best){best=score;localStorage.setItem('pong-best',best)}
  }
  if(Math.abs(ball.vx)>8)ball.vx=ball.vx>0?8:-8;
}

function draw(){
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
  ctx.setLineDash([8,8]);ctx.strokeStyle='#333';ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#0f0';ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='#0f0';ctx.font='24px monospace';ctx.textAlign='center';
  ctx.fillText(score,W/2,30);
  ctx.fillStyle='#555';ctx.font='14px monospace';ctx.textAlign='right';
  ctx.fillText('BEST: '+best,W-10,25);
  if(!running){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='32px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-20);
    ctx.font='18px monospace';ctx.fillStyle='#0f0';
    ctx.fillText('Score: '+score+'  |  Best: '+best,W/2,H/2+15);
    ctx.fillText('Press SPACE to restart',W/2,H/2+50);
  }
  if(running&&score===0){
    ctx.fillStyle='#555';ctx.font='14px monospace';ctx.textAlign='center';
    ctx.fillText('↑↓ or W/S to move',W/2,H-15);
  }
}

document.addEventListener('keydown',e=>{if(e.key===' '&&!running)reset()});

(function loop(){update();draw();requestAnimationFrame(loop)})();
</script>
</body>
</html>
