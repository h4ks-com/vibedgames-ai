<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Demo Cards</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #1a5c2a 0%, #0d3318 70%, #091f0f 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    color: #e0e0e0;
    overflow: hidden;
  }
  h1 { font-size: 1.6rem; margin-bottom: 2rem; letter-spacing: 0.05em; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
  #table {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 260px;
    padding: 2rem;
    border: 3px solid rgba(255,215,0,0.25);
    border-radius: 2rem;
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(2px);
    margin-bottom: 2rem;
    min-width: 340px;
  }
  .card {
    width: 120px;
    height: 170px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    animation: dealIn 0.4s ease-out both;
    border: 2px solid rgba(255,255,255,0.15);
    transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-8px); }
  .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  @keyframes dealIn {
    0%   { opacity: 0; transform: translateY(-60px) rotate(-10deg) scale(0.7); }
    100% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  }
  button {
    padding: 0.75rem 2.2rem;
    font-size: 1.1rem;
    border: none;
    border-radius: 0.6rem;
    background: linear-gradient(135deg, #f5c842, #e0a800);
    color: #1a1a1a;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button:hover { transform: scale(1.05); box-shadow: 0 5px 16px rgba(0,0,0,0.5); }
  button:active { transform: scale(0.97); }
  #message { margin-top: 1rem; font-size: 0.95rem; color: #aaa; min-height: 1.4em; }
</style>
</head>
<body>
  <h1>🃏 Agent Demo Cards</h1>
  <div id="table"></div>
  <button id="dealBtn">Deal 5 Cards</button>
  <p id="message">Click the button to deal!</p>

  <script>
    const table = document.getElementById('table');
    const dealBtn = document.getElementById('dealBtn');
    const msg = document.getElementById('message');

    dealBtn.addEventListener('click', () => {
      table.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${i * 0.1}s`;
        const img = document.createElement('img');
        img.src = 'cardback.png';
        img.alt = 'Card Back';
        card.appendChild(img);
        table.appendChild(card);
      }
      msg.textContent = '5 cards dealt — all face down!';
    });
  </script>
</body>
</html>
