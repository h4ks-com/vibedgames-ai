<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>h4ks.com — Eyeball Mode</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #c0c0c0;
    font-family: 'VT323', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    text-align: center;
    padding: 40px 20px 10px;
  }

  .header h1 {
    font-size: 3rem;
    color: #00ff41;
    text-shadow: 0 0 20px #00ff4180, 0 0 40px #00ff4140;
    letter-spacing: 8px;
  }

  .header p {
    font-size: 1.2rem;
    color: #666;
    margin-top: 8px;
  }

  .eyeball-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    padding: 30px 20px;
    max-width: 1100px;
  }

  .eyeball-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #c0c0c0;
    transition: transform 0.3s, filter 0.3s;
    cursor: pointer;
  }

  .eyeball-btn:hover {
    transform: scale(1.12);
    filter: brightness(1.3);
  }

  .eyeball-btn:hover .eye-label {
    color: #00ff41;
    text-shadow: 0 0 10px #00ff4180;
  }

  .eye-container {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #1a1a2e, #0a0a0a);
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 0 15px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  .eye-container::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 15px;
    width: 25px;
    height: 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    transform: rotate(-30deg);
  }

  .iris {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
  }

  .pupil {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #000;
    position: relative;
  }

  .pupil::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 5px;
    width: 8px;
    height: 6px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
  }

  /* Unique iris colors for each service */
  .eye-chat .iris { background: radial-gradient(circle, #00e676, #1b5e20); box-shadow: 0 0 15px #00e67660; }
  .eye-webmail .iris { background: radial-gradient(circle, #ff6f00, #e65100); box-shadow: 0 0 15px #ff6f0060; }
  .eye-games .iris { background: radial-gradient(circle, #e040fb, #7b1fa2); box-shadow: 0 0 15px #e040fb60; }
  .eye-github .iris { background: radial-gradient(circle, #aaa, #555); box-shadow: 0 0 15px #aaaaaa60; }
  .eye-pastebin .iris { background: radial-gradient(circle, #ffeb3b, #f57f17); box-shadow: 0 0 15px #ffeb3b60; }
  .eye-meet .iris { background: radial-gradient(circle, #40c4ff, #01579b); box-shadow: 0 0 15px #40c4ff60; }
  .eye-beans .iris { background: radial-gradient(circle, #8d6e63, #3e2723); box-shadow: 0 0 15px #8d6e6360; }
  .eye-radio .iris { background: radial-gradient(circle, #ff1744, #b71c1c); box-shadow: 0 0 15px #ff174460; }
  .eye-clocks .iris { background: radial-gradient(circle, #00e5ff, #006064); box-shadow: 0 0 15px #00e5ff60; }
  .eye-signup .iris { background: radial-gradient(circle, #76ff03, #33691e); box-shadow: 0 0 15px #76ff0360; }
  .eye-login .iris { background: radial-gradient(circle, #ffd740, #ff6f00); box-shadow: 0 0 15px #ffd74060; }

  .eye-label {
    margin-top: 10px;
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: color 0.3s, text-shadow 0.3s;
  }

  /* Bloodshot veins */
  .eye-container::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: 
      radial-gradient(ellipse at 20% 30%, transparent 45%, rgba(180,0,0,0.15) 46%, transparent 47%),
      radial-gradient(ellipse at 80% 20%, transparent 40%, rgba(180,0,0,0.12) 41%, transparent 42%),
      radial-gradient(ellipse at 70% 80%, transparent 42%, rgba(180,0,0,0.1) 43%, transparent 44%),
      radial-gradient(ellipse at 15% 75%, transparent 48%, rgba(180,0,0,0.08) 49%, transparent 50%);
    pointer-events: none;
  }

  .footer {
    margin-top: auto;
    padding: 30px;
    text-align: center;
    color: #333;
    font-size: 0.9rem;
  }

  .footer span { color: #00ff41; }

  /* Blink animation */
  @keyframes blink {
    0%, 96%, 100% { transform: scaleY(1); }
    98% { transform: scaleY(0.05); }
  }

  .eye-container {
    animation: blink 4s infinite;
  }

  .eyeball-btn:nth-child(2) .eye-container { animation-delay: 0.3s; }
  .eyeball-btn:nth-child(3) .eye-container { animation-delay: 0.7s; }
  .eyeball-btn:nth-child(4) .eye-container { animation-delay: 1.1s; }
  .eyeball-btn:nth-child(5) .eye-container { animation-delay: 1.5s; }
  .eyeball-btn:nth-child(6) .eye-container { animation-delay: 0.5s; }
  .eyeball-btn:nth-child(7) .eye-container { animation-delay: 1.3s; }
  .eyeball-btn:nth-child(8) .eye-container { animation-delay: 0.9s; }
  .eyeball-btn:nth-child(9) .eye-container { animation-delay: 1.7s; }
  .eyeball-btn:nth-child(10) .eye-container { animation-delay: 0.2s; }
  .eyeball-btn:nth-child(11) .eye-container { animation-delay: 1.0s; }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* Flicker */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.8; }
    94% { opacity: 1; }
  }

  .header h1 { animation: flicker 5s infinite; }
</style>
</head>
<body>

<div class="header">
  <h1>◉ H4KS ◉</h1>
  <p>choose your eyeball wisely</p>
</div>

<div class="eyeball-grid">
  <a class="eyeball-btn" href="https://chat.h4ks.com" target="_blank">
    <div class="eye-container eye-chat">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Chat</span>
  </a>

  <a class="eyeball-btn" href="https://webmail.h4ks.com/" target="_blank">
    <div class="eye-container eye-webmail">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Webmail</span>
  </a>

  <a class="eyeball-btn" href="https://games.h4ks.com" target="_blank">
    <div class="eye-container eye-games">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Games</span>
  </a>

  <a class="eyeball-btn" href="https://github.com/h4ks-com" target="_blank">
    <div class="eye-container eye-github">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Github</span>
  </a>

  <a class="eyeball-btn" href="https://s.h4ks.com" target="_blank">
    <div class="eye-container eye-pastebin">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Pastebin</span>
  </a>

  <a class="eyeball-btn" href="https://meet.h4ks.com/" target="_blank">
    <div class="eye-container eye-meet">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Conference</span>
  </a>

  <a class="eyeball-btn" href="https://beans.h4ks.com/" target="_blank">
    <div class="eye-container eye-beans">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Beans</span>
  </a>

  <a class="eyeball-btn" href="https://radio.h4ks.com/" target="_blank">
    <div class="eye-container eye-radio">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Radio</span>
  </a>

  <a class="eyeball-btn" href="https://h4ks.com/clocks/" target="_blank">
    <div class="eye-container eye-clocks">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Clocks</span>
  </a>

  <a class="eyeball-btn" href="https://h4ks.com/sign-up/" target="_blank">
    <div class="eye-container eye-signup">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Sign Up</span>
  </a>

  <a class="eyeball-btn" href="https://h4ks.com/oidc/authenticate/" target="_blank">
    <div class="eye-container eye-login">
      <div class="iris"><div class="pupil"></div></div>
    </div>
    <span class="eye-label">Login</span>
  </a>
</div>

<div class="footer">
  <span>◉</span> h4ks.com — the eyeball period <span>◉</span>
</div>

<script>
  // Eyes follow the mouse
  document.addEventListener('mousemove', (e) => {
    document.querySelectorAll('.iris').forEach(iris => {
      const eye = iris.closest('.eye-container');
      const rect = eye.getBoundingClientRect();
      const eyeCX = rect.left + rect.width / 2;
      const eyeCY = rect.top + rect.height / 2;
      const angle = Math.atan2(e.clientY - eyeCY, e.clientX - eyeCX);
      const dist = Math.min(12, Math.hypot(e.clientX - eyeCX, e.clientY - eyeCY) / 20);
      const x = Math.cos(angle) * dist;
      const y = Math.sin(angle) * dist;
      iris.style.transform = `translate(${x}px, ${y}px)`;
    });
  });
</script>

</body>
</html>
