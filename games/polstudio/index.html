<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Polaroid Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Dancing+Script:wght@400;700&family=Indie+Flower&family=Nanum+Pen+Script&family=Nothing+You+Could+Do&family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Architects+Daughter&family=Shadows+Into+Light&family=Permanent+Marker&family=Amatic+SC:wght@400;700&family=Zeyada&family=Rock+Salt&family=Gloria+Hallelujah&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #e9ecef; padding: 10px; margin: 0; }
        .container { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 750px; width: 100%; box-sizing: border-box; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; text-align: left; }
        @media (max-width: 600px) { .controls { grid-template-columns: 1fr; } }
        .full-width { grid-column: 1 / -1; }
        .upload-row { display: flex; gap: 10px; align-items: flex-end; }
        #editBtn { background-color: #007bff; color: white; min-height: 44px; display: none; white-space: nowrap; }
        .design-row { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        @media (max-width: 600px) { .design-row { grid-template-columns: 1fr; } }
        .sub-controls { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; display: none; text-align: left; }
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 500px) { .sub-grid { grid-template-columns: 1fr; } }
        button { border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; min-height: 44px; touch-action: manipulation; }
        .btn-secondary { background: #6c757d; color: white; }
        #downloadBtn { background-color: #28a745; color: white; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        label { font-size: 0.85rem; font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; touch-action: none; }
        .cropper-container-box { width: 95%; max-width: 500px; max-height: 70vh; background: #000; border-radius: 8px; overflow: hidden; }
        .canvas-wrapper { position: relative; display: inline-block; }
        #imageCanvas, #captionCanvas { max-width: 100%; height: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; margin: 20px auto; }
        #captionCanvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        .download-area { margin-top: 20px; padding-top: 20px; border-top: 2px dashed #eee; display: none; }
        #loadingSpinner { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: #007bff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Polaroid Studio</h2>

    <div id="loadingSpinner"></div>

    <div class="controls">
        <div class="full-width">
            <div class="upload-row">
                <div style="flex-grow: 1;">
                    <label>1. Upload Photo</label>
                    <input type="file" id="imageLoader" accept="image/*">
                </div>
                <button id="editBtn">Edit Crop/Rotate</button>
            </div>
        </div>

        <div><label>2. Filter</label><select id="filterPicker">
            <option value="none">Original</option>
            <option value="sepia(0.5) contrast(0.9) brightness(1.05)">Vintage Sepia</option>
            <option value="grayscale(1) contrast(1.2)">Classic B&W</option>
            <option value="saturate(1.6) contrast(1.1)">Technicolor</option>
            <option value="hue-rotate(-15deg) saturate(0.8) brightness(1.1)">Faded Film</option>
        </select></div>

        <div><label>3. Border Style</label><select id="compressionPicker">
            <option value="1.0">Authentic (Thick Chin)</option>
            <option value="0.7">Compact</option>
            <option value="0.4">Minimalist</option>
        </select></div>

        <div class="design-row">
            <div>
                <label>4. Frame Color</label>
                <select id="colorPicker">
                    <option value="#FFFFFF">Brilliant White</option>
                    <option value="#FDFDFD">Natural Paper</option>
                    <option value="#F5F5DC">Antique Ivory</option>
                    <option value="#EAE6CA">Sun-Bleached</option>
                    <option value="#DCDCDC">Silver Satin</option>
                    <option value="#FFF9F5">Warm Linen</option>
                    <option value="#F0F8FF">Arctic Frost</option>
                    <option value="#FAF9F6">Eggshell</option>
                    <option value="#FFFDD0">Creamy Pearl</option>
                </select>
            </div>
            <div>
                <label>5. Shadow Color</label>
                <select id="shadowColorPicker">
                    <option value="rgba(0,0,0,0.15)" selected>Classic Gray</option>
                    <option value="rgba(0,0,0,0.4)">Deep Charcoal</option>
                    <option value="rgba(60,40,20,0.25)">Warm Sepia</option>
                    <option value="rgba(40,40,60,0.3)">Cool Slate</option>
                    <option value="rgba(255,255,255,0.7)">Sun-Bleached White</option>
                    <option value="rgba(0,0,0,0.6)">Heavy Grunge</option>
                    <option value="rgba(80,0,0,0.2)">Old Photo Burn</option>
                </select>
            </div>
            <div>
                <label>6. Shadow Size</label>
                <select id="shadowSizePicker">
                    <option value="0">0px (None)</option>
                    <option value="1">1px (Hairline)</option>
                    <option value="2">2px</option>
                    <option value="3" selected>3px (Subtle)</option>
                    <option value="4">4px</option>
                    <option value="5">5px</option>
                    <option value="6">6px</option>
                    <option value="7">7px (Deep)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="imageCanvas"></canvas>
        <canvas id="captionCanvas"></canvas>
    </div>

    <div class="sub-controls" id="typographyZone">
        <div class="full-width" style="margin-bottom: 15px;">
            <div style="flex-grow: 1;">
                <label>7. Caption</label>
                <input type="text" id="captionText" placeholder="Write something...">
            </div>
        </div>

        <div class="sub-grid">
            <div><label>8. Type Style</label><select id="fontPicker">
                <optgroup label="Handwriting">
                    <option value="'Caveat', cursive">Caveat (Natural)</option>
                    <option value="'Dancing Script', cursive">Dancing Script (Elegant)</option>
                    <option value="'Indie Flower', cursive">Indie Flower (Casual)</option>
                    <option value="'Zeyada', cursive">Zeyada (Thin Scribble)</option>
                    <option value="'Gloria Hallelujah', cursive">Gloria (School Note)</option>
                    <option value="'Shadows Into Light', cursive">Shadows (Clean Print)</option>
                    <option value="'Pinyon Script', cursive">Pinyon (Effortless Class)</option>
                </optgroup>
                <optgroup label="Markers & Ink">
                    <option value="'Permanent Marker', cursive">Permanent Marker</option>
                    <option value="'Rock Salt', cursive">Rock Salt (Messy Ink)</option>
                    <option value="'Nothing You Could Do', cursive">Nothing (Felt Tip)</option>
                    <option value="'Nanum Pen Script', cursive">Nanum Pen (Fine Tip)</option>
                </optgroup>
                <optgroup label="Mechanical & Drafting">
                    <option value="'Special Elite', cursive">Vintage Typewriter</option>
                    <option value="'Courier Prime', monospace">Clean Typewriter</option>
                    <option value="'Architects Daughter', cursive">Architectural Draft</option>
                    <option value="'Amatic SC', cursive">Block Print (Skinny)</option>
                </optgroup>
            </select></div>
            <div><label>9. Font Size</label><select id="sizePicker">
                <option value="0.04">Smallest</option>
                <option value="0.06">Small</option>
                <option value="0.08" selected>Medium</option>
                <option value="0.10">Large</option>
                <option value="0.12">Largest</option>
            </select></div>
        </div>

        <label>Vertical Nudge <span id="nudgeVal" style="float:right; color:#007bff">55%</span></label>
        <input type="range" id="nudgeSlider" min="10" max="90" value="55" style="width:100%; height:44px;">
    </div>

    <div class="download-area" id="downloadArea">
        <label>10. Export Format</label>
        <select id="formatPicker" style="margin-bottom:10px">
            <option value="image/jpeg">JPG</option>
            <option value="image/png">PNG</option>
        </select>
        <button id="downloadBtn">Download Polaroid</button>
    </div>
</div>

<div id="darkroom" class="modal-overlay">
    <div class="cropper-container-box">
        <img id="cropImage">
    </div>
    <div style="margin-top:15px; display:flex; gap:10px; flex-wrap: wrap; justify-content: center;">
        <button class="btn-secondary" onclick="cropper.rotate(-90)">↺ Rotate</button>
        <button class="btn-secondary" onclick="cropper.rotate(90)">↻ Rotate</button>
        <button style="background:#007bff; color:white;" id="applyCrop">Apply</button>
        <button class="btn-secondary" onclick="document.getElementById('darkroom').style.display='none'">Cancel</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    // --- State ---
    const state = {
        loadedImg: null,
        originalFileName: "polaroid",
        cropper: null,
        rawImageData: null,
        isLoading: false,
    };

    // --- DOM Elements ---
    const elements = {
        imageLoader: document.getElementById('imageLoader'),
        editBtn: document.getElementById('editBtn'),
        darkroom: document.getElementById('darkroom'),
        imageCanvas: document.getElementById('imageCanvas'),
        captionCanvas: document.getElementById('captionCanvas'),
        imageCtx: document.getElementById('imageCanvas').getContext('2d'),
        captionCtx: document.getElementById('captionCanvas').getContext('2d'),
        captionText: document.getElementById('captionText'),
        loadingSpinner: document.getElementById('loadingSpinner'),
        typographyZone: document.getElementById('typographyZone'),
        downloadArea: document.getElementById('downloadArea'),
        nudgeVal: document.getElementById('nudgeVal'),
    };

    // --- Event Listeners ---
    function initListeners() {
        elements.imageLoader.addEventListener('change', handleImageUpload);
        elements.editBtn.onclick = openDarkroom;
        document.getElementById('applyCrop').onclick = applyCrop;
        document.getElementById('downloadBtn').onclick = downloadImage;
        document.getElementById('nudgeSlider').oninput = (e) => {
            elements.nudgeVal.innerText = e.target.value + "%";
            debouncedDrawPolaroid();
        };
        ['colorPicker', 'fontPicker', 'sizePicker', 'filterPicker', 'compressionPicker', 'shadowColorPicker', 'shadowSizePicker'].forEach(id => {
            document.getElementById(id).onchange = debouncedDrawPolaroid;
        });
        elements.captionText.addEventListener('input', updateCaption);
    }

    // --- Debounce for Performance ---
    let debounceTimer;
    function debouncedDrawPolaroid() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(drawPolaroid, 300);
    }

    // --- Loading State ---
    function setLoading(isLoading) {
        state.isLoading = isLoading;
        elements.loadingSpinner.style.display = isLoading ? 'block' : 'none';
    }

    // --- Image Upload ---
    function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.match('image.*')) {
            alert('Please select an image file.');
            return;
        }
        setLoading(true);
        state.originalFileName = file.name.replace(/\.[^/.]+$/, "");
        const reader = new FileReader();
        reader.onload = (event) => {
            state.rawImageData = event.target.result;
            state.loadedImg = new Image();
            state.loadedImg.onload = () => {
                elements.editBtn.style.display = 'block';
                setLoading(false);
                drawPolaroid();
            };
            state.loadedImg.onerror = () => {
                setLoading(false);
                alert('Error loading image.');
            };
            state.loadedImg.src = state.rawImageData;
        };
        reader.readAsDataURL(file);
    }

    // --- Darkroom (Crop/Rotate) ---
    function openDarkroom() {
        elements.darkroom.style.display = 'flex';
        const cropImg = document.getElementById('cropImage');
        cropImg.src = state.rawImageData;
        if (state.cropper) state.cropper.destroy();
        state.cropper = new Cropper(cropImg, { aspectRatio: 1, viewMode: 1, dragMode: 'move' });
    }

    function applyCrop() {
        const croppedCanvas = state.cropper.getCroppedCanvas({ width: 1600, height: 1600 });
        state.loadedImg = new Image();
        state.loadedImg.onload = () => {
            elements.darkroom.style.display = 'none';
            drawPolaroid();
        };
        state.loadedImg.src = croppedCanvas.toDataURL('image/jpeg', 0.95);
    }

    // --- Draw Polaroid (image, frame, shadow) ---
    function drawPolaroid() {
        if (!state.loadedImg) return;

        const fontScale = parseFloat(document.getElementById('sizePicker').value);
        const compScale = parseFloat(document.getElementById('compressionPicker').value);

        const borderTop = state.loadedImg.height * 0.08;
        const borderSide = state.loadedImg.width * 0.08;
        const borderBottom = Math.max(state.loadedImg.height * 0.25 * compScale, state.loadedImg.height * (fontScale * 2.5));

        elements.imageCanvas.width = state.loadedImg.width + (borderSide * 2);
        elements.imageCanvas.height = state.loadedImg.height + borderTop + borderBottom;
        elements.captionCanvas.width = elements.imageCanvas.width;
        elements.captionCanvas.height = elements.imageCanvas.height;

        // Draw frame
        elements.imageCtx.fillStyle = document.getElementById('colorPicker').value;
        elements.imageCtx.fillRect(0, 0, elements.imageCanvas.width, elements.imageCanvas.height);

        // Draw shadow
        const sSize = parseInt(document.getElementById('shadowSizePicker').value);
        const sColor = document.getElementById('shadowColorPicker').value;
        if (sSize > 0) {
            elements.imageCtx.fillStyle = sColor;
            elements.imageCtx.fillRect(borderSide - sSize, borderTop - sSize, state.loadedImg.width + (sSize*2), state.loadedImg.height + (sSize*2));
        }

        // Draw image
        elements.imageCtx.save();
        elements.imageCtx.filter = document.getElementById('filterPicker').value;
        elements.imageCtx.drawImage(state.loadedImg, borderSide, borderTop);
        elements.imageCtx.restore();

        // Show canvases
        elements.imageCanvas.style.display = 'block';
        elements.captionCanvas.style.display = 'block';
        elements.typographyZone.style.display = 'block';
        elements.downloadArea.style.display = 'block';

        // Update caption
        updateCaption();
    }

    // --- Update only the caption ---
    function updateCaption() {
        if (!state.loadedImg) return;

        const fontScale = parseFloat(document.getElementById('sizePicker').value);
        const compScale = parseFloat(document.getElementById('compressionPicker').value);
        const nudgeFactor = parseInt(document.getElementById('nudgeSlider').value) / 100;

        const borderTop = state.loadedImg.height * 0.08;
        const borderSide = state.loadedImg.width * 0.08;
        const borderBottom = Math.max(state.loadedImg.height * 0.25 * compScale, state.loadedImg.height * (fontScale * 2.5));

        // Clear overlay
        elements.captionCtx.clearRect(0, 0, elements.captionCanvas.width, elements.captionCanvas.height);

        // Draw caption
        const text = elements.captionText.value;
        if (text) {
            elements.captionCtx.font = `${state.loadedImg.height * fontScale}px ${document.getElementById('fontPicker').value}`;
            elements.captionCtx.fillStyle = "#222";
            elements.captionCtx.textAlign = "center";
            elements.captionCtx.fillText(
                text,
                elements.captionCanvas.width / 2,
                state.loadedImg.height + borderTop + (borderBottom * nudgeFactor)
            );
        }
    }

    // --- Download ---
    function downloadImage() {
        const now = new Date();
        const timestamp = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}_${now.getHours()}${now.getMinutes()}${now.getSeconds()}`;
        const format = document.getElementById('formatPicker').value;

        // Merge both canvases for download
        const mergedCanvas = document.createElement('canvas');
        mergedCanvas.width = elements.imageCanvas.width;
        mergedCanvas.height = elements.imageCanvas.height;
        const mergedCtx = mergedCanvas.getContext('2d');
        mergedCtx.drawImage(elements.imageCanvas, 0, 0);
        mergedCtx.drawImage(elements.captionCanvas, 0, 0);

        const link = document.createElement('a');
        link.download = `${state.originalFileName}_${timestamp}.${format === 'image/jpeg' ? 'jpg' : 'png'}`;
        link.href = mergedCanvas.toDataURL(format, 0.92);
        link.click();
    }

    // --- Initialize ---
    function init() {
        initListeners();
    }

    init();
</script>

</body>
</html>
