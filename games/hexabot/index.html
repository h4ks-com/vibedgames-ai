<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HexTile Layer Bot</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a0e; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'Courier New',monospace; color:#c8b88a; }
  canvas { display:block; cursor:grab; }
  canvas:active { cursor:grabbing; }
  #controls {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px; z-index:10; flex-wrap:wrap; justify-content:center;
  }
  .btn {
    background:rgba(60,50,30,0.9); color:#c8b88a; border:1px solid #5a4a2a;
    padding:8px 16px; font-family:inherit; font-size:12px; cursor:pointer;
    border-radius:4px; transition:all 0.2s;
  }
  .btn:hover { background:rgba(80,70,40,0.9); border-color:#8a7a4a; }
  .btn.active { background:rgba(100,80,30,0.9); border-color:#c8a848; color:#fff; }
  #hud {
    position:fixed; top:12px; left:12px; z-index:10;
    font-size:11px; line-height:1.6; background:rgba(20,18,10,0.85);
    padding:10px 14px; border-radius:6px; border:1px solid #3a3020;
  }
  #stats {
    position:fixed; top:12px; right:12px; z-index:10;
    font-size:11px; line-height:1.6; background:rgba(20,18,10,0.85);
    padding:10px 14px; border-radius:6px; border:1px solid #3a3020;
    text-align:right;
  }
</style>
</head>
<body>
<div id="hud">
  <div>hexTile LAYER v1.0</div>
  <div id="status">● RUNNING</div>
  <div id="mode">Mode: Spiral Outward</div>
  <div>Drag to pan · Scroll to zoom</div>
</div>
<div id="stats">
  <div>Tiles laid: <span id="count">0</span></div>
  <div>Area: <span id="area">0</span> m²</div>
  <div>Material used: <span id="mat">0</span> kg</div>
  <div>Speed: <span id="speed">1</span>x</div>
</div>
<canvas id="c"></canvas>
<div id="controls">
  <button class="btn active" onclick="setMode('spiral')">🌀 Spiral</button>
  <button class="btn" onclick="setMode('line')">📏 Straight Line</button>
  <button class="btn" onclick="setMode('serpentine')">🐍 Serpentine</button>
  <button class="btn" onclick="setMode('random')">🎲 Random Walk</button>
  <button class="btn" onclick="setSpeed(1)">1x</button>
  <button class="btn" onclick="setSpeed(3)">3x</button>
  <button class="btn" onclick="setSpeed(8)">8x</button>
  <button class="btn" onclick="setSpeed(20)">20x</button>
  <button class="btn" onclick="resetBot()">⟲ Reset</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Hex math
const HEX_SIZE = 22;
const HEX_W = Math.sqrt(3) * HEX_SIZE;
const HEX_H = 2 * HEX_SIZE;

function hexToPixel(q, r) {
  const x = HEX_SIZE * (Math.sqrt(3) * q + Math.sqrt(3)/2 * r);
  const y = HEX_SIZE * (3/2 * r);
  return { x, y };
}

function pixelToHex(px, py) {
  const q = (Math.sqrt(3)/3 * px - 1/3 * py) / HEX_SIZE;
  const r = (2/3 * py) / HEX_SIZE;
  return hexRound(q, r);
}

function hexRound(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds) rr = -rq - rs;
  return { q: rq, r: rr };
}

function hexKey(q, r) { return `${q},${r}`; }

// Camera
let cam = { x: 0, y: 0, zoom: 1 };
let dragging = false, dragStart = { x:0, y:0 }, camStart = { x:0, y:0 };

canvas.addEventListener('mousedown', e => { dragging=true; dragStart={x:e.clientX,y:e.clientY}; camStart={x:cam.x,y:cam.y}; });
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  cam.x = camStart.x + (e.clientX - dragStart.x) / cam.zoom;
  cam.y = camStart.y + (e.clientY - dragStart.y) / cam.zoom;
});
canvas.addEventListener('mouseup', () => dragging=false);
canvas.addEventListener('mouseleave', () => dragging=false);
canvas.addEventListener('wheel', e => {
  const f = e.deltaY > 0 ? 0.9 : 1.1;
  cam.zoom = Math.max(0.2, Math.min(5, cam.zoom * f));
  e.preventDefault();
}, { passive: false });

// Touch
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { dragging=true; dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY}; camStart={x:cam.x,y:cam.y}; }
  if (e.touches.length === 2) { lastTouchDist = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY); }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) { cam.x = camStart.x + (e.touches[0].clientX - dragStart.x)/cam.zoom; cam.y = camStart.y + (e.touches[0].clientY - dragStart.y)/cam.zoom; }
  if (e.touches.length === 2) { const d = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY); cam.zoom = Math.max(0.2,Math.min(5,cam.zoom*(d/lastTouchDist))); lastTouchDist=d; }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => dragging=false);

// Tile colors - earthy organic tones
const TILE_PALETTES = [
  { base:'#8B7355', dark:'#6B5335', light:'#A09070', name:'Coconut Fiber' },
  { base:'#5C4033', dark:'#3C2013', light:'#7C6053', name:'Dark Mulch' },
  { base:'#6B4423', dark:'#4B2403', light:'#8B6443', name:'Leaf Mold' },
  { base:'#556B2F', dark:'#354B0F', light:'#758B4F', name:'Fresh Green' },
  { base:'#8B7D6B', dark:'#6B5D4B', light:'#AB9D8B', name:'Compost' },
  { base:'#7B6B4B', dark:'#5B4B2B', light:'#9B8B6B', name:'Root Mix' },
  { base:'#6E5B3E', dark:'#4E3B1E', light:'#8E7B5E', name:'Bark Blend' },
  { base:'#4A5D3A', dark:'#2A3D1A', light:'#6A7D5A', name:'Chopped Leaf' },
  { base:'#7D6B50', dark:'#5D4B30', light:'#9D8B70', name:'Dirt Rich' },
  { base:'#5D4E37', dark:'#3D2E17', light:'#7D6E57', name:'Mud Press' },
];

function hashCoords(q, r) {
  let h = q * 374761393 + r * 668265263;
  h = (h ^ (h >> 13)) * 1274126177;
  h = h ^ (h >> 16);
  return Math.abs(h);
}

function getTileStyle(q, r) {
  const h = hashCoords(q, r);
  const palette = TILE_PALETTES[h % TILE_PALETTES.length];
  const variation = (h % 20 - 10) / 100;
  return {
    ...palette,
    variation,
    hasFiber: (h % 7) < 2,
    hasLeaf: (h % 11) < 3,
    hasChunk: (h % 13) < 2,
    h
  };
}

// Materials
const MATERIALS = [
  { name:'Coconut Coir', weight:2.5, color:'#9B8B6B' },
  { name:'Leaf Mulch', weight:3.0, color:'#556B2F' },
  { name:'Root Fiber', weight:1.5, color:'#6B4423' },
  { name:'Soil Blend', weight:4.0, color:'#5C4033' },
  { name:'Compost', weight:2.0, color:'#6E5B3E' },
  { name:'Clay Binder', weight:1.0, color:'#7B6B4B' },
];

// Bot state
let bot = {
  x: 0, y: 0,
  targetQ: 0, targetR: 0,
  angle: 0,
  trail: [],
  tiles: new Map(),
  tileCount: 0,
  mode: 'spiral',
  speed: 1,
  // Spiral state
  spiralAngle: 0,
  spiralRadius: 0,
  spiralStep: 0,
  // Line state
  lineQ: 0, lineR: 0, lineDir: 0,
  // Serpentine
  serpQ: 0, serpR: 0, serpDir: 0, serpRow: 0,
  // Random
  randQ: 0, randR: 0,
  // Animation
  placeTimer: 0,
  placeInterval: 30,
  laying: false,
  currentTile: null,
  machineAngle: 0,
  wheelAngle: 0,
  compactorAngle: 0,
};

function resetBot() {
  bot.tiles.clear();
  bot.tileCount = 0;
  bot.x = 0; bot.y = 0;
  bot.trail = [];
  bot.spiralAngle = 0;
  bot.spiralRadius = 0;
  bot.spiralStep = 0;
  bot.lineQ = 0; bot.lineR = 0; bot.lineDir = 0;
  bot.serpQ = 0; bot.serpR = 0; bot.serpDir = 0; bot.serpRow = 0;
  bot.randQ = 0; bot.randR = 0;
  bot.placeTimer = 0;
  bot.laying = false;
}

function setMode(mode) {
  bot.mode = mode;
  document.getElementById('mode').textContent = 'Mode: ' + mode.charAt(0).toUpperCase() + mode.slice(1);
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  // Reset position-specific state
  if (mode === 'spiral') { bot.spiralAngle = 0; bot.spiralRadius = 0; bot.spiralStep = 0; }
  if (mode === 'line') { bot.lineQ = 0; bot.lineR = 0; bot.lineDir = 0; }
  if (mode === 'serpentine') { bot.serpQ = 0; bot.serpR = 0; bot.serpDir = 0; bot.serpRow = 0; }
}

function setSpeed(s) {
  bot.speed = s;
  bot.placeInterval = Math.max(3, Math.floor(30 / s));
  document.getElementById('speed').textContent = s;
}

function getNextHex() {
  switch(bot.mode) {
    case 'spiral': return getSpiralNext();
    case 'line': return getLineNext();
    case 'serpentine': return getSerpentineNext();
    case 'random': return getRandomNext();
  }
}

function getSpiralNext() {
  const angleStep = 0.5;
  const radiusStep = 0.018;
  bot.spiralAngle += angleStep;
  bot.spiralRadius += radiusStep;
  const x = bot.spiralRadius * Math.cos(bot.spiralAngle);
  const y = bot.spiralRadius * Math.sin(bot.spiralAngle);
  const hex = pixelToHex(x, y);
  // Snap to nearest hex grid
  return hex;
}

function getLineNext() {
  // Zigzag in a line
  const directions = [
    {q:1,r:0}, {q:1,r:-1}, {q:0,r:-1}, {q:-1,r:0}, {q:-1,r:1}, {q:0,r:1}
  ];
  bot.lineDir = bot.lineDir % directions.length;
  const d = directions[bot.lineDir];
  bot.lineQ += d.q;
  bot.lineR += d.r;
  // Every 6 steps, turn slightly
  if (bot.tileCount % 6 === 0) {
    bot.lineDir = (bot.lineDir + 1) % directions.length;
  }
  return { q: bot.lineQ, r: bot.lineR };
}

function getSerpentineNext() {
  if (bot.serpDir === 0) {
    bot.serpQ++;
    if (bot.serpQ > 15 + bot.serpRow) { bot.serpDir = 1; }
  } else {
    bot.serpQ--;
    if (bot.serpQ < -15 - bot.serpRow) { bot.serpDir = 0; bot.serpR++; bot.serpRow++; }
  }
  return { q: bot.serpQ, r: bot.serpR };
}

function getRandomNext() {
  const dirs = [{q:1,r:0},{q:1,r:-1},{q:0,r:-1},{q:-1,r:0},{q:-1,r:1},{q:0,r:1}];
  const d = dirs[Math.floor(Math.random() * 6)];
  // Try to stay near origin, with some drift
  if (Math.abs(bot.randQ) > 30 || Math.abs(bot.randR) > 30) {
    // Bias toward center
    bot.randQ += Math.sign(-bot.randQ) || d.q;
    bot.randR += Math.sign(-bot.randR) || d.r;
  } else {
    bot.randQ += d.q;
    bot.randR += d.r;
  }
  return { q: bot.randQ, r: bot.randR };
}

function update() {
  bot.machineAngle += 0.02;
  bot.wheelAngle += 0.15 * bot.speed;
  bot.compactorAngle += 0.1 * bot.speed;

  bot.placeTimer++;
  if (bot.placeTimer >= bot.placeInterval) {
    bot.placeTimer = 0;
    const hex = getNextHex();
    const key = hexKey(hex.q, hex.r);
    if (!bot.tiles.has(key)) {
      const style = getTileStyle(hex.q, hex.r);
      bot.tiles.set(key, { q: hex.q, r: hex.r, ...style, age: 0 });
      bot.tileCount++;
      bot.currentTile = { q: hex.q, r: hex.r, ...style, age: 0 };
      bot.laying = true;
    }
  }

  // Move bot toward current tile smoothly
  if (bot.currentTile) {
    const target = hexToPixel(bot.currentTile.q, bot.currentTile.r);
    const dx = target.x - bot.x;
    const dy = target.y - bot.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 0.5) {
      const moveSpeed = Math.min(dist, 4 * bot.speed);
      bot.x += (dx / dist) * moveSpeed;
      bot.y += (dy / dist) * moveSpeed;
      bot.angle = Math.atan2(dy, dx);
    }
  }

  // Trail
  bot.trail.push({ x: bot.x, y: bot.y, age: 0 });
  if (bot.trail.length > 150) bot.trail.shift();
  bot.trail.forEach(t => t.age++);

  // Age tiles
  bot.tiles.forEach(t => { if (t.age < 1) t.age = Math.min(1, t.age + 0.05); });

  // Update HUD
  document.getElementById('count').textContent = bot.tileCount;
  document.getElementById('area').textContent = (bot.tileCount * 0.018).toFixed(1);
  document.getElementById('mat').textContent = (bot.tileCount * 0.35).toFixed(0);
}

function drawHex(cx, cy, size) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const x = cx + size * Math.cos(angle);
    const y = cy + size * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawTile(tile) {
  const { x, y } = hexToPixel(tile.q, tile.r);
  const sx = x, sy = y;

  // Check if on screen
  const screenX = (sx - cam.x) * cam.zoom + W/2;
  const screenY = (sy - cam.y) * cam.zoom + H/2;
  if (screenX < -50 || screenX > W+50 || screenY < -50 || screenY > H+50) return;

  const scale = Math.min(1, tile.age * 2);
  const s = HEX_SIZE * scale * cam.zoom;

  ctx.save();
  ctx.translate(screenX, screenY);
  ctx.scale(scale, scale);

  // Base hex
  drawHex(0, 0, s);
  ctx.fillStyle = tile.base;
  ctx.fill();

  // Variation overlay
  if (tile.variation > 0) {
    drawHex(0, 0, s);
    ctx.fillStyle = `rgba(255,255,255,${tile.variation * 0.3})`;
    ctx.fill();
  } else {
    drawHex(0, 0, s);
    ctx.fillStyle = `rgba(0,0,0,${Math.abs(tile.variation) * 0.5})`;
    ctx.fill();
  }

  // Texture details - fiber strands
  if (tile.hasFiber) {
    ctx.strokeStyle = `rgba(180,160,120,${0.2 + tile.h % 10 * 0.02})`;
    ctx.lineWidth = 0.8;
    for (let i = 0; i < 3; i++) {
      const a = (tile.h * (i+1) * 17) % 360 * Math.PI / 180;
      const r1 = s * 0.2, r2 = s * 0.7;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
      ctx.quadraticCurveTo(
        Math.cos(a + 0.3) * s * 0.5,
        Math.sin(a + 0.3) * s * 0.5,
        Math.cos(a - 0.2) * r2,
        Math.sin(a - 0.2) * r2
      );
      ctx.stroke();
    }
  }

  // Leaf chunks
  if (tile.hasLeaf) {
    ctx.fillStyle = `rgba(80,110,40,${0.25 + tile.h % 8 * 0.03})`;
    for (let i = 0; i < 2; i++) {
      const lx = ((tile.h * (i+3) * 13) % 20 - 10) * s / 25;
      const ly = ((tile.h * (i+7) * 19) % 20 - 10) * s / 25;
      ctx.beginPath();
      ctx.ellipse(lx, ly, s*0.12, s*0.06, (tile.h * i) % 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Chunky bits (root pieces, twigs)
  if (tile.hasChunk) {
    ctx.fillStyle = `rgba(90,65,35,${0.3 + tile.h % 6 * 0.04})`;
    for (let i = 0; i < 2; i++) {
      const cx2 = ((tile.h * (i+2) * 23) % 16 - 8) * s / 25;
      const cy2 = ((tile.h * (i+5) * 31) % 16 - 8) * s / 25;
      ctx.beginPath();
      ctx.arc(cx2, cy2, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Hex border
  drawHex(0, 0, s);
  ctx.strokeStyle = tile.dark;
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Inner highlight
  drawHex(0, 0, s * 0.92);
  ctx.strokeStyle = `rgba(200,180,140,0.1)`;
  ctx.lineWidth = 0.5;
  ctx.stroke();

  ctx.restore();
}

function drawBot() {
  const screenX = (bot.x - cam.x) * cam.zoom + W/2;
  const screenY = (bot.y - cam.y) * cam.zoom + H/2;
  const s = cam.zoom;

  ctx.save();
  ctx.translate(screenX, screenY);
  ctx.rotate(bot.angle);

  // Tracks/trail behind bot
  ctx.rotate(-bot.angle);
  if (bot.trail.length > 2) {
    ctx.strokeStyle = 'rgba(100,85,50,0.15)';
    ctx.lineWidth = 2 * s;
    ctx.setLineDash([4*s, 8*s]);
    ctx.beginPath();
    ctx.moveTo(
      (bot.trail[0].x - bot.x) * s,
      (bot.trail[0].y - bot.y) * s
    );
    for (let i = 1; i < bot.trail.length; i += 3) {
      ctx.lineTo(
        (bot.trail[i].x - bot.x) * s,
        (bot.trail[i].y - bot.y) * s
      );
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.rotate(bot.angle);

  // Machine body
  const bw = 28 * s, bh = 40 * s;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(-bw/2 + 3*s, -bh/2 + 3*s, bw, bh);

  // Main body
  const bodyGrad = ctx.createLinearGradient(-bw/2, -bh/2, bw/2, bh/2);
  bodyGrad.addColorStop(0, '#5a5a5a');
  bodyGrad.addColorStop(0.5, '#7a7a7a');
  bodyGrad.addColorStop(1, '#4a4a4a');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(-bw/2, -bh/2, bw, bh, 4*s);
  ctx.fill();
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 1.5*s;
  ctx.stroke();

  // Hopper (back top)
  ctx.fillStyle = '#6a5a40';
  ctx.beginPath();
  ctx.moveTo(-bw*0.4, -bh/2);
  ctx.lineTo(-bw*0.55, -bh/2 - 14*s);
  ctx.lineTo(bw*0.55, -bh/2 - 14*s);
  ctx.lineTo(bw*0.4, -bh/2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#4a3a20';
  ctx.lineWidth = 1*s;
  ctx.stroke();

  // Material in hopper
  ctx.fillStyle = '#5C4033';
  ctx.beginPath();
  ctx.moveTo(-bw*0.35, -bh/2 - 2*s);
  ctx.lineTo(-bw*0.45, -bh/2 - 11*s);
  ctx.lineTo(bw*0.45, -bh/2 - 11*s);
  ctx.lineTo(bw*0.35, -bh/2 - 2*s);
  ctx.closePath();
  ctx.fill();

  // Wavy material surface in hopper
  ctx.strokeStyle = '#6B4423';
  ctx.lineWidth = 1*s;
  ctx.beginPath();
  for (let i = -bw*0.4; i < bw*0.4; i += 3*s) {
    const yOff = Math.sin(i * 0.3 + bot.machineAngle * 3) * 2*s;
    ctx.lineTo(i, -bh/2 - 6*s + yOff);
  }
  ctx.stroke();

  // Compactor wheel (front bottom)
  const wheelR = 8 * s;
  const wheelX = 0, wheelY = bh/2 + 2*s;
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.arc(wheelX, wheelY, wheelR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5*s;
  ctx.stroke();

  // Wheel spokes
  ctx.strokeStyle = '#777';
  ctx.lineWidth = 1*s;
  for (let i = 0; i < 4; i++) {
    const a = bot.compactorAngle + (Math.PI/2) * i;
    ctx.beginPath();
    ctx.moveTo(wheelX, wheelY);
    ctx.lineTo(wheelX + Math.cos(a)*wheelR*0.8, wheelY + Math.sin(a)*wheelR*0.8);
    ctx.stroke();
  }

  // Conveyor belt (bottom)
  ctx.fillStyle = '#444';
  ctx.fillRect(-bw*0.35, bh/2 - 6*s, bw*0.7, 6*s);
  // Belt ridges
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1*s;
  for (let i = -bw*0.3; i < bw*0.35; i += 4*s) {
    const ox = (bot.wheelAngle * 3) % 4*s;
    ctx.beginPath();
    ctx.moveTo(i + ox, bh/2 - 6*s);
    ctx.lineTo(i + ox, bh/2);
    ctx.stroke();
  }

  // Wheels (sides)
  const wheelPositions = [
    { x: -bw/2 - 2*s, y: -bh*0.25 },
    { x: -bw/2 - 2*s, y: bh*0.2 },
    { x: bw/2 + 2*s, y: -bh*0.25 },
    { x: bw/2 + 2*s, y: bh*0.2 },
  ];
  wheelPositions.forEach(wp => {
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(wp.x, wp.y, 5*s, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1*s;
    ctx.stroke();
    // Tread
    ctx.strokeStyle = '#555';
    for (let i = 0; i < 6; i++) {
      const a = bot.wheelAngle + (Math.PI/3) * i;
      ctx.beginPath();
      ctx.moveTo(wp.x + Math.cos(a)*4*s, wp.y + Math.sin(a)*4*s);
      ctx.lineTo(wp.x + Math.cos(a)*6*s, wp.y + Math.sin(a)*6*s);
      ctx.stroke();
    }
  });

  // Tile mold shape at output (front)
  ctx.fillStyle = '#5a5a4a';
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI/3) * i - Math.PI/6;
    const r = 7 * s;
    const px = Math.cos(a) * r;
    const py = bh/2 + 8*s + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#3a3a2a';
  ctx.lineWidth = 1*s;
  ctx.stroke();

  // Fresh tile being pressed
  if (bot.laying) {
    ctx.fillStyle = 'rgba(139,115,85,0.6)';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI/3) * i - Math.PI/6;
      const r = 6 * s;
      const px = Math.cos(a) * r;
      const py = bh/2 + 8*s + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
  }

  // Steam/exhaust particles
  if (bot.speed > 1 || Math.random() > 0.7) {
    for (let i = 0; i < 3; i++) {
      const px = (Math.random()-0.5) * bw * 0.5;
      const py = -bh/2 - 14*s - Math.random() * 10*s;
      const alpha = 0.1 + Math.random() * 0.15;
      ctx.fillStyle = `rgba(180,170,150,${alpha})`;
      ctx.beginPath();
      ctx.arc(px + Math.sin(bot.machineAngle + i)*3*s, py - i*4*s, (2 + Math.random()*3)*s, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Indicator light
  ctx.fillStyle = bot.laying ? '#44ff44' : '#ffaa00';
  ctx.shadowBlur = 6*s;
  ctx.shadowColor = bot.laying ? '#44ff44' : '#ffaa00';
  ctx.beginPath();
  ctx.arc(bw/2 - 4*s, -bh/2 + 4*s, 2*s, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Label
  ctx.rotate(-bot.angle);
  ctx.fillStyle = 'rgba(200,184,138,0.7)';
  ctx.font = `${8*s}px "Courier New"`;
  ctx.textAlign = 'center';
  ctx.fillText('HEXLAYER', 0, -bh/2 - 20*s);

  ctx.restore();
}

function drawGround() {
  // Infinite ground texture
  const gridSize = 60 * cam.zoom;
  const offsetX = (-cam.x * cam.zoom + W/2) % gridSize;
  const offsetY = (-cam.y * cam.zoom + H/2) % gridSize;

  ctx.fillStyle = 'rgba(40,35,25,0.4)';
  for (let x = offsetX - gridSize; x < W + gridSize; x += gridSize) {
    for (let y = offsetY - gridSize; y < H + gridSize; y += gridSize) {
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

function draw() {
  // Background - earthy gradient
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  bgGrad.addColorStop(0, '#2a2518');
  bgGrad.addColorStop(1, '#1a1508');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  drawGround();

  // Draw tiles
  bot.tiles.forEach(tile => drawTile(tile));

  // Draw bot
  drawBot();

  // Material readout (bottom-left)
  ctx.fillStyle = 'rgba(20,18,10,0.7)';
  ctx.fillRect(8, H - 100, 200, 88);
  ctx.strokeStyle = '#3a3020';
  ctx.lineWidth = 1;
  ctx.strokeRect(8, H - 100, 200, 88);
  ctx.fillStyle = '#8a7a4a';
  ctx.font = '10px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText('MATERIAL FEED:', 16, H - 84);
  MATERIALS.forEach((m, i) => {
    const y = H - 68 + i * 12;
    ctx.fillStyle = m.color;
    ctx.fillRect(16, y - 6, 8, 8);
    ctx.fillStyle = '#a09070';
    ctx.fillText(`${m.name} ${m.weight}kg/batch`, 30, y + 2);
  });
}

function loop() {
  for (let i = 0; i < bot.speed; i++) update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
