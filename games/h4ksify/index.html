<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>h4ksify</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#121212;--surface:#1e1e1e;--surface2:#282828;--text:#fff;--text2:#b3b3b3;--accent:#1db954;--accent2:#1ed760;--radius:8px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
.app{display:flex;height:100vh;max-width:1400px;margin:0 auto}

/* Sidebar */
.sidebar{width:260px;background:#000;display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s}
.sidebar-logo{padding:20px 24px;font-size:24px;font-weight:900;color:var(--accent);letter-spacing:-1px}
.sidebar-logo span{color:var(--text)}
.nav-item{display:flex;align-items:center;padding:10px 24px;color:var(--text2);cursor:pointer;font-size:15px;font-weight:600;gap:16px;border-radius:4px;margin:2px 12px;transition:.2s}
.nav-item:hover,.nav-item.active{color:var(--text)}
.nav-item.active{background:var(--surface2)}
.nav-icon{font-size:20px;width:28px;text-align:center}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-header{padding:16px 32px;display:flex;align-items:center;gap:16px;justify-content:space-between;flex-shrink:0}
.main-header h1{font-size:28px;font-weight:800}
.header-actions{display:flex;gap:8px}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:26px;cursor:pointer;padding:4px 8px}

/* Content area */
.content{flex:1;overflow-y:auto;padding:0 32px 140px 32px}
.content::-webkit-scrollbar{width:8px}
.content::-webkit-scrollbar-thumb{background:#555;border-radius:4px}
.section-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:20px;color:var(--text2)}

/* Track list */
.track-grid{display:flex;flex-direction:column;gap:6px}
.track{display:flex;align-items:center;padding:8px 14px;border-radius:var(--radius);cursor:pointer;transition:background .15s;position:relative}
.track:hover{background:var(--surface2)}
.track.playing{background:var(--surface2)}
.track-num{width:36px;text-align:center;font-size:14px;color:var(--text2);font-weight:500;flex-shrink:0}
.track:hover .track-num,.track.playing .track-num{display:none}
.track-play-btn{display:none;position:absolute;left:18px;font-size:14px}
.track:hover .track-play-btn,.track.playing .track-play-btn{display:block}
.track-info{flex:1;min-width:0;margin-left:4px}
.track-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-subtitle{font-size:13px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-duration{color:var(--text2);font-size:13px;padding-right:12px;flex-shrink:0}
.equalizer{display:inline-flex;align-items:flex-end;gap:2px;height:14px;margin-left:8px}
.eq-bar{width:3px;background:var(--accent);border-radius:1px;animation:eq .8s ease-in-out infinite alternate}
.eq-bar:nth-child(2){animation-delay:.2s}.eq-bar:nth-child(3){animation-delay:.4s}
@keyframes eq{from{height:3px}to{height:14px}}

/* Lyrics panel */
.lyrics-panel{margin-top:32px;background:var(--surface);border-radius:var(--radius);padding:24px;display:none}
.lyrics-panel.visible{display:block}
.lyrics-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.lyrics-header h3{font-size:18px;font-weight:700}
.lyrics-toggle{background:none;border:1px solid var(--text2);color:var(--text2);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:13px;transition:.2s}
.lyrics-toggle:hover,.lyrics-toggle.karaoke{border-color:var(--accent);color:var(--accent)}
.lyrics-text{font-size:15px;line-height:2;color:var(--text2);white-space:pre-wrap;max-height:400px;overflow-y:auto}
.lyrics-text::-webkit-scrollbar{width:6px}
.lyrics-text::-webkit-scrollbar-thumb{background:#555;border-radius:3px}
.lyric-line{display:block;padding:4px 8px;border-radius:4px;transition:all .5s ease}
.lyrics-text.karaoke .lyric-line{opacity:.35}
.lyrics-text.karaoke .lyric-line.active{opacity:1;color:var(--accent);font-weight:700;transform:scale(1.03)}

/* Player bar */
.player-bar{position:fixed;bottom:0;left:0;right:0;height:80px;background:#181818;border-top:1px solid #282828;display:flex;align-items:center;padding:0 16px;z-index:100;max-width:1400px;margin:0 auto}
.player-track{display:flex;align-items:center;gap:12px;width:30%;min-width:0}
.player-art{width:56px;height:56px;border-radius:4px;background:var(--surface2);object-fit:cover;flex-shrink:0}
.player-info{min-width:0}
.player-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-artist{font-size:11px;color:var(--text2);margin-top:2px}
.player-like{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;flex-shrink:0}
.player-controls{flex:40%;display:flex;flex-direction:column;align-items:center;gap:6px}
.control-row{display:flex;align-items:center;gap:20px}
.ctrl-btn{background:none;border:none;color:var(--text);cursor:pointer;font-size:18px;opacity:.7;transition:.2s}
.ctrl-btn:hover{opacity:1}
.ctrl-btn.play{font-size:22px;color:var(--text);opacity:1}
.ctrl-btn.play.pause{font-size:28px}
.progress-row{display:flex;align-items:center;gap:10px;width:100%;max-width:600px}
.progress-bar{flex:1;height:4px;background:#555;border-radius:2px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:var(--text);border-radius:2px;width:0%;position:relative;pointer-events:none}
.progress-handle{position:absolute;right:-6px;top:-4px;width:12px;height:12px;background:var(--text);border-radius:50%;opacity:0;transition:opacity .15s}
.progress-bar:hover .progress-handle{opacity:1}
.time{font-size:11px;color:var(--text2);min-width:38px;text-align:center}
.player-extra{flex:30%;display:flex;justify-content:flex-end;align-items:center;gap:16px}
.extra-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;opacity:.7}
.extra-btn:hover{opacity:1}
.volume-slider{width:90px;height:4px;background:#555;border-radius:2px;-webkit-appearance:none;appearance:none}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--text);border-radius:50%;cursor:pointer}

/* Mobile overlay */
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;backdrop-filter:blur(20px)}
.mobile-overlay.open{display:flex;flex-direction:column}
.mo-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.mo-close{background:none;border:none;color:var(--text);font-size:28px;cursor:pointer}
.mo-art{width:100%;aspect-ratio:1;object-fit:cover}
.mo-info{text-align:center;padding:16px}
.mo-title{font-size:20px;font-weight:700}
.mo-artist{color:var(--text2);margin-top:4px}
.mo-progress{padding:0 24px;display:flex;align-items:center;gap:10px;margin:12px 0}
.mo-controls{display:flex;justify-content:center;align-items:center;gap:32px;padding:8px 0 24px}
.mo-ctrl{background:none;border:none;color:var(--text);font-size:28px;cursor:pointer}
.mo-ctrl.play-pause{font-size:42px;color:var(--text)}
.mo-lyrics{flex:1;overflow-y:auto;padding:0 28px 32px;text-align:center}
.mo-lyrics .lyric-line{font-size:17px;line-height:2.2;color:var(--text2);padding:8px 0;transition:all .5s}
.mo-lyrics .lyric-line.active{color:var(--accent);font-weight:700;font-size:19px}

/* Loading */
.loading{text-align:center;padding:60px 0;color:var(--text2)}
.spinner{display:inline-block;width:36px;height:36px;border:3px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:300;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:block}
  .main-header{padding:12px 16px}
  .main-header h1{font-size:22px}
  .content{padding:0 16px 100px 16px}
  .player-bar{height:72px;padding:0 12px}
  .player-track{width:40%}
  .player-info{display:none}
  .player-extra{display:none}
  .player-controls{flex:60%}
  .progress-row{max-width:none}
  .time{display:none}
  .lyrics-panel{margin-top:20px;padding:16px}
  .mobile-overlay{display:flex!important;flex-direction:column!important}
}
</style>
</head>
<body>

<div class="app">
<div class="sidebar" id="sidebar">
<div class="sidebar-logo">🎵 <span>h4ksify</span></div>
<div class="nav-item active"><span class="nav-icon">🏠</span> Home</div>
<div class="nav-item"><span class="nav-icon">✨</span> Generated</div>
<div class="nav-item"><span class="nav-icon">🎚️</span> Covers</div>
<div style="flex:1"></div>
</div>

<div class="main">
<div class="main-header">
<button class="hamburger" onclick="toggleSidebar()">☰</button>
<h1 id="viewTitle">All Songs</h1>
<div class="header-actions"></div>
</div>

<div class="content" id="content">
<div class="loading"><div class="spinner"></div><br>Loading songs...</div>
</div>

<!-- Desktop Lyrics -->
<div class="lyrics-panel" id="lyricsPanel">
<div class="lyrics-header">
<h3 id="lyricsTitle">Lyrics</h3>
<button class="lyrics-toggle" id="lyricsToggle" onclick="toggleKaraoke()">🎤 Karaoke</button>
</div>
<div class="lyrics-text" id="lyricsText"></div>
</div>
</div>
</div>

<!-- Player Bar -->
<div class="player-bar" id="playerBar">
<div class="player-track">
<img class="player-art" id="playerArt" src="" alt="">
<div class="player-info">
<div class="player-title" id="playerTitle">No track playing</div>
<div class="player-artist" id="playerArtist">—</div>
</div>
<button class="player-like" onclick="toggleLike()" id="likeBtn">♡</button>
</div>
<div class="player-controls">
<div class="control-row">
<button class="ctrl-btn" onclick="shufflePlay()">⇌</button>
<button class="ctrl-btn" onclick="prevTrack()">⏮</button>
<button class="ctrl-btn play play-pause" id="playPauseBtn" onclick="togglePlayPause()">▶</button>
<button class="ctrl-btn" onclick="nextTrack()">⏭</button>
<button class="ctrl-btn" onclick="toggleRepeat()" id="repeatBtn">↻</button>
</div>
<div class="progress-row">
<span class="time" id="curTime">0:00</span>
<div class="progress-bar" id="progressBar" onclick="seek(event)">
<div class="progress-fill" id="progressFill"></div>
<div class="progress-handle"></div>
</div>
<span class="time" id="totTime">0:00</span>
</div>
</div>
<div class="player-extra">
<button class="extra-btn" onclick="queueShow()">📋</button>
<input type="range" class="volume-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
<button class="extra-btn" onclick="openMobilePlayer()" id="lyricsBtn">📝</button>
</div>
</div>
</div>

<!-- Mobile Fullscreen Overlay -->
<div class="mobile-overlay" id="mobileOverlay" onclick="if(event.target===this)closeMobilePlayer()">
<div class="mo-header">
<button class="mo-close" onclick="closeMobilePlayer()">▼</button>
<span style="font-weight:700">Now Playing</span>
<div style="width:28px"></div>
</div>
<img class="mo-art" id="moArt" src="" alt="">
<div class="mo-info">
<div class="mo-title" id="moTitle"></div>
<div class="mo-artist" id="moArtist"></div>
</div>
<div class="mo-progress">
<span class="time" id="moCurTime">0:00</span>
<div class="progress-bar" onclick="seek(event)" style="flex:1">
<div class="progress-fill" id="moProgressFill"></div>
</div>
<span class="time" id="moTotTime">0:00</span>
</div>
<div class="mo-controls">
<button class="mo-ctrl" onclick="prevTrack()">⏮</button>
<button class="mo-ctrl play-pause" id="moPlayBtn" onclick="togglePlayPause()">▶</button>
<button class="mo-ctrl" onclick="nextTrack()">⏭</button>
</div>
<div class="mo-lyrics" id="moLyrics"></div>
</div>

<audio id="audio" preload="auto" onended="onEnded()" ontimeupdate="onTimeUpdate()"></audio>

<script>
const S3_BASE='https://s3-api.t3ks.com/suno';
let tracks=[],currentIdx=-1,isShuffled=false,repeatMode=0,karaokeMode=false;
const audio=document.getElementById('audio');
let lyricLines=[],lyricTimings=[];

async function loadSongs(){
try{
const resp=await fetch(S3_BASE+'/?list-type=2&prefix=songs/&delimiter=/');
const txt=await resp.text();
const parser=new DOMParser();
const xml=parser.parseFromString(txt,'application/xml');
const keys=xml.querySelectorAll('Key');
const ids=[];
keys.forEach(k=>{
const t=k.textContent;
const m=t.match(/^songs\/([a-f0-9-]+)\.json$/);
if(m)ids.push(m[1]);
});
const loaded=[];
for(const id of ids){
try{
const r=await fetch(S3_BASE+'/songs/'+id+'.json');
const d=await r.json();
d.id=id;
loaded.push(d);
}catch(e){}
}
tracks=loaded.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
renderTracks();
}catch(e){
document.getElementById('content').innerHTML='<p style="color:#f44;padding:20px">Failed to load songs.</p>';
}
}

function renderTracks(){
const c=document.getElementById('content');
if(!tracks.length){c.innerHTML='<p style="color:#b3b3b3;padding:40px;text-align:center">No songs found.</p>';return;}
let h=`<div class="section-title">${tracks.length} Songs</div><div class="track-grid">`;
tracks.forEach((t,i)=>{
const dur=fmtDur(t.duration||0);
const isPlaying=i===currentIdx;
h+=`<div class="track${isPlaying?' playing':''}" onclick="playTrack(${i})" data-i="${i}">
<span class="track-num">${i+1}</span>
<span class="track-play-btn">${isPlaying?'⏸':'▶'}</span>
<div class="track-info">
<div class="track-title">${esc(t.title||'Untitled')}</div>
<div class="track-subtitle">${t.display_name||t.prompt?t.prompt.substring(0,60):''}</div>
</div>
<span class="track-duration">${dur}</span>
${isPlaying?'<span class="equalizer"><span class="eq-bar"></span><span class="eq-bar"></span><span class="eq-bar"></span></span>':''}
</div>`;
});
c.innerHTML=h+'</div>';
}

function playTrack(i){
currentIdx=i;
const t=tracks[i];
audio.src=t.audio_url||S3_BASE+'/songs/'+t.id+'.mp3';
audio.play().catch(()=>{});
updatePlayerUI();
renderTracks();
showLyrics(t);
document.getElementById('moArt').src=t.cover_url||t.suno_image_url||'';
document.getElementById('moTitle').textContent=t.title||'Untitled';
document.getElementById('moArtist').textContent=t.display_name||'Unknown Artist';
renderMoLyrics(t);
}

function updatePlayerUI(){
const t=tracks[currentIdx];
if(!t)return;
document.getElementById('playerArt').src=t.cover_url||t.suno_image_url||'';
document.getElementById('playerTitle').textContent=t.title||'Untitled';
document.getElementById('playerArtist').textContent=t.display_name||'Unknown Artist';
document.getElementById('totTime').textContent=fmtDur(t.duration||0);
document.getElementById('moTotTime').textContent=fmtDur(t.duration||0);
document.getElementById('moArt').src=t.cover_url||t.suno_image_url||'';
document.getElementById('moTitle').textContent=t.title||'Untitled';
document.getElementById('moArtist').textContent=t.display_name||'Unknown Artist';
}

function togglePlayPause(){
if(audio.paused){audio.play();document.getElementById('playPauseBtn').textContent='⏸';document.getElementById('playPauseBtn').classList.add('pause');document.getElementById('moPlayBtn').textContent='⏸'}
else{audio.pause();document.getElementById('playPauseBtn').textContent='▶';document.getElementById('playPauseBtn').classList.remove('pause');document.getElementById('moPlayBtn').textContent='▶'}
}

function prevTrack(){if(tracks.length){const i=(currentIdx-1+tracks.length)%tracks.length;playTrack(i)}}
function nextTrack(){if(tracks.length){const i=(currentIdx+1)%tracks.length;playTrack(i)}}
function onEnded(){if(repeatMode===2){audio.currentTime=0;audio.play()}else if(currentIdx<tracks.length-1)nextTrack();else if(repeatMode===1){playTrack(0)}}
function shufflePlay(){isShuffled=!isShuffled;if(isShuffled){for(let i=tracks.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tracks[i],tracks[j]]=[tracks[j],tracks[i]]}renderTracks()}}
function toggleRepeat(){repeatMode=(repeatMode+1)%3;const b=document.getElementById('repeatBtn');b.textContent=[,'↻','⟲'][repeatMode];b.style.opacity=repeatMode?1:.7}
function setVolume(v){audio.volume=v/100}
function seek(e){const bar=e.currentTarget;const rect=bar.getBoundingClientRect();const pct=(e.clientX-rect.left)/rect.width;audio.currentTime=pct*audio.duration}
function toggleLike(){const b=document.getElementById('likeBtn');b.textContent=b.textContent==='♡'?'♥':'♡'}

function onTimeUpdate(){
if(audio.duration){
const pct=(audio.currentTime/audio.duration)*100;
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('moProgressFill').style.width=pct+'%';
document.getElementById('curTime').textContent=fmtDur(audio.currentTime);
document.getElementById('moCurTime').textContent=fmtDur(audio.currentTime);
}
if(karaokeMode&&lyricTimings.length){
syncLyrics(audio.currentTime);
}
}

function showLyrics(t){
const panel=document.getElementById('lyricsPanel');
const titleEl=document.getElementById('lyricsTitle');
const textEl=document.getElementById('lyricsText');
const raw=t.suno_prompt||t.lyrics||'';
titleEl.textContent='Lyrics — '+(t.title||'Untitled');
if(raw.trim()){
panel.classList.add('visible');
parseAndRenderLyrics(raw,textEl,false);
}else{
panel.classList.remove('visible');
}
}

function parseAndRenderLyrics(raw,el,karaoke){
lyricLines=[];lyricTimings=[];
const lines=raw.split('\n').filter(l=>l.trim());
let html='';
lines.forEach(line=>{
const clean=line.trim();
if(clean.match(/^\[.*\]$/)){
html+=`<span class="lyric-line" data-section>${clean}</span>`;
}else{
html+=`<span class="lyric-line">${clean}</span>`;
lyricLines.push(clean);
}
});
el.innerHTML=html;
el.className='lyrics-text'+(karaoke?' karaoke':'');
if(karaoke&&tracks[currentIdx]){
const dur=tracks[currentIdx].duration||180;
const perLine=dur/lyricLines.length;
lyricTimings=lyricLines.map((_,i)=>({start:i*perLine,end:(i+1)*perLine}));
}
}

function renderMoLyrics(t){
const el=document.getElementById('moLyrics');
const raw=t.suno_prompt||t.lyrics||'';
if(!raw.trim()){el.style.display='none';return;}
el.style.display='block';
parseAndRenderLyrics(raw,el,true);
}

function toggleKaraoke(){
karaokeMode=!karaokeMode;
const btn=document.getElementById('lyricsToggle');
const textEl=document.getElementById('lyricsText');
const moEl=document.getElementById('moLyrics');
btn.classList.toggle('karaoke',karaokeMode);
if(tracks[currentIdx]>=0){
const raw=tracks[currentIdx].suno_prompt||'';
if(raw)parseAndRenderLyrics(raw,textEl,karaokeMode);
parseAndRenderLyrics(raw,moEl,true);
}
}

function syncLyrics(time){
const allDesktop=document.querySelectorAll('#lyricsText .lyric-line:not([data-section])');
const allMobile=document.querySelectorAll('#moLyrics .lyric-line:not([data-section])');
const idx=lyricTimings.findIndex(l=>time>=l.start&&time<l.end);
allDesktop.forEach((el,i)=>{el.classList.toggle('active',i===idx)});
allMobile.forEach((el,i)=>{el.classList.toggle('active',i===idx)});
if(idx>=0&&allMobile[idx]){allMobile[idx].scrollIntoView({behavior:'smooth',block:'center'})}
}

function openMobilePlayer(){
if(currentIdx<0)return;
document.getElementById('mobileOverlay').classList.add('open');
document.body.style.overflow='hidden';
}
function closeMobilePlayer(){
document.getElementById('mobileOverlay').classList.remove('open');
document.body.style.overflow='';
}

function toggleSidebar(){
document.getElementById('sidebar').classList.toggle('open');
}

function fmtDur(s){if(!s)return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

loadSongs();
</script>
</body>
</html>
