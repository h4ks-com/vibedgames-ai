<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>h4ksify</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #121212; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Sidebar */
.sidebar { width: 240px; background: #000; padding: 16px; display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; overflow-y: auto; }
.logo { font-size: 24px; font-weight: 900; color: #1db954; letter-spacing: -1px; padding: 8px 0; display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 32px; height: 32px; background: #1db954; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.nav-item { display: flex; align-items: center; gap: 16px; padding: 10px 12px; border-radius: 6px; color: #b3b3b3; text-decoration: none; font-size: 14px; font-weight: 600; transition: all .2s; cursor: pointer; }
.nav-item:hover { color: #fff; }
.nav-item.active { color: #fff; background: #282828; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: linear-gradient(180deg, #1e3264 0%, #121212 40%); }
.header-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; }
.header-bar h1 { font-size: 28px; font-weight: 800; letter-spacing: -.5px; }

/* Track list */
.track-list { flex: 1; overflow-y: auto; padding: 0 32px 120px; }
.track-item { display: grid; grid-template-columns: 40px 1fr 80px 60px; align-items: center; gap: 16px; padding: 10px 12px; border-radius: 4px; transition: background .2s; cursor: pointer; }
.track-item:hover { background: rgba(255,255,255,.1); }
.track-item.playing { background: rgba(255,255,255,.15); }
.track-num { color: #b3b3b3; font-size: 14px; text-align: center; }
.track-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.track-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-meta { font-size: 12px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-album { font-size: 13px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-dur { font-size: 13px; color: #b3b3b3; text-align: right; }

/* Now Playing Bar */
.player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 90px; background: #181818; border-top: 1px solid #282828; display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 20px; z-index: 100; }
.now-playing { display: flex; align-items: center; gap: 12px; min-width: 0; }
.album-art { width: 56px; height: 56px; border-radius: 4px; background: linear-gradient(135deg, #1db954, #191414); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.np-info { min-width: 0; }
.np-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-subtitle { font-size: 11px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-actions { display: flex; gap: 12px; margin-left: 12px; }
.np-btn { background: none; border: none; color: #b3b3b3; cursor: pointer; font-size: 14px; transition: color .2s; }
.np-btn:hover { color: #fff; }

/* Controls */
.controls { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.control-btns { display: flex; align-items: center; gap: 16px; }
.ctrl-btn { background: none; border: none; color: #b3b3b3; cursor: pointer; font-size: 18px; transition: all .2s; padding: 4px; }
.ctrl-btn:hover { color: #fff; transform: scale(1.06); }
.play-btn { width: 38px; height: 38px; border-radius: 50%; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; font-size: 16px; border: none; cursor: pointer; transition: transform .15s; }
.play-btn:hover { transform: scale(1.05); color: #000; }
.progress-container { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 600px; cursor: pointer; }
.progress-bar { flex: 1; height: 4px; background: #4d4d4d; border-radius: 2px; position: relative; }
.progress-fill { height: 100%; background: #1db954; border-radius: 2px; width: 0%; transition: width .1s linear; }
.time-label { font-size: 11px; color: #b3b3b3; min-width: 40px; text-align: center; }
.extra-controls { display: flex; align-items: center; gap: 16px; }
.vol-slider { width: 100px; accent-color: #1db954; }

/* Playing animation */
.playing-icon { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
.playing-icon span { width: 3px; background: #1db954; border-radius: 1px; animation: bounce .8s ease infinite; }
.playing-icon span:nth-child(2) { animation-delay: .2s; }
.playing-icon span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,100%{height:4px} 50%{height:14px} }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; color: #b3b3b3; }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }

.kind-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 700; text-transform: uppercase; }
.kind-song { background: #1db95433; color: #1db954; }
.kind-cover { background: #e9142933; color: #e91429; }
.kind-generate { background: #ff8c0033; color: #ff8c00; }

.error-msg { color: #e91429; padding: 20px; text-align: center; font-size: 13px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .track-item { grid-template-columns: 32px 1fr 50px; }
  .track-album, .track-dur { display: none; }
  .player-bar { grid-template-columns: 1fr 1fr; padding: 0 12px; }
  .extra-controls { display: none; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo"><div class="logo-icon">🎵</div>h4ksify</div>
  <div class="nav-item active" onclick="showAll()">🏠 Home</div>
  <div style="flex:1"></div>
  <div style="color:#555;font-size:11px;padding:8px">Suno Music Player</div>
</div>

<!-- Main -->
<div class="main">
  <div class="header-bar">
    <h1 id="viewTitle">All Songs</h1>
    <span id="songCount" style="color:#b3b3b3;font-size:14px">—</span>
  </div>
  <div class="track-list" id="trackList">
    <div class="empty-state"><div class="icon">🎶</div>Loading songs...</div>
  </div>
</div>

<!-- Now Playing Bar -->
<div class="player-bar" id="playerBar" style="display:none">
  <div class="now-playing">
    <div class="album-art" id="npArt">🎵</div>
    <div class="np-info">
      <div class="np-title" id="npTitle">No track playing</div>
      <div class="np-subtitle" id="npSubtitle">—</div>
    </div>
    <div class="np-actions">
      <button class="np-btn" id="likeBtn" onclick="toggleLike()">♡</button>
    </div>
  </div>
  <div class="controls">
    <div class="control-btns">
      <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
      <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="play-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
      <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
    </div>
    <div class="progress-container" onclick="seek(event)">
      <div class="time-label" id="curTime">0:00</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="time-label" id="durTime">0:00</div>
    </div>
  </div>
  <div class="extra-controls">
    <button class="np-btn">🔊</button>
    <input type="range" class="vol-slider" min="0" max="100" value="80" oninput="setVol(this.value)">
  </div>
</div>

<audio id="audio" preload="auto" crossorigin="anonymous"></audio>

<script>
const BASE = 'https://s3-api.t3ks.com/suno/songs';
const LIST_URL = 'https://s3-api.t3ks.com/suno';

let tracks = [];
let currentIdx = -1;
let repeatMode = 0;
let shuffleOn = false;
let liked = new Set();

const audio = document.getElementById('audio');

// Parse S3 XML listing to discover track IDs
async function discoverTracks() {
  const list = document.getElementById('trackList');
  try {
    const resp = await fetch(LIST_URL);
    if (!resp.ok) throw new Error(`S3 listing failed: ${resp.status}`);
    const xml = await resp.text();
    
    // Extract all .json file keys from the XML
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const keys = [...doc.querySelectorAll('Key')].map(el => el.textContent);
    
    // Get unique track IDs (from .json files in songs/)
    const ids = [...new Set(keys
      .filter(k => k.startsWith('songs/') && k.endsWith('.json'))
      .map(k => k.replace('songs/', '').replace('.json', ''))
    )];
    
    if (!ids.length) throw new Error('No tracks found in S3');
    
    return ids;
  } catch (err) {
    console.error('Discovery error:', err);
    list.innerHTML = `<div class="error-msg">⚠️ Failed to load song list: ${err.message}<br><br>Trying fallback...</div>`;
    return null;
  }
}

// Load metadata for each discovered track
async function loadTracks() {
  const list = document.getElementById('trackList');
  list.innerHTML = '<div class="empty-state"><div class="icon">🎶</div>Discovering songs...</div>';
  
  const ids = await discoverTracks();
  if (!ids) {
    // Fallback: try known IDs or show error
    list.innerHTML = '<div class="error-msg">⚠️ Could not reach S3 API. The server may be temporarily unavailable.<br>Please try again in a moment.</div>';
    return;
  }
  
  list.innerHTML = '<div class="empty-state"><div class="icon">⚡</div>Loading metadata for ' + ids.length + ' songs...</div>';
  
  // Fetch all JSON metadata files
  const results = await Promise.allSettled(
    ids.map(id => 
      fetch(`${BASE}/${id}.json`)
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    )
  );
  
  tracks = results
    .map((r, i) => r.status === 'fulfilled' && r.value ? { ...r.value, id: ids[i] } : null)
    .filter(Boolean);
  
  // Sort by date descending (newest first)
  tracks.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
  
  renderTracks();
}

function renderTracks() {
  const list = document.getElementById('trackList');
  document.getElementById('songCount').textContent = `${tracks.length} song${tracks.length !== 1 ? 's' : ''}`;
  
  if (!tracks.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🎵</div>No songs found</div>';
    return;
  }
  
  list.innerHTML = tracks.map((t, i) => `
    <div class="track-item ${currentIdx >= 0 && tracks[currentIdx]?.id === t.id ? 'playing' : ''}" 
         data-idx="${i}"
         ondblclick="playTrack(${i})" onclick="playTrack(${i})">
      <div class="track-num">${currentIdx >= 0 && tracks[currentIdx]?.id === t.id 
        ? '<div class="playing-icon"><span></span><span></span><span></span></div>' 
        : (i + 1)}</div>
      <div class="track-info">
        <div class="track-title">${esc(t.title || 'Untitled')}</div>
        <div class="track-meta">
          <span class="kind-badge kind-${t.kind || t.source || 'song'}">${t.kind || t.source || 'song'}</span>
          &nbsp;${esc(t.prompt || '')}
        </div>
      </div>
      <div class="track-album">${esc(t.model || 'Suno')}</div>
      <div class="track-dur">${formatDate(t.created_at)}</div>
    </div>
  `).join('');
}

function playTrack(idx) {
  if (idx < 0 || idx >= tracks.length) return;
  currentIdx = idx;
  const t = tracks[idx];
  const url = `${BASE}/${t.id}.mp3`;
  
  audio.src = url;
  audio.load();
  
  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.catch(e => console.log('Autoplay blocked:', e));
  }
  
  updateNowPlaying();
  renderTracks();
}

function updateNowPlaying() {
  if (currentIdx < 0) return;
  const t = tracks[currentIdx];
  document.getElementById('playerBar').style.display = 'grid';
  document.getElementById('npTitle').textContent = t.title || 'Untitled';
  document.getElementById('npSubtitle').textContent = `${t.kind || t.source || 'song'} • ${t.prompt || ''}`;
  document.getElementById('playPauseBtn').textContent = '❚❚';
  document.getElementById('likeBtn').textContent = liked.has(t.id) ? '♥' : '♡';
  
  // Update page title
  document.title = `🎵 ${t.title || 'Untitled'} - h4ksify`;
}

function togglePlay() {
  if (!audio.src) { if (tracks.length) playTrack(0); return; }
  if (audio.paused) audio.play(); else audio.pause();
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  let idx = currentIdx - 1;
  if (idx < 0) idx = tracks.length - 1;
  playTrack(idx);
}

function nextTrack() {
  let idx;
  if (shuffleOn) {
    idx = Math.floor(Math.random() * tracks.length);
  } else {
    idx = currentIdx + 1;
    if (idx >= tracks.length) idx = 0;
  }
  playTrack(idx);
}

function toggleShuffle() {
  shuffleOn = !shuffleOn;
  document.getElementById('shuffleBtn').style.color = shuffleOn ? '#1db954' : '';
}

function toggleRepeat() {
  repeatMode = (repeatMode + 1) % 3;
  const btn = document.getElementById('repeatBtn');
  btn.textContent = repeatMode === 2 ? '🔂' : '🔁';
  btn.style.color = repeatMode > 0 ? '#1db954' : '';
}

function toggleLike() {
  if (currentIdx < 0) return;
  const t = tracks[currentIdx];
  if (liked.has(t.id)) liked.delete(t.id); else liked.add(t.id);
  document.getElementById('likeBtn').textContent = liked.has(t.id) ? '♥' : '♡';
}

function setVol(v) { audio.volume = v / 100; }

function seek(e) {
  const bar = e.currentTarget.querySelector('.progress-bar');
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
}

// Audio events
audio.addEventListener('play', () => { document.getElementById('playPauseBtn').textContent = '❚❚'; });
audio.addEventListener('pause', () => { document.getElementById('playPauseBtn').textContent = '▶'; });
audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('curTime').textContent = fmtT(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('durTime').textContent = fmtT(audio.duration);
});
audio.addEventListener('ended', () => {
  if (repeatMode === 2) { audio.play(); return; }
  nextTrack();
});
audio.addEventListener('error', (e) => {
  console.error('Audio error:', audio.error);
  const t = tracks[currentIdx];
  if (t) {
    document.getElementById('npSubtitle').textContent = `⚠️ Error loading: ${audio.error?.message || 'unknown'}`;
  }
});

function showAll() {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('viewTitle').textContent = 'All Songs';
  renderTracks();
}

// Utils
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtT(s) { if (!isFinite(s)) return '0:00'; const m = Math.floor(s/60), sec = Math.floor(s%60); return m+':'+sec.toString().padStart(2,'0'); }
function formatDate(d) { if (!d) return '—'; try { return new Date(d).toLocaleDateString(); } catch { return '—'; } }

// Init
setVolume(0.8);
loadTracks();

function setVolume(v) { audio.volume = v; }
</script>
</body>
</html>
