<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>h4ksify - Suno Player</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --bg-dark: #1a1a2e;
            --bg-medium: #16213e;
            --bg-light: #0f3460;
            --text: #ffffff;
            --text-secondary: #a0a0a0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary), #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: var(--bg-medium);
            border: 2px solid transparent;
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        
        .tab-btn:hover {
            background: var(--bg-light);
        }
        
        .tab-btn.active {
            border-color: var(--primary);
            background: var(--bg-light);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .song-card {
            background: var(--bg-medium);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .song-card:hover {
            background: var(--bg-light);
            transform: translateY(-2px);
        }
        
        .song-card.playing {
            border: 2px solid var(--primary);
        }
        
        .song-title {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        
        .song-artist {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .player {
            background: var(--bg-medium);
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            display: none;
        }
        
        .player.visible {
            display: block;
        }
        
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .control-btn {
            background: var(--primary);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.1);
        }
        
        .progress-container {
            margin-bottom: 15px;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-light);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.1s ease;
        }
        
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .error {
            background: #dc2626;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--text-secondary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .song-info {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .song-title-display {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        
        .song-artist-display {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 h4ksify</h1>
            <p>Suno Music Player</p>
        </header>
        
        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="generated">✨ Generated</button>
            <button class="tab-btn" data-tab="covers">🎚️ Covers</button>
            <button class="tab-btn" data-tab="library">**Library**</button>
        </div>
        
        <div id="generated" class="tab-content active">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading generated songs...</p>
            </div>
        </div>
        
        <div id="covers" class="tab-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading covers...</p>
            </div>
        </div>
        
        <div id="library" class="tab-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Songs loaded from S3</p>
            </div>
        </div>
        
        <div class="player" id="player">
            <div class="song-info">
                <div class="song-title-display" id="player-title">No track playing</div>
                <div class="song-artist-display" id="player-artist">—</div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress"></div>
                </div>
                <div class="time-display">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            
            <div class="player-controls">
                <button class="control-btn" id="prev-btn">⏮</button>
                <button class="control-btn" id="play-btn">▶</button>
                <button class="control-btn" id="next-btn">⏭</button>
                <button class="control-btn" id="loop-btn">🔁</button>
            </div>
        </div>
    </div>
    
    <script>
        // Configuration
        const S3_BASE = 'https://s3-api.t3ks.com/suno';
        const AUDIO_BASE = 'https://s3-api.t3ks.com/suno/songs';
        
        let currentSong = null;
        let currentAudio = null;
        let isPlaying = false;
        let isLooping = false;
        let queue = [];
        let currentIndex = 0;
        
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                
                // Update buttons
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Update content
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(tabName).classList.add('active');
                
                // Load content for this tab
                loadTabContent(tabName);
            });
        });
        
        function loadTabContent(tabName) {
            const tabContent = document.getElementById(tabName);
            
            switch(tabName) {
                case 'generated':
                    loadGeneratedSongs();
                    break;
                case 'covers':
                    loadCoverSongs();
                    break;
                case 'library':
                    loadLibrarySongs();
                    break;
            }
        }
        
        async function loadGeneratedSongs() {
            const container = document.getElementById('generated');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading generated songs...</p></div>';
            
            try {
                const response = await fetch(`${S3_BASE}/generated/`);
                if (!response.ok) throw new Error('Failed to load generated songs');
                
                const data = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data, 'text/xml');
                const contents = xml.getElementsByTagName('Contents');
                
                const songs = [];
                for (let i = 0; i < contents.length; i++) {
                    const key = contents[i].getElementsByTagName('Key')[0].textContent;
                    if (key.endsWith('.json')) {
                        try {
                            const songData = await fetch(`${S3_BASE}/generated/${key}`);
                            const song = await songData.json();
                            songs.push(song);
                        } catch (e) {
                            console.error('Error loading song:', e);
                        }
                    }
                }
                
                displaySongs(songs, container, 'generated');
                
            } catch (error) {
                container.innerHTML = `<div class="error">Error loading generated songs: ${error.message}</div>`;
            }
        }
        
        async function loadCoverSongs() {
            const container = document.getElementById('covers');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading covers...</p></div>';
            
            try {
                const response = await fetch(`${S3_BASE}/covers/`);
                if (!response.ok) throw new Error('Failed to load covers');
                
                const data = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data, 'text/xml');
                const contents = xml.getElementsByTagName('Contents');
                
                const songs = [];
                for (let i = 0; i < contents.length; i++) {
                    const key = contents[i].getElementsByTagName('Key')[0].textContent;
                    if (key.endsWith('.json')) {
                        try {
                            const songData = await fetch(`${S3_BASE}/covers/${key}`);
                            const song = await songData.json();
                            songs.push(song);
                        } catch (e) {
                            console.error('Error loading song:', e);
                        }
                    }
                }
                
                displaySongs(songs, container, 'covers');
                
            } catch (error) {
                container.innerHTML = `<div class="error">Error loading covers: ${error.message}</div>`;
            }
        }
        
        async function loadLibrarySongs() {
            const container = document.getElementById('library');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading songs from S3...</p></div>';
            
            try {
                const response = await fetch(`${S3_BASE}/`);
                if (!response.ok) throw new Error('Failed to load songs from S3');
                
                const data = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data, 'text/xml');
                const contents = xml.getElementsByTagName('Contents');
                
                const songs = [];
                for (let i = 0; i < contents.length; i++) {
                    const key = contents[i].getElementsByTagName('Key')[0].textContent;
                    if (key.endsWith('.json')) {
                        try {
                            const songData = await fetch(`${S3_BASE}/${key}`);
                            const song = await songData.json();
                            songs.push(song);
                        } catch (e) {
                            console.error('Error loading song:', e);
                        }
                    }
                }
                
                displaySongs(songs, container, 'library');
                
            } catch (error) {
                container.innerHTML = `<div class="error">Error loading songs from S3: ${error.message}</div>`;
            }
        }
        
        function displaySongs(songs, container, type) {
            container.innerHTML = '<div class="song-grid"></div>';
            const songGrid = container.querySelector('.song-grid');
            
            if (songs.length === 0) {
                songGrid.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No songs found</p>';
                return;
            }
            
            songs.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <div class="song-title">${song.title || 'Untitled Song'}</div>
                    <div class="song-artist">${song.artist || 'Unknown Artist'}</div>
                `;
                
                card.addEventListener('click', () => {
                    playSong(song, type, index);
                });
                
                songGrid.appendChild(card);
            });
        }
        
        function playSong(song, type, index) {
            // Stop current song if playing
            if (currentAudio) {
                currentAudio.pause();
            }
            
            // Update UI
            document.querySelectorAll('.song-card').forEach(card => {
                card.classList.remove('playing');
            });
            event.currentTarget.classList.add('playing');
            
            // Create new audio
            const audioUrl = `${AUDIO_BASE}/${song.audio_file}`;
            currentAudio = new Audio(audioUrl);
            currentSong = song;
            currentIndex = index;
            
            // Update player display
            document.getElementById('player-title').textContent = song.title || 'Untitled Song';
            document.getElementById('player-artist').textContent = song.artist || 'Unknown Artist';
            document.getElementById('player').classList.add('visible');
            
            // Play
            currentAudio.play();
            isPlaying = true;
            updatePlayButton();
            
            // Update progress
            currentAudio.addEventListener('timeupdate', updateProgress);
            currentAudio.addEventListener('ended', () => {
                if (isLooping) {
                    playSong(song, type, index);
                } else {
                    nextSong();
                }
            });
        }
        
        function updateProgress() {
            if (!currentAudio) return;
            
            const progress = (currentAudio.currentTime / currentAudio.duration) * 100;
            document.getElementById('progress').style.width = progress + '%';
            
            document.getElementById('current-time').textContent = formatTime(currentAudio.currentTime);
            document.getElementById('duration').textContent = formatTime(currentAudio.duration);
        }
        
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${minutes}:${secs.toString().padStart(2, '0')}`;
        }
        
        function updatePlayButton() {
            const playBtn = document.getElementById('play-btn');
            playBtn.textContent = isPlaying ? '⏸' : '▶';
        }
        
        // Player controls
        document.getElementById('play-btn').addEventListener('click', () => {
            if (!currentAudio) return;
            
            if (isPlaying) {
                currentAudio.pause();
                isPlaying = false;
            } else {
                currentAudio.play();
                isPlaying = true;
            }
            updatePlayButton();
        });
        
        document.getElementById('prev-btn').addEventListener('click', prevSong);
        document.getElementById('next-btn').addEventListener('click', nextSong);
        document.getElementById('loop-btn').addEventListener('click', () => {
            isLooping = !isLooping;
            document.getElementById('loop-btn').style.opacity = isLooping ? '1' : '0.5';
        });
        
        function prevSong() {
            if (currentIndex > 0) {
                currentIndex--;
                const song = queue[currentIndex];
                playSong(song, 'library', currentIndex);
            }
        }
        
        function nextSong() {
            if (currentIndex < queue.length - 1) {
                currentIndex++;
                const song = queue[currentIndex];
                playSong(song, 'library', currentIndex);
            }
        }
        
        // Load initial content
        loadTabContent('generated');
    </script>
</body>
</html>
