<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>h4ksify — Suno Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#121212;--surface:#1a1a1a;--surface2:#282828;--text:#fff;
  --text-dim:#b3b3b3;--accent:#1db954;--accent-hover:#1ed760;
  --radius:8px;--player-h:90px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction-column;overflow:hidden}
.app{display:flex;height:100%;height:calc(100vh - var(--player-h))}

/* Sidebar */
.sidebar{width:260px;background:#000;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:24px 16px;font-size:22px;font-weight:900;color:var(--accent);letter-spacing:-1px;display:flex;align-items:center;gap:8px}
.logo svg{width:32px;height:32px}
.nav{padding:8px;flex:1}
.nav-item{display:flex;align-items:center;gap:16px;padding:10px 14px;border-radius:4px;color:var(--text-dim);cursor:pointer;font-size:15px;font-weight:600;transition:.2s}
.nav-item:hover,.nav-item.active{color:var(--text)}
.nav-item.active{background:var(--surface2)}
.nav-item svg{width:24px;height:24px;fill:currentColor}

/* Main content */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.content{max-width:1200px;margin:0 auto;padding:24px 32px 48px}
.section-title{font-size:30px;font-weight:800;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px}

/* Song card */
.card{background:var(--surface2);border-radius:8px;padding:16px;transition:transform .2s,background .2s;cursor:pointer;position:relative}
.card:hover{background:#353535;transform:translateY(-2px)}
.card-art{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#1e3264,#9146ff,#e16156);border-radius:4px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden}
.card.playing .card-art::after{content:'';position:absolute;inset:0;background:rgba(29,185,84,.25);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:.45}}
.card-title{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-play{position:absolute;top:12px;right:12px;width:44px;height:44px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;transform:scale(.85)}
.card:hover .card-play{opacity:1;transform:scale(1)}
.card.playing .card-play{opacity:1;transform:scale(1)}
.card-play svg{width:20px;height:20px;fill:#000}

/* Player bar */
.player{height:var(--player-h);background:#181818;border-top:1px solid #282828;display:flex;align-items:center;padding:0 16px;gap:16px;position:fixed;bottom:0;left:0;right:0;z-index:100}
.p-now{width:280px;display:flex;align-items:center;gap:12px;min-width:0}
.p-art{width:56px;height:56px;border-radius:4px;background:linear-gradient(135deg,#1e3264,#9146ff);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px}
.p-info{min-width:0}
.p-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.p-like{color:var(--text-dim);cursor:pointer;flex-shrink:0}
.p-like:hover,.p-like.liked{color:var(--text)}

.p-controls{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;max-width:700px}
.p-btns{display:flex;align-items:center;gap:20px}
.p-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;transition:color .2s}
.p-btn:hover{color:#fff}
.p-btn svg{fill:currentColor}
.p-btn.play{width:38px;height:38px}
.p-btn.play svg{width:38px;height:38px}
.p-btn.small svg{width:16px;height:16px}
.p-progress{width:100%;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim)}
.p-progress input{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:#4d4d4d;cursor:pointer}
.p-progress input::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}

.p-vol{width:180px;display:flex;align-items:center;gap:8px;justify-content:flex-end}
.p-vol svg{width:16px;height:16px;fill:var(--text-dim);flex-shrink:0}
.p-vol input{width:93px;-webkit-appearance:none;height:4px;border-radius:2px;background:#4d4d4d;cursor:pointer}
.p-vol input::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--text-dim)}
.spinner{width:40px;height:40px;border:4px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty state */
.empty{text-align:center;padding:80px 20px;color:var(--text-dim)}
.empty-icon{font-size:64px;margin-bottom:16px}
.empty h2{font-size:24px;margin-bottom:8px;color:var(--text)}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{transparent}
::-webkit-scrollbar-thumb{background:#555;border-radius:4px}

@media(max-width:768px){
  .sidebar{display:none}
  .p-now{width:auto}
  .p-vol{display:none}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#1db954"/><path d="M8 9l8 3-8 3V9z" fill="#000"/></svg> h4ksify</div>
    <div class="nav">
      <div class="nav-item active" data-view="home">🏠 Home</div>
      <div class="nav-item" data-view="generated">✨ Generated</div>
      <div class="nav-item" data-view="covers">🎚️ Covers</div>
    </div>
    <div style="padding:16px 16px 24px;font-size:13px;color:var(--text-dim)">
      <strong style="color:var(--text)">Library</strong><br>
      <span id="song-count">Loading songs...</span>
    </div>
  </div>

  <div class="main">
    <div class="content" id="content">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        Loading songs from S3...
      </div>
    </div>
  </div>
</div>

<div class="player">
  <div class="p-now">
    <div class="p-art" id="p-art">🎵</div>
    <div class="p-info">
      <div class="p-title" id="p-title">No track playing</div>
      <div class="p-sub" id="p-sub">—</div>
    </div>
    <div class="p-like" id="p-like" onclick="toggleLike()">♡</div>
  </div>
  <div class="p-controls">
    <div class="p-btns">
      <button class="p-btn small" onclick="shuffle()" title="Shuffle">🔀</button>
      <button class="p-btn small" onclick="prevTrack()" title="Previous">⏮</button>
      <button class="p-btn play" onclick="togglePlay()" id="play-btn" title="Play">▶</button>
      <button class="p-btn small" onclick="nextTrack()" title="Next">⏭</button>
      <button class="p-btn small" onclick="toggleRepeat()" id="repeat-btn" title="Repeat">🔁</button>
    </div>
    <div class="p-progress">
      <span id="time-now">0:00</span>
      <input type="range" min="0" max="100" value="0" id="progress-bar" oninput="seekTo(this.value)">
      <span id="time-end">0:00</span>
    </div>
  </div>
  <div class="p-vol">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <input type="range" min="0" max="100" value="80" oninput="setVolume(this.value)">
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
const S3_API = 'https://s3-api.t3ks.com/suno';
const S3_BASE = 'https://s3-api.t3ks.com';
let allSongs = [];
let filteredSongs = [];
let currentView = 'home';
let currentIndex = -1;
let isPlaying = false;
let repeatMode = 0; // 0=off, 1=all, 2=one

const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');

// Parse S3 XML response to extract song entries
function parseS3Xml(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const contents = doc.getElementsByTagName('Contents');
  const jsonKeys = [];
  for (const c of contents) {
    const key = c.querySelector('Key')?.textContent || '';
    if (key.endsWith('.json')) {
      jsonKeys.push(key);
    }
  }
  return jsonKeys;
}

// Load a single song's metadata from its JSON file
async function loadSongMeta(jsonKey) {
  try {
    const resp = await fetch(`${S3_BASE}/${jsonKey}`);
    if (!resp.ok) return null;
    return await resp.json();
  } catch { return null; }
}

// Main loader: fetch S3 listing → get all .json keys → fetch each metadata
async function loadSongs() {
  showLoading(true);
  try {
    const resp = await fetch(S3_API);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const xmlText = await resp.text();
    const jsonKeys = parseS3Xml(xmlText);

    // Load all metadata in parallel (batches of 10)
    const songs = [];
    for (let i = 0; i < jsonKeys.length; i += 10) {
      const batch = jsonKeys.slice(i, i + 10);
      const results = await Promise.all(batch.map(loadSongMeta));
      for (const meta of results) {
        if (meta && meta.suno_clip_id) {
          songs.push({
            ...meta,
            mp3Url: `${S3_BASE}/suno/${meta.suno_clip_id}.mp3`,
            jsonKey: jsonKey,
            liked: false
          });
        }
      }
    }

    // Sort by newest first
    songs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

    allSongs = songs;
    applyFilter();
    document.getElementById('song-count').textContent = `${songs.length} songs loaded`;
  } catch (err) {
    console.error('Failed to load songs:', err);
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <h2>Failed to load songs</h2>
        <p>${err.message}<br>Check your S3 API endpoint.</p>
      </div>`;
  }
  showLoading(false);
}

function applyFilter() {
  switch(currentView) {
    case 'generated':
      filteredSongs = allSongs.filter(s => s.kind !== 'cover'); break;
    case 'covers':
      filteredSongs = allSongs.filter(s => s.kind === 'cover'); break;
    default:
      filteredSongs = [...allSongs];
  }
  renderGrid();
}

function renderGrid() {
  const container = document.getElementById('content');
  if (filteredSongs.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎵</div><h2>No ${currentView === 'covers' ? 'Covers' : currentView === 'generated' ? 'Generated' : ''} Songs</h2></div>`;
    return;
  }

  container.innerHTML = `
    <h1 class="section-title">${currentView === 'home' ? 'All Songs' : currentView === 'generated' ? '✨ Generated' : '🎚️ Covers'}</h1>
    <div class="grid">
      ${filteredSongs.map((s, i) => `
        <div class="card ${currentIndex >= 0 && filteredSongs[currentIndex] === s ? 'playing' : ''}" 
             onclick="playSong(${allSongs.indexOf(s)})" data-id="${s.suno_clip_id}">
          <div class="card-art">${getArtEmoji(s)}</div>
          <div class="card-title">${escapeHtml(s.title || s.prompt || 'Untitled')}</div>
          <div class="card-sub">${formatDate(s.created_at)} · ${s.kind || 'song'}</div>
          <div class="card-play">${currentIndex >= 0 && filteredSongs[currentIndex] === s && isPlaying ? '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>' : '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'}</div>
        </div>
      `).join('')}
    </div>`;
}

function getArtEmoji(s) {
  if (s.kind === 'cover') return '🎚️';
  if ((s.title||'').toLowerCase().includes('lofi')) return '🌙';
  if ((s.prompt||'').toLowerCase().includes('epic')) return '🔥';
  if ((s.prompt||'').toLowerCase().includes('chill')) return '☁️';
  return '🎶';
}

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function formatDate(d){if(!d)return'?';try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch{return'?'}}
function formatTime(s){if(isNaN(s)||!isFinite(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${sec.toString().padStart(2,'0')}`}

function playSong(idx) {
  const song = allSongs[idx];
  if (!song) return;
  currentIndex = idx;
  audio.src = song.mp3Url;
  audio.play().then(() => {
    isPlaying = true;
    updatePlayerUI();
  }).catch(e => console.error('Playback error:', e));
  updatePlayerUI();
  renderGrid();
}

function togglePlay() {
  if (currentIndex < 0 && allSongs.length > 0) { playSong(0); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; }
  else { audio.play(); isPlaying = true; }
  updatePlayerUI();
  renderGrid();
}

function nextTrack() {
  if (!allSongs.length) return;
  if (repeatMode === 2) { audio.currentTime = 0; return; }
  currentIndex = (currentIndex + 1) % allSongs.length;
  playSong(currentIndex);
}

function prevTrack() {
  if (!allSongs.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  currentIndex = (currentIndex - 1 + allSongs.length) % allSongs.length;
  playSong(currentIndex);
}

function shuffle() {
  if (!allSongs.length) return;
  currentIndex = Math.floor(Math.random() * allSongs.length);
  playSong(currentIndex);
}

function toggleRepeat() {
  repeatMode = (repeatMode + 1) % 3;
  document.getElementById('repeat-btn').textContent = ['🔁','🔂','1️⃣'][repeatMode];
}

function toggleLike() {
  if (currentIndex < 0) return;
  allSongs[currentIndex].liked = !allSongs[currentIndex].liked;
  document.getElementById('p-like').textContent = allSongs[currentIndex].liked ? '♥' : '♡';
  document.getElementById('p-like').classList.toggle('liked', allSongs[currentIndex].liked);
}

function seekTo(val) {
  if (audio.duration) audio.currentTime = (val / 100) * audio.duration;
}

function setVolume(val) {
  audio.volume = val / 100;
}

function updatePlayerUI() {
  const song = currentIndex >= 0 ? allSongs[currentIndex] : null;
  document.getElementById('p-art').textContent = song ? getArtEmoji(song) : '🎵';
  document.getElementById('p-title').textContent = song ? (song.title || song.prompt || 'Untitled') : 'No track playing';
  document.getElementById('p-sub').textContent = song ? `${song.kind || 'song'} · ${formatDate(song.created_at)}` : '—';
  playBtn.textContent = isPlaying ? '⏸' : '▶';
  if (song) {
    document.getElementById('p-like').textContent = song.liked ? '♥' : '♡';
    document.getElementById('p-like').classList.toggle('liked', !!song.liked);
  }
}

// Audio events
audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('progress-bar').value = pct;
  document.getElementById('time-now').textContent = formatTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('time-end').textContent = formatTime(audio.duration);
});

audio.addEventListener('ended', () => {
  if (repeatMode === 2) { audio.currentTime = 0; audio.play(); return; }
  nextTrack();
});

// Navigation
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    currentView = el.dataset.view;
    applyFilter();
  });
});

function showLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
}

// Init
loadSongs();
setVolume(80);
</script>
</body>
</html>
