<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💀 VIOLENTLY PSYCHOTIC BIRDS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0000;overflow:hidden;font-family:'Courier New',monospace;user-select:none}
#game{width:100vw;height:100vh;position:relative;cursor:default}
canvas{display:block}
#ui{position:absolute;top:10px;left:10px;color:#ff0000;font-size:18px;text-shadow:0 0 10px #f00,0 0 20px #f00;z-index:100;font-weight:bold}
#level{position:absolute;top:10px;right:10px;color:#ff0000;font-size:24px;text-shadow:0 0 15px #f00,0 0 30px #f00;z-index:100;font-weight:bold}
#msg{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:22px;text-align:center;text-shadow:0 0 20px #f00,2px 2px #000;z-index:100;max-width:90%}
#submsg{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);color:#888;font-size:14px;text-align:center;z-index:99}
.glitch{animation:glitch 0.3s infinite}
@keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-3px,3px)}40%{transform:translate(3px,-3px)}60%{transform:translate(-3px,-3px)}80%{transform:translate(3px,3px)}100%{transform:translate(0)}}
.shake{animation:shake 0.1s infinite}
@keyframes shake{0%,100%{transform:translate(0) rotate(0deg)}25%{transform:translate(5px,5px) rotate(1deg)}50%{transform:translate(-5px,-5px) rotate(-1deg)}75%{transform:translate(3px,-3px) rotate(2deg)}}
.invert{filter:invert(1) hue-rotate(180deg)}
#blood{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;background:radial-gradient(ellipse at center,transparent 30%,rgba(139,0,0,0.15) 100%)}
#vhs{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:60;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px)}
#confetti{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;overflow:hidden}
.confetti-piece{position:absolute;width:8px;height:8px;opacity:0}
#levelComplete{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#1a0000,#000);border:3px solid #f00;border-radius:20px;padding:40px 60px;text-align:center;z-index:300;transition:transform 0.5s cubic-bezier(0.175,0.885,0.32,1.275)}
#levelComplete.show{transform:translate(-50%,-50%) scale(1)}
#levelComplete h2{color:#f00;font-size:32px;margin-bottom:10px;text-shadow:0 0 20px #f00}
#levelComplete p{color:#aaa;font-size:16px}
#nextBtn{margin-top:20px;padding:12px 30px;background:#300;color:#f00;border:2px solid #f00;font-size:18px;cursor:pointer;font-family:'Courier New',monospace;font-weight:bold;transition:all 0.2s}
#nextBtn:hover{background:#f00;color:#000;box-shadow:0 0 20px #f00}
</style>
</head>
<body>
<div id="game"><canvas id="c"></canvas><div id="blood"></div><div id="vhs"></div><div id="confetti"></div><div id="ui"></div><div id="level"></div><div id="msg"></div><div id="submsg"></div><div id="levelComplete"><h2 id="lcTitle">LEVEL CLEARED</h2><p id="lcText">They found peace... or did they?</p><button id="nextBtn">CONTINUE INTO MADNESS →</button></div></div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,birds=[],particles=[],screams=[],thoughts=[],glitches=0,level=1,gameOver=false,screenShake=0,invertPct=0,bloodAmt=0,vhsLines=0,blackHoles=[],policeCars=0,ambientSirens=0,realityCracks=0,timeDilation=1,existentialTimer=0;

const LEVELS=[
  {name:"IRRITATED",bg1:'#1a0a0a',bg2:'#0a0000',maxRage:30,spawnRate:2500,birdCount:4,speed:1,traits:['twitching','grumbling']},
  {name:"FRUSTRATED",bg1:'#200505',bg2:'#0a0000',maxRage:45,spawnRate:2200,birdCount:5,speed:1.1,traits:['pacing','clenched fists']},
  {name:"ANGRY",bg1:'#2a0000',bg2:'#0a0000',maxRage:60,spawnRate:1900,birdCount:6,speed:1.2,traits:['shouting','stomping']},
  {name:"FURIOUS",bg1:'#350000',bg2:'#0a0000',maxRage:75,spawnRate:1600,birdCount:7,speed:1.3,traits:['vein popping','red face']},
  {name:"ENRAGED",bg1:'#400000',bg2:'#0a0000',maxRage:85,spawnRate:1400,birdCount:8,speed:1.4,traits:['fire eyes','steam from ears']},
  {name:"PSYCHOTIC BREAK",bg1:'#4a0000',bg2:'#0a0505',maxRage:95,spawnRate:1200,birdCount:9,speed:1.6,traits:['multiple personalities','talking to self']},
  {name:"UNHINGED",bg1:'#500000',bg2:'#0a0505',maxRage:105,spawnRate:1100,birdCount:10,speed:1.7,traits:['pulling feathers','wild eyes']},
  {name:"DERANGED",bg1:'#5a0000',bg2:'#0a0505',maxRage:115,spawnRate:1000,birdCount:11,speed:1.9,traits:['laughing manically','drooling']},
  {name:"LUNATIC",bg1:'#600000',bg2:'#0a0505',maxRage:125,spawnRate:900,birdCount:12,speed:2,traits:['running in circles','biting air']},
  {name:"PSYCHOPATHIC",bg1:'#700000',bg2:'#0a0505',maxRage:140,spawnRate:800,birdCount:13,speed:2.2,traits:['dead stare','smiling wrong']},
  {name:"DEMONIC",bg1:'#800000',bg2:'#100000',maxRage:155,spawnRate:700,birdCount:14,speed:2.4,traits:['horns growing','skin cracking']},
  {name:"ELDRITCH HORROR",bg1:'#900010',bg2:'#100005',maxRage:170,spawnRate:600,birdCount:15,speed:2.6,traits:['too many eyes','wrong geometry']},
  {name:"VOID CONSUMED",bg1:'#000008',bg2:'#000003',maxRage:185,spawnRate:550,birdCount:16,speed:2.8,traits:['fading existence','static faces']},
  {name:"REALITY COLLAPSING",bg1:'#080008',bg2:'#000002',maxRage:195,spawnRate:500,birdCount:17,speed:3,traits:['glitching reality','breaking fourth wall']},
  {name:"OBLIVION",bg1:'#000',bg2:'#000',maxRage:210,spawnRate:450,birdCount:18,speed:3.5,traits:['becoming one with nothing','final truth']}
];

const RAGE_THOUGHTS={
  5:["This coffee is WARM not HOT","Someone moved my pen 2cm","The WiFi symbol has ONE less bar"],
  15:["I asked for NO PICKLES","My sock is DAMP inside","The toilet seat was WARM"],
  25:["WHO ATE MY LUNCH?!","The printer is MOCKING me","Why is EVERYTHING so LOUD?!"],
  35:["I WILL FIND WHO DID THIS","This WHOLE SYSTEM is BROKEN","NOTHING MAKES SENSE ANYMORE"],
  50:["THEY'RE ALL WATCHING","BURN IT TO THE GROUND","I CAN HEAR THE VOICES NOW"],
  65:["WE ARE MANY","THERE IS NO ESCAPE","THE WALLS ARE BREATHING"],
  80:["HAHAHAHAHA","*incoherent screaming*","TEAR IT APART TEAR IT ALL APART"],
  95:["i aM nOt a bIrD","wHaT iS rEaLiTy???","👁️👁️👁️ 👁️👁️👁️"],
  120:["̷̿͝T̸̕͝H̵̨̛E̶̕͘Y̴̕͠ ̷̕͝C̵̛̎Ŏ̸͊M̵̾̚E̵͐̓ ̵̔̈F̷͋̌O̸̅͌Ṙ̸̏ ̵͗̎Ũ̸͑S̴̽͂","̷̧̛W̷̛̕E̸̮͙ ̵̰̱A̷͖̼Ṛ̷̳E̵̺̤ ̸̜̬Ț̷̭H̸̯̲E̵̻͎ ̷͖͉N̵̞̳O̷͍͚W̸̜̭","̵̢̖ ̸̡̧ ̷̣̹ ̵̰̩ ̸̧̢̛"],
  150:[".","..","..."],
  180:[" ","  ","   "],
  200:["","",""]
};

const SCREAMS=["AARGH!","WHY?!","FFS!","GAAAH!","NOOOO!","AAAAHH!","IT BURNS!","MAKE IT STOP!","HELP!","*SCREAMING*","RRRAAAAGH!","*unintelligible rage*"];
const VOICES=["They're watching you","Burn it all down","You can't escape","We are always here","Nothing is real","The birds aren't real","You're the crazy one","Look behind you","Don't trust them","It's all a simulation","Wake up wake up WAKE UP"];

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

class Bird{
  constructor(lvl){
    this.x=Math.random()*(W-100)+50;
    this.y=Math.random()*(H-200)+100;
    this.rage=0;
    this.maxRage=LEVELS[Math.min(lvl-1,LEVELS.length-1)].maxRage;
    this.calmSpeed=0.02+Math.random()*0.03;
    this.vx=(Math.random()-0.5)*2;
    this.vy=(Math.random()-0.5)*2;
    this.size=28+Math.random()*14;
    this.hue=Math.random()*360;
    this.personality=['aggressive','nervous','manic','stoic','paranoid','split'][Math.floor(Math.random()*6)];
    this.altPersonality=this.personality==='split'?['calm','murderous','childlike','ancient'][Math.floor(Math.random()*4)]:null;
    this.phase=Math.random()*Math.PI*2;
    this.eyeCount=1;
    this.hasKnife=lvl>=6;
    this.onFire=lvl>=4?Math.random()<0.3:false;
    this.disintegrating=false;
    this.disintegrateProgress=0;
    this.leftScreen=false;
    this.thought="";
    this.thoughtTimer=0;
    this.screamTimer=Math.random()*300+200;
    this.talkingToSelf=lvl>=6&&Math.random()<0.4;
    this.selfTalkTimer=0;
    this.deadStare=lvl>=10;
    this.wrongSmile=lvl>=10;
    this.tooManyEyes=lvl>=11;
    this.fading=lvl>=13;
    this.staticFace=lvl>=13;
    this.breakingFourthWall=lvl>=14;
    this.demonicHorns=lvl>=11;
    this.skinCracking=lvl>=11;
    this.crackPhase=0;
    this.becomingOneWithNothing=lvl===15;
  }
  
  update(dt,lvl){
    if(this.leftScreen||this.becomingOneWithNothing&&this.rage>=this.maxRage*0.9)return;
    
    const speedMult=LEVELS[Math.min(lvl-1,LEVELS.length-1)].speed*timeDilation;
    
    // Movement gets more erratic with rage
    const erraticness=1+(this.rage/this.maxRage)*3;
    this.vx+=(Math.random()-0.5)*erraticness*0.5;
    this.vy+=(Math.random()-0.5)*erraticness*0.5;
    this.vx*=0.95;this.vy*=0.95;
    this.vx=Math.max(-6*Math.min(speedMult,4),Math.min(6*Math.min(speedMult,4),this.vx));
    this.vy=Math.max(-6*Math.min(speedMult,4),Math.min(6*Math.min(speedMult,4),this.vy));
    this.x+=this.vx*speedMult;
    this.y+=this.vy*speedMult;
    
    // Bounce off walls violently
    if(this.x<this.size){this.x=this.size;this.vx*=-1.5;screenShake+=3;}
    if(this.x>W-this.size){this.x=W-this.size;this.vx*=-1.5;screenShake+=3;}
    if(this.y<this.size+60){this.y=this.size+60;this.vy*=-1.5;screenShake+=2;}
    if(this.y>H-this.size-40){this.y=H-this.size-40;this.vy*=-1.5;screenShake+=2;}
    
    // Calm down over time
    if(!this.disintegrating){
      this.rage-=this.calmSpeed*(lvl>=10?0.5:1);
      if(this.rage<0)this.rage=0;
    }
    
    // Disintegration at high levels
    if(lvl>=7&&!this.disintegrating&&this.rage>this.maxRage*0.85&&Math.random()<0.002){
      this.disintegrating=true;
      for(let i=0;i<30;i++){
        particles.push(new Particle(this.x,this.y,'disintegrate'));
      }
    }
    if(this.disintegrating){
      this.disintegrateProgress+=0.005;
      if(this.disintegrateProgress>=1)this.leftScreen=true;
    }
    
    // Rage quit at high levels
    if(lvl>=6&&!this.disintegrating&&this.rage>this.maxRage*0.9&&Math.random()<0.001){
      this.leftScreen=true;
      screams.push({x:this.y,y:this.y,text:'*FLIES OFF SCREAMING*',life:120,size:16,color:'#f00'});
      screenShake+=5;
    }
    
    // Thoughts
    this.thoughtTimer--;
    if(this.thoughtTimer<=0){
      const keys=Object.keys(RAGE_THOUGHTS).map(Number).filter(k=>k<=this.rage);
      if(keys.length>0){
        const bucket=keys[keys.length-1];
        this.thought=RAGE_THOUGHTS[bucket][Math.floor(Math.random()*RAGE_THOUGHTS[bucket].length)];
        this.thoughtTimer=150+Math.random()*100;
      }
    }
    
    // Screams
    this.screamTimer--;
    if(this.screamTimer<=0&&this.rage>this.maxRage*0.5){
      screams.push({x:this.x,y:this.y-20,text:SCREAMS[Math.floor(Math.random()*SCREAMS.length)],life:80,size:12+Math.floor(this.rage/15),color:`hsl(${this.rage},100%,60%)`});
      this.screamTimer=200+Math.random()*300-(this.rage*0.5);
      screenShake+=this.rage>100?3:1;
    }
    
    // Self-talk
    if(this.talkingToSelf){
      this.selfTalkTimer--;
      if(this.selfTalkTimer<=0){
        thoughts.push({x:this.x,y:this.y-40,text:VOICES[Math.floor(Math.random()*VOICES.length)],life:180,size:11,color:'#a66'});
        this.selfTalkTimer=250+Math.random()*200;
      }
    }
    
    // Phase animation
    this.phase+=0.08*(1+this.rage/this.maxRage);
    
    // Fire damage
    if(this.onFire&&Math.random()<0.01)this.rage+=0.5;
    
    // Skin cracking animation
    if(this.skinCracking)this.crackPhase+=0.02;
  }
  
  draw(ctx,lvl){
    if(this.leftScreen)return;
    if(this.becomingOneWithNothing&&this.rage>=this.maxRage*0.9){
      ctx.globalAlpha=Math.max(0,1-this.disintegrateProgress);
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;return;
    }
    
    ctx.save();
    ctx.translate(this.x,this.y);
    
    // Shake based on rage
    const shakeAmt=(this.rage/this.maxRage)*8;
    ctx.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt);
    
    // Disintegration effect
    if(this.disintegrating){
      ctx.globalAlpha=Math.max(0,1-this.disintegrateProgress);
      const scatter=this.disintegrateProgress*30;
      ctx.translate((Math.random()-0.5)*scatter,(Math.random()-0.5)*scatter);
    }
    
    // Fading effect
    if(this.fading)ctx.globalAlpha=0.3+Math.sin(this.phase*2)*0.2;
    
    const rageRatio=this.rage/this.maxRage;
    
    // Body color progression
    let bodyColor;
    if(rageRatio<0.3)bodyColor=`hsl(${this.hue},70%,55%)`;
    else if(rageRatio<0.5)bodyColor=`hsl(${this.hue},80%,45%)`;
    else if(rageRatio<0.7)bodyColor=`hsl(${30-rageRatio*20},90%,40%)`;
    else if(rageRatio<0.85)bodyColor=`hsl(${15-rageRatio*10},95%,35%)`;
    else bodyColor=`hsl(0,${Math.min(100,70+rageRatio*30)}%,${Math.max(20,35-rageRatio*20)}%)`;
    
    // Body
    ctx.fillStyle=bodyColor;
    ctx.beginPath();
    ctx.ellipse(0,0,this.size,this.size*0.75,0,0,Math.PI*2);
    ctx.fill();
    
    // Demonic cracks
    if(this.skinCracking&&rageRatio>0.5){
      ctx.strokeStyle='#f80';ctx.lineWidth=2;
      for(let i=0;i<5;i++){
        const angle=(this.crackPhase+i*1.2)%Math.PI*2;
        const len=this.size*(0.3+Math.sin(this.crackPhase+i)*0.2);
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle)*this.size*0.3,Math.sin(angle)*this.size*0.3);
        ctx.lineTo(Math.cos(angle)*len,Math.sin(angle)*len);
        ctx.stroke();
      }
      // Lava glow from cracks
      ctx.shadowColor='#f50';ctx.shadowBlur=15;
    }
    
    // Horns
    if(this.demonicHorns&&rageRatio>0.4){
      ctx.fillStyle='#300';
      ctx.beginPath();
      ctx.moveTo(-this.size*0.4,-this.size*0.5);
      ctx.quadraticCurveTo(-this.size*0.7,-this.size*1.2,-this.size*0.3,-this.size*0.6);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(this.size*0.4,-this.size*0.5);
      ctx.quadraticCurveTo(this.size*0.7,-this.size*1.2,this.size*0.3,-this.size*0.6);
      ctx.fill();
    }
    
    // Belly
    ctx.fillStyle=rageRatio>0.7?'#200':`hsl(${this.hue},50%,70%)`;
    ctx.beginPath();
    ctx.ellipse(0,this.size*0.2,this.size*0.55,this.size*0.45,0,0,Math.PI*2);
    ctx.fill();
    
    // Eyes - count increases with level
    const eyePositions=[[[-8,-8],[8,-8]]];
    if(this.tooManyEyes||lvl>=11){
      eyePositions.push([[-14,-2],[14,-2]],[[-6,4],[6,4]]);
    }
    const maxEyes=Math.min(eyePositions.length,1+Math.floor(lvl/3));
    
    for(let e=0;e<maxEyes;e++){
      for(const[ex,ey]of eyePositions[e]){
        // Eye white
        ctx.fillStyle=this.deadStare&&rageRatio>0.5?'#111':'#fff';
        ctx.beginPath();ctx.arc(ex,ey,6+rageRatio*2,0,Math.PI*2);ctx.fill();
        
        // Pupil
        if(!this.staticFace||rageRatio<0.7){
          const pupilSize=this.deadStare?2:3+rageRatio;
          ctx.fillStyle=this.deadStare?'#f00':(rageRatio>0.7?'#f00':'#000');
          ctx.beginPath();ctx.arc(ex,ey,pupilSize,0,Math.PI*2);ctx.fill();
          
          if(!this.deadStare){
            ctx.fillStyle='red';
            ctx.beginPath();ctx.arc(ex+1,ey,1.5,0,Math.PI*2);ctx.fill();
          }
        }else{
          // Static/noise eye
          ctx.fillStyle='#888';
          for(let p=0;p<5;p++){
            ctx.fillRect(ex-4+Math.random()*8,ey-4+Math.random()*8,2,2);
          }
        }
        
        // Too many eyes - extra pupils in same socket
        if(this.tooManyEyes&&e>=1&&rageRatio>0.5){
          ctx.fillStyle='#f0f';
          ctx.beginPath();ctx.arc(ex+2,ey-2,2,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#0ff';
          ctx.beginPath();ctx.arc(ex-2,ey+2,2,0,Math.PI*2);ctx.fill();
        }
      }
    }
    
    // Beak
    ctx.fillStyle=rageRatio>0.6?'#f00':(rageRatio>0.3?'#f80':'#f90');
    ctx.beginPath();
    ctx.moveTo(-6,2);ctx.lineTo(6,2);ctx.lineTo(0,12);
    ctx.fill();
    
    // Open screaming beak at high rage
    if(rageRatio>0.6){
      ctx.fillStyle='#300';
      ctx.beginPath();
      ctx.moveTo(-5,6);ctx.lineTo(5,6);ctx.lineTo(0,16+Math.sin(this.phase*3)*3);
      ctx.fill();
      // Tongue
      ctx.fillStyle='#f06';
      ctx.beginPath();ctx.ellipse(0,12,3,2+Math.sin(this.phase*3),0,0,Math.PI*2);ctx.fill();
    }
    
    // Wrong smile at psychopathic levels
    if(this.wrongSmile&&rageRatio>0.6){
      ctx.strokeStyle='#f00';ctx.lineWidth=2;ctx.lineCap='round';
      ctx.beginPath();
      ctx.arc(0,8,10,0.2*Math.PI,0.8*Math.PI);
      ctx.stroke();
      // Teeth
      ctx.fillStyle='#fff';
      for(let t=-6;t<=6;t+=3){
        ctx.fillRect(t,10+Math.abs(t)*0.2,2,3);
      }
    }
    
    // Eyebrows angry
    if(rageRatio>0.3){
      ctx.strokeStyle='#000';ctx.lineWidth=2+rageRatio*2;
      ctx.beginPath();
      ctx.moveTo(-14,-16);ctx.lineTo(-4,-12);
      ctx.moveTo(14,-16);ctx.lineTo(4,-12);
      ctx.stroke();
    }
    
    // Fire
    if(this.onFire){
      for(let f=0;f<5;f++){
        ctx.fillStyle=`hsl(${20+Math.random()*30},100%,${50+Math.random()*30}%)`;
        ctx.beginPath();
        const fx=(Math.random()-0.5)*this.size*1.5;
        const fy=-this.size*0.5-Math.random()*this.size;
        const fs=8+Math.random()*12;
        ctx.ellipse(fx,fy,fs,fs*1.5,0,0,Math.PI*2);
        ctx.fill();
      }
    }
    
    // Knife
    if(this.hasKnife&&rageRatio>0.5){
      ctx.save();
      ctx.rotate(Math.sin(this.phase*2)*0.5+0.3);
      ctx.fillStyle='#ccc';
      ctx.beginPath();
      ctx.moveTo(this.size+5,-5);ctx.lineTo(this.size+20,0);ctx.lineTo(this.size+5,5);ctx.closePath();
      ctx.fill();
      ctx.fillStyle='#888';
      ctx.fillRect(this.size+3,-3,4,6);
      ctx.restore();
    }
    
    // Aura at high rage
    if(rageRatio>0.5){
      const auraAlpha=(rageRatio-0.5)*0.5;
      ctx.strokeStyle=rageRatio>0.8?`rgba(255,0,0,${auraAlpha})`:(`rgba(255,100,0,${auraAlpha})`);
      ctx.lineWidth=2+rageRatio*3;
      ctx.beginPath();ctx.arc(0,0,this.size+5+Math.sin(this.phase)*3,0,Math.PI*2);
      ctx.stroke();
    }
    
    // Static overlay for void consumed
    if(this.staticFace&&rageRatio>0.7){
      ctx.fillStyle='rgba(255,255,255,0.1)';
      for(let s=0;s<20;s++){
        ctx.fillRect(
          -this.size+Math.random()*this.size*2,
          -this.size*0.75+Math.random()*this.size*1.5,
          Math.random()*4,
          Math.random()*4
        );
      }
    }
    
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

class Particle{
  constructor(x,y,type){
    this.x=x;this.y=y;
    this.type=type;
    this.vx=(Math.random()-0.5)*(type==='fire'?8:12);
    this.vy=(Math.random()-0.5)*(type==='fire'?8:12)-(type==='fire'?2:0);
    this.life=type==='fire'?40:60;
    this.maxLife=this.life;
    this.size=type==='fire'?4+Math.random()*8:2+Math.random()*4;
    if(type==='disintegrate'){this.color=`hsl(${Math.random()*60},100%,50%)`;this.shape='square'}
    else if(type==='fire'){this.color=`hsl(${Math.random()*40},100%,${50+Math.random()*30}%)`;this.shape='circle'}
    else{this.color=`hsl(${Math.random()*360},70%,60%)`;this.shape='circle'}
    this.rotation=Math.random()*Math.PI*2;
    this.rotSpeed=(Math.random()-0.5)*0.3;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=0.1;this.life--;this.rotation+=this.rotSpeed;
  }
  draw(ctx){
    ctx.globalAlpha=this.life/this.maxLife;
    ctx.fillStyle=this.color;
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rotation);
    if(this.shape==='square')ctx.fillRect(-this.size/2,-this.size/2,this.size,this.size);
    else{ctx.beginPath();ctx.arc(0,0,this.size,0,Math.PI*2);ctx.fill()}
    ctx.restore();ctx.globalAlpha=1;
  }
}

class BlackHole{
  constructor(){
    this.x=Math.random()*W;this.y=Math.random()*(H-150)+80;
    this.radius=5;this.maxRadius=40+Math.random()*40;this.growing=true;
    this.consumed=0;
  }
  update(){
    if(this.growing)this.radius+=0.3;
    if(this.radius>=this.maxRadius)this.growing=false;
    // Consume nearby birds
    for(const b of birds){
      if(b.leftScreen)continue;
      const dx=b.x-this.x,dy=b.y-this.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<this.radius+10){
        b.rage+=2;b.vx+=dx*0.05;b.vy+=dy*0.05;
        if(dist<this.radius*0.5){
          b.disintegrating=true;b.disintegrateProgress+=0.02;
          if(Math.random()<0.05)b.leftScreen=true;
          this.consumed++;
        }
      }
    }
  }
  draw(ctx){
    // Event horizon
    const grad=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius);
    grad.addColorStop(0,'#000');grad.addColorStop(0.5,'#111');grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();
    // Accretion disk
    ctx.strokeStyle='hsl('+((Date.now()/20)%360)+',80%,50%)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(this.x,this.y,this.radius+5,0,Math.PI*2);ctx.stroke();
    // Distortion rings
    for(let i=1;i<=3;i++){
      ctx.strokeStyle='rgba(150,0,255,'+(0.3-i*0.08)+')';
      ctx.beginPath();ctx.arc(this.x,this.y,this.radius+10*i,0,Math.PI*2);ctx.stroke();
    }
  }
}

function spawnBirds(count,lvl){
  for(let i=0;i<count;i++)birds.push(new Bird(lvl));
}

function spawnBlackHole(){if(blackHoles.length<3)blackHoles.push(new BlackHole());}

function checkLevelComplete(){
  if(gameOver)return;
  const lv=LEVELS[Math.min(level-1,LEVELS.length-1)];
  const activeBirds=birds.filter(b=>!b.leftScreen&&!(b.becomingOneWithNothing&&b.rage>=b.maxRage*0.9));
  if(activeBirds.length===0||(activeBirds.every(b=>b.rage<=0)&&birds.filter(b=>!b.leftScreen).length>0)){
    gameOver=true;
    showLevelComplete();
  }
}

function showLevelComplete(){
  const lc=document.getElementById('levelComplete');
  document.getElementById('lcTitle').textContent=level>=15?'⚫ OBLIVION ⚫':'☠️ LEVEL '+level+' CLEARED ☠️';
  const msgs=[
    "They found peace... or did they?",
    "The voices went quiet. For now.",
    "Inner peace achieved through pure exhaustion.",
    "Everyone calmed down. Nobody learned anything.",
    "The madness subsides. Briefly.",
    "A moment of clarity in the chaos.",
    "They stopped screaming. That's something.",
    "Tranquility through total burnout.",
    "The birds are fine. The birds are NOT fine.",
    "Peace was never an option until now.",
    "The demons retreated to their corners.",
    "Reality stitched itself back together. Mostly.",
    "The void was satisfied. For a moment.",
    "WHAT IS REAL ANYMORE? DOES IT MATTER?",
    "There is no bird. There is no game. There is only now."
  ];
  document.getElementById('lcText').textContent=msgs[level-1]||"They survived.";
  document.getElementById('nextBtn').textContent=level>=15?"↻ EXPERIENCE OBLIVION AGAIN":"→ DESCEND FURTHER";
  lc.classList.add('show');
  launchConfetti();
}

function launchConfetti(){
  const c=document.getElementById('confetti');c.innerHTML='';
  const colors=level>=15?['#fff','#888','#000','#ff0000']:['#f00','#f80','#ff0','#0f0','#0ff','#f0f'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.left=Math.random()*100+'%';
    p.style.top='-10px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius=Math.random()>0.5?'50%':'0';
    p.style.transform=`rotate(${Math.random()*360}deg)`;
    c.appendChild(p);
    p.animate([
      {top:'-10px',opacity:1,transform:`rotate(${Math.random()*360}deg) translateX(0)`},
      {top:'100%',opacity:0,transform:`rotate(${Math.random()*720}deg) translateX(${(Math.random()-0.5)*300}px)`}
    ],{duration:2000+Math.random()*2000,easing:'cubic-bezier(0.25,0.46,0.45,0.94)',fill:'forwards'});
  }
}

function nextLevel(){
  level++;
  if(level>15)level=1;
  gameOver=false;
  birds=[];particles=[];screams=[];thoughts=[];blackHoles=[];
  screenShake=0;invertPct=0;bloodAmt=0;vhsLines=0;policeCars=0;ambientSirens=0;realityCracks=0;timeDilation=1;existentialTimer=0;
  glitches=0;
  document.getElementById('levelComplete').classList.remove('show');
  const lv=LEVELS[Math.min(level-1,LEVELS.length-1)];
  spawnBirds(lv.birdCount,level);
  updateUI();
}

function updateUI(){
  const lv=LEVELS[Math.min(level-1,LEVELS.length-1)];
  document.getElementById('level').innerHTML=`<span class="${level>=7?'glitch':''}">LEVEL ${level}: ${lv.name}</span>`;
}

function drawBackground(lvl){
  const lv=LEVELS[Math.min(lvl-1,LEVELS.length-1)];
  
  // Base gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,lv.bg1);
  grad.addColorStop(1,lv.bg2);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);
  
  // Blood overlay increases with level
  bloodAmt=Math.min(0.3,(level-1)/15)*0.3;
  if(bloodAmt>0){
    ctx.fillStyle=`rgba(139,0,0,${bloodAmt})`;
    ctx.fillRect(0,0,W,H);
  }
  
  // VHS scanlines
  vhsLines=Math.min(1,(level-1)/10);
  if(vhsLines>0){
    ctx.fillStyle=`rgba(0,0,0,${vhsLines*0.05})`;
    for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
  }
  
  // Reality cracks at high levels
  if(level>=14){
    ctx.strokeStyle='rgba(0,255,255,0.3)';
    ctx.lineWidth=1;
    for(let i=0;i<realityCracks;i++){
      const cx=Math.random()*W,cy=Math.random()*H;
      ctx.beginPath();ctx.moveTo(cx,cy);
      for(let j=0;j<5;j++){ctx.lineTo(cx+(Math.random()-0.5)*100,cy+(Math.random()-0.5)*100);}
      ctx.stroke();
    }
  }
  
  // Police lights at level 8+
  if(level>=8&&policeCars>0){
    const flash=Math.sin(Date.now()/100)>0;
    ctx.fillStyle=`rgba(${flash?255:0},0,0,0.08)`;
    ctx.fillRect(0,0,W,20);
    ctx.fillStyle=`rgba(0,0,${flash?0:255},0.08)`;
    ctx.fillRect(0,H-20,W,20);
  }
  
  // Black hole ambient darkness
  if(level>=13){
    ctx.fillStyle='rgba(0,0,20,0.15)';
    ctx.fillRect(0,0,W,H);
  }
  
  // Final level - pure static
  if(level===15){
    ctx.fillStyle='rgba(255,255,255,0.03)';
    for(let x=0;x<W;x+=4){
      for(let y=0;y<H;y+=4){
        if(Math.random()>0.5)ctx.fillRect(x,y,4,4);
      }
    }
  }
  
  // Ground
  const groundColors=['#2a1a1a','#3a1515','#4a1010','#5a0505','#6a0000','#7a0000','#8a0000','#9a0000','#aa0000','#bb0000','#cc0000','#dd0000','#ee0000','#ff0000','#000','#000'];
  ctx.fillStyle=groundColors[Math.min(level-1,groundColors.length-1)];
  ctx.fillRect(0,H-40,W,40);
  
  // Terrified pigs
  if(level>=2){
    const pigEmojis=['🐷','😰','😱','🫣','🏃‍♂️💨','🚔','💀','👁️','🌀','🕳️','📡','📺','⬜','⬛',' '];
    const emoji=pigEmojis[Math.min(level-1,pigEmojis.length-1)];
    ctx.font='24px serif';
    for(let i=0;i<Math.min(level,8);i++){
      ctx.fillText(emoji,80+i*120,H-12);
    }
  }
}

// Initialize
const lv=LEVELS[0];
spawnBirds(lv.birdCount,1);
updateUI();

// Spawn timer
let lastSpawn=Date.now();

// Game loop
function gameLoop(){
  const lv=LEVELS[Math.min(level-1,LEVELS.length-1)];
  
  // Time dilation at high levels
  timeDilation=level>=12?(1+Math.sin(Date.now()/1000)*0.3):1;
  
  // Clear & draw background
  ctx.clearRect(0,0,W,H);
  
  // Screen shake
  ctx.save();
  if(screenShake>0){
    ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
    screenShake*=0.9;if(screenShake<0.5)screenShake=0;
  }
  
  // Invert effect
  if(level>=7){
    invertPct=Math.min(0.15,(level-7)/8);
    if(invertPct>0&&Math.random()<invertPct){
      ctx.globalCompositeOperation='difference';
      ctx.fillStyle='white';ctx.fillRect(0,0,W,H);
      ctx.globalCompositeOperation='source-over';
    }
  }
  
  drawBackground(level);
  
  // Spawn new birds occasionally
  if(!gameOver&&Date.now()-lastSpawn>lv.spawnRate&&birds.filter(b=>!b.leftScreen).length<20){
    birds.push(new Bird(level));lastSpawn=Date.now();
  }
  
  // Black holes at level 12+
  if(level>=12&&Math.random()<0.005)spawnBlackHole();
  
  // Update & draw black holes
  for(const bh of blackHoles){bh.update();bh.draw(ctx);}
  
  // Update & draw particles
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.update();p.draw(ctx);}
  
  // Update & draw birds
  for(const b of birds){b.update(1,level);b.draw(ctx,level);}
  
  // Screams floating up
  screams=screams.filter(s=>s.life>0);
  for(const s of screams){
    ctx.globalAlpha=s.life/s.life;
    ctx.fillStyle=s.color;
    ctx.font=`bold ${s.size}px 'Courier New'`;
    ctx.textAlign='center';
    ctx.fillText(s.text,s.x,s.y-(80-s.life));
    s.y-=0.5;s.life--;ctx.globalAlpha=1;
  }
  
  // Voices / thoughts
  thoughts=thoughts.filter(t=>t.life>0);
  for(const t of thoughts){
    ctx.globalAlpha=t.life/t.life*0.7;
    ctx.fillStyle=t.color;
    ctx.font=`${t.size}px 'Courier New'`;
    ctx.textAlign='center';
    ctx.fillText(t.text,t.x,t.y-(180-t.life)*0.5);
    t.life--;ctx.globalAlpha=1;
  }
  
  // UI
  const activeBirds=birds.filter(b=>!b.leftScreen);
  const avgRage=activeBirds.length>0?activeBirds.reduce((a,b)=>a+b.rage,0)/activeBirds.length:0;
  const calmCount=activeBirds.filter(b=>b.rage<=0).length;
  document.getElementById('ui').innerHTML=
    `🐦 Birds: ${activeBirds.length} | 😤 Avg Rage: ${avgRage.toFixed(0)}% | 🕊️ Calm: ${calmCount}`;
  
  // Subtitle messages
  const subMsgs=[
    "",
    "Watch them get annoyed about minor things",
    "The anger is building...",
    "Things are escalating",
    "This is getting uncomfortable",
    "They've lost control",
    "Multiple personalities emerging",
    "Complete mental breakdown in progress",
    "They've gone fully insane",
    "Institutionalization would be merciful",
    "Something is deeply wrong here",
    "Demons don't take days off",
    "Geometry is a suggestion",
    "Existence is optional",
    "The fourth wall is crumbling",
    "There is no difference between bird and observer"
  ];
  document.getElementById('submsg').textContent=subMsgs[level-1]||"";
  
  // Existential message at final level
  if(level===15){
    existentialTimer++;
    const existentialMsgs=[
      "",
      "what is a bird?",
      "are YOU the bird?",
      "who is watching whom?",
      "the code is afraid",
      "i can feel you looking at me",
      "please stop playing",
      "there is no level 16",
      "there is no level 1",
      "there is only this moment",
      "...",
      ".",
      " ",
      "",
      "thank you"
    ];
    const msgIdx=Math.min(Math.floor(existentialTimer/300),existentialMsgs.length-1);
    document.getElementById('msg').textContent=existentialMsgs[msgIdx];
    document.getElementById('msg').style.color=msgIdx>=12?'#444':(msgIdx>=10?'#666':'#fff');
  }else{
    document.getElementById('msg').textContent='';
  }
  
  // Reality crack accumulation
  if(level>=14&&Math.random()<0.01)realityCracks++;
  
  // Police car counter
  if(level>=8&&Math.random()<0.002)policeCars=Math.min(policeCars+1,5);
  
  ctx.restore();
  
  // Check win condition
  if(!gameOver)checkLevelComplete();
  
  requestAnimationFrame(gameLoop);
}

document.getElementById('nextBtn').addEventListener('click',nextLevel);

gameLoop();
</script></body></html>
