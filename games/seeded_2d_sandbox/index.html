<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Seeded 2D Sandbox</title>
<style>
  :root{
    --ui-bg: rgba(0,0,0,0.6);
    --panel: rgba(20,20,20,0.9);
    --accent: #ffcc66;
    --font: 12px/1.1 "Segoe UI", Roboto, Arial, sans-serif;
  }
  html,body{height:100%;margin:0;background:#6fc3ff;color:#eee;font:var(--font);}
  #game {position:relative;width:100%;height:100%;overflow:hidden;touch-action:none;}
  canvas{display:block;background:linear-gradient(#87ceeb,#cfeaff 60%);width:100%;height:100%;}
  .ui {
    position:absolute;left:8px;top:8px;padding:6px;border-radius:6px;background:var(--ui-bg);
    color:#fff;font:var(--font);backdrop-filter: blur(4px);
  }
  .ui input[type=text]{width:160px;padding:4px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#fff}
  .btn{padding:4px 8px;margin-left:6px;border-radius:4px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#fff;cursor:pointer}
  .hotbar{position:absolute;left:50%;transform:translateX(-50%);bottom:12px;display:flex;gap:6px;padding:6px;border-radius:6px;background:rgba(0,0,0,0.4)}
  .slot{width:40px;height:40px;border:2px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;position:relative;font-size:11px}
  .slot.selected{outline:2px solid var(--accent);box-shadow:0 0 6px rgba(255,200,120,0.2)}
  .slot .count{position:absolute;right:4px;bottom:2px;font-size:11px}
  #seedDisplay{width:200px}
  #controls{position:absolute;right:8px;top:8px;padding:6px;border-radius:6px;background:var(--ui-bg)}
  #inventoryPanel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--panel);padding:12px;border-radius:8px;display:none;min-width:320px}
  #inventoryGrid{display:grid;grid-template-columns:repeat(9,40px);gap:6px;margin-bottom:8px}
  .inv-slot{width:40px;height:40px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.04)}
  #crafting{display:flex;gap:12px;align-items:center}
  #craftGrid{display:grid;grid-template-columns:repeat(2,40px);grid-template-rows:repeat(2,40px);gap:6px;background:rgba(255,255,255,0.03);padding:6px;border-radius:4px}
  #craftResult{width:60px;height:60px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid rgba(255,255,255,0.04)}
  .small{font-size:11px;color:#ddd}
  #toast{position:absolute;left:50%;transform:translateX(-50%);top:16px;padding:6px 12px;border-radius:6px;background:rgba(0,0,0,0.6);display:none}
  #touchControls{position:absolute;left:8px;bottom:8px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.03);display:none}
  #jumpBtn,#invBtn{position:absolute;right:8px;bottom:80px;padding:10px;border-radius:8px;background:rgba(0,0,0,0.4);display:none}
  #shareBtn{margin-left:6px}
  footer{position:absolute;left:8px;bottom:8px;color:#ddd;font-size:11px}
  .help{font-size:11px;color:#ddd;margin-top:6px}
  @media (max-width:600px){
    #touchControls,#jumpBtn,#invBtn{display:block}
    .ui{display:none}
    .hotbar{bottom:76px}
  }
</style>
</head>
<body>
<div id="game">
  <canvas id="c"></canvas>

  <div class="ui" id="topUI">
    Seed: <input id="seedDisplay" type="text" /> 
    <button class="btn" id="applySeed">Apply</button>
    <button class="btn" id="randomSeed">Random</button>
    <button class="btn" id="shareBtn">Copy URL</button>
    <div class="help">WASD / Arrows move • E open inventory/craft • Click to break/place • 1-9 select</div>
  </div>

  <div id="controls" class="ui">
    Day: <span id="dayLabel">0</span><br>
    FPS: <span id="fps">0</span><br>
    Chunks: <span id="chunkCount">0</span><br>
    Player: <span id="playerPos">0,0</span>
  </div>

  <div class="hotbar" id="hotbar"></div>

  <div id="inventoryPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div><strong>Inventory</strong></div>
      <div><button class="btn" id="closeInv">Close (E)</button></div>
    </div>
    <div id="inventoryGrid"></div>
    <div id="crafting">
      <div>
        <div class="small">Craft (2x2)</div>
        <div id="craftGrid"></div>
      </div>
      <div>
        <div class="small">Result</div>
        <div id="craftResult"></div>
        <div style="margin-top:6px">
          <button class="btn" id="craftTake">Take</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <div id="touchControls"></div>
  <button id="jumpBtn" class="btn">Jump</button>
  <button id="invBtn" class="btn">Inventory</button>

  <footer>Seeded 2D Sandbox — MIT License</footer>
</div>

/* ==========================
   Utility & PRNG + Noise
   ========================== */

function cyrb128(str) {
  let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
  for (let i = 0, k; i < str.length; i++) {
    k = str.charCodeAt(i);
    h1 = (h2 ^ Math.imul(h1 ^ k, 597399067)) >>> 0;
    h2 = (h3 ^ Math.imul(h2 ^ k, 2869860233)) >>> 0;
    h3 = (h4 ^ Math.imul(h3 ^ k, 951274213)) >>> 0;
    h4 = (h1 ^ Math.imul(h4 ^ k, 2716044179)) >>> 0;
  }
  h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067) >>> 0;
  h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233) >>> 0;
  h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213) >>> 0;
  h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179) >>> 0;
  return [(h1^h2^h3^h4)>>>0, (h2^h1)>>>0, (h3^h1)>>>0, (h4^h1)>>>0];
}
function mulberry32(a) {
  return function() {
    let t = (a += 0x6D2B79F5) | 0;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
// Simple 1D value noise with interpolation
function makeNoise1D(seed) {
  const h = cyrb128(seed + "_noise")[0];
  const rnd = mulberry32(h);
  const perm = new Uint32Array(4096);
  for (let i = 0; i < perm.length; i++) perm[i] = Math.floor(rnd() * 4294967295);
  return function(x) {
    const xi = Math.floor(x) & 4095;
    const xf = x - Math.floor(x);
    const a = perm[xi] / 4294967295;
    const b = perm[(xi + 1) & 4095] / 4294967295;
    const f = xf * xf * (3 - 2 * xf);
    return a + (b - a) * f;
  };
}

/* ==========================
   Block definitions
   ========================== */

const TILE = 16;
const WORLD_HEIGHT = 256;
const CHUNK_W = 32; // width in blocks
const RENDER_DIST_CHUNKS = 6; // around player
const GRAVITY = 0.25;
const MAX_FALL_VEL = 6;

const BLOCK = {
  AIR: 0,
  DIRT: 1,
  GRASS: 2,
  STONE: 3,
  WOOD: 4,
  LEAVES: 5,
  SAND: 6,
  WATER: 7,
  COAL: 8,
  IRON: 9,
  PLANK: 10,
  STICK: 11,
  WOOD_PICK: 100
};
const BLOCK_META = {
  0: {name:'Air',color:'#00000000',solid:false},
  1: {name:'Dirt',color:'#8B5A2B',solid:true},
  2: {name:'Grass',color:'#4CAF50',solid:true},
  3: {name:'Stone',color:'#888888',solid:true},
  4: {name:'Wood',color:'#8B4513',solid:true},
  5: {name:'Leaves',color:'#3AA655',solid:false},
  6: {name:'Sand',color:'#E4D096',solid:true},
  7: {name:'Water',color:'#4BA3FFAA',solid:false,fluid:true},
  8: {name:'Coal Ore',color:'#222',solid:true},
  9: {name:'Iron Ore',color:'#B87333',solid:true},
  10:{name:'Plank',color:'#C68642',solid:true},
  11:{name:'Stick',color:'#CFC08D',solid:false},
  100:{name:'Wooden Pickaxe',color:'#ffcc66',tool:true,dur:30}
};

const TOOL_BREAK_SPEED = {
  [BLOCK.WOOD_PICK]: {stone: 0.5, default:1}
};

function isPlaceable(id){
  return id>0 && id<100 && id!==11; // sticks non-placeable, tools non-placeable
}

/* ==========================
   World & Chunk system
   ========================== */

class Chunk {
  constructor(cx, seed, noiseFn) {
    this.cx = cx; // chunk coordinate
    this.seed = seed;
    this.dirty = false;
    this.cells = new Uint16Array(CHUNK_W * WORLD_HEIGHT);
    this.init(noiseFn);
  }
  index(x,y){ return (x + y*CHUNK_W); }
  init(noiseFn){
    // fill with air then generate terrain
    this.cells.fill(BLOCK.AIR);
    // generate surface heights per column using noise across world x
    for (let x=0;x<CHUNK_W;x++){
      const worldX = this.cx * CHUNK_W + x;
      const h_base = Math.floor(100 + noiseFn(worldX*0.01)*30 + noiseFn(worldX*0.005)*20); // between ~50-170
      const surface = Math.max(10, Math.min(WORLD_HEIGHT-20, h_base));
      for (let y=surface;y<WORLD_HEIGHT;y++){
        let block = BLOCK.DIRT;
        const depth = y - surface;
        if (depth == 0) block = BLOCK.GRASS;
        if (depth > 4) block = BLOCK.STONE;
        // sand near water level (simple)
        if (y > 150 && noiseFn(worldX*0.1) > 0.7) block = BLOCK.SAND;
        // ores
        if (block === BLOCK.STONE) {
          const r = Math.abs(Math.floor((noiseFn(worldX*0.08)+noiseFn(y*0.09))*1000))%1000;
          if (r < 10) block = BLOCK.COAL;
          if (r > 990) block = BLOCK.IRON;
        }
        this.cells[this.index(x,y)] = block;
      }
      // small trees occasionally
      if (noiseFn(worldX*0.07) > 0.85 && Math.random()*1 < 0.7) {
        const trunkTop = surface - 1;
        if (trunkTop > 6 && trunkTop < WORLD_HEIGHT) {
          // place tree: wood upwards
          for (let t=0;t<4;t++){
            const ty = trunkTop - t;
            if (ty>=0) this.cells[this.index(x,ty)] = BLOCK.WOOD;
          }
          // leaves
          for (let lx=-2;lx<=2;lx++){
            for (let ly=-4;ly<=0;ly++){
              const px = x+lx;
              const py = trunkTop + ly - 4;
              if (px>=0 && px<CHUNK_W && py>=0 && py<WORLD_HEIGHT){
                if (Math.abs(lx)+Math.abs(ly) < 4 && Math.random()>0.2) this.cells[this.index(px,py)] = BLOCK.LEAVES;
              }
            }
          }
        }
      }
    }
  }
  get(x,y){ if (x<0||x>=CHUNK_W||y<0||y>=WORLD_HEIGHT) return BLOCK.AIR; return this.cells[this.index(x,y)];}
  set(x,y,v){ if (x<0||x>=CHUNK_W||y<0||y>=WORLD_HEIGHT) return; this.cells[this.index(x,y)] = v; this.dirty = true;}
  serialize(){ return JSON.stringify(Array.from(this.cells)); }
  static deserialize(cx,seed,s,noiseFn){
    const c = new Chunk(cx,seed,noiseFn);
    try {
      const arr = JSON.parse(s);
      c.cells = Uint16Array.from(arr);
      c.dirty = true;
    } catch(e){}
    return c;
  }
}

/* ==========================
   Game State
   ========================== */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d',{alpha:false});
let W = canvas.width = innerWidth;
let H = canvas.height = innerHeight;

window.addEventListener('resize',()=>{ W = canvas.width = innerWidth; H = canvas.height = innerHeight; });

let seed = getSeedFromURL() || randomSeed();
document.getElementById('seedDisplay').value = seed;

let noiseFn = makeNoise1D(seed);
let chunks = new Map(); // key: cx -> Chunk
let chunkCacheKeys = {}; // track keys loaded

function chunkKey(cx){ return `sbox:${seed}:${cx}`; }

function loadChunk(cx){
  if (chunks.has(cx)) return chunks.get(cx);
  // attempt load from localStorage
  const key = chunkKey(cx);
  const saved = localStorage.getItem(key);
  if (saved) {
    const c = Chunk.deserialize(cx,seed,saved,noiseFn);
    chunks.set(cx,c);
    return c;
  } else {
    const c = new Chunk(cx,seed,noiseFn);
    chunks.set(cx,c);
    return c;
  }
}

function saveChunk(cx){
  const c = chunks.get(cx);
  if (!c) return;
  try {
    localStorage.setItem(chunkKey(cx), c.serialize());
    c.dirty = false;
  } catch(e){
    // storage full - ignore
    console.warn("Save failed",e);
  }
}

function unloadFarChunks(px){
  // remove chunks far from player to keep memory low
  const pcx = Math.floor(px/CHUNK_W);
  const toRemove = [];
  for (let [k,v] of chunks){
    if (Math.abs(k - pcx) > RENDER_DIST_CHUNKS+3){
      toRemove.push(k);
    }
  }
  for (let k of toRemove){
    const c = chunks.get(k);
    if (c && c.dirty) saveChunk(k);
    chunks.delete(k);
  }
}

/* ==========================
   Player & Inventory
   ========================== */

const player = {
  x: 0, y: 80, // in blocks (float)
  vx:0, vy:0,
  w:0.8, h:1.8,
  onGround:false,
  selected:0,
  inventory: new Array(36).fill(null), // items {id,count,meta}
  hotbarSlots: 9,
  tools: {}, // tool id -> durability
};

function ensureInitPlayer(){
  player.x = 0;
  player.y = 60;
  // give starting items
  giveItem({id:BLOCK.WOOD,count:8});
  giveItem({id:BLOCK.PLANK,count:8});
  giveItem({id:BLOCK.STONE,count:4});
  // equip first slot
  player.selected = 0;
}
function findEmptySlot(){
  for (let i=0;i<player.inventory.length;i++) if (!player.inventory[i]) return i;
  return -1;
}
function giveItem(item){
  // merge stacks simple
  for (let i=0;i<player.inventory.length;i++){
    const it = player.inventory[i];
    if (it && it.id === item.id && it.count < 999){
      const take = Math.min(999 - it.count, item.count);
      it.count += take;
      item.count -= take;
      if (item.count<=0) return true;
    }
  }
  while(item.count>0){
    const idx = findEmptySlot();
    if (idx<0) { showToast("Inventory full"); return false;}
    const put = Math.min(item.count, 999);
    player.inventory[idx] = {id:item.id,count:put};
    item.count -= put;
  }
  return true;
}
function removeFromHotbar(slotCount){
  // remove one of selected
  const idx = player.selected;
  const globalIndex = idx; // hotbar sits in inv 0..8
  if (!player.inventory[globalIndex]) return false;
  player.inventory[globalIndex].count -= 1;
  if (player.inventory[globalIndex].count<=0) player.inventory[globalIndex]=null;
  return true;
}

/* ==========================
   Input
   ========================== */

const keys = {};
window.addEventListener('keydown',(e)=>{
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'e' || e.key === 'E') {
    toggleInventory();
    e.preventDefault();
  }
  if (e.key.length===1 && /[1-9]/.test(e.key)){
    const n = parseInt(e.key)-1;
    player.selected = n;
    renderHotbar();
  }
});
window.addEventListener('keyup',(e)=>{ keys[e.key.toLowerCase()] = false; });

let mouse = {x:0,y:0,down:false,button:0};
canvas.addEventListener('mousemove',(e)=>{
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left);
  mouse.y = (e.clientY - rect.top);
});
canvas.addEventListener('mousedown',(e)=>{
  mouse.down = true; mouse.button = e.button;
  handleMouseAction(e.button);
});
canvas.addEventListener('mouseup',(e)=>{ mouse.down=false; });
canvas.addEventListener('contextmenu',(e)=>{ e.preventDefault(); });

function screenToWorld(mx,my){
  const cam = camera();
  const wx = Math.floor((mx)/TILE + cam.x);
  const wy = Math.floor((my)/TILE + cam.y);
  return {x:wx,y:wy};
}
function handleMouseAction(button){
  const {x,y} = screenToWorld(mouse.x,mouse.y);
  if (button === 0){ // break
    breakBlockAt(x,y);
  } else if (button === 2){ // place
    placeBlockAt(x,y);
  } else {
    // also allow left-click to place if holding block and clicking adjacent
    placeBlockAt(x,y);
  }
}

/* ==========================
   Block interactions
   ========================== */

function getBlockAt(wx,wy){
  if (wy<0 || wy>=WORLD_HEIGHT) return BLOCK.AIR;
  const cx = Math.floor(wx / CHUNK_W);
  const lx = ((wx % CHUNK_W) + CHUNK_W) % CHUNK_W;
  const c = loadChunk(cx);
  return c.get(lx,wy);
}
function setBlockAt(wx,wy,id){
  if (wy<0 || wy>=WORLD_HEIGHT) return;
  const cx = Math.floor(wx / CHUNK_W);
  const lx = ((wx % CHUNK_W) + CHUNK_W) % CHUNK_W;
  const c = loadChunk(cx);
  c.set(lx,wy,id);
}

function breakBlockAt(wx,wy){
  const b = getBlockAt(wx,wy);
  if (b === BLOCK.AIR) return;
  // tool check (if stone requires pickaxe), implement simplistic durability
  const tool = player.inventory[player.selected] ? player.inventory[player.selected].id : null;
  let speed = 1;
  if (tool && TOOL_BREAK_SPEED[tool]) {
    speed = TOOL_BREAK_SPEED[tool].default;
    if (BLOCK_META[b] && b===BLOCK.STONE && TOOL_BREAK_SPEED[tool].stone !== undefined) speed = TOOL_BREAK_SPEED[tool].stone;
    // reduce durability
    if (BLOCK_META[tool] && BLOCK_META[tool].tool){
      reduceToolDurability(tool);
    }
  } else {
    // fists slow on stone
    if (b===BLOCK.STONE) { showToast("Need a tool for stone"); return; }
  }
  // drop item
  const dropId = b;
  setBlockAt(wx,wy,BLOCK.AIR);
  giveItem({id:dropId,count:1});
  // mark chunk dirty saved on unload
  const cx = Math.floor(wx/CHUNK_W);
  const c = loadChunk(cx);
  c.dirty = true;
}

function placeBlockAt(wx,wy){
  // place only if target is air and ground adjacent/always allow
  const b = getBlockAt(wx,wy);
  if (b !== BLOCK.AIR) return;
  const slotId = player.inventory[player.selected] ? player.inventory[player.selected].id : null;
  if (!slotId) return;
  if (!isPlaceable(slotId)) return;
  setBlockAt(wx,wy,slotId);
  player.inventory[player.selected].count -= 1;
  if (player.inventory[player.selected].count<=0) player.inventory[player.selected]=null;
  const cx = Math.floor(wx/CHUNK_W);
  loadChunk(cx).dirty = true;
  renderHotbar();
}

/* ==========================
   Tools
   ========================== */

function reduceToolDurability(toolId){
  // find current equipped tool instance
  let invIdx = player.selected;
  const it = player.inventory[invIdx];
  if (!it || it.id !== toolId) return;
  if (!player.tools[toolId]) player.tools[toolId] = BLOCK_META[toolId].dur;
  player.tools[toolId] -= 1;
  showToast(`${BLOCK_META[toolId].name} durability ${player.tools[toolId]}`);
  if (player.tools[toolId] <= 0){
    player.inventory[invIdx] = null;
    delete player.tools[toolId];
    showToast(`${BLOCK_META[toolId].name} broke`);
  }
}

/* ==========================
   Simple physics for falling sand
   ========================== */

function simulateFalling(){
  // For visible chunks, scan for sand blocks and make them fall if air below
  const px = player.x;
  const pcx = Math.floor(px/CHUNK_W);
  for (let cx = pcx - (RENDER_DIST_CHUNKS+1); cx <= pcx + (RENDER_DIST_CHUNKS+1); cx++){
    const c = loadChunk(cx);
    // bottom-up to avoid double moves
    for (let x = 0; x < CHUNK_W; x++){
      for (let y = WORLD_HEIGHT-2; y>=0; y--){
        const idx = c.index(x,y);
        const b = c.cells[idx];
        if (b === BLOCK.SAND){
          if (y+1 < WORLD_HEIGHT && c.get(x,y+1) === BLOCK.AIR){
            c.set(x,y+1,BLOCK.SAND);
            c.set(x,y,BLOCK.AIR);
          } else {
            // allow diagonal slide
            const leftEmpty = (x-1>=0 ? c.get(x-1,y+1) === BLOCK.AIR : getBlockAt(cx*CHUNK_W+(x-1),y+1) === BLOCK.AIR);
            const rightEmpty = (x+1<CHUNK_W ? c.get(x+1,y+1) === BLOCK.AIR : getBlockAt(cx*CHUNK_W+(x+1),y+1) === BLOCK.AIR);
            if (leftEmpty && Math.random()>0.5){
              if (x-1>=0){ c.set(x-1,y+1,BLOCK.SAND); c.set(x,y,BLOCK.AIR); }
              else { setBlockAt(cx*CHUNK_W+(x-1),y+1,BLOCK.SAND); c.set(x,y,BLOCK.AIR); }
            } else if (rightEmpty){
              if (x+1<CHUNK_W){ c.set(x+1,y+1,BLOCK.SAND); c.set(x,y,BLOCK.AIR); }
              else { setBlockAt(cx*CHUNK_W+(x+1),y+1,BLOCK.SAND); c.set(x,y,BLOCK.AIR); }
            }
          }
        }
      }
    }
  }
}

/* ==========================
   Camera & Rendering
   ========================== */

function camera(){
  // center on player
  const camX = player.x - (W / TILE)/2 + player.w/2;
  const camY = player.y - (H / TILE)/2 + player.h/2;
  return {x:camX, y:camY};
}

function render(){
  ctx.clearRect(0,0,W,H);
  // sky gradient already set in CSS background, but in canvas we'll draw background
  // draw tiles
  const cam = camera();
  const startX = Math.floor(cam.x);
  const startY = Math.floor(cam.y);
  const cols = Math.ceil(W / TILE) + 1;
  const rows = Math.ceil(H / TILE) + 1;

  const startChunk = Math.floor(startX / CHUNK_W)-1;
  const endChunk = Math.floor((startX+cols) / CHUNK_W)+1;

  // draw world tiles per chunk
  for (let cx = startChunk; cx<=endChunk; cx++){
    const c = loadChunk(cx);
    for (let lx=0;lx<CHUNK_W;lx++){
      const worldX = cx*CHUNK_W + lx;
      const sx = (worldX - cam.x) * TILE;
      if (sx+TILE < -TILE || sx > W+TILE) continue;
      // find y range
      const y0 = Math.max(0,startY);
      const y1 = Math.min(WORLD_HEIGHT,startY+rows);
      for (let y=y0;y<y1;y++){
        const id = c.get(lx,y);
        if (id===BLOCK.AIR) continue;
        const sy = (y - cam.y) * TILE;
        // draw tile
        ctx.fillStyle = BLOCK_META[id].color || '#f0f';
        ctx.fillRect(Math.floor(sx),Math.floor(sy),TILE,TILE);
        // simple outline
        ctx.strokeStyle = 'rgba(0,0,0,0.08)';
        ctx.strokeRect(Math.floor(sx)+0.5,Math.floor(sy)+0.5,TILE-1,TILE-1);
      }
    }
  }

  // draw player
  ctx.fillStyle = '#ffeb99';
  const px = (player.x - cam.x) * TILE;
  const py = (player.y - cam.y) * TILE;
  ctx.fillRect(px,py,player.w*TILE,player.h*TILE);
  // draw hotbar selection indicator
  // draw day/night overlay
  const dayFrac = (timeOfDay % dayLength) / dayLength;
  const nightAlpha = Math.max(0, Math.cos(dayFrac*2*Math.PI)*0.5);
  ctx.fillStyle = `rgba(0,0,30,${nightAlpha*0.6})`;
  ctx.fillRect(0,0,W,H);

  // HUD texts update
  document.getElementById('playerPos').textContent = `${player.x.toFixed(1)},${player.y.toFixed(1)}`;
  document.getElementById('dayLabel').textContent = Math.floor(timeOfDay/dayLength*24);
  document.getElementById('chunkCount').textContent = chunks.size;
}

/* ==========================
   UI: Hotbar / Inventory / Crafting
   ========================== */

const hotbarEl = document.getElementById('hotbar');
function renderHotbar(){
  hotbarEl.innerHTML = '';
  for (let i=0;i<player.hotbarSlots;i++){
    const slot = document.createElement('div');
    slot.className = 'slot' + (i===player.selected ? ' selected':'');
    slot.innerHTML = player.inventory[i] ? `${renderItemIcon(player.inventory[i].id)}<span class="count">${player.inventory[i].count}</span>` : '';
    hotbarEl.appendChild(slot);
  }
}
function renderItemIcon(id){
  if (!id) return '';
  const color = BLOCK_META[id] ? BLOCK_META[id].color : '#fff';
  return `<div style="width:20px;height:20px;background:${color};border-radius:2px"></div>`;
}

function openInventory(){
  populateInventory();
  document.getElementById('inventoryPanel').style.display = 'block';
}
function closeInventory(){ document.getElementById('inventoryPanel').style.display = 'none';}
function toggleInventory(){ const el = document.getElementById('inventoryPanel'); if (el.style.display==='block') closeInventory(); else openInventory(); }

function populateInventory(){
  const grid = document.getElementById('inventoryGrid');
  grid.innerHTML = '';
  for (let i=0;i<player.inventory.length;i++){
    const it = player.inventory[i];
    const div = document.createElement('div');
    div.className = 'inv-slot';
    div.dataset.idx = i;
    div.innerHTML = it ? `${renderItemIcon(it.id)}<span style="position:absolute;right:4px;bottom:2px;font-size:11px">${it.count}</span>` : '';
    div.addEventListener('click', ()=>{ player.selected = i; renderHotbar(); populateInventory(); });
    grid.appendChild(div);
  }
  renderCraftGrid();
}

function renderCraftGrid(){
  const cg = document.getElementById('craftGrid'); cg.innerHTML='';
  // simple crafting: we'll let player drag from inventory into craft grid by clicking slots - but simpler: auto-detect "selected" item placed into first craft slot
  // We'll implement a simple UI: click on craft slot to place one from selected inventory, click result to take.
  for (let i=0;i<4;i++){
    const s = document.createElement('div'); s.className='inv-slot'; s.dataset.slot=i;
    s.addEventListener('click',()=>{
      // move one item from selected inventory into craft slot (temp)
      if (!craftSlots[i] && player.inventory[player.selected]){
        craftSlots[i] = {id:player.inventory[player.selected].id,count:1};
        player.inventory[player.selected].count -=1; if (player.inventory[player.selected].count<=0) player.inventory[player.selected]=null;
        populateInventory();
      } else {
        // remove from craft back to inventory
        if (craftSlots[i]){
          giveItem({id:craftSlots[i].id,count:craftSlots[i].count});
          craftSlots[i]=null;
          populateInventory();
        }
      }
      renderCraftGrid();
    });
    if (craftSlots[i]) s.innerHTML = `${renderItemIcon(craftSlots[i].id)}<span style="position:absolute;right:4px;bottom:2px;font-size:11px">${craftSlots[i].count}</span>`;
    cg.appendChild(s);
  }
  // render result
  const res = document.getElementById('craftResult');
  const r = craftResult();
  res.innerHTML = r ? `${renderItemIcon(r.id)}<div class="small">${r.count}</div>` : '';
}

let craftSlots = [null,null,null,null];

function craftResult(){
  // count items
  const counts = {};
  for (let s of craftSlots) if (s) counts[s.id] = (counts[s.id]||0)+s.count;
  // recipes:
  // wood(log) x1 -> plank x4
  if (counts[BLOCK.WOOD] >= 1) return {id:BLOCK.PLANK,count:4};
  // plank x2 -> stick x4
  if (counts[BLOCK.PLANK] >= 2) return {id:BLOCK.STICK,count:4};
  // planks x2 + stick x1 -> wooden pick
  if ((counts[BLOCK.PLANK]||0) >=2 && (counts[BLOCK.STICK]||0) >=1) return {id:BLOCK.WOOD_PICK,count:1,tool:true};
  return null;
}

document.getElementById('craftTake').addEventListener('click',()=>{
  const r = craftResult();
  if (!r) { showToast("No recipe"); return; }
  // consume craft slots accordingly
  // naive consumption: remove items by id until consumed
  let needed = {};
  if (r.id === BLOCK.PLANK){ needed[BLOCK.WOOD] = 1; }
  if (r.id === BLOCK.STICK){ needed[BLOCK.PLANK] = 2; }
  if (r.id === BLOCK.WOOD_PICK){ needed[BLOCK.PLANK]=2; needed[BLOCK.STICK]=1; }
  // try consume
  for (let id in needed){
    let need = needed[id];
    for (let i=0;i<craftSlots.length;i++){
      if (!craftSlots[i]) continue;
      if (craftSlots[i].id == id){
        const take = Math.min(need, craftSlots[i].count);
        craftSlots[i].count -= take;
        need -= take;
        if (craftSlots[i].count<=0) craftSlots[i]=null;
      }
      if (need<=0) break;
    }
    if (need>0){ showToast("Missing materials"); return; }
  }
  // add result
  giveItem({id:r.id,count:r.count});
  if (r.tool) player.tools[r.id] = BLOCK_META[r.id].dur || 30;
  renderHotbar(); renderCraftGrid(); populateInventory();
});

/* ==========================
   UI: seed management, share
   ========================== */

document.getElementById('applySeed').addEventListener('click', ()=>{
  const val = document.getElementById('seedDisplay').value.trim();
  if (!val) return;
  applySeed(val);
});
document.getElementById('randomSeed').addEventListener('click', ()=>{
  const s = randomSeed();
  document.getElementById('seedDisplay').value = s;
  applySeed(s);
});
document.getElementById('shareBtn').addEventListener('click', ()=>{
  const url = updateURLSeed(seed, true);
  navigator.clipboard?.writeText(url).then(()=>showToast("URL copied"));
});

function applySeed(s){
  saveAllChunks();
  seed = s;
  history.replaceState({},'', updateURLSeed(s,false));
  noiseFn = makeNoise1D(seed);
  chunks.clear();
  ensureInitPlayer();
  renderHotbar();
}

/* ==========================
   Misc helpers
   ========================== */

function getSeedFromURL(){
  const params = new URLSearchParams(location.search);
  return params.get('seed');
}
function updateURLSeed(s, returnOnly=false){
  const u = new URL(location.href);
  u.searchParams.set('seed', s);
  if (!returnOnly) history.replaceState({},'',u.toString());
  return u.toString();
}
function randomSeed(){ return Math.random().toString(36).slice(2,10); }

function showToast(t,ms=1500){
  const el = document.getElementById('toast'); el.textContent = t; el.style.display='block';
  setTimeout(()=>el.style.display='none',ms);
}

/* ==========================
   Save / Load
   ========================== */

function saveAllChunks(){
  for (let [k,c] of chunks) if (c.dirty) saveChunk(k);
}

/* ==========================
   Main Loop & Simulation
   ========================== */

let last = performance.now();
let accumulator = 0;
const dt = 1000/60;
let fpsCounter=0, fpsTime=0;
let fps=0;

let timeOfDay = 0; // ticks
const dayLength = 60*10; // seconds * frames? we'll advance per tick

function tick(){
  // input move
  const left = keys['a'] || keys['arrowleft'];
  const right = keys['d'] || keys['arrowright'];
  const up = keys['w'] || keys['arrowup'] || keys[' '];
  if (left) player.vx = Math.max(player.vx - 0.2, -2);
  if (right) player.vx = Math.min(player.vx + 0.2, 2);
  if (!left && !right) player.vx *= 0.8;
  // apply gravity
  player.vy = Math.min(player.vy + GRAVITY, MAX_FALL_VEL);
  // jumping
  if (up && player.onGround){
    player.vy = -5;
    player.onGround = false;
  }
  // integrate
  let newx = player.x + player.vx * 0.1;
  let newy = player.y + player.vy * 0.07;
  // collision simple: check feet and head
  // horizontal collision
  if (!collidesAt(newx, player.y)) player.x = newx; else player.vx = 0;
  // vertical
  if (!collidesAt(player.x, newy)){
    player.y = newy; player.onGround=false;
  } else {
    if (player.vy > 0) player.onGround = true;
    player.vy = 0;
  }

  // chunk unloading/loading
  unloadFarChunks(player.x);

  // falling sand simulation occasional
  simulateFalling();

  // time
  timeOfDay = (timeOfDay + 1) % (dayLength*60);
}

function collidesAt(x,y){
  // check AABB against solid blocks
  const minX = Math.floor(x);
  const maxX = Math.floor(x + player.w - 0.0001);
  const minY = Math.floor(y);
  const maxY = Math.floor(y + player.h - 0.0001);
  for (let bx=minX; bx<=maxX; bx++){
    for (let by=minY; by<=maxY; by++){
      const b = getBlockAt(bx,by);
      if (b !== BLOCK.AIR && BLOCK_META[b] && BLOCK_META[b].solid) return true;
    }
  }
  return false;
}

function frame(){
  const now = performance.now();
  let elapsed = now - last;
  last = now;
  accumulator += elapsed;
  while (accumulator >= dt){
    tick();
    accumulator -= dt;
  }
  render();
  // fps
  fpsTime += elapsed; fpsCounter++;
  if (fpsTime > 500){
    fps = Math.round(fpsCounter / (fpsTime/1000));
    document.getElementById('fps').textContent = fps;
    fpsCounter = 0; fpsTime = 0;
  }
  requestAnimationFrame(frame);
}

/* ==========================
   Mouse/Touch helpers + mobile
   ========================== */

let touchState = {left:false,right:false,joystickX:0,joystickY:0};
const touchControls = document.getElementById('touchControls');
let touchActiveId = null;
touchControls.addEventListener('touchstart',(e)=>{ e.preventDefault(); const t = e.changedTouches[0]; touchActiveId = t.identifier; },{passive:false});
touchControls.addEventListener('touchmove',(e)=>{ e.preventDefault(); },{passive:false});
document.getElementById('jumpBtn').addEventListener('click',()=>{ keys['w']=true; setTimeout(()=>keys['w']=false,120);});
document.getElementById('invBtn').addEventListener('click',()=>{ toggleInventory(); });

/* ==========================
   Init
   ========================== */

function init(){
  noiseFn = makeNoise1D(seed);
  chunks.clear();
  ensureInitPlayer();
  renderHotbar();
  // initialize inventory slots array if empty
  if (!player.inventory[0]) {
    // ensure hotbar items are in first slots
    for (let i=0;i<player.inventory.length;i++) if (!player.inventory[i]) player.inventory[i]=null;
  }
  // event bindings for inventory panel
  document.getElementById('closeInv').addEventListener('click', closeInventory);
  // initial camera position center at 0
  updateURLSeed(seed,false);
  requestAnimationFrame(frame);
}

window.addEventListener('beforeunload', ()=>{ saveAllChunks(); });

/* ==========================
   Helpers & boot
   ========================== */

function renderInitialChunksAround(p){
  const pcx = Math.floor(p / CHUNK_W);
  for (let i=pcx-RENDER_DIST_CHUNKS; i<=pcx+RENDER_DIST_CHUNKS; i++) loadChunk(i);
}

init();

/* ==========================
   Simple UI hookups & finalize
   ========================== */

// populate initial inventory UI
renderHotbar();
populateInventory();

// seed apply handled above
document.getElementById('seedDisplay').addEventListener('change', (e)=>{ /* nothing */ });

// quick mouse break on hold
let mouseHoldInterval = null;
canvas.addEventListener('mousedown',(e)=>{
  clearInterval(mouseHoldInterval);
  mouseHoldInterval = setInterval(()=>{ handleMouseAction(e.button); }, 200);
});
window.addEventListener('mouseup',()=>{ clearInterval(mouseHoldInterval); });

// helper to render inventory after modifying
populateInventory();

// Quick save on Ctrl+S
window.addEventListener('keydown',(e)=>{
  if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase() === 's'){ e.preventDefault(); saveAllChunks(); showToast('Saved'); }
});

// ensure initial chunks
renderInitialChunksAround(player.x);
