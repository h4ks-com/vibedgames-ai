<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Firerun — Ask For Fire</title>
<style>
  html,body{height:100%;margin:0;background:#0a0200;overflow:hidden;font-family:monospace;color:#fff}
  canvas{display:block;background:#000}
  #ui{
    position:fixed;left:8px;top:8px;z-index:10;
    background:rgba(0,0,0,0.35);padding:8px;border-radius:6px;border:1px solid rgba(255,120,40,0.12);
  }
  #ui div{margin:4px 0;font-size:14px}
  #overlay{
    position:fixed;left:0;top:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .panel{
    pointer-events:auto;
    background:rgba(10,10,10,0.95);padding:18px;border-radius:10px;border:2px solid rgba(255,140,0,0.12);
    width:720px;max-width:94%;color:#fff;
  }
  .shop-row{display:flex;justify-content:space-between;align-items:center;margin:10px 0}
  .btn{background:#ff7a00;border:none;padding:8px 12px;border-radius:6px;color:#111;font-weight:700;cursor:pointer}
  .small{font-size:12px;color:#ddd}
  .center{display:flex;justify-content:center}
  #instructions{position:fixed;right:8px;top:8px;background:rgba(0,0,0,0.3);padding:8px;border-radius:6px;font-size:13px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div>Level: <span id="level">1</span></div>
  <div>Time: <span id="time">30</span>s</div>
  <div>Flames: <span id="flames">0</span>/10</div>
  <div>Coins: <span id="coins">0</span></div>
  <div>Bombs: <span id="bombs">0</span></div>
  <div>HP: <span id="hp">3</span> Armor: <span id="armor">0</span></div>
</div>
<div id="instructions">
  WASD: Move/Jump<br>
  B: Shoot fireball &nbsp; C: Use bomb
</div>
<div id="overlay"></div>
<script>
(() => {
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let W = innerWidth, H = innerHeight; canvas.width = W; canvas.height = H;
window.addEventListener('resize', ()=>{ W = innerWidth; H = innerHeight; canvas.width = W; canvas.height = H; });

const elLevel = document.getElementById('level'), elTime = document.getElementById('time'),
      elFlames = document.getElementById('flames'), elCoins = document.getElementById('coins'),
      elBombs = document.getElementById('bombs'), elHp = document.getElementById('hp'),
      elArmor = document.getElementById('armor'), overlay = document.getElementById('overlay');

let keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.key===' ') e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

const GRAVITY = 0.9;
const GROUND_Y = H * 0.78;
const PATH_LENGTH_SCREENS = 5;
const PATH_SEGMENT_WIDTH = () => W;
const PATH_SEGMENT_TOTAL = () => PATH_SEGMENT_WIDTH() * PATH_LENGTH_SCREENS;

const LAYERS = 6;
const PARALLAX = [0.05,0.12,0.24,0.45,0.68,1.0];

let rng = mulberry32(Date.now());

function mulberry32(a){ return function(){ a |= 0; a = a + 0x6D2B79F5 | 0; var t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; } }
function rand(min,max){ return rng()*(max-min)+min; }
function rint(min,max){ return Math.floor(rand(min,max+1)); }
function choice(a){ return a[Math.floor(rng()*a.length)]; }

const ADJ = ["Ember","Crimson","Singe","Ashen","Blazing","Scorch","Cinder","Inferno","Flare","Kindle","Molten","Charred"];
const NOUN = ["Ridge","Vale","Hollow","Run","Dunes","Hearth","Plateau","Spire","Pass","Haven","Gorge","Fields"];
const ANIMALS = ["fox","bird","stag","hare","wolf","bat","owl","lizard"];

let game = { level:1, timeLeft:30, coins:0, bombsOwned:0, speedUpgrade:0, armorUpgrade:0, inShop:false, paused:false };
let player = { x: W*0.2, y: GROUND_Y-44, w:40, h:48, vy:0, onGround:true, baseSpeed:3.2, hp:3, flamesCollected:0, isMega:false, megaTimer:0 };

let worldX = 0;
let pathQueue = [], currentPathIndex = 0;
let flames = [], coins = [], enemies = [], projectiles = [], particles = [];

function makePath(id){
  const seed = Math.floor(rng()*1000000) ^ (game.level*997) ^ id;
  const rr = mulberry32(seed);
  const rrand = (a,b)=> rr()*(b-a)+a;
  const name = choice(ADJ) + " " + choice(NOUN) + (rr() < 0.25 ? " " + Math.floor(rrand(1,99)) : "");
  const skyHue = Math.floor(rrand(0,50));
  const sky = `hsl(${Math.floor(rrand(0,50))},${Math.floor(rrand(30,70))}%,${Math.floor(rrand(8,24))}%)`;
  const cloudColor = `hsla(${Math.floor(rrand(0,50))},${Math.floor(rrand(10,50))}%,${Math.floor(rrand(70,95))}%,${rrand(0.3,0.9).toFixed(2)})`;
  const mountainColor = `hsl(${Math.floor(rrand(0,30))},${Math.floor(rrand(15,45))}%,${Math.floor(rrand(12,35))}%)`;
  const farTree = `hsl(${Math.floor(rrand(0,40))},${Math.floor(rrand(20,55))}%,${Math.floor(rrand(8,28))}%)`;
  const nearTree = `hsl(${Math.floor(rrand(0,40))},${Math.floor(rrand(30,65))}%,${Math.floor(rrand(6,22))}%)`;
  const ground = `hsl(${Math.floor(rrand(0,30))},${Math.floor(rrand(30,60))}%,${Math.floor(rrand(6,15))}%)`;
  const sun = rr() < 0.7;
  const total = PATH_SEGMENT_TOTAL();
  const clouds = new Array(rint(6,14)).fill(0).map(()=>({ x: rrand(0,total), y: rrand(H*0.04,H*0.36), size: rrand(60,220), drift: rrand(-0.2,0.6) }));
  const mountains = new Array(rint(2,6)).fill(0).map(()=>({ x: rrand(0,total), baseY: rrand(H*0.45,H*0.66), h: rrand(H*0.12,H*0.35), w: rrand(220,520) }));
  const farTrees = new Array(rint(6,14)).fill(0).map(()=>({ x: rrand(0,total), h: rrand(40,90) }));
  const nearTrees = new Array(rint(8,20)).fill(0).map(()=>({ x: rrand(0,total), h: rrand(90,180) }));
  const details = new Array(rint(12,28)).fill(0).map(()=>({ x: rrand(0,total), size: rrand(6,28), yoff: rrand(-10,20) }));
  // animals decorate
  const animals = new Array(rint(2,6)).fill(0).map(()=>({
    type: choice(ANIMALS),
    x: rrand(20,total-20),
    y: GROUND_Y - rrand(8, 80)
  }));
  // spawn items & spiders
  const flameCount = rint(6,14);
  const localFlames = [];
  for(let i=0;i<flameCount;i++) localFlames.push({ x: Math.floor(rrand(40,total-60)), y: GROUND_Y - 34 - Math.floor(rrand(0,140)), r:9 });
  const coinCount = rint(8,18);
  const localCoins = [];
  for(let i=0;i<coinCount;i++) localCoins.push({ x: Math.floor(rrand(40,total-60)), y: GROUND_Y - Math.floor(rrand(8,80)), r:8 });
  const enemyCount = rint(5,11) + Math.floor(game.level/4);
  const localEnemies = [];
  for(let i=0;i<enemyCount;i++) localEnemies.push({ x: Math.floor(rrand(80,total-80)), y: GROUND_Y - 10, w:34, h:18, vx: (rr() < 0.5?-1:1)*rrand(0.2,1.0), jumpTimer: rint(20,120), jumpCooldown: rint(60,160), onGround:true, vy:0 });
  return { id, name, colorScheme:{sky,cloudColor,mountainColor,farTree,nearTree,ground,sun}, clouds, mountains, farTrees, nearTrees, details, animals, flames: localFlames, coins: localCoins, enemies: localEnemies, length: total };
}

function ensurePaths(count=4){
  while(pathQueue.length < count){
    const id = pathQueue.length + Date.now()%10000 + Math.floor(rng()*9999);
    pathQueue.push(makePath(id));
  }
}

function resetLevel(){
  worldX = 0; currentPathIndex = 0; pathQueue = [];
  ensurePaths(8);
  flames = []; coins = []; enemies = []; projectiles = []; particles = [];
  // instantiate first few segments into world arrays
  for(let i=0;i<6;i++){
    const p = pathQueue[i];
    const base = i * PATH_SEGMENT_TOTAL();
    p.flames.forEach(f => flames.push({ x: f.x + base, y: f.y, r: f.r, collected:false }));
    p.coins.forEach(c => coins.push({ x: c.x + base, y: c.y, r: c.r, collected:false }));
    p.enemies.forEach(e => enemies.push({ ...e, x: e.x + base }));
  }
  player.x = W*0.2; player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true;
  player.hp = 3 + game.armorUpgrade; player.flamesCollected = 0; player.isMega = false; player.megaTimer = 0;
  game.timeLeft = 30;
  game.inShop = false; game.paused = false;
  updateUI();
}

function updateUI(){
  elLevel.textContent = game.level;
  elTime.textContent = Math.ceil(game.timeLeft);
  elFlames.textContent = player.flamesCollected;
  elCoins.textContent = game.coins;
  elBombs.textContent = game.bombsOwned;
  elHp.textContent = player.hp;
  elArmor.textContent = game.armorUpgrade;
}

let lastTs = performance.now();
function loop(ts){
  const dt = Math.min(0.04, (ts - lastTs) / 1000); lastTs = ts;
  if(!game.paused && !game.inShop){ update(dt); render(); } else { render(); }
  requestAnimationFrame(loop);
}

function update(dt){
  game.timeLeft -= dt;
  if(game.timeLeft <= 0){ openShop(); return; }
  let move = 0;
  if(keys['a']) move -= 1;
  if(keys['d']) move += 1;
  if((keys['w'] || keys[' ']) && player.onGround){ player.vy = -13; player.onGround = false; }
  let speed = player.baseSpeed * (1 + 0.12*game.speedUpgrade);
  if(player.isMega) speed *= 5;
  const desired = move * speed * (1 + game.level * 0.01) * (1 + player.flamesCollected*0.02);
  if(desired > 0) worldX += desired;
  else { worldX += desired * 0.6; if(worldX < 0) worldX = 0; }
  // gravity
  player.vy += GRAVITY; player.y += player.vy;
  if(player.y + player.h >= GROUND_Y){ player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true; } else player.onGround = false;
  // extend paths
  const neededSegments = Math.ceil((worldX + W*2) / PATH_SEGMENT_TOTAL());
  ensurePaths(neededSegments + 4);
  // prune behind
  const behind = worldX - W*1.5;
  flames = flames.filter(f => !f.collected && f.x > behind);
  coins = coins.filter(c => !c.collected && c.x > behind);
  enemies = enemies.filter(e => e.x > behind - 400);
  // collisions flames
  for(let i=0;i<flames.length;i++){
    const f = flames[i];
    if(!f.collected && distance(player.x + player.w/2, player.y + player.h/2, f.x - worldX + player.x, f.y) < 36){
      f.collected = true; player.flamesCollected++;
      spawnParticles(f.x - worldX, f.y, 8, 'orange');
      if(player.flamesCollected >= 10){ player.flamesCollected -= 10; triggerMega(); }
    }
  }
  // coins
  for(let i=0;i<coins.length;i++){
    const c = coins[i];
    if(!c.collected && distance(player.x + player.w/2, player.y + player.h/2, c.x - worldX + player.x, c.y) < 30){
      c.collected = true; game.coins += 1; spawnParticles(c.x - worldX, c.y, 6, 'gold');
    }
  }
  // enemies AI and collisions
  for(let ei=enemies.length-1; ei>=0; ei--){
    const e = enemies[ei];
    const ex = e.x - worldX;
    // simple move
    e.x += e.vx * (1 + game.level*0.02) * dt * 60;
    e.jumpTimer--;
    if(e.jumpTimer <= 0 && e.onGround){ e.vy = -8 - Math.random()*4; e.onGround = false; e.jumpTimer = e.jumpCooldown; }
    e.vy += GRAVITY*0.7; e.y += e.vy;
    if(e.y + e.h >= GROUND_Y){ e.y = GROUND_Y - e.h; e.vy = 0; e.onGround = true; }
    const px = player.x + player.w/2, py = player.y + player.h/2;
    if(distance(px, py, ex + e.w/2, e.y + e.h/2) < 40){
      if(!e._hitCooldown){ e._hitCooldown = 40; const dmg = Math.max(1, Math.round(1 - game.armorUpgrade*0.2)); player.hp -= dmg; spawnParticles(player.x+20, player.y+10, 12, 'red'); if(player.hp <= 0){ game.coins = Math.max(0, game.coins - Math.floor(game.coins*0.25)); resetLevel(); return; } }
    }
    if(e._hitCooldown) e._hitCooldown--;
  }
  // projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const p = projectiles[i];
    p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.vy += GRAVITY*0.3;
    if(p.x < -200 || p.x > worldX + W + 200 || p.y > H + 200){ projectiles.splice(i,1); continue; }
    for(let j=enemies.length-1;j>=0;j--){
      const e = enemies[j];
      if(distance(p.x, p.y, e.x - worldX + player.x, e.y + e.h/2) < 30){
        spawnParticles(e.x - worldX, e.y, 10, 'orange');
        enemies.splice(j,1);
        if(Math.random() < 0.5) game.coins += 1;
        projectiles.splice(i,1);
        break;
      }
    }
  }
  // bring new path contents as we approach
  const highestPathIndex = Math.floor((worldX + W*2) / PATH_SEGMENT_TOTAL());
  for(let i=currentPathIndex; i <= highestPathIndex + 4; i++){
    if(pathQueue[i] && !pathQueue[i]._addedToWorld){
      const p = pathQueue[i]; const base = i * PATH_SEGMENT_TOTAL();
      p.flames.forEach(f => flames.push({ x: f.x + base, y: f.y, r: f.r, collected:false }));
      p.coins.forEach(c => coins.push({ x: c.x + base, y: c.y, r: c.r, collected:false }));
      p.enemies.forEach(e => enemies.push({ ...e, x: e.x + base }));
      pathQueue[i]._addedToWorld = true;
    }
  }
  // shooting
  if(keys['b'] && !keys._lastB){ projectiles.push({ x: player.x + 30 + worldX, y: player.y + 8, vx: 12 * (player.isMega?2:1), vy: -2 }); keys._lastB = true; }
  if(!keys['b']) keys._lastB = false;
  // bomb use
  if(keys['c'] && !keys._lastC){ if(game.bombsOwned > 0){ useBomb(); game.bombsOwned--; } keys._lastC = true; }
  if(!keys['c']) keys._lastC = false;
  // mega timer
  if(player.isMega){ player.megaTimer -= dt; if(player.megaTimer <= 0){ player.isMega = false; spawnParticles(player.x+20, player.y+10, 20, 'yellow'); } }
  // particles update
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.vy += 0.3; p.x += p.vx; p.y += p.vy; p.life -= 1; if(p.life <= 0) particles.splice(i,1); }
  updateUI();
}

function triggerMega(){ player.isMega = true; player.megaTimer = 6 + Math.min(6, game.level*0.12); spawnParticles(player.x+20, player.y+10, 40, 'yellow'); }

function useBomb(){
  const bombX = worldX + player.x + 60; const radius = 260;
  for(let i=enemies.length-1;i>=0;i--){ const e = enemies[i]; if(Math.abs(e.x - bombX) < radius){ spawnParticles(e.x - worldX, e.y, 16, 'orange'); enemies.splice(i,1); game.coins += 1; } }
  for(let i=0;i<60;i++) particles.push({ x: (player.x + Math.random()*200), y: player.y + Math.random()*80 - 30, vx: Math.random()*10-5, vy: Math.random()*-6, life: 30, color: 'orange' });
}

function render(){
  ctx.clearRect(0,0,W,H);
  const baseIndex = Math.floor(worldX / PATH_SEGMENT_TOTAL());
  const localOffset = worldX - baseIndex * PATH_SEGMENT_TOTAL();
  const pA = pathQueue[baseIndex] || pathQueue[0];
  const pB = pathQueue[baseIndex+1] || pA;
  const t = (localOffset / PATH_SEGMENT_TOTAL());
  const skyA = pA ? pA.colorScheme.sky : '#150000';
  const skyB = pB ? pB.colorScheme.sky : '#0b0000';
  const grad = ctx.createLinearGradient(0,0,0,H*0.7);
  grad.addColorStop(0, lerpColor(skyA, skyB, t));
  grad.addColorStop(1, '#050202');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H*0.7);
  if(pA && pA.colorScheme.sun){
    ctx.beginPath(); ctx.fillStyle = 'rgba(255,120,30,0.12)'; ctx.arc(W*0.85 - t*200, H*0.18, 80, 0, Math.PI*2); ctx.fill();
  }
  // parallax layers
  for(let layer=0; layer<LAYERS; layer++){
    const speed = PARALLAX[layer];
    const segStart = Math.floor(worldX/(PATH_SEGMENT_TOTAL()))-1;
    const segEnd = Math.floor((worldX+W)/(PATH_SEGMENT_TOTAL()))+1;
    for(let si=segStart; si<=segEnd; si++){
      const seg = pathQueue[si]; if(!seg) continue;
      const segBase = si * PATH_SEGMENT_TOTAL(); const localScroll = (worldX - segBase) * speed;
      if(layer===0){
        ctx.fillStyle = seg.colorScheme.ground; ctx.fillRect(-localScroll, GROUND_Y+player.h, PATH_SEGMENT_TOTAL(), H - GROUND_Y);
      } else if(layer===1){
        seg.clouds.forEach(c => { const cx = (c.x - localScroll); const drawX = cx % PATH_SEGMENT_TOTAL(); const drawY = c.y + Math.sin((worldX + c.x) * 0.002) * 8; ctx.beginPath(); ctx.fillStyle = seg.colorScheme.cloudColor; drawCloud(ctx, drawX, drawY, c.size); ctx.fill(); });
      } else if(layer===2){
        seg.mountains.forEach(m => { const mx = m.x - localScroll; const peakX = mx; const baseY = m.baseY; ctx.beginPath(); ctx.moveTo(peakX - m.w/2, baseY); ctx.lineTo(peakX, baseY - m.h); ctx.lineTo(peakX + m.w/2, baseY); ctx.closePath(); ctx.fillStyle = seg.colorScheme.mountainColor; ctx.fill(); });
      } else if(layer===3){
        seg.farTrees.forEach(tn => { const tx = tn.x - localScroll; ctx.fillStyle = seg.colorScheme.farTree; drawTriangleTree(ctx, tx, GROUND_Y - tn.h - 6, tn.h); });
      } else if(layer===4){
        seg.nearTrees.forEach(nt => { const nx = nt.x - localScroll; ctx.fillStyle = seg.colorScheme.nearTree; drawTriangleTree(ctx, nx, GROUND_Y - nt.h - 2, nt.h); });
      } else if(layer===5){
        seg.details.forEach(d => { const dx = d.x - localScroll; ctx.fillStyle = '#2b1a0f'; ctx.beginPath(); ctx.ellipse(dx, GROUND_Y + d.yoff, d.size, d.size*0.6, 0, 0, Math.PI*2); ctx.fill(); });
        // animals on near layer
        seg.animals.forEach(a => { const ax = a.x - localScroll; drawAnimal(ctx, ax, a.y, a.type); });
      }
    }
  }
  // ground
  ctx.fillStyle = '#2c1206'; ctx.fillRect(0,GROUND_Y, W, H - GROUND_Y);
  // coins
  coins.forEach(c => { if(c.collected) return; const sx = c.x - worldX; if(sx < -80 || sx > W+80) return; drawCoin(ctx, sx, c.y, c.r); });
  // flames
  flames.forEach(f => { if(f.collected) return; const sx = f.x - worldX; if(sx < -80 || sx > W+80) return; drawFlame(ctx, sx, f.y, f.r, true); });
  // enemies
  enemies.forEach(e => { const sx = e.x - worldX; if(sx < -120 || sx > W+120) return; drawSpider(ctx, sx, e.y, e.w, e.h); });
  // projectiles
  projectiles.forEach(p => { const sx = p.x - worldX; ctx.beginPath(); ctx.fillStyle = 'rgba(255,160,40,0.95)'; ctx.ellipse(sx, p.y, 8, 6, 0, 0, Math.PI*2); ctx.fill(); });
  // player
  drawPlayer(ctx, player.x, player.y, player.w, player.h, player.isMega ? '#ffd84d' : '#ff6b1a');
  // particles
  particles.forEach(p => { ctx.fillStyle = p.color || 'orange'; ctx.fillRect(p.x, p.y, 3, 3); });
  // HUD path name
  const currentSeg = pathQueue[baseIndex];
  if(currentSeg){
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(12, H-84, 420, 68);
    ctx.fillStyle = '#ffb27f'; ctx.font = '20px monospace'; ctx.fillText(currentSeg.name || 'Unknown', 22, H-58);
    ctx.font = '13px monospace'; ctx.fillStyle = '#fff'; ctx.fillText('Path ' + (baseIndex+1) + ' — Level ' + game.level, 22, H-36);
  }
  if(game.paused){
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.font = '32px monospace'; ctx.fillText('PAUSED', W/2 - 70, H/2);
  }
}

// draw helpers
function drawCloud(ctx,x,y,size){ ctx.moveTo(x,y); ctx.ellipse(x, y, size*0.6, size*0.4, 0, 0, Math.PI*2); ctx.ellipse(x + size*0.32, y - size*0.08, size*0.44, size*0.32, 0, 0, Math.PI*2); ctx.ellipse(x - size*0.28, y - size*0.06, size*0.34, size*0.28, 0, 0, Math.PI*2); }
function drawTriangleTree(ctx,x,y,h){ ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x - h*0.4, y + h*0.6); ctx.lineTo(x + h*0.4, y + h*0.6); ctx.closePath(); ctx.fill(); ctx.fillStyle = '#2a1407'; ctx.fillRect(x - 4, y + h*0.6, 8, 10); }
function drawCoin(ctx,x,y,r){ ctx.beginPath(); ctx.fillStyle = 'gold'; ctx.ellipse(x, y, r, r, 0, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(x-2, y-6, 4, 12); }
function drawFlame(ctx,x,y,r,glow){ if(glow){ const g = ctx.createRadialGradient(x,y,2,x,y,40); g.addColorStop(0,'rgba(255,160,40,0.9)'); g.addColorStop(1,'rgba(255,40,40,0.02)'); ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(x, y, 36, 46, 0, 0, Math.PI*2); ctx.fill(); } ctx.beginPath(); ctx.fillStyle = '#ff3c00'; ctx.moveTo(x, y - r); ctx.quadraticCurveTo(x + r*0.8, y, x, y + r); ctx.quadraticCurveTo(x - r*0.8, y, x, y - r); ctx.fill(); ctx.fillStyle = 'yellow'; ctx.beginPath(); ctx.ellipse(x, y - 2, r*0.4, r*0.6, 0, 0, Math.PI*2); ctx.fill(); }
function drawSpider(ctx,x,y,w,h){ ctx.save(); ctx.translate(x, y); ctx.fillStyle = '#111'; ctx.beginPath(); ctx.ellipse(0, -6, w*0.38, h*0.6, 0, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(0, 8, w*0.28, h*0.5, 0, 0, Math.PI*2); ctx.fillStyle = '#222'; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 3; for(let i=-1;i<=1;i+=2){ for(let j=0;j<4;j++){ ctx.beginPath(); ctx.moveTo(i*6, j*4 - 8); ctx.quadraticCurveTo(i*(10+j*2), j*8-2, i*(20+j*6), j*12 + 4); ctx.stroke(); } } ctx.restore(); }
function drawPlayer(ctx,x,y,w,h,color){ const t = Date.now()/120; ctx.save(); ctx.translate(x,y); const legA = Math.sin(t)*6; ctx.fillStyle = '#330800'; ctx.fillRect(6, h-6, 8+legA, 6); ctx.fillRect(20, h-6, 8-legA, 6); const cx = w/2, cy = 10; const g = ctx.createRadialGradient(cx, cy, 2, cx, cy, 50); g.addColorStop(0, 'rgba(255,100,20,0.9)'); g.addColorStop(1, 'rgba(255,30,10,0.02)'); ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(cx, cy, 36, 46, 0, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.fillStyle = color; ctx.moveTo(cx, cy-18+Math.sin(t*1.4)*6); ctx.quadraticCurveTo(cx+22, cy, cx, cy+20); ctx.quadraticCurveTo(cx-22, cy, cx, cy-18+Math.sin(t*1.4)*6); ctx.fill(); ctx.fillStyle = '#fff3c6'; ctx.beginPath(); ctx.ellipse(cx, cy-2, 10, 14, 0, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#330000'; ctx.fillRect(cx-6, cy+2, 3,3); ctx.fillRect(cx+3, cy+2, 3,3); ctx.restore(); }
function drawAnimal(ctx,x,y,type){ ctx.save(); ctx.translate(x,y); if(type==='bird'){ ctx.fillStyle = '#d9c9b0'; ctx.beginPath(); ctx.ellipse(0, -6, 10,6,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.moveTo(-10,-6); ctx.quadraticCurveTo(-6,-14,0,-8); ctx.fill(); } else if(type==='fox' || type==='hare' || type==='wolf' || type==='lizard'){ ctx.fillStyle = '#a66b3a'; ctx.beginPath(); ctx.ellipse(0, -6, 12,8,0,0,Math.PI*2); ctx.fill(); } else if(type==='stag'){ ctx.fillStyle='#7a5b3e'; ctx.fillRect(-6,-10,12,6); } else if(type==='owl' || type==='bat'){ ctx.fillStyle='#6d6d6d'; ctx.beginPath(); ctx.ellipse(0,-6,10,6,0,0,Math.PI*2); ctx.fill(); } ctx.restore(); }

function spawnParticles(x,y,n,color){ for(let i=0;i<n;i++) particles.push({ x: x + Math.random()*40 - 20, y: y + Math.random()*20 - 10, vx: Math.random()*6 - 3, vy: Math.random()*-6, life: 12 + Math.floor(Math.random()*20), color }); }

function distance(x1,y1,x2,y2){ return Math.hypot(x1-x2,y1-y2); }
function lerpColor(a,b,t){ try{ if(a.startsWith('hsl') && b.startsWith('hsl')){ const pa=a.match(/hsl\((\d+),(\d+)%,(\d+)%\)/); const pb=b.match(/hsl\((\d+),(\d+)%,(\d+)%\)/); if(pa && pb){ const ha=+pa[1], sa=+pa[2], la=+pa[3]; const hb=+pb[1], sb=+pb[2], lb=+pb[3]; const h=Math.round(ha*(1-t)+hb*t), s=Math.round(sa*(1-t)+sb*t), l=Math.round(la*(1-t)+lb*t); return `hsl(${h},${s}%,${l}%)`; } } }catch(e){} return a; }

function openShop(){
  game.inShop = true; game.paused = true; overlay.innerHTML = '';
  const panel = document.createElement('div'); panel.className = 'panel';
  panel.innerHTML = `<h2 style="margin:0 0 6px 0">Level ${game.level} Complete</h2>
    <div class="small">Time up — spend coins before Level ${game.level+1}</div>
    <div style="margin-top:14px">Coins: <strong>${game.coins}</strong></div>`;
  const row1 = document.createElement('div'); row1.className='shop-row'; row1.innerHTML = `<div>Speed +1 (permanent)</div><div>${100 + game.speedUpgrade*25} coins</div>`; const btn1 = document.createElement('button'); btn1.className='btn'; btn1.textContent='Buy'; row1.appendChild(btn1); panel.appendChild(row1);
  const row2 = document.createElement('div'); row2.className='shop-row'; row2.innerHTML = `<div>Armor +1 (permanent)</div><div>${120 + game.armorUpgrade*30} coins</div>`; const btn2 = document.createElement('button'); btn2.className='btn'; btn2.textContent='Buy'; row2.appendChild(btn2); panel.appendChild(row2);
  const row3 = document.createElement('div'); row3.className='shop-row'; row3.innerHTML = `<div>Bomb (usable)</div><div>40 coins</div>`; const btn3 = document.createElement('button'); btn3.className='btn'; btn3.textContent='Buy'; row3.appendChild(btn3); panel.appendChild(row3);
  const row4 = document.createElement('div'); row4.className='shop-row'; row4.innerHTML = `<div>Proceed to Next Level</div><div></div>`; const btn4 = document.createElement('button'); btn4.className='btn'; btn4.textContent='Continue'; row4.appendChild(btn4); panel.appendChild(row4);
  const info = document.createElement('div'); info.className='small'; info.style.marginTop='12px'; info.innerHTML = `Tip: Press C during a run to detonate a bomb. Collect 10 red flames to become a MegaFlame (5x speed).`; panel.appendChild(info);
  overlay.appendChild(panel);
  btn1.addEventListener('click', ()=>{ const cost = 100 + game.speedUpgrade*25; if(game.coins >= cost){ game.coins -= cost; game.speedUpgrade++; panelPulse(panel,'Purchased Speed'); updateUI(); } else alert('Not enough coins'); });
  btn2.addEventListener('click', ()=>{ const cost = 120 + game.armorUpgrade*30; if(game.coins >= cost){ game.coins -= cost; game.armorUpgrade++; updateUI(); panelPulse(panel,'Purchased Armor'); } else alert('Not enough coins'); });
  btn3.addEventListener('click', ()=>{ const cost = 40; if(game.coins >= cost){ game.coins -= cost; game.bombsOwned++; updateUI(); panelPulse(panel,'Purchased Bomb'); } else alert('Not enough coins'); });
  btn4.addEventListener('click', ()=>{ overlay.innerHTML = ''; game.inShop = false; game.paused = false; game.level++; resetLevel(); });
}

function panelPulse(panel,text){ const el = document.createElement('div'); el.style.marginTop='8px'; el.style.color='#ffd8a6'; el.textContent = text; panel.appendChild(el); setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 1400); }

// start overlay
resetLevel();
updateUI();
requestAnimationFrame(loop);

const startPanel = document.createElement('div'); startPanel.className='panel center';
startPanel.innerHTML = `<div style="text-align:center">
  <h1 style="margin:0 0 6px 0;color:#ff8a3d">Firerun — Ask For Fire</h1>
  <div class="small" style="margin-bottom:10px">You are a fiery running flame. Run along ever-changing paths (5 screens each). Gather 10 red flames to become a MegaFlame (5x speed). Shoot with B. Use bombs with C.</div>
  <div><button id="startBtn" class="btn">Start Run</button></div>
</div>`;
overlay.appendChild(startPanel);
document.getElementById('startBtn').addEventListener('click', ()=>{ overlay.innerHTML = ''; game.paused = false; });

window.addEventListener('keydown', e => { if(e.key.toLowerCase()==='p') game.paused = !game.paused; });

// utility for small randomness when generating names if needed
function rr(){ return rng(); }

})();
</script>
