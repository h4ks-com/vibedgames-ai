<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#fff}
canvas{background:#1a1a2e;border:2px solid #0f3460;border-radius:4px}
#ui{margin-top:12px;text-align:center}
#score{font-size:18px;color:#e94560}
#msg{font-size:14px;color:#999;margin-top:4px}
</style>
</head>
<body>
<canvas id="c" width="400" height="400"></canvas>
<div id="ui">
  <div id="score">Score: 0</div>
  <div id="msg">Arrow keys or WASD · Enter to restart</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const G=20,W=canvas.width/G,H=canvas.height/G;
let snake,dir,food,score,dead,tick;

function init(){
  snake=[{x:10,y:10}];
  dir={x:1,y:0};
  score=0;
  dead=false;
  placeFood();
  updateUI();
  if(tick)clearInterval(tick);
  tick=setInterval(step,100);
}

function placeFood(){
  do{ food={x:Math.floor(Math.random()*W),y:Math.floor(Math.random()*H)}; }
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function step(){
  if(dead)return;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=W||head.y<0||head.y>=H||snake.some(s=>s.x===head.x&&s.y===head.y)){
    dead=true;clearInterval(tick);draw();return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score++;placeFood();}
  else snake.pop();
  draw();
  updateUI();
}

function draw(){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle='#16213e';ctx.lineWidth=0.5;
  for(let i=0;i<=W;i++){ctx.beginPath();ctx.moveTo(i*G,0);ctx.lineTo(i*G,canvas.height);ctx.stroke();}
  for(let i=0;i<=H;i++){ctx.beginPath();ctx.moveTo(0,i*G);ctx.lineTo(canvas.width,i*G);ctx.stroke();}
  // food
  ctx.fillStyle='#e94560';
  ctx.beginPath();ctx.arc(food.x*G+G/2,food.y*G+G/2,G/2-2,0,Math.PI*2);ctx.fill();
  // snake
  snake.forEach((s,i)=>{
    ctx.fillStyle=i===0?'#00fff5':'#0f3460';
    ctx.fillRect(s.x*G+1,s.y*G+1,G-2,G-2);
  });
  if(dead){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#e94560';ctx.font='bold 28px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-10);
    ctx.fillStyle='#fff';ctx.font='16px monospace';
    ctx.fillText('Press Enter',canvas.width/2,canvas.height/2+20);
  }
}

function updateUI(){document.getElementById('score').textContent='Score: '+score;}

const opp={ArrowUp:'ArrowDown',ArrowDown:'ArrowUp',ArrowLeft:'ArrowRight',ArrowRight:'ArrowLeft',
           w:'s',s:'w',a:'d',d:'a',W:'S',S:'W',A:'D',D:'A'};
const dirs={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
            w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
            W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
let lastKey='';

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&dead){init();return;}
  const d=dirs[e.key];
  if(d&&opp[e.key]!==lastKey){dir=d;lastKey=e.key;}
});

init();
</script>
</body>
</html>
