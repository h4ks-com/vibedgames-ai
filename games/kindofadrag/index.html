<!doctype html><html><meta charset=utf-8><title>Draggable Note</title><style>body{margin:0;font-family:sans-serif;background:#eef}#w{position:absolute;left:80px;top:80px;width:340px;border:1px solid #333;background:#fff;box-shadow:4px 4px 8px rgba(0,0,0,.2)}#t{background:#036;color:#fff;padding:6px;cursor:move;user-select:none}#b{padding:8px}textarea{width:100%;height:160px;border:1px solid #ccc;box-sizing:border-box;font-size:14px}</style><body>
<div id=w><div id=t>My Note</div><div id=b><textarea placeholder="Write something..."></textarea></div></div>
<script>
w=document.getElementById('w');t=document.getElementById('t');
t.onmousedown=e=>{e.preventDefault();let dx=e.clientX-w.offsetLeft,dy=e.clientY-w.offsetTop;
 document.onmousemove=e=>{w.style.left=e.clientX-dx+'px';w.style.top=e.clientY-dy+'px'};
 document.onmouseup=()=>document.onmousemove=null};
t.ontouchstart=e=>{e.preventDefault();let touch=e.touches[0],dx=touch.clientX-w.offsetLeft,dy=touch.clientY-w.offsetTop;
 document.ontouchmove=e=>{let t=e.touches[0];w.style.left=t.clientX-dx+'px';w.style.top=t.clientY-dy+'px'};
 document.ontouchend=()=>document.ontouchmove=null};
</script>
</body></html>
