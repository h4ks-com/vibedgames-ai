<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0 user-scalable=no">
<title>🎹 Piano Arena — Multiplayer Piano Hero</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0014;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff;height:100vh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#110022;border-bottom:2px solid #6b21a8;z-index:100;flex-shrink:0}
.header h1{font-size:1.3em;background:linear-gradient(90deg,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;text-shadow:none}
.header .room-code{font-family:'Courier New',monospace;font-size:1.1em;color:#c084fc;font-weight:bold;cursor:pointer;padding:5px 12px;border:2px dashed #7c3aed;border-radius:8px;transition:.2s}
.header .room-code:hover{border-color:#c084fc;background:rgba(168,85,247,.1)}

/* Mode Tabs */
.tabs{display:flex;gap:0;flex-shrink:0;background:#110022;border-bottom:2px solid #3b0764}
.tab{padding:14px 28px;cursor:pointer;font-weight:700;font-size:.95em;transition:.25s;border-bottom:3px solid transparent;color:#9ca3af}
.tab.active{color:#c084fc;border-bottom-color:#a855f7;background:rgba(124,58,237,.08)}
.tab:hover:not(.active){color:#e9d5ff;background:rgba(124,58,237,.05)}

/* Main Area */
.main{flex:1;display:flex;overflow:hidden;position:relative}

/* Sidebar */
.sidebar{width:220px;background:#0d001a;border-right:2px solid #3b0764;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.panel{padding:15px;border-bottom:1px solid #1e1b4b}
.panel h3{font-size:.78em;color:#a78bfa;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.5px}
.player-list{list-style:none}
.player-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.82em}
.avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:bold;color:#fff;flex-shrink:0}
.player-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-val{margin-left:auto;font-weight:bold;color:#f472b6;font-size:.85em}
.activity-log{font-size:.72em;color:#9ca3af;max-height:120px;overflow-y:auto;line-height:1.6}
.log-entry{opacity:.7;padding:1px 0;border-bottom:1px solid rgba(139,92,246,.1)}
.log-entry .key-tag{color:#c084fc;font-weight:bold}

/* Game Area */
.game-area{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* Piano Container */
.piano-container{flex:1;display:flex;align-items:flex-end;justify-content:center;padding:10px 30px 18px;position:relative}
.piano{position:relative;display:flex;height:100%;max-width:900px;width:100%}

/* White Keys */
.white-key{width:100%;height:100%;background:linear-gradient(180deg,#fff 0%,#f0f0f0 85%,#ddd 100%);border:1px solid #999;border-radius:0 0 6px 6px;cursor:pointer;position:relative;z-index:1;transition:transform .05s,box-shadow .05s;box-shadow:0 4px 8px rgba(0,0,0,.3),inset 0 -3px 6px rgba(0,0,0,.1)}
.white-key:hover{background:linear-gradient(180deg,#fff 0%,#f8f8f8 90%,#eee 100%)}
.white-key.active{background:linear-gradient(180deg,#e8e0ff 0%,#d8c8ff 60%,#c0a8ff 100%)!important;transform:translateY(2px)!important;box-shadow:0 2px 3px rgba(0,0,0,.2),inset 0 1px 4px rgba(124,58,237,.3),0 0 20px rgba(168,85,247,.4)!important}
.key-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:.65em;color:#888;font-weight:bold;pointer-events:none;white-space:nowrap}
.key-bind{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:.6em;color:#aaa;font-weight:bold;pointer-events:none;opacity:.6}

/* Black Keys */
.black-key{width:62%;height:62%;background:linear-gradient(180deg,#333 0%,111 80%,000 100%);border-radius:0 0 4px 4px;position:absolute;z-index:2;top:0;cursor:pointer;transition:transform .05s,box-shadow .05s;box-shadow:0 3px 6px rgba(0,0,0,.5),inset 0 -2px 4px rgba(255,255,255,.05)}
.black-key:hover{background:linear-gradient(180deg,#444 0%,222 85%,000 100%)}
.black-key.active{background:linear-gradient(180deg,#6b21a8 0%,4c1d95 70%,2e1065 100%)!important;transform:translateY(2px)!important;box-shadow:0 2px 4px rgba(0,0,0,.3),inset 0 1px 3px rgba(168,85,247,.4),0 0 16px rgba(168,85,247,.5)!important}
.black-key .key-label{color:#ccc;font-size:.55em;bottom:5px}
.black-key .key-bind{color:#888;font-size:.52em;top:6px}

/* Tiles Area */
.tiles-area{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none;display:none}
.tiles-area.active{display:block}
.tile{position:absolute;width:calc((100% - 30px*2) / 13 - 4px);height:50px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.95em;color:#fff;pointer-events:auto;cursor:pointer;animation:tileFall linear forwards;text-shadow:0 1px 3px rgba(0,0,0,.5);z-index:10}
@keyframes tileFall{from{top:-55px}to{top:calc(100% + 5px)}}
.tile.hit{animation:none!important;transform:scale(1.15);transition:all .1s}
.tile.miss{opacity:.2;transform:scale(.8);transition:all .3s}

/* Hit Zone */
.hit-zone{position:absolute;left:30px;right:30px;height:70px;border:3px dashed rgba(168,85,247,.5);border-radius:12px;bottom:95px;pointer-events:none;display:none;z-index:5}
.hit-zone.active{display:block}
.hit-zone-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:.75em;color:#a78bfa;font-weight:bold;white-space:nowrap;text-shadow:0 0 8px rgba(168,85,247,.5)}

/* Hit Effects */
.hit-effect{position:absolute;font-size:1.4em;font-weight:bold;pointer-events:none;animation:hitFloat 1s ease-out forwards;z-index:50;text-shadow:0 2px 8px rgba(0,0,0,.6)}
@keyframes hitFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

/* HUD */
.hud{position:absolute;top:10px;right:20px;display:flex;gap:15px;z-index:50;pointer-events:none}
.hud-item{text-align:center;background:rgba(0,0,0,.6);padding:8px 16px;border-radius:10px;border:1px solid rgba(168,85,247,.3);backdrop-filter:blur(6px)}
.hud-label{font-size:.65em;color:#9ca3af;text-transform:uppercase;letter-spacing:1px}
.hud-value{font-size:1.35em;font-weight:bold;color:#f472b6}
.combo-fire{color:#ff6b35;text-shadow:0 0 10px #ff6b35;animation:firePulse .3s infinite alternate}
@keyframes firePulse{from{text-shadow:0 0 8px #ff6b35}to{text-shadow:0 0 16px #ff6b35,0 0 24px #f97316}}

/* Game Over Overlay */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:200;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.overlay h2{font-size:2.8em;margin-bottom:5px}
.grade{font-size:5em;font-weight:900;margin:10px 0;text-shadow:0 0 40px currentColor}
.rank-s{color:#ffd700;text-shadow:0 0 30px #ffd700,0 0 60px #ffa500}
.rank-a{color:#c084fc;text-shadow:0 0 30px #a855f7}
.rank-b{color:#22d3ee;text-shadow:0 0 20px #06b6d4}
.rank-c{color:#4ade80;text-shadow:0 0 20px #22c55e}
.rank-d{color:#fb923c;text-shadow:0 0 15px #f97316}
.rank-f{color:#f87171;text-shadow:0 0 15px #ef4444}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 30px;margin:15px 0 25px;text-align:center;font-size:.95em}
.stat-row{color:#9ca3af}
.stat-row b{color:#fff;font-size:1.1em}
.btn{padding:14px 36px;font-size:1.05em;font-weight:bold;border:none;border-radius:12px;cursor:pointer;transition:.2s;margin:5px;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;box-shadow:0 4px 15px rgba(124,58,237,.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.5)}
.btn-secondary{background:#1e1b4b;color:#c084fc;border:2px solid #3b0764}
.btn-secondary:hover{background:#2e1065}

/* Room Controls */
.room-controls{display:flex;gap:8px;align-items:center}
.btn-sm{padding:6px 14px;font-size:.8em;font-weight:bold;border:none;border-radius:8px;cursor:pointer;transition:.15s;font-family:inherit}
.btn-create{background:#7c3aed;color:#fff}
.btn-join{background:#1e1b4b;color:#c084fc;border:1px solid #3b0764}
.btn-copy{background:#0d001a;color:#9ca3af;border:1px solid #3b0764}
.btn-sm:hover{transform:scale(1.05)}

/* Screen Shake */
.shake{animation:screenShake .15s}
@keyframes screenShake{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,3px)}}

/* Rainbow Konami */
.rainbow-piano .white-key{background:linear-gradient(180deg,hsl(var(--hue),80%,95%),hsl(var(--hue),80%,88%))!important}
.rainbow-piano .black-key{background:linear-gradient(180deg,hsl(var(--hue2),60%,30%),hsl(var(--hue2),60%,15%))!important}
body.rainbow-mode *{animation:rainbowBg 3s linear infinite!important}
@keyframes rainbowBg{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}

/* Mobile */
@media(max-width:700px){
  .sidebar{display:none}
  .piano-container{padding:5px 10px 12px}
  .white-key .key-label{font-size:.5em}
  .hud{top:5px;right:8px;gap:8px}
  .hud-item{padding:5px 10px}
  .hud-value{font-size:1.1em}
}
</style>
</head>
<body>

<div class="header">
  <h1>🎹 Piano Arena</h1>
  <div class="room-controls">
    <button class="btn-sm btn-create" onclick="createRoom()">+ New Room</button>
    <input id="joinInput" placeholder="Room code" style="width:90px;padding:6px 8px;border-radius:6px;border:1px solid #3b0764;background:#0d001a;color:#c084fc;font-size:.8em;font-family:inherit">
    <button class="btn-sm btn-join" onclick="joinRoom()">Join</button>
    <span class="room-code" id="roomDisplay" onclick="copyLink()" title="Click to copy link">Solo</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-mode="freeplay" onclick="switchMode('freeplay')">🎹 Free Play</div>
  <div class="tab" data-mode="tiles" onclick="switchMode('tiles')">🎮 Tiles Game</div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="panel">
      <h3>👥 Players Online</h3>
      <ul class="player-list" id="playerList"></ul>
    </div>
    <div class="panel">
      <h3>📜 Activity Log</h3>
      <div class="activity-log" id="activityLog"><div style="color:#555;font-style:italic">Waiting for players...</div></div>
    </div>
  </div>

  <div class="game-area">
    <div class="tiles-area" id="tilesArea"></div>
    <div class="hit-zone" id="hitZone"><span class="hit-zone-label">✦ HIT ZONE ✦</span></div>
    <div class="piano-container">
      <div class="piano" id="piano"></div>
    </div>

    <div class="hud" id="hud" style="display:none">
      <div class="hud-item">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="scoreDisplay">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Combo</div>
        <div class="hud-value" id="comboDisplay">0x</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Misses</div>
        <div class="hud-value" id="missDisplay">0/15</div>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h2 id="goTitle">Game Over!</h2>
      <div class="grade rank-s" id="gradeDisplay">S</div>
      <div class="stats-grid" id="statsGrid"></div>
      <button class="btn btn-primary" onclick="startGame()">Play Again</button>
      <button class="btn btn-secondary" onclick="switchMode('freeplay')">Free Play</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 🎵 AUDIO ENGINE — Real synthesized piano sounds (Web Audio API)
// ═══════════════════════════════════════════════════════════════

let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      console.error('Web Audio not available:', e);
      return null;
    }
  }
  // Resume on first user gesture
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

// Force audio context creation on first interaction
function initAudio() {
  getAudioContext();
}

// Note frequencies (Hz)
const NOTE_FREQS = {
  'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13,
  'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00,
  'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88,
  'C5': 523.25, 'C#5': 554.37, 'D5': 587.33, 'D#5': 622.25,
  'E5': 659.25, 'F5': 698.46, 'F#5': 739.99, 'G5': 783.99,
  'G#5': 830.61, 'A5': 880.00, 'A#5': 932.33, 'B5': 987.77,
};

// Synthesize a piano-like sound for a given note frequency
function playNote(freq, duration = 1.2) {
  const ctx = getAudioContext();
  if (!ctx) return;

  const now = ctx.currentTime;

  // Main tone — rich harmonic stack (like a piano string)
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const osc3 = ctx.createOscillator();

  osc1.type = 'triangle';
  osc2.type = 'sine';
  osc3.type = 'sine';

  osc1.frequency.setValueAtTime(freq, now);
  osc2.frequency.setValueAtTime(freq * 2, now);   // 2nd harmonic
  osc3.frequency.setValueAtTime(freq * 3, now);   // 3rd harmonic (softer)

  // Gain envelope — fast attack, medium decay, long release (piano-like)
  const gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(0, now);
  gainNode.gain.linearRampToValueAtTime(0.35, now + 0.01);     // attack
  gainNode.gain.exponentialRampToValueAtTime(0.15, now + 0.08); // decay
  gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration); // release

  // Harmonic volume mix
  const gain2 = ctx.createGain();
  gain2.gain.setValueAtTime(0.15, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.6);

  const gain3 = ctx.createGain();
  gain3.gain.setValueAtTime(0.06, now);
  gain3.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.4);

  // Connect
  osc1.connect(gainNode);
  osc2.connect(gain2);
  osc3.connect(gain3);

  gainNode.connect(ctx.destination);
  gain2.connect(ctx.destination);
  gain3.connect(ctx.destination);

  // Hammer click noise burst (makes it sound like a piano, not a synth)
  const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.03, ctx.sampleRate);
  const noiseData = noiseBuffer.getChannelData(0);
  for (let i = 0; i < noiseData.length; i++) {
    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (noiseData.length * 0.15));
  }
  const noiseSrc = ctx.createBufferSource();
  noiseSrc.buffer = noiseBuffer;
  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0.12, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
  noiseSrc.connect(noiseGain);
  noiseGain.connect(ctx.destination);

  // Play everything
  osc1.start(now);
  osc2.start(now);
  osc3.start(now);
  noiseSrc.start(now);

  osc1.stop(now + duration + 0.1);
  osc2.stop(now + duration + 0.1);
  osc3.stop(now + duration + 0.1);
}


// ═══════════════════════════════════════════════════════════════
// 🎹 PIANO KEY DEFINITIONS
// ═══════════════════════════════════════════════════════════════

const WHITE_KEYS = [
  { note: 'C4', label: 'C', bind: 'a' },
  { note: 'D4', label: 'D', bind: 's' },
  { note: 'E4', label: 'E', bind: 'd' },
  { note: 'F4', label: 'F', bind: 'f' },
  { note: 'G4', label: 'G', bind: 'g' },
  { note: 'A4', label: 'A', bind: 'h' },
  { note: 'B4', label: 'B', bind: 'j' },
  { note: 'C5', label: "C'", bind: 'k' },
  { note: 'D5', label: "D'", bind: 'l' },
  { note: 'E5', label: "E'", bind: ';' },
  { note: 'F5', label: "F'", bind: "'" },
  { note: 'G5', label: "G'", bind: '#' },
];

const BLACK_KEYS = [
  { note: 'C#4', label: 'C#', bind: 'w', after: 0 },  // After C4 (index 0)
  { note: 'D#4', label: 'D#', bind: 'e', after: 1 },  // After D4
  { note: 'F#4', label: 'F#', bind: 't', after: 3 },  // After F4
  { note: 'G#4', label: 'G#', bind: 'y', after: 4 },  // After G4
  { note: 'A#4', label: 'A#', bind: 'u', after: 5 },  // After A4
  { note: 'C#5', label: "C#' ", bind: 'o', after: 7 }, // After C5
  { note: 'D#5', label: "D#' ", bind: 'p', after: 8 }, // After D5
  { note: 'F#5', label: "F#' ", bind: '[', after: 10 }, // After F5
];

const ALL_NOTES = [...WHITE_KEYS.map(k => k.note), ...BLACK_KEYS.map(k => k.note)];

// Reverse lookup: keybind → note name
const BIND_TO_NOTE = {};
[...WHITE_KEYS, ...BLACK_KEYS].forEach(k => { BIND_TO_NOTE[k.bind] = k.note; });
const BIND_TO_INDEX = {};
[...WHITE_KEYS].forEach((k, i) => { BIND_TO_INDEX[k.bind] = i; });


// ═══════════════════════════════════════════════════════════════
// 🌐 MULTIPLAYER
// ═══════════════════════════════════════════════════════════════

const PLAYER_COLORS = ['#f472b6','#c084fc','#22d3ee','#4ade80','#facc15','#fb923c','#f87171','#a78bfa'];
const PLAYER_NAMES = ['You','Mia','Sam','Lex','Rio','Zoe','Kai','Nova'];
let myPlayerId = 'player_' + Math.random().toString(36).substr(2, 6);
let myColor = PLAYER_COLORS[0];
let myName = PLAYER_NAMES[0];
let roomId = 'solo';
let isHost = true;
let players = [{ id: myPlayerId, name: myName, color: myColor, score: 0 }];
let bcChannel = null;
let ws = null;

function generateRoomId() {
  return Math.random().toString(36).substr(2, 6).toUpperCase();
}

function createRoom() {
  roomId = generateRoomId();
  isHost = true;
  setupMultiplayer();
  updateRoomDisplay();
  addLog('🏠 Room created: ' + roomId, 'system');
}

function joinRoom() {
  const code = document.getElementById('joinInput').value.trim().toUpperCase();
  if (!code) return;
  roomId = code;
  isHost = false;
  setupMultiplayer();
  updateRoomDisplay();
  addLog('🚪 Joined room: ' + roomId, 'system');
}

function copyLink() {
  const url = location.origin + location.pathname + '?room=' + roomId;
  navigator.clipboard.writeText(url).then(() => {
    const el = document.getElementById('roomDisplay');
    el.textContent = 'Copied!';
    setTimeout(() => updateRoomDisplay(), 1500);
  }).catch(() => {
    prompt('Copy this link:', url);
  });
}

function updateRoomDisplay() {
  document.getElementById('roomDisplay').textContent = roomId.toUpperCase();
  document.getElementById('joinInput').value = '';
}

function setupMultiplayer() {
  // BroadcastChannel for same-browser tabs
  try {
    bcChannel = new BroadcastChannel('pianoarena_' + roomId);
    bcChannel.onmessage = handlePeerMessage;
  } catch(e) {}

  // WebSocket relay for cross-device
  connectRelay();

  sendPeer({ type: 'join', id: myPlayerId, name: myName, color: myColor });

  setTimeout(() => {
    if (players.length <= 1 && !isHost) spawnBot();
  }, 1500);
}

function connectRelay() {
  try {
    ws = new WebSocket('wss://free.blr2.piesocket.com/v3/' + roomId + '?api_key=VCXCEuvxGcBDP7XhiJJUDvR1e1D3eiVjgZ9VRIAV&notify_self=1');
    ws.onmessage = (evt) => {
      try { handlePeerMessage(JSON.parse(evt.data)); } catch(e) {}
    };
    ws.onopen = () => addLog('🌐 Connected to relay', 'system');
    ws.onerror = () => {}; // silently fail
  } catch(e) {}
}

function sendPeer(data) {
  data.sender = myPlayerId;
  data.room = roomId;
  data.ts = Date.now();
  try { bcChannel?.postMessage(data); } catch(e) {}
  try { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data)); } catch(e) {}
}

function handlePeerMessage(evt) {
  const msg = evt.data || evt;
  if (msg.sender === myPlayerId) return;

  switch(msg.type) {
    case 'join':
      if (!players.find(p => p.id === msg.id)) {
        const color = PLAYER_COLORS[players.length % PLAYER_COLORS.length] || '#fff';
        players.push({ id: msg.id, name: msg.name || 'Player', color: msg.color || color, score: 0 });
        renderPlayers();
        addLog(`${msg.name || 'Someone'} joined`, 'join');
        flashKey(msg.note, msg.color);
      }
      break;
    case 'play':
      flashKey(msg.note, msg.color || '#fff');
      addLog(`<span class="key-tag">${msg.note}</span> played by ${getPlayerName(msg.sender)}`, 'play');
      break;
    case 'leave':
      players = players.filter(p => p.id !== msg.id);
      renderPlayers();
      addLog(`${msg.name || 'Someone'} left`, 'leave');
      break;
    case 'bot':
      if (!players.find(p => p.id === msg.id)) {
        players.push({ id: msg.id, name: msg.name, color: msg.color, score: 0, isBot: true });
        renderPlayers();
      }
      break;
  }
}

function getPlayerName(id) {
  const p = players.find(x => x.id === id);
  return p ? p.name : '???';
}

function renderPlayers() {
  const list = document.getElementById('playerList');
  list.innerHTML = players.map(p =>
    `<li class="player-item">
      <div class="avatar" style="background:${p.color}">${p.name.charAt(0)}</div>
      <span class="player-name">${p.name}${p.isBot ? ' 🤖' : ''}</span>
      ${p.score > 0 ? `<span class="score-val">${p.score}</span>` : ''}
    </li>`
  ).join('');
}

function addLog(text, type) {
  const log = document.getElementById('activityLog');
  if (log.querySelector('.italic')) log.innerHTML = '';
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = text;
  log.insertBefore(entry, log.firstChild);
  while (log.children.length > 50) log.removeChild(log.lastChild);
}

function spawnBot() {
  const botId = 'bot_' + Math.random().toString(36).substr(2, 4);
  const botName = PLAYER_NAMES[players.length % PLAYER_NAMES.length];
  const botColor = PLAYER_COLORS[players.length % PLAYER_COLORS.length];
  players.push({ id: botId, name: botName, color: botColor, score: 0, isBot: true });
  renderPlayers();
  addLog(`🤖 ${botName} (bot) joined`, 'bot');

  // Bot plays random notes occasionally
  setInterval(() => {
    if (currentMode === 'freeplay' && Math.random() > 0.6) {
      const randKey = WHITE_KEYS[Math.floor(Math.random() * WHITE_KEYS.length)];
      playNote(NOTE_FREQS[randKey.note]);
      flashKey(randKey.note, botColor);
      sendPeer({ type: 'play', note: randKey.note });
    }
  }, 2000 + Math.random() * 3000);
}


// ═══════════════════════════════════════════════════════════════
// 🎹 PIANO RENDERING & INPUT
// ═══════════════════════════════════════════════════════════════

const pianoEl = document.getElementById('piano');
const keyElements = {};

function buildPiano() {
  pianoEl.innerHTML = '';
  Object.keys(keyElements).forEach(k => delete keyElements[k]);

  WHITE_KEYS.forEach((ki, idx) => {
    const key = document.createElement('div');
    key.className = 'white-key';
    key.dataset.note = ki.note;
    key.dataset.index = idx;
    key.style.setProperty('--hue', (idx * 30) % 360);
    key.innerHTML = `<span class="key-label">${ki.label}</span><span class="key-bind">${ki.bind.toUpperCase()}</span>`;
    pianoEl.appendChild(key);
    keyElements[ki.note] = key;

    key.addEventListener('mousedown', (e) => { e.preventDefault(); initAudio(); triggerKey(ki.note); });
    key.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); triggerKey(ki.note); }, { passive: false });
    key.addEventListener('mouseup', () => releaseKey(ki.note));
    key.addEventListener('mouseleave', () => releaseKey(ki.note));
    key.addEventListener('touchend', () => releaseKey(ki.note));
  });

  BLACK_KEYS.forEach(bk => {
    const key = document.createElement('div');
    key.className = 'black-key';
    key.dataset.note = bk.note;
    key.dataset.index = bk.after;
    key.style.setProperty('--hue2', ((bk.after + 1) * 40) % 360);
    key.innerHTML = `<span class="key-label">${bk.label}</span><span class="key-bind">${bk.bind.toUpperCase()}</span>`;
    // Position black key relative to its parent white key
    const whiteKeys = pianoEl.querySelectorAll('.white-key');
    if (whiteKeys[bk.after]) {
      const parent = whiteKeys[bk.after];
      key.style.left = (parent.offsetLeft + parent.offsetWidth - key.offsetWidth / 2) + 'px';
    }
    pianoEl.appendChild(key);
    keyElements[bk.note] = key;

    key.addEventListener('mousedown', (e) => { e.preventDefault(); initAudio(); triggerKey(bk.note); });
    key.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); triggerKey(bk.note); }, { passive: false });
    key.addEventListener('mouseup', () => releaseKey(bk.note));
    key.addEventListener('mouseleave', () => releaseKey(bk.note));
    key.addEventListener('touchend', () => releaseKey(bk.note));
  });
}

const activeNotes = new Set();

function triggerKey(note) {
  if (activeNotes.has(note)) return;
  activeNotes.add(note);

  initAudio();
  playNote(NOTE_FREQS[note]);

  const el = keyElements[note];
  if (el) el.classList.add('active');

  sendPeer({ type: 'play', note: note });

  // Tile hit detection in game mode
  if (currentMode === 'tiles' && gameRunning) {
    checkTileHit(note);
  }
}

function releaseKey(note) {
  activeNotes.delete(note);
  const el = keyElements[note];
  if (el) el.classList.remove('active');
}

function flashKey(note, color) {
  const el = keyElements[note];
  if (!el) return;
  const origTransition = el.style.transition;
  el.style.transition = 'background .1s, box-shadow .1s';
  el.style.background = color || '#a855f7';
  el.style.boxShadow = `0 0 20px ${color || '#a855f7'}`;
  setTimeout(() => {
    el.style.transition = origTransition;
    el.classList.remove('active');
  }, 150);
}

// Keyboard input
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const note = BIND_TO_NOTE[e.key.toLowerCase()];
  if (note) {
    e.preventDefault();
    initAudio();
    triggerKey(note);
  }
});

document.addEventListener('keyup', (e) => {
  const note = BIND_TO_NOTE[e.key.toLowerCase()];
  if (note) releaseKey(note);
});


// ═══════════════════════════════════════════════════════════════
// 🎮 TILES GAME MODE
// ═══════════════════════════════════════════════════════════════

let currentMode = 'freeplay';
let gameRunning = false;
let gameScore = 0;
let gameCombo = 0;
let maxCombo = 0;
let gameMisses = 0;
let perfectCount = 0;
let greatCount = 0;
let okCount = 0;
let missCount = 0;
let tilesSpawned = 0;
let tileSpeed = 2.2;
let gameInterval = null;
let speedInterval = null;
let activeTiles = [];
const MAX_MISSES = 15;

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));

  const tilesArea = document.getElementById('tilesArea');
  const hitZone = document.getElementById('hitZone');
  const hud = document.getElementById('hud');
  const overlay = document.getElementById('overlay');

  if (mode === 'tiles') {
    tilesArea.classList.add('active');
    hitZone.classList.add('active');
    hud.style.display = 'flex';
    overlay.classList.remove('show');
    startGame();
  } else {
    stopGame();
    tilesArea.classList.remove('active');
    hitZone.classList.remove('active');
    hud.style.display = 'none';
    overlay.classList.remove('show');
  }
}

function startGame() {
  // Reset state
  gameScore = 0;
  gameCombo = 0;
  maxCombo = 0;
  gameMisses = 0;
  perfectCount = 0;
  greatCount = 0;
  okCount = 0;
  missCount = 0;
  tilesSpawned = 0;
  tileSpeed = 2.2;
  activeTiles = [];
  gameRunning = true;

  document.getElementById('tilesArea').innerHTML = '';
  updateHUD();
  document.getElementById('overlay').classList.remove('show');

  clearInterval(gameInterval);
  clearInterval(speedInterval);

  // Spawn tiles
  gameInterval = setInterval(spawnTile, 750);

  // Speed ramp every 5 seconds
  speedInterval = setInterval(() => {
    tileSpeed = Math.min(tileSpeed + 0.25, 7);
  }, 5000);
}

function stopGame() {
  gameRunning = false;
  clearInterval(gameInterval);
  clearInterval(speedInterval);
  activeTiles = [];
}

function spawnTile() {
  if (!gameRunning) return;
  const laneIdx = Math.floor(Math.random() * WHITE_KEYS.length);
  const ki = WHITE_KEYS[laneIdx];
  const area = document.getElementById('tilesArea');
  const areaRect = area.getBoundingClientRect();
  const laneWidth = (areaRect.width - 60) / WHITE_KEYS.length;

  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.dataset.note = ki.note;
  tile.dataset.lane = laneIdx;
  tile.textContent = ki.label;
  tile.style.left = (30 + laneIdx * laneWidth + 2) + 'px';
  tile.style.width = (laneWidth - 4) + 'px';

  // Color by row type
  const colors = ['linear-gradient(135deg,#7c3aed,#a855f7)','linear-gradient(135deg,#db2777,#ec4899)','linear-gradient(135deg,#2563eb,#3b82f6)','linear-gradient(135deg,#059669,#10b981)'];
  tile.style.background = colors[tilesSpawned % colors.length];

  const fallDuration = (areaRect.height + 60) / (tileSpeed * 60); // seconds
  tile.style.animationDuration = fallDuration + 's';

  tile.spawnTime = Date.now();
  activeTiles.push(tile);
  tilesSpawned++;
  area.appendChild(tile);

  // Auto-miss when animation ends
  tile.addEventListener('animationend', () => {
    if (tile.parentNode && !tile.classList.contains('hit')) {
      registerMiss(tile);
    }
  });
}

function checkTileHit(note) {
  const hitZone = document.getElementById('hitZone');
  const zoneRect = hitZone.getBoundingClientRect();
  const zoneTop = zoneRect.top;
  const zoneBottom = zoneRect.bottom;
  const zoneMid = (zoneTop + zoneBottom) / 2;
  const tolerance = zoneRect.height * 0.7; // generous hit window

  // Find closest matching tile in hit zone
  let bestTile = null;
  let bestDist = Infinity;

  for (let i = activeTiles.length - 1; i >= 0; i--) {
    const tile = activeTiles[i];
    if (tile.dataset.note !== note || tile.classList.contains('hit') || tile.classList.contains('miss')) continue;

    const tileRect = tile.getBoundingClientRect();
    const tileMid = (tileRect.top + tileRect.bottom) / 2;
    const dist = Math.abs(tileMid - zoneMid);

    if (dist < tolerance && dist < bestDist) {
      bestDist = dist;
      bestTile = tile;
    }
  }

  if (bestTile) {
    registerHit(bestTile, bestDist, tolerance);
  }
}

function registerHit(tile, dist, tolerance) {
  tile.classList.add('hit');
  tile.style.pointerEvents = 'none';

  const ratio = dist / tolerance;
  let rating, points, color;

  if (ratio < 0.25) {
    rating = 'PERFECT'; points = 150; color = '#ffd700';
    perfectCount++;
  } else if (ratio < 0.55) {
    rating = 'GREAT'; points = 100; color = '#c084fc';
    greatCount++;
  } else {
    rating = 'OK'; points = 50; color = '#22d3ee';
    okCount++;
  }

  gameCombo++;
  if (gameCombo > maxCombo) maxCombo = gameCombo;

  const comboBonus = Math.floor(gameCombo / 5) * 10;
  const totalPoints = points + comboBonus;
  gameScore += totalPoints;

  showHitEffect(rating, totalPoints, color, tile);
  updateHUD();

  if (gameCombo > 0 && gameCombo % 5 === 0) {
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 150);
  }

  // Remove tile after display
  setTimeout(() => {
    if (tile.parentNode) tile.parentNode.removeChild(tile);
    activeTiles = activeTiles.filter(t => t !== tile);
  }, 200);
}

function registerMiss(tile) {
  if (tile.classList.contains('miss') || tile.classList.contains('hit')) return;
  tile.classList.add('miss');
  tile.style.pointerEvents = 'none';

  gameMisses++;
  gameCombo = 0;
  missCount++;

  showHitEffect('MISS', 0, '#ef4444', tile);
  updateHUD();

  setTimeout(() => {
    if (tile.parentNode) tile.parentNode.removeChild(tile);
    activeTiles = activeTiles.filter(t => t !== tile);
  }, 300);

  if (gameMisses >= MAX_MISSES) {
    endGame();
  }
}

function showHitEffect(text, points, color, tile) {
  const rect = tile.getBoundingClientRect();
  const area = document.getElementById('tilesArea');
  const areaRect = area.getBoundingClientRect();

  const effect = document.createElement('div');
  effect.className = 'hit-effect';
  effect.textContent = text + (points > 0 ? ` +${points}` : '');
  effect.style.color = color;
  effect.style.left = (rect.left - areaRect.left + rect.width / 2) + 'px';
  effect.style.top = (rect.top - areaRect.top) + 'px';
  effect.style.textShadow = `0 0 10px ${color}`;

  area.appendChild(effect);
  setTimeout(() => { if (effect.parentNode) effect.parentNode.removeChild(effect); }, 1000);
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = gameScore;
  const comboEl = document.getElementById('comboDisplay');
  comboEl.textContent = gameCombo + 'x';
  comboEl.className = 'hud-value' + (gameCombo >= 5 ? ' combo-fire' : '');
  document.getElementById('missDisplay').textContent = `${gameMisses}/${MAX_MISSES}`;
}

function endGame() {
  stopGame();
  gameRunning = false;

  // Calculate grade
  const totalHits = perfectCount + greatCount + okCount;
  const accuracy = totalHits > 0 ? ((perfectCount * 100 + greatCount * 66 + okCount * 33) / (totalHits + missCount)) : 0;

  let grade, gradeClass;
  if (accuracy >= 93 && missCount <= 1) { grade = 'S'; gradeClass = 'rank-s'; }
  else if (accuracy >= 83) { grade = 'A'; gradeClass = 'rank-a'; }
  else if (accuracy >= 70) { grade = 'B'; gradeClass = 'rank-b'; }
  else if (accuracy >= 55) { grade = 'C'; gradeClass = 'rank-c'; }
  else if (accuracy >= 40) { grade = 'D'; gradeClass = 'rank-d'; }
  else { grade = 'F'; gradeClass = 'rank-f'; }

  document.getElementById('goTitle').textContent = gameMisses >= MAX_MISSES ? '💀 Game Over!' : '🎵 Complete!';
  const gradeEl = document.getElementById('gradeDisplay');
  gradeEl.textContent = grade;
  gradeEl.className = 'grade ' + gradeClass;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-row"><b>${gameScore}</b><br>Score</div>
    <div class="stat-row"><b>${maxCombo}x</b><br>Max Combo</div>
    <div class="stat-row"><b>${perfectCount}</b> PERFECT<br>${greatCount} GREAT ${okCount} OK</div>
    <div class="stat-row"><b>${missCount}</b> Misses<br>${Math.round(accuracy)}% Acc</div>
  `;

  document.getElementById('overlay').classList.add('show');
}


// ═══════════════════════════════════════════════════════════════
// 🌈 KONAMI CODE EASTER EGG
// ═══════════════════════════════════════════════════════════════

const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','Right','KeyB','KeyA'];
let konamiIdx = 0;

document.addEventListener('keydown', (e) => {
  if (e.code === KONAMI[konamiIdx]) {
    konamiIdx++;
    if (konamiIdx === KONAMI.length) {
      document.body.classList.toggle('rainbow-mode');
      document.getElementById('piano').classList.toggle('rainbow-piano');
      konamiIdx = 0;
    }
  } else {
    konamiIdx = 0;
  }
});


// ═══════════════════════════════════════════════════════════════
// 🚀 INIT
// ═══════════════════════════════════════════════════════════════

buildPiano();
renderPlayers();

// Check URL for room code
const params = new URLSearchParams(location.search);
if (params.get('room')) {
  roomId = params.get('room').toUpperCase();
  isHost = false;
  setupMultiplayer();
  updateRoomDisplay();
  addLog('🔗 Joined via link: ' + roomId, 'system');
}

// Init audio on first interaction with page
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('keydown', initAudio, { once: true });

addLog('🎹 Welcome to Piano Arena! Press keys or click to play.', 'system');
</script>
