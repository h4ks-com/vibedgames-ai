<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0 user-scalable=no">
<title>🎹 Piano Arena — Multiplayer Piano Hero</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0014;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff;height:100vh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}

.header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#110022;border-bottom:2px solid #6b21a8;z-index:100;flex-shrink:0}
.header h1{font-size:1.3em;background:linear-gradient(90deg,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.header .room-code{font-family:'Courier New',monospace;font-size:1.1em;color:#c084fc;font-weight:bold;cursor:pointer;padding:5px 12px;border:2px dashed #7c3aed;border-radius:8px;transition:.2s}
.header .room-code:hover{border-color:#c084fc;background:rgba(168,85,247,.1)}

.tabs{display:flex;flex-shrink:0;background:#110022;border-bottom:2px solid #3b0764}
.tab{padding:12px 28px;cursor:pointer;font-weight:700;font-size:.95em;transition:.25s;border-bottom:3px solid transparent;color:#9ca3af}
.tab.active{color:#c084fc;border-bottom-color:#a855f7;background:rgba(124,58,237,.08)}
.tab:hover:not(.active){color:#e9d5ff;background:rgba(124,58,237,.05)}

/* Instrument bar */
.instrument-bar{display:flex;overflow-x:auto;flex-shrink:0;background:#0a0018;border-bottom:2px solid #2d0a54;padding:7px 14px;gap:6px;scrollbar-width:thin;scrollbar-color:#3b0764 transparent;align-items:center}
.instrument-bar::-webkit-scrollbar{height:3px}
.instrument-bar::-webkit-scrollbar-thumb{background:#5b21b6;border-radius:3px}
.instrument-bar-label{font-size:.68em;color:#6b50a8;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;margin-right:4px;flex-shrink:0}
.inst-btn{padding:5px 13px;font-size:.78em;font-weight:600;border:1px solid #3b0764;border-radius:20px;cursor:pointer;background:#110022;color:#9ca3af;white-space:nowrap;transition:.15s;font-family:inherit;flex-shrink:0}
.inst-btn:hover{border-color:#7c3aed;color:#e9d5ff;background:#1a0035}
.inst-btn.active{background:linear-gradient(135deg,#4c1d95,#6d28d9);border-color:#a855f7;color:#fff;box-shadow:0 0 10px rgba(168,85,247,.35)}

.main{flex:1;display:flex;overflow:hidden;position:relative}

.sidebar{width:220px;background:#0d001a;border-right:2px solid #3b0764;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.panel{padding:15px;border-bottom:1px solid #1e1b4b}
.panel h3{font-size:.78em;color:#a78bfa;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.5px}
.player-list{list-style:none}
.player-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.82em}
.avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:bold;color:#fff;flex-shrink:0}
.player-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-inst{font-size:.7em;color:#6b50a8;white-space:nowrap}
.score-val{margin-left:auto;font-weight:bold;color:#f472b6;font-size:.85em}
.activity-log{font-size:.72em;color:#9ca3af;max-height:120px;overflow-y:auto;line-height:1.6}
.log-entry{opacity:.7;padding:1px 0;border-bottom:1px solid rgba(139,92,246,.1)}
.log-entry .key-tag{color:#c084fc;font-weight:bold}

.game-area{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden}

.piano-container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 24px 0;position:relative}
.piano-lid{width:100%;max-width:900px;height:11px;background:linear-gradient(90deg,#1e0040,#5b21b6,#a855f7,#5b21b6,#1e0040);border-radius:6px 6px 0 0;box-shadow:0 -3px 10px rgba(168,85,247,.4);border:1px solid #6d28d9;border-bottom:none}
.piano{position:relative;display:flex;height:100%;max-height:280px;min-height:160px;width:100%;max-width:900px;background:#08000f;border-left:2px solid #3b0764;border-right:2px solid #3b0764}
.piano-base{width:100%;max-width:900px;height:16px;background:linear-gradient(180deg,#1a0035,#0a0018);border-radius:0 0 8px 8px;border:2px solid #3b0764;border-top:none;box-shadow:0 8px 20px rgba(0,0,0,.6),0 2px 0 #5b21b6 inset}

.white-key{flex:1;height:100%;background:linear-gradient(180deg,#f0ebff 0%,#e4ddf4 50%,#ccc4dc 85%,#bbb2cc 100%);border-right:1px solid #a090b8;cursor:pointer;position:relative;z-index:1;transition:background .05s,transform .05s,box-shadow .05s;box-shadow:inset 0 -4px 8px rgba(0,0,0,.15),0 3px 6px rgba(0,0,0,.25)}
.white-key:first-child{border-left:1px solid #a090b8}
.white-key:hover{background:linear-gradient(180deg,#faf7ff 0%,#f0eaff 50%,#d8d0ec 100%)}
.white-key.active{background:linear-gradient(180deg,#dac8ff 0%,#c0a0ff 50%,#9060ee 85%,#7040cc 100%)!important;transform:translateY(3px)!important;box-shadow:inset 0 2px 6px rgba(124,58,237,.4),0 0 20px rgba(168,85,247,.5)!important}
.key-label{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);font-size:.62em;color:#7060a0;font-weight:700;pointer-events:none;white-space:nowrap}
.key-bind{position:absolute;top:7px;left:50%;transform:translateX(-50%);font-size:.56em;color:#9080b8;font-weight:bold;pointer-events:none;background:rgba(255,255,255,.55);padding:1px 4px;border-radius:3px;white-space:nowrap}

.black-key{position:absolute;height:62%;background:linear-gradient(180deg,#2a2838 0%,#14121e 55%,#060510 85%,#020204 100%);border-radius:0 0 5px 5px;z-index:2;top:0;cursor:pointer;transition:background .05s,transform .05s,box-shadow .05s;box-shadow:2px 5px 10px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.1),inset -1px 0 0 rgba(255,255,255,.04);border:1px solid #484060;border-top:none}
.black-key:hover{background:linear-gradient(180deg,#3a384a 0%,#201e2e 55%,#0e0c16 100%)}
.black-key.active{background:linear-gradient(180deg,#8b5cf6 0%,#5b21b6 55%,#3b0f82 85%,#2e0e65 100%)!important;transform:translateY(3px)!important;box-shadow:0 2px 5px rgba(0,0,0,.4),inset 0 2px 5px rgba(168,85,247,.45),0 0 20px rgba(168,85,247,.65)!important}
.black-key .key-label{color:#bbb;font-size:.5em;bottom:5px}
.black-key .key-bind{color:#888;font-size:.47em;top:5px;background:rgba(0,0,0,.45)}

.tiles-area{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none;display:none}
.tiles-area.active{display:block}
.tile{position:absolute;height:50px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.95em;color:#fff;pointer-events:auto;cursor:pointer;animation:tileFall linear forwards;text-shadow:0 1px 3px rgba(0,0,0,.5);z-index:10}
@keyframes tileFall{from{top:-55px}to{top:calc(100% + 5px)}}
.tile.hit{animation:none!important;transform:scale(1.15);transition:all .1s}
.tile.miss{opacity:.2;transform:scale(.8);transition:all .3s}

.hit-zone{position:absolute;left:24px;right:24px;height:70px;border:3px dashed rgba(168,85,247,.5);border-radius:12px;pointer-events:none;display:none;z-index:5}
.hit-zone.active{display:block}
.hit-zone-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:.75em;color:#a78bfa;font-weight:bold;white-space:nowrap;text-shadow:0 0 8px rgba(168,85,247,.5)}

.hit-effect{position:absolute;font-size:1.4em;font-weight:bold;pointer-events:none;animation:hitFloat 1s ease-out forwards;z-index:50;text-shadow:0 2px 8px rgba(0,0,0,.6)}
@keyframes hitFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

.hud{position:absolute;top:10px;right:20px;display:flex;gap:15px;z-index:50;pointer-events:none}
.hud-item{text-align:center;background:rgba(0,0,0,.6);padding:8px 16px;border-radius:10px;border:1px solid rgba(168,85,247,.3);backdrop-filter:blur(6px)}
.hud-label{font-size:.65em;color:#9ca3af;text-transform:uppercase;letter-spacing:1px}
.hud-value{font-size:1.35em;font-weight:bold;color:#f472b6}
.combo-fire{color:#ff6b35;text-shadow:0 0 10px #ff6b35;animation:firePulse .3s infinite alternate}
@keyframes firePulse{from{text-shadow:0 0 8px #ff6b35}to{text-shadow:0 0 16px #ff6b35,0 0 24px #f97316}}

.overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:200;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.overlay h2{font-size:2.8em;margin-bottom:5px}
.grade{font-size:5em;font-weight:900;margin:10px 0}
.rank-s{color:#ffd700;text-shadow:0 0 30px #ffd700,0 0 60px #ffa500}
.rank-a{color:#c084fc;text-shadow:0 0 30px #a855f7}
.rank-b{color:#22d3ee;text-shadow:0 0 20px #06b6d4}
.rank-c{color:#4ade80;text-shadow:0 0 20px #22c55e}
.rank-d{color:#fb923c;text-shadow:0 0 15px #f97316}
.rank-f{color:#f87171;text-shadow:0 0 15px #ef4444}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 30px;margin:15px 0 25px;text-align:center;font-size:.95em}
.stat-row{color:#9ca3af}
.stat-row b{color:#fff;font-size:1.1em}
.btn{padding:14px 36px;font-size:1.05em;font-weight:bold;border:none;border-radius:12px;cursor:pointer;transition:.2s;margin:5px;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;box-shadow:0 4px 15px rgba(124,58,237,.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.5)}
.btn-secondary{background:#1e1b4b;color:#c084fc;border:2px solid #3b0764}
.btn-secondary:hover{background:#2e1065}

.room-controls{display:flex;gap:8px;align-items:center}
.btn-sm{padding:6px 14px;font-size:.8em;font-weight:bold;border:none;border-radius:8px;cursor:pointer;transition:.15s;font-family:inherit}
.btn-create{background:#7c3aed;color:#fff}
.btn-join{background:#1e1b4b;color:#c084fc;border:1px solid #3b0764}
.btn-sm:hover{transform:scale(1.05)}

.shake{animation:screenShake .15s}
@keyframes screenShake{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,3px)}}

.rainbow-piano .white-key{background:linear-gradient(180deg,hsl(var(--hue),80%,95%),hsl(var(--hue),80%,88%))!important}
.rainbow-piano .black-key{background:linear-gradient(180deg,hsl(var(--hue2),60%,30%),hsl(var(--hue2),60%,15%))!important}
body.rainbow-mode *{animation:rainbowBg 3s linear infinite!important}
@keyframes rainbowBg{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}

@media(max-width:700px){
  .sidebar{display:none}
  .piano-container{padding:0 8px 0}
  .key-label{font-size:.5em}
  .key-bind{display:none}
  .hud{top:5px;right:8px;gap:8px}
  .hud-item{padding:5px 10px}
  .hud-value{font-size:1.1em}
}
</style>
</head>
<body>

<div class="header">
  <h1>🎹 Piano Arena</h1>
  <div class="room-controls">
    <button class="btn-sm btn-create" onclick="createRoom()">+ New Room</button>
    <input id="joinInput" placeholder="Room code" style="width:90px;padding:6px 8px;border-radius:6px;border:1px solid #3b0764;background:#0d001a;color:#c084fc;font-size:.8em;font-family:inherit">
    <button class="btn-sm btn-join" onclick="joinRoom()">Join</button>
    <span class="room-code" id="roomDisplay" onclick="copyLink()" title="Click to copy link">Solo</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-mode="freeplay" onclick="switchMode('freeplay')">🎹 Free Play</div>
  <div class="tab" data-mode="tiles" onclick="switchMode('tiles')">🎮 Tiles Game</div>
</div>

<div class="instrument-bar" id="instrumentBar">
  <span class="instrument-bar-label">Instrument</span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="panel">
      <h3>👥 Players Online</h3>
      <ul class="player-list" id="playerList"></ul>
    </div>
    <div class="panel">
      <h3>📜 Activity Log</h3>
      <div class="activity-log" id="activityLog"><div style="color:#555;font-style:italic">Waiting for players...</div></div>
    </div>
  </div>

  <div class="game-area">
    <div class="tiles-area" id="tilesArea"></div>
    <div class="hit-zone" id="hitZone"><span class="hit-zone-label">✦ HIT ZONE ✦</span></div>
    <div class="piano-container">
      <div class="piano-lid"></div>
      <div class="piano" id="piano"></div>
      <div class="piano-base"></div>
    </div>

    <div class="hud" id="hud" style="display:none">
      <div class="hud-item"><div class="hud-label">Score</div><div class="hud-value" id="scoreDisplay">0</div></div>
      <div class="hud-item"><div class="hud-label">Combo</div><div class="hud-value" id="comboDisplay">0x</div></div>
      <div class="hud-item"><div class="hud-label">Misses</div><div class="hud-value" id="missDisplay">0/15</div></div>
    </div>

    <div class="overlay" id="overlay">
      <h2 id="goTitle">Game Over!</h2>
      <div class="grade rank-s" id="gradeDisplay">S</div>
      <div class="stats-grid" id="statsGrid"></div>
      <button class="btn btn-primary" onclick="startGame()">Play Again</button>
      <button class="btn btn-secondary" onclick="switchMode('freeplay')">Free Play</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════

let audioCtx = null;
function getAudioContext() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function initAudio() { getAudioContext(); }

const NOTE_FREQS = {
  'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,
  'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88,
  'C5':523.25,'C#5':554.37,'D5':587.33,'D#5':622.25,'E5':659.25,'F5':698.46,
  'F#5':739.99,'G5':783.99,'G#5':830.61,'A5':880.00,'A#5':932.33,'B5':987.77,
};

function makeNoise(ctx, dur=0.03) {
  const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  return src;
}

// ── Piano ──────────────────────────────────────
function synthPiano(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime, dur = 1.5;
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.35 * vol, now + 0.01);
  master.gain.exponentialRampToValueAtTime(0.15 * vol, now + 0.08);
  master.gain.exponentialRampToValueAtTime(0.001, now + dur);
  master.connect(ctx.destination);
  [[1,'triangle',1],[2,'sine',0.15],[3,'sine',0.06]].forEach(([ratio,type,gain],i) => {
    const o = ctx.createOscillator(); o.type = type; o.frequency.value = freq * ratio;
    const g = ctx.createGain(); g.gain.setValueAtTime(i===0?1:gain*vol, now); g.gain.exponentialRampToValueAtTime(0.001, now + dur*(1-i*0.2));
    o.connect(i===0?master:g); if(i>0) g.connect(ctx.destination);
    o.start(now); o.stop(now + dur + 0.1);
  });
  const ns = makeNoise(ctx, 0.03); const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.12*vol, now); ng.gain.exponentialRampToValueAtTime(0.001, now+0.04);
  ns.connect(ng); ng.connect(ctx.destination); ns.start(now);
}

// ── Harpsichord ────────────────────────────────
function synthHarpsichord(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime, dur = 1.1;
  [1,2,3,4,5,6].forEach((h,i) => {
    const levels = [0.38,0.22,0.16,0.11,0.07,0.04];
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq * h;
    const g = ctx.createGain();
    g.gain.setValueAtTime(levels[i]*vol, now+0.001);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur*(0.95 - i*0.1));
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + dur);
  });
  // Quill pluck transient
  const ns = makeNoise(ctx, 0.018); const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.22*vol, now); ng.gain.exponentialRampToValueAtTime(0.001, now+0.025);
  ns.connect(ng); ng.connect(ctx.destination); ns.start(now);
}

// ── Organ (sustains while key held) ───────────
function synthOrgan(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime;
  // Hammond-style drawbars: sub, 8', 4', 2⅔', 2', 1⅓'
  const draws = [[0.5,0.12],[1,0.38],[2,0.28],[3,0.18],[4,0.12],[6,0.06],[8,0.03]];
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.001, now);
  master.gain.linearRampToValueAtTime(0.55*vol, now+0.016);
  master.connect(ctx.destination);
  const oscs = draws.map(([ratio,gain]) => {
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq * ratio;
    const g = ctx.createGain(); g.gain.value = gain;
    o.connect(g); g.connect(master); o.start(now); return o;
  });
  // Return stop fn for key release
  return () => {
    const t = ctx.currentTime;
    master.gain.cancelScheduledValues(t);
    master.gain.setTargetAtTime(0.001, t, 0.018);
    oscs.forEach(o => o.stop(t + 0.1));
  };
}

// ── Xylophone ─────────────────────────────────
function synthXylophone(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime, dur = 0.65;
  // Non-harmonic bar partials: f, 3f, 6f
  [[1,0.55],[3.0,0.22],[6.1,0.08]].forEach(([ratio,gain]) => {
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq * ratio;
    const g = ctx.createGain();
    g.gain.setValueAtTime(gain*vol, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur*(ratio===1?1:0.55));
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + dur + 0.05);
  });
  const ns = makeNoise(ctx, 0.014); const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.28*vol, now); ng.gain.exponentialRampToValueAtTime(0.001, now+0.025);
  ns.connect(ng); ng.connect(ctx.destination); ns.start(now);
}

// ── Marimba ────────────────────────────────────
function synthMarimba(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime, dur = 1.3;
  // Wood bar partials: f and sharp 4th partial
  [[1,0.52],[4.0,0.12],[10.0,0.03]].forEach(([ratio,gain]) => {
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq * ratio;
    const g = ctx.createGain();
    g.gain.setValueAtTime(gain*vol, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur*(ratio===1?1:0.4));
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + dur + 0.05);
  });
  const ns = makeNoise(ctx, 0.022); const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.14*vol, now); ng.gain.exponentialRampToValueAtTime(0.001, now+0.04);
  ns.connect(ng); ng.connect(ctx.destination); ns.start(now);
}

// ── Vibraphone ────────────────────────────────
function synthVibraphone(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime, dur = 2.8;
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.42*vol, now);
  master.gain.exponentialRampToValueAtTime(0.001, now + dur);
  master.connect(ctx.destination);
  // LFO tremolo at 5.5 Hz
  const lfo = ctx.createOscillator(); lfo.frequency.value = 5.5;
  const lfoG = ctx.createGain(); lfoG.gain.value = 0.07*vol;
  lfo.connect(lfoG); lfoG.connect(master.gain);
  [[1,1],[3.87,0.14]].forEach(([ratio,gain]) => {
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq * ratio;
    const g = ctx.createGain(); g.gain.value = gain;
    o.connect(g); g.connect(master);
    o.start(now); o.stop(now + dur + 0.1);
  });
  lfo.start(now); lfo.stop(now + dur + 0.1);
}

// ── Bells / Glockenspiel ──────────────────────
function synthBells(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime, dur = 3.2;
  // Classic bell inharmonic partials (Chladni)
  [[1,0.38,dur],[2.756,0.22,dur*0.8],[5.404,0.14,dur*0.55],[8.933,0.08,dur*0.35],[13.34,0.04,dur*0.2]].forEach(([ratio,gain,d]) => {
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq * ratio;
    const g = ctx.createGain();
    g.gain.setValueAtTime(gain*vol, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + d);
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + d + 0.1);
  });
}

// ── Electric Piano (FM Rhodes) ────────────────
function synthEPiano(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime, dur = 2.0;
  // FM: modulator feeds into carrier frequency
  const mod = ctx.createOscillator(); mod.type = 'sine'; mod.frequency.value = freq;
  const modG = ctx.createGain();
  modG.gain.setValueAtTime(freq * 7, now);
  modG.gain.exponentialRampToValueAtTime(freq * 0.4, now + dur * 0.35);
  modG.gain.exponentialRampToValueAtTime(0.001, now + dur);
  mod.connect(modG);
  const car = ctx.createOscillator(); car.type = 'sine'; car.frequency.value = freq;
  modG.connect(car.frequency);
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.45*vol, now + 0.005);
  master.gain.exponentialRampToValueAtTime(0.12*vol, now + 0.12);
  master.gain.exponentialRampToValueAtTime(0.001, now + dur);
  car.connect(master); master.connect(ctx.destination);
  mod.start(now); car.start(now);
  mod.stop(now + dur + 0.1); car.stop(now + dur + 0.1);
}

// ── Flute ─────────────────────────────────────
function synthFlute(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime, dur = 1.9;
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.32*vol, now + 0.07);  // breathy attack
  master.gain.setValueAtTime(0.32*vol, now + 0.08);
  master.gain.exponentialRampToValueAtTime(0.001, now + dur);
  master.connect(ctx.destination);
  [[1,1],[2,0.12],[3,0.04]].forEach(([ratio,gain]) => {
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq * ratio;
    const g = ctx.createGain(); g.gain.value = gain;
    o.connect(g); g.connect(master);
    o.start(now); o.stop(now + dur + 0.1);
  });
  // Breath noise through bandpass
  const ns = makeNoise(ctx, 0.12);
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq * 2.2; bp.Q.value = 1.2;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.09*vol, now); ng.gain.exponentialRampToValueAtTime(0.001, now+0.18);
  ns.connect(bp); bp.connect(ng); ng.connect(ctx.destination); ns.start(now);
}

// ── Clavinet ──────────────────────────────────
function synthClavinet(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime, dur = 0.9;
  // Clavinet = very bright pluck with fast decay, odd harmonics emphasized
  [1,2,3,4,5].forEach((h,i) => {
    const gains = [0.4,0.3,0.22,0.14,0.08];
    const o = ctx.createOscillator(); o.type = i<2?'sawtooth':'sine'; o.frequency.value = freq * h;
    const g = ctx.createGain();
    g.gain.setValueAtTime(gains[i]*vol, now+0.001);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur*(0.9-i*0.12));
    // Highpass for bite
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 300;
    o.connect(g); g.connect(hp); hp.connect(ctx.destination);
    o.start(now); o.stop(now + dur);
  });
  const ns = makeNoise(ctx, 0.01); const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.3*vol, now); ng.gain.exponentialRampToValueAtTime(0.001, now+0.015);
  ns.connect(ng); ng.connect(ctx.destination); ns.start(now);
}

// ── Bass ──────────────────────────────────────
function synthBass(freq, vol=1) {
  const ctx = getAudioContext(); if (!ctx) return;
  const now = ctx.currentTime, dur = 1.6;
  const bassFreq = freq * 0.5; // drop one octave
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.55*vol, now+0.004);
  master.gain.exponentialRampToValueAtTime(0.28*vol, now+0.06);
  master.gain.exponentialRampToValueAtTime(0.001, now+dur);
  const lpf = ctx.createBiquadFilter(); lpf.type = 'lowpass'; lpf.frequency.value = bassFreq*5; lpf.Q.value = 1.5;
  master.connect(lpf); lpf.connect(ctx.destination);
  [[1,'triangle',1],[2,'sine',0.18]].forEach(([ratio,type,gain]) => {
    const o = ctx.createOscillator(); o.type = type; o.frequency.value = bassFreq * ratio;
    const g = ctx.createGain(); g.gain.value = gain;
    o.connect(g); g.connect(master);
    o.start(now); o.stop(now + dur + 0.1);
  });
  const ns = makeNoise(ctx, 0.01); const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.15*vol, now); ng.gain.exponentialRampToValueAtTime(0.001, now+0.02);
  ns.connect(ng); ng.connect(ctx.destination); ns.start(now);
}

// MULTIPLAYER
// ═══════════════════════════════════════════════

const PLAYER_COLORS = ['#f472b6','#c084fc','#22d3ee','#4ade80','#facc15','#fb923c','#f87171','#a78bfa'];
const PLAYER_NAMES = ['You','Mia','Sam','Lex','Rio','Zoe','Kai','Nova'];
let myPlayerId = 'player_' + Math.random().toString(36).substr(2,6);
let myColor = PLAYER_COLORS[0];
let myName = PLAYER_NAMES[0];
let roomId = 'solo';
let isHost = true;
let players = [{id:myPlayerId,name:myName,color:myColor,score:0,instrument:'piano'}];
let bcChannel = null;
let ws = null;
let wsReconnectTimer = null;

function generateRoomId() { return Math.random().toString(36).substr(2,6).toUpperCase(); }

function createRoom() {
  roomId = generateRoomId();
  isHost = true;
  setupMultiplayer();
  updateRoomDisplay();
  addLog('🏠 Room created: ' + roomId, 'system');
}

function joinRoom() {
  const code = document.getElementById('joinInput').value.trim().toUpperCase();
  if (!code) return;
  roomId = code;
  isHost = false;
  setupMultiplayer();
  updateRoomDisplay();
  addLog('🚪 Joining room: ' + roomId, 'system');
}

function copyLink() {
  const url = location.origin + location.pathname + '?room=' + roomId;
  navigator.clipboard.writeText(url).then(() => {
    const el = document.getElementById('roomDisplay');
    el.textContent = 'Copied!';
    setTimeout(() => updateRoomDisplay(), 1500);
  }).catch(() => { prompt('Copy this link:', url); });
}

function updateRoomDisplay() {
  document.getElementById('roomDisplay').textContent = roomId.toUpperCase();
  document.getElementById('joinInput').value = '';
}

function setupMultiplayer() {
  clearTimeout(wsReconnectTimer);
  try { bcChannel?.close(); } catch(e) {}
  try { if (ws) { ws.onclose = null; ws.close(); } } catch(e) {}

  try {
    bcChannel = new BroadcastChannel('pianoarena_' + roomId);
    bcChannel.onmessage = handlePeerMessage;
    setTimeout(() => bcSend({type:'join',id:myPlayerId,name:myName,color:myColor,instrument:currentInstrument}), 80);
  } catch(e) {}

  connectRelay();

  setTimeout(() => {
    if (players.length <= 1 && !isHost) spawnBot();
  }, 3000);
}

function bcSend(data) {
  if (!bcChannel) return;
  try { bcChannel.postMessage({...data, sender:myPlayerId, room:roomId, ts:Date.now()}); } catch(e) {}
}

function connectRelay() {
  clearTimeout(wsReconnectTimer);
  try {
    ws = new WebSocket('wss://free.blr2.piesocket.com/v3/' + roomId + '?api_key=VCXCEuvxGcBDP7XhiJJUDvR1e1D3eiVjgZ9VRIAV&notify_self=1');
    ws.onopen = () => {
      addLog('🌐 Connected to relay', 'system');
      wsSend({type:'join',id:myPlayerId,name:myName,color:myColor,instrument:currentInstrument});
    };
    ws.onmessage = (evt) => {
      try {
        let data = JSON.parse(evt.data);
        if (data.event_type === 'system' || data.event === 'system') return;
        if (data.data && typeof data.data === 'string' && !data.type) data = JSON.parse(data.data);
        handlePeerMessage(data);
      } catch(e) {}
    };
    ws.onclose = () => { wsReconnectTimer = setTimeout(connectRelay, 3000); };
    ws.onerror = () => {};
  } catch(e) {}
}

function wsSend(data) {
  try {
    if (ws?.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({...data, sender:myPlayerId, room:roomId, ts:Date.now()}));
  } catch(e) {}
}

function sendPeer(data) { bcSend(data); wsSend(data); }

function handlePeerMessage(evt) {
  const msg = evt.data !== undefined ? evt.data : evt;
  if (!msg || msg.sender === myPlayerId) return;

  switch(msg.type) {
    case 'join':
      if (!players.find(p => p.id === msg.id)) {
        const color = msg.color || PLAYER_COLORS[players.length % PLAYER_COLORS.length];
        players.push({id:msg.id, name:msg.name||'Player', color, score:0, instrument:msg.instrument||'piano'});
        renderPlayers();
        addLog(`${msg.name||'Someone'} joined`, 'join');
      }
      sendPeer({type:'hello',id:myPlayerId,name:myName,color:myColor,instrument:currentInstrument});
      break;
    case 'hello':
      if (!players.find(p => p.id === msg.id)) {
        const color = msg.color || PLAYER_COLORS[players.length % PLAYER_COLORS.length];
        players.push({id:msg.id, name:msg.name||'Player', color, score:0, instrument:msg.instrument||'piano'});
        renderPlayers();
        addLog(`${msg.name||'Someone'} is here`, 'join');
      }
      break;
    case 'play': {
      flashKey(msg.note, msg.color||'#fff');
      // Play the remote player's instrument sound at reduced volume
      const inst = INSTRUMENTS[msg.instrument] || INSTRUMENTS.piano;
      inst.fn(NOTE_FREQS[msg.note], 0.45);
      addLog(`<span class="key-tag">${msg.note}</span> by ${getPlayerName(msg.sender)}`, 'play');
      break;
    }
    case 'instrument': {
      const p = players.find(x => x.id === msg.id);
      if (p) { p.instrument = msg.instrument; renderPlayers(); }
      addLog(`${getPlayerName(msg.id)} switched to ${INSTRUMENTS[msg.instrument]?.label||msg.instrument}`, 'system');
      break;
    }
    case 'leave':
      players = players.filter(p => p.id !== msg.id);
      renderPlayers();
      addLog(`${msg.name||'Someone'} left`, 'leave');
      break;
    case 'bot':
      if (!players.find(p => p.id === msg.id)) {
        players.push({id:msg.id,name:msg.name,color:msg.color,score:0,isBot:true,instrument:'piano'});
        renderPlayers();
      }
      break;
  }
}

function getPlayerName(id) {
  const p = players.find(x => x.id === id);
  return p ? p.name : '???';
}

function renderPlayers() {
  document.getElementById('playerList').innerHTML = players.map(p => {
    const instLabel = INSTRUMENTS[p.instrument]?.label || '';
    return `<li class="player-item">
      <div class="avatar" style="background:${p.color}">${p.name.charAt(0)}</div>
      <div style="min-width:0">
        <div class="player-name">${p.name}${p.isBot?' 🤖':''}</div>
        ${instLabel?`<div class="player-inst">${instLabel}</div>`:''}
      </div>
      ${p.score>0?`<span class="score-val">${p.score}</span>`:''}
    </li>`;
  }).join('');
}

function addLog(text, type) {
  const log = document.getElementById('activityLog');
  const italic = log.querySelector('[style*="italic"]');
  if (italic) italic.remove();
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = text;
  log.insertBefore(entry, log.firstChild);
  while (log.children.length > 50) log.removeChild(log.lastChild);
}

function spawnBot() {
  const botId = 'bot_' + Math.random().toString(36).substr(2,4);
  const botName = PLAYER_NAMES[players.length % PLAYER_NAMES.length];
  const botColor = PLAYER_COLORS[players.length % PLAYER_COLORS.length];
  const botInst = Object.keys(INSTRUMENTS)[Math.floor(Math.random()*Object.keys(INSTRUMENTS).length)];
  players.push({id:botId,name:botName,color:botColor,score:0,isBot:true,instrument:botInst});
  renderPlayers();
  addLog(`🤖 ${botName} (bot) joined with ${INSTRUMENTS[botInst].label}`, 'bot');
  setInterval(() => {
    if (currentMode === 'freeplay' && Math.random() > 0.6) {
      const randKey = WHITE_KEYS[Math.floor(Math.random() * WHITE_KEYS.length)];
      INSTRUMENTS[botInst].fn(NOTE_FREQS[randKey.note], 0.5);
      flashKey(randKey.note, botColor);
      sendPeer({type:'play',note:randKey.note,color:botColor,instrument:botInst});
    }
  }, 2000 + Math.random() * 3000);
}

// PIANO RENDERING & INPUT
// ═══════════════════════════════════════════════

const pianoEl = document.getElementById('piano');
const keyElements = {};

function buildPiano() {
  pianoEl.innerHTML = '';
  Object.keys(keyElements).forEach(k => delete keyElements[k]);
  const N = WHITE_KEYS.length;

  WHITE_KEYS.forEach((ki, idx) => {
    const key = document.createElement('div');
    key.className = 'white-key';
    key.dataset.note = ki.note;
    key.style.setProperty('--hue', (idx * 30) % 360);
    key.innerHTML = `<span class="key-label">${ki.label}</span><span class="key-bind">${ki.bind.toUpperCase()}</span>`;
    pianoEl.appendChild(key);
    keyElements[ki.note] = key;
    key.addEventListener('mousedown', e => { e.preventDefault(); initAudio(); triggerKey(ki.note); });
    key.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); triggerKey(ki.note); }, {passive:false});
    key.addEventListener('mouseup', () => releaseKey(ki.note));
    key.addEventListener('mouseleave', () => releaseKey(ki.note));
    key.addEventListener('touchend', () => releaseKey(ki.note));
  });

  BLACK_KEYS.forEach(bk => {
    const key = document.createElement('div');
    key.className = 'black-key';
    key.dataset.note = bk.note;
    key.style.setProperty('--hue2', ((bk.after + 1) * 40) % 360);
    key.innerHTML = `<span class="key-label">${bk.label}</span><span class="key-bind">${bk.bind.toUpperCase()}</span>`;
    key.style.left  = ((bk.after + 0.7) / N * 100).toFixed(3) + '%';
    key.style.width = (0.55 / N * 100).toFixed(3) + '%';
    pianoEl.appendChild(key);
    keyElements[bk.note] = key;
    key.addEventListener('mousedown', e => { e.preventDefault(); initAudio(); triggerKey(bk.note); });
    key.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); triggerKey(bk.note); }, {passive:false});
    key.addEventListener('mouseup', () => releaseKey(bk.note));
    key.addEventListener('mouseleave', () => releaseKey(bk.note));
    key.addEventListener('touchend', () => releaseKey(bk.note));
  });
}

const activeNotes = new Set();

function triggerKey(note) {
  if (activeNotes.has(note)) return;
  activeNotes.add(note);
  initAudio();
  const inst = INSTRUMENTS[currentInstrument];
  if (inst) {
    const stopFn = inst.fn(NOTE_FREQS[note], 1.0);
    if (stopFn) noteStopFns[note] = stopFn;
  }
  const el = keyElements[note];
  if (el) el.classList.add('active');
  sendPeer({type:'play', note, color:myColor, instrument:currentInstrument});
  if (currentMode === 'tiles' && gameRunning) checkTileHit(note);
}

function releaseKey(note) {
  activeNotes.delete(note);
  const el = keyElements[note];
  if (el) el.classList.remove('active');
  if (noteStopFns[note]) { noteStopFns[note](); delete noteStopFns[note]; }
}

function flashKey(note, color) {
  const el = keyElements[note];
  if (!el) return;
  el.style.background = color || '#a855f7';
  el.style.boxShadow = `0 0 20px ${color||'#a855f7'}`;
  setTimeout(() => { el.style.background = ''; el.style.boxShadow = ''; }, 220);
}

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const note = BIND_TO_NOTE[e.key.toLowerCase()];
  if (note) { e.preventDefault(); initAudio(); triggerKey(note); }
});
document.addEventListener('keyup', e => {
  const note = BIND_TO_NOTE[e.key.toLowerCase()];
  if (note) releaseKey(note);
});


// ═══════════════════════════════════════════════
// TILES GAME
// ═══════════════════════════════════════════════

let currentMode = 'freeplay';
let gameRunning = false;
let gameScore=0, gameCombo=0, maxCombo=0, gameMisses=0;
let perfectCount=0, greatCount=0, okCount=0, missCount=0;
let tilesSpawned=0, tileSpeed=2.2;
let gameInterval=null, speedInterval=null;
let activeTiles=[];
const MAX_MISSES = 15;

function positionHitZone() {
  const lid = document.querySelector('.piano-lid');
  const gameArea = document.querySelector('.game-area');
  const hitZone = document.getElementById('hitZone');
  if (!lid || !gameArea) return;
  const top = lid.getBoundingClientRect().top - gameArea.getBoundingClientRect().top - 80;
  hitZone.style.top = Math.max(0, top) + 'px';
  hitZone.style.bottom = 'auto';
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  const tilesArea = document.getElementById('tilesArea');
  const hitZone = document.getElementById('hitZone');
  const hud = document.getElementById('hud');
  if (mode === 'tiles') {
    tilesArea.classList.add('active');
    hitZone.classList.add('active');
    hud.style.display = 'flex';
    document.getElementById('overlay').classList.remove('show');
    positionHitZone();
    startGame();
  } else {
    stopGame();
    tilesArea.classList.remove('active');
    hitZone.classList.remove('active');
    hud.style.display = 'none';
    document.getElementById('overlay').classList.remove('show');
  }
}

function startGame() {
  gameScore=0; gameCombo=0; maxCombo=0; gameMisses=0;
  perfectCount=0; greatCount=0; okCount=0; missCount=0;
  tilesSpawned=0; tileSpeed=2.2; activeTiles=[]; gameRunning=true;
  document.getElementById('tilesArea').innerHTML = '';
  updateHUD();
  document.getElementById('overlay').classList.remove('show');
  clearInterval(gameInterval); clearInterval(speedInterval);
  gameInterval = setInterval(spawnTile, 750);
  speedInterval = setInterval(() => { tileSpeed = Math.min(tileSpeed + 0.25, 7); }, 5000);
}

function stopGame() {
  gameRunning = false;
  clearInterval(gameInterval); clearInterval(speedInterval);
  activeTiles = [];
}

function spawnTile() {
  if (!gameRunning) return;
  const laneIdx = Math.floor(Math.random() * WHITE_KEYS.length);
  const ki = WHITE_KEYS[laneIdx];
  const area = document.getElementById('tilesArea');
  const keyEl = keyElements[ki.note];
  const keyRect = keyEl ? keyEl.getBoundingClientRect() : null;
  const areaRect = area.getBoundingClientRect();
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.dataset.note = ki.note;
  tile.dataset.lane = laneIdx;
  tile.textContent = ki.label;
  if (keyRect) {
    tile.style.left = (keyRect.left - areaRect.left + 2) + 'px';
    tile.style.width = (keyRect.width - 4) + 'px';
  } else {
    const lw = areaRect.width / WHITE_KEYS.length;
    tile.style.left = (laneIdx * lw + 2) + 'px';
    tile.style.width = (lw - 4) + 'px';
  }
  const colors = ['linear-gradient(135deg,#7c3aed,#a855f7)','linear-gradient(135deg,#db2777,#ec4899)','linear-gradient(135deg,#2563eb,#3b82f6)','linear-gradient(135deg,#059669,#10b981)'];
  tile.style.background = colors[tilesSpawned % colors.length];
  tile.style.animationDuration = ((areaRect.height+60)/(tileSpeed*60)) + 's';
  tile.spawnTime = Date.now();
  activeTiles.push(tile);
  tilesSpawned++;
  area.appendChild(tile);
  tile.addEventListener('animationend', () => {
    if (tile.parentNode && !tile.classList.contains('hit')) registerMiss(tile);
  });
}

function checkTileHit(note) {
  const hitZone = document.getElementById('hitZone');
  const zoneRect = hitZone.getBoundingClientRect();
  const zoneMid = (zoneRect.top + zoneRect.bottom) / 2;
  const tolerance = zoneRect.height * 0.7;
  let bestTile=null, bestDist=Infinity;
  for (let i = activeTiles.length-1; i >= 0; i--) {
    const tile = activeTiles[i];
    if (tile.dataset.note !== note || tile.classList.contains('hit') || tile.classList.contains('miss')) continue;
    const tileRect = tile.getBoundingClientRect();
    const dist = Math.abs((tileRect.top+tileRect.bottom)/2 - zoneMid);
    if (dist < tolerance && dist < bestDist) { bestDist=dist; bestTile=tile; }
  }
  if (bestTile) registerHit(bestTile, bestDist, tolerance);
}

function registerHit(tile, dist, tolerance) {
  tile.classList.add('hit');
  tile.style.pointerEvents = 'none';
  const ratio = dist/tolerance;
  let rating, points, color;
  if (ratio < 0.25)      { rating='PERFECT'; points=150; color='#ffd700'; perfectCount++; }
  else if (ratio < 0.55) { rating='GREAT';   points=100; color='#c084fc'; greatCount++; }
  else                   { rating='OK';       points=50;  color='#22d3ee'; okCount++; }
  gameCombo++;
  if (gameCombo > maxCombo) maxCombo = gameCombo;
  const totalPoints = points + Math.floor(gameCombo/5)*10;
  gameScore += totalPoints;
  showHitEffect(rating, totalPoints, color, tile);
  updateHUD();
  if (gameCombo > 0 && gameCombo % 5 === 0) {
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 150);
  }
  setTimeout(() => {
    if (tile.parentNode) tile.parentNode.removeChild(tile);
    activeTiles = activeTiles.filter(t => t !== tile);
  }, 200);
}

function registerMiss(tile) {
  if (tile.classList.contains('miss') || tile.classList.contains('hit')) return;
  tile.classList.add('miss'); tile.style.pointerEvents = 'none';
  gameMisses++; gameCombo=0; missCount++;
  showHitEffect('MISS', 0, '#ef4444', tile);
  updateHUD();
  setTimeout(() => {
    if (tile.parentNode) tile.parentNode.removeChild(tile);
    activeTiles = activeTiles.filter(t => t !== tile);
  }, 300);
  if (gameMisses >= MAX_MISSES) endGame();
}

function showHitEffect(text, points, color, tile) {
  const rect = tile.getBoundingClientRect();
  const area = document.getElementById('tilesArea');
  const areaRect = area.getBoundingClientRect();
  const effect = document.createElement('div');
  effect.className = 'hit-effect';
  effect.textContent = text + (points>0?` +${points}`:'');
  effect.style.color = color;
  effect.style.left = (rect.left-areaRect.left+rect.width/2)+'px';
  effect.style.top  = (rect.top-areaRect.top)+'px';
  effect.style.textShadow = `0 0 10px ${color}`;
  area.appendChild(effect);
  setTimeout(() => { if (effect.parentNode) effect.parentNode.removeChild(effect); }, 1000);
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = gameScore;
  const comboEl = document.getElementById('comboDisplay');
  comboEl.textContent = gameCombo+'x';
  comboEl.className = 'hud-value'+(gameCombo>=5?' combo-fire':'');
  document.getElementById('missDisplay').textContent = `${gameMisses}/${MAX_MISSES}`;
}

function endGame() {
  stopGame();
  const totalHits = perfectCount+greatCount+okCount;
  const accuracy = totalHits>0?((perfectCount*100+greatCount*66+okCount*33)/(totalHits+missCount)):0;
  let grade, gradeClass;
  if (accuracy>=93&&missCount<=1){grade='S';gradeClass='rank-s';}
  else if(accuracy>=83){grade='A';gradeClass='rank-a';}
  else if(accuracy>=70){grade='B';gradeClass='rank-b';}
  else if(accuracy>=55){grade='C';gradeClass='rank-c';}
  else if(accuracy>=40){grade='D';gradeClass='rank-d';}
  else{grade='F';gradeClass='rank-f';}
  document.getElementById('goTitle').textContent = gameMisses>=MAX_MISSES?'💀 Game Over!':'🎵 Complete!';
  const gradeEl = document.getElementById('gradeDisplay');
  gradeEl.textContent = grade; gradeEl.className = 'grade '+gradeClass;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-row"><b>${gameScore}</b><br>Score</div>
    <div class="stat-row"><b>${maxCombo}x</b><br>Max Combo</div>
    <div class="stat-row"><b>${perfectCount}</b> PERFECT<br>${greatCount} GREAT ${okCount} OK</div>
    <div class="stat-row"><b>${missCount}</b> Misses<br>${Math.round(accuracy)}% Acc</div>
  `;
  document.getElementById('overlay').classList.add('show');
}
