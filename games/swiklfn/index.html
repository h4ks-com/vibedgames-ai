<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self-Wiki-ing Wiki</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: #1e1e2e;
  --text: #e0e0e8;
  --muted: #6b6b80;
  --accent: #7c3aed;
  --accent-dim: #5b21b6;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --blue: #3b82f6;
}
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.header {
  background: linear-gradient(135deg, var(--accent-dim), #2d1b69);
  padding: 20px 30px;
  border-bottom: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 15px;
}
.header h1 {
  font-size: 1.5em;
  letter-spacing: -0.5px;
}
.header h1 span { color: var(--yellow); }
.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.control-group {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.3);
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
}
.control-group label {
  color: var(--muted);
  font-size: 0.85em;
  white-space: nowrap;
}
.control-group select, .control-group input, .control-group button {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 0.9em;
  cursor: pointer;
}
.control-group select:focus, .control-group input:focus {
  outline: none;
  border-color: var(--accent);
}
.control-group button:hover {
  background: var(--accent);
  border-color: var(--accent);
}
.btn-go {
  background: var(--accent) !important;
  border: none !important;
  padding: 7px 18px !important;
  font-weight: 600 !important;
  transition: all 0.2s;
}
.btn-go:hover {
  background: var(--green) !important;
  transform: scale(1.05);
}
.main-grid {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 0;
  min-height: calc(100vh - 90px);
}
.article-panel {
  overflow-y: auto;
  max-height: calc(100vh - 90px);
  padding: 25px 35px;
}
.sidebar {
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  max-height: calc(100vh - 90px);
}
/* Article styling */
.wiki-article { max-width: 800px; }
.wiki-title {
  font-size: 2em;
  font-weight: 700;
  margin-bottom: 5px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.wiki-subtitle {
  color: var(--muted);
  font-size: 0.95em;
  margin-bottom: 18px;
  font-style: italic;
}
.infobox {
  float: right;
  width: 280px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 15px;
  margin: 0 0 20px 20px;
  font-size: 0.88em;
}
.infobox-title {
  text-align: center;
  font-weight: 700;
  font-size: 1.1em;
  margin-bottom: 12px;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}
.infobox-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.infobox-label { color: var(--muted); font-weight: 600; }
.infobox-value { text-align: right; max-width: 160px; word-break: break-word; }
.section {
  margin: 22px 0;
}
.section h2 {
  font-size: 1.35em;
  color: var(--blue);
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 10px;
}
.section h2::before { content: '§ '; color: var(--accent); opacity: 0.5; }
.section p {
  margin: 8px 0;
  text-align: justify;
}
.section ul {
  list-style: none;
  padding-left: 0;
}
.section li {
  padding: 4px 0 4px 18px;
  position: relative;
}
.section li::before {
  content: '▸';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-size: 0.85em;
}
.cat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-top: 20px;
  font-size: 0.88em;
}
.cat-box span { color: var(--muted); font-weight: 600; }
.cat-box a {
  color: var(--blue);
  text-decoration: none;
  margin: 0 5px;
}
.cat-box a:hover { text-decoration: underline; }
.ref-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-top: 12px;
  font-size: 0.82em;
}
.ref-box ol { padding-left: 20px; }
.ref-box li { margin: 3px 0; color: var(--muted); }
.ref-box a { color: var(--blue); text-decoration: none; }
/* Sidebar */
.sidebar-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-section h3 {
  font-size: 0.9em;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.source-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 0.83em;
  transition: border-color 0.2s;
}
.source-card:hover { border-color: var(--accent); }
.source-seed {
  font-family: monospace;
  background: var(--accent-dim);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 0.9em;
  color: var(--yellow);
}
.source-title {
  font-weight: 600;
  margin: 4px 0 2px;
  font-size: 1.05em;
}
.source-url {
  color: var(--blue);
  word-break: break-all;
  font-size: 0.82em;
}
.log-entry {
  font-family: monospace;
  font-size: 0.78em;
  padding: 5px 8px;
  border-left: 3px solid var(--border);
  margin-bottom: 4px;
  color: var(--muted);
  animation: fadeLogIn 0.3s ease-out;
}
@keyframes fadeLogIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}
.log-entry.info { border-color: var(--blue); }
.log-entry.success { border-color: var(--green); }
.log-entry.warn { border-color: var(--yellow); }
.log-entry.error { border-color: var(--red); }
.log-time { color: var(--muted); opacity: 0.6; }
.status-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.82em;
  z-index: 100;
}
.status-bar .stat { color: var(--muted); }
.status-bar .stat strong { color: var(--text); }
.status-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: opacity 0.5s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loader-spinner {
  width: 50px;
  height: 50px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  margin-top: 20px;
  color: var(--muted);
  font-size: 0.95em;
}
.loading-step {
  margin-top: 6px;
  font-family: monospace;
  font-size: 0.82em;
  color: var(--accent);
  height: 20px;
}
@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
  .sidebar { max-height: 400px; border-left: none; border-top: 1px solid var(--border); }
  .infobox { float: none; width: 100%; margin: 15px 0; }
  .article-panel { max-height: none; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div class="loader-spinner"></div>
  <div class="loading-text">Initializing Self-Wiki-ing Wiki...</div>
  <div class="loading-step" id="loadStep">Generating random seeds...</div>
</div>

<div class="header">
  <h1>📚 Self-<span>Wiki</span>-ing Wiki</h1>
  <div class="controls">
    <div class="control-group">
      <label>Max Articles:</label>
      <select id="maxArticles" onchange="onSettingsChange()">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5" selected>5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="10">10</option>
      </select>
    </div>
    <div class="control-group">
      <label>Style:</label>
      <select id="styleSelect" onchange="onSettingsChange()">
        <option value="academic">Academic</option>
        <option value="absurd">Absurdist</option>
        <option value="minimal">Minimal</option>
        <option value="chaos">Chaos Mode</option>
      </select>
    </div>
    <div class="control-group">
      <button class="btn-go" onclick="regenerate()">🎲 Regenerate</button>
    </div>
  </div>
</div>

<div class="main-grid">
  <div class="article-panel" id="articlePanel">
    <!-- Generated article goes here -->
  </div>

  <div class="sidebar">
    <div class="sidebar-section">
      <h3>📥 Source Articles</h3>
      <div id="sourceList"></div>
    </div>
    <div class="sidebar-section">
      <h3>🔧 Synthesis Log</h3>
      <div id="synthLog"></div>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <span class="status-indicator"><span class="status-dot"></span> Autonomous</span>
  <span><span class="stat">Articles: <strong id="statArticles">0</strong></span></span>
  <span><span class="stat">Sentences synthesized: <strong id="statSentences">0</strong></span></span>
  <span><span class="stat">Seed: <strong id="statSeed" style="font-family:monospace;color:var(--yellow)">—</strong></span></span>
</div>

<script>
// ===== CONFIGURATION =====
const CONFIG = {
  prefixes: ['Towards', 'On the', 'Revisiting', 'A Novel Approach to', 'Beyond', 'Meta-', 'Quantum', 'Post-', 'Neo-', 'Hyper-', 'Trans-'],
  suffixes: ['Theory', 'Paradox', 'Framework', 'Phenomenon', 'Dynamics', 'Complex', 'System', 'Protocol', 'Mechanism', 'Paradigm'],
  sectionTitles: ['Definition & Overview', 'Historical Development', 'Theoretical Framework', 'Applications', 'Criticism & Controversy', 'See Also'],
  academicFiller: ['notably', 'interestingly', 'fundamentally', 'consequently', 'moreover', 'furthermore', 'in this context', 'it follows that', 'empirically', 'theoretically', 'conversely', 'nevertheless', 'accordingly', 'arguably', 'ostensibly'],
};

let currentSeed = '';
let sourceArticles = [];
let synthLog = [];

// ===== RANDOM UTILITIES =====
function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr) {
  return arr[randomInt(0, arr.length - 1)];
}

function generateRandomString(len) {
  const chars = 'abcdefghijklmnopqrstuvwxyz';
  let s = '';
  for (let i = 0; i < len; i++) s += chars[randomInt(0, chars.length - 1)];
  return s;
}

function generateSeed() {
  const parts = [];
  for (let i = 0; i < 4; i++) parts.push(generateRandomString(randomInt(3, 7)));
  return parts.join('-');
}

// ===== LOGGING =====
function log(msg, type = 'info') {
  const time = new Date().toLocaleTimeString('en-US', { hour12: false });
  synthLog.unshift({ time, msg, type });
  renderLog();
}

function renderLog() {
  const el = document.getElementById('synthLog');
  el.innerHTML = synthLog.slice(0, 50).map(e =>
    `<div class="log-entry ${e.type}"><span class="log-time">${e.time}</span> ${e.msg}</div>`
  ).join('');
}

// ===== WIKIPEDIA API =====
async function fuzzySearchWikipedia(query) {
  log(`Fuzzy searching "${query}"...`, 'info');
  try {
    const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srlimit=1&format=json&origin=*`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.query?.search?.length > 0) {
      const result = data.query.search[0];
      log(`Matched → "${result.title}" (score: ${result.wordcount || '?'})`, 'success');
      return { title: result.title, pageid: result.pageid };
    }
    log(`No match for "${query}", retrying...`, 'warn');
    return null;
  } catch (err) {
    log(`Search error: ${err.message}`, 'error');
    return null;
  }
}

async function fetchWikipediaExtract(title) {
  try {
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
    const resp = await fetch(url);
    if (!resp.ok) return null;
    return await resp.json();
  } catch { return null; }
}

async function fetchWikipediaContent(title) {
  try {
    const url = `https://en.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&prop=wikitext|sections&format=json&origin=*`;
    const resp = await fetch(url);
    const data = await resp.json();
    return data.parse;
  } catch { return null; }
}

// ===== SYNTHESIS ENGINE =====
function splitIntoSentences(text) {
  if (!text) return [];
  return text
    .replace(/\n+/g, '. ')
    .split(/(?<=[.!?])\s+/)
    .map(s => s.trim())
    .filter(s => s.length > 15 && s.length < 500)
    .slice(0, 300);
}

function blendTitle(sources) {
  const words = sources.flatMap(s => s.title.split(/\s+/).filter(w => w.length > 3));
  const pickedWords = [];
  const count = Math.min(randomInt(2, 4), words.length);
  const used = new Set();
  for (let i = 0; i < count; i++) {
    let w;
    do { w = pick(words); } while (used.has(w));
    used.add(w);
    pickedWords.push(w);
  }
  return `${pick(CONFIG.prefixes)} ${pickedWords.join('-')} ${pick(CONFIG.suffixes)}`;
}

function buildInfobox(sources) {
  const fields = [
    ['Discipline', ...sources.map(() => pick(['Physics', 'Mathematics', 'Computer Science', 'Philosophy', 'Biology', 'Linguistics', 'Sociology', 'Economics']))],
    ['First described', ...sources.map(() => randomInt(1800, 2024).toString())],
    ['Named after', ...sources.flatMap(s => s.title.split(/\s+/).slice(0, 2))],
    ['Status', pick(['Active', 'Contested', 'Emerging', 'Deprecated', 'Revived', 'Theoretical'])],
    ['Complexity', pick(['O(n)', 'O(n²)', 'O(log n)', 'NP-complete', 'Undecidable', 'Polynomial', 'Exponential'])],
    ['Key figures', sources.slice(0, 3).map(s => s.title.split(/\s+/)[0]).join(', ')],
    ['Applications', pick(['Cryptography', 'Machine Learning', 'Quantum Computing', 'Linguistics', 'Biology', 'Network Theory', 'Game Theory'])],
  ];
  return fields;
}

function synthesizeSection(sectionName, sentences, maxSentences) {
  const out = [];
  const count = Math.min(maxSentences, sentences.length);
  const used = new Set();
  for (let i = 0; i < count; i++) {
    let idx;
    do { idx = randomInt(0, sentences.length - 1); } while (used.has(idx) && used.size < sentences.length);
    used.add(idx);
    let sent = sentences[idx];
    // Insert filler words occasionally
    if (Math.random() > 0.65 && !sent.startsWith(CONFIG.prefixes[0])) {
      const filler = pick(CONFIG.academicFiller);
      sent = `${filler}, ${sent.charAt(0).toLowerCase()}${sent.slice(1)}`;
    }
    out.push(sent);
  }
  // Occasionally prepend a transitional sentence
  if (out.length > 2 && Math.random() > 0.5) {
    const transitions = [
      `This relationship has been extensively documented in the literature.`,
      `Scholars have long debated the implications of these findings.`,
      `Recent developments suggest a paradigm shift in our understanding.`,
      `The convergence of these phenomena remains an open question.`,
      `Empirical evidence supports multiple interpretations of this dynamic.`,
    ];
    out.splice(randomInt(0, out.length - 1), 0, pick(transitions));
  }
  return out.join(' ');
}

function generateSeeAlso(sources) {
  const items = new Set();
  items.add(`Wikipedia: ${sources[0]?.title || 'Related article'}`);
  items.add(pick(CONFIG.prefixes) + ' ' + pick(CONFIG.suffixes));
  items.add('Self-reference');
  items.add('Autopoiesis (systems theory)');
  items.add('Recursion');
  items.add('Stigmergy');
  if (sources.length > 2) {
    items.push(...sources.slice(1, 4).map(s => s.title));
  }
  return [...items].slice(0, 8);
}

function generateCategories(sources) {
  const cats = new Set([
    'All articles with unsourced statements',
    'Self-referential articles',
    'Automatically generated content',
    'Wikipedia maintenance',
    'Articles needing synthesis',
  ]);
  const disciplines = ['Physics', 'Mathematics', 'Computer Science', 'Philosophy', 'Systems theory', 'Linguistics'];
  cats.add(pick(disciplines));
  cats.add(`${pick(disciplines)} stubs`);
  sources.forEach(s => {
    const words = s.title.split(/\s+/).slice(0, 2);
    cats.add(words.join(' '));
  });
  return [...cats].slice(0, 10);
}

// ===== MAIN PIPELINE =====
async function runPipeline() {
  const maxArticles = parseInt(document.getElementById('maxArticles').value);
  const style = document.getElementById('styleSelect').value;

  // Reset
  sourceArticles = [];
  synthLog = [];
  document.getElementById('synthLog').innerHTML = '';
  document.getElementById('sourceList').innerHTML = '';
  document.getElementById('articlePanel').innerHTML = '';

  currentSeed = generateSeed();
  document.getElementById('statSeed').textContent = currentSeed;
  log(`Seed generated: ${currentSeed}`, 'info');

  showLoader(true);
  updateLoadStep('Fetching Wikipedia articles...');

  // Step 1: Generate random strings and search
  const seeds = currentSeed.split('-');
  const searchStrings = [];

  for (let i = 0; i < maxArticles; i++) {
    const str = seeds[i % seeds.length] + generateRandomString(randomInt(1, 4));
    searchStrings.push(str);
    updateLoadStep(`Searching Wikipedia with "${str}" (${i+1}/${maxArticles})...`);
  }

  // Step 2: Fetch all articles in parallel
  const searchPromises = searchStrings.map(str => fuzzySearchWikipedia(str));
  const results = await Promise.all(searchPromises);

  const validResults = results.filter(r => r !== null);

  if (validResults.length === 0) {
    showLoader(false);
    document.getElementById('articlePanel').innerHTML =
      '<h2>No articles found 😢</h2><p>Wikipedia\'s fuzzy matcher returned nothing. Try regenerating!</p>';
    return;
  }

  log(`Found ${validResults.length} valid article(s)`, 'success');
  updateLoadStep(`Found ${validResults.length} articles. Extracting content...`);

  // Step 3: Fetch extracts and content in parallel
  const extractPromises = validResults.map(r => fetchWikipediaExtract(r.title));
  const contentPromises = validResults.map(r => fetchWikipediaContent(r.title));

  const [extracts, contents] = await Promise.all([
    Promise.allSettled(extractPromises),
    Promise.allSettled(contentPromises),
  ]);

  // Step 4: Build source list
  for (let i = 0; i < validResults.length; i++) {
    const result = validResults[i];
    const ext = extracts[i].status === 'fulfilled' ? extracts[i].value : null;
    const cont = contents[i].status === 'fulfilled' ? contents[i].value : null;

    const article = {
      title: result.title,
      pageid: result.pageid,
      seed: searchStrings[i],
      extract: ext?.extract || '',
      description: ext?.description || '',
      wikitext: cont?.wikitext?.['*'] || '',
      url: ext?.content_urls?.desktop?.page || `https://en.wikipedia.org/wiki/${encodeURIComponent(result.title)}`,
    };

    sourceArticles.push(article);
    log(`Loaded: "${article.title}"`, 'success');
    renderSourceCard(article, i);
  }

  updateLoadStep('Synthesizing composite article...');
  await sleep(300);

  // Step 5: Synthesize!
  const allSentences = sourceArticles.flatMap(a => splitIntoSentences(a.extract + '\n' + stripWikimedia(a.wikitext)));

  log(`Extracted ${allSentences.length} raw sentences from ${sourceArticles.length} articles`, 'info');

  const title = blendTitle(sourceArticles);
  log(`Synthesized title: "${title}"`, 'success');

  const subtitle = `A ${style}-styled synthesis of ${sourceArticles.length} Wikipedia article(s) via fuzzy-matched random seeds`;

  const infoboxData = buildInfobox(sourceArticles);

  const sections = {};
  CONFIG.sectionTitles.forEach(name => {
    sections[name] = synthesizeSection(name, allSentences, randomInt(3, 8));
  });

  const seeAlso = generateSeeAlso(sourceArticles);
  const categories = generateCategories(sourceArticles);

  // Step 6: Render
  renderArticle({ title, subtitle, infoboxData, sections, seeAlso, categories, style });

  document.getElementById('statArticles').textContent = sourceArticles.length;
  document.getElementById('statSentences').textContent = allSentences.length;

  log(`Article fully synthesized ✨`, 'success');
  updateLoadStep('Done!');

  await sleep(500);
  showLoader(false);
}

// ===== RENDERING =====
function renderSourceCard(article, idx) {
  const el = document.getElementById('sourceList');
  el.innerHTML += `
    <div class="source-card">
      <div><span class="source-seed">${article.seed}</span></div>
      <div class="source-title">${idx + 1}. ${article.title}</div>
      <a href="${article.url}" target="_blank" class="source-url">${article.url}</a>
    </div>`;
}

function renderArticle(data) {
  const panel = document.getElementById('articlePanel');

  let html = `<div class="wiki-article">`;
  html += `<h1 class="wiki-title">${data.title}</h1>`;
  html += `<div class="wiki-subtitle">${data.subtitle}</div>`;

  // Infobox
  html += `<div class="infobox"><div class="infobox-title">${data.title}</div>`;
  data.infoboxData.forEach(([label, value]) => {
    html += `<div class="infobox-row"><span class="infobox-label">${label}</span><span class="infobox-value">${value}</span></div>`;
  });
  html += `<div class="infobox-row"><span class="infobox-label">Sources</span><span class="infobox-value">${sourceArticles.length} WP articles</span></div>`;
  html += `</div>`;

  // Sections
  Object.entries(data.sections).forEach(([name, content]) => {
    html += `<div class="section"><h2>${name}</h2><p>${content}</p></div>`;
  });

  // See Also
  html += `<div class="section"><h2>See Also</h2><ul>`;
  data.seeAlso.forEach(item => {
    html += `<li>${item}</li>`;
  });
  html += `</ul></div>`;

  // References
  html += `<div class="ref-box"><strong>References</strong><ol>`;
  sourceArticles.forEach((a, i) => {
    html += `<li><a href="${a.url}" target="_blank">${a.title}</a>. Wikipedia. Fuzzy-matched from seed "<code>${a.seed}</code>".</li>`;
  });
  html += `</ol></div>`;

  // Categories
  html += `<div class="cat-box"><span>Categories:</span>`;
  data.categories.forEach(cat => {
    html += `<a href="#">${cat}</a>`;
  });
  html += `</div>`;

  html += `</div>`;
  panel.innerHTML = html;
}

// ===== HELPERS =====
function stripWikimedia(text) {
  if (!text) return '';
  return text
    .replace(/\{\{[^}]+\}\}/g, '')
    .replace(/\[\[[^\]|]+\|([^\]]+)\]\]/g, '$1')
    .replace(/\[\[([^\]]+)\]\]/g, '$1')
    .replace(/'''?/g, '')
    .replace(/==+.+?==+/g, '')
    .replace(/<[a-z\/][^>]*>/g, '')
    .replace(/\n+/g, ' ')
    .trim();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showLoader(show) {
  document.getElementById('loader').classList.toggle('hidden', !show);
}

function updateLoadStep(text) {
  document.getElementById('loadStep').textContent = text;
}

function onSettingsChange() {
  // Visual feedback only — regenerate button does the work
}

function regenerate() {
  runPipeline();
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => {
  runPipeline();
});
</script>
