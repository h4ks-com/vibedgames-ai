var NF={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880};
var KM={q:"C4",w:"D4",e:"E4",r:"F4",t:"G4",y:"A4",u:"B4",a:"C5",s:"D5",d:"E5",f:"F5",g:"G5",h:"A5"};
var BK={r:true,u:true,f:true,h:true};
function initAudio(){if(AC)return;AC=new(window.AudioContext||window.webkitAudioContext)();AN=AC.createAnalyser();AN.fftSize=256;AN.connect(AC.destination);WD=new Uint8Array(AN.frequencyBinCount)}
function buildPG(){var g=document.getElementById("pg");if(!g)return;g.innerHTML="";Object.keys(KM).forEach(function(k){var d=document.createElement("div");d.className="pk"+(BK[k]?" blk":"");d.textContent=k.toUpperCase();d.id="pk"+k;d.onmousedown=function(){playNote(KM[k],k)};g.appendChild(d)})}
function playNote(note,key){

var osc=AC.createOscillator(),gn=AC.createGain();
osc.type=(document.getElementById("slwave")?document.getElementById("slwave").value:"square");
osc.frequency.value=NF[note];gn.gain.setValueAtTime(0.15,AC.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.5);
osc.connect(gn);gn.connect(AC.destination);if(AN)gn.connect(AN);osc.start();osc.stop(AC.currentTime+0.5);
var p=document.getElementById("pk"+key);if(p){p.style.borderStyle="inset";setTimeout(function(){p.style.borderStyle="outset"},150)}
document.getElementById("fqd").textContent=Math.round(NF[note])+" Hz";drawWF();
}
function playChord(){initAudio();if(AC.state==="suspended")AC.resume();[261.63,329.63,392].forEach(function(f,i){var o=AC.createOscillator(),g=AC.createGain();o.type="square";o.frequency.value=f;g.gain.setValueAtTime(0.1,AC.currentTime+i*0.02);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+1);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+1)});drawWF()}
function playTheme(){initAudio();if(AC.state==="suspended")AC.resume();var mel=[392,392,349,329,329,349,392,440,440,392,440,493,493,466,440,392,349,329,294,294,329,349,392,349,329];mel.forEach(function(f,i){var o=AC.createOscillator(),g=AC.createGain();o.type="square";o.frequency.value=f;g.gain.setValueAtTime(0.08,AC.currentTime+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.15+0.2);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+i*0.15+0.2)});sayB("that is our jam")}
function drawWF(){var c=document.getElementById("wfc");if(!c)return;var ctx=c.getContext("2d");c.width=c.offsetWidth;c.height=c.offsetHeight;if(!AN){ctx.fillStyle="#000";ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle="#0f0";ctx.fillText("Play a sound!",10,20);return}AN.getByteFrequencyData(WD);ctx.fillStyle="#000";ctx.fillRect(0,0,c.width,c.height);for(var vi=0;vi<WD.length;vi++){var h=WD[vi]/255*c.height;ctx.fillStyle="rgb("+WD[vi]+","+(255-WD[vi])+",0)";ctx.fillRect(vi*(c.width/WD.length),c.height-h,(c.width/WD.length)-1,h)}}setInterval(function(){if(document.getElementById("wfc"))drawWF()},100);

function setRot(deg){ROT=parseInt(deg);document.getElementById("ro").style.transform="rotate("+deg+"deg)";var v=document.getElementById("rtv");if(v)v.textContent=deg+"°";var s=document.getElementById("rtsldr");if(s)s.value=deg;var st=document.getElementById("rtst");if(st)st.textContent=Math.abs(deg)>45?"ROTATING":"Stable";drawRC()}
function spinMe(){var cur=ROT||0,tgt=cur+(Math.random()>0.5?720:-720),stp=60,inc=(tgt-cur)/stp,i=0,iv=setInterval(function(){cur+=inc;i++;setRot(Math.round(cur));if(i>=stp){clearInterval(iv);sayB("I AM DIZZY")}},16)}
