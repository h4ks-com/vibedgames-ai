<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click the Target!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; user-select: none; }
  #hud { width: 100%; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); font-size: 1.2rem; z-index: 10; }
  #hud .score { font-size: 1.6rem; font-weight: 700; color: #e94560; }
  #hud .timer { color: #ffd700; }
  #hud .streak { color: #53d8fb; }
  #game-area { flex: 1; width: 100%; position: relative; cursor: crosshair; }
  .target {
    position: absolute;
    cursor: pointer;
    transition: transform 0.08s;
    filter: drop-shadow(0 0 10px rgba(233,69,96,0.5));
    animation: popIn 0.15s ease-out;
  }
  .target:hover { transform: scale(1.15); }
  .target:active { transform: scale(0.9); }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .score-popup {
    position: absolute;
    font-weight: 700;
    font-size: 1.4rem;
    color: #ffd700;
    pointer-events: none;
    animation: floatUp 0.8s ease-out forwards;
    text-shadow: 0 0 6px rgba(255,215,0,0.7);
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }
  #overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 20;
  }
  #overlay h1 { font-size: 2.5rem; color: #e94560; margin-bottom: 8px; }
  #overlay p { font-size: 1.2rem; color: #aaa; margin-bottom: 12px; }
  #overlay .final-score { font-size: 3rem; color: #ffd700; font-weight: 700; margin-bottom: 20px; }
  #overlay button {
    padding: 14px 40px; font-size: 1.2rem;
    background: #e94560; color: #fff; border: none;
    border-radius: 8px; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  #overlay button:hover { background: #c73651; }
  #overlay button:active { transform: scale(0.95); }
  .particle {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    pointer-events: none;
    animation: particleBurst 0.5s ease-out forwards;
  }
  @keyframes particleBurst {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }
</style>
</head>
<body>
<div id="hud">
  <span class="score">🎯 Score: <span id="score-val">0</span></span>
  <span class="streak">🔥 Streak: <span id="streak-val">0</span>x</span>
  <span class="timer">⏱ <span id="timer-val">30</span>s</span>
</div>
<div id="game-area"></div>
<div id="overlay">
  <h1>Click the Target!</h1>
  <p>Click as many targets as you can in 30 seconds!</p>
  <p style="font-size:0.9rem; color:#666;">Smaller targets = more points. Build streaks for bonuses!</p>
  <button id="start-btn">▶ Start Game</button>
</div>

<script>
// Generate pixel-art bullseye target sprite as data URI
function generateTargetSprite(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const cx = size / 2, cy = size / 2;
  const rings = [
    { r: 0.45, color: '#cc0000' },
    { r: 0.35, color: '#ffffff' },
    { r: 0.25, color: '#cc0000' },
    { r: 0.16, color: '#ffffff' },
    { r: 0.08, color: '#cc0000' },
  ];
  rings.forEach(ring => {
    ctx.fillStyle = ring.color;
    ctx.beginPath();
    ctx.arc(cx, cy, Math.max(1, size * ring.r), 0, Math.PI * 2);
    ctx.fill();
  });

  // Pixel grid overlay for pixel art feel
  if (size >= 32) {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    const step = Math.max(2, Math.floor(size / 16));
    for (let x = 0; x < size; x += step) {
      for (let y = 0; y < size; y += step) {
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }

  return canvas.toDataURL('image/png');
}

const gameArea = document.getElementById('game-area');
const scoreVal = document.getElementById('score-val');
const streakVal = document.getElementById('streak-val');
const timerVal = document.getElementById('timer-val');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');

let score = 0, streak = 0, bestStreak = 0, timeLeft = 30;
let timerInterval = null, gameActive = false, targetTimeout = null;

const SIZES = [
  { size: 80, points: 1, label: '+1' },
  { size: 60, points: 2, label: '+2' },
  { size: 44, points: 3, label: '+3' },
  { size: 32, points: 5, label: '+5' },
];

function randomTarget() {
  const roll = Math.random();
  if (roll < 0.35) return SIZES[0];
  if (roll < 0.65) return SIZES[1];
  if (roll < 0.88) return SIZES[2];
  return SIZES[3];
}

function spawnTarget() {
  if (!gameActive) return;
  const existing = gameArea.querySelector('.target');
  if (existing) existing.remove();

  const tier = randomTarget();
  const rect = gameArea.getBoundingClientRect();
  const maxX = rect.width - tier.size - 20;
  const maxY = rect.height - tier.size - 20;
  const x = 20 + Math.random() * Math.max(0, maxX);
  const y = 20 + Math.random() * Math.max(0, maxY);

  const img = document.createElement('img');
  img.src = generateTargetSprite(tier.size);
  img.className = 'target';
  img.style.width = tier.size + 'px';
  img.style.height = tier.size + 'px';
  img.style.left = x + 'px';
  img.style.top = y + 'px';
  img.dataset.points = tier.points;
  img.dataset.label = tier.label;

  img.addEventListener('click', (e) => hitTarget(e, tier));
  gameArea.appendChild(img);

  const lifetime = Math.max(800, 2200 - score * 10);
  targetTimeout = setTimeout(() => {
    if (img.parentNode) {
      streak = 0;
      streakVal.textContent = streak;
      img.remove();
      spawnTarget();
    }
  }, lifetime);
}

function hitTarget(e, tier) {
  if (!gameActive) return;
  clearTimeout(targetTimeout);
  const img = e.currentTarget;
  img.remove();

  streak++;
  if (streak > bestStreak) bestStreak = streak;
  const multiplier = streak >= 10 ? 3 : streak >= 5 ? 2 : 1;
  const points = tier.points * multiplier;
  score += points;

  scoreVal.textContent = score;
  streakVal.textContent = streak;

  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = multiplier > 1 ? `${tier.label} ×${multiplier}!` : tier.label;
  popup.style.left = (e.clientX - gameArea.getBoundingClientRect().left) + 'px';
  popup.style.top = (e.clientY - gameArea.getBoundingClientRect().top - 10) + 'px';
  if (multiplier >= 2) popup.style.color = '#e94560';
  gameArea.appendChild(popup);
  setTimeout(() => popup.remove(), 800);

  spawnParticles(e.clientX - gameArea.getBoundingClientRect().left, e.clientY - gameArea.getBoundingClientRect().top);
  spawnTarget();
}

function spawnParticles(cx, cy) {
  const colors = ['#e94560','#ffd700','#53d8fb','#fff','#ff6b6b'];
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.5;
    const dist = 30 + Math.random() * 40;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    gameArea.appendChild(p);
    setTimeout(() => p.remove(), 500);
  }
}

function startGame() {
  score = 0; streak = 0; bestStreak = 0; timeLeft = 30;
  scoreVal.textContent = 0;
  streakVal.textContent = 0;
  timerVal.textContent = 30;
  timerVal.style.color = '#ffd700';
  overlay.style.display = 'none';
  gameActive = true;
  gameArea.querySelectorAll('.target, .score-popup, .particle').forEach(el => el.remove());

  timerInterval = setInterval(() => {
    timeLeft--;
    timerVal.textContent = timeLeft;
    if (timeLeft <= 5) timerVal.style.color = '#e94560';
    if (timeLeft <= 0) endGame();
  }, 1000);

  spawnTarget();
}

function endGame() {
  gameActive = false;
  clearInterval(timerInterval);
  clearTimeout(targetTimeout);
  timerVal.style.color = '#ffd700';
  gameArea.querySelectorAll('.target').forEach(el => el.remove());

  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h1>⏱ Time's Up!</h1>
    <div class="final-score">${score} pts</div>
    <p>Best Streak: ${bestStreak}x</p>
    <button id="replay-btn">🔄 Play Again</button>
  `;
  document.getElementById('replay-btn').addEventListener('click', () => {
    overlay.innerHTML = `
      <h1>Click the Target!</h1>
      <p>Click as many targets as you can in 30 seconds!</p>
      <p style="font-size:0.9rem; color:#666;">Smaller targets = more points. Build streaks for bonuses!</p>
      <button id="start-btn2">▶ Start Game</button>
    `;
    document.getElementById('start-btn2').addEventListener('click', startGame);
  });
}

startBtn.addEventListener('click', startGame);
</script>
</body>
</html>
