<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLB Viewer & Uploader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #header {
    width: 100%;
    text-align: center;
    padding: 16px 20px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
  }
  #header h1 { font-size: 1.3rem; color: #e94560; }
  #header p { font-size: 0.8rem; color: #888; margin-top: 4px; }
  #controls {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 16px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
  }
  .btn {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: #c81e45; }
  .btn:disabled { background: #555; cursor: not-allowed; }
  .btn-secondary { background: #0f3460; }
  .btn-secondary:hover { background: #1a4a80; }
  #status-bar {
    width: 100%;
    text-align: center;
    padding: 6px 16px;
    font-size: 0.82rem;
    color: #aaa;
    background: #0d1b2a;
    min-height: 28px;
  }
  #status-bar.error { color: #e94560; }
  #status-bar.success { color: #2ed573; }
  #share-url-box {
    display: none;
    width: 100%;
    padding: 10px 16px;
    background: #0d1b2a;
    border-top: 1px solid #0f3460;
    text-align: center;
  }
  #share-url-box input {
    width: 90%;
    max-width: 600px;
    padding: 6px 10px;
    background: #1a1a2e;
    border: 1px solid #0f3460;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 0.8rem;
  }
  #viewer-container {
    width: 100%;
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #dropzone {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    pointer-events: none;
    opacity: 0.85;
  }
  #dropzone.active { pointer-events: auto; }
  #dropzone .icon { font-size: 3rem; }
  #dropzone .hint { font-size: 0.9rem; color: #888; }
  #progress-bar {
    display: none;
    width: 90%;
    max-width: 400px;
    height: 6px;
    background: #0f3460;
    border-radius: 3px;
    overflow: hidden;
  }
  #progress-bar > div {
    height: 100%;
    background: #e94560;
    width: 0%;
    transition: width 0.2s;
  }
</style>
</head>
<body>

<div id="header">
  <h1>📦 GLB Viewer</h1>
  <p>Upload a .glb file to s.h4ks.com and render it instantly · or share a link</p>
</div>

<div id="controls">
  <button class="btn" id="upload-btn">📂 Open GLB File</button>
  <button class="btn btn-secondary" id="share-btn" style="display:none;">🔗 Copy Share Link</button>
  <button class="btn btn-secondary" id="reset-btn">🔄 Reset View</button>
  <input type="file" id="file-input" accept=".glb,model/gltf-binary" style="display:none;">
</div>

<div id="status-bar">Ready. Select a .glb file to begin.</div>

<div id="share-url-box">
  <input type="text" id="share-url" readonly placeholder="Share link will appear here">
</div>

<div id="progress-bar"><div></div></div>

<div id="viewer-container">
  <div id="dropzone">
    <div class="icon">🎬</div>
    <div class="hint">Drag &amp; drop a .glb file here, or use the button above</div>
  </div>
  <canvas id="three-canvas"></canvas>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0",
    "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ---- Three.js Setup ----
const canvas = document.getElementById('three-canvas');
const container = document.getElementById('viewer-container');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.01, 1000);
camera.position.set(3, 2, 5);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

// Environment for nice reflections
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0x8888ff, 0.3);
dirLight2.position.set(-5, -3, -5);
scene.add(dirLight2);

// Controls
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = false;

let currentModel = null;

function onResize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// Grid helper
const grid = new THREE.GridHelper(10, 20, 0x0f3460, 0x0f3460);
grid.material.opacity = 0.3;
grid.material.transparent = true;
scene.add(grid);

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ---- Status helpers ----
const statusBar = document.getElementById('status-bar');
function setStatus(msg, type) {
  statusBar.textContent = msg;
  statusBar.className = type || '';
}

// ---- Model loading & centering ----
function loadModelFromURL(url) {
  setStatus('Loading model...');
  const loader = new GLTFLoader();
  loader.load(
    url,
    (gltf) => {
      if (currentModel) scene.remove(currentModel);
      currentModel = gltf.scene;

      // Center and scale model
      const box = new THREE.Box3().setFromObject(currentModel);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = maxDim > 0 ? 2.0 / maxDim : 1;

      currentModel.scale.setScalar(scale);
      const scaledBox = new THREE.Box3().setFromObject(currentModel);
      const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
      const scaledSize = scaledBox.getSize(new THREE.Vector3());
      currentModel.position.x -= scaledCenter.x;
      currentModel.position.z -= scaledCenter.z;
      currentModel.position.y -= scaledBox.min.y; // sit on grid

      // Adjust camera distance based on model size
      const fitDist = Math.max(scaledSize.x, scaledSize.y, scaledSize.z) * 2.5;
      camera.position.set(fitDist * 0.6, fitDist * 0.5, fitDist);
      controls.target.set(0, scaledSize.y * 0.4, 0);
      controls.update();

      scene.add(currentModel);
      document.getElementById('dropzone').style.display = 'none';
      setStatus('Model loaded successfully!', 'success');
    },
    (xhr) => {
      if (xhr.total) {
        const pct = Math.round((xhr.loaded / xhr.total) * 100);
        setStatus(`Loading model... ${pct}%`);
      }
    },
    (err) => {
      setStatus('Failed to load model: ' + (err?.message || 'unknown error'), 'error');
      console.error(err);
    }
  );
}

// ---- Upload to s.h4ks.com ----
function uploadGLB(file) {
  setStatus('Uploading to s.h4ks.com...');
  const formData = new FormData();
  formData.append('file', file);

  const xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://s.h4ks.com');

  const progressBar = document.getElementById('progress-bar');
  const progressFill = progressBar.querySelector('div');
  progressBar.style.display = 'block';

  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      progressFill.style.width = pct + '%';
      setStatus(`Uploading... ${pct}%`);
    }
  };

  xhr.onload = () => {
    progressBar.style.display = 'none';
    if (xhr.status >= 200 && xhr.status < 300) {
      // Try to extract URL from response
      const text = xhr.responseText;
      let modelUrl = null;

      // s.h4ks.com typically returns the file URL in the response
      // Try JSON first
      try {
        const json = JSON.parse(text);
        modelUrl = json.url || json.file || json.link || json.path || (json.data && json.data.url);
      } catch(e) {}

      // Try to find a URL in plain text / HTML response
      if (!modelUrl) {
        const urlMatch = text.match(/https?:\/\/s\.h4ks\.com\/[^\s"'<>]+/);
        if (urlMatch) modelUrl = urlMatch[0];
      }

      // Fallback: just construct from response
      if (!modelUrl && text.trim().match(/^[a-zA-Z0-9]{5,}$/)) {
        modelUrl = 'https://s.h4ks.com/' + text.trim();
      }

      if (modelUrl) {
        setStatus('Upload complete! Loading model...', 'success');
        loadModelFromURL(modelUrl + '?download=true');
        updateShareURL(modelUrl);
      } else {
        console.log('Upload response:', text);
        setStatus('Upload succeeded but could not parse URL. Check console.', 'error');
      }
    } else {
      setStatus('Upload failed (HTTP ' + xhr.status + ')', 'error');
    }
  };

  xhr.onerror = () => {
    progressBar.style.display = 'none';
    setStatus('Network error during upload.', 'error');
  };

  xhr.send(formData);
}

// ---- Share link ----
function updateShareURL(modelUrl) {
  const pageUrl = new URL(window.location.href);
  pageUrl.searchParams.set('model', modelUrl);
  const shareUrl = pageUrl.toString();

  const shareInput = document.getElementById('share-url');
  shareInput.value = shareUrl;
  document.getElementById('share-url-box').style.display = 'block';
  document.getElementById('share-btn').style.display = 'inline-flex';

  // Update browser URL without reload
  window.history.replaceState({}, '', shareUrl);
}

// ---- Auto-load from URL parameter ----
(function autoLoad() {
  const params = new URLSearchParams(window.location.search);
  const modelParam = params.get('model');
  if (modelParam) {
    document.getElementById('dropzone').style.display = 'none';
    loadModelFromURL(modelParam + (modelParam.includes('?') ? '&' : '?') + 'download=true');
  }
})();

// ---- Event listeners ----
const fileInput = document.getElementById('file-input');
const uploadBtn = document.getElementById('upload-btn');

uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.name.toLowerCase().endsWith('.glb')) {
    setStatus('Please select a .glb file.', 'error');
    return;
  }
  uploadGLB(file);
  fileInput.value = ''; // reset for re-upload
});

document.getElementById('share-btn').addEventListener('click', () => {
  const shareInput = document.getElementById('share-url');
  shareInput.select();
  navigator.clipboard.writeText(shareInput.value).then(() => {
    setStatus('Share link copied to clipboard!', 'success');
  }).catch(() => {
    setStatus('Copy failed — select and copy manually.', 'error');
  });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (currentModel) {
    const box = new THREE.Box3().setFromObject(currentModel);
    const size = box.getSize(new THREE.Vector3());
    const fitDist = Math.max(size.x, size.y, size.z) * 1.2;
    camera.position.set(fitDist * 0.6, fitDist * 0.5, fitDist);
    controls.target.set(0, size.y * 0.4, 0);
    controls.update();
    setStatus('View reset.', 'success');
  }
});

// ---- Drag & drop ----
const dropzone = document.getElementById('dropzone');
container.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropzone.classList.add('active');
});
container.addEventListener('dragleave', (e) => {
  if (e.target === container) dropzone.classList.remove('active');
});
container.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (!file.name.toLowerCase().endsWith('.glb')) {
    setStatus('Please drop a .glb file.', 'error');
    return;
  }
  uploadGLB(file);
});

onResize();
</script>

</body>
</html>
