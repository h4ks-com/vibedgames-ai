<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bub 2.0 — Bubble Evolution</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:10;
background:linear-gradient(180deg,rgba(0,0,0,0.6) 0%,transparent 100%);pointer-events:none}
#score-box{color:#fff;font-size:18px;text-shadow:0 0 10px rgba(0,200,255,0.8)}
#score-box span{font-size:32px;font-weight:900;color:#00d4ff;text-shadow:0 0 20px #00d4ff,0 0 40px #00d4ff}
#combo{font-size:14px;color:#ffd700;margin-top:2px;opacity:0;transition:opacity .3s}
#combo.show{opacity:1}
#powerups{display:flex;gap:8px}
.power-icon{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);
display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.3;transition:all .3s}
.power-icon.active{opacity:1;animation:pulse .5s ease infinite alternate;border-color:#fff;box-shadow:0 0 15px currentColor}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.15)}}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;flex-direction:column;
align-items:center;justify-content:center;color:#fff;text-align:center;backdrop-filter:blur(8px);transition:opacity .5s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:clamp(36px,8vw,72px);margin-bottom:8px;background:linear-gradient(135deg,#00d4ff,#ff00ff,#00ff88);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:titleGlow 3s ease infinite alternate}
@keyframes titleGlow{from{filter:drop-shadow(0 0 20px rgba(0,212,255,0.5))}to{filter:drop-shadow(0 0 40px rgba(255,0,255,0.7))}}
#overlay h2{font-size:clamp(16px,3vw,24px);color:#888;margin-bottom:30px;font-weight:400}
#overlay p{max-width:400px;line-height:1.6;color:#aaa;font-size:15px;margin-bottom:25px}
.btn{padding:14px 42px;font-size:18px;font-weight:700;border:none;border-radius:50px;cursor:pointer;
background:linear-gradient(135deg,#00d4ff,#0088ff);color:#fff;letter-spacing:1px;
box-shadow:0 4px 30px rgba(0,212,255,0.4),inset 0 1px 0 rgba(255,255,255,0.2);
transition:all .2s;text-transform:uppercase}
.btn:hover{transform:scale(1.08);box-shadow:0 6px 40px rgba(0,212,255,0.6)}
.btn:active{transform:scale(.96)}
#final-score{font-size:64px;font-weight:900;color:#00d4ff;text-shadow:0 0 30px #00d4ff;margin:10px 0}
#high-score{font-size:16px;color:#ffd700;margin-bottom:25px}
.stats-row{display:flex;gap:30px;margin-bottom:25px;justify-content:center}
.stat{text-align:center}.stat .val{font-size:28px;font-weight:800;color:#fff}.stat .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px}
#controls-hint{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.35);
font-size:13px;z-index:10;pointer-events:none;text-align:center}
</style>
</head>
<body>
<div id="ui">
<div id="score-box">SCORE <span id="score">0</span><div id="combo">COMBO x1</div></div>
<div id="powerups"><div class="power-icon" id="pw-shield" title="Shield">🛡️</div><div class="power-icon" id="pw-magnet" title="Magnet">🧲</div><div class="power-icon" id="pw-slow" title="Slow-Mo">⏱️</div><div class="power-icon" id="pw-multi" title="Multi">×2</div></div>
</div>
<div id="overlay">
<h1>🫧 BUB 2.0</h1>
<h2>Bubble Evolution</h2>
<p>Dodge the red hazards. Collect orbs for points.<br>Grab power-ups. Survive.</p>
<div class="stats-row" style="display:none" id="end-stats"><div class="stat"><div class="val" id="es-time">0s</div><div class="lbl">Time</div></div><div class="stat"><div class="val" id="es-orbs">0</div><div class="lbl">Orbs</div></div><div class="stat"><div class="val" id="es-maxcombo">0</div><div class="lbl">Max Combo</div></div></div>
<div id="high-score"></div>
<button class="btn" id="start-btn">PLAY</button>
</div>
<div id="controls-hint">Mouse / Touch to move • Avoid red • Grab colors</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,S=1;
function resize(){W=canvas.width=innerWidth*devicePixelRatio;H=canvas.height=innerHeight*devicePixelRatio;
canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';S=Math.min(W/1200,H/900);
ctx.setTransform(S,0,0,S,0,0)};resize();addEventListener('resize',resize);

// === GAME STATE ===
const state={running:false,score:0,hiScore:parseInt(localStorage.getItem('bub2_hi')||'0'),time:0,
orbsCollected:0,maxCombo:0,combo:0,comboTimer:0,difficulty:1,
shield:false,shieldTimer:0,magnet:false,magnetTimer:0,slowMo:false,slowTimer:0,
multiplier:1,multiTimer:0};

// === PLAYER (BUB) ===
const player={x:0,y:0,r:28,targetX:0,targetY:0,vx:0,vy:0,trail:[],wobble:0,pulse:0,
invincible:0,hitShake:0};
player.x=player.targetX=W/S/2;player.y=player.targetY=H/S/2;

// === INPUT ===
let inputX=0,inputY=0,inputActive=false;
function updateInput(e){
const r=canvas.getBoundingClientRect();
let cx,cy;if(e.touches){cx=e.touches[0].clientX-r.left;cy=e.touches[0].clientY-r.top}else{cx=e.clientX-r.left;cy=e.clientY-r.top}
inputX=cx*ratioX;inputY=cy*ratioY;inputActive=true;}
let ratioX=1,ratioY=1;
addEventListener('mousemove',e=>updateInput(e));
addEventListener('touchmove',e=>{e.preventDefault();updateInput(e)},{passive:false});
addEventListener('touchstart',e=>{e.preventDefault();updateInput(e)},{passive:false});
addEventListener('mousedown',updateInput);

// === ENTITIES ===
let orbs=[],hazards=[],particles=[],floatTexts=[],powerUps=[];
const orbColors=['#00d4ff','#00ff88','#ff00ff','#ffd700','#ff6b6b','#4ecdc4'];
const hazardTypes={red:{r:14,color:'#ff2244',glow:'rgba(255,34,68,0.6)',speed:2.5},
spike:{r:16,color:'#ff4422',glow:'rgba(255,68,34,0.5)',speed:2,shape:'spine'},
mine:{r:18,color:'#ff6644',glow='rgba(255,102,68,0.5)',speed:1.5,shape:'mine'},
seeker:{r:12,color='#ff0055',glow:'rgba(255,0,85,0.7)',speed:1.8,shape:'seeker'}};
const pwTypes=[
{name:'shield',icon:'🛡️',color:'#00d4ff',duration:8000},
{name:'magnet',icon:'🧲',color:'#ff00ff',duration:7000},
{name:'slowmo',icon:'⏱️',color:'#00ff88',duration:5000},
{name:'multi',icon:'×2',color:'#ffd700',duration:6000}];

function spawnOrb(){
const side=Math.floor(Math.random()*4);let x,y;
if(side===0){x=Math.random()*(W/S);y=-30}
else if(side===1){x=(W/S)+30;y=Math.random()*(H/S)}
else if(side===2){x=Math.random()*(W/S);y=(H/S)+30}
else{x=-30;y=Math.random()*(H/S)}
orbs.push({x,y,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5+0.5,
r:10+Math.random()*8,color:orbColors[Math.floor(Math.random()*orbColors.length)],
rot:Math.random()*Math.PI*2,rv:(Math.random()-0.5)*0.05,val:10,life:0});}

function spawnHazard(){
const types=Object.keys(hazardTypes);
const pool=[];for(let i=0;i<types.length;i++){
const t=hazardTypes[types[i]];
if(state.difficulty>=1)pool.push(types[i]);
if(state.difficulty>=2&&t.shape!=='spine')pool.push(types[i]);
if(state.difficulty>=3)pool.push(types[i]);}
const key=pool[Math.floor(Math.random()*pool.length)]||'red';
const t=hazardTypes[key];
const side=Math.floor(Math.random()*4);let x,y,vx,vy;
if(side===0){x=Math.random()*(W/S);y=-30;vx=(Math.random()-0.5)*t.speed;vy=t.speed*(0.5+Math.random())}
else if(side===1){x=(W/S)+30;y=Math.random()*(H/S);vx=-t.speed*(0.5+Math.random());vy=(Math.random()-0.5)*t.speed}
else if(side===2){x=Math.random()*(W/S);y=(H/S)+30;vx=(Math.random()-0.5)*t.speed;vy=-t.speed*(0.5+Math.random())}
else{x=-30;y=Math.random()*(H/S);vx=t.speed*(0.5+Math.random());vy=(Math.random()-0.5)*t.speed}
hazards.push({x,y,vx,vy,r:t.r+(Math.random()*6-3),color:t.color,glow:t.glow,shape:t.shape||'circle',
rot:0,rs:(Math.random()-0.5)*0.08});}

function spawnPowerUp(){
if(powerUps.length>=2)return;
const x=80+Math.random()*((W/S)-160),y=80+Math.random()((H/S)-160);
const pt=pwTypes[Math.floor(Math.random()*pwTypes.length)];
powerUps.push({x,y,r:18,...pt,born:Date.now(),pulse:0,floatY:y});}

function addParticles(x,y,color,count=8,speed=3){
for(let i=0;i<count;i++){
const a=Math.random()*Math.PI*2;const sp=speed*(0.5+Math.random());
particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*4,color,life:1,decay:0.02+Math.random()*0.03});}}

function addFloatText(x,y,text,color){
floatTexts.push({x,y,text,color,life:1,vy:-2,size:18+Math.random()*6});}

// === UPDATE ===
let lastTime=0,spawnOrbT=0,spawnHazT=0,spawnPWT=0;
function update(dt){
if(!state.running)return;
const sdt=state.slowMo?dt*0.4:dt;
state.time+=sdt;state.difficulty=1+Math.floor(state.time/20000);

ratioX=(W/S)/canvas.clientWidth;ratioY=(H/S)/canvas.clientHeight;

// Player movement
if(inputActive){player.targetX=inputX;player.targetY=inputY;}
const dx=player.targetX-player.x,dy=player.targetY-player.y;
player.vx=dx*0.12;player.vy=dy*0.12;
player.x+=player.vx;player.y+=player.vy;
player.wobble+=sdt*0.008;player.pulse+=sdt*0.005;
if(player.invincible>0)player.invincible-=sdt;
if(player.hitShake>0)player.hitShake-=sdt*0.05;

// Trail
player.trail.unshift({x:player.x,y:player.y,r:player.r*0.7,alpha:0.4});
if(player.trail.length>12)player.trail.pop();
for(let i=player.trail.length-1;i>=0;i--){player.trail[i].alpha-=0.03;player.trail[i].r*=0.95;
if(player.trail[i].alpha<=0)player.trail.splice(i,1);}

// Spawn timing
spawnOrbT-=sdt;if(spawnOrbT<=0){spawnOrb();spawnOrbT=Math.max(400,1200-state.difficulty*100);}
spawnHazT-=sdt;if(spawnHazT<=0){spawnHazard();spawnHazT=Math.max(300,900-state.difficulty*70);}
spawnPWT-=sdt;if(spawnPWT<=0&&Math.random()<0.3){spawnPowerUp();spawnPWT=15000+Math.random()*10000;}

// Power-up timers
if(state.shield){state.shieldTimer-=sdt;if(state.shieldTimer<=0)state.shield=false;}
if(state.magnet){state.magnetTimer-=sdt;if(state.magnetTimer<=0)state.magnet=false;}
if(state.slowMo){state.slowTimer-=sdt;if(state.slowTimer<=0)state.slowMo=false;}
if(state.multiplier>1){state.multiTimer-=sdt;if(state.multiTimer<=0)state.multiplier=1;}

// Update UI
document.getElementById('pw-shield').classList.toggle('active',state.shield);
document.getElementById('pw-magnet').classList.toggle('active',state.magnet);
document.getElementById('pw-slow').classList.toggle('active',state.slowMo);
document.getElementById('pw-multi').classList.toggle('active',state.multiplier>1);

// Orbs
for(let i=orbs.length-1;i>=0;i--){const o=orbs[i];
o.x+=o.vx*sdt*0.06;o.y+=o.vy*sdt*0.06;o.rot+=o.rv*sdt*0.06;o.life+=sdt*0.002;
if(state.magnet){const mdx=player.x-o.x,mdy=player.y-o.y;
const dist=Math.hypot(mdx,mdy);if(dist<200){o.x+=mdx/dist*3;o.y+=mdy/dist*3;}}
const odist=Math.hypot(o.x-player.x,o.y-player.y);
if(odist<player.r+o.r){
const pts=o.val*state.multiplier;state.score+=pts;state.orbsCollected++;
state.combo++;state.comboTimer=1200;if(state.combo>state.maxCombo)state.maxCombo=state.combo;
addParticles(o.x,o.y,o.color,12,4);addFloatText(o.x,o.y-20,'+'+pts,o.color);
orbs.splice(i,1);continue;}
if(o.x<-60||o.x>(W/S)+60||o.y<-60||o.y>(H/S)+60)orbs.splice(i,1);}

// Hazards
for(let i=hazards.length-1;i>=0;i--){const h=hazards[i];
let hvx=h.vx,hvy=h.vy;
if(h.shape==='seeker'){const sdx=player.x-h.x,sdy=player.y-h.y;
const sd=Math.hypot(sdx,sdy);if(sd>1){hvx+=(sdx/sd)*0.04;sdy&&(hvy+=(sdy/sd)*0.04);}}
h.x+=hvx*sdt*0.06;h.y+=hvy*sdt*0.06;h.rot+=h.rs?sdt*0.06*h.rs:0;
const hdist=Math.hypot(h.x-player.x,h.y-player.y);
if(hdist<player.r+h.r-(state.shield?8:0)){
if(state.shield||player.invincible>0){addParticles(h.x,h.y,'#00d4ff',16,5);hazards.splice(i,1);continue;}
gameOver();return;}
if(h.x<-80||h.x>(W/S)+80||h.y<-80||h.y>(H/S)+80)hazards.splice(i,1);}

// Power-ups
for(let i=powerUps.length-1;i>=0;i--){const p=powerUps[i];
p.pulse+=sdt*0.006;p.floatY=p.y+Math.sin(p.pulse)*6;
const pdist=Math.hypot(p.x-player.x,p.floatY-player.y);
if(pdist<player.r+p.r){
switch(p.name){case'shield':state.shield=true;state.shieldTimer=p.duration;break;
case'magnet':state.magnet=true;state.magnetTimer=p.duration;break;
case'slowmo':state.slowMo=true;state.slowTimer=p.duration;break;
case'multi':state.multiplier=2;state.multiTimer=p.duration;break;}
addParticles(p.x,p.floatY,p.color,20,5);addFloatText(p.x,p.floatY-25,p.name.toUpperCase(),p.color);
powerUps.splice(i,1);continue;}
if(Date.now()-p.born>12000)powerUps.splice(i,1);}

// Particles
for(let i=particles.length-1;i>=0;i--){const p=particles[i];
p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=p.decay;p.r*=0.97;
if(p.life<=0||p.r<0.3)particles.splice(i,1);}

// Float texts
for(let i=floatTexts.length-1;i>=0;i--){const t=floatTexts[i];
t.y+=t.vy;t.life-=0.018;t.size*=1.01;if(t.life<=0)floatTexts.splice(i,1);}

// Combo timer
if(state.comboTimer>0){state.comboTimer-=sdt;
if(state.comboTimer<=0){state.combo=0;}}
const comboEl=document.getElementById('combo');
if(state.combo>1){comboEl.textContent='COMBO ×'+state.combo;comboEl.classList.add('show');
comboEl.style.color=state.combo>10?'#ff00ff':state.combo>5?'#ffd700':'#00ff88';}
else comboEl.classList.remove('show');

document.getElementById('score').textContent=state.score;}

// === DRAW ===
function drawBub(x,y,r,wobble,pulse,shake){
const sx=x+(shake?Math.random()*shake*2-shake:0),sy=y+(shake?Math.random()*shake*2-shake:0);
const wr=r+Math.sin(wobble)*2.5;const pr=r+Math.sin(pulse)*3;
// Outer glow
const glow=ctx.createRadialGradient(sx,sy,pr*0.5,sx,sy,pr*2.5);
glow.addColorStop(0,'rgba(0,212,255,0.15)');glow.addColorStop(1,'rgba(0,212,255,0)');
ctx.fillStyle=glow;ctx.beginPath();ctx.arc(sx,sy,pr*2.5,0,Math.PI*2);ctx.fill();
// Main body gradient
const grad=ctx.createRadialGradient(sx-pr*0.3,sy-pr*0.3,0,sx,sy,wr);
grad.addColorStop(0,'#80f0ff');grad.addColorStop(0.4,'#00d4ff');grad.addColorStop(0.8,'#0088cc');grad.addColorStop(1,'#004488');
ctx.fillStyle=grad;ctx.beginPath();ctx.arc(sx,sy,wr,0,Math.PI*2);ctx.fill();
// Highlight
ctx.fillStyle='rgba(255,255,255,0.45)';ctx.beginPath();
ctx.ellipse(sx-wr*0.28,sy-wr*0.3,wr*0.38,wr*0.25,-0.4,0,Math.PI*2);ctx.fill();
// Inner ring
ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5;ctx.beginPath();
ctx.arc(sx,sy,wr*0.65,0,Math.PI*2);ctx.stroke();
// Shield effect
if(state.shield){ctx.save();ctx.globalAlpha=0.4+Math.sin(pulse*3)*0.2;
ctx.strokeStyle='#00d4ff';ctx.lineWidth=3;ctx.setLineDash([8,6]);
ctx.beginPath();ctx.arc(sx,sy,wr+12,0,Math.PI*2);ctx.stroke();
ctx.setLineDash([]);ctx.restore();}
// Invincibility flash
if(player.invincible>0&&Math.floor(player.invincible/80)%2){ctx.fillStyle='rgba(255,255,255,0.3)';
ctx.beginPath();ctx.arc(sx,sy,wr,0,Math.PI*2);ctx.fill();}}

function drawOrb(o){
ctx.save();ctx.translate(o.x,o.y);ctx.rotate(o.rot);
const gr=o.r*(1+Math.sin(o.life*3)*0.1);
const g=ctx.createRadialGradient(0,0,0,0,0,gr);
g.addColorStop(0,'#fff');g.addColorStop(0.3,o.color);g.addColorStop(1,o.color+'40');
ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,gr,0,Math.PI*2);ctx.fill();
ctx.shadowColor=o.color;ctx.shadowBlur=15;ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;
ctx.beginPath();ctx.arc(0,0,gr*0.6,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
// Inner sparkle
ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(gr*0.2,-gr*0.2,gr*0.18,0,Math.PI*2);ctx.fill();
ctx.restore();}

function drawHazard(h){
ctx.save();ctx.translate(h.x,h.y);ctx.rotate(h.rot);
ctx.shadowColor=h.glow;ctx.shadowBlur=20;
if(h.shape==='spine'){
ctx.fillStyle=h.color;ctx.beginPath();
for(let i=0;i<8;i++){const a=i/8*Math.PI*2*Math.PI;const ri=i%2===0?h.r:h.r*0.45;
ctx.lineTo(Math.cos(a)*ri,Math.sin(a)*ri);}ctx.closePath();ctx.fill();}
else if(h.shape==='mine'){
ctx.fillStyle='#333';ctx.beginPath();ctx.arc(0,0,h.r,0,Math.PI*2);ctx.fill();
ctx.fillStyle=h.color;ctx.beginPath();ctx.arc(0,0,h.r*0.75,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#222';ctx.fillRect(-h.r*0.12,-h.r*0.9,h.r*0.24,h.r*0.5);
ctx.fillRect(-h.r*0.65,-h.r*0.12,h.r*0.5,h.r*0.24);
ctx.fillRect(h.r*0.15,-h.r*0.12,h.r*0.5,h.r*0.24);
ctx.fillRect(-h.r*0.12,h.r*0.4,h.r*0.24,h.r*0.5);}
else if(h.shape==='seeker'){
const g=ctx.createRadialGradient(0,0,0,0,0,h.r);g.addColorStop(0,'#fff');g.addColorStop(0.3,h.color);g.addColorStop(1,h.color+'80');
ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,h.r,0,Math.PI*2);ctx.fill();
// Eyes
ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-h.r*0.3,-h.r*0.15,h.r*0.18,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(h.r*0.3,-h.r*0.15,h.r*0.18,0,Math.PI*2);ctx.fill();}
else{
const g=ctx.createRadialGradient(0,0,0,0,0,h.r);g.addColorStop(0,'#fff');g.addColorStop(0.4,h.color);g.addColorStop(1,h.color+'60');
ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,h.r,0,Math.PI*2);ctx.fill();}
ctx.shadowBlur=0;ctx.restore();}

function drawPowerUp(p){
ctx.save();ctx.translate(p.x,p.floatY);
const pr=p.r+Math.sin(p.pulse)*4;
const pg=ctx.createRadialGradient(0,0,0,0,0,pr*2);
pg.addColorStop(0,p.color+'30');pg.addColorStop(1,p.color+'00');
ctx.fillStyle=pg;ctx.beginPath();ctx.arc(0,0,pr*2,0,Math.PI*2);ctx.fill();
ctx.fillStyle=p.color+'30';ctx.beginPath();ctx.arc(0,0,pr+6,0,Math.PI*2);ctx.fill();
ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(0,0,pr,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold '+Math.round(pr)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(p.icon,0,1);
ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,pr,0,Math.PI*2);ctx.stroke();
ctx.restore();}

function draw(){
ctx.clearRect(0,0,W/S,H/S);
// Background grid
ctx.strokeStyle='rgba(0,180,255,0.04)';ctx.lineWidth=1;
const gs=50;for(let x=0;x<(W/S);x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,(H/S));ctx.stroke();}
for(let y=0;y<(H/S);y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo((W/S),y);ctx.stroke();}
// Slow-mo overlay
if(state.slowMo){ctx.fillStyle='rgba(0,255,136,0.04)';ctx.fillRect(0,0,W/S,H/S);}
// Player trail
for(let i=player.trail.length-1;i>=0;i--){
const t=player.trail[i];ctx.globalAlpha=t.alpha*0.3;
ctx.fillStyle='#00d4ff';ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();}
ctx.globalAlpha=1;
// Orbs
orbs.forEach(drawOrb);
// Power-ups
powerUps.forEach(drawPowerUp);
// Hazards
hazards.forEach(drawHazard);
// Particles
particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});
ctx.globalAlpha=1;
// Float texts
floatTexts.forEach(t=>{ctx.globalAlpha=t.life;ctx.fillStyle=t.color;
ctx.font='bold '+Math.round(t.size)+'px sans-serif';ctx.textAlign='center';
ctx.fillText(t.text,t.x,t.y);});
ctx.globalAlpha=1;
// Player
drawBub(player.x,player.y,player.r,player.wobble,player.pulse,player.hitShake);
// Difficulty indicator
ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='12px monospace';ctx.textAlign='right';
ctx.fillText('DIFFICULTY '+state.difficulty,(W/S)-15,25);}

// === GAME FLOW ===
function gameOver(){
state.running=false;
if(state.score>state.hiScore){state.hiScore=state.score;localStorage.setItem('bub2_hi',state.hiScore.toString());}
document.getElementById('final-score').textContent=state.score;
document.getElementById('high-score').textContent='🏆 Best: '+state.hiScore;
document.getElementById('es-time').textContent=Math.floor(state.time/1000)+'s';
document.getElementById('es-orbs').textContent=state.orbsCollected;
document.getElementById('es-maxcombo').textContent=state.maxCombo;
document.getElementById('end-stats').style.display='flex';
document.querySelector('#overlay h2').textContent='Game Over';
document.getElementById('overlay').classList.remove('hidden');
document.getElementById('start-btn').textContent='PLAY AGAIN';}

function startGame(){
state.running=true;state.score=0;state.time=0;state.orbsCollected=0;state.maxCombo=0;
state.combo=0;state.comboTimer=0;state.difficulty=1;
state.shield=false;state.magnet=false;state.slowMo=false;state.multiplier=1;
player.x=player.targetX=W/S/2;player.y=player.targetY=H/S/2;
player.vx=0;player.vy=0;player.trail=[];player.invincible=2000;player.hitShake=0;
orbs=[];hazards=[];particles=[];floatTexts=[];powerUps=[];
spawnOrbT=0;spawnHazT=500;spawnPWT=8000;
document.getElementById('overlay').classList.add('hidden');
for(let i=0;i<5;i++)spawnOrb();}

function loop(t){
const dt=Math.min(t-lastTime,33)||16;lastTime=t;
update(dt);draw();requestAnimationFrame(loop);}

document.getElementById('start-btn').addEventListener('click',startGame);
requestAnimationFrame(loop);
</script>
</body>
</html>
