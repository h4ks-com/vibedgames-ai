<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💢 REALLY MAD BIRDS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(180deg, #1a0a0a 0%, #2d1010 40%, #4a1515 70%, #1a0505 100%);
  font-family: 'Comic Sans MS', cursive;
  overflow: hidden;
  height: 100vh;
  user-select: none;
}
#game-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 100;
  color: #ff4444;
  text-shadow: 2px 2px 4px #000, 0 0 20px #ff0000;
  font-size: 18px;
}
#level-display {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 100;
  color: #ff6666;
  text-shadow: 2px 2px 4px #000;
  font-size: 22px;
  font-weight: bold;
}
#message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 200;
  color: #fff;
  font-size: 48px;
  text-shadow: 3px 3px 6px #000, 0 0 30px #ff0000;
  text-align: center;
  display: none;
  pointer-events: none;
}
#message .sub { font-size: 20px; color: #ffaaaa; margin-top: 15px; }
#instructions {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #aa6666;
  font-size: 14px;
  text-align: center;
  z-index: 100;
  text-shadow: 1px 1px 3px #000;
}
.bird {
  position: absolute;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.05s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), 0 0 10px rgba(255,0,0,0.3);
}
.bird:hover { transform: scale(1.15); }
.bird .rage-bar {
  position: absolute;
  bottom: -8px;
  left: 10%;
  width: 80%;
  height: 6px;
  background: #333;
  border-radius: 3px;
  overflow: hidden;
}
.bird .rage-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff0000, #ff4400, #ffff00);
  transition: width 0.3s;
  border-radius: 3px;
}
.bird .thought-bubble {
  position: absolute;
  bottom: calc(100% + 12px);
  left: 50%;
  transform: translateX(-50%) scale(0);
  background: #fff;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 11px;
  color: #333;
  white-space: nowrap;
  max-width: 160px;
  text-align: center;
  opacity: 0;
  transition: all 0.2s;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
  pointer-events: none;
}
.bird .thought-bubble::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: #fff;
}
.bird.show-thought .thought-bubble {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}
.pig {
  position: absolute;
  font-size: 32px;
  z-index: 5;
  animation: pigLaugh 2s ease-in-out infinite;
}
@keyframes pigLaugh {
  0%, 100% { transform: rotate(-3deg) scale(1); }
  50% { transform: rotate(3deg) scale(1.08); }
}
.shake { animation: shake 0.15s ease-in-out infinite; }
@keyframes shake {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  25% { transform: translateX(-4px) rotate(-5deg); }
  75% { transform: translateX(4px) rotate(5deg); }
}
.fuming { animation: fume 0.4s ease-in-out infinite alternate; }
@keyframes fume {
  from { filter: brightness(1) hue-rotate(0deg); }
  to { filter: brightness(1.4) hue-rotate(-10deg); }
}
.combust { animation: combust 1s forwards; }
@keyframes combust {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.8); opacity: 0.8; filter: brightness(3) hue-rotate(30deg); }
  100% { transform: scale(0.1); opacity: 0; }
}
.rage-quit { animation: rageQuit 1.5s forwards; }
@keyframes rageQuit {
  0% { transform: translateX(0) scale(1); opacity: 1; }
  30% { transform: translateX(20px) scale(1.2) rotate(15deg); }
  100% { transform: translateX(300px) scale(0.3) rotate(720deg); opacity: 0; }
}
.calm { 
  background: linear-gradient(135deg, #44cc88, #22aa66) !important;
  box-shadow: 0 0 25px rgba(68,204,136,0.7), inset -5px -5px 15px rgba(0,0,0,0.3) !important;
}
.sparkle {
  position: absolute;
  pointer-events: none;
  font-size: 16px;
  animation: sparkleFloat 1.5s forwards;
  z-index: 150;
}
@keyframes sparkleFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.2); }
}
.scream-text {
  position: absolute;
  color: #ff2222;
  font-weight: bold;
  font-size: 14px;
  text-shadow: 1px 1px 2px #000;
  pointer-events: none;
  animation: screamFade 1.2s forwards;
  z-index: 120;
}
@keyframes screamFade {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-30px) scale(1.5); }
}
.confetti {
  position: absolute;
  pointer-events: none;
  animation: confettiFall 3s forwards;
  z-index: 300;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(400px) rotate(720deg); }
}
.lava-pool {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 80px;
  background: linear-gradient(180deg, transparent, rgba(255,60,0,0.15));
  pointer-events: none;
  z-index: 1;
}
.lightning {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 250;
}
</style>
</head>
<body>
<div id="game-container">
  <div id="ui">😡 Birds: <span id="bird-count">0</span> | 😤 Furious: <span id="furious-count">0</span> | 😌 Calm: <span id="calm-count">0</span></div>
  <div id="level-display">LEVEL <span id="level-num">1</span>: <span id="level-title">Mildly Inconvenienced</span></div>
  <div id="message"></div>
  <div id="instructions">🖱️ Hover over birds to see why they're mad | ⏳ Wait for them to calm down | 🧘 DO NOTHING</div>
  <div class="lava-pool"></div>
  <div class="lightning" id="lightning"></div>
</div>

<script>
const container = document.getElementById('game-container');
const uiBirdCount = document.getElementById('bird-count');
const uiFurious = document.getElementById('furious-count');
const uiCalm = document.getElementById('calm-count');
const levelNum = document.getElementById('level-num');
const levelTitle = document.getElementById('level-title');
const messageEl = document.getElementById('message');
const lightning = document.getElementById('lightning');

const LEVELS = [
  { title: "Mildly Inconvenienced", birds: 3, maxRage: 70, calmSpeed: 0.12 },
  { title: "Getting Annoyed", birds: 4, maxRage: 78, calmSpeed: 0.09 },
  { title: "Genuinely Pissed", birds: 4, maxRage: 85, calmSpeed: 0.07 },
  { title: "Absolutely Fuming", birds: 5, maxRage: 90, calmSpeed: 0.06 },
  { title: "Seeing Red", birds: 5, maxRage: 94, calmSpeed: 0.05 },
  { title: "Uncontrollable Rage", birds: 6, maxRage: 96, calmSpeed: 0.04 },
  { title: "Blood Boiling", birds: 6, maxRage: 97, calmSpeed: 0.035 },
  { title: "Existential Fury", birds: 7, maxRage: 98, calmSpeed: 0.03 },
  { title: "Pure Wrath", birds: 7, maxRage: 99, calmSpeed: 0.025 },
  { title: "NIRVANA (Maybe?)", birds: 8, maxRage: 100, calmSpeed: 0.02 },
];

const RAGE_REASONS = [
  "WiFi went down for 3 seconds",
  "Someone used their toothbrush",
  "Stole lunch from the fridge",
  "Subscription auto-renewed",
  "Forgot password AGAIN",
  "Someone breathed too loud",
  "Coffee was lukewarm",
  "Phone at 13% no charger",
  "Step on a LEGO",
  "Delivery driver 'couldn't find address'",
  "Autocorrect changed the word",
  "Meeting could've been an email",
  "Neighbor's dog won't stop",
  "Update restarted computer",
  "Spotify ad during workout",
  "Buffering at the good part",
  "Someone said 'actually'",
  "Pigeon pooped on car",
  "Ice cream fell off cone",
  "Printer says 'PC LOAD LETTER'",
];

const SCREAMS = ["AARGH!", "RRGH!", "WHY?!", "UGH!", "FFS!", "NOOO!", "GAAAH!", "REALLY?!"];

let currentLevel = 0;
let birds = [];
let pigs = [];
let gameRunning = true;

function rand(min, max) { return Math.random() * (max - min) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function createSparkle(x, y) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.textContent = pick(['✨','⭐','💫','✦','·']);
  s.style.left = x + 'px';
  s.style.top = y + 'px';
  container.appendChild(s);
  setTimeout(() => s.remove(), 1500);
}

function createScreamText(x, y) {
  const t = document.createElement('div');
  t.className = 'scream-text';
  t.textContent = pick(SCREAMS);
  t.style.left = x + 'px';
  t.style.top = y + 'px';
  container.appendChild(t);
  setTimeout(() => t.remove(), 1200);
}

function flashLightning() {
  lightning.style.opacity = '0.4';
  setTimeout(() => lightning.style.opacity = '0', 80);
  setTimeout(() => { lightning.style.opacity = '0.2'; setTimeout(() => lightning.style.opacity = '0', 60); }, 150);
}

function spawnBird(lvl) {
  const size = rand(45, 65);
  const b = document.createElement('div');
  b.className = 'bird shake fuming';
  
  const rage = lvl.maxRage * rand(0.75, 1);
  b.dataset.rage = rage;
  b.dataset.maxRage = rage;
  b.dataset.calmSpeed = lvl.calmSpeed * rand(0.8, 1.2);
  b.dataset.reason = pick(RAGE_REASONS);
  b.dataset.screamTimer = rand(150, 350);
  b.dataset.combustChance = Math.random();
  
  const intensity = rage / 100;
  const r = Math.floor(180 + intensity * 75);
  const g = Math.floor(40 * (1 - intensity));
  const bl = Math.floor(30 * (1 - intensity));
  b.style.width = size + 'px';
  b.style.height = size + 'px';
  b.style.background = `radial-gradient(circle at 35% 30%, #ffcccc, rgb(${r},${g},${bl}))`;
  b.style.left = rand(60, window.innerWidth - size - 60) + 'px';
  b.style.top = rand(100, window.innerHeight - 180) + 'px';
  
  const eyeStyle = rage > 85 ? '😡' : rage > 70 ? '😠' : '😤';
  b.innerHTML = `
    ${eyeStyle}
    <div class="rage-bar"><div class="rage-fill" style="width:${rage}%"></div></div>
    <div class="thought-bubble">${b.dataset.reason}</div>
  `;
  
  b.addEventListener('mouseenter', () => b.classList.add('show-thought'));
  b.addEventListener('mouseleave', () => b.classList.remove('show-thought'));
  
  container.appendChild(b);
  birds.push(b);
}

function spawnPig() {
  const p = document.createElement('div');
  p.className = 'pig';
  p.textContent = '🐷';
  p.style.left = rand(window.innerWidth - 80) + 'px';
  p.style.top = rand(window.innerHeight - 200, window.innerHeight - 120) + 'px';
  container.appendChild(p);
  pigs.push(p);
}

function updateUI() {
  let furious = 0, calm = 0;
  birds.forEach(b => {
    if (parseFloat(b.dataset.rage) <= 5) calm++;
    else if (parseFloat(b.dataset.rage) > 30) furious++;
  });
  uiBirdCount.textContent = birds.length;
  uiFurious.textContent = furious;
  uiCalm.textContent = calm;
}

function showMessage(text, sub) {
  messageEl.innerHTML = `${text}${sub ? `<div class="sub">${sub}</div>` : ''}`;
  messageEl.style.display = 'block';
}

function hideMessage() { messageEl.style.display = 'none'; }

function spawnConfetti(count) {
  const colors = ['#ff4444','#ff8844','#ffcc00','#44ff88','#44ccff','#ff44ff','#ffffff'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = pick(['🔥','💢','✨','⭐','🌟','💥','🧘','☮️','🕊️','💜']);
      c.style.left = rand(0, window.innerWidth) + 'px';
      c.style.top = '-20px';
      c.style.color = pick(colors);
      c.style.fontSize = rand(14, 28) + 'px';
      container.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }, i * 40);
  }
}

function startLevel(idx) {
  if (idx >= LEVELS.length) {
    showMessage('🕊️ NIRVANA ACHIEVED 🕊️', 'All birds have found inner peace.\nOr have they?');
    spawnConfetti(80);
    setTimeout(flashLightning, 500);
    gameRunning = false;
    return;
  }
  
  const lvl = LEVELS[idx];
  currentLevel = idx;
  levelNum.textContent = idx + 1;
  levelTitle.textContent = lvl.title;
  
  // Clear previous
  birds.forEach(b => b.remove());
  pigs.forEach(p => p.remove());
  birds = [];
  pigs = [];
  
  // Spawn
  for (let i = 0; i < lvl.birds; i++) {
    setTimeout(() => spawnBird(lvl), i * 300);
  }
  setTimeout(spawnPig, lvl.birds * 300 + 200);
  
  hideMessage();
  updateUI();
}

function gameLoop() {
  if (!gameRunning) return;
  
  let allCalm = true;
  let anyAlive = false;
  
  birds.forEach((b, i) => {
    if (b.classList.contains('combust') || b.classList.contains('rage-quit')) return;
    
    anyAlive = true;
    let rage = parseFloat(b.dataset.rage);
    
    if (rage <= 5 && !b.classList.contains('calm')) {
      // Calmed down!
      b.classList.remove('shake', 'fuming');
      b.classList.add('calm');
      b.querySelector(':first-child').textContent = '😌';
      createSparkle(parseFloat(b.style.left) + parseFloat(b.style.width)/2, parseFloat(b.style.top));
      // More sparkles
      for (let s = 0; s < 5; s++) {
        setTimeout(() => createSparkle(
          parseFloat(b.style.left) + rand(0, parseFloat(b.style.width)),
          parseFloat(b.style.top) + rand(0, parseFloat(b.style.height))
        ), s * 100);
      }
    } else if (rage > 5) {
      allCalm = false;
      
      // Decrease rage slowly
      rage -= parseFloat(b.dataset.calmSpeed);
      if (rage < 0) rage = 0;
      b.dataset.rage = rage;
      
      // Update bar
      const fill = b.querySelector('.rage-fill');
      if (fill) fill.style.width = rage + '%';
      
      // Scream timer
      let st = parseFloat(b.dataset.screamTimer) - 1;
      b.dataset.screamTimer = st;
      if (st <= 0 && rage > 50) {
        createScreamText(parseFloat(b.style.left), parseFloat(b.style.top) - 10);
        b.dataset.screamTimer = rage > 80 ? rand(80, 180) : rand(200, 400);
        
        // Random lightning on high rage
        if (rage > 90 && Math.random() < 0.15) flashLightning();
      }
      
      // Combust chance (very high rage)
      if (rage > 92 && parseFloat(b.dataset.combustChance) > 0.7 && Math.random() < 0.002) {
        b.classList.add('combust');
        b.querySelector(':first-child').textContent = '💥';
        setTimeout(() => b.remove(), 1000);
        // Spawn mini confetti explosion
        for (let e = 0; e < 6; e++) {
          setTimeout(() => {
            const ex = document.createElement('div');
            ex.className = 'confetti';
            ex.textContent = pick(['🔥','💥','⚡','☄️']);
            ex.style.left = parseFloat(b.style.left) + rand(0, parseFloat(b.style.width)) + 'px';
            ex.style.top = parseFloat(b.style.top) + rand(0, parseFloat(b.style.height)) + 'px';
            ex.style.fontSize = rand(18, 26) + 'px';
            container.appendChild(ex);
            setTimeout(() => ex.remove(), 2000);
          }, e * 50);
        }
      }
      
      // Rage quit chance (high rage)
      if (rage > 87 && parseFloat(b.dataset.combustChance) > 0.85 && Math.random() < 0.001) {
        b.classList.add('rage-quit');
        b.querySelector(':first-child').textContent = '🏃';
        createScreamText(parseFloat(b.style.left), parseFloat(b.style.top), "I'M OUT!");
        setTimeout(() => b.remove(), 1500);
      }
      
      // Update visual based on rage
      const intensity = rage / 100;
      const r = Math.floor(180 + intensity * 75);
      const g = Math.floor(40 * (1 - intensity));
      const bl = Math.floor(30 * (1 - intensity));
      b.style.background = `radial-gradient(circle at 35% 30%, #ffcccc, rgb(${r},${g},${bl}))`;
      
      // Update emoji
      if (!b.classList.contains('calm')) {
        const el = b.querySelector(':first-child');
        if (el && !el.textContent.includes('💥') && !el.textContent.includes('🏃')) {
          if (rage > 90) el.textContent = '🤬';
          else if (rage > 75) el.textContent = '😡';
          else if (rage > 55) el.textContent = '😠';
          else el.textContent = '😤';
        }
      }
    }
  });
  
  updateUI();
  
  // Check win condition (all remaining birds are calm or gone)
  const activeBirds = birds.filter(b => !b.classList.contains('combust') && !b.classList.contains('rage-quit'));
  const allCalmNow = activeBirds.length > 0 && activeBirds.every(b => parseFloat(b.dataset.rage) <= 5);
  const allGone = activeBirds.length === 0 && birds.some(b => b.classList.contains('combust') || b.classList.contains('rage-quit'));
  
  if ((allCalmNow || allGone) && anyAlive !== false) {
    gameRunning = false;
    spawnConfetti(40);
    setTimeout(flashLightning, 300);
    
    const burned = birds.filter(b => b.classList.contains('combust')).length;
    const quit = birds.filter(b => b.classList.contains('rage-quit')).length;
    let resultText = '';
    if (burned > 0 || quit > 0) {
      resultText = `Some birds didn't make it... (${burned} burned, ${quit} rage-quit)\nBut hey, the rest calmed down!`;
    } else {
      resultText = 'Every single bird found inner peace!';
    }
    
    showMessage(`✅ LEVEL ${currentLevel + 1} COMPLETE! ✅`, resultText);
    
    setTimeout(() => {
      startLevel(currentLevel + 1);
      gameRunning = true;
      requestAnimationFrame(gameLoop);
    }, 3500);
    return;
  }
  
  requestAnimationFrame(gameLoop);
}

// Start!
startLevel(0);
requestAnimationFrame(gameLoop);

// Ambient screen shake at high levels
setInterval(() => {
  if (!gameRunning || currentLevel < 5) return;
  const avgRage = birds.reduce((s, b) => s + parseFloat(b.dataset.rage), 0) / Math.max(1, birds.length);
  if (avgRage > 80 && Math.random() < 0.08) {
    flashLightning();
  }
}, 800);
</script>
</body>
</html>
