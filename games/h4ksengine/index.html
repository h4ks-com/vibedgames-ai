// ════════════════════════════════════════════════════════
//  SECTION 2: ENGINE CORE — Do not edit unless you know

const HEX_SIZE = 38;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);

// --- Hex Math (pointy-top) ---
function hexToPixel(q, r) {
  const x = HEX_SIZE * (Math.sqrt(3) * q + Math.sqrt(3)/2 * r);
  const y = HEX_SIZE * (3/2 * r);
  return { x, y };
}

function pixelToHex(px, py) {
  const q = (Math.sqrt(3)/3 * px - 1/3 * py) / HEX_SIZE;
  const r = (2/3 * py) / HEX_SIZE;
  return hexRound(q, r);
}

function hexRound(q, r) {
  let s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq-q), dr = Math.abs(rr-r), ds = Math.abs(rs-s);
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds) rr = -rq - rs;
  return { q: rq, r: rr };
}

function hexDist(a, b) {
  return (Math.abs(a.q-b.q) + Math.abs(a.q+a.r-b.q-b.r) + Math.abs(a.r-b.r)) / 2;
}

function hexKey(q, r) { return `${q},${r}`; }

const HEX_DIRS = [
  { q: 0, r: -1 }, { q: 1, r: -1 }, { q: 1, r: 0 },
  { q: 0, r: 1 }, { q: -1, r: 1 }, { q: -1, r: 0 },
];

const KEY_MAP = {
  'KeyW':0,'ArrowUp':0, 'KeyE':1, 'KeyD':2,'ArrowRight':2,
  'KeyX':3,'ArrowDown':3, 'KeyZ':4, 'KeyA':5,'ArrowLeft':5,
};

// --- Seeded PRNG ---
function seededRandom(seed) {
  let s = seed & 0xffffffff;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

let rng = seededRandom(GAME.world.seed);

function hashQR(q, r) {
  let h = ((q * 374761393 + r * 668265263) + GAME.world.seed) & 0xffffffff;
  h = ((h ^ (h >> 13)) * 1274126177) & 0xffffffff;
  return (h ^ (h >> 16)) >>> 0;
}

function randForTile(q, r) {
  const h = hashQR(q, r);
  return function() {
    const nh = ((h * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
    return nh;
  };
}

// --- L-System Tree Generator ---
function generateLSystem(rules, iterations) {
  let str = rules.axiom;
  for (let i = 0; i < iterations; i++) {
    let next = '';
    for (const c of str) next += (rules.rules[c] || c);
    str = next;
  }
  return str;
}

function drawLTree(ctx, x, y, len, angle, instructions, idx) {
  if (idx >= instructions.length || len < 2) return idx;
  const c = instructions[idx++];
  if (c === 'F') {
    const x2 = x + Math.cos(angle) * len;
    const y2 = y + Math.sin(angle) * len;
    ctx.lineTo(x2, y2);
    return drawLTree(ctx, x2, y2, len * GAME.world.lSystemRules.lengthFactor, angle, instructions, idx);
  } else if (c === '+') {
    return drawLTree(ctx, x, y, len, angle + GAME.world.lSystemRules.angle * Math.PI/180, instructions, idx);
  } else if (c === '-') {
    return drawLTree(ctx, x, y, len, angle - GAME.world.lSystemRules.angle * Math.PI/180, instructions, idx);
  } else if (c === '[') {
    ctx.save(); ctx.moveTo(x, y);
    idx = drawLTree(ctx, x, y, len, angle, instructions, idx);
    ctx.restore(); ctx.moveTo(x, y);
    return idx;
  } else if (c === ']') {
    return idx;
  }
  return idx;
}

const lSystemString = generateLSystem(GAME.world.lSystemRules, GAME.world.lSystemRules.iterations);

// Place items using spiral pattern
function placeItems() {
  const placed = [];
  let ring = 1;
  GAME.items.forEach((item, idx) => {
    if (item.id === 'spacecraft') {
      item.q = 35; item.r = 20;
    } else {
      let placedOk = false;
      while (!placedOk) {
        const positions = getRingPositions(ring);
        for (const pos of positions) {
          const tt = getTerrainType(pos.q, pos.r);
          if (tt.walkable && !placed.some(p => hexDist(p, pos) < GAME.itemSpread / HEX_SIZE)) {
            item.q = pos.q; item.r = pos.r;
            placed.push(pos);
            placedOk = true;
            break;
          }
        }
        ring++;
      }
    }
  });
}

function getRingPositions(ring) {
  const positions = [];
  if (ring === 0) return [{ q: 0, r: 0 }];
  let q = ring, r = 0;
  for (let i = 0; i < 6; i++) {
    for (let j = 0; j < ring; j++) {
      positions.push({ q, r });
      q += HEX_DIRS[(i+2)%6].q;
      r += HEX_DIRS[(i+2)%6].r;
    }
  }
  return positions;
}

placeItems();

// ════════════════════════════════════════════════════════
//  SECTION 4: TERRAIN SYSTEM
// ════════════════════════════════════════════════════════

function getTerrainType(q, r) {
  const h = hashQR(q, r);
  const v = (h % 100) / 100;
  let acc = 0;
  for (const tt of GAME.terrainTypes) {
    acc += tt.weight;
    if (v * 100 < acc) return tt;
  }
  return GAME.terrainTypes[0];
}

function getTerrainColor(tt) {
  return GAME.palette.terrain[tt.colorKey] || tt.color || '#333';
}

// ════════════════════════════════════════════════════════
//  SECTION 5: RENDERING
// ════════════════════════════════════════════════════════

function drawHex(cx, cy, size, fill, stroke, strokeW) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const ang = Math.PI / 180 * (60 * i - 30);
    const px = cx + size * Math.cos(ang);
    const py = cy + size * Math.sin(ang);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.lineWidth = strokeW||1; ctx.strokeStyle = stroke; ctx.stroke(); }
}

function drawHexGrid(centerQ, centerR) {
  const w = canvas.width, h = canvas.height;
  const cols = Math.ceil(w / (HEX_SIZE * 1.8)) + 2;
  const rows = Math.ceil(h / (HEX_SIZE * 1.55)) + 2;

  const startC = hexToPixel(centerQ, centerR);
  const offsetX = w/2 - startC.x;
  const offsetY = h/2 - startC.y;

  for (let r = -rows; r <= rows + rows; r++) {
    for (let q = -cols; q <= cols + cols; q++) {
      const tq = centerQ + q, tr = centerR + r;
      const { x, y } = hexToPixel(tq, tr);
      const px = x + offsetX, py = y + offsetY;
      if (px < -HEX_SIZE*2 || px > w+HEX_SIZE*2 || py < -HEX_SIZE*2 || py > h+HEX_SIZE*2) continue;

      const tt = getTerrainType(tq, tr);
      const col = getTerrainColor(tt);
      
      // Base tile
      drawHex(px, py, HEX_SIZE-1, col, null, 0);
      
      // Inner shading
      const shade = ((hashQR(tq,tr) % 20) - 10) / 100;
      const shadedCol = shadeColor(col, shade);
      drawHex(px, py, HEX_SIZE-2, shadedCol, `rgba(0,0,0,0.15)`, 1);

      // L-System trees
      const hasTree = (hashQR(tq, tr + 99999) % 1000) / 1000 < GAME.world.treeDensity;
      if (hasTree) {
        drawTreeAt(px, py);
      }
    }
  }
}

function drawTreeAt(cx, cy) {
  ctx.save();
  ctx.translate(cx, cy + 2);
  ctx.beginPath();
  ctx.strokeStyle = '#1a4a1a';
  ctx.lineWidth = 1.5;
  ctx.moveTo(0, 0);
  drawLTree(ctx, 0, 0, 12, -Math.PI/2, lSystemString, 0);
  ctx.stroke();
  // Leaves
  ctx.fillStyle = 'rgba(34,120,40,0.6)';
  ctx.beginPath();
  ctx.arc(0, -8, 5, 0, Math.PI*2);
  ctx.arc(-4, -4, 3, 0, Math.PI*2);
  ctx.arc(4, -4, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function shadeColor(col, amt) {
  let r=parseInt(col.slice(1,3),16), g=parseInt(col.slice(3,5),16), b=parseInt(col.slice(5,7),16);
  r=Math.min(255,Math.max(0,Math.round(r+(255-r)*amt)));
  g=Math.min(255,Math.max(0,Math.round(g+(255-g)*amt)));
  b=Math.min(255,Math.max(0,Math.round(b+(255-b)*amt)));
  return `rgb(${r},${g},${b})`;
}

// --- Sprite Drawers ---

function drawNewtSprite(cx, cy, scale, color, outline, detail, time) {
  const bob = Math.sin(time * 0.005) * 2;
  const tailWag = Math.sin(time * 0.008) * 0.3;
  ctx.save();
  ctx.translate(cx, cy + bob);
  ctx.scale(scale, scale);

  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, 2, 14, 10, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = outline; ctx.lineWidth = 1.5; ctx.stroke();

  // Tail
  ctx.save();
  ctx.translate(-12, 4);
  ctx.rotate(tailWag);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(-10, -3, -16, 2);
  ctx.quadraticCurveTo(-10, 5, 0, 3);
  ctx.fill(); ctx.stroke();
  ctx.restore();

  // Head
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(10, -4, 8, 7, 0.1, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Eye spots (crested newt style)
  ctx.fillStyle = detail;
  ctx.beginPath(); ctx.arc(13, -6, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, -5, 2, 0, Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(13, -6, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(8, -5, 1, 0, Math.PI*2); ctx.fill();

  // Crown spikes
  ctx.strokeStyle = detail; ctx.lineWidth = 1;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath(); ctx.moveTo(i*3, -10); ctx.lineTo(i*3, -14-(Math.abs(i)<2?3:0)); ctx.stroke();
  }

  // Legs
  ctx.strokeStyle = outline; ctx.lineWidth = 1.5;
  [[-5, 8, 0.2], [5, 8, -0.2], [-3, 10, 0.1], [3, 10, -0.1]].forEach(([lx, ly, la]) => {
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx+3*la, ly+4); ctx.stroke();
  });

  ctx.restore();
}

function drawKnightSprite(cx, cy, scale, color, time) {
  const bob = Math.sin(time * 0.004) * 1.5;
  ctx.save();
  ctx.translate(cx, cy + bob);
  ctx.scale(scale, scale);
  ctx.fillStyle = color;
  // Body armor
  ctx.fillRect(-8, -12, 16, 20);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(-8, -12, 16, 20);
  // Helmet
  ctx.beginPath(); ctx.arc(0, -14, 9, Math.PI, 0); ctx.fill(); ctx.stroke();
  // Visor slit
  ctx.fillStyle = '#222'; ctx.fillRect(-5, -15, 10, 3);
  // Sword
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(10, -5); ctx.lineTo(18, -15); ctx.stroke();
  ctx.fillStyle = '#8B4513'; ctx.fillRect(8, -5, 4, 10);
  // Legs
  ctx.fillStyle = '#444'; ctx.fillRect(-7, 8, 5, 8); ctx.fillRect(2, 8, 5, 8);
  ctx.restore();
}

function drawWizardSprite(cx, cy, scale, color, time) {
  const bob = Math.sin(time * 0.003) * 1;
  const float = Math.sin(time * 0.006) * 3;
  ctx.save();
  ctx.translate(cx, cy + bob - float);
  ctx.scale(scale, scale);
  // Robe
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(-12, 18); ctx.lineTo(12, 18); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
  // Hat
  ctx.fillStyle = '#222'; ctx.beginPath(); ctx.moveTo(0, -30); ctx.lineTo(-8, -12); ctx.lineTo(8, -12); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Face
  ctx.fillStyle = '#fdb'; ctx.beginPath(); ctx.arc(0, -10, 5, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-2, -11, 1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, -11, 1, 0, Math.PI*2); ctx.fill();
  // Beard
  ctx.fillStyle = '#ccc'; ctx.beginPath(); ctx.moveTo(-4, -7); ctx.quadraticCurveTo(0, 2, 4, -7); ctx.lineTo(3, 0); ctx.lineTo(-3, 0); ctx.closePath(); ctx.fill();
  // Staff glow
  ctx.shadowColor = color; ctx.shadowBlur = 8;
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(10, 18); ctx.stroke();
  ctx.fillStyle = color; ctx.beginPath(); ctx.arc(10, -2, 3, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawCharacterSprite(charData, cx, cy, time) {
  const s = charData.sprite === 'newt' ? drawNewtSprite :
            charData.sprite === 'knight' ? drawKnightSprite :
            drawWizardSprite;
  s(cx, cy, 1.1, charData.color, shadeColor(charData.color, -0.3), GAME.palette.playerDetail, time);
}

function drawPlayer(centerX, centerY, time) {
  const hasSword = STATE.inventory.some(i => i.id === 'sword');
  drawNewtSprite(centerX, centerY, 1.3, GAME.palette.player, GAME.palette.playerOutline, GAME.palette.playerDetail, time);
  
  // Glow ring
  if (STATE.invincibleTimer > 0 && Math.floor(STATE.invincibleTimer / 4) % 2) {
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(centerX, centerY, 22, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Sword on back
  if (hasSword) {
    ctx.save();
    ctx.translate(centerX - 8, centerY - 5);
    ctx.rotate(-0.3);
    ctx.fillStyle = '#c0c0c0';
    ctx.fillRect(0, -2, 20, 4);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(-4, -4, 6, 8);
    ctx.strokeStyle = '#666'; ctx.lineWidth = 0.5;
    ctx.strokeRect(0, -2, 20, 4);
    ctx.restore();
  }
}

function drawItems(centerQ, centerR) {
  const w = canvas.width, h = canvas.height;
  const startC = hexToPixel(centerQ, centerR);
  const offsetX = w/2 - startC.x;
  const offsetY = h/2 - startC.y;

  GAME.items.forEach(item => {
    if (item.q === undefined) return;
    const { x, y } = hexToPixel(item.q, item.r);
    const px = x + offsetX, py = y + offsetY;
    if (px < -50 || px > w+50 || py < -50 || py > h+50) return;
    if (STATE.inventory.some(inv => inv.id === item.id) && item.type !== 'objective') return;

    const collected = STATE.inventory.some(inv => inv.id === item.id);
    if (collected && item.type !== 'objective') return;

    ctx.save();
    ctx.translate(px, py);

    if (item.id === 'spacecraft') {
      // Alien spacecraft
      const hover = Math.sin(Date.now() * 0.003) * 4;
      ctx.translate(0, hover - 10);
      ctx.fillStyle = item.color;
      ctx.shadowColor = item.color; ctx.shadowBlur = 15;
      // Saucer
      ctx.beginPath(); ctx.ellipse(0, 0, 22, 8, 0, 0, Math.PI*2); ctx.fill();
      // Dome
      ctx.fillStyle = '#88ffff'; ctx.beginPath(); ctx.ellipse(0, -4, 10, 6, 0, Math.PI, 0); ctx.fill();
      // Lights
      for (let i = 0; i < 6; i++) {
        const ang = (i / 6) * Math.PI * 2;
        ctx.fillStyle = i % 2 ? '#f00' : '#ff0';
        ctx.beginPath(); ctx.arc(Math.cos(ang)*18, Math.sin(ang)*3, 2, 0, Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur = 0;
    } else if (item.id === 'sword') {
      // Cardboard sword
      const rock = Math.sin(Date.now() * 0.005) * 0.05;
      ctx.rotate(rock);
      ctx.fillStyle = '#b0a090';
      ctx.fillRect(-3, -20, 6, 32);
      ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
      ctx.strokeRect(-3, -20, 6, 32);
      // Guard
      ctx.fillStyle = '#8B4513'; ctx.fillRect(-8, 8, 16, 4);
      // Handle
      ctx.fillStyle = '#654321'; ctx.fillRect(-3, 12, 6, 8);
      // Corrugation lines
      ctx.strokeStyle = '#888'; ctx.lineWidth = 0.5;
      for (let i = 0; i < 5; i++) ctx.beginPath(); ctx.moveTo(-2, -16+i*5); ctx.lineTo(2, -12+i*5); ctx.stroke();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(-1, -18, 2, 26);
    } else {
      // Notebook / collectible
      const float = Math.sin(Date.now() * 0.004 + (item.id||'').length) * 3;
      const glow = 8 + Math.sin(Date.now() * 0.006) * 4;
      ctx.translate(0, float - 8);
      ctx.shadowColor = item.color; ctx.shadowBlur = glow;
      ctx.fillStyle = '#1a1408';
      ctx.fillRect(-8, -10, 16, 20);
      ctx.fillStyle = item.color;
      ctx.fillRect(-6, -8, 12, 16);
      ctx.strokeStyle = '#000'; ctx.lineWidth = 0.5;
      ctx.strokeRect(-6, -8, 12, 16);
      // Lines
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      for (let i = 0; i < 5; i++) ctx.beginPath(); ctx.moveTo(-4, -5+i*3); ctx.lineTo(4, -3+i*3); ctx.stroke();
      // Star
      ctx.fillStyle = '#fff'; ctx.font = '10px serif'; ctx.textAlign = 'center';
      ctx.fillText('✦', 0, 2);
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  });
}

function drawCharacters(centerQ, centerR, time) {
  const w = canvas.width, h = canvas.height;
  const startC = hexToPixel(centerQ, centerR);
  const offsetX = w/2 - startC.x;
  const offsetY = h/2 - startC.y;

  GAME.characters.forEach(ch => {
    const { x, y } = hexToPixel(ch.currentQ, ch.currentR);
    const px = x + offsetX, py = y + offsetY;
    if (px < -50 || px > w+50 || py < -50 || py > h+50) return;
    drawCharacterSprite(ch, px, py, time);
    // Name tag
    ctx.fillStyle = ch.color; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(ch.name, px, py + 22);
  });
}

function drawAmbientEntities(centerQ, centerR, time) {
  const w = canvas.width, h = canvas.height;
  const startC = hexToPixel(centerQ, centerR);
  const offsetX = w/2 - startC.x;
  const offsetY = h/2 - startC.y;
  const range = 15;

  for (let rq = centerQ - range; rq <= centerQ + range; rq++) {
    for (let rr = centerR - range; rr <= centerR + range; rr++) {
      if (rq === centerQ && rr === centerR) continue;
      const h = hashQR(rq, rr + 77777);
      const isEntity = (h % 1000) / 1000 < GAME.world.ambientEntityDensity;
      if (!isEntity) continue;
      const { x, y } = hexToPixel(rq, rr);
      const px = x + offsetX, py = y + offsetY;
      if (px < -30 || px > w+30 || py < -30 || py > h+30) continue;
      const wiggle = Math.sin(time * 0.002 + h) * 1.5;
      ctx.globalAlpha = 0.5;
      drawNewtSprite(px, py + wiggle, 0.5, '#3a8a4a', '#1a5a2a', '#c97a12', time + h);
      ctx.globalAlpha = 1;
    }
  }
}

function drawMinimap() {
  const sz = 200;
  mmCtx.fillStyle = 'rgba(0,0,0,0.85)';
  mmCtx.fillRect(0, 0, sz, sz);
  const scale = 2.5;
  const cx = sz/2, cy = sz/2;
  const range = 35;

  for (let rq = STATE.playerQ - range; rq <= STATE.playerQ + range; rq++) {
    for (let rr = STATE.playerR - range; rr <= STATE.playerR + range; rr++) {
      const { x, y } = hexToPixel(rq - STATE.playerQ, rr - STATE.playerR);
      const px = cx + x * scale / HEX_SIZE * 2.5;
      const py = cy + y * scale / HEX_SIZE * 2.5;
      if (px < -5 || px > sz+5 || py < -5 || py > sz+5) continue;
      const tt = getTerrainType(rq, rr);
      mmCtx.fillStyle = getTerrainColor(tt);
      mmCtx.beginPath(); mmCtx.arc(px, py, 2.2, 0, Math.PI*2); mmCtx.fill();
    }
  }

  // Items on map
  GAME.items.forEach(item => {
    if (item.q === undefined) return;
    const collected = STATE.inventory.some(i => i.id === item.id);
    if (collected && item.type !== 'objective') return;
    const { x, y } = hexToPixel(item.q - STATE.playerQ, item.r - STATE.playerR);
    const px = cx + x * scale / HEX_SIZE * 2.5;
    const py = cy + y * scale / HEX_SIZE * 2.5;
    if (px < -5 || px > sz+5 || py < -5 || py > sz+5) return;
    mmCtx.fillStyle = item.color || '#fff';
    mmCtx.beginPath(); mmCtx.arc(px, py, 3.5, 0, Math.PI*2); mmCtx.fill();
  });

  // Characters
  GAME.characters.forEach(ch => {
    const { x, y } = hexToPixel(ch.currentQ - STATE.playerQ, ch.currentR - STATE.playerR);
    const px = cx + x * scale / HEX_SIZE * 2.5;
    const py = cy + y * scale / HEX_SIZE * 2.5;
    if (px < -5 || px > sz+5 || py < -5 || py > sz+5) return;
    mmCtx.fillStyle = ch.color; mmCtx.beginPath(); mmCtx.arc(px, py, 3, 0, Math.PI*2); mmCtx.fill();
  });

  // Player
  mmCtx.fillStyle = GAME.palette.player;
  mmCtx.beginPath(); mmCtx.arc(cx, cy, 4, 0, Math.PI*2); mmCtx.fill();
  mmCtx.strokeStyle = '#fff'; mmCtx.lineWidth = 1; mmCtx.stroke();
}

function tryMove(dirIdx) {
  if (STATE.gameOver || STATE.victory || STATE.dialogActive) return;
  const dir = HEX_DIRS[dirIdx];
  const nQ = STATE.playerQ + dir.q;
  const nR = STATE.playerR + dir.r;
  const tt = getTerrainType(nQ, nR);
  if (!tt.walkable) {
    showMessage(`Cannot enter ${tt.name}.`, '#e74c3c', 80);
    return;
  }
  STATE.playerQ = nQ;
  STATE.playerR = nR;
  STATE.totalMoves++;
  checkTileInteraction();
}

function checkTileInteraction() {
  // Check items
  for (const item of GAME.items) {
    if (item.q === undefined) continue;
    if (STATE.playerQ === item.q && STATE.playerR === item.r) {
      if (item.id === 'spacecraft') {
        STATE.reachedSpacecraft = true;
        const notebooks = STATE.inventory.filter(i => i.type === 'collectible').length;
        const total = GAME.items.filter(i => i.type === 'collectible').length;
        if (notebooks >= total) {
          STATE.victory = true;
          showDialog('🛸 SYSTEM', GAME.plot.onVictory);
        } else {
          showDialog('🛸 Spacecraft', `The spacecraft hums expectantly.\n\nIt needs ${total - notebooks} more ${total-notebooks===1?'notebook':'notebooks'}.\n\n"${GAME.plot.onSpacecraftArrive}"`);
        }
        return;
      }
      if (!STATE.inventory.some(i => i.id === item.id)) {
        STATE.inventory.push({ ...item });
        if (item.quote) STATE.collectedQuotes.push(item.quote);
        
        const notebookCount = STATE.inventory.filter(i => i.type === 'collectible').length;
        const totalBooks = GAME.items.filter(i => i.type === 'collectible').length;
        
        if (item.type === 'collectible') {
          const msg = notebookCount === totalBooks ? GAME.plot.onAllNotebooks : GAME.plot.onFirstNotebook.replace('{quote}', item.quote || '');
          showMessage(`Found: ${item.name}! (${notebookCount}/${totalBooks})`, item.color, 180);
          setTimeout(() => showDialog('📓 Black Notebook', `${item.desc}\n\n"${item.quote}"`), 500);
        } else if (item.id === 'sword') {
          showMessage(GAME.plot.onSwordFound, '#c0c0c0', 180);
        } else {
          showMessage(`Found: ${item.name}!`, item.color, 150);
        }
        return;
      }
    }
  }

  // Check characters nearby
  for (const ch of GAME.characters) {
    if (hexDist({q:STATE.playerQ,r:STATE.playerR}, {q:ch.currentQ,r:ch.currentR}) <= 1) {
      // Don't auto-show, let E key handle it
      return;
    }
  }
}

function interact() {
  if (STATE.dialogActive) { hideDialog(); return; }
  if (STATE.gameOver || STATE.victory) return;

  // Check for spacecraft first
  for (const item of GAME.items) {
    if (item.q === undefined) continue;
    if (STATE.playerQ === item.q && STATE.playerR === item.r && item.id === 'spacecraft') {
      checkTileInteraction();
      return;
    }
  }

  // Check for characters
  for (const ch of GAME.characters) {
    if (hexDist({q:STATE.playerQ,r:STATE.playerR}, {q:ch.currentQ,r:ch.currentR}) <= 1) {
      const line = ch.dialogue[ch.dialogIndex % ch.dialogue.length];
      ch.dialogIndex++;
      showDialog(ch.name, line);
      return;
    }
  }

  // Check for uncollected items on this tile
  for (const item of GAME.items) {
    if (item.q === undefined) continue;
    if (STATE.playerQ === item.q && STATE.playerR === item.r && !STATE.inventory.some(i => i.id === item.id)) {
      checkTileInteraction();
      return;
    }
  }

  showMessage('Nothing here to interact with.', '#888', 80);
}

document.addEventListener('keydown', e => {
  if (!STATE.started) {
    STATE.started = true;
    startScreen.style.display = 'none';
    showMessage(GAME.plot.intro, GAME.palette.accent, 350);
    return;
  }

  if (KEY_MAP[e.code] !== undefined) {
    e.preventDefault();
    tryMove(KEY_MAP[e.code]);
  } else if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    interact();
  } else if (e.code === 'KeyM') {
    STATE.showMinimap = !STATE.showMinimap;
    mmCanvas.classList.toggle('show', STATE.showMinimap);
  } else if (e.code === 'KeyI') {
    STATE.showInventory = !STATE.showInventory;
    invPanel.classList.toggle('show', STATE.showInventory);
    if (STATE.showInventory) updateInventoryPanel();
  } else if (e.code === 'KeyG') {
    STATE.showGoals = !STATE.showGoals;
    document.getElementById('goalsPanel').style.display = STATE.showGoals ? 'block' : 'none';
    if (STATE.showGoals) updateGoalsPanel();
  } else if (e.code === 'KeyE') {
    // Talk to nearest character
    for (const ch of GAME.characters) {
      if (hexDist({q:STATE.playerQ,r:STATE.playerR}, {q:ch.currentQ,r:ch.currentR}) <= 1) {
        const line = ch.dialogue[ch.dialogIndex % ch.dialogue.length];
        ch.dialogIndex++;
        showDialog(ch.name, line);
        return;
      }
    }
  }
});

let lastTime = 0;

function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  // Clear
  ctx.fillStyle = GAME.palette.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (STATE.started && !STATE.gameOver && !STATE.victory) {
    STATE.playTime += dt;

    // Invincibility countdown
    if (STATE.invincibleTimer > 0) STATE.invincibleTimer--;

    // Message timer
    if (STATE.messageTimer > 0) {
      STATE.messageTimer--;
      if (STATE.messageTimer <= 0) msgEl.style.opacity = 0;
    }

    // Draw layers
    drawHexGrid(STATE.playerQ, STATE.playerR);
    drawAmbientEntities(STATE.playerQ, STATE.playerR, timestamp);
    drawItems(STATE.playerQ, STATE.playerR);
    drawCharacters(STATE.playerQ, STATE.playerR, timestamp);
    
    // Player drawn LAST (on top)
    const pc = hexToPixel(STATE.playerQ, STATE.playerR);
    const psc = hexToPixel(STATE.playerQ, STATE.playerR);
    drawPlayer(canvas.width/2, canvas.height/2, timestamp);

    // Update UI
    updateUI();
    if (STATE.showMinimap) drawMinimap();
  }

  requestAnimationFrame(gameLoop);
}

// ════════════════════════════════════════════════════════
//  SECTION 10: INITIALIZATION
// ════════════════════════════════════════════════════════

// Populate start screen info
document.getElementById('gameInfo').innerHTML = `
  Collect all <b>${GAME.items.filter(i=>i.type==='collectible').length}</b> ${GAME.items.find(i=>i.type==='collectible')?.name?.split(' ')[1] || 'items'}<br>
  Find the <b>${GAME.items.find(i=>i.id==='sword')?.name || 'special weapon'}</b><br>
  Bring them to the <b>${GAME.items.find(i=>i.id==='spacecraft')?.name || 'objective'}</b><br>
  <br>
  <span style="color:#666;font-size:12px;">
  ❤️ Health · ${GAME.economy.currencyIcon} ${GAME.economy.currencyName} · Inventory<br>
  NPCs · Dialogue · Goals · Infinite World
  </span>
`;

requestAnimationFrame(gameLoop);

</script>
