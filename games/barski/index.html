<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarski's World - Hex Edition</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; color: #c8d0e8; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 340px; background: #111827; border-right: 1px solid #1e2a42; display: flex; flex-direction: column; padding: 16px; overflow-y: auto; }
.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
h1 { font-size: 18px; margin-bottom: 12px; color: #7dd3fc; letter-spacing: 1px; text-transform: uppercase; }
.section { margin-bottom: 14px; }
.section label { display: block; font-size: 11px; color: #6b7aa1; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.btn { padding: 7px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s; }
.btn-primary { background: #3b82f6; color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-tool { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
.btn-tool:hover, .btn-tool.active { background: #334155; color: #fff; border-color: #3b82f6; }
.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }
textarea { width: 100%; height: 80px; background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; color: #e2e8f0; padding: 10px; font-family: 'Consolas', monospace; font-size: 13px; resize: vertical; }
#result { min-height: 28px; padding: 8px 10px; border-radius: 6px; font-size: 13px; font-weight: 600; margin-top: 6px; }
.result-true { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
.result-false { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.result-error { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
.sentence-list { max-height: 150px; overflow-y: auto; }
.sentence-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; background: #0f172a; border-radius: 4px; margin-bottom: 4px; font-size: 12px; font-family: 'Consolas', monospace; }
.sentence-item .status { font-weight: bold; min-width: 40px; }
.sentence-item .del-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; }
.shape-select select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 6px 8px; border-radius: 4px; font-size: 12px; }
.size-select select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 6px 8px; border-radius: 4px; font-size: 12px; }
canvas { cursor: crosshair; }
.help-text { font-size: 10px; color: #475569; line-height: 1.5; margin-top: 8px; }
</style>
</head>
<body>
<div class="sidebar">
<h1>⬡ Tarski's Hex World</h1>
<div class="section toolbar">
<button class="btn btn-tool active" id="toolPlace" onclick="setTool('place')">Place ▸</button>
<button class="btn btn-tool" id="toolMove" onclick="setTool('move')">Move ✋</button>
<button class="btn btn-tool" id="toolDelete" onclick="setTool('delete')">Delete ✕</button>
<button class="btn btn-danger" onclick="clearWorld()">Clear All</button>
<button class="btn btn-primary" onclick="randomWorld()">Random 🎲</button>
</div>
<div class="section shape-select">
<label>Shape:</label>
<select id="shapeSelect" onchange="updateCurrentShape()">
<option value="tet">Tetrahedron (▲)</option>
<option value="cube">Cube (■)</option>
<option value="dodec">Dodecahedron (⬟)</option>
</select>
</div>
<div class="section size-select">
<label>Size:</label>
<select id="sizeSelect">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>
</div>
<div class="section">
<label>First-Order Logic Sentence:</label>
<textarea id="sentenceInput" placeholder="∀x (Cube(x) → Small(x))"></textarea>
<button class="btn btn-primary" style="width:100%;margin-top:6px;" onclick="evaluateSentence()">Evaluate ✓</button>
<div id="result"></div>
</div>
<div class="section">
<button class="btn btn-tool" style="width:100%" onclick="addSentence()">+ Add to List</button>
<button class="btn btn-tool" style="width:100%;margin-top:4px;" onclick="evaluateAll()">Evaluate All</button>
<div class="sentence-list" id="sentenceList"></div>
</div>
<div class="help-text">
<b>Predicates:</b> Tet(x), Cube(x), Dodec(x)<br>
<b>Size:</b> Small(x), Medium(x), Large(x)<br>
<b>Relations:</b> SameRow(x,y), Adjacent(x,y), Near(x,y), LeftOf(x,y), RightOf(x,y)<br>
<b>Quantifiers:</b> ∀x ∃x | <b>Connectives:</b> ∧ ∨ → ↔ ¬
</div>
</div>
<div class="main">
<canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let hexRadius = 38;
let gridCols = 7, gridRows = 7;
let world = {};
let currentTool = 'place';
let currentShape = 'tet';
let currentSize = 'small';
let sentences = [];
let hoveredHex = null;
let animFrame = 0;

function resize() {
    const main = document.querySelector('.main');
    canvas.width = main.clientWidth;
    canvas.height = main.clientHeight;
    draw();
}
window.addEventListener('resize', resize);

function hexToPixel(q, r) {
    const x = hexRadius * 1.5 * q;
    const y = hexRadius * Math.sqrt(3) * (r + q / 2);
    return { x: x + canvas.width / 2 - (gridCols * hexRadius * 0.75), y: y + canvas.height / 2 - (gridRows * hexRadius * 0.85) };
}

function pixelToHex(px, py) {
    const ox = px - canvas.width / 2 + gridCols * hexRadius * 0.75;
    const oy = py - canvas.height / 2 + gridRows * hexRadius * 0.85;
    const q = (2/3 * ox) / hexRadius;
    const r = (-1/3 * ox + Math.sqrt(3)/3 * oy) / hexRadius;
    return hexRound(q, r);
}

function hexRound(q, r) {
    let s = -q - r;
    let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
    let dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
    if (dq > dr && dq > ds) rq = -rr - rs;
    else if (dr > ds) rr = -rq - rs;
    else rs = -rq - rr;
    return { q: rq, r: rr };
}

function drawHex(cx, cy, r, fill, stroke, lw) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 180 * (60 * i - 30);
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1.5; ctx.stroke(); }
}

const shapeColors = {
    tet: { small: '#60a5fa', medium: '#3b82f6', large: '#2563eb' },
    cube: { small: '#4ade80', medium: '#22c55e', large: '#16a34a' },
    dodec: { small: '#f472b6', medium: '#ec4899', large: '#db2777' }
};

function drawShape(cx, cy, shape, size, alpha) {
    const sizes = { small: 12, medium: 20, large: 30 };
    const sz = sizes[size];
    const col = shapeColors[shape][size];
    ctx.globalAlpha = alpha !== undefined ? alpha : 1;
    
    if (shape === 'tet') {
        ctx.beginPath();
        ctx.moveTo(cx, cy - sz);
        ctx.lineTo(cx - sz * 0.86, cy + sz * 0.5);
        ctx.lineTo(cx + sz * 0.86, cy + sz * 0.5);
        ctx.closePath();
        ctx.fillStyle = col; ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    } else if (shape === 'cube') {
        ctx.fillStyle = col; ctx.fillRect(cx - sz * 0.75, cy - sz * 0.75, sz * 1.5, sz * 1.5);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.strokeRect(cx - sz * 0.75, cy - sz * 0.75, sz * 1.5, sz * 1.5);
    } else if (shape === 'dodec') {
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
            const a = Math.PI / 180 * (i * 36 - 90);
            const x = cx + sz * Math.cos(a), y = cy + sz * Math.sin(a);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = col; ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function getNeighbors(q, r) {
    return [
        [q+1,r], [q-1,r], [q,r+1], [q,r-1], [q+1,r-1], [q-1,r+1]
    ];
}

function isAdjacent(a, b) {
    const n = getNeighbors(a.q, a.r);
    return n.some(n => n[0] === b.q && n[1] === b.r);
}

function isNear(a, b) {
    const n = getNeighbors(a.q, a.r);
    n.push([a.q, a.r]);
    return n.some(n => n[0] === b.q && n[1] === b.r);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    animFrame++;
    
    for (let r = -gridRows; r <= gridRows; r++) {
        for (let q = -gridCols; q <= gridCols; q++) {
            if (Math.abs(q + r) > Math.max(gridCols, gridRows)) continue;
            const pos = hexToPixel(q, r);
            const key = `${q},${r}`;
            const isHovered = hoveredHex && hoveredHex.q === q && hoveredHex.r === r;
            
            let fill = isHovered ? '#1e293b' : '#0f172a';
            let stroke = isHovered ? '#3b82f6' : '#1e293b';
            drawHex(pos.x, pos.y, hexRadius - 2, fill, stroke, isHovered ? 2 : 1);
            
            if (world[key]) {
                const obj = world[key];
                const bob = Math.sin(animFrame * 0.04 + q * 0.5 + r * 0.3) * 2;
                drawShape(pos.x, pos.y + bob, obj.shape, obj.size);
            }
        }
    }
}

function setTool(t) {
    currentTool = t;
    document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
    document.getElementById('tool' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
}

function updateCurrentShape() {
    currentShape = document.getElementById('shapeSelect').value;
}

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    hoveredHex = pixelToHex(e.clientX - rect.left, e.clientY - rect.top);
    draw();
});

canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const hex = pixelToHex(e.clientX - rect.left, e.clientY - rect.top);
    const key = `${hex.q},${hex.r}`;
    
    if (currentTool === 'place') {
        world[key] = { shape: currentShape, size: document.getElementById('sizeSelect').value };
    } else if (currentTool === 'move') {
        // simplified move: just delete from here
    } else if (currentTool === 'delete') {
        delete world[key];
    }
    draw();
});

function clearWorld() { world = {}; draw(); }

function randomWorld() {
    world = {};
    const shapes = ['tet', 'cube', 'dodec'];
    const sizes = ['small', 'medium', 'large'];
    const count = 5 + Math.floor(Math.random() * 8);
    for (let i = 0; i < count; i++) {
        const q = -gridCols + Math.floor(Math.random() * (gridCols * 2));
        const r = -gridRows + Math.floor(Math.random() * (gridRows * 2));
        if (Math.abs(q + r) <= Math.max(gridCols, gridRows)) {
            world[`${q},${r}`] = { shape: shapes[Math.floor(Math.random()*3)], size: sizes[Math.floor(Math.random()*3)] };
        }
    }
    draw();
}

// ===== LOGIC EVALUATOR =====

function tokenize(expr) {
    expr = expr.replace(/\s+/g, '');
    const tokens = [];
    let i = 0;
    while (i < expr.length) {
        if ('∀∃∧∨→↔¬'.includes(expr[i])) { tokens.push({type:'op', val:expr[i]}); i++; }
        else if (expr[i] === '(') { tokens.push({type:'lp'}); i++; }
        else if (expr[i] === ')') { tokens.push({type:'rp'}); i++; }
        else if (/[a-z]/i.test(expr[i])) {
            let word = '';
            while (i < expr.length && /[a-z]/i.test(expr[i])) { word += expr[i]; i++; }
            tokens.push({type:'word', val:word});
        } else i++;
    }
    return tokens;
}

class Parser {
    constructor(tokens) { this.tokens = tokens; this.pos = 0; }
    peek() { return this.tokens[this.pos]; }
    consume() { return this.tokens[this.pos++]; }
    parse() { return this.parseImp(); }
    parseImp() {
        let left = this.parseOr();
        while (this.peek() && (this.peek().val === '→' || this.peek().val === '↔')) {
            const op = this.consume().val;
            const right = this.parseOr();
            left = op === '→' ? { type: 'implies', left, right } : { type: 'iff', left, right };
        }
        return left;
    }
    parseOr() {
        let left = this.parseAnd();
        while (this.peek() && this.peek().val === '∨') {
            this.consume(); left = { type: 'or', left, right: this.parseAnd() };
        }
        return left;
    }
    parseAnd() {
        let left = this.parseUnary();
        while (this.peek() && this.peek().val === '∧') {
            this.consume(); left = { type: 'and', left, right: this.parseUnary() };
        }
        return left;
    }
    parseUnary() {
        if (this.peek() && this.peek().val === '¬') {
            this.consume(); return { type: 'not', child: this.parseUnary() };
        }
        return this.parseQuantifier();
    }
    parseQuantifier() {
        if (this.peek() && (this.peek().val === '∀' || this.peek().val === '∃')) {
            const q = this.consume().val;
            const varName = this.consume().val;
            return { type: 'quant', quant: q, var: varName, body: this.parseQuantifier() };
        }
        return this.parseAtom();
    }
    parseAtom() {
        if (this.peek() && this.peek().type === 'lp') {
            this.consume();
            const inner = this.parseImp();
            if (this.peek() && this.peek().type === 'rp') this.consume();
            return inner;
        }
        const w = this.consume().val;
        if (this.peek() && this.peek().type === 'lp') {
            this.consume();
            const args = [];
            if (!(this.peek() && this.peek().type === 'rp')) {
                args.push(this.consume().val);
                while (this.peek() && this.peek().val === ',') { this.consume(); args.push(this.consume().val); }
            }
            if (this.peek() && this.peek().type === 'rp') this.consume();
            return { type: 'pred', name: w, args };
        }
        return { type: 'var', name: w };
    }
}

function evaluate(node, assignment) {
    if (!node) return true;
    switch (node.type) {
        case 'and': return evaluate(node.left, assignment) && evaluate(node.right, assignment);
        case 'or': return evaluate(node.left, assignment) || evaluate(node.right, assignment);
        case 'not': return !evaluate(node.child, assignment);
        case 'implies': return !evaluate(node.left, assignment) || evaluate(node.right, assignment);
        case 'iff': return evaluate(node.left, assignment) === evaluate(node.right, assignment);
        case 'quant': {
            const objects = Object.keys(world).map(k => {
                const [q, r] = k.split(',').map(Number);
                return { q, r, ...world[k] };
            });
            if (node.quant === '∀') {
                return objects.every(obj => {
                    const newAssign = {...assignment, [node.var]: obj};
                    return evaluate(node.body, newAssign);
                });
            } else {
                return objects.some(obj => {
                    const newAssign = {...assignment, [node.var]: obj};
                    return evaluate(node.body, newAssign);
                });
            }
        }
        case 'pred': {
            const args = node.args.map(a => assignment[a]);
            const predName = node.name.toLowerCase();
            if (args.length === 1) {
                const o = args[0];
                if (!o) return false;
                switch(predName) {
                    case 'tet': return o.shape === 'tet';
                    case 'cube': return o.shape === 'cube';
                    case 'dodec': return o.shape === 'dodec';
                    case 'small': return o.size === 'small';
                    case 'medium': return o.size === 'medium';
                    case 'large': return o.size === 'large';
                }
            } else if (args.length === 2) {
                const a = args[0], b = args[1];
                if (!a || !b) return false;
                switch(predName) {
                    case 'samerow': return a.r === b.r;
                    case 'adjacent': return isAdjacent(a, b);
                    case 'near': return isNear(a, b);
                    case 'leftof': return a.q < b.q;
                    case 'rightof': return a.q > b.q;
                }
            }
            return false;
        }
        default: return true;
    }
}

function evaluateSentence() {
    const input = document.getElementById('sentenceInput').value.trim();
    const resultEl = document.getElementById('result');
    if (!input) { resultEl.className = 'result-error'; resultEl.textContent = 'Enter a sentence'; return; }
    try {
        const tokens = tokenize(input);
        const parser = new Parser(tokens);
        const ast = parser.parse();
        const result = evaluate(ast, {});
        resultEl.className = result ? 'result-true' : 'result-false';
        resultEl.textContent = result ? '✓ TRUE' : '✗ FALSE';
    } catch(e) {
        resultEl.className = 'result-error';
        resultEl.textContent = '✗ Error: ' + e.message;
    }
}

function addSentence() {
    const input = document.getElementById('sentenceInput').value.trim();
    if (!input) return;
    sentences.push(input);
    renderSentences();
}

function removeSentence(i) { sentences.splice(i, 1); renderSentences(); }

function renderSentences() {
    const el = document.getElementById('sentenceList');
    el.innerHTML = '';
    sentences.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'sentence-item';
        div.innerHTML = `<span>${escapeHtml(s)}</span><button class="del-btn" onclick="removeSentence(${i})">✕</button>`;
        el.appendChild(div);
    });
}

function evaluateAll() {
    const results = sentences.map(s => {
        try {
            const tokens = tokenize(s);
            const ast = new Parser(tokens).parse();
            return { sentence: s, result: evaluate(ast, {}), error: null };
        } catch(e) { return { sentence: s, result: null, error: e.message }; }
    });
    renderSentencesWithResults(results);
}

function renderSentencesWithResults(results) {
    const el = document.getElementById('sentenceList');
    el.innerHTML = '';
    results.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = 'sentence-item';
        let statusHtml;
        if (r.error) statusHtml = `<span class="status" style="color:#fbbf24">ERR</span>`;
        else statusHtml = `<span class="status" style="color:${r.result ? '#4ade80':'#f87171'}">${r.result ? 'T' : 'F'}</span>`;
        div.innerHTML = `${statusHtml}<span>${escapeHtml(r.sentence)}</span><button class="del-btn" onclick="removeSentence(${i})">✕</button>`;
        el.appendChild(div);
    });
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Animate
function animate() { draw(); requestAnimationFrame(animate); }
resize();
animate();
randomWorld();
</script>
</body>
</html>
