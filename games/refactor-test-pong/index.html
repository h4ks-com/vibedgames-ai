<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pong</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#fff;overflow:hidden}
canvas{border:2px solid #fff;border-radius:4px}
p{margin-top:12px;font-size:13px;opacity:.6}
</style>
</head>
<body>
<canvas id="c" width="600" height="400"></canvas>
<p>W/S or ↑/↓ to move · SPACE to start</p>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=cv.width,H=cv.height;
let p1y=H/2-40,p2y=H/2-40,pw=10,ph=80;
let bx=W/2,by=H/2,bvx=4,bvy=3;
let s1=0,s2=0,running=false,keys={};
const PH=6,PS=5;

document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){running=true;reset()}});
document.addEventListener('keyup',e=>keys[e.key]=false);

function reset(){bx=W/2;by=H/2;bvx=(Math.random()>.5?1:-1)*4;bvy=(Math.random()-.5)*6}

function update(){
  if(!running)return;
  if(keys['w']||keys['W'])p1y=Math.max(0,p1y-PS);
  if(keys['s']||keys['S'])p1y=Math.min(H-ph,p1y+PS);
  if(keys['ArrowUp'])p2y=Math.max(0,p2y-PS);
  if(keys['ArrowDown'])p2y=Math.min(H-ph,p2y+PS);
  bx+=bvx;by+=bvy;
  if(by<=0||by>=H)bvy=-bvy;
  if(bx<=pw+PH&&by>=p1y&&by<=p1y+ph){bvx=Math.abs(bvx);bvy+=(by-(p1y+ph/2))*.1}
  if(bx>=W-pw-PH&&by>=p2y&&by<=p2y+ph){bvx=-Math.abs(bvx);bvy+=(by-(p2y+ph/2))*.1}
  if(bx<0){s2++;reset()}
  if(bx>W){s1++;reset()}
}

function draw(){
  cx.fillStyle='#111';cx.fillRect(0,0,W,H);
  cx.setLineDash([6,8]);cx.strokeStyle='#444';cx.beginPath();cx.moveTo(W/2,0);cx.lineTo(W/2,H);cx.stroke();cx.setLineDash([]);
  cx.fillStyle='#fff';cx.fillRect(PH,p1y,pw,ph);cx.fillRect(W-PH-pw,p2y,pw,ph);
  cx.beginPath();cx.arc(bx,by,6,0,Math.PI*2);cx.fill();
  cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText(s1,W/2-60,60);cx.fillText(s2,W/2+60,60);
  if(!running){cx.font='16px monospace';cx.fillText('Press SPACE',W/2,H/2)}
}

(function loop(){update();draw();requestAnimationFrame(loop)})();
</script>
</body>
</html>
