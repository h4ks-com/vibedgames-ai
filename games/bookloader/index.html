<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Digital Book - Page Flip (Fixed Effect)</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  :root{
    --page-width: 441px;
    --page-height: 623px;
    --spine-width: 14px;
    --book-width: calc((var(--page-width) * 2) + var(--spine-width));
    --book-height: calc(var(--page-height) + 40px);
    --page-bg: #f7ecd6; /* parchment */
    --paper-edge: #e9e3d2;
    --shadow: rgba(0,0,0,0.25);
    --text-color: #5b3a21; /* dark brown */
  }

  html,body{
    height:100%;
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(180deg,#eef4fb 0%, #ffffff 100%);
    font-family: Arial, Helvetica, sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  .container{
    width:calc(var(--book-width) + 60px);
    padding:18px;
    box-sizing:border-box;
  }

  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:12px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
  }
  .toolbar input[type="text"]{
    width:560px;
    max-width:60%;
    padding:8px 10px;
    border-radius:6px;
    border:1px solid rgba(0,0,0,0.12);
    font-size:14px;
  }
  .toolbar label{ font-size:13px; color:#333; }
  .toolbar button{
    padding:8px 12px;
    border-radius:6px;
    border:1px solid rgba(0,0,0,0.12);
    background:#fff;
    cursor:pointer;
  }
  .status{
    text-align:center;
    color:#444;
    font-size:13px;
    margin-bottom:12px;
    min-height:18px;
  }

  .stage{
    width:100%;
    box-sizing:border-box;
  }

  .book{
    width:var(--book-width);
    height:var(--book-height);
    margin:0 auto;
    position:relative;
    perspective:1400px;
    transform-style:preserve-3d;
    user-select:none;
  }

  .book::before{
    content:"";
    position:absolute;
    left:50%;
    top:20px;
    bottom:20px;
    width:var(--spine-width);
    transform:translateX(-50%);
    background: linear-gradient(90deg, rgba(0,0,0,0.06), rgba(255,255,255,0.02));
    border-radius:6px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.02);
    z-index:1;
    pointer-events:none;
  }

  .page{
    position:absolute;
    top:20px;
    width:var(--page-width);
    height:var(--page-height);
    background:var(--page-bg);
    box-shadow: 0 8px 22px var(--shadow);
    border-radius:4px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    box-sizing:border-box;
    padding:22px 26px 44px 26px;
    -webkit-user-select:text;
    user-select:text;
  }

  .page.left{
    left:0;
    transform-origin: left center;
    border-right:1px solid var(--paper-edge);
    z-index:0;
  }
  .page.right{
    right:0;
    transform-origin: right center;
    border-left:1px solid var(--paper-edge);
    z-index:0;
  }

  .content{
    color:var(--text-color);
    font-size:12px;
    line-height:1.45;
    font-family: Arial, Helvetica, sans-serif;
    white-space:pre-wrap;
    word-break:break-word;
    overflow:auto;
    height:calc(100% - 28px);
    padding-right:6px;
    outline:none;
    -webkit-user-select:text;
    user-select:text;
    cursor:text;
  }

  .content ::selection{ background: #d6c6a3; color: #000; }
  .content::-moz-selection{ background: #d6c6a3; color: #000; }

  .page-number{
    position:absolute;
    bottom:10px;
    right:12px;
    font-size:12px;
    color:#6b6b6b;
    pointer-events:none;
  }
  .page.left .page-number{
    right:auto;
    left:12px;
  }

  .controls{
    margin-top:14px;
    display:flex;
    justify-content:center;
    gap:12px;
  }
  .controls button{
    padding:10px 14px;
    border-radius:6px;
    border:1px solid rgba(0,0,0,0.08);
    background:#fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    cursor:pointer;
    font-size:14px;
  }
  .controls button[disabled]{ opacity:0.5; cursor:default; }

  /* flipper must not intercept pointer events and must be positioned inside .book so perspective applies */
  .flipper{
    position:absolute;
    top:20px;
    width:var(--page-width);
    height:var(--page-height);
    transform-style:preserve-3d;
    perspective:1400px;
    z-index:999;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    border-radius:4px;
    overflow:visible;
    background:var(--page-bg);
    -webkit-user-select:text;
    user-select:text;
    pointer-events:none;
    will-change: transform;
  }
  .flipper .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    transform-style:preserve-3d;
    background:var(--page-bg);
    border-radius:4px;
    box-sizing:border-box;
    padding:22px 26px 44px 26px;
    display:flex;
    flex-direction:column;
  }
  .flipper .face .content{
    height:calc(100% - 28px);
    overflow:auto;
    word-break:break-word;
    font-family: Arial, Helvetica, sans-serif;
    font-size:12px;
    color:var(--text-color);
    white-space:pre-wrap;
    -webkit-user-select:text;
    user-select:text;
    pointer-events:auto; /* allow selecting content on flipper faces during animation if needed */
  }
  .flipper .back{
    transform:rotateY(180deg);
  }

  .flipping{
    transition: transform 700ms cubic-bezier(.2,.9,.3,1);
  }

  .page::after{
    content:"";
    position:absolute;
    inset:auto -18px auto auto;
    width:16px;
    height:100%;
    background:linear-gradient(90deg, rgba(0,0,0,0.02), rgba(255,255,255,0.03));
    pointer-events:none;
  }
  .page.left::after{ left:auto; right:-18px; transform:rotateY(180deg); }

  .click-zone{
    position:absolute;
    top:0;
    bottom:0;
    width:50%;
    z-index:20;
  }
  .click-zone.left{ left:0; }
  .click-zone.right{ right:0; }

  @media (max-width:820px){
    .toolbar input[type="text"]{ width:48%; }
    :root{
      --page-width: 300px;
      --page-height: 420px;
      --book-width: calc((var(--page-width) * 2) + var(--spine-width));
      --book-height: calc(var(--page-height) + 40px);
    }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <input id="urlInput" type="text" placeholder="Enter website or Wikipedia URL (e.g. https://en.wikipedia.org/wiki/JavaScript)"/>
      <label><input id="useProxy" type="checkbox"/> use CORS proxy if needed</label>
      <button id="loadBtn">Load URL</button>
      <button id="clearBtn">Clear</button>
    </div>
    <div class="status" id="status"></div>

    <div class="stage">
      <div class="book" id="book">
        <div class="page left" id="leftPage">
          <div class="content" id="leftContent" tabindex="0"></div>
          <div class="page-number" id="leftNumber"></div>
        </div>
        <div class="page right" id="rightPage">
          <div class="content" id="rightContent" tabindex="0"></div>
          <div class="page-number" id="rightNumber"></div>
        </div>

        <div class="click-zone left" id="clickLeft" title="Previous"></div>
        <div class="click-zone right" id="clickRight" title="Next"></div>
      </div>

      <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
      </div>
    </div>
  </div>

<script>
(function(){
  const statusEl = document.getElementById('status');
  const urlInput = document.getElementById('urlInput');
  const loadBtn = document.getElementById('loadBtn');
  const clearBtn = document.getElementById('clearBtn');
  const useProxy = document.getElementById('useProxy');

  const leftContent = document.getElementById('leftContent');
  const rightContent = document.getElementById('rightContent');
  const leftNumber = document.getElementById('leftNumber');
  const rightNumber = document.getElementById('rightNumber');
  const book = document.getElementById('book');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const clickLeft = document.getElementById('clickLeft');
  const clickRight = document.getElementById('clickRight');
  const leftPageEl = document.getElementById('leftPage');

  let pages = [];
  let currentRight = 1;
  let animating = false;

  function setStatus(text, isError){
    statusEl.textContent = text || '';
    statusEl.style.color = isError ? '#b33' : '#333';
  }

  function splitIntoPages(text){
    let cleaned = text.replace(/\r\n/g,'\n').replace(/\t/g,' ').replace(/[ \u00A0]{2,}/g,' ');
    let idx = 0;
    const minSize = 900;
    const maxSize = 1000;
    const out = [];
    while(idx < cleaned.length){
      let remaining = cleaned.length - idx;
      if(remaining <= maxSize){
        out.push(cleaned.slice(idx).trim());
        break;
      }
      const size = Math.floor(Math.random()*(maxSize-minSize+1))+minSize;
      let cut = idx + size;
      let forwardLimit = Math.min(cleaned.length, cut + 80);
      let found = -1;
      for(let j=cut; j<forwardLimit; j++){
        if(/\s/.test(cleaned[j])){ found = j; break; }
      }
      if(found === -1){
        let backwardLimit = Math.max(idx + 200, cut - 80);
        for(let j=cut; j>backwardLimit; j--){
          if(/\s/.test(cleaned[j])){ found = j; break; }
        }
      }
      if(found && found > idx){
        out.push(cleaned.slice(idx, found).trim());
        idx = found + 1;
      } else {
        out.push(cleaned.slice(idx, cut).trim());
        idx = cut;
      }
    }
    return out.filter(Boolean);
  }

  function renderSpread(){
    const r = currentRight;
    const l = r - 1;
    if(r >=0 && r < pages.length){
      rightContent.textContent = pages[r];
      rightNumber.textContent = r;
    } else {
      rightContent.textContent = '';
      rightNumber.textContent = '';
    }
    if(l >=0 && l < pages.length){
      leftContent.textContent = pages[l];
      leftNumber.textContent = l;
      leftPageEl.style.visibility = 'visible';
    } else {
      leftContent.textContent = '';
      leftNumber.textContent = '';
      leftPageEl.style.visibility = 'hidden';
    }
    updateControls();
  }

  function updateControls(){
    prevBtn.disabled = animating || (currentRight <= 1);
    nextBtn.disabled = animating || (currentRight >= pages.length - 1);
  }

  function createFlipper(onLeftSide){
    const fl = document.createElement('div');
    fl.className = 'flipper';
    if(onLeftSide) fl.style.left = '0';
    else fl.style.right = '0';
    const front = document.createElement('div');
    front.className = 'face front';
    const fcontent = document.createElement('div');
    fcontent.className = 'content';
    front.appendChild(fcontent);

    const back = document.createElement('div');
    back.className = 'face back';
    const bcontent = document.createElement('div');
    bcontent.className = 'content';
    back.appendChild(bcontent);

    fl.appendChild(front);
    fl.appendChild(back);
    return {flipper:fl, frontContent:fcontent, backContent:bcontent};
  }

  function flipForward(){
    if(animating) return;
    if(currentRight >= pages.length - 1) return;
    animating = true;
    updateControls();

    const oldR = currentRight;
    const nextR = oldR + 2;
    currentRight = Math.min(nextR, pages.length - 1);
    renderSpread();

    const {flipper, frontContent, backContent} = createFlipper(false);
    frontContent.textContent = pages[oldR] || '';
    backContent.textContent = pages[oldR+1] || '';

    flipper.style.transformOrigin = "left center";
    flipper.style.transform = "rotateY(0deg)";
    // append to book so perspective applies and positioning aligns
    book.appendChild(flipper);
    // force reflow
    void flipper.offsetHeight;
    flipper.classList.add('flipping');
    requestAnimationFrame(()=> flipper.style.transform = "rotateY(-180deg)");

    flipper.addEventListener('transitionend', function onEnd(){
      flipper.removeEventListener('transitionend', onEnd);
      if(flipper.parentNode) flipper.parentNode.removeChild(flipper);
      animating = false;
      renderSpread();
    });
  }

  // For previous page: do the JS flip first, then update content after animation completes.
  function flipBackward(){
    if(animating) return;
    if(currentRight <= 1) return;
    animating = true;
    updateControls();

    const oldR = currentRight;
    const oldL = oldR - 1;
    const prevR = oldR - 2;

    const {flipper, frontContent, backContent} = createFlipper(true);
    frontContent.textContent = pages[oldL] || '';
    backContent.textContent = pages[oldR] || '';

    flipper.style.transformOrigin = "right center";
    flipper.style.transform = "rotateY(0deg)";
    book.appendChild(flipper);
    void flipper.offsetHeight;
    flipper.classList.add('flipping');
    requestAnimationFrame(()=> flipper.style.transform = "rotateY(180deg)");

    flipper.addEventListener('transitionend', function onEnd(){
      flipper.removeEventListener('transitionend', onEnd);
      if(flipper.parentNode) flipper.parentNode.removeChild(flipper);
      currentRight = Math.max(prevR, 1);
      animating = false;
      renderSpread();
    });
  }

  nextBtn.addEventListener('click', flipForward);
  prevBtn.addEventListener('click', flipBackward);
  clickRight.addEventListener('click', flipForward);
  clickLeft.addEventListener('click', flipBackward);

  document.addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowRight' || e.key === 'PageDown') flipForward();
    if(e.key === 'ArrowLeft' || e.key === 'PageUp') flipBackward();
  });

  let touchStartX = null;
  book.addEventListener('touchstart', (e)=>{
    if(e.touches && e.touches.length === 1) touchStartX = e.touches[0].clientX;
  }, {passive:true});
  book.addEventListener('touchend', (e)=>{
    if(!touchStartX) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 40){
      if(dx < 0) flipForward();
      else flipBackward();
    }
    touchStartX = null;
  });

  async function fetchWikipediaExtractFromUrl(url){
    try {
      const u = new URL(url);
      const hostname = u.hostname;
      const langMatch = hostname.match(/^([a-z\-]+)\.wikipedia\.org$/i);
      const apiHost = langMatch ? `${langMatch[1]}.wikipedia.org` : 'en.wikipedia.org';
      let title = null;
      const path = u.pathname || '';
      if(path.startsWith('/wiki/')){
        title = decodeURIComponent(path.replace('/wiki/',''));
      } else {
        const t = u.searchParams.get('title') || u.searchParams.get('page') || null;
        if(t) title = t;
      }
      if(!title){
        try {
          const r = await fetch(u.href, {mode:'cors'});
          if(r && r.ok){
            const html = await r.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const h1 = doc.querySelector('h1');
            if(h1 && h1.textContent) title = h1.textContent.trim().replace(/\s+/g,'_');
          }
        } catch(e){}
      }
      if(!title) throw new Error('Could not determine Wikipedia page title from URL.');
      const apiUrl = `https://${apiHost}/w/api.php?action=query&prop=extracts&explaintext=1&format=json&origin=*&titles=${encodeURIComponent(title)}`;
      const res = await fetch(apiUrl, {mode:'cors'});
      if(!res.ok) throw new Error('Wikipedia API fetch failed: ' + res.status);
      const j = await res.json();
      if(!j || !j.query || !j.query.pages) throw new Error('Unexpected Wikipedia API response.');
      const pagesObj = j.query.pages;
      const firstKey = Object.keys(pagesObj)[0];
      const pageData = pagesObj[firstKey];
      if(!pageData) throw new Error('No page data returned.');
      if(pageData.missing) throw new Error('Page not found on Wikipedia.');
      const extract = pageData.extract || '';
      return extract.trim();
    } catch(err){
      throw err;
    }
  }

  async function fetchUrlContent(url, useCorsFallback){
    setStatus('Loading...', false);
    try {
      if(/(^|\.)wikipedia\.org(\/|$)/i.test(url)){
        try{
          const txt = await fetchWikipediaExtractFromUrl(url);
          if(!txt || !txt.trim()) throw new Error('Empty extract from Wikipedia');
          return txt;
        } catch(werr){
          console.warn('Wikipedia API fetch failed, falling back to general fetch:', werr);
        }
      }
      let res;
      try {
        res = await fetch(url, {mode: 'cors'});
      } catch (err) {
        if(!useCorsFallback) throw err;
        const proxy = 'https://api.allorigins.win/raw?url=';
        res = await fetch(proxy + encodeURIComponent(url));
      }
      if(!res || !res.ok) {
        if(!useCorsFallback){
          const proxy = 'https://api.allorigins.win/raw?url=';
          res = await fetch(proxy + encodeURIComponent(url));
        }
        if(!res || !res.ok) throw new Error('Fetch failed: ' + (res ? res.status : 'no response'));
      }
      const text = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/html');
      doc.querySelectorAll('script,style,noscript,iframe').forEach(n => n.remove());
      const body = doc.body;
      if(!body) throw new Error('No body found');
      let extracted = body.innerText || body.textContent || '';
      if(extracted.trim().length < 200) extracted = doc.documentElement.textContent || extracted;
      return extracted.trim();
    } catch (err){
      throw err;
    }
  }

  async function loadUrl(){
    const raw = urlInput.value.trim();
    if(!raw){ setStatus('Please enter a URL', true); return; }
    let normalized = raw;
    if(!/^https?:\/\//i.test(normalized)) normalized = 'https://' + normalized;
    loadBtn.disabled = true;
    clearBtn.disabled = true;
    setStatus('Fetching content...', false);

    try {
      const text = await fetchUrlContent(normalized, useProxy.checked);
      if(!text || !text.trim()){
        setStatus('No textual content found.', true);
        pages = [];
        renderSpread();
        loadBtn.disabled = false;
        clearBtn.disabled = false;
        return;
      }
      pages = splitIntoPages(text);
      if(pages.length === 0){
        setStatus('No pages generated from content.', true);
        renderSpread();
      } else {
        if(pages.length === 1) currentRight = 0;
        else currentRight = 1;
        setStatus('Loaded ' + pages.length + ' pages.', false);
        renderSpread();
      }
    } catch (err){
      setStatus('Error loading URL: ' + (err && err.message ? err.message : String(err)), true);
      pages = [];
      renderSpread();
    } finally {
      loadBtn.disabled = false;
      clearBtn.disabled = false;
    }
  }

  function clearBook(){
    pages = [];
    currentRight = 1;
    leftContent.textContent = '';
    rightContent.textContent = '';
    leftNumber.textContent = '';
    rightNumber.textContent = '';
    setStatus('', false);
    renderSpread();
  }

  loadBtn.addEventListener('click', loadUrl);
  urlInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') loadUrl(); });
  clearBtn.addEventListener('click', clearBook);

  (function initPlaceholders(){
    const demoText = "This demo can fetch Wikipedia pages using the MediaWiki API (CORS-friendly). Enter a Wikipedia URL like https://en.wikipedia.org/wiki/JavaScript and click Load. ";
    let big = demoText.repeat(80);
    pages = splitIntoPages(big);
    if(pages.length === 1) currentRight = 0; else currentRight = 1;
    renderSpread();
  })();

})();
</script>
</body>
</html>
