<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: #eee; overflow: hidden; }
canvas { border: 2px solid #333; border-radius: 4px; cursor: none; }
#hud { display: flex; gap: 40px; margin-bottom: 10px; font-size: 18px; font-weight: 600; }
#hud span { color: #0ff; }
#msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 32px; font-weight: 700; color: #0f0; text-shadow: 0 0 20px #0f04; pointer-events: none; display: none; }
</style>
</head>
<body>
<div id="hud">
  <div>Score: <span id="scoreVal">0</span></div>
  <div>Lives: <span id="livesVal">3</span></div>
  <div>Level: <span id="levelVal">1</span></div>
</div>
<canvas id="c"></canvas>
<div id="msg"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = 720;
const H = canvas.height = 560;

const scoreEl = document.getElementById('scoreVal');
const livesEl = document.getElementById('livesVal');
const levelEl = document.getElementById('levelVal');
const msgEl = document.getElementById('msg');

// Paddle
const paddle = { w: 110, h: 14, x: W / 2 - 55, y: H - 30, speed: 8, color: '#0ff' };

// Ball
const ball = { r: 7, x: W / 2, y: H - 50, dx: 4.5, dy: -4.5, speed: 5, color: '#fff' };

// Bricks
const brickRows = 6, brickCols = 10, brickW = 64, brickH = 22, brickPad = 4, brickOffTop = 40, brickOffLeft = 24;
let bricks = [];

// State
let score = 0, lives = 3, level = 1, running = false, gameOver = false, won = false;
let animId;

const rowColors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db'];

function initBricks() {
  bricks = [];
  for (let r = 0; r < brickRows; r++) {
    for (let c = 0; c < brickCols; c++) {
      bricks.push({
        x: brickOffLeft + c * (brickW + brickPad),
        y: brickOffTop + r * (brickH + brickPad),
        w: brickW, h: brickH,
        color: rowColors[r % rowColors.length],
        alive: true,
        points: (brickRows - r) * 10
      });
    }
  }
}

function resetBall() {
  ball.x = W / 2;
  ball.y = H - 50;
  const angle = -Math.PI / 4 - Math.random() * Math.PI / 2; // -135 to -45 degrees
  const spd = ball.speed + (level - 1) * 0.5;
  ball.dx = spd * Math.cos(angle);
  ball.dy = spd * Math.sin(angle);
}

function resetGame() {
  score = 0; lives = 3; level = 1; gameOver = false; won = false;
  paddle.w = 110;
  ball.speed = 5;
  initBricks();
  resetBall();
  updateHUD();
  msgEl.style.display = 'none';
  if (!running) { running = true; loop(); }
}

function nextLevel() {
  level++;
  ball.speed += 0.5;
  paddle.w = Math.max(60, paddle.w - 8);
  initBricks();
  resetBall();
  updateHUD();
  showMsg('Level ' + level, 1200);
}

function showMsg(text, dur) {
  msgEl.textContent = text;
  msgEl.style.display = 'block';
  setTimeout(() => msgEl.style.display = 'none', dur);
}

function updateHUD() {
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  levelEl.textContent = level;
}

// Mouse control
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  paddle.x = (e.clientX - rect.left) * (W / rect.width) - paddle.w / 2;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
});

// Touch support
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  paddle.x = (e.touches[0].clientX - rect.left) * (W / rect.width) - paddle.w / 2;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
}, { passive: false });

canvas.addEventListener('click', () => {
  if (gameOver || won) resetGame();
});

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 3);
    ctx.fill();
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, b.h / 2 - 2);
  }

  // Paddle
  const pg = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  pg.addColorStop(0, '#0ff');
  pg.addColorStop(1, '#06b');
  ctx.fillStyle = pg;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
  ctx.fill();

  // Ball glow
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 15;
  ctx.fillStyle = ball.color;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function update() {
  if (gameOver || won) return;

  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall collisions
  if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
  if (ball.x + ball.r >= W) { ball.x = W - ball.r; ball.dx = -Math.abs(ball.dx); }
  if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

  // Bottom — lose life
  if (ball.y + ball.r >= H) {
    lives--;
    updateHUD();
    if (lives <= 0) {
      gameOver = true;
      msgEl.textContent = 'GAME OVER — Click to restart';
      msgEl.style.display = 'block';
      msgEl.style.color = '#e74c3c';
      return;
    }
    showMsg('Oops!', 800);
    resetBall();
    return;
  }

  // Paddle collision
  if (
    ball.dy > 0 &&
    ball.y + ball.r >= paddle.y &&
    ball.y + ball.r <= paddle.y + paddle.h + 6 &&
    ball.x >= paddle.x &&
    ball.x <= paddle.x + paddle.w
  ) {
    // Where on paddle (0..1) determines angle
    const hit = (ball.x - paddle.x) / paddle.w; // 0..1
    const angle = -Math.PI * (0.15 + hit * 0.7); // -27° to -153° mapped nicely
    const spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
    ball.dx = spd * Math.cos(-Math.PI / 2 + (hit - 0.5) * 1.2);
    ball.dy = -Math.abs(spd * Math.sin(-Math.PI / 2 + (hit - 0.5) * 1.2));
    ball.y = paddle.y - ball.r;
    // Normalize speed
    const cur = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
    const target = ball.speed + (level - 1) * 0.5;
    ball.dx = ball.dx / cur * target;
    ball.dy = ball.dy / cur * target;
  }

  // Brick collisions
  for (const b of bricks) {
    if (!b.alive) continue;
    if (
      ball.x + ball.r > b.x &&
      ball.x - ball.r < b.x + b.w &&
      ball.y + ball.r > b.y &&
      ball.y - ball.r < b.y + b.h
    ) {
      b.alive = false;
      score += b.points;
      updateHUD();

      // Determine side of collision
      const overlapLeft = (ball.x + ball.r) - b.x;
      const overlapRight = (b.x + b.w) - (ball.x - ball.r);
      const overlapTop = (ball.y + ball.r) - b.y;
      const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

      if (minOverlap === overlapTop || minOverlap === overlapBottom) {
        ball.dy = -ball.dy;
      } else {
        ball.dx = -ball.dx;
      }
      break;
    }
  }

  // Check win
  if (bricks.every(b => !b.alive)) {
    if (level >= 5) {
      won = true;
      msgEl.textContent = 'YOU WIN! Score: ' + score + ' — Click to restart';
      msgEl.style.display = 'block';
      msgEl.style.color = '#0f0';
    } else {
      nextLevel();
    }
  }
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// Start
initBricks();
resetBall();
showMsg('Click to start!', 2000);
running = true;
loop();

canvas.addEventListener('click', () => {
  if (!gameOver && !won) {
    msgEl.style.display = 'none';
  }
});
</script>
</body>
</html>
