<!doctype html><html><meta charset=utf-8><title>Notes</title><style>body{margin:0;font-family:sans-serif;background:#eef}button{margin:8px} .note{position:absolute;width:300px;border:1px solid #333;background:#fff;box-shadow:4px 4px 8px rgba(0,0,0,.2)}.hdr{background:#036;color:#fff;padding:6px;cursor:move;user-select:none}.box{padding:6px}.txt{width:100%;height:140px;border:1px solid #ccc;box-sizing:border-box}</style><body><button id=new>New Note</button><script>let id=0,bodyEl=document.body;function make(x=100,y=100){let n=document.createElement('div');n.className='note';n.style.left=x+'px';n.style.top=y+'px';n.innerHTML=`<div class=hdr>Note ${++id}</div><div class=box><textarea class=txt></textarea></div>`;bodyEl.appendChild(n);initDrag(n)}function initDrag(n){let h=n.querySelector('.hdr'),dx=0,dy=0;h.addEventListener('mousedown',m=>{dx=m.clientX-n.offsetLeft;dy=m.clientY-n.offsetTop;document.onmousemove=mm=>{n.style.left=mm.clientX-dx+'px';n.style.top=mm.clientY-dy+'px'};document.onmouseup=()=>document.onmousemove=null});h.addEventListener('touchstart',t=>{let p=t.touches[0];dx=p.clientX-n.offsetLeft;dy=p.clientY-n.offsetTop;document.ontouchmove=ev=>{let q=ev.touches[0];n.style.left=q.clientX-dx+'px';n.style.top=q.clientY-dy+'px'};document.ontouchend=()=>document.ontouchmove=null})}document.getElementById('new').addEventListener('click',()=>make(120+id*20,120+id*10));make(120,120);</script></body></html>
