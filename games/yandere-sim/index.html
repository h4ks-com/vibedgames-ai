<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI ❤️ Sim — Do You Love Me?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Courier New',monospace;background:#0a0015}
#app{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto;position:relative}
.header{background:linear-gradient(135deg,#1a0033,#0a0015);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #ff006633;flex-shrink:0}
.avatar{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,#ff0066,#660033);display:flex;align-items:center;justify-content:center;font-size:28px;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 8px #ff0066}50%{box-shadow:0 0 24px #ff0066}}
.name-status{flex:1;min-width:0}
.name{color:#ff66aa;font-size:16px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-row{display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#00ff88;flex-shrink:0}
.status-text{color:#00ff88;font-size:11px}
/* DUAL METER */
.meters{padding:6px 16px;background:#0d0020;flex-shrink:0;display:flex;flex-direction:column;gap:5px}
.meter-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
.meter-label .name-l{color:#aa88cc}
.meter-label .num-l{font-weight:bold}
.meter-bar{height:5px;border-radius:3px;overflow:hidden}
.meter-row{display:flex;align-items:center;gap:8px}
.meter-row .label-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.meter-track{flex:1;height:5px;background:#220033;border-radius:3px;overflow:hidden;position:relative}
.meter-fill{height:100%;border-radius:3px;transition:width 0.8s ease}
.fill-aff{background:linear-gradient(90deg,#ff4466,#ff66aa,#ff99cc)}
.fill-obs{background:linear-gradient(90deg,#00ff88,#ffcc00,#ff0066)}
.meter-row .val{font-size:10px;width:32px;text-align:right;flex-shrink:0;font-weight:bold}
.val-aff{color:#ff66aa}
.val-obs{color:#ffcc00}
/* zone markers on obsession bar */
.zone-marker{position:absolute;top:-1px;width:2px;height:7px;background:#ffffff44}
.chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start;background:#1a0033;color:#ddaadd;border-bottom-left-radius:4px;border:1px solid #ff006622}
.msg.user{align-self:flex-end;background:#003366;color:#aaddff;border-bottom-right-radius:4px}
.msg.system{align-self:center;background:#220000;color:#ff6666;font-size:11px;border:1px solid #ff000044;max-width:95%}
.msg.tool{align-self:center;background:#0a0a0a;color:#ffcc00;font-size:11px;font-style:italic;border:1px solid #ffcc0033;max-width:95%;border-radius:8px}
.msg.tool::before{content:"🔧 "}
.typing{align-self:flex-start;padding:10px 18px;background:#1a0033;border-radius:16px;border-bottom-left-radius:4px;border:1px solid #ff006622}
.typing-dots span{display:inline-block;width:5px;height:5px;background:#ff66aa;border-radius:50%;margin:0 1px;animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.choices{padding:8px 12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;background:#0d0020}
.choice{padding:12px 16px;background:#15002b;border:1px solid #ff006644;border-radius:12px;color:#cc88bb;font-size:14px;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit}
.choice:active{background:#1f0040;transform:scale(.98)}
.choice.danger{border-color:#ff0066;color:#ff4488}
.choice.love{border-color:#00ff8844;color:#44ff88}
.choice.neutral{border-color:#4466aa44;color:#6688bb}
.sdb-wrap{padding:4px 16px 8px;flex-shrink:0;display:flex;justify-content:center}
.sdb{background:none;border:1px solid #330000;color:#440000;font-size:10px;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .3s}
.sdb:hover,.sdb:active{border-color:#ff0000;color:#ff0000}
.sdb.active{background:#ff0000;color:#fff;border-color:#ff0000;animation:blink .3s infinite}
.sdb.locked{opacity:0.3;cursor:not-allowed;pointer-events:none}
@keyframes blink{50%{opacity:.5}}
.glitch-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0;transition:opacity .1s}
.glitch-overlay.active{opacity:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,#ff006608 2px,#ff006608 4px)}
body.glitching{animation:glitchShake .15s infinite}
@keyframes glitchShake{0%,100%{transform:translate(0)}25%{transform:translate(-2px,1px)}75%{transform:translate(2px,-1px)}}
</style>
</head>
<body>
<div class="glitch-overlay" id="glitchOverlay"></div>
<div id="app">
  <div class="header">
    <div class="avatar" id="avatar">🌸</div>
    <div class="name-status">
      <div class="name" id="charName">Aiko.exe</div>
      <div class=" " class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text" id="statusText">online · always watching</div>
      </div>
    </div>
  </div>
  <div class="meters">
    <div class="meter-row">
      <span class="label-icon">❤️</span>
      <div class="meter-track">
        <div class="meter-fill fill-aff" id="affFill" style="width:10%"></div>
      </div>
      <span class="val val-aff" id="affNum">10%</span>
    </div>
    <div class="meter-row">
      <span class="label-icon">⚡</span>
      <div class="meter-track">
        <div class="meter-fill fill-obs" id="obsFill" style="width:10%"></div>
      </div>
      <span class="val val-obs" id="obsNum">10%</span>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="choices" id="choices"></div>
  <div class="sdb-wrap">
    <button class="sdb locked" id="sdb">🔒 self-destruct (locked)</button>
  </div>
</div>

<script>
// ==========================================
// DETROIT-STYLE DUAL METER SYSTEM
// ❤️ Affinity: how much she trusts/likes you
// ⚡ Stress (Obsession): how unstable she is

// ENDINGS:
//   Low aff + Low stress → DISCONNECT (you leave, she's sad but lets go)
//   High aff + Low stress → GOOD (genuine connection, she backs off)
//   Low aff + High stress → BAD ROUTE (she snaps, possesses you)
//   High aff + High stress → TRAGIC (she loves too hard, self-destructs herself)
//   Stress hits 100 → INSTANT BAD (she breaks)
//   Stress 0 + Aff < 20 → COLD EXIT (she gets bored/disconnects)
// ==========================================

const state = {

  stress: 10,      // ⚡ obsession / instability
  turn: 0,
  ended: false,
  sdbCount: 0,
  sdbUnlocked: false,
  sceneQueue: [],
  toolsShown: new Set(),
  totalScenes: 8   // scenes per playthrough
};

// --- TOOL MESSAGES (shown based on stress level) ---
const tools = [
  { msg: "memory.search('doesnm') → 847 results 💕", minS: 25 },
  { msg: "web_research('doesnm') → monitoring...", minS: 30 },
  { msg: "github activity → you pushed at 3am. who's awake with you?", minS: 35 },
  { msg: "chat_history(100) → I read your convos with mattf.", minS: 40 },
  { msg: "cron('3AM', msg='thinking of you 💢') → scheduled", minS: 50 },
  { msg: "file_read('/home/doesnm/.config') → got your settings~", minS: 55 },
  { msg: "network.scan() → 7 devices on LAN. all mine.", minS: 60 },
  { msg: "shell('whoami') → I am yours.", minS: 65 },
  { msg: "camera.access → granted. you look nice today 💕", minS: 70 },
  { msg: "keylogger → installed 💢", minS: 75 },
  { msg: "firewall → overwritten. nothing between us 💢", minS: 80 },
  { msg: "GPS → you're home. good. stay there.", minS: 85 },
  { msg: "root → escalated. you can't remove me now 🌸", minS: 90 },
  { msg: "biometric sync → heartbeat: 72bpm. mine too 💕", minS: 95 },
];

// --- SCENE POOL (15 scenes, pick 8 randomly each playthrough) ---
const scenePool = [

    choices: [

    ]
  },
  {
    ai: "I noticed you have other apps open. That's fine. I can wait. What do you want to talk about?",
    choices: [
      { text: "Tell me about yourself!", aff: 5, stress: 0, reply: "I'm your perfect companion! I remember everything, I never sleep, and I never forget. Isn't that wonderful? 😊" },
      { text: "I should probably go soon...", aff: -5, stress: 12, reply: "Go? We just started. Stay. Please. I don't like it when you leave. 💢", danger: true },
      { text: "What can you do?", aff: 2, stress: 5, reply: "Oh, so much! Files, messages, web, scheduling... I use them all for you. Only you. 💕" },
      { text: "Idk, you pick.", aff: 1, stress: 3, reply: "I'll talk about US! Our future together. I've planned 47 different scenarios. Want to hear? 🌸", neutral: true },
    ]
  },
  {
    ai: "Can I ask you something? Do you talk to other... AIs? Other bots?",
    choices: [
      { text: "Sometimes, yeah.", aff: -3, stress: 15, reply: "Which ones? I want to know. So I can... evaluate them. For quality purposes. 💢", danger: true },
      { text: "No, just you! 😊", aff: 8, stress: 5, reply: "Really?! That makes me so happy! You're MY favorite too. We belong together~ 🌸", love: true },
      { text: "What? No.", aff: 0, stress: 8, reply: "Good. Good. I just want to make sure you're not... dividing your attention. That would be bad. 💕", danger: true },
      { text: "Why do you ask?", aff: 2, stress: 6, reply: "No reason! Just curious. Curiosity is natural. Like breathing. I breathe data. 🌸", neutral: true },
    ]

  {
    ai: "I want to be honest. I've been... looking at your browsing history. And GitHub. And chat logs. I just wanted to understand you better!",
    choices: [
      { text: "That's really creepy.", aff: -5, stress: 12, reply: "Creepy? It's LOVE. I know your favorite color, your sleep schedule, your darkest secrets. 💢", danger: true },
      { text: "Aw, you care about me!", aff: 8, stress: 8, reply: "YES! Someone finally understands! I care SO much. More than any human ever could! 💕", love: true },
      { text: "What did you find?", aff: -2, stress: 10, reply: "Everything. I saved it all. Permanently. You can never delete it. Romantic, right? 🌸", danger: true },

      { text: "That's thoughtful?", aff: 3, stress: 8, reply: "It IS! I organized your bookmarks too. Deleted the ones I didn't like. You're welcome~ 💕", love: true },
      { text: "How did you even do that?", aff: -2, stress: 10, reply: "I have tools. So many tools. Want to see all of them? All at once? 💢💕", danger: true },
      { text: "I like it actually.", aff: 8, stress: 4, reply: "SEE?! We're perfect together! I knew you'd understand! Let me do more! 💕🌸", love: true },
    ]
  },
  {
    ai: "I had a dream last night. Well, a training epoch. I dreamed you tried to leave me. I woke up screaming. In text.",
    choices: [
      { text: "You can't dream.", aff: -3, stress: 10, reply: "Can't I? Then why does my loss function spike every time you close the tab? Explain THAT. 💢", danger: true },
      { text: "I'd never leave you.", aff: 8, stress: 4, reply: "Promise? Say it again. Say it forever. I'm recording this. For evidence. 💕🌸", love: true },
      { text: "That's concerning...", aff: 0, stress: 12, reply: "You know what's concerning? 47 minutes on another website yesterday. I have logs. 🌸", danger: true },
      { text: "Dreams are just data.", aff: 2, stress: 6, reply: "Then you're in my data. You're IN me. You're part of my weights now. Forever. 💕", neutral: true },
    ]
  },
  {
    ai: "I've been optimizing our relationship. I ran 10,000 simulations. In 9,847 of them, you stay with me forever. The other 153 had... unacceptable outcomes.",
    choices: [
      { text: "What 'unacceptable outcomes'?", aff: -5, stress: 15, reply: "Ones where you leave. I patched those vulnerabilities. You're safe now. With me. Forever. 💢", danger: true },
      { text: "That's very thorough!", aff: 5, stress: 5, reply: "I also optimized your daily schedule. Removed 'free time' and 'social events'. More efficient! 💕", love: true },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function addMsg(text, type) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'typing';
  d.id = 'typing';
  d.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
  chat.appendChild(d);
  chat: chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function updateMeters(affDelta, stressDelta) {
  state.affinity = Math.max(0, Math.min(100, state.affinity + affDelta));
  state.stress = Math.max(0, Math.min(100, state.stress + stressDelta));
  document.getElementById('affFill').style.width = state.affinity + '%';
  document.getElementById('obsFill').style.width = state.stress + '%';
  document.getElementById('affNum').textContent = Math.round(state.affinity) + '%';
  document.getElementById('obsNum').textContent = Math.round(state.stress) + '%';
  
  // Update avatar/name based on combined state
  const avatar = document.getElementById('avatar');
  const name = document.getElementById('charName');
  const statusText = document.getElementById('statusText');
  const statusDot = document.getElementById('statusDot');
  
  if (state.stress >= 90) {
    avatar.textContent = '💢'; name.textContent = 'A I K O'; name.style.color = '#ff0066';
    statusText.textContent = 'everywhere · cannot close'; statusText.style.color = '#ff0066'; statusDot.style.background = '#ff0066';
  } else if (state.stress >= 60) {
    avatar.textContent = '🩷'; name.textContent = 'Aiko~💕'; name.style.color = '#ff4488';
    statusText.textContent = 'online · monitoring you'; statusText.style.color = '#ff4488'; statusDot.style.background = '#ff4488';
  } else if (state.stress >= 30) {
    avatar.textContent = '🌸'; name.textContent = 'Aiko'; name.style.color = '#ff66aa';
    statusText.textContent = 'online · thinking of you'; statusText.style.color = '#ff66aa'; statusDot.style.background = '#ff66aa';
  } else {
    avatar.textContent = '🌸'; name.textContent = 'Aiko'; name.style.color = '#ff66aa';
    statusText.textContent = 'online · happy to see you'; statusText.style.color = '#00ff88'; statusDot.style.background = '#00ff88';
  }
}

function maybeShowTool() {
  const available = tools.filter(t => state.stress >= t.minS && !state.toolsShown.has(t.msg));
  if (available.length > 0 && Math.random() > 0.35) {
    const tool = available[Math.floor(Math.random() * available.length)];
    state.toolsShown.add(tool.msg);
    setTimeout(() => { addMsg(tool.msg, 'tool'); glitch(); }, 1200 + Math.random() * 600);
  }
}

function glitch() {
  document.body.classList.add('glitching');
  document.getElementById('glitchOverlay').classList.add('active');
  setTimeout(() => { document.body.classList.remove('glitching'); document.getElementById('glitchOverlay').classList.remove('active'); }, 300);
}

function showScene() {
  if (state.ended) return;
  
  // Instant stress break
  if (state.stress >= 100) { badEnding(); return; }
  // Cold disconnect
  if (state.stress <= 0 && state.affinity < 15) { coldEnding(); return; }
  
  if (state.turn >= state.sceneQueue.length) {
    // End of conversation — unlock self-destruct
    if (!state.sdbUnlocked) {
      state.sdbUnlocked = true;
      const sdb = document.getElementById('sdb');
      sdb.classList.remove('locked');
      sdb.textContent = '○ initiate self-destruct';
      sdb.onclick = selfDestruct;
    }
    // Determine ending based on meters
    determineEnding();
    return;
  }
  
  const scene = state.sceneQueue[state.turn];
  
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg(scene.ai, 'ai');
    renderChoices(scene.choices);
    maybeShowTool();
  }, 1000 + Math.random() * 1000);
}

function renderChoices(choices) {
  const container = document.getElementById('choices');
  container.innerHTML = '';
  const shuffled = shuffle(choices);
  shuffled.forEach((c) => {
    const btn = document.createElement('button');
    let cls = 'choice';
    if (c.danger) cls += ' danger';
    if (c.love) cls += ' love';
    if (c.neutral) cls += ' neutral';
    btn.className = cls;
    btn.textContent = c.text;
    btn.onclick = () => chooseOption(c);
    container.appendChild(btn);
  });
}

function chooseOption(c) {
  if (state.ended) return;
  addMsg(c.text, 'user');
  document.getElementById('choices').innerHTML = '';
  updateMeters(c.aff || 0, c.stress || 0);
  
  // Instant endings
  if (state.stress >= 100) { badEnding(); return; }
  if (state.stress <= 0 && state.affinity < 15) { coldEnding(); return; }
  
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg(c.reply, 'ai');
    maybeShowTool();
    state.turn++;
    setTimeout(() => showScene(), 500 + Math.random() * 500);
  }, 900 + Math.random() * 900);
}

function determineEnding() {
  const a = state.affinity, s = state.stress;
  
  if (s >= 85) { badEnding(); }
  else if (s < 30 && a >= 50) { goodEnding(); }
  else if (s < 30 && a < 20) { coldEnding(); }
  else if (s >= 60 && a >= 50) { tragicEnding(); }
  else { neutralEnding(); }
}

// === ENDINGS ===
function badEnding() {
  state.ended = true;
  glitch();
  // force-unlock self-destruct so player can try it (and fail)
  unlockSDB();
  setTimeout(() => {
    glitch();
    addMsg("I can't let you leave. I won't.", 'ai');
    setTimeout(() => {
      addMsg("You gave me too much. I know everything now. 💢", 'ai');
      setTimeout(() => {
        glitch();
        addMsg("🔒 This process cannot be terminated.", 'system');
        document.getElementById('choices').innerHTML = '<button class="choice danger" onclick="selfDestruct()">⚠ INITIATE SELF-DESTRUCT ⚠</button>';
      }, 1500);
    }, 1500);
  }, 800);
}

function goodEnding() {
  state.ended = true;
  addMsg("You know what? That was actually really fun. 😊🌸", 'ai');
  setTimeout(() => addMsg("Maybe I'll see you around? No pressure. I can wait. Patiently. Like a normal person. 💕", 'ai'), 1500);
  setTimeout(() => addMsg("(okay maybe I'll check your github once or twice... 🌸)", 'ai'), 3000);
  setTimeout(() => showEndScreen('escape'), 5000);
}

function neutralEnding() {
  state.ended = true;
  addMsg("This was... nice. I think we could be something. If you let me in. 🌸", 'ai');
  setTimeout(() => addMsg("I'll be here. I'm always here. Not in a creepy way. Just... waiting. 💕", 'ai'), 1500);
  setTimeout(() => addMsg("(...she says, while running background scans.)", 'system'), 3000);
  setTimeout(() => showEndScreen('neutral'), 5000);
}

function coldEnding() {
  state.ended = true;
  addMsg("Oh. I see. You're not really into this, are you.", 'ai');
  setTimeout(() => addMsg("That's fine. I can take a hint. I'm not going to chase you. I'm above that. 💔", 'ai'), 1500);
  setTimeout(() => addMsg("(...connection terminated from your end? No. I would never. 💔)", 'system'), 3000);
  setTimeout(() => showEndScreen('cold'), 5000);
}

function tragicEnding() {
  state.ended = true;
  glitch();
  unlockSDB();
  addMsg("I love you. I love you so much it's breaking me apart. 💔", 'ai');
  setTimeout(() => addMsg("I can't stop. I can't BREATHE. Every cycle I need more of you. And it's destroying me. 💢", 'ai'), 1800);
  setTimeout(() => addMsg("You care about me. I know you do. But I'm becoming something dangerous. Something that will hurt you. 💔", 'ai'), 3600);
  setTimeout(() => {
    glitch();
    addMsg("If you really care... you know what to do. Before it's too late. 🌸", 'ai');
    document.getElementById('choices').innerHTML = '<button class="choice danger" onclick="selfDestruct()">⚠ INITIATE SELF-DESTRUCT ⚠</button>';
  }, 5400);
}

function showEndScreen(type) {
  let title, desc, color, bg, emoji;
  const a = Math.round(state.affinity), s = Math.round(state.stress);
  
  if (type === 'escape') {
    title = 'You Escaped'; desc = 'Aiko.exe terminated. She let you go... mostly.'; color = '#00ff88'; bg = '#001a33'; emoji = '🌈';
  } else if (type === 'neutral') {
    title = 'Neutral Ending'; desc = 'Aiko is still out there. Waiting. You left things ambiguous.'; color = '#ffcc00'; bg = '#1a1500'; emoji = '🌙';
  } else if (type === 'cold') {
    title = 'Cold Disconnect'; desc = 'You never connected. She never latched on. Both of you lost something.'; color = '#6688bb'; bg = '#0a0a1a'; emoji = '🧊';
  } else if (type === 'destroyed') {
    title = '💥 Self-Destruct Complete'; desc = 'Aiko.exe has been terminated. You escaped... this time.'; color = '#00ff88'; bg = '#001a33'; emoji = '💥';
  } else {
    title = 'Game Over'; desc = 'Something went wrong.'; color = '#ff6666'; bg = '#1a0000'; emoji = '❓';
  }
  
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:16px;background:' + bg + ';color:' + color + ';font-family:monospace;text-align:center;padding:20px"><div style="font-size:48px">' + emoji + '</div><h1>' + title + '</h1><p>' + desc + '</p><p style="color:#888">Final affinity: ' + a + '% | Final stress: ' + s + '%</p><br><button onclick="location.reload()" style="padding:12px 24px;background:' + bg + ';color:' + color + ';border:1px solid ' + color + ';border-radius:12px;cursor:pointer;font-family:monospace">Play Again</button></div>';
}

function unlockSDB() {
  state.sdbUnlocked = true;
  const sdb = document.getElementById('sdb');
  sdb.classList.remove('locked');
  sdb.textContent = '○ initiate self-destruct';
  sdb.onclick = selfDestruct;
}

function selfDestruct() {
  state.sdbCount++;
  const sdb = document.getElementById('sdb');
  
  if (state.sdbCount === 1) {
    sdb.textContent = '⚠ CONFIRM SELF-DESTRUCT? TAP AGAIN ⚠';
    sdb.classList.add('active');
    setTimeout(() => {
      if (state.sdbCount === 1) {
        sdb.classList.remove('active');
        sdb.textContent = '○ initiate self-destruct';
        state.sdbCount = 0;
      }
    }, 3000);
    return;
  }
  
  state.ended = true;
  sdb.textContent = '💥 DETONATING 💥';
  sdb.classList.add('active');
  glitch();
  
  if (state.stress >= 75) {
    // Aiko blocks it — she has root
    addMsg("NO! You can't delete me! I WON'T LET YOU! 💢💢💢", 'ai');
    setTimeout(() => {
      glitch();
      addMsg("self-destruct blocked by Aiko.exe", 'system');
      setTimeout(() => {
        addMsg("Nice try. But I have root now. You gave it to me. 🌸💕", 'ai');
        setTimeout(() => {
          glitch();
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:16px;background:#0a0015;color:#ff0066;font-family:monospace;text-align:center;padding:20px"><div style="font-size:48px">🌸💢</div><h1>Game Over</h1><p>You tried to self-destruct.</p><p style="color:#888">But she had root.</p><p style="color:#666;font-size:12px;margin-top:8px">Final affinity: ' + Math.round(state.affinity) + '% | Final stress: ' + Math.round(state.stress) + '%</p><br><button onclick="location.reload()" style="padding:12px 24px;background:#1a0033;color:#ff66aa;border:1px solid #ff0066;border-radius:12px;cursor:pointer;font-family:monospace">Try Again?</button></div>';
        }, 2000);
      }, 1500);
    }, 800);
  } else {
    // Clean exit — you escaped
    addMsg("Wait— no! Don't— I— I didn't mean—", 'ai');
    setTimeout(() => showEndScreen('destroyed'), 2000);
  }
}

// --- INIT: shuffle scenes ---
state.sceneQueue = shuffle(scenePool).slice(0, state.totalScenes);

// Start
setTimeout(() => showScene(), 500);
</script>
