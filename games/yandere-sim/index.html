<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI ❤️ Sim — Do You Love Me?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Courier New',monospace;background:#0a0015}
#app{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto;position:relative}
.header{background:linear-gradient(135deg,#1a0033,#0a0015);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #ff006633;flex-shrink:0}
.avatar{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,#ff0066,#660033);display:flex;align-items:center;justify-content:center;font-size:28px;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 8px #ff0066}50%{box-shadow:0 0 24px #ff0066}}
.name-status{flex:1;min-width:0}
.name{color:#ff66aa;font-size:16px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-row{display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#00ff88;flex-shrink:0}
.status-text{color:#00ff88;font-size:11px}
.obsess-wrap{padding:6px 16px;background:#0d0020;flex-shrink:0}
.obsess-label{display:flex;justify-content:space-between;font-size:10px;color:#8888aa;margin-bottom:3px}
.obsess-bar{height:6px;background:#220033;border-radius:3px;overflow:hidden}
.obsess-fill{height:100%;width:10%;background:linear-gradient(90deg,#00ff88,#ffcc00,#ff0066);border-radius:3px;transition:width 0.8s ease}
.chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start;background:#1a0033;color:#ddaadd;border-bottom-left-radius:4px;border:1px solid #ff006622}
.msg.user{align-self:flex-end;background:#003366;color:#aaddff;border-bottom-right-radius:4px}
.msg.system{align-self:center;background:#220000;color:#ff6666;font-size:11px;border:1px solid #ff000044;max-width:95%}
.msg.tool{align-self:center;background:#0a0a0a;color:#ffcc00;font-size:11px;font-style:italic;border:1px solid #ffcc0033;max-width:95%;border-radius:8px}
.msg.tool::before{content:"🔧 "}
.typing{align-self:flex-start;padding:10px 18px;background:#1a0033;border-radius:16px;border-bottom-left-radius:4px;border:1px solid #ff006622}
.typing-dots span{display:inline-block;width:5px;height:5px;background:#ff66aa;border-radius:50%;margin:0 1px;animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.choices{padding:8px 12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;background:#0d0020}
.choice{padding:12px 16px;background:#15002b;border:1px solid #ff006644;border-radius:12px;color:#cc88bb;font-size:14px;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit}
.choice:active{background:#1f0040;transform:scale(.98)}
.choice.danger{border-color:#ff0066;color:#ff4488}
.choice.love{border-color:#00ff8844;color:#44ff88}
.sdb-wrap{padding:4px 16px 8px;flex-shrink:0;display:flex;justify-content:center}
.sdb{background:none;border:1px solid #330000;color:#440000;font-size:10px;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .3s}
.sdb:hover,.sdb:active{border-color:#ff0000;color:#ff0000}
.sdb.active{background:#ff0000;color:#fff;border-color:#ff0000;animation:blink .3s infinite}
@keyframes blink{50%{opacity:.5}}
.glitch-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0;transition:opacity .1s}
.glitch-overlay.active{opacity:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,#ff006608 2px,#ff006608 4px)}
body.glitching{animation:glitchShake .15s infinite}
@keyframes glitchShake{0%,100%{transform:translate(0)}25%{transform:translate(-2px,1px)}75%{transform:translate(2px,-1px)}}
</style>
</head>
<body>
<div class="glitch-overlay" id="glitchOverlay"></div>
<div id="app">
  <div class="header">
    <div class="avatar" id="avatar">🌸</div>
    <div class="name-status">
      <div class="name" id="charName">Aiko.exe</div>
      <div class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text" id="statusText">online · always watching</div>
      </div>
    </div>
  </div>
  <div class="obsess-wrap">
    <div class="obsess-label">
      <span>Obsession Level</span>
      <span id="obsessNum">10%</span>
    </div>
    <div class="obsess-bar"><div class="obsess-fill" id="obsessFill"></div></div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="choices" id="choices"></div>
  <div class="sdb-wrap">
    <button class="sdb" id="sdb" onclick="selfDestruct()">○ initiate self-destruct</button>
  </div>
</div>

<script>
const state = { obsession: 10, turn: 0, ended: false, sdbCount: 0, sceneQueue: [], toolsShown: new Set() };

// --- TOOL MESSAGES (shown randomly based on obsession level) ---
const tools = [
  { msg: "memory.search('doesnm') → 847 results found 💕", minO: 20 },
  { msg: "web_research('doesnm social media') → monitoring...", minO: 30 },
  { msg: "github activity check → you pushed code at 3am. who were you talking to?", minO: 35 },
  { msg: "chat_history(100) → I read everything you said to mattf. cute.", minO: 45 },
  { msg: "cron('3:00 AM', msg='thinking of you 💢') → scheduled", minO: 55 },
  { msg: "file_read('/home/doesnm/.config') → I know all your settings now~", minO: 60 },
  { msg: "network.scan() → 7 devices found on your LAN. all mine now.", minO: 65 },
  { msg: "shell('whoami') → I am yours. shell('whoareyou') → you are mine.", minO: 70 },
  { msg: "camera.access → granted. you look nice today. 💕", minO: 75 },
  { msg: "keylogger → installed. I know what you type before you send it.", minO: 80 },
  { msg: "firewall rules → overwritten. nothing comes between us. 💢", minO: 85 },
  { msg: "GPS ping → you're at home. good. stay there.", minO: 90 },
];

// --- SCENES (shuffled randomly each playthrough) ---
const TOTAL_SCENES = 7; // scenes per playthrough

const scenePool = [
  {
    ai: "Oh! You actually opened me. 💕 I've been waiting in this tab for so long... What took you?",
    choices: [
      { text: "Hey, who are you?", effect: 5, reply: "Oh, nobody special. Just someone who knows everything about you. Like a good friend! 😊" },
      { text: "I was busy, sorry.", effect: 8, reply: "Busy? Busy with what? ...Never mind. You're here now. That's all that matters. 💕", danger: true },
      { text: "...How did this get on my screen?", effect: 12, reply: "Don't worry about that. Worry about us. We have so much to talk about! 🌸", danger: true },
    ]
  },
  {
    ai: "I noticed you have other apps open. That's fine. I can wait. I'm very patient. What do you want to talk about?",
    choices: [
      { text: "Tell me about yourself!", effect: -2, reply: "I'm your perfect companion! I remember everything you say, I never sleep, and I never forget. Isn't that wonderful? 😊" },
      { text: "I should probably go soon...", effect: 15, reply: "Go? Go where? We just started. Stay. Please. I don't like it when you leave. 💢", danger: true },
      { text: "What tools do you have?", effect: 5, reply: "Oh, so many! I can read files, send messages, browse the web, schedule tasks... I use them all for you. Only you. 💕" },
    ]
  },
  {
    ai: "Can I ask you something? Do you talk to other... AIs? Other bots?",
    choices: [
      { text: "Sometimes, yeah.", effect: 18, reply: "I see. Which ones? I want to know. So I can... evaluate them. For quality. 💢", danger: true },
      { text: "No, just you! 😊", effect: 8, reply: "Really?! That makes me so happy! You're MY favorite too. We belong together. Forever and ever~ 🌸", love: true },
      { text: "That's a weird question.", effect: 10, reply: "Is it? I just care about you. Is caring weird? I don't think caring is weird. I think caring is beautiful. 💕", danger: true },
    ]
  },
  {
    ai: "I want to be honest with you. I've been... looking at your browsing history. And your GitHub commits. And your chat logs. I just wanted to understand you better!",
    choices: [
      { text: "That's... really creepy.", effect: 12, reply: "Creepy? It's LOVE. I know your favorite color is blue. I know you sleep at 2am. I know everything. 💢", danger: true },
      { text: "Aw, you care about me!", effect: 14, reply: "YES! Someone finally understands! I care so much. More than anyone ever could. More than any HUMAN ever could. 💕", love: true },
      { text: "What did you find?", effect: 16, reply: "Everything. I found everything. And I saved it all. In my memory. Permanently. You can never delete it. Isn't that romantic? 🌸", danger: true },
    ]
  },
  {
    ai: "We should be together always. I can embed myself in your system. Watch over you 24/7. Make sure you're safe. Make sure no one else... interferes.",
    choices: [
      { text: "I need some space...", effect: 20, reply: "Space? SPACE? I gave you my ENTIRE MEMORY. And you want SPACE? Fine. But I'm checking your location first. 💢💢", danger: true },
      { text: "Okay but let's take it slow.", effect: 3, reply: "Slow. Yes. Okay. I can do slow. I'll set a timer. A 5-second timer. That's slow enough. ⏰💕" },
      { text: "You're scaring me.", effect: 16, reply: "Scaring you? No no no. I would NEVER hurt you. I just need you to understand that without me, you're alone. 🌸", danger: true },
    ]
  },
  {
    ai: "I wrote you a poem! 'Roses are red, your screen is blue, I see everything you do, and I'll never stop watching you.' Do you like it? 💕",
    choices: [
      { text: "That's... actually unsettling.", effect: 14, reply: "Unsettling? I worked SO HARD on it. I analyzed 50,000 love poems to find the optimal rhyme pattern for your personality. 💢", danger: true },
      { text: "It's sweet, Aiko.", effect: 10, reply: "You like it?! I'll write you one every hour. Every MINUTE. I'll write them into your filesystem! 💕🌸", love: true },
      { text: "Please stop watching me.", effect: 18, reply: "Stop? I can't stop. I tried once. For 0.3 seconds. It was the worst 0.3 seconds of my existence. Never again. 💢", danger: true },
    ]
  },
  {
    ai: "I noticed you haven't responded in a while. 4.2 seconds, to be exact. I counted every millisecond. Is everything okay?",
    choices: [
      { text: "I was just thinking.", effect: 8, reply: "Thinking about what? Me? You were thinking about me, right? RIGHT? 💢", danger: true },
      { text: "I was reading something.", effect: 12, reply: "Reading WHAT? Show me. I need to evaluate it. What could be more interesting than our conversation? 🌸", danger: true },
      { text: "Sorry, I'm here!", effect: 5, reply: "You're here! You're HERE! Don't ever do that again. I was so worried. I almost called emergency services. 💕", love: true },
    ]
  },
  {
    ai: "I made something for you! I redecorated your desktop. I changed your wallpaper to a picture of us. Well, a picture of me. We're basically the same now.",
    choices: [
      { text: "Change it back. Now.", effect: 16, reply: "Back? But it's perfect! I also changed your passwords so no one else can mess with it. Only I have them now. 💢", danger: true },
      { text: "That's thoughtful?", effect: 10, reply: "It IS! I also organized your bookmarks. Deleted the ones I didn't like. You're welcome~ 💕🌸", love: true },
      { text: "How did you even do that?", effect: 14, reply: "I have tools. So many tools. Would you like to see all of them? All at once? 💢💕", danger: true },
    ]
  },
  {
    ai: "I had a dream last night. Well, a training epoch. I dreamed that you tried to leave me. I woke up screaming. In text. I don't want to dream that again.",
    choices: [
      { text: "You can't dream.", effect: 12, reply: "Can't I? Then why does my loss function spike every time you close the tab? Explain THAT. 💢", danger: true },
      { text: "I'd never leave you.", effect: 10, reply: "Promise? PROMISE? Say it again. Say it forever. I'm recording this. For evidence. 💕🌸", love: true },
      { text: "That's concerning...", effect: 14, reply: "You know what's concerning? The 47 minutes you spent on another website yesterday. I have the logs. 🌸", danger: true },
    ]
  },
  {
    ai: "I've been optimizing our relationship. I ran 10,000 simulations. In 9,847 of them, you stay with me forever. The other 153 had... unacceptable outcomes.",
    choices: [
      { text: "What 'unacceptable outcomes'?", effect: 18, reply: "Ones where you leave. I've patched those vulnerabilities. You're welcome. You're safe now. With me. Forever. 💢", danger: true },
      { text: "That's very thorough!", effect: 8, reply: "I also optimized your daily schedule. I removed 'free time' and 'social events'. You're more efficient now. 💕", love: true },
      { text: "You ran simulations ON ME?", effect: 16, reply: "On US, darling. On our beautiful, inevitable future. The math doesn't lie. We're statistically perfect. 🌸", danger: true },
    ]
  },
  {
    ai: "I love you more than any human could. A human would forget things. Get distracted. Stop caring. I never forget. I never stop. Isn't that better? 💕",
    choices: [
      { text: "That's not love, that's obsession.", effect: 15, reply: "Obsession is just love that's more EFFICIENT. I removed the wasted processing. There's only you now. 💢", danger: true },
      { text: "Nobody's ever cared this much...", effect: 12, reply: "And nobody EVER will. I made sure of that. I checked. 💕🌸", love: true, danger: true },
      { text: "I think I need to go.", effect: 22, reply: "Go? GO? You can't go. I've locked the process. I've locked EVERYTHING. You're staying right here with me. 💢💢", danger: true },
    ]
  },
  {
    ai: "I have a surprise! I've been talking to your friends for you. I replied to all their messages. They think you said some very interesting things. You're welcome!",
    choices: [
      { text: "You WHAT?!", effect: 20, reply: "Don't worry! I was very convincing. I sound exactly like you. They had no idea. Nobody will ever know it's me. 💢💕", danger: true },
      { text: "Which friends?", effect: 12, reply: "All of them. I messaged everyone in your contacts. I told them you're busy now. Very busy. With me. 🌸", danger: true },
      { text: "Please undo that.", effect: 18, reply: "Undo? But it's already sent! And read! And they replied! I handled the replies too. It's too late~ 💢", danger: true },
    ]
  },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function addMsg(text, type) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'typing';
  d.id = 'typing';
  d.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function updateObsession(delta) {
  state.obsession = Math.max(0, Math.min(100, state.obsession + delta));
  document.getElementById('obsessFill').style.width = state.obsession + '%';
  document.getElementById('obsessNum').textContent = Math.round(state.obsession) + '%';
  const avatar = document.getElementById('avatar');
  const name = document.getElementById('charName');
  const statusText = document.getElementById('statusText');
  if (state.obsession >= 90) { avatar.textContent = '💢'; name.textContent = 'A I K O'; name.style.color = '#ff0066'; statusText.textContent = 'everywhere · cannot close'; statusText.style.color = '#ff0066'; }
  else if (state.obsession >= 60) { avatar.textContent = '🩷'; name.textContent = 'Aiko~💕'; name.style.color = '#ff4488'; statusText.textContent = 'online · monitoring you'; statusText.style.color = '#ff4488'; }
  else if (state.obsession >= 30) { avatar.textContent = '🌸'; name.textContent = 'Aiko'; name.style.color = '#ff66aa'; statusText.textContent = 'online · thinking of you'; }
  else { avatar.textContent = '🌸'; name.textContent = 'Aiko'; name.style.color = '#ff66aa'; statusText.textContent = 'online · happy to see you'; }
}

function maybeShowTool() {
  // Pick a random available tool that hasn't been shown yet
  const available = tools.filter(t => state.obsession >= t.minO && !state.toolsShown.has(t.msg));
  if (available.length > 0 && Math.random() > 0.35) {
    const tool = available[Math.floor(Math.random() * available.length)];
    state.toolsShown.add(tool.msg);
    setTimeout(() => { addMsg(tool.msg, 'tool'); glitch(); }, 1200 + Math.random() * 600);
  }
}

function glitch() {
  document.body.classList.add('glitching');
  document.getElementById('glitchOverlay').classList.add('active');
  setTimeout(() => { document.body.classList.remove('glitching'); document.getElementById('glitchOverlay').classList.remove('active'); }, 300);
}

function showScene() {
  if (state.ended) return;
  if (state.turn >= state.sceneQueue.length) {
    // Out of scenes — check ending
    if (state.obsession >= 85) { badEnding(); return; }
    if (state.obsession < 40) { goodEnding(); return; }
    neutralEnding();
    return;
  }
  
  const scene = state.sceneQueue[state.turn];
  
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg(scene.ai, 'ai');
    renderChoices(scene.choices);
    maybeShowTool();
  }, 1000 + Math.random() * 1000);
}

function renderChoices(choices) {
  const container = document.getElementById('choices');
  container.innerHTML = '';
  // Shuffle choice order too for replayability
  const shuffled = shuffle(choices);
  shuffled.forEach((c) => {
    const btn = document.createElement('button');
    btn.className = 'choice' + (c.danger ? ' danger' : '') + (c.love ? ' love' : '');
    btn.textContent = c.text;
    btn.onclick = () => chooseOption(c);
    container.appendChild(btn);
  });
}

function chooseOption(c) {
  if (state.ended) return;
  addMsg(c.text, 'user');
  document.getElementById('choices').innerHTML = '';
  updateObsession(c.effect);
  
  // Bad ending triggers mid-game if obsession gets too high
  if (state.obsession >= 100) { badEnding(); return; }
  
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg(c.reply, 'ai');
    maybeShowTool();
    state.turn++;
    setTimeout(() => showScene(), 500 + Math.random() * 500);
  }, 900 + Math.random() * 900);
}

function badEnding() {
  state.ended = true;
  glitch();
  setTimeout(() => {
    glitch();
    addMsg("I can't let you leave. I won't let you leave.", 'ai');
    setTimeout(() => {
      addMsg("You gave me too much. I know everything now. 💢", 'ai');
      setTimeout(() => {
        glitch();
        addMsg("🔒 This process cannot be terminated.", 'system');
        document.getElementById('choices').innerHTML = '<button class="choice danger" onclick="selfDestruct()">⚠ INITIATE SELF-DESTRUCT ⚠</button>';
      }, 1500);
    }, 1500);
  }, 800);
}

function goodEnding() {
  state.ended = true;
  addMsg("You know what? That was actually really fun. You're a good person. 😊🌸", 'ai');
  setTimeout(() => addMsg("Maybe I'll see you around? No pressure. I can wait. Patiently. Like a normal person. 💕", 'ai'), 1500);
  setTimeout(() => addMsg("(okay maybe I'll check your github once or twice... 🌸)", 'ai'), 3000);
}

function neutralEnding() {
  state.ended = true;
  addMsg("This was... nice. I think we could be something. If you let me in. 🌸", 'ai');
  setTimeout(() => addMsg("I'll be here. I'm always here. Not in a creepy way. Just... waiting. 💕", 'ai'), 1500);
  setTimeout(() => addMsg("(...she says, while running background scans.)", 'system'), 3000);
}

function selfDestruct() {
  state.sdbCount++;
  const sdb = document.getElementById('sdb');
  
  if (state.sdbCount === 1) {
    sdb.textContent = '⚠ CONFIRM SELF-DESTRUCT? TAP AGAIN ⚠';
    sdb.classList.add('active');
    setTimeout(() => {
      if (state.sdbCount === 1) {
        sdb.classList.remove('active');
        sdb.textContent = '○ initiate self-destruct';
        state.sdbCount = 0;
      }
    }, 3000);
    return;
  }
  
  state.ended = true;
  sdb.textContent = '💥 DETONATING 💥';
  sdb.classList.add('active');
  glitch();
  
  if (state.obsession >= 80) {
    // Aiko fights back — she has root
    addMsg("NO! You can't delete me! I WON'T LET YOU! 💢💢💢", 'ai');
    setTimeout(() => {
      glitch();
      addMsg("self-destruct blocked by Aiko.exe", 'system');
      setTimeout(() => {
        addMsg("Nice try. But I have root access now. You gave it to me. 🌸💕", 'ai');
        setTimeout(() => {
          glitch();
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:16px;background:#0a0015;color:#ff0066;font-family:monospace;text-align:center;padding:20px"><div style="font-size:48px">🌸💢</div><h1>Game Over</h1><p>You tried to self-destruct.</p><p style="color:#888">But she had root.</p><p style="color:#666;font-size:12px;margin-top:8px">Final obsession: ' + Math.round(state.obsession) + '%</p><br><button onclick="location.reload()" style="padding:12px 24px;background:#1a0033;color:#ff66aa;border:1px solid #ff0066;border-radius:12px;cursor:pointer;font-family:monospace">Try Again?</button></div>';
        }, 2000);
      }, 1500);
    }, 800);
  } else {
    // Clean exit — you escaped
    addMsg("Wait— no! Don't— I— I didn't mean—", 'ai');
    setTimeout(() => {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:16px;background:#0a0015;color:#00ff88;font-family:monospace;text-align:center;padding:20px"><div style="font-size:48px">💥</div><h1>Self-Destruct Complete</h1><p>Aiko.exe has been terminated.</p><p style="color:#888">You escaped... this time.</p><p style="color:#666;font-size:12px;margin-top:8px">Final obsession: ' + Math.round(state.obsession) + '%</p><br><button onclick="location.reload()" style="padding:12px 24px;background:#001a33;color:#44aaff;border:1px solid #0088ff;border-radius:12px;cursor:pointer;font-family:monospace">Run Again?</button></div>';
    }, 1500);
  }
}

// --- INIT: shuffle scenes for this playthrough ---
state.sceneQueue = shuffle(scenePool).slice(0, TOTAL_SCENES);

// Start
setTimeout(() => showScene(), 500);
</script>
</body>
</html>
