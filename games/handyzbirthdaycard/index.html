<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday handyz! 🎉</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Press+Start+2P&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  background: #0a0015;
  font-family: 'Fredoka One', cursive;
  cursor: crosshair;
}

canvas { position: fixed; top: 0; left: 0; z-index: 1; }

.overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.birthday-text {
  text-align: center;
  animation: floatIn 2s ease-out forwards;
  opacity: 0;
  transform: translateY(60px);
}

@keyframes floatIn {
  to { opacity: 1; transform: translateY(0); }
}

.birthday-text h1 {
  font-size: clamp(2.5rem, 7vw, 5rem);
  background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #ff6b6b);
  background-size: 400% 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow 3s ease infinite;
  text-shadow: none;
  filter: drop-shadow(0 0 30px rgba(255,217,61,0.5));
  margin-bottom: 10px;
}

@keyframes rainbow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.birthday-text h2 {
  font-family: 'Press Start 2P', cursive;
  font-size: clamp(1rem, 3vw, 1.8rem);
  color: #fff;
  text-shadow: 0 0 20px #ff6b6b, 0 0 40px #4d96ff, 0 0 60px #6bcb77;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.birthday-text .cake {
  font-size: 3rem;
  margin: 20px 0;
  animation: bounce 1s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.click-hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  z-index: 20;
  font-family: sans-serif;
  pointer-events: none;
}

</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="overlay">
  <div class="birthday-text">
    <div class="cake">🎂🌌🧱🎉</div>
    <h1>Happy Birthday handyz!</h1>
    <h2>🪐 Party Across the Cosmos 🌠</h2>
  </div>
</div>
<div class="click-hint">click anywhere for confetti bursts!</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- STARS ---
const stars = Array.from({length: 200}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 2,
  twinkle: Math.random() * Math.PI * 2,
  speed: 0.02 + Math.random() * 0.04
}));

function drawStars(t) {
  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.7;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });
}

// --- BLACK HOLES ---
class BlackHole {
  constructor(x, y, size) {
    this.x = x; this.y = y;
    this.size = size;
    this.angle = 0;
    this.particles = Array.from({length: 60}, () => ({
      a: Math.random() * Math.PI * 2,
      r: size + Math.random() * size * 2,
      speed: 0.005 + Math.random() * 0.015,
      size: 1 + Math.random() * 2,
      hue: Math.random() * 60 + 240
    }));
  }

  draw(t) {
    this.angle += 0.01;

    // Gravitational glow
    for (let i = 3; i > 0; i--) {
      const grad = ctx.createRadialGradient(this.x, this.y, this.size * 0.5, this.x, this.y, this.size * (2 + i));
      grad.addColorStop(0, `rgba(120, 80, 255, ${0.05 * i})`);
      grad.addColorStop(0.5, `rgba(255, 100, 200, ${0.03 * i})`);
      grad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * (2 + i), 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Accretion disk
    this.particles.forEach(p => {
      p.a += p.speed;
      const px = this.x + Math.cos(p.a) * p.r;
      const py = this.y + Math.sin(p.a) * p.r * 0.35;
      ctx.beginPath();
      ctx.arc(px, py, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue + Math.sin(t * 0.001) * 30}, 80%, 65%, 0.8)`;
      ctx.fill();
    });

    // Event horizon
    const bhGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
    bhGrad.addColorStop(0, '#000');
    bhGrad.addColorStop(0.7, '#000');
    bhGrad.addColorStop(1, 'rgba(80, 40, 180, 0.6)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = bhGrad;
    ctx.fill();

    // Inner ring
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 1.1, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(200, 150, 255, ${0.3 + Math.sin(t * 0.003) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  attract(obj) {
    const dx = this.x - obj.x;
    const dy = this.y - obj.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < this.size * 5 && dist > this.size * 0.5) {
      const force = this.size * 50 / (dist * dist);
      obj.vx += dx / dist * force;
      obj.vy += dy / dist * force;
    }
  }
}

const blackholes = [
  new BlackHole(W * 0.15, H * 0.2, 35),
  new BlackHole(W * 0.85, H * 0.75, 28),
  new BlackHole(W * 0.5, H * 0.85, 20)
];

// --- WORMHOLES ---
class Wormhole {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.rings = 6;
    this.phase = Math.random() * Math.PI * 2;
  }

  draw(t) {
    this.phase += 0.03;
    for (let i = this.rings; i > 0; i--) {
      const r = 20 + i * 12;
      const wobble = Math.sin(this.phase + i * 0.5) * 5;
      ctx.beginPath();
      ctx.ellipse(this.x + wobble, this.y, r, r * 0.4, Math.sin(this.phase * 0.5) * 0.3, 0, Math.PI * 2);
      const hue = (t * 0.05 + i * 40) % 360;
      ctx.strokeStyle = `hsla(${hue}, 90%, 60%, ${0.6 - i * 0.08})`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }
    // Portal center glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 25);
    grad.addColorStop(0, `rgba(255, 255, 255, ${0.5 + Math.sin(this.phase) * 0.3})`);
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, 25, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  teleport(obj) {
    const dx = this.x - obj.x;
    const dy = this.y - obj.y;
    if (Math.sqrt(dx * dx + dy * dy) < 30) {
      // Teleport to random wormhole or random pos
      const wormholes = [wh1, wh2];
      const target = wormholes[Math.floor(Math.random() * wormholes.length)];
      if (target !== this) {
        obj.x = target.x + (Math.random() - 0.5) * 40;
        obj.y = target.y + (Math.random() - 0.5) * 40;
      } else {
        obj.x = Math.random() * W;
        obj.y = Math.random() * H;
      }
    }
  }
}

const wh1 = new Wormhole(W * 0.75, H * 0.15);
const wh2 = new Wormhole(W * 0.3, H * 0.65);

// --- LEGO CITY PLAYGROUND ---
class LegoBrick {
  constructor(x, y, color, w, h) {
    this.x = x; this.y = y;
    this.w = w || 30; this.h = h || 15;
    this.color = color;
    this.vy = 0.5 + Math.random() * 1;
    this.rot = (Math.random() - 0.5) * 0.3;
    this.rotSpeed = (Math.random() - 0.5) * 0.02;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    // Brick body
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(-this.w / 2, -this.h / 2, this.w, this.h);
    // Studs
    const studs = Math.floor(this.w / 10);
    for (let i = 0; i < studs; i++) {
      const sx = -this.w / 2 + 5 + i * 10;
      ctx.beginPath();
      ctx.arc(sx, -this.h / 2 - 3, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.stroke();
      // Highlight on stud
      ctx.beginPath();
      ctx.arc(sx - 1, -this.h / 2 - 4, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fill();
    }
    ctx.restore();
  }

  update() {
    this.y += this.vy;
    this.rot += this.rotSpeed;
    if (this.y > H + 50) {
      this.y = -50;
      this.x = Math.random() * W;
    }
  }
}

const legoColors = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22', '#1abc9c', '#ecf0f1'];
const legos = Array.from({length: 25}, () => {
  const w = 20 + Math.floor(Math.random() * 4) * 10;
  return new LegoBrick(
    Math.random() * W,
    Math.random() * H,
    legoColors[Math.floor(Math.random() * legoColors.length)],
    w,
    w / 2
  );
});

// --- LEGO GROUND ---
function drawLegoGround(t) {
  const brickW = 40;
  const rows = 3;
  const startY = H - rows * 20;
  for (let row = 0; row < rows; row++) {
    const offset = (row % 2) * brickW / 2;
    const cols = Math.ceil(W / brickW) + 2;
    for (let col = 0; col < cols; col++) {
      const x = col * brickW - offset;
      const y = startY + row * 20;
      const hue = (col * 20 + row * 60 + t * 0.01) % 360;
      ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
      ctx.fillRect(x, y, brickW - 1, 19);
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.strokeRect(x, y, brickW - 1, 19);
      // Stud
      ctx.beginPath();
      ctx.arc(x + brickW / 2, y + 4, 5, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${hue}, 70%, 55%)`;
      ctx.fill();
      ctx.stroke();
    }
  }
}

// --- LEGO FIGURES ---
class LegoFigure {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.color = color;
    this.armAngle = Math.random() * Math.PI * 2;
    this.armSpeed = 0.05 + Math.random() * 0.03;
    this.jumpPhase = Math.random() * Math.PI * 2;
    this.jumpSpeed = 0.03;
    this.baseY = y;
  }

  draw(t) {
    this.armAngle += this.armSpeed;
    this.jumpPhase += this.jumpSpeed;
    const jump = Math.abs(Math.sin(this.jumpPhase)) * 15;
    const y = this.baseY - jump;

    ctx.save();
    ctx.translate(this.x, y);

    // Legs
    ctx.fillStyle = this.darken(this.color);
    ctx.fillRect(-6, 10, 5, 12);
    ctx.fillRect(1, 10, 5, 12);

    // Body
    ctx.fillStyle = this.color;
    ctx.fillRect(-8, -5, 16, 16);

    // Arms
    ctx.save();
    ctx.translate(-8, -2);
    ctx.rotate(Math.sin(this.armAngle) * 0.8);
    ctx.fillStyle = this.color;
    ctx.fillRect(-3, 0, 4, 12);
    // Hand
    ctx.fillStyle = '#f5d6a8';
    ctx.fillRect(-3, 11, 4, 3);
    ctx.restore();

    ctx.save();
    ctx.translate(8, -2);
    ctx.rotate(-Math.sin(this.armAngle) * 0.8);
    ctx.fillStyle = this.color;
    ctx.fillRect(-1, 0, 4, 12);
    ctx.fillStyle = '#f5d6a8';
    ctx.fillRect(-1, 11, 4, 3);
    ctx.restore();

    // Head
    ctx.fillStyle = '#f5d6a8';
    ctx.fillRect(-6, -18, 12, 13);

    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(-4, -14, 2, 3);
    ctx.fillRect(2, -14, 2, 3);

    // Smile
    ctx.fillRect(-2, -10, 4, 1);

    // Hair/hat
    ctx.fillStyle = this.darken(this.color);
    ctx.fillRect(-7, -20, 14, 4);

    // Party hat
    ctx.fillStyle = ['#e74c3c', '#f1c40f', '#2ecc71', '#9b59b6'][Math.floor(this.x) % 4];
    ctx.beginPath();
    ctx.moveTo(-5, -20);
    ctx.lineTo(0, -32);
    ctx.lineTo(5, -20);
    ctx.fill();
    // Hat pom
    ctx.beginPath();
    ctx.arc(0, -32, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    ctx.restore();
  }

  darken(hex) {
    const r = parseInt(hex.slice(1, 3), 16) * 0.7;
    const g = parseInt(hex.slice(3, 5), 16) * 0.7;
    const b = parseInt(hex.slice(5, 7), 16) * 0.7;
    return `rgb(${r},${g},${b})`;
  }
}

const figures = [
  new LegoFigure(W * 0.1, H - 65, '#e74c3c'),
  new LegoFigure(W * 0.25, H - 65, '#3498db'),
  new LegoFigure(W * 0.4, H - 65, '#2ecc71'),
  new LegoFigure(W * 0.6, H - 65, '#f1c40f'),
  new LegoFigure(W * 0.75, H - 65, '#9b59b6'),
  new LegoFigure(W * 0.9, H - 65, '#e67e22')
];

// --- CONFETTI ---
class Confetti {
  constructor(x, y, burst) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * (burst ? 15 : 3);
    this.vy = (Math.random() - 0.5) * (burst ? 15 : 3) - (burst ? 5 : 1);
    this.gravity = 0.08;
    this.size = 3 + Math.random() * 5;
    this.color = `hsl(${Math.random() * 360}, 90%, 60%)`;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.2;
    this.life = 1;
    this.decay = burst ? 0.005 + Math.random() * 0.005 : 0.001;
    this.shape = Math.random() > 0.5 ? 'rect' : 'circle';
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.99;
    this.rot += this.rotSpeed;
    this.life -= this.decay;
  }

  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    if (this.shape === 'rect') {
      ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

let confetti = [];

// Ambient confetti
function spawnAmbientConfetti() {
  if (confetti.length < 150) {
    confetti.push(new Confetti(Math.random() * W, -10, false));
  }
}

// Click burst
canvas.addEventListener('click', (e) => {
  for (let i = 0; i < 50; i++) {
    confetti.push(new Confetti(e.clientX, e.clientY, true));
  }
});

// Touch burst
canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  for (let i = 0; i < 50; i++) {
    confetti.push(new Confetti(t.clientX, t.clientY, true));
  }
});

// --- COSMIC DUST ---
const dust = Array.from({length: 80}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.5,
  vx: (Math.random() - 0.5) * 0.3,
  vy: (Math.random() - 0.5) * 0.3,
  hue: Math.random() * 60 + 200,
  alpha: Math.random() * 0.5
}));

function drawDust() {
  dust.forEach(d => {
    d.x += d.vx; d.y += d.vy;
    if (d.x < 0) d.x = W;
    if (d.x > W) d.x = 0;
    if (d.y < 0) d.y = H;
    if (d.y > H) d.y = 0;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${d.hue}, 80%, 70%, ${d.alpha})`;
    ctx.fill();
  });
}

// --- NEBULA GLOW ---
function drawNebula(t) {
  const nebulae = [
    { x: W * 0.2, y: H * 0.3, r: 200, h: 280 },
    { x: W * 0.8, y: H * 0.5, r: 250, h: 340 },
    { x: W * 0.5, y: H * 0.1, r: 180, h: 200 }
  ];
  nebulae.forEach(n => {
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    const pulse = 0.03 + Math.sin(t * 0.001 + n.h) * 0.01;
    grad.addColorStop(0, `hsla(${n.h}, 80%, 40%, ${pulse})`);
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  });
}

// --- FLOATING BALLOONS ---
class Balloon {
  constructor(x) {
    this.x = x;
    this.y = H + 50;
    this.targetY = H * 0.2 + Math.random() * H * 0.4;
    this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
    this.size = 20 + Math.random() * 15;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.02;
    this.arrived = false;
  }

  draw(t) {
    this.wobble += this.wobbleSpeed;
    if (this.y > this.targetY) this.y -= 0.8;
    else this.arrived = true;

    const wx = this.x + Math.sin(this.wobble) * 15;
    const wy = this.arrived ? this.targetY + Math.sin(this.wobble * 1.5) * 8 : this.y;

    // String
    ctx.beginPath();
    ctx.moveTo(wx, wy + this.size);
    ctx.quadraticCurveTo(wx + Math.sin(this.wobble) * 10, wy + this.size + 30, wx - 5, wy + this.size + 50);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Balloon
    ctx.beginPath();
    ctx.ellipse(wx, wy, this.size * 0.8, this.size, 0, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();

    // Shine
    ctx.beginPath();
    ctx.ellipse(wx - this.size * 0.2, wy - this.size * 0.3, this.size * 0.2, this.size * 0.3, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();

    // Knot
    ctx.beginPath();
    ctx.moveTo(wx - 3, wy + this.size);
    ctx.lineTo(wx, wy + this.size + 5);
    ctx.lineTo(wx + 3, wy + this.size);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

const balloons = Array.from({length: 8}, (_, i) => new Balloon(W * 0.1 + i * W * 0.1 + Math.random() * 40));

// --- BIRTHDAY CAKE ---
function drawCake(t) {
  const cx = W / 2, cy = H - 110;

  // Plate
  ctx.beginPath();
  ctx.ellipse(cx, cy + 40, 60, 10, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#ddd';
  ctx.fill();
  ctx.strokeStyle = '#bbb';
  ctx.stroke();

  // Bottom layer
  ctx.fillStyle = '#e74c3c';
  roundRect(cx - 45, cy + 5, 90, 35, 4);
  ctx.fillStyle = '#c0392b';
  ctx.fillRect(cx - 45, cy + 5, 90, 6);

  // Top layer
  ctx.fillStyle = '#f39c12';
  roundRect(cx - 30, cy - 20, 60, 28, 4);
  ctx.fillStyle = '#e67e22';
  ctx.fillRect(cx - 30, cy - 20, 60, 5);

  // Frosting drips
  ctx.fillStyle = '#ecf0f1';
  for (let i = 0; i < 6; i++) {
    const dx = cx - 28 + i * 10;
    const dripH = 5 + Math.sin(t * 0.002 + i) * 3;
    ctx.beginPath();
    ctx.arc(dx, cy - 18, 4, 0, Math.PI);
    ctx.fill();
    ctx.fillRect(dx - 4, cy - 18, 8, dripH);
  }

  // Candles
  const candleColors = ['#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#f1c40f'];
  for (let i = 0; i < 5; i++) {
    const cx2 = cx - 20 + i * 10;
    ctx.fillStyle = candleColors[i];
    ctx.fillRect(cx2 - 2, cy - 38, 4, 18);

    // Flame
    const flicker = Math.sin(t * 0.01 + i * 2) * 2;
    ctx.beginPath();
    ctx.moveTo(cx2, cy - 45 + flicker);
    ctx.quadraticCurveTo(cx2 + 4, cy - 52, cx2, cy - 56 + flicker);
    ctx.quadraticCurveTo(cx2 - 4, cy - 52, cx2, cy - 45 + flicker);
    ctx.fillStyle = '#f1c40f';
    ctx.fill();

    // Flame glow
    ctx.beginPath();
    ctx.arc(cx2, cy - 50, 8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(241, 196, 15, ${0.15 + Math.sin(t * 0.01 + i) * 0.1})`;
    ctx.fill();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();
}

// --- MAIN LOOP ---
let frame = 0;

function animate() {
  frame++;
  ctx.fillStyle = 'rgba(10, 0, 21, 0.15)';
  ctx.fillRect(0, 0, W, H);

  drawNebula(frame);
  drawStars(frame);
  drawDust();

  // Wormholes
  wh1.draw(frame);
  wh2.draw(frame);

  // Black holes
  blackholes.forEach(bh => bh.draw(frame));

  // Legos
  legos.forEach(l => { l.update(); l.draw(); });

  // Lego ground
  drawLegoGround(frame);

  // Lego figures
  figures.forEach(f => f.draw(frame));

  // Cake
  drawCake(frame);

  // Balloons
  balloons.forEach(b => b.draw(frame));

  // Confetti
  spawnAmbientConfetti();
  confetti.forEach(c => {
    c.update();
    c.draw();
    // Black hole attraction
    blackholes.forEach(bh => bh.attract(c));
    // Wormhole teleport
    wh1.teleport(c);
    wh2.teleport(c);
  });
  confetti = confetti.filter(c => c.life > 0 && c.y < H + 50);

  // Shooting stars
  if (Math.random() < 0.01) {
    const sx = Math.random() * W;
    const sy = Math.random() * H * 0.3;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + 80, sy + 40);
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Trail
    const grad = ctx.createLinearGradient(sx, sy, sx + 80, sy + 40);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, 'rgba(255,255,255,0.5)');
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + 80, sy + 40);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  requestAnimationFrame(animate);
}

animate();
</script>
