<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Wang Road Tiles + Cars + Editable Locations</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:#111;color:#eee;display:flex;align-items:stretch}
    #app{display:flex;gap:12px;padding:12px;flex:1}
    #left{flex:1;background:#0f0f0f;border-radius:10px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center}
    canvas{background:#183;background-size:cover;border-radius:6px;box-shadow:inset 0 0 40px rgba(0,0,0,0.4)}
    #right{width:360px;background:#141414;border-radius:10px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,0.6);overflow:auto}
    h2{margin:6px 0 12px 0;font-size:16px}
    .row{display:flex;gap:8px;margin-bottom:8px}
    button{background:#222;border:1px solid #333;color:#fff;padding:8px;border-radius:6px;cursor:pointer}
    button:hover{background:#2f2f2f}
    .small{font-size:12px;color:#bbb}
    .loc-list{margin-top:8px}
    .loc-item{display:flex;align-items:center;gap:8px;padding:6px;border-radius:6px;background:rgba(255,255,255,0.02);margin-bottom:6px}
    .loc-item input.name{flex:1;background:transparent;border:none;color:#fff;padding:6px}
    .loc-item select{background:#111;color:#fff;border:1px solid #333;padding:5px;border-radius:4px}
    .badge{font-size:12px;color:#ddd;background:rgba(255,255,255,0.03);padding:4px 6px;border-radius:6px}
    .cars-list{margin-top:8px}
    .car-item{display:flex;align-items:center;gap:8px;padding:6px;border-radius:6px;background:rgba(255,255,255,0.02);margin-bottom:6px}
    .color-swatch{width:26px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,0.6)}
    .control-note{margin-top:10px;color:#bdbdbd;font-size:13px}
    .footer{margin-top:12px;font-size:12px;color:#999}
  </style>
</head>
<body>
  <div id="app">
    <div id="left">
      <canvas id="world" width="640" height="640"></canvas>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button id="regenTiles">Regenerate Tile Art</button>
        <button id="regenMap">Randomize Map</button>
        <button id="respawnCars">Respawn Cars</button>
        <button id="centerPlayer">Center Player</button>
      </div>
      <div class="control-note">Controls: Arrow keys or WASD to drive player car. Click canvas to pick location.</div>
    </div>

    <div id="right">
      <h2>Locations (editable)</h2>
      <div class="row">
        <select id="newType">
          <option value="post">Post Office</option>
          <option value="theater">Movie Theater</option>
          <option value="restaurant">Restaurant</option>
          <option value="custom">Custom</option>
        </select>
        <input id="newName" placeholder="Name (optional)" style="flex:1;padding:6px;border-radius:6px;border:1px solid #333;background:#0f0f0f;color:#fff" />
        <button id="addLoc">Add</button>
      </div>

      <div class="loc-list" id="locList"></div>

      <h2 style="margin-top:12px">Cars</h2>
      <div class="cars-list" id="carsList"></div>

      <div style="margin-top:10px">
        <button id="pickNext">Switch Player Car</button>
        <button id="removePlayer">Remove Player Control</button>
      </div>

      <div class="footer">Click a location item to teleport player car to that spot. You can rename or delete locations.</div>
    </div>
  </div>

<script>
(function(){
  // Canvas/setup
  const canvas = document.getElementById('world');
  const ctx = canvas.getContext('2d');
  const SIZE_TILES = 8;
  const TILE_PX = Math.floor(canvas.width / SIZE_TILES);
  const BOARD_PX = TILE_PX * SIZE_TILES;

  // Wang tiles: 16 tiles (bits: top(1), right(2), bottom(4), left(8)) - map to id 0..15
  let tileImages = [];

  function makeTiles(seed){
    tileImages = [];
    for (let id=0; id<16; id++){
      tileImages.push(drawTile(id, TILE_PX, seed));
    }
  }

  function drawTile(id, size, seed){
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const g = c.getContext('2d');

    const top = (id>>0)&1;
    const right = (id>>1)&1;
    const bottom = (id>>2)&1;
    const left = (id>>3)&1;

    // terrain color from seed
    const hue = seed ? seed.hue : (120 + Math.floor(Math.random()*60));
    g.fillStyle = `hsl(${hue} 30% 16%)`;
    g.fillRect(0,0,size,size);

    // texture
    if (Math.random() < 0.6){
      const grad = g.createLinearGradient(0,0,size,size);
      grad.addColorStop(0, `rgba(255,255,255,${0.02})`);
      grad.addColorStop(1, `rgba(0,0,0,${0.06})`);
      g.fillStyle = grad;
      g.fillRect(0,0,size,size);
    }

    const cx = size/2, cy = size/2;
    const roadW = Math.max(10, Math.floor(size * 0.2));
    const rEdge = '#444';
    const rMid = '#777';
    // draw road arms
    g.fillStyle = rEdge;
    if (top) g.fillRect(cx - roadW/2 - 3, 0, roadW+6, cy);
    if (bottom) g.fillRect(cx - roadW/2 - 3, cy, roadW+6, cy);
    if (left) g.fillRect(0, cy - roadW/2 - 3, cx, roadW+6);
    if (right) g.fillRect(cx, cy - roadW/2 - 3, cx, roadW+6);

    g.fillStyle = rMid;
    if (top) g.fillRect(cx - roadW/2, 0, roadW, cy-2);
    if (bottom) g.fillRect(cx - roadW/2, cy+2, roadW, cy-2);
    if (left) g.fillRect(0, cy - roadW/2, cx-2, roadW);
    if (right) g.fillRect(cx+2, cy - roadW/2, cx-2, roadW);

    if (top||bottom||left||right){
      g.beginPath();
      g.fillStyle = rMid;
      g.arc(cx,cy,roadW*0.9,0,Math.PI*2);
      g.fill();
      g.strokeStyle = rEdge;
      g.lineWidth = 2;
      g.beginPath();
      g.arc(cx,cy,roadW*0.9,0,Math.PI*2);
      g.stroke();
    }

    // centerlines
    g.lineWidth = Math.max(1, Math.floor(size*0.04));
    g.strokeStyle = 'rgba(255,255,255,0.95)';
    g.setLineDash([Math.max(4,size*0.03), Math.max(4,size*0.02)]);
    if (top){
      g.beginPath(); g.moveTo(cx, cy-2); g.lineTo(cx, 2); g.stroke();
    }
    if (bottom){
      g.beginPath(); g.moveTo(cx, cy+2); g.lineTo(cx, size-2); g.stroke();
    }
    if (left){
      g.beginPath(); g.moveTo(2, cy); g.lineTo(cx-2, cy); g.stroke();
    }
    if (right){
      g.beginPath(); g.moveTo(cx+2, cy); g.lineTo(size-2, cy); g.stroke();
    }
    g.setLineDash([]);

    // border
    g.strokeStyle = 'rgba(0,0,0,0.2)';
    g.strokeRect(0.5,0.5,size-1,size-1);
    return c;
  }

  // Generate tiled grid honoring Wang matching rules
  function generateGrid(){
    const grid = Array.from({length:SIZE_TILES},()=>Array(SIZE_TILES).fill(0));
    for (let y=0;y<SIZE_TILES;y++){
      for (let x=0;x<SIZE_TILES;x++){
        const topConstraint = (y>0) ? ((grid[y-1][x]>>2)&1) : null;   // above.bottom
        const leftConstraint = (x>0) ? ((grid[y][x-1]>>1)&1) : null; // left.neighbor.right
        const candidates = [];
        for (let id=0; id<16; id++){
          const top = (id>>0)&1;
          const left = (id>>3)&1;
          if ((topConstraint===null || top === topConstraint) && (leftConstraint===null || left === leftConstraint)){
            candidates.push(id);
          }
        }
        grid[y][x] = candidates[Math.floor(Math.random()*candidates.length)];
      }
    }
    return grid;
  }

  // Helper: find tiles that have center road (id != 0)
  function hasRoad(id){ return id !== 0; }

  // Entities: cars, locations
  let grid = null;
  let roadTiles = []; // list of {x,y}
  let tileSeed = {hue: 110 + Math.floor(Math.random()*80)};
  makeTilesAndGrid();

  function makeTilesAndGrid(){
    tileSeed = {hue: 80 + Math.floor(Math.random()*120)};
    makeTiles(tileSeed);
    grid = generateGrid();
    updateRoadTiles();
  }

  function updateRoadTiles(){
    roadTiles = [];
    for (let y=0;y<SIZE_TILES;y++) for (let x=0;x<SIZE_TILES;x++){
      if (hasRoad(grid[y][x])) roadTiles.push({x,y});
    }
    if (roadTiles.length === 0){
      // ensure at least one road tile by flipping one random
      const rx = Math.floor(Math.random()*SIZE_TILES), ry = Math.floor(Math.random()*SIZE_TILES);
      grid[ry][rx] = 1 | 2 | 4 | 8;
      updateRoadTiles();
    }
  }

  function tileToCenter(tx,ty){
    return { x: tx * TILE_PX + TILE_PX/2, y: ty * TILE_PX + TILE_PX/2 };
  }

  // Cars
  let cars = [];
  let playerCarIndex = null;

  function spawnCars(count){
    cars = [];
    const used = new Set();
    const n = Math.max(1, Math.min(16, count));
    for (let i=0;i<n;i++){
      // pick random road tile that is not used (or allow reuse)
      const t = roadTiles[Math.floor(Math.random()*roadTiles.length)];
      const center = tileToCenter(t.x, t.y);
      // jitter within center area
      const jitter = TILE_PX * 0.18;
      const pos = { x: center.x + randRange(-jitter, jitter), y: center.y + randRange(-jitter, jitter) };
      const col = randomColor();
      const car = {
        id: i,
        x: pos.x, y: pos.y,
        vx: 0, vy: 0,
        angle: Math.random()*Math.PI*2,
        color: col,
        target: pickRandomRoadCenter(),
        speed: 60 + Math.random()*60,
        isPlayer: false
      };
      cars.push(car);
    }
    // assign player car randomly
    playerCarIndex = Math.floor(Math.random()*cars.length);
    if (cars.length>0) cars[playerCarIndex].isPlayer = true;
    refreshCarsList();
  }

  // Locations (initial: post office, movie theater, restaurant)
  let locations = [];
  function placeRandomLocation(type, name){
    // choose a random tile (any)
    const tx = Math.floor(Math.random()*SIZE_TILES);
    const ty = Math.floor(Math.random()*SIZE_TILES);
    const center = tileToCenter(tx, ty);
    const entry = {
      id: 'loc_' + Math.random().toString(36).slice(2,9),
      type: type,
      name: name || (type === 'post' ? 'Post Office' : type === 'theater' ? 'Movie Theater' : type === 'restaurant' ? 'Restaurant' : 'Place'),
      tx, ty,
      x: center.x, y: center.y
    };
    locations.push(entry);
    return entry;
  }

  // Pre-place three locations
  function placeDefaultLocations(){
    locations = [];
    placeRandomLocation('post','Post Office');
    placeRandomLocation('theater','Movie Theater');
    placeRandomLocation('restaurant','Restaurant');
    refreshLocationsList();
  }

  // Utils
  function randRange(a,b){ return a + Math.random()*(b-a); }
  function randomColor(){
    const h = Math.floor(Math.random()*360);
    const s = 70 + Math.floor(Math.random()*20);
    const l = 45 + Math.floor(Math.random()*10);
    return `hsl(${h} ${s}% ${l}%)`;
  }
  function pickRandomRoadCenter(){
    const t = roadTiles[Math.floor(Math.random()*roadTiles.length)];
    return tileToCenter(t.x,t.y);
  }

  // Movement/AI
  function update(dt){
    // other cars drive toward their target center; pick new when close
    for (let i=0;i<cars.length;i++){
      const c = cars[i];
      if (c.isPlayer) continue; // player controlled separately
      if (!c.target) c.target = pickRandomRoadCenter();
      const dx = c.target.x - c.x, dy = c.target.y - c.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 6){
        c.target = pickRandomRoadCenter();
      } else {
        const dirx = dx / d, diry = dy / d;
        const speed = c.speed;
        c.vx = dirx * speed;
        c.vy = diry * speed;
        c.x += c.vx * dt;
        c.y += c.vy * dt;
        c.angle = Math.atan2(c.vy, c.vx);
      }
      // remain within bounds
      c.x = Math.max(6, Math.min(BOARD_PX-6, c.x));
      c.y = Math.max(6, Math.min(BOARD_PX-6, c.y));
    }

    // Player car movement controlled by keys
    if (playerCarIndex !== null && cars[playerCarIndex]){
      const pc = cars[playerCarIndex];
      // acceleration applied via input
      const accel = 260;
      const maxSpeed = 220;
      const friction = 200;
      if (input.up) { pc.vx += Math.cos(pc.angle)*accel*dt; pc.vy += Math.sin(pc.angle)*accel*dt; }
      if (input.down) { pc.vx -= Math.cos(pc.angle)*accel*dt*0.8; pc.vy -= Math.sin(pc.angle)*accel*dt*0.8; }
      if (input.left) pc.angle -= 2.6 * dt;
      if (input.right) pc.angle += 2.6 * dt;
      // limit speed
      let sp = Math.sqrt(pc.vx*pc.vx + pc.vy*pc.vy);
      if (sp > maxSpeed){ pc.vx = (pc.vx/sp)*maxSpeed; pc.vy = (pc.vy/sp)*maxSpeed; }
      // friction
      if (!input.up && !input.down){
        const dec = Math.max(0, sp - friction*dt);
        if (sp > 0.001){
          pc.vx *= dec/sp;
          pc.vy *= dec/sp;
        }
      }
      pc.x += pc.vx * dt;
      pc.y += pc.vy * dt;
      pc.x = Math.max(6, Math.min(BOARD_PX-6, pc.x));
      pc.y = Math.max(6, Math.min(BOARD_PX-6, pc.y));
    }
  }

  // Rendering
  function render(){
    ctx.clearRect(0,0,BOARD_PX,BOARD_PX);
    // draw grid tiles
    for (let y=0;y<SIZE_TILES;y++){
      for (let x=0;x<SIZE_TILES;x++){
        const id = grid[y][x];
        const img = tileImages[id];
        ctx.drawImage(img, x*TILE_PX, y*TILE_PX, TILE_PX, TILE_PX);
      }
    }
    // draw POIs (locations)
    for (const loc of locations){
      drawLocation(loc);
    }
    // draw cars (non-player first)
    for (let i=0;i<cars.length;i++){
      if (cars[i].isPlayer) continue;
      drawCar(cars[i]);
    }
    // draw player car on top
    if (playerCarIndex !== null && cars[playerCarIndex]) drawCar(cars[playerCarIndex], true);
    // grid overlay
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 1;
    for (let i=0;i<=SIZE_TILES;i++){
      ctx.beginPath(); ctx.moveTo(0,i*TILE_PX+0.5); ctx.lineTo(BOARD_PX, i*TILE_PX+0.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(i*TILE_PX+0.5,0); ctx.lineTo(i*TILE_PX+0.5, BOARD_PX); ctx.stroke();
    }
  }

  function drawCar(car, highlight=false){
    const w = TILE_PX * 0.5;
    const h = TILE_PX * 0.28;
    ctx.save();
    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);
    // body
    ctx.fillStyle = car.color;
    roundRect(ctx, -w/2, -h/2, w, h, Math.min(8, h/2));
    ctx.fill();
    // windows
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(-w*0.12, -h*0.28, w*0.4, h*0.28);
    ctx.fillRect(w*0.02, -h*0.28, w*0.28, h*0.28);
    // wheels
    ctx.fillStyle = '#111';
    ctx.fillRect(-w*0.42, h*0.28, w*6/20, h*0.22);
    ctx.fillRect(w*0.18, h*0.28, w*6/20, h*0.22);
    if (highlight){
      ctx.strokeStyle = 'rgba(255,255,0,0.9)';
      ctx.lineWidth = 2;
      ctx.strokeRect(-w/2-3, -h/2-3, w+6, h+6);
    }
    ctx.restore();
  }

  function drawLocation(loc){
    const x = loc.x, y = loc.y;
    const r = TILE_PX*0.28;
    ctx.save();
    ctx.translate(x,y);
    // icon background
    ctx.beginPath();
    ctx.fillStyle = (loc.type==='post' ? 'rgba(30,120,200,0.95)' : loc.type==='theater' ? 'rgba(200,60,60,0.95)' : loc.type==='restaurant' ? 'rgba(220,150,40,0.95)' : 'rgba(120,120,160,0.95)');
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fill();
    // icon glyph
    ctx.fillStyle = 'white';
    ctx.font = `${Math.max(10, Math.floor(r*0.6))}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const glyph = loc.type==='post' ? '✉' : loc.type==='theater' ? '🎬' : loc.type==='restaurant' ? '🍴' : '★';
    ctx.fillText(glyph, 0, 0);
    // label
    ctx.font = '12px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.textAlign = 'center';
    ctx.fillText(loc.name, 0, r + 12);
    ctx.restore();
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  // Input
  const input = {up:false,down:false,left:false,right:false};
  window.addEventListener('keydown',e=>{
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') input.up=true;
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') input.down=true;
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left=true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right=true;
  });
  window.addEventListener('keyup',e=>{
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') input.up=false;
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') input.down=false;
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left=false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right=false;
  });

  // Canvas click: pick nearest location if clicked nearby, otherwise do nothing
  canvas.addEventListener('click', (ev)=>{
    const rect = canvas.getBoundingClientRect();
    const mx = (ev.clientX - rect.left) * (canvas.width / rect.width) / (canvas.width / canvas.width) ;
    const my = (ev.clientY - rect.top) * (canvas.height / rect.height) / (canvas.height / canvas.height) ;
    // convert from CSS to canvas coordinate (already 1:1 because we sized canvas)
    const cx = ev.clientX - rect.left;
    const cy = ev.clientY - rect.top;
    // check locations
    for (const loc of locations){
      const dx = loc.x - cx, dy = loc.y - cy;
      if (Math.sqrt(dx*dx+dy*dy) < TILE_PX*0.4){
        // teleport player to this location
        if (playerCarIndex !== null && cars[playerCarIndex]){
          cars[playerCarIndex].x = loc.x;
          cars[playerCarIndex].y = loc.y;
          cars[playerCarIndex].vx = cars[playerCarIndex].vy = 0;
        }
        return;
      }
    }
  });

  // UI: locations list
  const locListDiv = document.getElementById('locList');
  function refreshLocationsList(){
    locListDiv.innerHTML = '';
    for (const loc of locations){
      const item = document.createElement('div'); item.className = 'loc-item';
      const nameInput = document.createElement('input'); nameInput.className = 'name';
      nameInput.value = loc.name;
      nameInput.addEventListener('change', ()=>{ loc.name = nameInput.value; });
      const typeSelect = document.createElement('select');
      typeSelect.innerHTML = '<option value="post">Post Office</option><option value="theater">Movie Theater</option><option value="restaurant">Restaurant</option><option value="custom">Custom</option>';
      typeSelect.value = loc.type;
      typeSelect.addEventListener('change', ()=>{ loc.type = typeSelect.value; });
      const gotoBtn = document.createElement('button'); gotoBtn.textContent = 'Go';
      gotoBtn.title = 'Teleport player car here';
      gotoBtn.addEventListener('click', ()=>{ if (playerCarIndex !== null && cars[playerCarIndex]){ cars[playerCarIndex].x = loc.x; cars[playerCarIndex].y = loc.y; cars[playerCarIndex].vx=0; cars[playerCarIndex].vy=0; } });
      const delBtn = document.createElement('button'); delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', ()=>{ locations = locations.filter(l=>l.id!==loc.id); refreshLocationsList(); });
      item.appendChild(nameInput);
      item.appendChild(typeSelect);
      item.appendChild(gotoBtn);
      item.appendChild(delBtn);
      locListDiv.appendChild(item);
    }
  }

  // Cars list UI
  const carsListDiv = document.getElementById('carsList');
  function refreshCarsList(){
    carsListDiv.innerHTML = '';
    for (let i=0;i<cars.length;i++){
      const c = cars[i];
      const item = document.createElement('div'); item.className='car-item';
      const sw = document.createElement('div'); sw.className='color-swatch'; sw.style.background = c.color;
      const name = document.createElement('div'); name.style.flex='1'; name.textContent = 'Car ' + c.id + (c.isPlayer ? ' (player)' : '');
      const selBtn = document.createElement('button'); selBtn.textContent = 'Set Player';
      selBtn.addEventListener('click', ()=>{ setPlayerIndex(i); });
      const tpBtn = document.createElement('button'); tpBtn.textContent = 'Teleport';
      tpBtn.addEventListener('click', ()=>{ if (playerCarIndex !== null && cars[playerCarIndex]){ cars[playerCarIndex].x = c.x; cars[playerCarIndex].y = c.y; cars[playerCarIndex].vx=0; cars[playerCarIndex].vy=0; } });
      item.appendChild(sw); item.appendChild(name); item.appendChild(selBtn); item.appendChild(tpBtn);
      carsListDiv.appendChild(item);
    }
  }

  function setPlayerIndex(idx){
    if (playerCarIndex !== null && cars[playerCarIndex]) cars[playerCarIndex].isPlayer = false;
    playerCarIndex = idx;
    if (cars[playerCarIndex]) cars[playerCarIndex].isPlayer = true;
    refreshCarsList();
  }

  // UI buttons hooks
  document.getElementById('addLoc').addEventListener('click', ()=>{
    const type = document.getElementById('newType').value;
    const nameVal = document.getElementById('newName').value.trim();
    const chosenName = nameVal || (type === 'post' ? 'Post Office' : type === 'theater' ? 'Movie Theater' : type === 'restaurant' ? 'Restaurant' : 'Place');
    const newLoc = placeRandomLocation(type, chosenName);
    refreshLocationsList();
  });

  document.getElementById('regenTiles').addEventListener('click', ()=>{
    makeTiles({hue: 80 + Math.floor(Math.random()*120)});
    render();
  });
  document.getElementById('regenMap').addEventListener('click', ()=>{
    makeTilesAndGrid();
    placeDefaultLocations();
    spawnCars(1 + Math.floor(Math.random()*16));
    render();
  });
  document.getElementById('respawnCars').addEventListener('click', ()=>{
    spawnCars(1 + Math.floor(Math.random()*16));
    refreshCarsList();
  });
  document.getElementById('centerPlayer').addEventListener('click', ()=>{
    if (playerCarIndex !== null && cars[playerCarIndex]){
      const c = cars[playerCarIndex];
      // center view is trivial since full map shown; instead slightly nudge to tile center
      c.x = Math.max(6, Math.min(BOARD_PX-6, c.x));
      c.y = Math.max(6, Math.min(BOARD_PX-6, c.y));
    }
  });

  document.getElementById('pickNext').addEventListener('click', ()=>{
    if (cars.length === 0) return;
    const next = (playerCarIndex === null) ? 0 : (playerCarIndex + 1) % cars.length;
    setPlayerIndex(next);
  });
  document.getElementById('removePlayer').addEventListener('click', ()=>{
    if (playerCarIndex !== null && cars[playerCarIndex]) cars[playerCarIndex].isPlayer = false;
    playerCarIndex = null;
    refreshCarsList();
  });

  // initial spawn
  makeTilesAndGrid();
  placeDefaultLocations();
  spawnCars(3 + Math.floor(Math.random()*6));
  refreshCarsList();

  // Main loop
  let last = performance.now();
  function loop(now){
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // Helpers final
  function makeTiles(seed){
    makeTiles = function(){}; // placeholder to avoid redefinition in scope
    // create tiles using earlier function (redeclared here)
    tileImages = [];
    for (let id=0; id<16; id++){
      tileImages.push(drawTile(id, TILE_PX, seed));
    }
    // reassign actual function to allow later calls
    makeTiles = function(s){ tileImages = []; for (let id=0; id<16; id++) tileImages.push(drawTile(id, TILE_PX, s)); };
    // first invocation: done
  }
  // Provide initial definition (overriden above)
  makeTiles = (seed) => {
    tileImages = [];
    for (let id=0; id<16; id++){
      tileImages.push(drawTile(id, TILE_PX, seed));
    }
  };

})();
</script>
</body>
</html>
