<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Graph Window Launcher</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:#222;color:#eee}
  .toolbar{display:flex;gap:8px;padding:12px;background:#111;border-bottom:1px solid #333;align-items:center}
  .btn{background:#2b2b2b;border:1px solid #444;color:#ddd;padding:8px 12px;border-radius:4px;cursor:pointer}
  .btn:hover{background:#3a3a3a}
  .center{display:flex;align-items:center;justify-content:center;height:calc(100% - 54px)}
  .note{opacity:0.85;font-size:14px}
  .example-window{width:800px;height:520px;border:1px solid #444;border-radius:6px;overflow:hidden;background:#1a1a1a;box-shadow:0 6px 24px rgba(0,0,0,.6)}
  .win-header{height:34px;background:linear-gradient(#252525,#1b1b1b);display:flex;align-items:center;justify-content:space-between;padding:4px 8px;color:#ddd;border-bottom:1px solid #2e2e2e}
  .win-title{font-size:13px}
  .win-controls{display:flex;align-items:center;gap:8px}
  .close-x{width:28px;height:28px;border-radius:4px;background:#2f2f2f;color:#ffdddd;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:bold}
  .close-x:hover{background:#ff4d4d;color:#fff;box-shadow:0 0 10px rgba(255,77,77,.2)}
  .subtle-btn{background:#222;border:1px solid #333;color:#ddd;padding:6px 10px;border-radius:4px;cursor:pointer}
  canvas{display:block;width:100%;height:100%;background:#0b0b0b}
  .win-body{height:calc(100% - 34px);position:relative}
</style>
</head>
<body>
  <div class="toolbar">
    <button class="btn" id="newGraphMain">New Graph</button>
    <div class="note">Click "New Graph" to open a graph window. Graph windows have an "X" in the upper-right to close them.</div>
  </div>
  <div class="center">
    <div class="example-window" id="examplePreview" aria-hidden="true">
      <div class="win-header">
        <div class="win-title">Graph Preview</div>
        <div class="win-controls">
          <button class="subtle-btn" id="previewNew">New Graph</button>
          <div class="close-x" id="previewX" title="Close window (will try to close the browser window if this is a popup)">×</div>
        </div>
      </div>
      <div class="win-body">
        <canvas id="previewCanvas"></canvas>
      </div>
    </div>
  </div>

<script>
(function(){

  // Graph window HTML template as a string.
  // The <\/script> sequence is escaped so this script can include it safely.
  function getGraphWindowHTML(title){
    var html = ''
    + '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">'
    + '<title>' + (title || 'Graph Window') + '</title>'
    + '<style>'
    + 'html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:#111;color:#eee}'
    + '.win-root{height:100%;display:flex;flex-direction:column}'
    + '.win-header{height:42px;background:linear-gradient(#222,#151515);display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #222}'
    + '.title{font-size:14px}'
    + '.controls{display:flex;gap:8px;align-items:center}'
    + '.btn{background:#272727;border:1px solid #3a3a3a;color:#ddd;padding:6px 10px;border-radius:4px;cursor:pointer}'
    + '.btn:hover{background:#333}'
    + '.close-x{width:36px;height:36px;border-radius:6px;background:#2f2f2f;color:#ffdddd;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:bold;font-size:18px}'
    + '.close-x:hover{background:#ff4d4d;color:#fff;box-shadow:0 0 12px rgba(255,77,77,.2)}'
    + '.canvas-wrap{flex:1;background:#050505;display:block;position:relative}'
    + 'canvas{position:absolute;inset:0;width:100%;height:100%;display:block}'
    + '</style></head><body>'
    + '<div class="win-root">'
      + '<div class="win-header">'
        + '<div class="title">' + (title || 'Graph Window') + '</div>'
        + '<div class="controls">'
          + '<button class="btn" id="newGraphBtn">New Graph</button>'
          + '<div class="close-x" id="closeBtn" title="Close window">×</div>'
        + '</div>'
      + '</div>'
      + '<div class="canvas-wrap"><canvas id="graphCanvas"></canvas></div>'
    + '</div>'

    + '<script>'
    + '(()=>{'
      + 'const canvas = document.getElementById("graphCanvas");'
      + 'const ctx = canvas.getContext("2d");'
      + 'function resize(){canvas.width = canvas.clientWidth * devicePixelRatio; canvas.height = canvas.clientHeight * devicePixelRatio; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); draw();}'
      + 'window.addEventListener("resize", resize);'
      + 'let t=0, points = [];'
      + 'function generatePoints(){ points=[]; const w = canvas.clientWidth; for(let x=0;x<w;x+=2){ const y = 120 + Math.sin((x/40)+t)*60 + (Math.cos((x/25)+t*0.7)*30); points.push({x,y}); } }'
      + 'function draw(){ const w=canvas.clientWidth, h=canvas.clientHeight; ctx.clearRect(0,0,w,h);'
        + '// Grid'
        + 'ctx.strokeStyle = "#1f1f1f"; ctx.lineWidth = 1;'
        + 'for(let gx=0;gx<w;gx+=40){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,h); ctx.stroke(); }'
        + 'for(let gy=0;gy<h;gy+=40){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(w,gy); ctx.stroke(); }'
        + '// Graph'
        + 'ctx.lineWidth = 2.5; ctx.strokeStyle = "#00e5ff"; ctx.beginPath();'
        + 'for(let i=0;i<points.length;i++){ const p=points[i]; if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); } ctx.stroke();'
        + '// Fill gradient'
        + 'const grad = ctx.createLinearGradient(0,0,0,h); grad.addColorStop(0,"rgba(0,230,255,0.12)"); grad.addColorStop(1,"rgba(0,230,255,0.02)"); ctx.fillStyle = grad; ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath(); ctx.fill();'
        + '// Axis labels'
        + 'ctx.fillStyle="#9aa7b0"; ctx.font="12px Arial"; ctx.fillText("t=" + t.toFixed(2), 12, 18);'
      + '}'
      + 'function step(){ t += 0.03; generatePoints(); draw(); requestAnimationFrame(step); }'
      + 'resize(); step();'
      + 'document.getElementById("closeBtn").addEventListener("click", ()=>{ try{ window.close(); }catch(e){ /* ignore */ } });'
      + 'document.getElementById("newGraphBtn").addEventListener("click", ()=>{ try{ window.open(window.location.href, "_blank", "width=900,height=560"); }catch(e){ /* ignore */ } });'
    + '})();'
    + '<\/script></body></html>';

    return html;
  }

  // Open a new graph window and write the generated HTML into it.
  function openGraphWindow(){
    var w = window.open('', '_blank', 'width=900,height=560');
    if(!w){
      alert('Popup blocked: please allow popups for this page to spawn graph windows.');
      return;
    }
    var title = 'Graph Window';
    var content = getGraphWindowHTML(title);
    w.document.open();
    w.document.write(content);
    w.document.close();
  }

  // Wire main UI
  document.getElementById('newGraphMain').addEventListener('click', openGraphWindow);
  document.getElementById('previewNew').addEventListener('click', openGraphWindow);

  // Preview canvas inside the main page example window
  (function preview(){
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    function resize(){ canvas.width = canvas.clientWidth * devicePixelRatio; canvas.height = canvas.clientHeight * devicePixelRatio; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
    let t=0;
    function draw(){
      const w=canvas.clientWidth, h=canvas.clientHeight;
      ctx.clearRect(0,0,w,h);
      ctx.fillStyle="#070707"; ctx.fillRect(0,0,w,h);
      ctx.strokeStyle="#1f1f1f";
      ctx.lineWidth=1;
      for(let gx=0;gx<w;gx+=40){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,h); ctx.stroke(); }
      for(let gy=0;gy<h;gy+=40){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(w,gy); ctx.stroke(); }
      ctx.lineWidth=2.2; ctx.strokeStyle="#80f5ff"; ctx.beginPath();
      for(let x=0;x<w;x+=2){ const y = (h/2) + Math.sin((x/30)+t)*50 + Math.cos((x/18)+t*0.6)*22; if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
      ctx.stroke();
      t += 0.04;
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize);
    resize(); draw();
  })();

  // Allow closing the main preview's "window" element: attempt to close the browser window if possible, otherwise hide the preview.
  document.getElementById('previewX').addEventListener('click', function(){
    try{
      // Attempt to close the whole browser window (works if this page was opened by script)
      window.close();
      // In case window.close() is suppressed, hide the preview as a fallback.
      setTimeout(function(){
        var root = document.getElementById('examplePreview');
        if(root && root.parentNode) root.style.display = 'none';
      }, 100);
    }catch(e){
      var root = document.getElementById('examplePreview');
      if(root) root.style.display = 'none';
    }
  });

})();
</script>
</body>
</html>
