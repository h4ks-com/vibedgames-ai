<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ballad of Handyc — RPG Side-Scroller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; overflow:hidden; font-family:'Press Start 2P',monospace; }
  canvas { display:block; margin:0 auto; image-rendering:pixelated; }
  #ui-overlay {
    position:fixed; top:0; left:50%; transform:translateX(-50%);
    width:800px; max-width:100%; pointer-events:none; z-index:10;
  }
  #dialog-box {
    display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    width:740px; max-width:calc(100% - 40px); background:rgba(10,5,20,0.95);
    border:3px solid #d4a853; border-radius:8px; padding:20px 24px;
    color:#e8dcc8; font-family:'Press Start 2P',monospace; font-size:11px;
    line-height:1.8; z-index:20; pointer-events:auto;
  }
  #dialog-box .speaker { color:#d4a853; font-size:10px; margin-bottom:8px; }
  #dialog-box .text { color:#ccc; }
  #dialog-box .continue { color:#666; font-size:8px; text-align:right; margin-top:10px; animation:blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #start-screen {
    position:fixed; inset:0; background:rgba(0,0,0,0.92);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; color:#e8dcc8; font-family:'Press Start 2P',monospace; text-align:center;
  }
  #start-screen h1 { color:#d4a853; font-size:24px; margin-bottom:10px; text-shadow:0 0 20px rgba(212,168,83,0.5); }
  #start-screen .sub { color:#8a7a5a; font-size:10px; margin-bottom:30px; }
  #start-screen .emoji { font-size:60px; margin:20px 0; }
  #start-screen button {
    background:none; border:2px solid #d4a853; color:#d4a853; padding:14px 30px;
    font-family:'Press Start 2P',monospace; font-size:12px; cursor:pointer;
    transition:all 0.3s; margin-top:10px;
  }
  #start-screen button:hover { background:#d4a853; color:#1a1208; }
  #start-screen .controls { color:#555; font-size:8px; margin-top:25px; line-height:2; }
  #hud {
    position:fixed; top:10px; left:50%; transform:translateX(-50%);
    display:none; width:780px; max-width:calc(100% - 20px); z-index:15;
    pointer-events:none;
  }
  .hud-row { display:flex; justify-content:space-between; align-items:center; }
  .hp-bar-outer { width:200px; height:16px; background:#1a1a2e; border:2px solid #333; border-radius:3px; overflow:hidden; }
  .hp-bar-inner { height:100%; background:linear-gradient(90deg,#cc3333,#44cc44); transition:width 0.5s; }
  .hud-text { color:#d4a853; font-family:'Press Start 2P',monospace; font-size:9px; text-shadow:0 0 5px rgba(0,0,0,0.8); }
  .level-text { color:#88aaff; font-family:'Press Start 2P',monospace; font-size:9px; }
  #vol-btn {
    position:fixed; top:10px; right:15px; z-index:30; background:rgba(0,0,0,0.7);
    border:1px solid #333; color:#888; font-size:16px; cursor:pointer;
    padding:6px 10px; border-radius:4px; font-family:monospace;
  }
</style>
</head>
<body>

<div id="start-screen">
  <div class="emoji">🧛</div>
  <h1>THE BALLAD OF HANDYC</h1>
  <p class="sub">An RPG Side-Scroller</p>
  <p style="color:#666;font-size:9px;margin-bottom:20px;">A tale of wallet cards, vampirism,<br>and the 10 best jokes in the world</p>
  <button onclick="startGame()">▶ START GAME</button>
  <div class="controls">
    ← → Arrow Keys: Move &nbsp;|&nbsp; SPACE: Jump &nbsp;|&nbsp; Z: Attack<br>
    ENTER: Continue Dialog &nbsp;|&nbsp; Collect 💾 drives to progress!
  </div>
</div>

<div id="hud">
  <div class="hud-row">
    <span class="hud-text">🧛 HANDYC</span>
    <span class="level-text" id="level-display">LEVEL 1: THE LOBBY</span>
    <span class="hud-text">💾 <span id="drive-count">0</span>/5</span>
  </div>
  <div class="hud-row" style="margin-top:4px;">
    <div class="hp-bar-outer"><div class="hp-bar-inner" id="hp-bar" style="width:100%"></div></div>
    <span class="hud-text" id="hp-text" style="font-size:8px;">HP 100/100</span>
  </div>
</div>

<div id="dialog-box">
  <div class="speaker" id="dlg-speaker"></div>
  <div class="text" id="dlg-text"></div>
  <div class="continue">▼ ENTER to continue</div>
</div>

<button id="vol-btn" onclick="toggleMute()">🔊</button>

<canvas id="game"></canvas>

<script>
// ─── AUDIO ENGINE ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx, masterGain, musicGain, sfxGain;
let muted = false;

// Voice URLs from plaudio
const VOICES = {
  intro: 'https://s.h4ks.com/G8J.mp3',
  handyc_card: 'https://s.h4ks.com/G8I.mp3',
  mattf_drives: 'https://s.h4ks.com/G8H.mp3',
  handyc_wallet: 'https://s.h4ks.com/G8L.mp3',
  vampire_era: 'https://s.h4ks.com/G8M.mp3',
  mattf_scream: 'https://s.h4ks.com/G8K.mp3',
  handyc_format: 'https://s.h4ks.com/G8O.mp3',
  ending: 'https://s.h4ks.com/G8N.mp3',
};

function initAudio() {
  actx = new AudioCtx();
  masterGain = actx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(actx.destination);
  musicGain = actx.createGain();
  musicGain.gain.value = 0.25;
  musicGain.connect(masterGain);
  sfxGain = actx.createGain();
  sfxGain.gain.value = 0.5;
  sfxGain.connect(masterGain);
}

function toggleMute() {
  muted = !muted;
  if(masterGain) masterGain.gain.value = muted ? 0 : 0.7;
  document.getElementById('vol-btn').textContent = muted ? '🔇' : '🔊';
}

function playVoice(url) {
  if(!actx) return;
  const a = new Audio(url);
  a.volume = muted ? 0 : 0.8;
  a.play().catch(()=>{});
}

function playSfx(type) {
  if(!actx) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.connect(g); g.connect(sfxGain);
  const t = actx.currentTime;
  if(type==='jump') {
    o.type='square'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(600,t+0.15);
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.2);
    o.start(t); o.stop(t+0.2);
  } else if(type==='hit') {
    o.type='sawtooth'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(50,t+0.2);
    g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.25);
    o.start(t); o.stop(t+0.25);
  } else if(type==='collect') {
    o.type='sine'; o.frequency.setValueAtTime(523,t); o.frequency.setValueAtTime(659,t+0.1); o.frequency.setValueAtTime(784,t+0.2);
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.35);
    o.start(t); o.stop(t+0.35);
  } else if(type==='attack') {
    o.type='square'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(100,t+0.1);
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.12);
    o.start(t); o.stop(t+0.12);
  }
}

// ─── SYNTHESIZED SOUNDTRACK ───
let musicPlaying = false;
let musicNodes = [];

function startMusic() {
  if(!actx || musicPlaying) return;
  musicPlaying = true;
  // Dark RPG melody loop using Web Audio
  const bpm = 90;
  const beat = 60/bpm;
  // Notes: minor key RPG feel (Am - Dm - Em - Am)
  const bassNotes = [110, 110, 146.83, 146.83, 164.81, 164.81, 110, 110,
                     130.81, 130.81, 116.54, 116.54, 98, 98, 110, 110];
  const melodyNotes = [440,0,523.25,0,587.33,0,523.25,440,
                       329.63,0,392,0,440,0,392,329.63,
                       349.23,0,440,0,493.88,0,440,349.23,
                       293.66,0,349.23,0,329.63,0,261.63,0];

  function playLoop() {
    if(!musicPlaying || !actx) return;
    const t = actx.currentTime;
    // Bass
    const bassOsc = actx.createOscillator();
    const bassG = actx.createGain();
    bassOsc.type = 'triangle';
    bassOsc.connect(bassG); bassG.connect(musicGain);
    bassNotes.forEach((n,i) => {
      if(n) { bassOsc.frequency.setValueAtTime(n, t + i*beat*0.5); }
      bassG.gain.setValueAtTime(n ? 0.2 : 0.01, t + i*beat*0.5);
    });
    bassOsc.start(t); bassOsc.stop(t + bassNotes.length*beat*0.5);
    musicNodes.push(bassOsc);

    // Melody
    const melOsc = actx.createOscillator();
    const melG = actx.createGain();
    melOsc.type = 'square';
    const melFilter = actx.createBiquadFilter();
    melFilter.type = 'lowpass'; melFilter.frequency.value = 1200;
    melOsc.connect(melFilter); melFilter.connect(melG); melG.connect(musicGain);
    melodyNotes.forEach((n,i) => {
      if(n) { melOsc.frequency.setValueAtTime(n, t + i*beat*0.5); }
      melG.gain.setValueAtTime(n ? 0.06 : 0.01, t + i*beat*0.5);
    });
    melOsc.start(t); melOsc.stop(t + melodyNotes.length*beat*0.5);
    musicNodes.push(melOsc);

    // Arpeggio pad
    const padOsc = actx.createOscillator();
    const padG = actx.createGain();
    padOsc.type = 'sine';
    const padF = actx.createBiquadFilter();
    padF.type='lowpass'; padF.frequency.value=800; padF.Q.value=5;
    padOsc.connect(padF); padF.connect(padG); padG.connect(musicGain);
    const arpNotes = [220,277.18,329.63,440,329.63,277.18,220,164.81, 261.63,329.63,392,523.25,392,329.63,261.63,196];
    arpNotes.forEach((n,i) => {
      padOsc.frequency.setValueAtTime(n, t + i*beat*0.25);
      padG.gain.setValueAtTime(0.04, t + i*beat*0.25);
      padG.gain.exponentialRampToValueAtTime(0.01, t + i*beat*0.25 + beat*0.2);
    });
    padOsc.start(t); padOsc.stop(t + arpNotes.length*beat*0.25);
    musicNodes.push(padOsc);

    // Schedule next loop
    const loopLen = Math.max(bassNotes.length*beat*0.5, melodyNotes.length*beat*0.5) * 1000;
    setTimeout(playLoop, loopLen - 100);
  }
  playLoop();
}

// ─── GAME ENGINE ───
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;
canvas.width = W; canvas.height = H;

// Resize
function resize() {
  const s = Math.min(window.innerWidth/W, window.innerHeight/H, 1);
  canvas.style.width = (W*s)+'px';
  canvas.style.height = (H*s)+'px';
}
resize(); window.addEventListener('resize', resize);

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if(e.code==='Enter' && dialogActive) advanceDialog();
});
window.addEventListener('keyup', e => keys[e.code]=false);

// Game state
let gameStarted = false, gameLevel = 1, drivesCollected = 0, gameOver = false, gameWon = false;
let dialogActive = false, dialogQueue = [], currentDialog = null, dialogCharIdx = 0, dialogTimer = 0;

// Player
const player = {
  x: 100, y: 300, vx: 0, vy: 0, w: 32, h: 48,
  hp: 100, maxHp: 100, grounded: false, facing: 1,
  attacking: false, attackTimer: 0, invincible: 0,
  animFrame: 0, animTimer: 0, walkCycle: 0
};

// Camera
const camera = { x: 0, y: 0 };

// Particles
let particles = [];

// Level data
let platforms = [], enemies = [], collectibles = [], npcs = [], triggers = [];
let bgStars = [];

function initLevel(lvl) {
  platforms = []; enemies = []; collectibles = []; npcs = []; triggers = [];
  player.x = 80; player.y = 300; player.vx = 0; player.vy = 0;
  camera.x = 0; drivesCollected = 0;
  updateHUD();

  if(lvl === 1) {
    gameLevel = 1;
    document.getElementById('level-display').textContent = 'LEVEL 1: THE LOBBY';
    // Ground
    for(let i = 0; i < 60; i++) platforms.push({x:i*80,y:440,w:80,h:60,type:'ground'});
    // Floating platforms
    platforms.push({x:200,y:340,w:120,h:20,type:'float'});
    platforms.push({x:400,y:280,w:120,h:20,type:'float'});
    platforms.push({x:600,y:320,w:120,h:20,type:'float'});
    platforms.push({x:850,y:260,w:100,h:20,type:'float'});
    platforms.push({x:1100,y:300,w:120,h:20,type:'float'});
    platforms.push({x:1400,y:240,w:100,h:20,type:'float'});
    // Drives
    collectibles.push({x:240,y:300,type:'drive',collected:false});
    collectibles.push({x:440,y:240,type:'drive',collected:false});
    collectibles.push({x:880,y:220,type:'drive',collected:false});
    collectibles.push({x:1140,y:260,type:'drive',collected:false});
    collectibles.push({x:1440,y:200,type:'drive',collected:false});
    // Enemies
    enemies.push({x:500,y:392,w:30,h:48,vx:1,alive:true,type:'bot',animT:0});
    enemies.push({x:900,y:392,w:30,h:48,vx:-1,alive:true,type:'bot',animT:0});
    enemies.push({x:1300,y:392,w:30,h:48,vx:1,alive:true,type:'bot',animT:0});
    // NPCs
    npcs.push({x:160,y:392,w:28,h:48,name:'valware',talked:false,animT:0});
    npcs.push({x:1700,y:392,w:28,h:48,name:'mattf',talked:false,animT:0});
    // Triggers
    triggers.push({x:1900,y:0,w:40,h:500,type:'level2',fired:false});
    // Background stars
    for(let i=0;i<80;i++) bgStars.push({x:Math.random()*2400,y:Math.random()*300,s:Math.random()*2+0.5,b:Math.random()});
  } else if(lvl === 2) {
    gameLevel = 2;
    document.getElementById('level-display').textContent = 'LEVEL 2: VAMPIRE ERA';
    player.x = 80;
    for(let i = 0; i < 80; i++) platforms.push({x:i*80,y:440,w:80,h:60,type:'ground'});
    // More complex platforming
    platforms.push({x:180,y:350,w:100,h:20,type:'float'});
    platforms.push({x:350,y:290,w:80,h:20,type:'float'});
    platforms.push({x:500,y:230,w:100,h:20,type:'float'});
    platforms.push({x:700,y:310,w:80,h:20,type:'float'});
    platforms.push({x:880,y:250,w:120,h:20,type:'float'});
    platforms.push({x:1100,y:200,w:100,h:20,type:'float'});
    platforms.push({x:1300,y:280,w:80,h:20,type:'float'});
    platforms.push({x:1500,y:220,w:100,h:20,type:'float'});
    platforms.push({x:1700,y:170,w:120,h:20,type:'float'});
    // Drives
    collectibles.push({x:210,y:310,type:'drive',collected:false});
    collectibles.push({x:540,y:190,type:'drive',collected:false});
    collectibles.push({x:920,y:210,type:'drive',collected:false});
    collectibles.push({x:1140,y:160,type:'drive',collected:false});
    collectibles.push({x:1540,y:180,type:'drive',collected:false});
    // More enemies
    enemies.push({x:400,y:392,w:30,h:48,vx:1.5,alive:true,type:'bot',animT:0});
    enemies.push({x:750,y:392,w:30,h:48,vx:-1.5,alive:true,type:'bot',animT:0});
    enemies.push({x:1000,y:392,w:30,h:48,vx:1,alive:true,type:'bot',animT:0});
    enemies.push({x:1400,y:392,w:30,h:48,vx:-1.2,alive:true,type:'bot',animT:0});
    enemies.push({x:1600,y:392,w:30,h:48,vx:1.3,alive:true,type:'bot',animT:0});
    // NPC
    npcs.push({x:600,y:392,w:28,h:48,name:'mattf2',talked:false,animT:0});
    triggers.push({x:1900,y:0,w:40,h:500,type:'victory',fired:false});
  }
}

// ─── DIALOG SYSTEM ───
function showDialog(speaker, text, voiceUrl, onComplete) {
  dialogQueue.push({speaker, text, voiceUrl, onComplete});
  if(!dialogActive) nextDialog();
}

function nextDialog() {
  if(dialogQueue.length === 0) { dialogActive = false; document.getElementById('dialog-box').style.display='none'; return; }
  currentDialog = dialogQueue.shift();
  dialogActive = true;
  dialogCharIdx = 0;
  dialogTimer = 0;
  document.getElementById('dialog-box').style.display = 'block';
  document.getElementById('dlg-speaker').textContent = currentDialog.speaker;
  document.getElementById('dlg-text').textContent = '';
  if(currentDialog.voiceUrl) playVoice(currentDialog.voiceUrl);
}

function advanceDialog() {
  if(!currentDialog) return;
  if(dialogCharIdx < currentDialog.text.length) {
    dialogCharIdx = currentDialog.text.length;
    document.getElementById('dlg-text').textContent = currentDialog.text;
    return;
  }
  if(currentDialog.onComplete) currentDialog.onComplete();
  nextDialog();
}

function updateDialog(dt) {
  if(!dialogActive || !currentDialog) return;
  dialogTimer += dt;
  if(dialogTimer > 30) {
    dialogTimer = 0;
    dialogCharIdx++;
    if(dialogCharIdx <= currentDialog.text.length) {
      document.getElementById('dlg-text').textContent = currentDialog.text.substring(0, dialogCharIdx);
    }
  }
}

// ─── HUD ───
function updateHUD() {
  const pct = Math.max(0, player.hp / player.maxHp * 100);
  document.getElementById('hp-bar').style.width = pct + '%';
  document.getElementById('hp-text').textContent = `HP ${player.hp}/${player.maxHp}`;
  document.getElementById('drive-count').textContent = drivesCollected;
}

// ─── PARTICLES ───
function spawnParticles(x, y, color, count) {
  for(let i=0;i<count;i++) {
    particles.push({
      x, y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4 - 2,
      life: 30+Math.random()*20, maxLife: 50, color, size: 2+Math.random()*3
    });
  }
}

// ─── PHYSICS & COLLISION ───
function rectCollide(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function updatePlayer(dt) {
  if(dialogActive || gameOver || gameWon) return;

  const speed = 3.5;
  const gravity = 0.5;
  const jumpForce = -10;

  // Movement
  if(keys['ArrowLeft'] || keys['KeyA']) { player.vx = -speed; player.facing = -1; }
  else if(keys['ArrowRight'] || keys['KeyD']) { player.vx = speed; player.facing = 1; }
  else { player.vx *= 0.7; }

  // Jump
  if((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.grounded) {
    player.vy = jumpForce;
    player.grounded = false;
    playSfx('jump');
  }

  // Attack
  if(keys['KeyZ'] && !player.attacking) {
    player.attacking = true;
    player.attackTimer = 15;
    playSfx('attack');
  }

  // Gravity
  player.vy += gravity;

  // Move X
  player.x += player.vx;
  // Collide X with platforms
  platforms.forEach(p => {
    if(rectCollide(player, p)) {
      if(player.vx > 0) player.x = p.x - player.w;
      else if(player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  });

  // Move Y
  player.y += player.vy;
  player.grounded = false;
  platforms.forEach(p => {
    if(rectCollide(player, p)) {
      if(player.vy > 0) { player.y = p.y - player.h; player.vy = 0; player.grounded = true; }
      else if(player.vy < 0) { player.y = p.y + p.h; player.vy = 0; }
    }
  });

  // Attack hitbox
  if(player.attacking) {
    player.attackTimer--;
    if(player.attackTimer <= 0) player.attacking = false;
    const atkBox = {
      x: player.facing > 0 ? player.x + player.w : player.x - 30,
      y: player.y, w: 30, h: player.h
    };
    enemies.forEach(e => {
      if(e.alive && rectCollide(atkBox, e)) {
        e.alive = false;
        spawnParticles(e.x+15, e.y+24, '#ff4444', 10);
        playSfx('hit');
      }
    });
  }

  // Enemy collision
  if(player.invincible > 0) player.invincible--;
  enemies.forEach(e => {
    if(!e.alive) return;
    if(rectCollide(player, e) && player.invincible <= 0 && !player.attacking) {
      player.hp -= 15;
      player.invincible = 45;
      playSfx('hit');
      spawnParticles(player.x+16, player.y+24, '#ff6644', 8);
      updateHUD();
      if(player.hp <= 0) {
        player.hp = 0; gameOver = true;
        showDialog('SYSTEM', 'GAME OVER! Handyc has fallen... Press R to restart.', null);
      }
    }
  });

  // Collectibles
  collectibles.forEach(c => {
    if(c.collected) return;
    const cbox = {x:c.x, y:c.y, w:24, h:24};
    if(rectCollide(player, cbox)) {
      c.collected = true;
      drivesCollected++;
      playSfx('collect');
      spawnParticles(c.x+12, c.y+12, '#44aaff', 8);
      updateHUD();
    }
  });

  // NPC interaction
  if(keys['KeyX'] || keys['Enter']) {
    npcs.forEach(n => {
      if(!n.talked && Math.abs(player.x - n.x) < 60 && Math.abs(player.y - n.y) < 60) {
        n.talked = true;
        if(n.name === 'valware') {
          showDialog('VALWARE', "Why not make it say 'I'm handyc!' instead?", null);
        } else if(n.name === 'mattf') {
          showDialog('MATTF', "Hey handyc, what are you doing with my hard drives?!", VOICES.mattf_drives);
          setTimeout(() => showDialog('HANDYC', "I'm thinking of getting a wallet card. It simply says, You're handyc!", VOICES.handyc_wallet), 4000);
        } else if(n.name === 'mattf2') {
          showDialog('MATTF', "No! Not my files! Not my hard drives!", VOICES.mattf_scream);
          setTimeout(() => showDialog('HANDYC', "Double check you formatted his hard drives.", VOICES.handyc_format), 3000);
        }
      }
    });
    // Don't repeat on hold
    keys['KeyX'] = false;
  }

  // Triggers
  triggers.forEach(t => {
    if(t.fired) return;
    if(rectCollide(player, t)) {
      t.fired = true;
      if(t.type === 'level2') {
        showDialog('NARRATOR', "Handyc has transformed. The vampire era has begun.", VOICES.vampire_era, () => {
          initLevel(2);
        });
      } else if(t.type === 'victory') {
        showDialog('NARRATOR', "One thing remains true. You're handyc.", VOICES.ending, () => {
          gameWon = true;
        });
      }
    }
  });

  // Walk animation
  if(Math.abs(player.vx) > 0.5) {
    player.animTimer++;
    if(player.animTimer > 8) { player.animTimer = 0; player.walkCycle = (player.walkCycle+1)%4; }
  } else {
    player.walkCycle = 0;
  }

  // Camera
  camera.x = player.x - W/2 + player.w/2;
  camera.x = Math.max(0, camera.x);
}

function updateEnemies(dt) {
  enemies.forEach(e => {
    if(!e.alive) return;
    e.x += e.vx;
    e.animT++;
    // Reverse at edges (simple patrol)
    platforms.forEach(p => {
      if(e.y + e.h >= p.y && e.y + e.h <= p.y + 10) {
        if(e.x < p.x || e.x + e.w > p.x + p.w) e.vx *= -1;
      }
    });
  });
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
  });
  particles = particles.filter(p => p.life > 0);
}

// ─── RENDERING ───
function drawBg() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,H);
  if(gameLevel === 1) {
    grad.addColorStop(0, '#0a0520');
    grad.addColorStop(0.6, '#151030');
    grad.addColorStop(1, '#1a1230');
  } else {
    grad.addColorStop(0, '#1a0505');
    grad.addColorStop(0.6, '#200a0a');
    grad.addColorStop(1, '#150808');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Stars
  bgStars.forEach(s => {
    const sx = (s.x - camera.x * 0.1) % W;
    const alpha = 0.3 + Math.sin(Date.now()*0.003 + s.b*10)*0.3;
    ctx.fillStyle = `rgba(255,255,200,${alpha})`;
    ctx.fillRect(sx < 0 ? sx+W : sx, s.y, s.s, s.s);
  });

  // Moon
  ctx.fillStyle = gameLevel === 2 ? '#cc3333' : '#e8e0c0';
  ctx.beginPath();
  ctx.arc(W - 100 - camera.x*0.02, 80, 35, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = gameLevel === 2 ? '#1a0505' : '#0a0520';
  ctx.beginPath();
  ctx.arc(W - 85 - camera.x*0.02, 72, 30, 0, Math.PI*2);
  ctx.fill();
}

function drawPlatforms() {
  platforms.forEach(p => {
    const px = p.x - camera.x, py = p.y - camera.y;
    if(px + p.w < -10 || px > W+10) return;
    if(p.type === 'ground') {
      ctx.fillStyle = '#2a2040';
      ctx.fillRect(px, py, p.w, p.h);
      ctx.fillStyle = '#3a3060';
      ctx.fillRect(px, py, p.w, 4);
      // Grass/dirt
      ctx.fillStyle = '#1a3a1a';
      ctx.fillRect(px, py, p.w, 6);
    } else {
      ctx.fillStyle = '#3a2a50';
      ctx.fillRect(px, py, p.w, p.h);
      ctx.fillStyle = '#5a4a70';
      ctx.fillRect(px, py, p.w, 3);
      ctx.fillStyle = '#2a1a40';
      ctx.fillRect(px+2, py+p.h-2, p.w-4, 2);
    }
  });
}

function drawPlayer() {
  const px = player.x - camera.x, py = player.y - camera.y;

  // Invincibility flash
  if(player.invincible > 0 && Math.floor(player.invincible/3)%2) return;

  ctx.save();
  ctx.translate(px + player.w/2, py + player.h/2);
  if(player.facing < 0) ctx.scale(-1, 1);

  // Body
  ctx.fillStyle = '#cc3333';
  ctx.fillRect(-10, -8, 20, 28);

  // Cape
  ctx.fillStyle = '#222';
  ctx.fillRect(-12, -6, 6, 24);

  // Head
  ctx.fillStyle = '#ddb896';
  ctx.fillRect(-8, -22, 16, 16);

  // Hair
  ctx.fillStyle = '#222';
  ctx.fillRect(-8, -24, 16, 6);

  // Vampire eyes
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(-5, -16, 3, 3);
  ctx.fillRect(2, -16, 3, 3);

  // Fangs
  ctx.fillStyle = '#fff';
  ctx.fillRect(-4, -8, 2, 3);
  ctx.fillRect(2, -8, 2, 3);

  // Legs (animated)
  const legOff = player.walkCycle < 2 ? player.walkCycle * 2 : (4 - player.walkCycle) * 2;
  ctx.fillStyle = '#333';
  ctx.fillRect(-8, 20, 7, 8 + legOff);
  ctx.fillRect(1, 20, 7, 8 - legOff);

  // Attack slash
  if(player.attacking) {
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(10, -15);
    ctx.lineTo(35, -25);
    ctx.lineTo(30, 0);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,200,0,0.3)';
    ctx.beginPath();
    ctx.moveTo(10, -15); ctx.lineTo(40, -10); ctx.lineTo(35, 10); ctx.lineTo(10, 0); ctx.fill();
  }

  ctx.restore();
}

function drawEnemies() {
  enemies.forEach(e => {
    if(!e.alive) return;
    const ex = e.x - camera.x, ey = e.y - camera.y;
    if(ex + e.w < -10 || ex > W+10) return;

    // Bot enemy
    ctx.fillStyle = '#4466aa';
    ctx.fillRect(ex, ey+8, e.w, e.h-8);
    ctx.fillStyle = '#5588cc';
    ctx.fillRect(ex+4, ey, e.w-8, 14);
    // Eyes
    ctx.fillStyle = '#ff3333';
    const blink = Math.sin(e.animT*0.1) > 0.95;
    if(!blink) {
      ctx.fillRect(ex+6, ey+4, 5, 5);
      ctx.fillRect(ex+e.w-11, ey+4, 5, 5);
    }
    // Antenna
    ctx.fillStyle = '#888';
    ctx.fillRect(ex+e.w/2-1, ey-6, 2, 8);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(ex+e.w/2-2, ey-8, 4, 4);
  });
}

function drawCollectibles() {
  collectibles.forEach(c => {
    if(c.collected) return;
    const cx = c.x - camera.x, cy = c.y - camera.y + Math.sin(Date.now()*0.005)*5;
    if(cx < -20 || cx > W+20) return;
    // Drive icon
    ctx.fillStyle = '#3366aa';
    ctx.fillRect(cx+2, cy, 20, 16);
    ctx.fillStyle = '#2255aa';
    ctx.fillRect(cx+4, cy+4, 16, 12);
    ctx.fillStyle = '#44aaff';
    ctx.fillRect(cx+8, cy+6, 8, 4);
    // Label
    ctx.fillStyle = '#fff';
    ctx.font = '10px "Press Start 2P"';
    ctx.fillText('💾', cx+3, cy+14);
    // Glow
    ctx.fillStyle = `rgba(68,170,255,${0.15+Math.sin(Date.now()*0.003)*0.1})`;
    ctx.beginPath();
    ctx.arc(cx+12, cy+10, 18, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawNPCs() {
  npcs.forEach(n => {
    const nx = n.x - camera.x, ny = n.y - camera.y;
    if(nx < -40 || nx > W+40) return;
    n.animT++;

    ctx.save();
    ctx.translate(nx + n.w/2, ny + n.h/2);

    if(n.name === 'valware') {
      // Valware - green character
      ctx.fillStyle = '#33aa55';
      ctx.fillRect(-10, -8, 20, 28);
      ctx.fillStyle = '#ddb896';
      ctx.fillRect(-8, -22, 16, 16);
      ctx.fillStyle = '#885533';
      ctx.fillRect(-9, -24, 18, 6);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-5, -16, 4, 4);
      ctx.fillRect(2, -16, 4, 4);
      ctx.fillStyle = '#333';
      ctx.fillRect(-4, -14, 2, 2);
      ctx.fillRect(3, -14, 2, 2);
      ctx.fillStyle = '#333';
      ctx.fillRect(-8, 20, 7, 8);
      ctx.fillRect(1, 20, 7, 8);
    } else {
      // mattf - blue character
      ctx.fillStyle = '#3355cc';
      ctx.fillRect(-10, -8, 20, 28);
      ctx.fillStyle = '#ddb896';
      ctx.fillRect(-8, -22, 16, 16);
      ctx.fillStyle = '#553322';
      ctx.fillRect(-9, -24, 18, 5);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-5, -16, 4, 4);
      ctx.fillRect(2, -16, 4, 4);
      ctx.fillStyle = '#333';
      ctx.fillRect(-4, -14, 2, 2);
      ctx.fillRect(3, -14, 2, 2);
      ctx.fillStyle = '#223';
      ctx.fillRect(-8, 20, 7, 8);
      ctx.fillRect(1, 20, 7, 8);
      // Mattf has a panic indicator
      if(n.name === 'mattf2') {
        ctx.fillStyle = '#ff4444';
        ctx.font = '12px "Press Start 2P"';
        ctx.fillText('!!', -8, -30);
      }
    }

    // Interaction prompt
    if(!n.talked && Math.abs(player.x - n.x) < 60) {
      ctx.fillStyle = '#d4a853';
      ctx.font = '8px "Press Start 2P"';
      ctx.fillText('ENTER', -20, -34);
    }

    ctx.restore();
  });
}

function drawTriggers() {
  triggers.forEach(t => {
    if(t.fired) return;
    const tx = t.x - camera.x;
    // Glowing portal
    const alpha = 0.3 + Math.sin(Date.now()*0.004)*0.2;
    ctx.fillStyle = `rgba(170,85,255,${alpha})`;
    ctx.fillRect(tx, 0, t.w, H);
    ctx.fillStyle = `rgba(200,100,255,${alpha+0.2})`;
    ctx.fillRect(tx+10, 100, t.w-20, H-200);
    // Arrow
    ctx.fillStyle = '#d4a853';
    ctx.font = '16px "Press Start 2P"';
    ctx.fillText('▶', tx+8, H/2);
  });
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(p.x - camera.x, p.y - camera.y, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#cc3333';
  ctx.font = '24px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2-20);
  ctx.fillStyle = '#888';
  ctx.font = '10px "Press Start 2P"';
  ctx.fillText('Press R to restart', W/2, H/2+20);
  ctx.textAlign = 'left';
}

function drawVictory() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#d4a853';
  ctx.font = '20px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('YOU\'RE HANDYC!', W/2, H/2-40);
  ctx.fillStyle = '#e8dcc8';
  ctx.font = '10px "Press Start 2P"';
  ctx.fillText('The wallet card was never printed.', W/2, H/2);
  ctx.fillText('The joke app was never built.', W/2, H/2+20);
  ctx.fillText('But one thing remains true...', W/2, H/2+50);
  ctx.fillStyle = '#d4a853';
  ctx.font = '14px "Press Start 2P"';
  ctx.fillText('You\'re handyc!', W/2, H/2+80);
  ctx.fillStyle = '#555';
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText('No hard drives were harmed.', W/2, H/2+110);
  ctx.textAlign = 'left';
}

// ─── GAME LOOP ───
function gameLoop() {
  if(!gameStarted) { requestAnimationFrame(gameLoop); return; }

  const dt = 1;

  if(gameOver) {
    if(keys['KeyR']) { gameOver = false; player.hp = player.maxHp; initLevel(gameLevel); updateHUD(); }
  } else if(!gameWon) {
    updatePlayer(dt);
    updateEnemies(dt);
    updateDialog(dt);
  }

  updateParticles();

  // Render
  ctx.clearRect(0,0,W,H);
  drawBg();
  drawPlatforms();
  drawTriggers();
  drawCollectibles();
  drawNPCs();
  drawEnemies();
  if(!gameOver && !gameWon) drawPlayer();
  drawParticles();

  if(gameOver) drawGameOver();
  if(gameWon) drawVictory();

  requestAnimationFrame(gameLoop);
}

// ─── START ───
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  gameStarted = true;
  initAudio();
  startMusic();
  initLevel(1);

  // Intro dialog sequence
  setTimeout(() => {
    showDialog('NARRATOR', "Welcome to the Ballad of Handyc. A tale of wallet cards, vampirism, and the ten best jokes in the world.", VOICES.intro);
    setTimeout(() => showDialog('HANDYC', "You are handyc. I am handyc. Everyone should know it.", VOICES.handyc_card), 6000);
    setTimeout(() => showDialog('NARRATOR', "Use arrow keys to move. SPACE to jump. Z to attack. ENTER to talk to NPCs. Collect all 5 hard drives!", null), 10000);
  }, 500);
}

// Touch controls for mobile
let touchStartX = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (t.clientX - rect.left) / rect.width * W;
  const y = (t.clientY - rect.top) / rect.height * H;
  if(x < W/3) keys['ArrowLeft'] = true;
  else if(x > W*2/3) keys['ArrowRight'] = true;
  if(y < H/2) { keys['Space'] = true; setTimeout(()=>keys['Space']=false,100); }
});

canvas.addEventListener('touchend', e => {
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
});

gameLoop();
</script>
