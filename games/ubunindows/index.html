<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ubunindows — Desktop Mashup</title>
<style>
  :root{
    --accent:#E95420; /* Ubuntu orange */
    --accent-2:#0078D4; /* Windows blue */
    --bg1:linear-gradient(135deg,#0f1724 0%, #08101a 50%, #04202b 100%);
    --glass: rgba(255,255,255,0.06);
    --muted: rgba(255,255,255,0.75);
    --tile: rgba(255,255,255,0.04);
    --round: 12px;
    --taskbar-height:48px;
    --dock-width:72px;
    --shadow: 0 6px 20px rgba(2,6,23,0.6);
  }

  *{box-sizing:border-box;user-select:none}
  html,body{height:100%;margin:0;font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, Ubuntu, sans-serif;background:var(--bg1);color: #e6eef8;overflow:hidden}
  /* wallpaper vibe */
  body::before{
    content:"";
    position:fixed;inset:0;
    background:
      radial-gradient(1200px 600px at 10% 10%, rgba(233,84,32,0.06), transparent),
      radial-gradient(900px 400px at 85% 90%, rgba(0,120,212,0.04), transparent);
    pointer-events:none;
    mix-blend-mode:screen;
  }

  /* Left dock (Ubuntu-like) */
  .dock{
    position:fixed;left:12px;top:50%;transform:translateY(-50%);width:var(--dock-width);
    display:flex;flex-direction:column;gap:10px;padding:10px;border-radius:18px;
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    box-shadow:var(--shadow);backdrop-filter:blur(8px);
    z-index:90;
  }
  .dock .dock-btn{width:52px;height:52px;border-radius:12px;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
  .dock .dock-btn:hover{background:var(--tile)}
  .dock .dot{position:absolute;left:50%;transform:translateX(-50%);bottom:6px;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(233,84,32,0.9)}
  .dock .logo{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;background:linear-gradient(180deg,var(--accent),#c23a12);box-shadow:0 6px 18px rgba(233,84,32,0.18)}

  /* Bottom taskbar (Windows-like) */
  .taskbar{
    position:fixed;left:0;right:0;bottom:0;height:var(--taskbar-height);display:flex;align-items:center;padding:6px 12px;gap:12px;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.18));
    box-shadow:0 -4px 30px rgba(0,0,0,0.6);backdrop-filter: blur(6px);
    z-index:100;align-items:center;
  }
  .start-btn{
    width:44px;height:36px;border-radius:10px;background:linear-gradient(180deg,#0b6cff 0%, #005bb5 100%);display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45), inset 0 -2px 6px rgba(0,0,0,0.2);
  }
  .start-btn .win-pane{width:18px;height:18px;display:grid;grid-template-columns:1fr 1fr;gap:3px}
  .start-btn .win-pane span{display:block;background:linear-gradient(180deg,#fff,#dbeeff);border-radius:2px}

  .taskbar .quick{display:flex;gap:8px;align-items:center}
  .taskbar .quick .quick-icon{width:40px;height:32px;border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .taskbar .tray{margin-left:auto;display:flex;gap:8px;align-items:center}
  .tray .sys{padding:6px 10px;border-radius:8px;background:var(--tile);display:flex;gap:8px;align-items:center}

  /* Start menu */
  .start-menu{
    position:fixed;left:12px;bottom:56px;width:360px;padding:12px;border-radius:14px;background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    box-shadow: 0 20px 50px rgba(2,6,23,0.7);backdrop-filter: blur(10px);z-index:200;display:none;
  }
  .start-menu .search{display:flex;gap:8px;margin-bottom:10px}
  .start-menu input{flex:1;padding:10px;border-radius:10px;border:0;background:rgba(255,255,255,0.03);color:var(--muted);outline:none}
  .start-menu .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .tile{padding:10px;border-radius:8px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
  .tile .ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01))}
  .tile span{font-size:12px;color:var(--muted)}

  /* Desktop icons */
  .desktop{
    position:absolute;inset:0;padding:36px 72px 92px 112px;
  }
  .icons{display:flex;flex-wrap:wrap;gap:14px}
  .icon{width:86px;text-align:center;color:var(--muted);cursor:pointer}
  .icon .icwrap{width:86px;height:86px;border-radius:14px;background:var(--tile);display:flex;align-items:center;justify-content:center;margin-bottom:6px}
  .icon span{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Window system */
  .window{
    position:absolute;width:880px;height:560px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:12px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(255,255,255,0.03);
  }
  .titlebar{height:44px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.008));cursor:grab}
  .win-title{flex:1;font-weight:600}
  .win-controls{display:flex;gap:6px}
  .btn{width:36px;height:28px;border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .btn:hover{background:var(--tile)}
  .btn.close:hover{background:linear-gradient(180deg, rgba(233,84,32,0.18), rgba(233,84,32,0.06))}
  .win-body{padding:12px;height:calc(100% - 44px);overflow:auto;color:#dbefff}

  /* File explorer */
  .file-list{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .file-item{padding:10px;border-radius:8px;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.01));cursor:pointer}
  .file-item .fname{margin-top:8px;font-size:13px;color:var(--muted)}

  /* Terminal */
  .terminal{background:#020412;border-radius:8px;padding:12px;font-family:monospace;color:#dbefff;height:100%;display:flex;flex-direction:column}
  .termscroll{flex:1;overflow:auto;padding-bottom:8px}
  .term-line{padding:4px 0}
  .term-input{display:flex;gap:8px;align-items:center}
  .term-input input{flex:1;background:transparent;border:0;color:#dbefff;font-family:monospace;outline:none;padding:8px 6px}

  /* small responsive touches */
  @media (max-width:900px){
    .start-menu{left:12px;right:12px;width:auto}
    .dock{display:none}
  }
</style>
</head>

<script>
/* Minimal window manager */
let z=100, winId = 1;
const apps = {
  explorer: {title:'Files', icon:'📁', create:createExplorer},
  terminal: {title:'Terminal', icon:'🖥️', create:createTerminal},
  settings: {title:'Settings', icon:'⚙️', create:createSettings},
  browser: {title:'Browser', icon:'🌐', create:createBrowser},
  text: {title:'Text Viewer', icon:'📄', create:createTextViewer}
};

const files = {
  "Welcome.txt":"Welcome to Ubunindows!\n\nThis little demo blends Ubuntu warmth and Windows practicality.\n\nDouble-click icons or use the start menu to open apps.\n\nTry the terminal: type 'help'.\n\nHave fun!",
  "Notes.md":"# Quick Notes\n- Ubunindows demo\n- Drag windows around\n- Minimize and maximize\n"
};

function openFile(name){
  openApp('text', {name, content: files[name] || ("File: "+name)});
}

function openApp(appId, opts){
  const app = apps[appId];
  if(!app) return;
  const w = app.create(opts || {});
  document.getElementById('windows').appendChild(w);
  focusWindow(w);
}

/* Create generic window element */
function makeWindow({title, content, width=880, height=560}) {
  const el = document.createElement('div');
  el.className='window';
  el.style.width = width+'px';
  el.style.height = height+'px';
  el.style.left = (80 + Math.random()*160) + 'px';
  el.style.top = (60 + Math.random()*120) + 'px';
  el.dataset.id = winId++;
  el.innerHTML = `
    <div class="titlebar">
      <div style="display:flex;gap:8px;align-items:center">
        <div style="width:36px;height:36;border-radius:8px;background:linear-gradient(180deg,var(--accent),#c23a12);display:flex;align-items:center;justify-content:center;font-weight:700">${title[0]||'U'}</div>
      </div>
      <div class="win-title">${title}</div>
      <div class="win-controls">
        <div class="btn mini" title="Minimize">—</div>
        <div class="btn max" title="Maximize">◻</div>
        <div class="btn close" title="Close">✕</div>
      </div>
    </div>
    <div class="win-body">${content}</div>
  `;
  makeDraggable(el);
  setupControls(el);
  return el;
}

/* Draggable windows */
function makeDraggable(win){
  const tb = win.querySelector('.titlebar');
  tb.addEventListener('mousedown', e => {
    focusWindow(win);
    if(e.target.closest('.btn')) return;
    win.style.cursor='grabbing';
    const rect = win.getBoundingClientRect();
    const offsetX = e.clientX - rect.left;
    const offsetY = e.clientY - rect.top;
    function move(ev){
      win.style.left = (ev.clientX - offsetX) + 'px';
      win.style.top = (ev.clientY - offsetY) + 'px';
    }
    function up(){
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      win.style.cursor='grab';
    }
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
  win.addEventListener('mousedown', ()=>focusWindow(win));
}

/* Focus window */
function focusWindow(win){
  z++;
  win.style.zIndex = z;
}

/* Controls */
function setupControls(win){
  const mini = win.querySelector('.mini');
  const maxi = win.querySelector('.max');
  const close = win.querySelector('.close');
  mini.onclick = ()=> {
    win.style.display='none';
    addToTaskbar(win);
  };
  close.onclick = ()=> win.remove();
  maxi.onclick = ()=>{
    if(win.dataset.max==='1'){
      win.style.width = win.dataset.origW;
      win.style.height = win.dataset.origH;
      win.style.left = win.dataset.origL;
      win.style.top = win.dataset.origT;
      win.dataset.max='0';
    } else {
      // store
      win.dataset.origW = win.style.width;
      win.dataset.origH = win.style.height;
      win.dataset.origL = win.style.left;
      win.dataset.origT = win.style.top;
      win.style.left = '8px';
      win.style.top = '8px';
      win.style.width = (window.innerWidth-16) + 'px';
      win.style.height = (window.innerHeight - parseInt(getComputedStyle(document.querySelector('.taskbar')).height) - 16) + 'px';
      win.dataset.max='1';
    }
  };
}

/* Taskbar integration (very simple) */
function addToTaskbar(win){
  const quick = document.getElementById('quick');
  let tbItem = document.createElement('div');
  tbItem.className='quick-icon';
  tbItem.title = win.querySelector('.win-title').innerText;
  tbItem.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" fill="rgba(255,255,255,0.03)"/></svg>';
  tbItem.onclick = ()=>{
    win.style.display='block';
    focusWindow(win);
    tbItem.remove();
  };
  quick.appendChild(tbItem);
}

/* App creators */
function createExplorer(){
  const fileItems = Object.keys(files).map(name=>{
    return `<div class="file-item" ondblclick="openFile('${escapeHtml(name)}')">
      <div style="width:64px;height:64;border-radius:8px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));display:flex;align-items:center;justify-content:center">📄</div>
      <div class="fname">${escapeHtml(name)}</div>
    </div>`;
  }).join('');
  const content = `<div style="display:flex;gap:12px;height:100%">
    <div style="width:220px;background:rgba(255,255,255,0.02);padding:10px;border-radius:8px">
      <div style="font-weight:700;margin-bottom:8px;color:var(--muted)">Quick access</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="padding:8px;border-radius:6px;background:rgba(255,255,255,0.01);cursor:pointer" onclick="openApp('text',{name:'Welcome.txt',content:files['Welcome.txt']})">Welcome.txt</div>
        <div style="padding:8px;border-radius:6px;background:rgba(255,255,255,0.01);cursor:pointer" onclick="openApp('text',{name:'Notes.md',content:files['Notes.md']})">Notes.md</div>
      </div>
    </div>
    <div style="flex:1;padding:6px;overflow:auto">
      <div class="file-list">${fileItems}</div>
    </div>
  </div>`;
  return makeWindow({title:'Files — Ubunindows', content});
}

function createTerminal(){
  const content = `<div class="terminal">
    <div class="termscroll" id="termOut${Date.now()}"></div>
    <div class="term-input">
      <div style="opacity:0.7;font-family:monospace">uw@desktop:~$</div>
      <input id="termIn${Date.now()}" autofocus />
    </div>
  </div>`;
  const win = makeWindow({title:'Terminal', content});
  // After inserting into DOM, setup terminal logic
  setTimeout(()=> {
    const out = win.querySelector('.termscroll');
    const input = win.querySelector('input');
    const print = txt => {
      const line = document.createElement('div');
      line.className='term-line';
      line.textContent = txt;
      out.appendChild(line);
      out.scrollTop = out.scrollHeight;
    };
    print('Welcome to Ubunindows Terminal — type "help".');
    input.focus();
    input.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){
        const val = input.value.trim();
        print('uw@desktop:~$ '+val);
        handleCmd(val, print);
        input.value='';
      }
    });
  }, 30);
  return win;
}

function createSettings(){
  const content = `<div style="display:flex;gap:12px;height:100%">
    <div style="width:260px;background:rgba(255,255,255,0.02);padding:12px;border-radius:8px">
      <div style="font-weight:700;margin-bottom:10px">System</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;justify-content:space-between;align-items:center">
          <span>Night theme</span><input type="checkbox" id="nightT" />
        </label>
        <label style="display:flex;justify-content:space-between;align-items:center">
          <span>Show dock</span><input type="checkbox" id="showDock" checked />
        </label>
        <label style="display:flex;justify-content:space-between;align-items:center">
          <span>Accent color</span>
          <select id="accentSel"><option value="orange">Orange</option><option value="blue">Blue</option></select>
        </label>
      </div>
    </div>
    <div style="flex:1;padding:12px">
      <h3 style="margin-top:0">Settings</h3>
      <p style="color:var(--muted)">A playful mashup of Ubuntu and Windows UI — tweak things if you like.</p>
    </div>
  </div>`;
  const win = makeWindow({title:'Settings', content});
  setTimeout(()=>{
    const night = win.querySelector('#nightT');
    const showDock = win.querySelector('#showDock');
    const accent = win.querySelector('#accentSel');
    night.addEventListener('change', (e)=>{
      document.body.style.filter = e.target.checked ? 'brightness(0.88) saturate(0.9)' : '';
    });
    showDock.addEventListener('change', (e)=>{
      document.getElementById('dock').style.display = e.target.checked ? 'flex' : 'none';
    });
    accent.addEventListener('change', (e)=>{
      if(e.target.value==='blue') document.documentElement.style.setProperty('--accent','#0078D4');
      else document.documentElement.style.setProperty('--accent','#E95420');
    });
  },30);
  return win;
}

function createBrowser(){
  const content = `<div style="display:flex;flex-direction:column;height:100%">
    <div style="display:flex;gap:8px;padding-bottom:8px">
      <input placeholder="Type a URL or search" id="fakeUrl" style="flex:1;padding:8px;border-radius:8px;border:0;background:rgba(255,255,255,0.02);color:var(--muted)" />
      <button onclick="fakeNavigate(this)" style="padding:8px 12px;border-radius:8px;border:0;background:var(--accent);color:#fff">Go</button>
    </div>
    <div style="flex:1;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.008));border-radius:8px;padding:12px;overflow:auto">
      <h2 style="margin-top:0">Ubunindows Browser</h2>
      <p style="color:var(--muted)">A lightweight toy browser. Enter a search like "weather" or "about:welcome".</p>
      <div id="browserContent"></div>
    </div>
  </div>`;
  const win = makeWindow({title:'Browser', content});

}

function createTextViewer(opts){
  const content = `<div style="height:100%;overflow:auto;padding:8px;background:linear-gradient(180deg, rgba(0,0,0,0.2), transparent);border-radius:8px;white-space:pre-wrap">${escapeHtml(opts.content || '')}</div>`;
  return makeWindow({title:opts.name || 'Text File', content});
}

/* Terminal command handling */
function handleCmd(cmd, print){
  if(!cmd) return;
  const args = cmd.split(' ').filter(Boolean);
  const c = args[0];
  switch(c){
    case 'help':
      print('Commands: help, ls, cat <file>, echo <text>, whoami, clear');
      break;
    case 'ls':
      Object.keys(files).forEach(f=>print(f));
      break;
    case 'cat':
      if(args[1]) print(files[args[1]] || 'No such file');
      else print('Usage: cat <file>');
      break;
    case 'echo':
      print(args.slice(1).join(' '));
      break;
    case 'whoami':
      print('uw-desktop');
      break;
    case 'clear':
      // find out element from print closure: hack by clearing parent element
      const par = document.querySelector('.termscroll');
      if(par) par.innerHTML='';
      break;
    default:
      print(c + ': command not found');
  }
}

/* small helpers */
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

/* Start menu behavior */
const startBtn = document.getElementById('startBtn');
const startMenu = document.getElementById('startMenu');
startBtn.addEventListener('click', e=>{
  startMenu.style.display = startMenu.style.display === 'block' ? 'none' : 'block';
});
document.addEventListener('click', e=>{
  if(!startMenu.contains(e.target) && !startBtn.contains(e.target)) startMenu.style.display='none';
});

/* Start search filter */
function filterTiles(e){
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.tile').forEach(t=>{
    t.style.display = t.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
  });
}

/* Browser fake navigation */
function fakeNavigate(btn){
  const win = btn.closest('.window');
  const q = win.querySelector('#fakeUrl').value.trim().toLowerCase();
  const c = win.querySelector('#browserContent');
  if(!q) return;
  if(q.includes('about:welcome') || q==='welcome'){
    c.innerHTML = `<h3>Welcome</h3><p style="color:var(--muted)">This browser is a demo — real browsing is disabled.</p>`;
  } else {
    c.innerHTML = `<h3>Search results for "${escapeHtml(q)}"</h3><p style="color:var(--muted)">Pretend results inspired by Ubunindows.</p><ul><li>Official site</li><li>Community forums</li><li>Tutorials</li></ul>`;
  }
}

/* Clock */
function updateClock(){
  const el = document.querySelector('.tray #clock');
  if(!el) return;
  const d = new Date();
  el.textContent = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

/* Keyboard shortcuts */
document.addEventListener('keydown', (e)=>{
  if(e.altKey && e.key==='F4'){
    // close topmost window
    const wins = document.querySelectorAll('.window');
    if(wins.length){
      wins[wins.length-1].remove();
    }
  }
  if(e.ctrlKey && e.key.toLowerCase()==='t'){
    openApp('terminal');
    e.preventDefault();
  }
});

/* Small UX: double-click desktop to create a quick window */
document.getElementById('desktop').addEventListener('dblclick', e=>{
  openApp('browser');
});

/* Make tiles and icons clickable via global scope */
window.openApp = openApp;
window.openFile = openFile;
window.fakeNavigate = fakeNavigate;
</script>
