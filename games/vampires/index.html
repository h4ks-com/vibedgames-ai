<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>🧛 Hex Vampire Hunter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

.key-desc { color: #888; font-size: 11px; }
#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }

#overlay h2 { font-size: 24px; margin-bottom: 20px; color: #cc66ff; }
#overlay p { font-size: 14px; line-height: 1.6; max-width: 500px; text-align: center; color: #bbb; margin-bottom: 10px; }
.btn { background: linear-gradient(#8b0000,#5a0000); color: #fff; border: 2px solid #aa0000; padding: 12px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 8px; transition: all 0.2s; font-weight: bold; }
.btn:hover { background: linear-gradient(#aa0000,#800000); transform: scale(1.05); box-shadow: 0 0 15px rgba(200,0,0,0.5); }
.btn-green { background: linear-gradient(#1a6b1a,#0d3d0d); border-color: #2a9a2a; }
.btn-green:hover { background: linear-gradient(#2a9a2a,#1a6b1a); box-shadow: 0 0 15px rgba(40,200,40,0.4); }
#shopPanel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2e; border: 2px solid #c9a227; border-radius: 12px; padding: 24px; min-width: 380px; display: none; z-index: 50; box-shadow: 0 0 40px rgba(201,162,39,0.2); }
#shopPanel.show { display: block; }
#shopPanel h2 { color: #c9a227; margin-bottom: 15px; text-align: center; font-size: 20px; }
.shop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; margin: 6px 0; background: rgba(255,255,255,0.04); border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); }
.shop-item .name { font-weight: bold; }
.shop-item .desc { font-size: 11px; color: #888; }
.shop-item .price { color: #ffd700; font-family: monospace; font-weight: bold; }
.shop-btn { background: #2a5a2a; color: #fff; border: 1px solid #4a9a4a; padding: 4px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.shop-btn:hover { background: #3a8a3a; }
.shop-btn:disabled { opacity: 0.3; cursor: not-allowed; }
#turnNotif { position: absolute; top: 55px; left: 50%; transform: translateX(-50%) translateY(-20px); font-size: 28px; font-weight: bold; pointer-events: none; opacity: 0; transition: all 0.5s; z-index: 20; text-shadow: 0 0 20px currentColor; }
#turnNotif.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.day-text { color: #ffd700; }
.night-text { color: #9999ff; }
.vamp-text { color: #cc66ff; }
.hero-text { color: #ff6666; }
#dirMap { position: absolute; bottom: 70px; right: 20px; background: rgba(0,0,0,0.85); border: 1px solid #444; border-radius: 8px; padding: 10px 14px; font-family: monospace; font-size: 13px; z-index: 5; line-height: 1.8; }
#dirMap .row { display: flex; gap: 8px; justify-content: center; }
#dirMap .spacer { width: 28px; }
.dk { display: inline-block; background: #333; border: 1px solid #666; border-radius: 3px; padding: 1px 6px; color: #fff; font-size: 11px; min-width: 22px; text-align: center; }
.dl { color: #888; font-size: 10px; }
</style>
</head>
<body>

<div id="topBar">
  <div style="display:flex;gap:16px;">
    <div class="stat"><span class="stat-icon">❤️</span><span id="hp">100</span>/<span id="maxHp">100</span></div>

  </div>
  <div style="display:flex;gap:16px;">
    <div class="stat"><span id="phaseIcon">☀️</span><span id="phaseText">Day</span> <span style="color:#666;font-size:11px;">Turn</span> <span id="turnNum">1</span>/64</div>
    <div class="stat"><span id="roundNum">Round 1</span></div>

<div id="gameArea">
<canvas id="hexCanvas"></canvas>
<div id="turnNotif"></div>

  <div class="row"><span class="dk">W</span><span class="dl">up-left</span><span class="dk">E</span><span class="dl">up-right</span></div>

</div>
<div id="shopPanel"><h2 id="shopTitle">⚔️ Shop</h2><div id="shopItems"></div><p style="text-align:center;margin-top:12px;color:#666;font-size:12px;">Press B to close</p></div>
<div id="overlay"></div>
</div>

<div id="controls">
  <div id="keyHints">
    <span><span class="key">W</span><span class="key-desc">↑Left</span></span>
    <span><span class="key">E</span><span class="key-desc">↑Right</span></span>
    <span><span class="key">A</span><span class="key-desc">←</span></span>
    <span><span class="key">D</span><span class="key-desc">→</span></span>
    <span><span class="key">Z</span><span class="key-desc">↓Left</span></span>
    <span><span class="key">X</span><span class="key-desc">↓Right</span></span>
    <span><span class="key">S</span><span class="key-desc">Strike</span></span>
    <span><span class="key">B</span><span class="key-desc">Shop/Lair</span></span>
    <span><span class="key">H</span><span class="key-desc">Hide</span></span>
    <span><span class="key">L</span><span class="key-desc">Log</span></span>
  </div>
  <button class="btn" onclick="startNewGame()" style="padding:4px 14px;font-size:12px;margin:0;">New Game</button>
</div>

<script>
const canvas = document.getElementById('hexCanvas');
const ctx = canvas.getContext('2d');
const HEX_SIZE = 32;
const RADIUS = 4;

// Hex directions: axial (q,r) offsets for each key
// Pointy-topped hexes: flat sides on left/right
// W = up-left (NW), E = up-right (NE), A = west, D = east, Z = down-left (SW), X = down-right (SE)
const DIR_OFFSETS = {
  'w': { dq: -1, dr: 0 },   // up-left (NW)
  'e': { dq: 1, dr: -1 },   // up-right (NE)  
  'a': { dq: -1, dr: 1 },   // left (W)
  'd': { dq: 1, dr: -1 },   // right (E) — wait, let me recalculate
};

// Let me use proper pointy-top hex directions:
// For pointy-top hexagons with axial coordinates (q,r):
// NW (W): q-1, r+0 → direction 4
// NE (E): q+1, r-1 → direction 5  
// W (A): q-1, r+1 → direction 3
// E (D): q+1, r-0 → direction 0... no

// Standard pointy-top hex directions in axial coords:
// Direction 0: (+1,  0) = E
// Direction 1: (+1, -1) = NE
// Direction 2: ( 0, -1) = NW... no that's not right either

// Let me use the standard cube-to-axial mapping properly.
// In pointy-top orientation:
// E  = +q     → ( 1,  0)
// NE = +q, -r → ( 1, -1) 
// NW =      -r → ( 0, -1)... hmm

// Actually for pointy-top hexes in axial (q,r):
// The 6 neighbors are:
//  E:  ( 1,  0)  -> D key
//  NE: ( 1, -1)  -> E key (up-right)
//  NW: ( 0, -1)  -> W key (up-left)
//  W:  (-1,  0)  -> A key
//  SW: (-1,  1)  -> Z key (down-left)
//  SE: ( 0,  1)  -> X key (down-right)

const HEX_DIRS = {
  'w': { q: 0, r: -1 },   // up-left / NW
  'e': { q: 1, r: -1 },   // up-right / NE
  'a': { q: -1, r: 0 },   // left / W
  'd': { q: 1, r: 0 },    // right / E
  'z': { q: -1, r: 1 },   // down-left / SW
  'x': { q: 0, r: 1 },    // down-right / SE
};

function hexToPixel(q, r) {
  const x = HEX_SIZE * (Math.sqrt(3) * q + Math.sqrt(3)/2 * r);
  const y = HEX_SIZE * (3/2 * r);
  return { x, y };
}

function pixelToHex(x, y) {
  const q = (Math.sqrt(3)/3 * x - 1/3 * y) / HEX_SIZE;
  const r = (2/3 * y) / HEX_SIZE;
  return hexRound(q, r);
}

function hexRound(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const qDiff = Math.abs(rq - q), rDiff = Math.abs(rr - r), sDiff = Math.abs(rs - s);
  if (qDiff > rDiff && qDiff > sDiff) rq = -rr - rs;
  else if (rDiff > sDiff) rr = -rq - rs;
  return { q: rq, r: rr };
}

function drawHex(cx, cy, size, fillColor, strokeColor, lineWidth=1.5) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const px = cx + size * Math.cos(angle);
    const py = cy + size * Math.sin(angle);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  if (fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
  if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = lineWidth; ctx.stroke(); }
}

function getHexKey(q, r) { return `${q},${r}`; }
function parseHexKey(k) { const [q,r] = k.split(','); return {q:+q, r:+r}; }

const WEAPONS = [
  { name:'Fists', icon:'👊', dmg:[2,5], price:0 },
  { name:'Wooden Stake', icon:'🥩', dmg:[5,10], price:25 },
  { name:'Silver Dagger', icon:'🗡️', dmg:[8,15], price:60 },
  { name:'Blessed Sword', icon:'⚔️', dmg:[14,24], price:130 },
  { name:'Holy Crossbow', icon:'🏹', dmg:[20,35], price:250 },
  { name:'Sunlight Blade', icon:'✨', dmg:[30,50], price:450 },
];

const VAMP_WEAPONS = [
  { name:'Fangs', icon:'🦷', dmg:[3,8], price:0 },
  { name:'Iron Claws', icon:'🐾', dmg:[8,16], price:30 },
  { name:'Shadow Blade', icon:'🌑', dmg:[15,26], price:80 },
  { name:'Blood Thirster', icon:'🩸', dmg:[25,40], price:170 },
  { name:'Soul Reaper', icon:'💀', dmg:[35,55], price:320 },
  { name:'Apocalypse', icon:'☠️', dmg:[50,75], price:550 },
];

const LAIR_UPGRADES = [
  { name:'Reinforced Doors', icon:'🚪', desc:'+15 block per level', price:50, effect:'block', val:15 },
  { name:'Ghoul Guards', icon:'👻', desc:'+1 ghoul counterattack', price:100, effect:'ghoul', val:1 },
  { name:'Shadow Webs', icon:'🕸️', desc:'Slow heroes 30%', price:80, effect:'slow', val:0.3 },
  { name:'Blood Ward', icon:'🔮', desc:'Block holy damage', price:150, effect:'ward', val:1 },
  { name:'Coffin Rest', icon:'⚰️', desc:'+20 heal/sleep turn', price:120, effect:'heal', val:20 },
];

const SHOP_ITEMS = [
  { type:'weapon', ...WEAPONS[1] },
  { type:'weapon', ...WEAPONS[2] },
  { type:'weapon', ...WEAPONS[3] },
  { type:'weapon', ...WEAPONS[4] },
  { type:'weapon', ...WEAPONS[5] },
  { type:'potion', name:'Health Potion', icon:'❤️‍🩹', desc:'+40 HP', price:20, heal:40 },
  { type:'defense', name:'Safehouse Door', icon:'🚪', desc:'+1 hide defense', price:35, def:1 },
];

const VAMP_SHOP_ITEMS = [
  { type:'vweapon', ...VAMP_WEAPONS[1] },
  { type:'vweapon', ...VAMP_WEAPONS[2] },
  { type:'vweapon', ...VAMP_WEAPONS[3] },
  { type:'vweapon', ...VAMP_WEAPONS[4] },
  { type:'vweapon', ...VAMP_WEAPONS[5] },
  { type:'lair', ...LAIR_UPGRADES[0] },
  { type:'lair', ...LAIR_UPGRADES[1] },
  { type:'lair', ...LAIR_UPGRADES[2] },
  { type:'lair', ...LAIR_UPGRADES[3] },
  { type:'lair', ...LAIR_UPGRADES[4] },
];

let state = {};

function initState() {
  state = {
    playerQ: 0, playerR: 0,
    hp: 100, maxHp: 100,
    gold: 50, bloodEssence: 0,
    weaponIdx: 0,
    turn: 1, round: 1,
    phase: 'day',
    isVampire: false,
    year: 1880,
    infamy: 0,
    bloodConsumed: 0,
    sleepTurnsRemaining: 0,
    safehouseLevel: 0,
    lairLevel: 0,
    lairBlock: 0, lairGhouls: 0, lairSlow: 0, lairWard: false, lairHealBonus: 0,
    isHiding: false,
    gameOver: false,
    vampires: {},
    coins: {},
    shops: {},
    humans: {},
    heroes: {},
    log: [],
    shopOpen: false,
    lairOpen: false,
  };
}

function generateMap() {
  state.vamps = {};
  state.coins = {};
  state.shops = {};
  state.humans = {};
  state.heroes = {};
  
  const allCells = [];
  for (let q = -RADIUS; q <= RADIUS; q++)
    for (let r = -RADIUS; r <= RADIUS; r++)
      if (Math.abs(q + r) <= RADIUS && !(q===0&&r===0))
        allCells.push({q,r});
  
  // Shuffle
  for (let i = allCells.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [allCells[i],allCells[j]] = [allCells[j],allCells[i]];
  }
  
  // Place shops (5)
  const shopPositions = [
    {q:-3,r:0},{q:3,r:0},{q:-1,r:-3},{q:1,r:3},{q:-2,r:2}
  ];
  shopPositions.forEach(p => state.shops[getHexKey(p.q,p.r)] = true);
  
  // Place coins (12)
  let coinCount = 0;
  for (const cell of allCells) {
    if (coinCount >= 12) break;
    const k = getHexKey(cell.q, cell.r);
    if (!state.shops[k]) {
      state.coins[k] = 5 + Math.floor(Math.random() * 11);
      coinCount++;
    }
  }
  
  // Place vampires (4)
  let vampCount = 0;
  for (const cell of allCells) {
    if (vampCount >= 4) break;
    const k = getHexKey(cell.q, cell.r);
    if (!state.shops[k] && !state.coins[k]) {
      state.vamps[k] = { hp: 30 + Math.floor(Math.random()*21), maxHp: 30 + Math.floor(Math.random()*21), asleep: true };
      vampCount++;
    }
  }
  
  // Place humans (for vampire mode) - hidden initially
  let humanCount = 0;
  for (const cell of allCells) {
    if (humanCount >= 8) break;
    const k = getHexKey(cell.q, cell.r);
    if (!state.shops[k] && !state.coins[k] && !state.vamps[k]) {
      state.humans[k] = { hp: 20, blood: 8 + Math.floor(Math.random()*8) };
      humanCount++;
    }
  }
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - document.getElementById('topBar').offsetHeight - document.getElementById('controls').offsetHeight;
}
window.addEventListener('resize', resize);

function showNotif(text, cls='day-text') {
  const el = document.getElementById('turnNotif');
  el.textContent = text;
  el.className = cls + ' show';
  setTimeout(() => el.classList.remove('show'), 1800);
}

function addLog(msg, type='info') {
  state.log.unshift({ msg, type, turn: state.turn });
  if (state.log.length > 50) state.log.pop();
  renderLog();
}

function renderLog() {
  const panel = document.getElementById('logPanel');
  panel.innerHTML = state.log.map(e => `<div class="log-entry log-${e.type}">[T${e.turn}] ${e.msg}</div>`).join('');
}

function toggleLog() {
  document.getElementById('logPanel').classList.toggle('show');
}

function updateUI() {
  document.getElementById('hp').textContent = state.hp;
  document.getElementById('maxHp').textContent = state.maxHp;
  document.getElementById('gold').textContent = state.gold;
  document.getElementById('turnNum').textContent = state.turn;
  document.getElementById('roundNum').textContent = `Round ${state.round}`;
  
  if (state.isVampire) {
    document.getElementById('altCurrency').textContent = state.bloodEssence;
    document.getElementById('currencyIcon').textContent = '🩸';
    document.getElementById('weaponIcon').textContent = VAMP_WEAPONS[state.weaponIdx].icon;
    document.getElementById('weaponName').textContent = VAMP_WEAPONS[state.weaponIdx].name;
    document.getElementById('yearDisplay').style.display = '';
    document.getElementById('yearNum').textContent = state.year;
    document.getElementById('infamyDisplay').style.display = '';
    document.getElementById('infamyVal').textContent = state.infamy;
    document.getElementById('phaseIcon').textContent = '🧛';
    document.getElementById('phaseText').textContent = state.sleepTurnsRemaining > 0 ? `Sleeping (${state.sleepTurnsRemaining})` : 'Awake';
  } else {
    document.getElementById('altCurrency').textContent = state.safehouseLevel;
    document.getElementById('currencyIcon').textContent = '🏠';
    document.getElementById('weaponIcon').textContent = WEAPONS[state.weaponIdx].icon;
    document.getElementById('weaponName').textContent = WEAPONS[state.weaponIdx].name;
    document.getElementById('yearDisplay').style.display = 'none';
    document.getElementById('infamyDisplay').style.display = 'none';
    document.getElementById('phaseIcon').textContent = state.phase === 'day' ? '☀️' : '🌙';
    document.getElementById('phaseText').textContent = state.phase === 'day' ? 'Day' : 'Night';
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  
  // Draw all hexes
  for (let q = -RADIUS; q <= RADIUS; q++) {
    for (let r = -RADIUS; r <= RADIUS; r++) {
      if (Math.abs(q + r) <= RADIUS) {
        const pos = hexToPixel(q, r);
        const px = cx + pos.x;
        const py = cy + pos.y;
        const k = getHexKey(q, r);
        
        let fill = '#16162a';
        let stroke = '#2a2a4a';
        
        if (q===0 && r===0) fill = '#1a1a3a';
        if (state.shops[k]) fill = '#2a2a10';
        if (state.coins[k]) fill = '#1a2a1a';
        if (state.vamps[k]) fill = state.phase==='day'&&!state.isVampire ? '#1a1025' : '#2a1525';
        if (state.humans[k] && state.isVampire) fill = '#15251a';
        if (state.heroes[k]) fill = '#251515';
        
        drawHex(px, py, HEX_SIZE - 1, fill, stroke);
        
        // Draw contents
        if (state.shops[k]) {
          ctx.font = '18px serif';
          ctx.fillText(state.isVampire ? '🏰' : '🏪', px - 9, py + 6);
        }
        if (state.coins[k]) {
          ctx.font = '14px serif';
          ctx.fillText('🪙', px - 7, py + 5);
          ctx.font = 'bold 10px sans-serif';
          ctx.fillStyle = '#ffd700';
          ctx.fillText(state.coins[k].toString(), px - 5, py + 16);
        }
        if (state.vamps[k] && !state.isVampire) {
          const v = state.vamps[k];
          ctx.font = v.asleep ? '20px serif' : '22px serif';
          ctx.fillText(v.asleep ? '🧛' : '😈', px - 11, v.asleep ? py + 7 : py + 8);
          // HP bar
          const bw = 28, bh = 4;
          ctx.fillStyle = '#300'; ctx.fillRect(px-bw/2,py+14,bw,bh);
          ctx.fillStyle = '#c00'; ctx.fillRect(px-bw/2,py+14,bw*(v.hp/v.maxHp),bh);
        }
        if (state.humans[k] && state.isVampire) {
          ctx.font = '16px serif';
          ctx.fillText('👤', px - 8, py + 6);
        }
        if (state.heroes[k] && state.isVampire) {
          const h = state.heroes[k];
          ctx.font = '18px serif';
          ctx.fillText(h.type || '⚔️', px - 9, py + 7);
          const bw = 28, bh = 4;
          ctx.fillStyle = '#300'; ctx.fillRect(px-bw/2,py+14,bw,bh);
          ctx.fillStyle = h.holy ? '#ff4444' : '#f80'; 
          ctx.fillRect(px-bw/2,py+14,bw*(h.hp/h.maxHp),bh);
        }
      }
    }
  }
  
  // Draw player
  const ppos = hexToPixel(state.playerQ, state.playerR);
  const pcx = cx + ppos.x;
  const pcy = cy + ppos.y;
  drawHex(pcx, pcy, HEX_SIZE - 1, state.isVampire ? 'rgba(120,0,120,0.4)' : 'rgba(0,80,160,0.4)', state.isVampire ? '#9933cc' : '#3388cc', 2.5);
  ctx.font = state.isVampire ? '24px serif' : '20px serif';
  ctx.fillText(state.isVampire ? '🧛' : '🧙', pcx - 12, pcy + 8);
  
  // Player HP bar
  const pbw = 34, pbh = 5;
  ctx.fillStyle = '#200'; ctx.fillRect(pcx-pbw/2,pcy+16,pbw,pbh);
  ctx.fillStyle = state.hp/state.maxHp > 0.3 ? '#0c0' : '#c00'; 
  ctx.fillRect(pcx-pbw/2,pcy+16,pbw*(state.hp/state.maxHp),pbh);
  
  // Hiding indicator
  if (state.isHiding) {
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('🏠 Hiding', pcx - 22, pcy - 20);
  }
  
  updateUI();
}

function advanceTurn() {
  state.turn++;
  state.isHiding = false;
  
  if (state.turn > 64) {
    state.turn = 1;
    state.round++;
    
    if (!state.isVampire) {
      // Dawn heals in hunter mode
      const healAmt = 10 + state.safehouseLevel * 3;
      state.hp = Math.min(state.maxHp, state.hp + healAmt);
      addLog(`☀️ Dawn breaks! Healed ${healAmt} HP.`, 'day');
      
      // Respawn some coins
      respawnCoins(3);
    } else {
      // Vampire mode: decades pass
      const decades = 5 + Math.floor(state.bloodConsumed / 20);
      state.year += decades * 10;
      addLog(`⏰ ${decades} decade${decades>1?'s':''} pass... Now year ${state.year}.`, 'vampire');
      
      // Infamy grows over time
      state.infamy += decades;
      
      // Spawn heroes based on infamy
      spawnHeroes();
      
      // Respawn humans
      respawnHumans(3);
    }
  }
  
  // Phase change at turn 33
  const wasDay = state.phase === 'day';
  state.phase = state.turn <= 32 ? 'day' : 'night';
  
  if (wasDay && state.phase === 'night' && !state.isVampire) {
    showNotif('🌙 Night Falls!', 'night-text');
    addLog('🌙 Night falls! The vampires awaken...', 'night');
    // Wake all vampires
    for (const k in state.vamps) state.vamps[k].asleep = false;
  } else if (!wasDay && state.phase === 'day' && !state.isVampire) {
    showNotif('☀️ Dawn Breaks!', 'day-text');
    addLog('☀️ Day breaks! Vampires fall asleep.', 'day');
    for (const k in state.vamps) state.vamps[k].asleep = true;
  }
  
  // Vampire AI moves (at night or when player is vampire)
  if ((state.phase === 'night' || state.isVampire) && !state.isVampire) {
    moveVampires();
  }
  
  // Hero AI moves (when vampire)
  if (state.isVampire && state.sleepTurnsRemaining <= 0) {
    moveHeroes();
  }
  
  // Sleep turns for vampire
  if (state.isVampire && state.sleepTurnsRemaining > 0) {
    state.sleepTurnsRemaining--;
    const healPerTurn = 5 + state.lairHealBonus;
    state.hp = Math.min(state.maxHp, state.hp + healPerTurn);
    if (state.sleepTurnsRemaining <= 0) {
      addLog(`😴 You awaken from your slumber.`, 'vampire');
      showNotif('😴 Awakened!', 'vamp-text');
    }
  }
  
  checkCollisions();
  draw();
}

function moveVampires() {
  for (const k in state.vamps) {
    const pos = parseHexKey(k);
    const pq = state.playerQ, pr = state.playerR;
    const dist = hexDistance(pos.q, pos.r, pq, pr);
    
    if (dist <= 6) {
      // Move toward player
      let bestDir = null, bestDist = dist;
      for (const [dir, offset] of Object.entries(HEX_DIRS)) {
        const nq = pos.q + offset.q, nr = pos.r + offset.r;
        if (isValidHex(nq, nr)) {
          const nd = hexDistance(nq, nr, pq, pr);
          if (nd < bestDist) { bestDist = nd; bestDir = offset; }
        }
      }
      if (bestDir && Math.random() > 0.3) {
        delete state.vamps[k];
        state.vamps[getHexKey(pos.q+bestDir.q, pos.r+bestDir.r)] = state.vamps[k] || { hp:30, maxHp:30, asleep:false };
        // Fix: preserve the actual vamp object
        const v = state.vamps[k]; // this is deleted already...
      }
    }
  }
  
  // Fix: redo the move properly
  const newVamps = {};
  for (const k in state.vamps) {
    const pos = parseHexKey(k);
    const v = state.vamps[k];
    const pq = state.playerQ, pr = state.playerR;
    const dist = hexDistance(pos.q, pos.r, pq, pr);
    
    let nq = pos.q, nr = pos.r;
    if (dist <= 6 && Math.random() > 0.3) {
      let bestDist = dist;
      for (const offset of Object.values(HEX_DIRS)) {
        const tq = pos.q + offset.q, tr = pos.r + offset.r;
        if (isValidHex(tq, tr)) {
          const td = hexDistance(tq, tr, pq, pr);
          if (td < bestDist) { bestDist = td; nq = tq; nr = tr; }
        }
      }
    }
    newVamps[getHexKey(nq, nr)] = v;
  }
  state.vamps = newVamps;
}

function moveHeroes() {
  const newHeroes = {};
  for (const k in state.heroes) {
    const pos = parseHexKey(k);
    const h = state.heroes[k];
    const dist = hexDistance(pos.q, pos.r, state.playerQ, state.playerR);
    
    let nq = pos.q, nr = pos.r;
    if (dist <= 8 && Math.random() > 0.2) {
      let bestDist = dist;
      for (const offset of Object.values(HEX_DIRS)) {
        const tq = pos.q + offset.q, tr = pos.r + offset.r;
        if (isValidHex(tq, tr)) {
          const td = hexDistance(tq, tr, state.playerQ, state.playerR);
          if (td < bestDist) { bestDist = td; nq = tq; nr = tr; }
        }
      }
    }
    newHeroes[getHexKey(nq, nr)] = h;
  }
  state.heroes = newHeroes;
}

function hexDistance(q1, r1, q2, r2) {
  return (Math.abs(q1-q2) + Math.abs(q1+r1-q2-r2) + Math.abs(r1-r2)) / 2;
}

function isValidHex(q, r) {
  return Math.abs(q) <= RADIUS && Math.abs(r) <= RADIUS && Math.abs(q+r) <= RADIUS;
}

function checkCollisions() {
  const pk = getHexKey(state.playerQ, state.playerR);
  
  // Coin pickup
  if (state.coins[pk]) {
    state.gold += state.coins[pk];
    addLog(`🪙 Picked up ${state.coins[pk]} gold!`, 'item');
    delete state.coins[pk];
  }
  
  // Vampire collision (hunter mode)
  if (!state.isVampire && state.vamps[pk] && !state.isHiding) {
    const v = state.vamps[pk];
    const dmg = v.asleep ? 0 : (5 + Math.floor(Math.random()*10));
    if (dmg > 0) {
      state.hp -= dmg;
      addLog(`🧛 Vampire attacks you for ${dmg} damage!`, 'combat');
      if (state.hp <= 0) becomeVampire();
    }
  }
  
  // Human collision (vampire mode)
  if (state.isVampire && state.humans[pk]) {
    // Just standing near them - need to press S to feed
  }
  
  // Hero collision (vampire mode)
  if (state.isVampire && state.heroes[pk] && state.sleepTurnsRemaining <= 0) {
    const h = state.heroes[pk];
    let dmg = (3 + Math.floor(Math.random()*8) + state.infamy/10);
    if (h.holy && !state.lairWard) dmg *= 1.5;
    
    // Lair defenses
    if (state.lairBlock > 0) {
      const blocked = Math.min(dmg, state.lairBlock);
      dmg -= blocked;
      state.lairBlock -= blocked;
      if (blocked > 0) addLog(`🚪 Doors blocked ${blocked} damage!`, 'item');
    }
    if (state.lairGhouls > 0 && Math.random() < 0.4) {
      const gDmg = 8 + Math.floor(Math.random()*12);
      h.hp -= gDmg;
      addLog(`👻 Ghoul strikes hero for ${gDmg}!`, 'combat');
    }
    
    if (dmg > 0) {
      state.hp -= dmg;
      addLog(`⚔️ ${h.name||'Hero'} hits you for ${Math.floor(dmg)}!`, 'combat');
    }
    
    if (h.hp <= 0) {
      addLog(`💀 ${h.name||'Hero'} defeated! +5 infamy`, 'vampire');
      state.infamy += 5;
      delete state.heroes[pk];
    }
    
    if (state.hp <= 0) {
      showGameOver(true);
    }
  }
}

function respawnCoins(count) {
  const cells = [];
  for (let q=-RADIUS;q<=RADIUS;q++) for(let r=-RADIUS;r<=RADIUS;r++)
    if(isValidHex(q,r)&&!(q===0&&r===0)&&!state.coins[getHexKey(q,r)]&&!state.shops[getHexKey(q,r)])
      cells.push({q,r});
  for (let i=0;i<count&&cells.length;i++){
    const idx=Math.floor(Math.random()*cells.length);
    const c=cells[idx];
    state.coins[getHexKey(c.q,c.r)] = 5+Math.floor(Math.random()*11);
    cells.splice(idx,1);
  }
}

function respawnHumans(count) {
  const cells = [];
  for (let q=-RADIUS;q<=RADIUS;q++) for(let r=-RADIUS;r<=RADIUS;r++)
    if(isValidHex(q,r)&&!(q===0&&r===0)&&!state.humans[getHexKey(q,r)]&&!state.shops[getHexKey(q,r)])
      cells.push({q,r});
  for (let i=0;i<count&&cells.length;i++){
    const idx=Math.floor(Math.random()*cells.length);
    const c=cells[idx];
    state.humans[getHexKey(c.q,c.r)]={hp:20,blood:8+Math.floor(Math.random()*8)};
    cells.splice(idx,1);
  }
}

function spawnHeroes() {
  const count = Math.min(5, 1 + Math.floor(state.infamy / 20));
  const types = ['Van Helsing','Belmont','Blade','Priest','Paladin'];
  const icons = ['⚔️','🥊','🗡️','✝️','🛡️'];
  const cells = [];
  for (let q=-RADIUS;q<=RADIUS;q++) for(let r=-RADIUS;r<=RADIUS;r++)
    if(isValidHex(q,r)&&!(q===0&&r===0)&&!state.heroes[getHexKey(q,r)])
      cells.push({q,r});
  
  for (let i=0;i<count&&cells.length;i++){
    const idx=Math.floor(Math.random()*cells.length);
    const c=cells[idx];
    const ti = Math.floor(Math.random()*types.length);
    const baseHp = 30 + state.infamy * 2;
    state.heroes[getHexKey(c.q,c.r)] = {
      name: types[ti],
      type: icons[ti],
      hp: baseHp,
      maxHp: baseHp,
      holy: ti === 3 || ti === 4,
      slowed: false,
    };
    cells.splice(idx,1);
    addLog(`⚔️ ${types[ti]} appears to hunt you!`, 'hero');
  }
}

function movePlayer(dir) {
  if (state.gameOver) return;
  if (state.shopOpen) { closeShop(); return; }
  if (state.isVampire && state.sleepTurnsRemaining > 0) {
    addLog('😴 You are asleep and cannot move.', 'vampire');
    return;
  }
  if (state.isHiding) {
    state.isHiding = false;
    addLog('You leave your shelter.', 'info');
  }
  
  const off = HEX_DIRS[dir.toLowerCase()];
  if (!off) return;
  
  const nq = state.playerQ + off.q;
  const nr = state.playerR + off.r;
  if (!isValidHex(nq, nr)) return;
  
  state.playerQ = nq;
  state.playerR = nr;
  checkCollisions();
  advanceTurn();
}

function strike() {
  if (state.gameOver) return;
  if (state.shopOpen) { closeShop(); return; }
  if (state.isVampire && state.sleepTurnsRemaining > 0) {
    addLog('😴 You are asleep!', 'vampire'); return;
  }
  
  const pk = getHexKey(state.playerQ, state.playerR);
  
  if (!state.isVampire) {
    // Hunter striking
    let hit = false;
    for (const [k, v] of Object.entries(state.vamps)) {
      if (hexDistance(state.playerQ, state.playerR, parseHexKey(k).q, parseHexKey(k).r) <= 1) {
        const wpn = WEAPONS[state.weaponIdx];
        let dmg = wpn.dmg[0] + Math.floor(Math.random()*(wpn.dmg[1]-wpn.dmg[0]));
        if (v.asleep) { dmg *= 3; addLog(`💥 CRITICAL HIT on sleeping vampire!`, 'combat'); }
        v.hp -= dmg;
        addLog(`⚔️ Struck ${v.asleep?'sleeping ':''}vampire for ${dmg} damage!`, 'combat');
        hit = true;
        if (v.hp <= 0) {
          addLog(`🧛 Vampire destroyed! +${10+state.round*5} gold`, 'item');
          state.gold += 10 + state.round * 5;
          delete state.vamps[k];
          // Chance to spawn new one
          if (Math.random() < 0.3) spawnVampire();
        }
      }
    }
    if (!hit) addLog('⚔️ You strike at nothing.', 'info');
  } else {
    // Vampire feeding/striking
    let fed = false;
    for (const [k, h] of Object.entries(state.humans)) {
      if (hexDistance(state.playerQ, state.playerR, parseHexKey(k).q, parseHexKey(k).r) <= 1) {
        const wpn = VAMP_WEAPONS[state.weaponIdx];
        let dmg = wpn.dmg[0] + Math.floor(Math.random()*(wpn.dmg[1]-wpn.dmg[0]));
        h.hp -= dmg;
        const bloodGain = h.blood;
        state.bloodEssence += bloodGain;
        state.bloodConsumed += bloodGain;
        state.hp = Math.min(state.maxHp, state.hp + Math.floor(bloodGain*2));
        addLog(`🩸 Fed on human! +${bloodGain} blood essence, +${Math.floor(bloodGain*2)} HP`, 'vampire');
        fed = true;
        if (h.hp <= 0) {
          delete state.humans[k];
          state.infamy += 2;
        }
      }
    }
    // Also strike heroes nearby
    for (const [k, h] of Object.entries(state.heroes)) {
      if (hexDistance(state.playerQ, state.playerR, parseHexKey(k).q, parseHexKey(k).r) <= 1) {
        const wpn = VAMP_WEAPONS[state.weaponIdx];
        let dmg = wpn.dmg[0] + Math.floor(Math.random()*(wpn.dmg[1]-wpn.dmg[0]));
        if (h.holy && !state.lairWard) dmg *= 0.7;
        h.hp -= dmg;
        addLog(`⚔️ Struck ${h.name||'hero'} for ${Math.floor(dmg)}!`, 'combat');
        if (h.hp <= 0) {
          addLog(`💀 ${h.name||'Hero'} slain! +5 infamy`, 'vampire');
          state.infamy += 5;
          delete state.heroes[k];
        }
        fed = true;
      }
    }
    if (!fed) addLog('🦷 You bare your fangs at nothing.', 'vampire');
  }
  
  advanceTurn();
}

function spawnVampire() {
  const cells = [];
  for (let q=-RADIUS;q<=RADIUS;q++) for(let r=-RADIUS;r<=RADIUS;r++)
    if(isValidHex(q,r)&&!(q===0&&r===0)&&!state.vamps[getHexKey(q,r)])
      cells.push({q,r});
  if(cells.length){
    const c=cells[Math.floor(Math.random()*cells.length)];
    state.vamps[getHexKey(c.q,c.r)]={hp:30+state.round*5,maxHp:30+state.round*5,asleep:state.phase==='day'};
  }
}

function openShop() {
  if (state.isVampire) openLair(); else openHunterShop();
}

function openHunterShop() {
  const pk = getHexKey(state.playerQ, state.playerR);
  if (!state.shops[pk]) { addLog('No shop here. Walk to a 🏪 tile.', 'info'); return; }
  state.shopOpen = true;
  const panel = document.getElementById('shopPanel');
  document.getElementById('shopTitle').textContent = '⚔️ Hunter Shop';
  const container = document.getElementById('shopItems');
  container.innerHTML = SHOP_ITEMS.map((item, i) => {
    const owned = item.type==='weapon'&&state.weaponIdx>=WEAPONS.findIndex(w=>w.name===item.name);
    const canAfford = item.type==='weapon'?state.gold>=item.price:(item.type==='potion'?state.gold>=item.price:state.gold>=item.price);
    return `<div class="shop-item">
      <div><span class="name">${item.icon} ${item.name}</span><br><span class="desc">${item.desc||''}</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="price">${owned?'✅ OWNED':item.price+' 🪙'}</span>
        <button class="shop-btn" ${owned||!canAfford?'disabled':''} onclick="buyItem(${i})">Buy</button>
      </div>
    </div>`;
  }).join('');
  panel.classList.add('show');
}

function openLair() {
  state.shopOpen = true;
  const panel = document.getElementById('shopPanel');
  document.getElementById('shopTitle').textContent = '🏰 Lair Upgrades';
  const container = document.getElementById('shopItems');
  container.innerHTML = VAMP_SHOP_ITEMS.map((item, i) => {
    const canAfford = state.bloodEssence >= item.price;
    let owned = false;
    if (item.effect==='block') owned = state.lairBlock >= 50;
    if (item.effect==='ghoul') owned = state.lairGhouls >= 3;
    if (item.effect==='slow') owned = state.lairSlow > 0;
    if (item.effect==='ward') owned = state.lairWard;
    if (item.effect==='heal') owned = state.lairHealBonus >= 40;
    return `<div class="shop-item">
      <div><span class="name">${item.icon} ${item.name}</span><br><span class="desc">${item.desc}</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="price">${owned?'✅ MAX':item.price+' 🩸'}</span>
        <button class="shop-btn" ${owned||!canAfford?'disabled':''} onclick="buyLairItem(${i})">Buy</button>
      </div>
    </div>`;
  }).join('');
  panel.classList.add('show');
}

function closeShop() {
  state.shopOpen = false;
  document.getElementById('shopPanel').classList.remove('show');
}

function buyItem(idx) {
  const item = SHOP_ITEMS[idx];
  if (state.gold < item.price) { addLog('Not enough gold!', 'info'); return; }
  state.gold -= item.price;
  if (item.type === 'weapon') {
    state.weaponIdx = WEAPONS.findIndex(w => w.name === item.name);
    addLog(`Bought ${item.name}!`, 'item');
  } else if (item.type === 'potion') {
    state.hp = Math.min(state.maxHp, state.hp + item.heal);
    addLog(`Used ${item.name}! +${item.heal} HP`, 'item');
  } else if (item.type === 'defense') {
    state.safehouseLevel += item.def;
    addLog(`Upgraded safehouse! Defense now ${state.safehouseLevel}`, 'item');
  }
  openHunterShop(); // refresh
}

function buyLairItem(idx) {
  const item = VAMP_SHOP_ITEMS[idx];
  if (state.bloodEssence < item.price) { addLog('Not enough blood essence!', 'vampire'); return; }
  state.bloodEssence -= item.price;
  if (item.effect === 'block') { state.lairBlock += item.val; addLog(`🚪 Reinforced doors upgraded! Block: ${state.lairBlock}`, 'item'); }
  else if (item.effect === 'ghoul') { state.lairGhouls += item.val; addLog(`👻 Ghoul guard hired! Ghouls: ${state.lairGhouls}`, 'item'); }
  else if (item.effect === 'slow') { state.lairSlow = item.val; addLog(`🕸️ Shadow webs installed!`, 'item'); }
  else if (item.effect === 'ward') { state.lairWard = true; addLog(`🔮 Blood ward active! Holy damage blocked!`, 'item'); }
  else if (item.effect === 'heal') { state.lairHealBonus += item.val; addLog(`⚰️ Coffin upgraded! Heal/turn: ${state.lairHealBonus}`, 'item'); }
  openLair(); // refresh
}

function hideInShelter() {
  if (state.isVampire) { addLog('No shelter in vampire mode. Build your lair instead.', 'vampire'); return; }
  if (state.phase !== 'night') { addLog("It's not night. No need to hide.", 'info'); return; }
  if (state.safehouseLevel <= 0) { addLog("You haven't built any safehouse defenses yet!", 'info'); return; }
  state.isHiding = true;
  addLog(`🏠 Hiding in safehouse (Defense: ${state.safehouseLevel})`, 'info');
  advanceTurn();
}

function becomeVampire() {
  state.isVampire = true;
  state.hp = 80;
  state.maxHp = 120;
  state.weaponIdx = 0;
  state.gold = 0;
  state.bloodEssence = 10;
  state.year = 1880;
  state.infamy = 5;
  state.bloodConsumed = 5;
  state.sleepTurnsRemaining = 3 + Math.floor(Math.random() * 5);
  state.vamps = {}; // no more hunting vamps
  state.shops = {}; // replace with lair
  
  // Put lair at center area
  const shopPositions = [{q:-3,r:0},{q:3,r:0},{q:-1,r:-3},{q:1,r:3},{q:-2,r:2}];
  shopPositions.forEach(p => state.shops[getHexKey(p.q,p.r)] = true);
  
  addLog('💀 YOU HAVE TURNED INTO A VAMPIRE!', 'vampire');
  addLog('🧛 Part 2 begins... Feed. Build. Survive.', 'vampire');
  
  showOverlay(
    '🧛 YOU HAVE TURNED',
    `<p>The vampire's bite has transformed you. Decades will flash by with each passing turn.</p>
     <p>You awaken hungry. Feed on humans to gain power. Build your lair. Heroes will come.</p>
     <p>Your legend is just beginning...</p>`,
    'Awaken as a Vampire',
    () => { closeOverlay(); draw(); }
  );
}

function showGameOver(vampireKilled) {
  state.gameOver = true;
  if (vampireKilled) {
    showOverlay(
      '☀️ DESTROYED BY HEROES',
      `<p>Your reign of terror ends in year ${state.year}.</p>
       <p>Final Infamy: ${state.infamy}</p>
       <p>The hunters have finally prevailed...</p>`,
      'Try Again',
      startNewGame
    );
  }
}

function showOverlay(title, html, btnText, btnAction) {
  const ov = document.getElementById('overlay');
  ov.innerHTML = `<h1>${title}</h1>${html}<button class="btn" id="ovBtn">${btnText}</button>`;
  ov.classList.add('show');
  document.getElementById('ovBtn').onclick = () => { btnAction(); };
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

function startNewGame() {
  closeOverlay();
  closeShop();
  initState();
  generateMap();
  draw();
  addLog('🧛 New game started! Hunt vampires by day, survive by night.', 'day');
  showNotif('🧛 Hex Vampire Hunter', 'day-text');
}

// Input handling
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if ('weadzx'.includes(key)) { e.preventDefault(); movePlayer(key); }
  else if (key === 's' && !e.ctrlKey) { e.preventDefault(); strike(); }
  else if (key === 'b') { e.preventDefault(); openShop(); }
  else if (key === 'h') { e.preventDefault(); hideInShelter(); }
  else if (key === 'l') { e.preventDefault(); toggleLog(); }
});

// Start
resize();
startNewGame();
</script>
