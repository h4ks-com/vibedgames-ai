<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Isometric Aquarium Diagram</title>
<style>
  :root{
    --bg:#f4f7fb;
    --glass-stroke:#2b3b4a;
    --glass-fill:rgba(255,255,255,0.03);
    --water:#66b3ff;
    --accent:#ffb74d;
    --highlight:#ff5252;
    --label-bg:rgba(255,255,255,0.95);
    --shadow:rgba(15,23,42,0.08);
    --text:#102028;
  }

  html,body{
    height:100%;
    margin:0;
    font-family:Inter,Segoe UI,Arial,sans-serif;
    background:linear-gradient(180deg,var(--bg),#eaf3ff 60%);
    color:var(--text);
  }

  .wrap{
    width:900px;
    max-width:95%;
    margin:28px auto;
    padding:18px;
    box-sizing:border-box;
  }

  h1{
    margin:0 0 12px 0;
    font-size:18px;
    color:#0b1720;
    text-align:center;
  }

  .canvas{
    position:relative;
    width:100%;
    height:480px;
    background:transparent;
    border-radius:10px;
    box-shadow:0 6px 22px var(--shadow);
    overflow:visible;
  }

  svg{
    display:block;
    margin:0;
    max-width:100%;
    height:100%;
  }

  /* SVG element default styles */
  .glass { fill: var(--glass-fill); stroke: var(--glass-stroke); stroke-width:2; stroke-linejoin:round; }
  .glass.front { fill: rgba(255,255,255,0.02); }
  .water { fill: url(#waterGrad); stroke: rgba(30,90,160,0.12); stroke-width:1; }
  .pump { fill:#18324a; stroke:#0f1f2b; stroke-width:1; cursor:pointer; }
  .pump .body { fill:#214357; }
  .pump .accent { fill:#0fb6ff; }
  .plant { cursor:pointer; }
  .plant .stem { fill:#2f6b3d; }
  .plant .leaf { fill:#66c275; }
  .led { fill:#ffefb9; stroke:#b57f00; }
  .sensor { fill:#ffd54f; stroke:#8a6b00; cursor:pointer; }
  .rpi { fill:#dfe9f6; stroke:#5a6b86; cursor:pointer; }

  /* highlight when active */
  .active { filter: drop-shadow(0 6px 14px rgba(255,82,82,0.18)); }
  .glow { stroke: var(--highlight); stroke-width:3; filter: blur(0.5px); }

  /* HTML labels overlay */
  .label {
    position:absolute;
    background:var(--label-bg);
    padding:6px 8px;
    border-radius:6px;
    font-size:13px;
    color:var(--text);
    border:1px solid rgba(10,20,30,0.06);
    box-shadow:0 4px 14px var(--shadow);
    cursor:pointer;
    user-select:none;
    display:flex;
    gap:8px;
    align-items:center;
    line-height:1;
  }
  .label small {
    display:inline-block;
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 1px 0 rgba(255,255,255,0.25) inset;
  }
  .label.active{ border-color: rgba(255,82,82,0.18); background:linear-gradient(180deg,#fff,#fff); }
  .label:after{
    content:"";
    position:absolute;
    width:12px;height:12px;
    background:var(--label-bg);
    transform:rotate(45deg);
    left:10px;
    bottom:-6px;
    z-index:-1;
    box-shadow:0 4px 14px var(--shadow);
  }

  /* specific label placements (approx) */
  .lbl-led   { left:380px; top:28px; }
  .lbl-pA    { left:220px; top:300px; }
  .lbl-pB    { left:420px; top:300px; }
  .lbl-plantA{ left:240px; top:220px; }
  .lbl-plantB{ left:380px; top:220px; }
  .lbl-s1    { left:80px;  top:90px; }
  .lbl-s2    { left:520px; top:70px; }
  .lbl-s3    { left:330px; top:180px; }
  .lbl-rpi   { left:560px; top:320px; }

  /* small pointer lines drawn with ::before */
  .label::before{
    content:"";
    position:absolute;
    width:2px;
    height:24px;
    background:linear-gradient(180deg,#9fb7d5,transparent);
    left:14px;
    top:-28px;
    transform-origin:top left;
  }

  /* responsive tweaks */
  @media (max-width:640px){
    .canvas{height:520px;}
    .label{font-size:12px;padding:6px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Isometric Aquarium — Components (click labels to highlight)</h1>

  <div class="canvas" id="canvas">
    <!-- SVG isometric aquarium -->
    <svg viewBox="0 0 700 420" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="waterGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#7fd0ff"/>
          <stop offset="100%" stop-color="#4fa8ff"/>
        </linearGradient>
        <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2b3b4a" flood-opacity="0.08"/>
        </filter>
      </defs>

      <!-- coordinates chosen to give an isometric-like view -->
      <!-- top face -->
      <g id="aquarium">
        <polygon class="glass" points="120,40 460,40 560,120 220,120" fill="rgba(255,255,255,0.02)"/>
        <!-- left face -->
        <polygon class="glass" points="120,40 220,120 220,300 120,220" fill="rgba(255,255,255,0.03)"/>
        <!-- right face -->
        <polygon class="glass" points="460,40 560,120 560,300 460,220" fill="rgba(255,255,255,0.03)"/>
        <!-- front face -->
        <polygon class="glass front" points="220,120 560,120 560,300 220,300" fill="rgba(255,255,255,0.025)"/>

        <!-- water body inside (parallelogram) -->
        <polygon id="water" class="water" points="235,145 545,145 575,245 265,245" opacity="0.95"/>

        <!-- bottom gravel -->
        <path d="M230 248 C275 260 345 260 410 248 C460 238 524 236 560 248 L560 300 L220 300 L230 248" fill="#caa77d" opacity="0.18"/>

        <!-- LED on top middle -->
        <g id="led" class="led" transform="translate(360,20)" style="cursor:pointer">
          <rect x="-28" y="-6" width="56" height="14" rx="3" />
          <rect x="-8" y="8" width="16" height="8" rx="2" fill="#ffd54f"/>
        </g>

        <!-- water pump A (left bottom inside) -->
        <g id="pumpA" class="pump" transform="translate(290,255)">
          <rect class="body" x="-20" y="-12" width="36" height="16" rx="3"/>
          <rect class="accent" x="-30" y="-6" width="10" height="6" rx="2"/>
          <circle cx="12" cy="-4" r="4" fill="#90caf9"/>
        </g>

        <!-- water pump B (right bottom inside) -->
        <g id="pumpB" class="pump" transform="translate(420,255)">
          <rect class="body" x="-20" y="-12" width="36" height="16" rx="3"/>
          <rect class="accent" x="10" y="-6" width="10" height="6" rx="2"/>
          <circle cx="-12" cy="-4" r="4" fill="#90caf9"/>
        </g>

        <!-- plant A -->
        <g id="plantA" class="plant" transform="translate(320,215)">
          <rect class="stem" x="-2" y="0" width="4" height="36" rx="2"/>
          <path class="leaf" d="M2 6 C18 -6 12 24 -2 12 Z"/>
          <path class="leaf" d="M-3 12 C-22 6 -6 30 2 20 Z"/>
        </g>

        <!-- plant B -->
        <g id="plantB" class="plant" transform="translate(460,205) scale(0.95)">
          <rect class="stem" x="-2" y="0" width="4" height="38" rx="2"/>
          <path class="leaf" d="M2 8 C20 -8 14 26 -2 14 Z"/>
          <path class="leaf" d="M-3 14 C-20 8 -4 32 3 22 Z"/>
        </g>

        <!-- sensor 1 (left side outside) -->
        <g id="sensor1" class="sensor" transform="translate(110,80)">
          <circle r="8" />
          <rect x="-4" y="8" width="8" height="18" rx="2" fill="#ffd54f"/>
        </g>

        <!-- sensor 2 (right top outside) -->
        <g id="sensor2" class="sensor" transform="translate(560,70)">
          <circle r="8" />
          <rect x="-4" y="8" width="8" height="18" rx="2" fill="#ffd54f"/>
        </g>

        <!-- sensor 3 (inside, mid water) -->
        <g id="sensor3" class="sensor" transform="translate(420,190)">
          <circle r="7" />
          <rect x="-3" y="9" width="6" height="12" rx="2" fill="#ffd54f"/>
        </g>

        <!-- Raspberry Pi (outside, on the ground, right) -->
        <g id="rpi" class="rpi" transform="translate(620,300)">
          <rect x="-28" y="-18" width="56" height="36" rx="4"/>
          <circle cx="-10" cy="-6" r="3" fill="#9fb3d0"/>
          <circle cx="14" cy="0" r="3" fill="#9fb3d0"/>
        </g>

        <!-- small connection lines (visual only) -->
        <line x1="360" y1="34" x2="360" y2="66" stroke="#bdbdbd" stroke-dasharray="2 3" stroke-width="1" opacity="0.8"/>
        <line x1="290" y1="243" x2="290" y2="256" stroke="#bdbdbd" stroke-width="1" opacity="0.9"/>
        <line x1="420" y1="243" x2="420" y2="256" stroke="#bdbdbd" stroke-width="1" opacity="0.9"/>
        <line x1="320" y1="210" x2="320" y2="230" stroke="#bdbdbd" stroke-width="1" opacity="0.8"/>
        <line x1="460" y1="200" x2="460" y2="230" stroke="#bdbdbd" stroke-width="1" opacity="0.8"/>
        <line x1="110" y1="88" x2="120" y2="108" stroke="#bdbdbd" stroke-width="1" opacity="0.85"/>
        <line x1="560" y1="78" x2="540" y2="108" stroke="#bdbdbd" stroke-width="1" opacity="0.85"/>
        <line x1="420" y1="197" x2="430" y2="210" stroke="#bdbdbd" stroke-width="1" opacity="0.85"/>
        <line x1="620" y1="300" x2="560" y2="300" stroke="#bdbdbd" stroke-width="1" opacity="0.6"/>

      </g>
    </svg>

    <!-- HTML labels (click to highlight corresponding element) -->
    <div class="label lbl-led" data-target="led"><small style="background:#ffefb9"></small>LED light</div>
    <div class="label lbl-pA" data-target="pumpA"><small style="background:#214357"></small>Water Pump A</div>
    <div class="label lbl-pB" data-target="pumpB"><small style="background:#214357"></small>Water Pump B</div>
    <div class="label lbl-plantA" data-target="plantA"><small style="background:#66c275"></small>Plant A</div>
    <div class="label lbl-plantB" data-target="plantB"><small style="background:#66c275"></small>Plant B</div>
    <div class="label lbl-s1" data-target="sensor1"><small style="background:#ffd54f"></small>Sensor 1</div>
    <div class="label lbl-s2" data-target="sensor2"><small style="background:#ffd54f"></small>Sensor 2</div>
    <div class="label lbl-s3" data-target="sensor3"><small style="background:#ffd54f"></small>Sensor 3</div>
    <div class="label lbl-rpi" data-target="rpi"><small style="background:#94a8d6"></small>RPi</div>

  </div>
</div>

<script>
  // Wire up label clicks to highlight corresponding SVG elements
  (function(){
    const canvas = document.getElementById('canvas');
    const labels = canvas.querySelectorAll('.label');
    labels.forEach(lbl=>{
      lbl.addEventListener('click', ()=>{
        const targetId = lbl.getAttribute('data-target');
        const svgEl = canvas.querySelector('#' + CSS.escape(targetId));
        if(!svgEl) return;
        // Toggle active
        const isActive = svgEl.classList.toggle('active');
        lbl.classList.toggle('active', isActive);

        // add a temporary glow stroke for visibility
        if(isActive){
          svgEl.classList.add('glow');
          // remove after 2.6s to keep UI tidy
          setTimeout(()=>{ svgEl.classList.remove('glow'); }, 2600);
        } else {
          svgEl.classList.remove('glow');
        }
      });
      // hover highlight
      lbl.addEventListener('mouseenter', ()=>{
        const targetId = lbl.getAttribute('data-target');
        const svgEl = canvas.querySelector('#' + CSS.escape(targetId));
        if(svgEl) svgEl.style.opacity = 0.92;
      });
      lbl.addEventListener('mouseleave', ()=>{
        const targetId = lbl.getAttribute('data-target');
        const svgEl = canvas.querySelector('#' + CSS.escape(targetId));
        if(svgEl) svgEl.style.opacity = '';
      });
    });

    // Also make clicking svg elements toggle labels
    const svgTargets = ['led','pumpA','pumpB','plantA','plantB','sensor1','sensor2','sensor3','rpi'];
    svgTargets.forEach(id=>{
      const el = canvas.querySelector('#' + id);
      if(!el) return;
      el.addEventListener('click', ()=>{
        const corresponding = canvas.querySelector('.label[data-target="'+id+'"]');
        if(corresponding) corresponding.click();
        // slight pop animation
        el.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.04)' }, { transform: 'scale(1)' }], { duration:260, easing:'ease-out' });
      });
    });

  })();
</script>
</body>
</html>
