<!doctype html><html><meta charset=utf-8><title>Win98</title><style>body{margin:0;background:#008080;font-family:Tahoma,Arial}#win{position:absolute;left:80px;top:60px;width:420px;border:2px solid #000;background:#c0c0c0;box-shadow:4px 4px 0 #404040}#bar{background:linear-gradient(#000,#333);color:#fff;padding:4px 6px;cursor:move;display:flex;justify-content:space-between;align-items:center;font-weight:bold}#menubar{background:#e0e0e0;padding:6px;border-top:2px solid #fff;border-bottom:2px solid #808080}#menubar .m{display:inline-block;position:relative;padding:0 8px;cursor:default}ul.drop{position:absolute;left:0;top:22px;background:#fff;border:1px solid #888;list-style:none;margin:0;padding:4px;display:none;min-width:100px}ul.drop li{padding:4px 8px;white-space:nowrap}ul.drop li:hover{background:#0a57ff;color:#fff}#content{padding:10px;height:200px;overflow:auto;background:#fff;border-top:2px solid #808080}#res{width:12px;height:12px;position:absolute;right:0;bottom:0;cursor:se-resize;background:linear-gradient(45deg,#808080,#e0e0e0);border-left:2px solid #fff;border-top:2px solid #fff}button.b{background:#c0c0c0;border:2px solid #fff;padding:0 6px;margin-left:6px;cursor:pointer}</style><body>
<div id=win>
  <div id=bar><div>My Computer</div><div><button class=b id=min>_</button><button class=b id=cls>X</button></div></div>
  <div id=menubar>
    <div class=m>File<ul class=drop><li data-act="new">New</li><li data-act="open">Open</li><li data-act="exit">Exit</li></ul></div>
    <div class=m>Edit<ul class=drop><li data-act="cut">Cut</li><li data-act="copy">Copy</li><li data-act="paste">Paste</li></ul></div>
    <div class=m>View<ul class=drop><li data-act="icons">Icons</li><li data-act="list">List</li></ul></div>
    <div class=m>Help<ul class=drop><li data-act="about">About</li></ul></div>
  </div>
  <div id=content>Welcome to Win98 lite window.</div>
  <div id=res></div>
</div>
<script>
let W=document.getElementById('win'),bar=document.getElementById('bar'),res=document.getElementById('res'),min=document.getElementById('min'),cls=document.getElementById('cls'),content=document.getElementById('content');
bar.onmousedown=e=>{e.preventDefault();let sx=e.clientX,sy=e.clientY,ox=W.offsetLeft,oy=W.offsetTop;let mv=e2=>{W.style.left=ox+e2.clientX-sx+'px';W.style.top=oy+e2.clientY-sy+'px'};document.onmousemove=mv;document.onmouseup=()=>document.onmousemove=null};
res.onmousedown=e=>{e.preventDefault();let sw=W.offsetWidth,sh=W.offsetHeight,sx=e.clientX,sy=e.clientY;document.onmousemove=e2=>{W.style.width=Math.max(200,sw+e2.clientX-sx)+'px';W.style.height=Math.max(60,sh+e2.clientY-sy)+'px';content.style.height=(W.offsetHeight-100)+'px'};document.onmouseup=()=>document.onmousemove=null};
min.onclick=()=>{if(content.style.display==='none'){content.style.display='block';document.getElementById('menubar').style.display='block';res.style.display='block';W.style.height='auto'}else{content.style.display='none';document.getElementById('menubar').style.display='none';res.style.display='none';W.style.height='34px'}};
cls.onclick=()=>W.style.display='none';
// menus
document.querySelectorAll('#menubar .m').forEach(m=>{m.onclick=e=>{e.stopPropagation();document.querySelectorAll('ul.drop').forEach(d=>d.style.display='none');let d=m.querySelector('ul.drop');d.style.display=d.style.display==='block'?'none':'block'}})
document.addEventListener('click',()=>document.querySelectorAll('ul.drop').forEach(d=>d.style.display='none'))
document.querySelectorAll('ul.drop li').forEach(li=>li.onclick=e=>{e.stopPropagation();let a=li.dataset.act; if(a==='exit') W.style.display='none'; else content.innerText='Action: '+a}) 
</script>
</body></html>
