<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Random Splitter</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --bg1:#071028;
    --bg2:#0b1220;
    --card: rgba(255,255,255,0.03);
    --accent: #2563eb;
    --muted: rgba(255,255,255,0.6);
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial; background:linear-gradient(180deg,var(--bg1),var(--bg2)); color:#fff;}
  .page{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;}
  #app{width:920px;max-width:calc(100% - 48px);}
  .win{
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border:1px solid rgba(255,255,255,0.04);
    padding:12px;
    border-radius:8px;
    margin:8px 0;
    display:flex;
    flex-direction:column;
    gap:8px;
    transition: all 180ms ease;
    overflow:visible;
  }
  .header{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .titleRow{display:flex;align-items:center;gap:10px;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 6px 18px rgba(37,99,235,0.18);}
  .title{font-weight:700;letter-spacing:0.2px;}
  .meta{font-size:12px;color:var(--muted);background:rgba(255,255,255,0.02);padding:6px 8px;border-radius:6px;}
  button.splitBtn{
    padding:8px 12px;border-radius:6px;border:none;background:linear-gradient(180deg,#3b82f6,#2563eb);color:white;font-weight:600;cursor:pointer;box-shadow:0 6px 14px rgba(37,99,235,0.18);
  }
  .subslot{margin-top:8px;padding-left:12px;border-left:2px dashed rgba(255,255,255,0.03);display:flex;flex-direction:column;gap:8px;}
  .subslot .win{transform:scale(0.985);opacity:0.98;}
  @media (max-width:520px){#app{width:100%}}
</style>
</head>
<body>
  <div class="page">
    <div id="app"></div>
  </div>

<script>
(function(){
  const app = document.getElementById('app');

  function randTitle(len = 8){
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let s = '';
    for(let i=0;i<len;i++) s += chars[Math.floor(Math.random()*chars.length)];
    return s;
  }

  function makeWin(title){
    const win = document.createElement('div');
    win.className = 'win';

    const header = document.createElement('div');
    header.className = 'header';

    const left = document.createElement('div');
    left.className = 'titleRow';
    const dot = document.createElement('div');
    dot.className = 'dot';
    const label = document.createElement('div');
    label.className = 'title';
    label.textContent = title || randTitle();
    left.appendChild(dot);
    left.appendChild(label);

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = 'Window';

    header.appendChild(left);
    header.appendChild(meta);

    const btn = document.createElement('button');
    btn.className = 'splitBtn';
    btn.textContent = 'Split a random window';
    btn.addEventListener('click', splitRandom);

    win.appendChild(header);
    win.appendChild(btn);

    return win;
  }

  function makeOuterWrapper(title){
    const outer = document.createElement('div');
    outer.className = 'win';

    const header = document.createElement('div');
    header.className = 'header';

    const left = document.createElement('div');
    left.className = 'titleRow';
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.background = '#10b981';
    const label = document.createElement('div');
    label.className = 'title';
    label.textContent = title || randTitle();
    left.appendChild(dot);
    left.appendChild(label);

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = 'Contains subwindow';

    header.appendChild(left);
    header.appendChild(meta);

    const btn = document.createElement('button');
    btn.className = 'splitBtn';
    btn.textContent = 'Split a random window';
    btn.addEventListener('click', splitRandom);

    const subslot = document.createElement('div');
    subslot.className = 'subslot';

    outer.appendChild(header);
    outer.appendChild(btn);
    outer.appendChild(subslot);

    return { outer, subslot };
  }

  function splitRandom(e){
    if(e && e.stopPropagation) e.stopPropagation();

    const wins = Array.from(document.querySelectorAll('.win'));
    if(wins.length === 0) return;

    // choose a random win to become the subwindow
    const idx = Math.floor(Math.random() * wins.length);
    const selected = wins[idx];
    if(!selected.parentNode) return;

    // create new outer with a random title
    const { outer, subslot } = makeOuterWrapper(randTitle());

    // replace selected in DOM with outer, then append selected inside subslot
    const parent = selected.parentNode;
    parent.replaceChild(outer, selected);
    subslot.appendChild(selected);

    // animate the new outer
    outer.animate([
      { transform: 'scale(0.99)', opacity: 0.92 },
      { transform: 'scale(1)', opacity: 1 }
    ], { duration: 220, easing: 'ease-out' });
  }

  // initialize app with one window that has a random alphanumeric title
  app.appendChild(makeWin(randTitle()));

  // optional: 's' key to split as shortcut
  window.addEventListener('keydown', (ev) => {
    if(ev.key && ev.key.toLowerCase() === 's') splitRandom();
  });

})();
</script>
</body>
</html>
