<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Worms-inspired 3D Blast (Demo)</title>
<style>
  html,body{height:100%;margin:0;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;}
  #ui { position: absolute; top: 8px; left: 8px; z-index: 10; color: #eee; background: rgba(0,0,0,0.45); padding: 8px; border-radius: 8px; max-width: 320px;}
  #status { font-size: 12px; margin-bottom: 6px; }
  button,select,input{margin:2px;font-size:13px}
  #chat{position:absolute;right:8px;top:8px;width:260px;max-height:60vh;overflow:auto;background:rgba(0,0,0,0.35);padding:6px;border-radius:8px;color:#fff}
  #controls { position:absolute; left:50%; transform:translateX(-50%); bottom:8px; z-index:10; display:flex; gap:8px; }
  #joystick{position: absolute; left:12px; bottom:80px; width:120px; height:120px; border-radius:60px; background: rgba(255,255,255,0.04); touch-action:none; display:none; }
  #joyknob{position:absolute; left:40px; top:40px; width:40px; height:40px; border-radius:20px; background: rgba(255,255,255,0.12); }
  #hudTimer{font-weight:bold;font-size:18px}
  #minimap{position:absolute; right:12px; bottom:12px; width:160px;height:120px;background:rgba(0,0,0,0.25);border-radius:8px;overflow:hidden}
  .small { font-size:12px }
  .muted { opacity:0.7 }
  #weapons button { display:block;width:100%;text-align:left;margin-top:4px;}
  #logexport { width:100%; font-size:12px }
  #sdpbox {width:100%;height:80px}
</style>
</head>
<body>
<div id="ui">
  <div id="status">Worms-inspired 3D Blast — Local Demo (Single-player + AI)</div>
  <div id="hud" class="small">
    <div>Turn: <span id="hudTurn">0</span> | Player: <span id="hudPlayer">-</span> | Wind: <span id="hudWind">0</span></div>
    <div>Timer: <span id="hudTimer">--</span></div>
  </div>
  <div style="margin-top:6px">
    Class:
    <select id="classSel">
      <option value="soldier">Soldier</option>
      <option value="engineer">Engineer</option>
      <option value="pilot">Pilot</option>
    </select>
    Skin:
    <select id="skinSel">
      <option>Red</option><option>Blue</option><option>Green</option><option>Purple</option>
    </select>
  </div>
  <div style="margin-top:6px">
    Aim Mode:
    <button id="orbitBtn">Orbit</button>
    <button id="snapBtn">Snap-to-weapon</button>
    <label style="margin-left:8px"><input type="checkbox" id="trajToggle" checked/> Trajectory</label>
  </div>
  <div style="margin-top:6px">
    Wind: <input id="windRange" type="range" min="-30" max="30" value="0" />
    <button id="nextTurnBtn">End Turn</button>
  </div>
  <div id="weapons" style="margin-top:6px">
    Weapons:
    <button data-weapon="bazooka">Bazooka</button>
    <button data-weapon="grenade">Grenade</button>
    <button data-weapon="missile">Homing Missile</button>
    <button data-weapon="airstrike">Airstrike</button>
    <button data-weapon="teleport">Teleport</button>
    <button data-weapon="parachute">Parachute</button>
  </div>

  <div style="margin-top:6px">
    <button id="spawnAI">Spawn AI Bot</button>
    <button id="resetBtn">Reset Map</button>
  </div>

  <div style="margin-top:6px">
    Networking (manual/demo): <button id="startLocalNet">Open Local P2P Demo</button>
  </div>

  <div style="margin-top:6px">
    Action Log: <button id="exportLog">Export</button> <button id="importLogBtn">Import</button>
    <textarea id="logexport" placeholder="action log JSON"></textarea>
  </div>

  <div style="margin-top:6px" class="small muted">
    Tips: WASD to move, Space to jump, Mouse to aim, Click to fire. Mobile: enable joystick below.
  </div>
</div>

<div id="chat"></div>
<div id="joystick"><div id="joyknob"></div></div>
<div id="controls">
  <button id="toggleJoystick">Toggle Joystick</button>
  <button id="muteBtn">Mute</button>
</div>

<div id="minimap"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js';
import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

/*
  Worms-inspired 3D Blast - Single-file demo
  Features implemented:
  - Three.js rendering + Cannon.js physics
  - Destructible voxel heightfield terrain with dynamic mesh and physics rebuild on explosions
  - Turn-based timer, movement (walk, jump, parachute), jetpack (as boost), trajectory preview, wind
  - Weapons: bazooka, grenade, homing missile, airstrike, teleport, parachute
  - Simple AI bots
  - Deterministic seedable RNG & action-log export/import (simulated authoritative model)
  - WebAudio sound effects
  - Basic P2P DataChannel skeleton with manual SDP copy/paste (no signaling server)
  - Mobile virtual joystick
  - Accessibility: control remapping via UI not included but keys can be modified in code
  - Note: This is a demo and doesn't include TURN/STUN servers or server code.
*/

// ------- Utility: seedable RNG -------
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

// ------- Audio -------
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playExplosion(pos) {
  // simple noise burst
  const o = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0;i<data.length;i++) data[i] = (Math.random()*2-1)*Math.exp(-i/data.length*6);
  o.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.value = 0.4;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
}

// ------- Scene init -------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x99ccff);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,30,40);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=> {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,6,0);
controls.enableDamping = true;

// Lighting
const hemi = new THREE.HemisphereLight(0xffffff, 0x444488, 0.7);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(30,50,10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60; sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
scene.add(sun);

// ------- Physics world -------
const world = new CANNON.World({
  gravity: new CANNON.Vec3(0,-9.82,0)
});
world.broadphase = new CANNON.SAPBroadphase(world);
world.solver.iterations = 8;

// ------- Terrain: voxel heightfield -------
const TERRAIN_SIZE = 96;
const TERRAIN_RES = 64;
let heightData = new Float32Array((TERRAIN_RES+1)*(TERRAIN_RES+1));
let terrainMesh = null;
let terrainBody = null;

function generateHeight(seed=1) {
  const rng = mulberry32(seed);
  for (let z=0; z<=TERRAIN_RES; z++) {
    for (let x=0; x<=TERRAIN_RES; x++) {
      const i = z*(TERRAIN_RES+1)+x;
      const nx = x/TERRAIN_RES - 0.5, nz = z/TERRAIN_RES - 0.5;
      const h = (Math.sin((nx*8+seed*0.1))*0.5 + Math.cos((nz*6+seed*0.07))*0.5)*4;
      const island = Math.max(0, 1 - (Math.hypot(nx,nz)*1.6));
      heightData[i] = h*island*12 + (rng()-0.5)*1.2;
    }
  }
}

function buildTerrainMesh() {
  if (terrainMesh) {
    scene.remove(terrainMesh);
    terrainMesh.geometry.dispose();
  }
  const geom = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_RES, TERRAIN_RES);
  geom.rotateX(-Math.PI/2);
  const verts = geom.attributes.position.array;
  for (let i=0;i<verts.length/3;i++){
    verts[i*3+1] = heightData[i];
  }
  geom.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({color:0x669954, side:THREE.DoubleSide});
  terrainMesh = new THREE.Mesh(geom, mat);
  terrainMesh.receiveShadow = true;
  scene.add(terrainMesh);
}

function buildTerrainPhysics() {
  if (terrainBody) {
    world.removeBody(terrainBody);
  }
  // Cannon Heightfield expects rows along x
  const matrix = [];
  for (let i=0;i<=TERRAIN_RES;i++){
    const row = [];
    for (let j=0;j<=TERRAIN_RES;j++){
      row.push(heightData[j*(TERRAIN_RES+1)+i]); // transposed
    }
    matrix.push(row);
  }
  const hfShape = new CANNON.Heightfield(matrix, {
    elementSize: TERRAIN_SIZE / TERRAIN_RES
  });
  terrainBody = new CANNON.Body({ mass: 0 });
  terrainBody.addShape(hfShape, new CANNON.Vec3(-TERRAIN_SIZE/2, 0, -TERRAIN_SIZE/2));
  world.addBody(terrainBody);
}

// Damage terrain by lowering height in radius
function deformTerrainWorld(pos, radius, depth) {
  // pos is THREE.Vector3
  const half = TERRAIN_SIZE/2;
  for (let z=0; z<=TERRAIN_RES; z++){
    for (let x=0; x<=TERRAIN_RES; x++){
      const px = (x/TERRAIN_RES)*TERRAIN_SIZE - half;
      const pz = (z/TERRAIN_RES)*TERRAIN_SIZE - half;
      const d = Math.hypot(px - pos.x, pz - pos.z);
      if (d < radius) {
        const i = z*(TERRAIN_RES+1)+x;
        const fall = (1 - (d/radius));
        heightData[i] -= depth * fall;
        if (heightData[i] < -6) heightData[i] = -6;
      }
    }
  }
  buildTerrainMesh();
  buildTerrainPhysics();
}

// ------- Entities -------
let entities = []; // players, bots, projectiles
let players = [];
let projectiles = [];

function createPlayer(name, pos, skin='Red', isAI=false, cls='soldier') {
  const geom = new THREE.CapsuleGeometry(0.6, 1.2, 4, 8);
  const mat = new THREE.MeshStandardMaterial({color: skinColor(skin) });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  const shape = new CANNON.Cylinder(0.6,0.6,1.8,8);
  const body = new CANNON.Body({ mass: 80, fixedRotation: true });
  body.addShape(shape);
  body.position.set(pos.x,pos.y,pos.z);
  body.linearDamping = 0.9;
  world.addBody(body);

  const player = {
    id: name + '_' + Math.floor(Math.random()*9999),
    name, mesh, body, health: 100, isAI, skin, cls,
    canJetpack: cls==='pilot',
    hasParachute: cls==='pilot',
    parachuteActive: false,
    rope: null,
    alive: true,
    aimYaw: 0, aimPitch: -0.3,
    moveInput: {x:0,z:0,jump:false},
    availableWeapons: ['bazooka','grenade','missile','airstrike','teleport','parachute'],
    currentWeapon: 'bazooka'
  };
  players.push(player);
  entities.push(player);
  return player;
}

function skinColor(skin) {
  switch (skin.toLowerCase()){
    case 'red': return 0xd94b4b;
    case 'blue': return 0x4b7ed9;
    case 'green': return 0x4bd98a;
    case 'purple': return 0xa24bd9;
    default: return 0xffffff;
  }
}

// ------- Projectiles -------
function spawnProjectile(type, owner, pos, dir, speed, seed) {
  const id = 'proj_'+Math.floor(Math.random()*1e9);
  const mat = new THREE.MeshStandardMaterial({color:0x222222});
  let geom;
  if (type === 'grenade') geom = new THREE.SphereGeometry(0.4,8,6);
  else if (type === 'missile') geom = new THREE.CylinderGeometry(0.18,0.18,1.2,8);
  else geom = new THREE.SphereGeometry(0.25,6,6);
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  scene.add(mesh);

  const shape = new CANNON.Sphere(0.4);
  const body = new CANNON.Body({ mass: 4, material: new CANNON.Material({friction:0.4, restitution:0.2})});
  body.addShape(shape);
  body.position.set(pos.x,pos.y,pos.z);
  body.velocity.set(dir.x*speed + wind/6, dir.y*speed, dir.z*speed);
  world.addBody(body);

  const proj = { id, type, owner, mesh, body, life: 10, seed, homingTarget: null, spawnTime: performance.now(), exploded:false };
  projectiles.push(proj);
  entities.push(proj);

  body.addEventListener('collide', (e) => {
    // simple explosion on collision (except missile may home)
    if (!proj.exploded) {
      if (type === 'grenade') {
        explodeAt(proj, body.position, 4.5, 22);
      } else if (type === 'bazooka') {
        explodeAt(proj, body.position, 5.5, 28);
      } else if (type === 'missile') {
        explodeAt(proj, body.position, 6.2, 38);
      } else {
        explodeAt(proj, body.position, 4, 18);
      }
    }
  });

  return proj;
}

function explodeAt(proj, posVec, radius=5, damage=30) {
  proj.exploded = true;
  playExplosion();
  // visual
  const explosionGeom = new THREE.SphereGeometry(radius, 12, 8);
  const explosionMat = new THREE.MeshBasicMaterial({color:0xffaa33, transparent:true, opacity:0.85});
  const explosionMesh = new THREE.Mesh(explosionGeom, explosionMat);
  explosionMesh.position.copy(posVec);
  scene.add(explosionMesh);
  setTimeout(()=>{ scene.remove(explosionMesh); }, 600);

  // physics impulse and damage
  const pos = new THREE.Vector3(posVec.x, posVec.y, posVec.z);
  // damage players near explosion
  players.forEach(p => {
    if (!p.alive) return;
    const ppos = new THREE.Vector3(p.body.position.x, p.body.position.y, p.body.position.z);
    const d = ppos.distanceTo(pos);
    if (d < radius*1.2) {
      const dmg = Math.floor(Math.max(0, (1 - (d/radius))*damage));
      p.health -= dmg;
      if (p.health <= 0) {
        p.alive = false;
        p.health = 0;
        // ragdoll / remove
        world.removeBody(p.body);
        scene.remove(p.mesh);
        logEvent({t:'death', id:p.id, by: proj.owner.id});
      } else {
        // apply impulse
        const dir = ppos.sub(pos).normalize();
        const force = dir.multiplyScalar((radius-d)*10);
        p.body.velocity.x += force.x;
        p.body.velocity.y += 4;
        p.body.velocity.z += force.z;
      }
    }
  });

  // deform terrain
  deformTerrainWorld(pos, radius*0.9, radius*0.9);

  // remove projectile body & mesh
  try {
    world.removeBody(proj.body);
  } catch(e){}
  scene.remove(proj.mesh);
  // mark for removal
  setTimeout(()=> {
    const idx = projectiles.indexOf(proj);
    if (idx>=0) projectiles.splice(idx,1);
    const enx = entities.indexOf(proj);
    if (enx>=0) entities.splice(enx,1);
  },50);
}

// ------- Input & Controls -------
const keyState = {};
window.addEventListener('keydown', (e)=> {
  keyState[e.code] = true;
  if (e.code === 'Space') localPlayer.moveInput.jump = true;
  if (e.code === 'KeyF') fireWeapon(localPlayer);
});
window.addEventListener('keyup', (e)=> {
  keyState[e.code] = false;
  if (e.code === 'Space') localPlayer.moveInput.jump = false;
});

let mouseDown = false;
renderer.domElement.addEventListener('pointerdown', (e)=> {
  if (e.button === 0) {
    mouseDown = true;
    if (e.target === renderer.domElement && e.pointerType !== 'touch') {
      fireWeapon(localPlayer);
    }
  }
});
window.addEventListener('pointerup',(e)=> { mouseDown=false; });

let touchJoystickEnabled = false;
const joystick = document.getElementById('joystick');
const joyknob = document.getElementById('joyknob');
let joyCenter = {x:60,y:60}, joyActive=false, joyVal={x:0,y:0};
document.getElementById('toggleJoystick').onclick = ()=> {
  touchJoystickEnabled = !touchJoystickEnabled;
  joystick.style.display = touchJoystickEnabled ? 'block' : 'none';
}
joystick.addEventListener('pointerdown',(e)=>{
  joyActive = true;
  joystick.setPointerCapture(e.pointerId);
});
joystick.addEventListener('pointermove',(e)=>{
  if (!joyActive) return;
  const rect = joystick.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const dx = x - joyCenter.x, dy = y - joyCenter.y;
  const max = 40;
  const len = Math.min(max, Math.hypot(dx,dy));
  const ang = Math.atan2(dy,dx);
  const nx = Math.cos(ang)*len, ny = Math.sin(ang)*len;
  joyknob.style.left = (nx + joyCenter.x - 20)+'px';
  joyknob.style.top = (ny + joyCenter.y - 20)+'px';
  joyVal.x = nx/max;
  joyVal.y = -ny/max;
});
joystick.addEventListener('pointerup',(e)=>{
  joyActive=false;
  joyknob.style.left = (joyCenter.x-20)+'px';
  joyknob.style.top = (joyCenter.y-20)+'px';
  joyVal.x=0; joyVal.y=0;
});

// ------- Player movement & camera -------
let localPlayer = null;
function spawnLocalPlayer() {
  const p = createPlayer('Player'+(players.length+1), new THREE.Vector3(0,8,0), 'Red', false, 'soldier');
  localPlayer = p;
  document.getElementById('hudPlayer').textContent = p.name;
  return p;
}

// ------- Weapons & firing -------
function fireWeapon(player) {
  if (!player || !player.alive) return;
  const w = player.currentWeapon;
  logEvent({t:'fire', id:player.id, weapon:w, seed:Math.floor(Math.random()*1e9)});
  // aim dir
  const yaw = player.aimYaw; const pitch = player.aimPitch;
  const dir = new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch), Math.sin(pitch), Math.cos(yaw)*Math.cos(pitch));
  const pos = new THREE.Vector3(player.body.position.x, player.body.position.y+1.2, player.body.position.z).addScaledVector(dir,1.2);
  if (w === 'bazooka') {
    spawnProjectile('bazooka', player, pos, dir, 38);
  } else if (w === 'grenade') {
    spawnProjectile('grenade', player, pos, dir, 14);
  } else if (w === 'missile') {
    const proj = spawnProjectile('missile', player, pos, dir, 24);
    // choose target nearest enemy
    let nearest=null, nd=1e9;
    players.forEach(p => { if (p !== player && p.alive) {
      const d = Math.hypot(p.body.position.x - pos.x, p.body.position.y - pos.y, p.body.position.z - pos.z);
      if (d < nd) { nd=d; nearest=p; }
    }});
    if (nearest) proj.homingTarget = nearest;
  } else if (w === 'airstrike') {
    // spawn 5 bombs from above along aim x-axis
    for (let i=-2;i<=2;i++){
      const offset = new THREE.Vector3(i*3, 40, 0).applyAxisAngle(new THREE.Vector3(0,1,0), player.aimYaw);
      const dropPos = new THREE.Vector3(player.body.position.x, player.body.position.y, player.body.position.z).add(offset);
      const bomb = spawnProjectile('bazooka', player, dropPos, new THREE.Vector3(0,-1,0), 0);
      // give slightly downward velocity
      bomb.body.velocity.y = -10 - Math.random()*10;
      setTimeout(()=>{ if (!bomb.exploded) explodeAt(bomb, bomb.body.position, 5, 22); }, 4500 + Math.random()*1000);
    }
  } else if (w === 'teleport') {
    // teleport forward
    const dest = new THREE.Vector3(player.body.position.x, player.body.position.y+1, player.body.position.z).addScaledVector(dir, 9);
    // place above ground
    dest.y += 6;
    // drop down to surface height using heightData
    // approximate: ray down
    const h = sampleHeightAt(dest.x, dest.z);
    dest.y = Math.max(h+1.2, dest.y - 12);
    player.body.position.set(dest.x,dest.y,dest.z);
  } else if (w === 'parachute') {
    player.parachuteActive = true;
    setTimeout(()=>{ player.parachuteActive = false; }, 8000);
  }
}

// sample height at world x,z
function sampleHeightAt(x,z) {
  const half = TERRAIN_SIZE/2;
  const fx = (x + half)/TERRAIN_SIZE * TERRAIN_RES;
  const fz = (z + half)/TERRAIN_SIZE * TERRAIN_RES;
  const ix = Math.floor(fx), iz = Math.floor(fz);
  if (ix<0 || iz<0 || ix>=TERRAIN_RES || iz>=TERRAIN_RES) return -6;
  const i = iz*(TERRAIN_RES+1)+ix;
  return heightData[i] || 0;
}

// ------- Trajectory preview -------
const trajLineMat = new THREE.LineDashedMaterial({color:0x222222, dashSize:0.6, gapSize:0.3});
let trajLine = null;
function updateTrajectoryPreview(player) {
  if (!player || !document.getElementById('trajToggle').checked) {
    if (trajLine) { scene.remove(trajLine); trajLine=null; }
    return;
  }
  const yaw = player.aimYaw, pitch = player.aimPitch;
  const dir = new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch), Math.sin(pitch), Math.cos(yaw)*Math.cos(pitch));
  const start = new THREE.Vector3(player.body.position.x, player.body.position.y+1.2, player.body.position.z).addScaledVector(dir,1.5);
  const points = [start.clone()];
  let pos = start.clone();
  let vel = dir.clone().multiplyScalar(40);
  const dt = 0.06;
  for (let i=0;i<120;i++){
    // integrate with wind
    vel.x += (wind*0.01)*dt;
    vel.y += world.gravity.y*dt*0.98;
    pos = pos.clone().addScaledVector(vel, dt);
    points.push(pos.clone());
    const h = sampleHeightAt(pos.x,pos.z);
    if (pos.y < h + 0.2) break;
  }
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  if (trajLine) scene.remove(trajLine);
  trajLine = new THREE.Line(geometry, trajLineMat);
  trajLine.computeLineDistances();
  scene.add(trajLine);
}

// ------- AI Bots -------
function spawnAIBot() {
  const angle = Math.random()*Math.PI*2;
  const r = Math.random()*20 + 6;
  const pos = new THREE.Vector3(Math.cos(angle)*r,8,Math.sin(angle)*r);
  const ai = createPlayer('AI'+(players.length+1), pos, ['Blue','Green','Purple'][Math.floor(Math.random()*3)], true, ['soldier','engineer','pilot'][Math.floor(Math.random()*3)]);
  ai.aiState = { timer: Math.random()*3+1, action: 'idle' };
  return ai;
}

function aiTick(ai, dt) {
  if (!ai.alive) return;
  ai.aiState.timer -= dt;
  if (ai.aiState.timer <= 0) {
    // pick random action
    const r = Math.random();
    if (r < 0.4) ai.aiState.action = 'move';
    else if (r < 0.75) ai.aiState.action = 'aim';
    else ai.aiState.action = 'fire';
    ai.aiState.timer = Math.random()*3 + 1;
  }
  // simple behaviors
  if (ai.aiState.action === 'move') {
    // random walk
    ai.moveInput.x = Math.sin(performance.now()*0.001 + ai.id.length)%1;
    ai.moveInput.z = Math.cos(performance.now()*0.001 + ai.id.length)%1;
    if (Math.random() < 0.01) ai.moveInput.jump = true;
  } else {
    ai.moveInput.x = 0; ai.moveInput.z = 0; ai.moveInput.jump = false;
  }
  if (ai.aiState.action === 'aim' || ai.aiState.action === 'fire') {
    // aim at nearest enemy
    let target=null, nd=1e9;
    players.forEach(p => { if (p !== ai && p.alive) {
      const d = Math.hypot(p.body.position.x - ai.body.position.x, p.body.position.z - ai.body.position.z);
      if (d < nd) { nd=d; target=p; }
    }});
    if (target) {
      const dx = target.body.position.x - ai.body.position.x;
      const dz = target.body.position.z - ai.body.position.z;
      const dy = (target.body.position.y - ai.body.position.y)+1;
      ai.aimYaw = Math.atan2(dx,dz);
      ai.aimPitch = Math.atan2(dy, Math.hypot(dx,dz)) * 0.9;
      if (ai.aiState.action === 'fire' && Math.random() < 0.04) {
        ai.currentWeapon = ['bazooka','grenade','missile'][Math.floor(Math.random()*3)];
        fireWeapon(ai);
      }
    }
  }
}

// ------- Game loop & updates -------
let lastTime = performance.now();
let accum = 0;
let turnIndex = 0;
let turnTimer = 30; // seconds per turn
let wind = 0;
let actionLog = []; // deterministic action log

function logEvent(e) {
  // attach timestamp and deterministic seed index
  e.ts = performance.now();
  actionLog.push(e);
  // update export box
  document.getElementById('logexport').value = JSON.stringify(actionLog, null, 1);
}

function nextTurn() {
  turnIndex++;
  turnTimer = 30;
  document.getElementById('hudTurn').textContent = turnIndex;
  // vary wind deterministically
  wind = (Math.random()*40 - 20);
  document.getElementById('windRange').value = wind;
  document.getElementById('hudWind').textContent = wind.toFixed(1);
  logEvent({t:'turn', turn:turnIndex, wind});
}

function resetGame() {
  // clear entities and rebuild terrain
  players.forEach(p => {
    try{ world.removeBody(p.body);}catch(e){}
    try{ scene.remove(p.mesh);}catch(e){}
  });
  players = [];
  entities = [];
  projectiles = [];
  actionLog = [];
  document.getElementById('logexport').value = '';
  generateHeight(Math.floor(Math.random()*1000));
  buildTerrainMesh();
  buildTerrainPhysics();
  spawnLocalPlayer();
  spawnAIBot();
  spawnAIBot();
  turnIndex = 0;
  nextTurn();
}

spawnAIBot();
spawnAIBot();
nextTurn();

// ------- Replay deterministic log (simple) -------
function replayLog(log) {
  // quick naive replay: reset and then step through events with timeouts
  resetGame();
  let base = performance.now();
  log.forEach((ev,idx) => {
    setTimeout(()=> {
      handleEventDuringReplay(ev);
    }, (ev.ts - log[0].ts));
  });
}
function handleEventDuringReplay(ev) {
  if (ev.t === 'fire') {
    // find player by id
    const p = players.find(x => x.id===ev.id);
    if (p) {
      p.currentWeapon = ev.weapon || 'bazooka';
      fireWeapon(p);
    }
  } else if (ev.t === 'turn') {
    wind = ev.wind;
    document.getElementById('hudWind').textContent = wind.toFixed(1);
  } else if (ev.t === 'death') {
    const p = players.find(x => x.id===ev.id);
    if (p) { p.alive = false; world.removeBody(p.body); scene.remove(p.mesh); }
  }
}

// ------- Networking P2P skeleton (manual copy-paste SDP) -------
let pc = null, dc = null;
document.getElementById('startLocalNet').onclick = async ()=> {
  if (pc) { alert('Already running P2P demo. Use console for DataChannel.'); return; }
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]});
  dc = pc.createDataChannel('game');
  dc.onopen = ()=> console.log('DataChannel open');
  dc.onmessage = (m)=> {
    console.log('DC msg', m.data);
    addChat('Peer: '+m.data);
  };
  pc.onicecandidate = (e)=> {
    if (e.candidate) {
      console.log('ICE candidate', e.candidate.candidate);
    } else {
      console.log('ICE gathering complete');
    }
  };
  pc.ondatachannel = (ev)=> {
    const ch = ev.channel;
    ch.onmessage = (m)=> { addChat('Peer: '+m.data); };
    ch.onopen = ()=> addChat('Peer channel open');
  };
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  // user must copy offer.sdp and paste to remote peer to create answer (manual signaling)
  prompt('Send this SDP to remote peer (manual signaling):', btoa(JSON.stringify({sdp: offer.sdp, type: offer.type})));

  try {

    await pc.setRemoteDescription(ans);
    addChat('P2P connected (manual).');
  } catch(e) { alert('Invalid answer'); }
};

}

// ------- Game Tick -------
function physicsStep(dt) {
  // player movement
  players.forEach(p => {
    if (!p.alive) return;
    // apply movement from keys or joystick
    let mx = 0, mz = 0;
    if (p === localPlayer) {
      if (touchJoystickEnabled) { mx = joyVal.x; mz = joyVal.y; }
      if (keyState['KeyA']) mx -= 1;
      if (keyState['KeyD']) mx += 1;
      if (keyState['KeyW']) mz += 1;
      if (keyState['KeyS']) mz -= 1;
    } else {
      mx = p.moveInput.x || 0; mz = p.moveInput.z || 0;
    }
    const forward = new THREE.Vector3(Math.sin(p.aimYaw), 0, Math.cos(p.aimYaw));
    const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), forward);
    const moveDir = new THREE.Vector3();
    moveDir.addScaledVector(forward, mz).addScaledVector(right, mx).normalize();
    const speed = 5;
    if (moveDir.length() > 0.1) {
      p.body.velocity.x += moveDir.x * speed * dt * 8;
      p.body.velocity.z += moveDir.z * speed * dt * 8;
    }
    // jump
    if (p.moveInput.jump) {
      // simple ground check by sampling terrain underfoot
      const h = sampleHeightAt(p.body.position.x, p.body.position.z);
      if (p.body.position.y < h + 1.8 + 0.5) {
        p.body.velocity.y = 7;
      }
    }
    // parachute reduces falling speed
    if (p.parachuteActive && p.body.velocity.y < -3) {
      p.body.velocity.y *= 0.95;
    }
    // update mesh pos
    p.mesh.position.copy(p.body.position);
    p.mesh.position.y -= 0.4;
  });

  // projectile homing
  projectiles.forEach(proj=>{
    proj.mesh.position.copy(proj.body.position);
    if (proj.homingTarget && !proj.exploded && proj.homingTarget.alive) {
      const tar = proj.homingTarget;
      const dir = new THREE.Vector3(tar.body.position.x - proj.body.position.x, (tar.body.position.y - proj.body.position.y), tar.body.position.z - proj.body.position.z).normalize();
      proj.body.velocity.x += dir.x * dt * 25;
      proj.body.velocity.y += dir.y * dt * 25;
      proj.body.velocity.z += dir.z * dt * 25;
    }
    proj.life -= dt;
    if (proj.life < 0 && !proj.exploded) {
      explodeAt(proj, proj.body.position, 4, 20);
    }
  });

  // simple world step
  world.step(dt, dt, 3);
  // apply wind to projectiles
  projectiles.forEach(pr => {
    pr.body.velocity.x += (wind*0.02) * dt;
  });
}

function update(dt) {
  // update per-frame
  // decrease turn timer
  turnTimer -= dt;
  document.getElementById('hudTimer').textContent = Math.max(0, Math.floor(turnTimer));
  if (turnTimer <= 0) nextTurn();

  // camera orbit snap: if controls disabled, follow player aim
  if (!controls.enabled && localPlayer) {
    const target = new THREE.Vector3(localPlayer.body.position.x, localPlayer.body.position.y+1.5, localPlayer.body.position.z);
    const camOffset = new THREE.Vector3(Math.sin(localPlayer.aimYaw)*6, 3.5, Math.cos(localPlayer.aimYaw)*6).negate();
    const desired = target.clone().add(camOffset);
    camera.position.lerp(desired, 0.08);
    controls.target.lerp(target, 0.1);
    camera.lookAt(target);
  }

  // AI ticks
  players.forEach(p => { if (p.isAI) aiTick(p, dt); });

  updateTrajectoryPreview(localPlayer);
}

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  let dt = (now - lastTime) / 1000; if (dt > 0.05) dt = 0.05;
  lastTime = now;

  // integrate physics with smaller steps for stability
  accum += dt;
  const step = 1/60;
  while (accum > step) {
    physicsStep(step);
    accum -= step;
  }
  update(dt);

  controls.update();
  renderer.render(scene, camera);
}
animate();

// ------- Minimal minimap rendering (2D) -------
const mini = document.getElementById('minimap');
const miniCanvas = document.createElement('canvas');
miniCanvas.width = 160; miniCanvas.height = 120;
mini.appendChild(miniCanvas);
const miniCtx = miniCanvas.getContext('2d');
function drawMinimap() {
  miniCtx.clearRect(0,0,160,120);
  // draw terrain heights as shades
  for (let z=0; z<=TERRAIN_RES; z++){
    for (let x=0; x<=TERRAIN_RES; x++){
      const i = z*(TERRAIN_RES+1)+x;
      const h = heightData[i];
      const shade = Math.floor(120 + Math.max(-10,Math.min(40,h))*3);
      miniCtx.fillStyle = `rgb(${shade},${shade+20},${shade-40})`;
      const px = Math.floor(x/(TERRAIN_RES+1)*160);
      const py = Math.floor(z/(TERRAIN_RES+1)*120);
      miniCtx.fillRect(px,py, Math.ceil(160/(TERRAIN_RES+1)), Math.ceil(120/(TERRAIN_RES+1)));
    }
  }
  // draw players
  players.forEach(p=>{
    if (!p.alive) return;
    const x = Math.floor((p.body.position.x + TERRAIN_SIZE/2)/TERRAIN_SIZE*160);
    const y = Math.floor((p.body.position.z + TERRAIN_SIZE/2)/TERRAIN_SIZE*120);
    miniCtx.fillStyle = p === localPlayer ? 'yellow' : 'red';
    miniCtx.fillRect(x-2,y-2,4,4);
  });
}
setInterval(drawMinimap, 500);
