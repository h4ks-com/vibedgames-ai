<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suno Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #121212; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Sidebar */
.sidebar { width: 240px; background: #000; padding: 16px; display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; overflow-y: auto; }
.logo { font-size: 24px; font-weight: 900; color: #fff; letter-spacing: -1px; padding: 8px 0; }
.nav-item { display: flex; align-items: center; gap: 16px; padding: 10px 12px; border-radius: 6px; color: #b3b3b3; text-decoration: none; font-size: 14px; font-weight: 600; transition: all .2s; cursor: pointer; }
.nav-item:hover { color: #fff; }
.nav-item.active { color: #fff; background: #282828; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: linear-gradient(180deg, #1e3264 0%, #121212 40%); }
.header-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; }
.header-bar h1 { font-size: 28px; font-weight: 800; letter-spacing: -.5px; }

/* Track list */
.track-list { flex: 1; overflow-y: auto; padding: 0 32px 120px; }
.track-item { display: grid; grid-template-columns: 40px 1fr 80px 60px; align-items: center; gap: 16px; padding: 10px 12px; border-radius: 4px; transition: background .2s; cursor: pointer; }
.track-item:hover { background: rgba(255,255,255,.1); }
.track-item.playing { background: rgba(255,255,255,.15); }
.track-num { color: #b3b3b3; font-size: 14px; text-align: center; }
.track-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.track-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-meta { font-size: 12px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-album { font-size: 13px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-dur { font-size: 13px; color: #b3b3b3; text-align: right; }

/* Now Playing Bar */
.player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 90px; background: #181818; border-top: 1px solid #282828; display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 20px; z-index: 100; }
.now-playing { display: flex; align-items: center; gap: 12px; min-width: 0; }
.album-art { width: 56px; height: 56px; border-radius: 4px; background: linear-gradient(135deg, #333, #555); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.np-info { min-width: 0; }
.np-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-subtitle { font-size: 11px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-actions { display: flex; gap: 12px; margin-left: 12px; }
.np-btn { background: none; border: none; color: #b3b3b3; cursor: pointer; font-size: 14px; transition: color .2s; }
.np-btn:hover { color: #fff; }

/* Controls */
.controls { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.control-btns { display: flex; align-items: center; gap: 16px; }
.ctrl-btn { background: none; border: none; color: #b3b3b3; cursor: pointer; font-size: 18px; transition: all .2s; padding: 4px; }
.ctrl-btn:hover { color: #fff; transform: scale(1.06); }
.play-btn { width: 38px; height: 38px; border-radius: 50%; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; font-size: 16px; border: none; cursor: pointer; transition: transform .15s; }
.play-btn:hover { transform: scale(1.05); color: #000; }
.progress-container { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 600px; }
.time-label { font-size: 11px; color: #b3b3b3; min-width: 36px; text-align: center; }
.progress-bar { flex: 1; height: 4px; background: #4d4d4d; border-radius: 2px; cursor: pointer; position: relative; }
.progress-fill { height: 100%; background: #b3b3b3; border-radius: 2px; width: 0%; transition: width .1s linear; }
.progress-bar:hover .progress-fill { background: #1db954; }
.progress-bar:hover { height: 6px; }

/* Volume */
.volume-section { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.vol-slider { width: 93px; height: 4px; -webkit-appearance: none; appearance: none; background: #4d4d4d; border-radius: 2px; outline: none; }
.vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; }

/* Empty state */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: #b3b3b3; gap: 12px; }
.empty-state .icon { font-size: 48px; opacity: .5; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #4d4d4d; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #666; }

/* Animations */
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.playing-icon { animation: pulse 1.8s ease-in-out infinite; display: inline-flex; gap: 2px; align-items: flex-end; height: 16px; }
.playing-icon span { width: 3px; background: #1db954; border-radius: 1px; animation: bars .8s ease-in-out infinite; }
.playing-icon span:nth-child(2) { animation-delay: .2s; }
.playing-icon span:nth-child(3) { animation-delay: .4s; }
@keyframes bars { 0%,100%{height:4px} 50%{height:16px} }

.kind-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.kind-cover { background: #e91e63; color: #fff; }
.kind-generate { background: #1db954; color: #000; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .track-item { grid-template-columns: 30px 1fr 50px; }
  .track-album { display: none; }
  .player-bar { grid-template-columns: 1fr auto; }
  .volume-section { display: none; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">🎵 Suno</div>
  <div class="nav-item active" onclick="showAll()">🏠 Home</div>
  <div class="nav-item" onclick="filterBy('generate')">✨ Generated</div>
  <div class="nav-item" onclick="filterBy('cover')">🎚️ Covers</div>
  <div style="margin-top:16px;padding-top:16px;border-top:1px solid #282828;font-size:13px;color:#b3b3b3;line-height:1.7">
    <strong>Library</strong><br>
    <span style="color:#666">Songs loaded from S3</span>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="header-bar">
    <h1 id="viewTitle">All Songs</h1>
    <span id="songCount" style="color:#b3b3b3;font-size:14px"></span>
  </div>
  <div class="track-list" id="trackList">
    <div class="empty-state"><div class="icon">🎶</div>Loading songs...</div>
  </div>
</div>

<!-- Player Bar -->
<div class="player-bar" id="playerBar" style="display:none">
  <div class="now-playing">
    <div class="album-art" id="npArt">🎵</div>
    <div class="np-info">
      <div class="np-title" id="npTitle">No track playing</div>
      <div class="np-subtitle" id="npSubtitle">—</div>
    </div>
    <div class="np-actions">
      <button class="np-btn" onclick="toggleLike()" id="likeBtn">♡</button>
    </div>
  </div>
  
  <div class="controls">
    <div class="control-btns">
      <button class="ctrl-btn" onclick="shufflePlaylist()" title="Shuffle">🔀</button>
      <button class="ctrl-btn" onclick="prevTrack()" title="Previous">⏮</button>
      <button class="play-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Next">⏭</button>
      <button class="ctrl-btn" onclick="toggleRepeat()" id="repeatBtn" title="Repeat">🔁</button>
    </div>
    <div class="progress-container">
      <span class="time-label" id="curTime">0:00</span>
      <div class="progress-bar" id="progressBar" onclick="seek(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time-label" id="durTime">0:00</span>
    </div>
  </div>
  
  <div class="volume-section">
    <span>🔊</span>
    <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step=".01" value=".7" oninput="setVolume(this.value)">
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
const BASE = 'https://s3-api.t3ks.com/suno/songs';
// Known tracks from the S3 bucket
const TRACK_IDS = [
  'cae32ce0-1278-4dd3-8231-93e8fe6cfdaa',
  'e8fd9e3b-4399-4f8e-a1c5-b3e8f6a2d1c0',
  '47c74521-62ae-442e-96b2-c99cdf73cdde',
  'f6f5c69c-3064-48e2-b1a7-e9d3c5f8a2b1',
];

let tracks = [];
let currentIdx = -1;
let repeatMode = 0; // 0=off, 1=all, 2=one
let filterKind = null;

const audio = document.getElementById('audio');

// Load metadata for each track
async function loadTracks() {
  const list = document.getElementById('trackList');
  list.innerHTML = '<div class="empty-state"><div class="icon">🎶</div>Loading songs...</div>';
  
  const results = await Promise.allSettled(
    TRACK_IDS.map(id => fetch(`${BASE}/${id}.json`).then(r => r.json()).catch(() => null))
  );
  
  tracks = results
    .map((r, i) => r.status === 'fulfilled' && r.value ? { ...r.value, id: TRACK_IDS[i] } : null)
    .filter(Boolean);
  
  renderTracks();
}

function renderTracks() {
  const list = document.getElementById('trackList');
  const filtered = filterKind ? tracks.filter(t => t.kind === filterKind) : tracks;
  document.getElementById('songCount').textContent = `${filtered.length} song${filtered.length!==1?'s':''}`;
  document.getElementById('viewTitle').textContent = filterKind 
    ? (filterKind === 'cover' ? '🎚️ Covers' : '✨ Generated') 
    : 'All Songs';
  
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🎵</div>No songs found</div>';
    return;
  }
  
  list.innerHTML = filtered.map((t, i) => `
    <div class="track-item ${currentIdx >= 0 && tracks[currentIdx]?.id === t.id ? 'playing' : ''}" 
         ondblclick="playTrack(${tracks.indexOf(t)})" onclick="playTrack(${tracks.indexOf(t)})">
      <div class="track-num">${currentIdx >= 0 && tracks[currentIdx]?.id === t.id ? '<div class="playing-icon"><span></span><span></span><span></span></div>' : (i+1)}</div>
      <div class="track-info">
        <div class="track-title">${esc(t.title || 'Untitled')}</div>
        <div class="track-meta">
          <span class="kind-badge kind-${t.kind || 'generate'}">${t.kind || 'generate'}</span>
          &nbsp;${esc(t.prompt || '')}
        </div>
      </div>
      <div class="track-album">${esc(t.model || 'Suno')}</div>
      <div class="track-dur">${formatDate(t.created_at)}</div>
    </div>
  `).join('');
}

function playTrack(idx) {
  if (idx < 0 || idx >= tracks.length) return;
  currentIdx = idx;
  const t = tracks[idx];
  audio.src = `${BASE}/${t.id}.mp3`;
  audio.load();
  audio.play().catch(() => {});
  updateNowPlaying();
  renderTracks();
}

function updateNowPlaying() {
  if (currentIdx < 0) return;
  const t = tracks[currentIdx];
  document.getElementById('playerBar').style.display = 'grid';
  document.getElementById('npTitle').textContent = t.title || 'Untitled';
  document.getElementById('npSubtitle').textContent = `${t.kind || 'song'} • ${t.prompt || ''}`;
  document.getElementById('playPauseBtn').textContent = '❚❚';
}

function togglePlay() {
  if (!audio.src) { if(tracks.length) playTrack(0); return; }
  if (audio.paused) audio.play(); else audio.pause();
}

audio.addEventListener('play', () => document.getElementById('playPauseBtn').textContent = '❚❚');
audio.addEventListener('pause', () => document.getElementById('playPauseBtn').textContent = '▶');
audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('curTime').textContent = fmtT(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('durTime').textContent = fmtT(audio.duration);
});
audio.addEventListener('ended', () => {
  if (repeatMode === 2) { audio.currentTime = 0; audio.play(); return; }
  nextTrack();
});

function nextTrack() {
  if (!tracks.length) return;
  if (repeatMode !== 1 && currentIdx >= tracks.length - 1) { currentIdx = -1; updateNPStop(); return; }
  playTrack((currentIdx + 1) % tracks.length);
}
function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (currentIdx <= 0) { currentIdx = tracks.length; }
  playTrack(currentIdx - 1);
}
function seek(e) {
  const bar = document.getElementById('progressBar');
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
}
function setVolume(v) { audio.volume = v; }
function toggleRepeat() { repeatMode = (repeatMode+1)%3; document.getElementById('repeatBtn').textContent = [,'🔁','🔂'][repeatMode]; }
function shufflePlaylist() { tracks.sort(() => Math.random()-.5); currentIdx=-1; renderTracks(); }
function toggleLike() { const b=document.getElementById('likeBtn'); b.textContent=b.textContent==='♡'?'♥':'♡'; }
function filterBy(k) { filterKind=k; renderTracks(); }
function showAll() { filterKind=null; renderTracks(); }
function updateNPStop() { document.getElementById('playerBar').style.display='none'; document.getElementById('playPauseBtn').textContent='▶'; renderTracks(); }

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function fmtT(s) { if(!s||!isFinite(s)) return '0:00'; const m=Math.floor(s/60), sec=Math.floor(s%60); return m+':'+String(sec).padStart(2,'0'); }
function formatDate(d) { if(!d) return ''; try { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); } catch(e){ return ''; } }

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.code) { case 'Space': e.preventDefault(); togglePlay(); break; case 'ArrowRight': nextTrack(); break; case 'ArrowLeft': prevTrack(); break; }
});

loadTracks();
</script>
</body>
</html>
