<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>h4ksify - Suno Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a; color: #fff; overflow-x: hidden;
        }
        .container { max-width: 100%; margin: 0 auto; padding: 0 15px; }
        .header {
            background: #1a1a1a; padding: 15px 0; border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .share-btn {
            background: none; border: 1px solid #555; color: #aaa; cursor: pointer;
            padding: 6px 14px; border-radius: 20px; font-size: 13px; transition: all 0.2s;
        }
        .share-btn:hover { background: #333; color: #fff; border-color: #888; }
        .player { background: #1a1a1a; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .current-track { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .track-image {
            width: 80px; height: 80px; border-radius: 8px; background: #333;
            min-width: 80px; object-fit: cover;
        }
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: #888; font-size: 14px; }
        .player-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
        .control-btn {
            background: none; border: none; color: #fff; font-size: 24px;
            cursor: pointer; padding: 10px; border-radius: 50%; transition: background 0.3s;
        }
        .control-btn:hover { background: #333; }
        .control-btn.active { color: #1db954; }
        .play-btn { font-size: 32px; background: #1db954; color: #fff; }
        .play-btn:hover { background: #1ed760; }
        .progress-bar { margin-bottom: 15px; cursor: pointer; }
        .progress { width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: #1db954; width: 0%; transition: width 0.1s; position: relative; }
        .time { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 20px; }
        .lyrics-section {
            margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05);
            border-radius: 8px; max-height: 200px; overflow-y: auto;
        }
        .lyrics { font-size: 14px; line-height: 1.6; text-align: center; font-style: italic; color: #ccc; }
        .lyrics-line { margin-bottom: 8px; opacity: 0.6; transition: all 0.3s; }
        .lyrics-line.active { opacity: 1; color: #1db954; font-size: 16px; transform: scale(1.02); }
        .library { margin-top: 30px; }
        .library h2 { font-size: 22px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .track-list { max-height: 500px; overflow-y: auto; }
        .track-item {
            display: flex; align-items: center; gap: 12px; padding: 8px 10px;
            border-radius: 6px; cursor: pointer; transition: background 0.2s;
        }
        .track-item:hover { background: rgba(255,255,255,0.08); }
        .track-item.active { background: rgba(29,185,84,0.15); }
        .track-cover {
            width: 44px; height: 44px; border-radius: 5px; background: #282828;
            object-fit: cover; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; color: #555; font-size: 16px; overflow: hidden;
        }
        .track-cover img { width: 100%; height: 100%; object-fit: cover; }
        .track-number { width: 24px; text-align: center; color: #888; font-size: 13px; flex-shrink: 0; }
        .track-item-info { flex: 1; min-width: 0; }
        .track-item-title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-item.active .track-item-title { color: #1db954; }
        .track-item-artist { font-size: 12px; color: #888; }
        .track-duration { color: #888; font-size: 13px; flex-shrink: 0; }
        .cover-badge {
            font-size: 9px; background: #e91e63; color: #fff; padding: 1px 5px;
            border-radius: 8px; margin-left: 6px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .loading { text-align: center; padding: 60px 20px; color: #888; }
        .loading i { font-size: 48px; margin-bottom: 20px; color: #1db954; animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1db954; color: #fff; padding: 10px 24px; border-radius: 25px;
            font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 999;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 600px) {
            .header h1 { font-size: 18px; }
            .track-image { width: 56px; height: 56px; min-width: 56px; }
            .track-title { font-size: 15px; }
            .play-btn { font-size: 28px; }
            .control-btn { font-size: 20px; padding: 8px; }
            .player-controls { gap: 15px; }
            .track-cover { width: 36px; height: 36px; }
            .track-item-title { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 h4ksify</h1>
            <button class="share-btn" id="share-btn" onclick="shareSong()"><i class="fas fa-share-alt"></i> Share</button>
        </div>

        <div id="loading" class="loading">
            <i class="fas fa-spinner"></i>
            <p>Loading songs...</p>
        </div>

        <div id="player-content" style="display:none;">
            <div class="player">
                <div class="current-track">
                    <img id="current-image" class="track-image" src="https://cdn2.suno.ai/image_large_default.jpeg" alt="Album Art">
                    <div class="track-info">
                        <div id="current-title" class="track-title">No Track Selected</div>
                        <div id="current-artist" class="track-artist">Select a song to play</div>
                    </div>
                </div>

                <audio id="audio-player" preload="metadata"></audio>

                <div class="player-controls">
                    <button class="control-btn" id="shuffle-btn" onclick="toggleShuffle()"><i class="fas fa-shuffle"></i></button>
                    <button class="control-btn" id="prev-btn" onclick="prevTrack()"><i class="fas fa-backward-step"></i></button>
                    <button class="control-btn play-btn" id="play-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                    <button class="control-btn" id="next-btn" onclick="nextTrack()"><i class="fas fa-forward-step"></i></button>
                    <button class="control-btn" id="repeat-btn" onclick="toggleRepeat()"><i class="fas fa-repeat"></i></button>
                </div>

                <div class="progress-bar" onclick="seek(event)">
                    <div class="progress">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>

                <div class="time">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>

                <div class="lyrics-section">
                    <div id="lyrics" class="lyrics">
                        Select a song with lyrics to view them here
                    </div>
                </div>
            </div>

            <div class="library">
                <h2><i class="fas fa-music"></i> Library</h2>
                <div id="track-list" class="track-list"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const S3_API = 'https://s3-api.t3ks.com/suno/';
        const audioPlayer = document.getElementById('audio-player');
        let tracks = [];
        let currentTrackIndex = -1;
        let isPlaying = false;
        let isShuffled = false;
        let repeatMode = 0;

        const loadingEl = document.getElementById('loading');
        const playerContentEl = document.getElementById('player-content');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const currentTitleEl = document.getElementById('current-title');
        const currentArtistEl = document.getElementById('current-artist');
        const currentImageEl = document.getElementById('current-image');
        const lyricsEl = document.getElementById('lyrics');
        const trackListEl = document.getElementById('track-list');

        // URL hash-based sharing
        function getTrackIdFromHash() {
            const h = location.hash.slice(1);
            return h || null;
        }
        function setHashForTrack(id) {
            if (id) history.replaceState(null, '', '#' + id);
        }

        // Load tracks from S3
        async function loadTracks() {
            try {
                const response = await fetch(S3_API + '?list-type=2&prefix=songs/&max-keys=200');
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                const files = xmlDoc.getElementsByTagName('Key');

                // Collect json keys and jpg keys
                const jsonKeys = [], jpgKeys = new Set();
                for (let i = 0; i < files.length; i++) {
                    const key = files[i].textContent;
                    if (key.endsWith('.json')) jsonKeys.push(key);
                    else if (key.endsWith('.jpg')) {
                        const base = key.replace(/\.jpg$/, '');
                        jpgKeys.add(base);
                    }
                }

                tracks = [];
                for (const key of jsonKeys) {
                    try {
                        const td = await fetchTrackData(key);
                        if (td && td.suno_clip_id) {
                            const baseId = td.suno_clip_id;
                            tracks.push({
                                ...td,
                                id: baseId,
                                path: key,
                                audioPath: key.replace(/\.json$/, '.mp3'),
                                hasCover: jpgKeys.has('songs/' + baseId),
                                coverPath: 'songs/' + baseId + '.jpg'
                            });
                        }
                    } catch(e) { console.warn(`Failed ${key}:`, e); }
                }

                tracks.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

                loadingEl.style.display = 'none';
                playerContentEl.style.display = 'block';

                renderTrackList();

                // Check hash for shared song
                const hashId = getTrackIdFromHash();
                if (hashId) {
                    const idx = tracks.findIndex(t => t.id === hashId);
                    if (idx >= 0) { loadTrack(idx); return; }
                }

                if (tracks.length > 0) loadTrack(0);

            } catch(error) {
                console.error('Failed:', error);
                loadingEl.innerHTML = `<i class="fas fa-exclamation-triangle"></i><p>Failed to load songs</p><p style="font-size:12px;color:#666">${error.message}</p>`;
            }
        }

        async function fetchTrackData(path) {
            const r = await fetch(S3_API + path);
            return await r.json();
        }

        function renderTrackList() {
            trackListEl.innerHTML = '';
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `track-item${index === currentTrackIndex ? ' active' : ''}`;
                item.onclick = () => loadTrack(index);

                // Cover art or music note icon
                let coverHTML = '<i class="fas fa-music"></i>';
                if (track.hasCover) {
                    coverHTML = `<img src="${S3_API}${track.coverPath}" alt="" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-music\\'></i>'">`;
                }

                const dur = formatTime(track.duration || 0);
                const badge = track.hasCover ? '<span class="cover-badge">Cover</span>' : '';

                item.innerHTML = `
                    <div class="track-cover">${coverHTML}</div>
                    <div class="track-number">${index + 1}</div>
                    <div class="track-item-info">
                        <div class="track-item-title">${escapeHtml(track.title || 'Untitled')}${badge}</div>
                        <div class="track-item-artist">${escapeHtml(track.metadata?.tags?.[0] || 'obbyirc')}</div>
                    </div>
                    <div class="track-duration">${dur}</div>
                `;
                trackListEl.appendChild(item);
            });
        }

        function loadTrack(index) {
            if (index < 0 || index >= tracks.length) return;
            currentTrackIndex = index;
            const track = tracks[index];

            setHashForTrack(track.id);

            audioPlayer.src = S3_API + track.audioPath;
            currentTitleEl.textContent = track.title || 'Untitled';
            currentArtistEl.textContent = track.metadata?.tags?.[0] || 'obbyirc';

            // Cover art in player
            if (track.hasCover) {
                currentImageEl.src = S3_API + track.coverPath;
                currentImageEl.onerror = () => currentImageEl.src = 'https://cdn2.suno.ai/image_large_default.jpeg';
            } else {
                currentImageEl.src = 'https://cdn2.suno.ai/image_large_default.jpeg';
            }

            // Lyrics
            displayLyrics(track);

            renderTrackList();
            audioPlayer.load();
            togglePlay(true);
        }

        function displayLyrics(track) {
            const prompt = track.suno_prompt || track.prompt || '';
            if (!prompt || prompt.length < 10) {
                lyricsEl.innerHTML = '<div style="opacity:0.5">🎵 Instrumental</div>';
                return;
            }
            // Extract lyrics-like content from prompt
            const lines = prompt.split('\n').filter(l => l.trim().length > 2);
            if (lines.length === 0) {
                lyricsEl.innerHTML = '<div style="opacity:0.5">🎵 Instrumental</div>';
                return;
            }
            lyricsEl.innerHTML = lines.map(l => `<div class="lyrics-line">${escapeHtml(l.trim())}</div>`).join('');
        }

        function togglePlay(forcePlay) {
            if (forcePlay !== undefined) {
                if (forcePlay) { audioPlayer.play(); isPlaying = true; }
                else { audioPlayer.pause(); isPlaying = false; }
            } else if (isPlaying) {
                audioPlayer.pause(); isPlaying = false;
            } else {
                audioPlayer.play(); isPlaying = true;
            }
            updatePlayButton();
        }

        function updatePlayButton() {
            playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
        }

        function nextTrack() {
            if (tracks.length === 0) return;
            let nextIdx;
            if (isShuffled) {
                nextIdx = Math.floor(Math.random() * tracks.length);
            } else {
                nextIdx = (currentTrackIndex + 1) % tracks.length;
            }
            loadTrack(nextIdx);
        }

        function prevTrack() {
            if (tracks.length === 0) return;
            if (audioPlayer.currentTime > 3) { audioPlayer.currentTime = 0; return; }
            let prevIdx = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            loadTrack(prevIdx);
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            shuffleBtn.classList.toggle('active', isShuffled);
        }

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            repeatBtn.classList.toggle('active', repeatMode > 0);
            repeatBtn.innerHTML = ['<i class="fas fa-repeat"></i>','<i class="fas fa-repeat"></i>','<i class="fas fa-repeat"></i>'][repeatMode];
            if (repeatMode === 2) repeatBtn.innerHTML += '<span style="font-size:9px;position:absolute">1</span>';
        }

        function seek(event) {
            const bar = event.currentTarget;
            const rect = bar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Share current song URL
        async function shareSong() {
            if (currentTrackIndex < 0 || !tracks[currentTrackIndex]) {
                showToast('No song playing');
                return;
            }
            const url = location.origin + location.pathname + '#' + tracks[currentTrackIndex].id;
            try {
                await navigator.clipboard.writeText(url);
                showToast('Link copied! 📋');
            } catch(e) {
                // Fallback
                const inp = document.createElement('input');
                inp.value = url; document.body.appendChild(inp);
                inp.select(); document.execCommand('copy'); document.body.removeChild(inp);
                showToast('Link copied! 📋');
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // Audio events
        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration) {
                progressFill.style.width = (audioPlayer.currentTime / audioPlayer.duration * 100) + '%';
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
                highlightLyric(audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('ended', () => {
            if (repeatMode === 2) { audioPlayer.currentTime = 0; audioPlayer.play(); return; }
            if (repeatMode === 1 || currentTrackIndex < tracks.length - 1) nextTrack();
            else { isPlaying = false; updatePlayButton(); }
        });

        function highlightLyric(currentTime) {
            const lines = lyricsEl.querySelectorAll('.lyrics-line');
            if (lines.length === 0) return;
            // Simple time-based lyric sync approximation
            const totalDuration = audioPlayer.duration || 180;
            const lineDuration = totalDuration / lines.length;
            const targetIndex = Math.floor(currentTime / lineDuration);
            lines.forEach((line, i) => {
                line.classList.toggle('active', i === targetIndex);
            });
            if (targetIndex >= 0 && lines[targetIndex]) {
                lines[targetIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Init
        loadTracks();
    </script>
</body>
</html>
