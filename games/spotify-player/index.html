<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>h4ksify - Suno Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        .header {
            background: #1a1a1a;
            padding: 15px 0;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }
        
        .player {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .current-track {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .track-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: #333;
            min-width: 80px;
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .track-artist {
            color: #888;
            font-size: 14px;
        }
        
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: background 0.3s;
        }
        
        .control-btn:hover {
            background: #333;
        }
        
        .play-btn {
            font-size: 32px;
            background: #1db954;
            color: #fff;
        }
        
        .play-btn:hover {
            background: #1ed760;
        }
        
        .progress-bar {
            margin-bottom: 15px;
        }
        
        .progress {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #1db954;
            width: 0%;
            transition: width 0.1s;
        }
        
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
        }
        
        .lyrics-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .lyrics {
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
            font-style: italic;
            color: #ccc;
        }
        
        .lyrics-line {
            margin-bottom: 8px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        
        .lyrics-line.active {
            opacity: 1;
            color: #1db954;
            font-weight: 500;
        }
        
        .playlist {
            margin-top: 30px;
        }
        
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .playlist-title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .playlist-controls {
            display: flex;
            gap: 10px;
        }
        
        .playlist-btn {
            background: #333;
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .playlist-btn:hover {
            background: #444;
        }
        
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .track-item:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .track-item.active {
            background: rgba(29, 185, 84, 0.2);
        }
        
        .track-number {
            color: #666;
            font-size: 14px;
            min-width: 30px;
        }
        
        .track-item-info {
            flex: 1;
        }
        
        .track-item-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .track-item-artist {
            color: #888;
            font-size: 12px;
        }
        
        .track-duration {
            color: #666;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .loading i {
            font-size: 48px;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 10px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .current-track {
                flex-direction: column;
                text-align: center;
            }
            
            .track-image {
                width: 120px;
                height: 120px;
            }
            
            .track-title {
                font-size: 16px;
            }
            
            .track-artist {
                font-size: 12px;
            }
            
            .player-controls {
                gap: 15px;
            }
            
            .control-btn {
                font-size: 20px;
                padding: 8px;
            }
            
            .play-btn {
                font-size: 28px;
            }
            
            .lyrics-section {
                max-height: 150px;
            }
            
            .lyrics {
                font-size: 12px;
            }
            
            .playlist-title {
                font-size: 16px;
            }
            
            .track-item {
                padding: 10px;
            }
            
            .track-item-title {
                font-size: 13px;
            }
            
            .track-item-artist {
                font-size: 11px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 0 8px;
            }
            
            .header {
                padding: 10px 0;
            }
            
            .player {
                padding: 15px;
            }
            
            .track-image {
                width: 100px;
                height: 100px;
            }
            
            .track-title {
                font-size: 14px;
            }
            
            .control-btn {
                font-size: 18px;
                padding: 6px;
            }
            
            .play-btn {
                font-size: 24px;
            }
            
            .lyrics-section {
                max-height: 120px;
            }
            
            .lyrics {
                font-size: 11px;
                line-height: 1.4;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 h4ksify</h1>
        </div>
        
        <div id="loading" class="loading">
            <i class="fas fa-spinner"></i>
            <p>Loading songs...</p>
        </div>
        
        <div id="player-content" style="display: none;">
            <div class="player">
                <div class="current-track">
                    <img id="current-image" class="track-image" src="https://cdn2.suno.ai/image_large_default.jpeg" alt="Album Art">
                    <div class="track-info">
                        <div id="current-title" class="track-title">No Track Selected</div>
                        <div id="current-artist" class="track-artist">Select a song to play</div>
                    </div>
                </div>
                
                <div class="player-controls">
                    <button class="control-btn" id="prev-btn">
                        <i class="fas fa-backward"></i>
                    </button>
                    <button class="control-btn play-btn" id="play-btn">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="control-btn" id="next-btn">
                        <i class="fas fa-forward"></i>
                    </button>
                </div>
                
                <div class="progress-bar">
                    <div class="progress">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                
                <div class="time">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
                
                <div class="lyrics-section">
                    <div class="lyrics" id="lyrics">
                        <div class="lyrics-line">Select a song with lyrics to view them here</div>
                    </div>
                </div>
            </div>
            
            <div class="playlist">
                <div class="playlist-header">
                    <h2 class="playlist-title">Library</h2>
                    <div class="playlist-controls">
                        <button class="playlist-btn" id="shuffle-btn">
                            <i class="fas fa-random"></i> Shuffle
                        </button>
                        <button class="playlist-btn" id="repeat-btn">
                            <i class="fas fa-redo"></i> Repeat
                        </button>
                    </div>
                </div>
                
                <div class="track-list" id="track-list">
                    <!-- Tracks will be loaded here -->
                </div>
            </div>
        </div>
    </div>
    
    <audio id="audio-player"></audio>
    
    <script>
        const S3_API = 'https://s3-api.t3ks.com/suno/';
        const audioPlayer = document.getElementById('audio-player');
        let tracks = [];
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isShuffled = false;
        let repeatMode = 0; // 0: no repeat, 1: repeat all, 2: repeat one
        let lyricsData = null;
        
        // Loading state
        const loadingEl = document.getElementById('loading');
        const playerContentEl = document.getElementById('player-content');
        
        // UI elements
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const currentTitleEl = document.getElementById('current-title');
        const currentArtistEl = document.getElementById('current-artist');
        const currentImageEl = document.getElementById('current-image');
        const lyricsEl = document.getElementById('lyrics');
        const trackListEl = document.getElementById('track-list');
        
        // Load tracks from S3
        async function loadTracks() {
            try {
                const response = await fetch(S3_API);
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                
                const files = xmlDoc.getElementsByTagName('Key');
                tracks = [];
                
                for (let i = 0; i < files.length; i++) {
                    const key = files[i].textContent;
                    if (key.endsWith('.json')) {
                        try {
                            const trackData = await fetchTrackData(key);
                            if (trackData) {
                                tracks.push({
                                    ...trackData,
                                    id: trackData.suno_clip_id,
                                    path: key
                                });
                            }
                        } catch (error) {
                            console.warn(`Failed to load track ${key}:`, error);
                        }
                    }
                }
                
                tracks.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                loadingEl.style.display = 'none';
                playerContentEl.style.display = 'block';
                
                renderTrackList();
                
                if (tracks.length > 0) {
                    loadTrack(0);
                }
                
            } catch (error) {
                console.error('Failed to load songs:', error);
                loadingEl.innerHTML = `
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Failed to load songs</p>
                    <p style="font-size: 12px; color: #666;">${error.message}</p>
                `;
            }
        }
        
        async function fetchTrackData(path) {
            const response = await fetch(`${S3_API}${path}`);
            return await response.json();
        }
        
        function renderTrackList() {
            trackListEl.innerHTML = '';
            
            tracks.forEach((track, index) => {
                const trackItem = document.createElement('div');
                trackItem.className = `track-item ${index === currentTrackIndex ? 'active' : ''}`;
                trackItem.onclick = () => loadTrack(index);
                
                const duration = formatTime(track.duration || 0);
                
                trackItem.innerHTML = `
                    <div class="track-number">${index + 1}</div>
                    <div class="track-item-info">
                        <div class="track-item-title">${track.title}</div>
                        <div class="track-item-artist">${track.display_name || 'Unknown Artist'}</div>
                    </div>
                    <div class="track-duration">${duration}</div>
                `;
                
                trackListEl.appendChild(trackItem);
            });
        }
        
        function loadTrack(index) {
            if (index < 0 || index >= tracks.length) return;
            
            currentTrackIndex = index;
            const track = tracks[index];
            
            currentTitleEl.textContent = track.title;
            currentArtistEl.textContent = track.display_name || 'Unknown Artist';
            
            if (track.suno_image_url) {
                currentImageEl.src = track.suno_image_url;
            } else if (track.cover_url) {
                currentImageEl.src = track.cover_url;
            } else {
                currentImageEl.src = 'https://cdn2.suno.ai/image_large_default.jpeg';
            }
            
            // Load lyrics
            loadLyrics(track);
            
            // Set audio source
            audioPlayer.src = track.audio_url || track.suno_cdn_url;
            
            // Reset player
            audioPlayer.currentTime = 0;
            isPlaying = false;
            updatePlayButton();
            
            renderTrackList();
        }
        
        function loadLyrics(track) {
            if (track.suno_prompt && !track.instrumental) {
                const lyrics = parseLyrics(track.suno_prompt);
                if (lyrics && lyrics.length > 0) {
                    lyricsData = lyrics;
                    renderLyrics(lyrics);
                } else {
                    lyricsEl.innerHTML = '<div class="lyrics-line">No lyrics available</div>';
                    lyricsData = null;
                }
            } else {
                lyricsEl.innerHTML = '<div class="lyrics-line">Instrumental track - no lyrics</div>';
                lyricsData = null;
            }
        }
        
        function parseLyrics(prompt) {
            if (!prompt) return null;
            
            const lines = prompt.split('\n').filter(line => line.trim());
            const lyrics = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // Skip section headers like [Verse 1], [Chorus], etc.
                if (line.startsWith('[') && line.endsWith(']')) {
                    continue;
                }
                
                // Skip empty lines
                if (!line) continue;
                
                // Clean up the line
                const cleanedLine = line.replace(/\[.*?\]/g, '').trim();
                if (cleanedLine) {
                    lyrics.push({
                        text: cleanedLine,
                        time: 0 // We'll calculate this based on audio position
                    });
                }
            }
            
            return lyrics.length > 0 ? lyrics : null;
        }
        
        function renderLyrics(lyrics) {
            lyricsEl.innerHTML = '';
            lyrics.forEach(lyric => {
                const lyricLine = document.createElement('div');
                lyricLine.className = 'lyrics-line';
                lyricLine.textContent = lyric.text;
                lyricsEl.appendChild(lyricLine);
            });
        }
        
        function updateLyrics() {
            if (!lyricsData || !isPlaying) return;
            
            const currentTime = audioPlayer.currentTime;
            const duration = audioPlayer.duration;
            
            if (duration > 0) {
                const progress = currentTime / duration;
                const currentLineIndex = Math.floor(progress * lyricsData.length);
                
                // Update active line
                const lyricLines = lyricsEl.querySelectorAll('.lyrics-line');
                lyricLines.forEach((line, index) => {
                    line.classList.toggle('active', index === currentLineIndex);
                });
                
                // Scroll to active line
                if (currentLineIndex > 0 && currentLineIndex < lyricsData.length - 1) {
                    lyricLines[currentLineIndex].scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                }
            }
        }
        
        function playTrack() {
            if (tracks.length === 0) return;
            
            if (isPlaying) {
                audioPlayer.pause();
            } else {
                audioPlayer.play().catch(error => {
                    console.error('Failed to play audio:', error);
                });
            }
            
            isPlaying = !isPlaying;
            updatePlayButton();
        }
        
        function updatePlayButton() {
            const icon = playBtn.querySelector('i');
            if (isPlaying) {
                icon.className = 'fas fa-pause';
            } else {
                icon.className = 'fas fa-play';
            }
        }
        
        function prevTrack() {
            if (tracks.length === 0) return;
            
            if (repeatMode === 2 && currentTrackIndex === 0) {
                // Repeat one mode: go to last track
                currentTrackIndex = tracks.length - 1;
            } else {
                currentTrackIndex = currentTrackIndex > 0 ? currentTrackIndex - 1 : tracks.length - 1;
            }
            
            loadTrack(currentTrackIndex);
            
            if (isPlaying) {
                audioPlayer.play().catch(error => {
                    console.error('Failed to play audio:', error);
                });
            }
        }
        
        function nextTrack() {
            if (tracks.length === 0) return;
            
            if (isShuffled) {
                currentTrackIndex = Math.floor(Math.random() * tracks.length);
            } else {
                if (repeatMode === 2 && currentTrackIndex === tracks.length - 1) {
                    // Repeat one mode: go to first track
                    currentTrackIndex = 0;
                } else {
                    currentTrackIndex = currentTrackIndex < tracks.length - 1 ? currentTrackIndex + 1 : 0;
                }
            }
            
            loadTrack(currentTrackIndex);
            
            if (isPlaying) {
                audioPlayer.play().catch(error => {
                    console.error('Failed to play audio:', error);
                });
            }
        }
        
        function toggleShuffle() {
            isShuffled = !isShuffled;
            shuffleBtn.style.background = isShuffled ? '#1db954' : '#333';
        }
        
        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            
            switch (repeatMode) {
                case 0:
                    repeatBtn.innerHTML = '<i class="fas fa-redo"></i> Repeat';
                    repeatBtn.style.background = '#333';
                    break;
                case 1:
                    repeatBtn.innerHTML = '<i class="fas fa-redo"></i> Repeat All';
                    repeatBtn.style.background = '#1db954';
                    break;
                case 2:
                    repeatBtn.innerHTML = '<i class="fas fa-redo"></i> Repeat One';
                    repeatBtn.style.background = '#1db954';
                    break;
            }
        }
        
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = Math.floor(seconds % 60);
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }
        
        // Event listeners
        playBtn.addEventListener('click', playTrack);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        shuffleBtn.addEventListener('click', toggleShuffle);
        repeatBtn.addEventListener('click', toggleRepeat);
        
        audioPlayer.addEventListener('timeupdate', () => {
            const currentTime = audioPlayer.currentTime;
            const duration = audioPlayer.duration;
            
            if (duration > 0) {
                const progress = (currentTime / duration) * 100;
                progressFill.style.width = `${progress}%`;
                
                currentTimeEl.textContent = formatTime(currentTime);
                totalTimeEl.textContent = formatTime(duration);
                
                updateLyrics();
            }
        });
        
        audioPlayer.addEventListener('ended', () => {
            if (repeatMode === 2) {
                // Repeat one mode: restart current track
                loadTrack(currentTrackIndex);
                audioPlayer.play().catch(error => {
                    console.error('Failed to play audio:', error);
                });
            } else {
                nextTrack();
            }
        });
        
        audioPlayer.addEventListener('error', (error) => {
            console.error('Audio error:', error);
            alert('Failed to load audio. Please try another track.');
        });
        
        // Initialize
        loadTracks();
    </script>
</body>
</html>
