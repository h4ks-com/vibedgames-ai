<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Flashcard Memory Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: 'Segoe UI', sans-serif; color: #fff;
    overflow: hidden;
  }
  h1 { margin-bottom: 8px; font-size: 1.8rem; text-shadow: 0 0 20px rgba(139,92,246,.5); }
  #stats { margin-bottom: 18px; font-size: 1.1rem; opacity: .85; }
  #stats span { font-weight: 700; color: #a78bfa; }
  #board {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 14px; max-width: 400px; width: 90%;
  }
  .card {
    aspect-ratio: 1; perspective: 600px; cursor: pointer;
  }
  .card-inner {
    width: 100%; height: 100%; position: relative;
    transition: transform 0.45s ease; transform-style: preserve-3d;
  }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; inset: 0; border-radius: 14px;
    backface-visibility: hidden; display: flex;
    align-items: center; justify-content: center;
  }
  .card-front {
    background: linear-gradient(145deg, #6d28d9, #7c3aed);
    box-shadow: 0 4px 20px rgba(109,40,217,.4);
    font-size: 2rem;
  }
  .card-back {
    transform: rotateY(180deg); background: #1e1b4b;
    border: 2px solid #6d28d9; overflow: hidden;
  }
  .card-back img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
  .card.matched .card-back { border-color: #34d399; box-shadow: 0 0 18px rgba(52,211,153,.35); }
  .card.matched { pointer-events: none; }
  #win {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.8); z-index: 10;
    flex-direction: column; align-items: center; justify-content: center;
  }
  #win.show { display: flex; }
  #win h2 { font-size: 2.4rem; margin-bottom: 10px; color: #34d399; }
  #win p { font-size: 1.2rem; margin-bottom: 20px; }
  #restart {
    padding: 12px 32px; border: none; border-radius: 10px;
    background: #7c3aed; color: #fff; font-size: 1.1rem;
    cursor: pointer; transition: background .2s;
  }
  #restart:hover { background: #6d28d9; }
  @media(max-width:400px) {
    #board { gap: 8px; }
    h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>
<h1>🧠 AI Flashcard Memory</h1>
<div id="stats">Moves: <span id="moves">0</span> &nbsp;|&nbsp; Pairs: <span id="pairs">0</span>/3</div>
<div id="board"></div>
<div id="win">
  <h2>🎉 You Win!</h2>
  <p id="win-msg"></p>
  <button id="restart">Play Again</button>
</div>

<script>
const animals = ['cat', 'dog', 'fox'];
const deck = [...animals, ...animals];
let flipped = [], matched = 0, moves = 0, locked = false;

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function build() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  flipped = []; matched = 0; moves = 0; locked = false;
  document.getElementById('moves').textContent = 0;
  document.getElementById('pairs').textContent = 0;
  document.getElementById('win').classList.remove('show');

  const shuffled = shuffle([...deck]);
  shuffled.forEach((animal, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.animal = animal;
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">❓</div>
        <div class="card-back"><img src="${animal}.png" alt="${animal}"></div>
      </div>`;
    card.addEventListener('click', () => flip(card));
    board.appendChild(card);
  });
}

function flip(card) {
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flipped.push(card);
  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    locked = true;
    const [a, b] = flipped;
    if (a.dataset.animal === b.dataset.animal) {
      a.classList.add('matched');
      b.classList.add('matched');
      matched++;
      document.getElementById('pairs').textContent = matched;
      flipped = []; locked = false;
      if (matched === 3) {
        setTimeout(() => {
          document.getElementById('win-msg').textContent = `Completed in ${moves} moves!`;
          document.getElementById('win').classList.add('show');
        }, 500);
      }
    } else {
      setTimeout(() => {
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        flipped = []; locked = false;
      }, 800);
    }
  }
}

document.getElementById('restart').addEventListener('click', build);
build();
</script>
</body>
</html>
