<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Memory Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
  }
  h1 {
    margin: 30px 0 10px;
    font-size: 2rem;
    text-shadow: 0 0 20px rgba(139,92,246,.6);
  }
  .stats {
    display: flex;
    gap: 30px;
    margin: 10px 0 20px;
    font-size: 1.1rem;
  }
  .stats span { color: #a78bfa; font-weight: 700; }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 480px;
    width: 90%;
  }
  .card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
  }
  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 3px solid rgba(167,139,250,.3);
  }
  .card-front {
    background: linear-gradient(145deg, #4c1d95, #6d28d9);
    font-size: 2.5rem;
  }
  .card-front::after {
    content: '❓';
    font-size: 2.2rem;
  }
  .card-back {
    transform: rotateY(180deg);
    background: #1e1b4b;
  }
  .card-back img {
    width: 85%;
    height: 85%;
    object-fit: contain;
    border-radius: 8px;
    filter: drop-shadow(0 0 10px rgba(167,139,250,.5));
  }
  .card.matched .card-face {
    border-color: #34d399;
    box-shadow: 0 0 20px rgba(52,211,153,.4);
  }
  .card.matched .card-inner {
    animation: pulse .5s ease;
  }
  @keyframes pulse {
    0%,100% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.08); }
  }
  .win-banner {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 10;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .win-banner.show { display: flex; }
  .win-banner h2 {
    font-size: 2.4rem;
    text-shadow: 0 0 30px #34d399;
    color: #34d399;
  }
  .win-banner p { font-size: 1.2rem; }
  .win-banner button {
    padding: 12px 36px;
    font-size: 1.1rem;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #6d28d9, #4c1d95);
    color: #fff;
    cursor: pointer;
    transition: transform .2s;
  }
  .win-banner button:hover { transform: scale(1.05); }
</style>
</head>
<body>

<h1>🧠 Flashcard Memory</h1>
<div class="stats">
  Moves: <span id="moves">0</span> &nbsp;|&nbsp; Matches: <span id="matches">0</span>/3
</div>
<div class="board" id="board"></div>

<div class="win-banner" id="winBanner">
  <h2>🎉 You Won!</h2>
  <p id="winMsg">Completed in 0 moves</p>
  <button onclick="initGame()">Play Again</button>
</div>

<script>
const SPRITES = [
  { id: 'cat',  img: 'https://picsum.photos/seed/961/512/512.png',  label: 'Cat' },
  { id: 'dog',  img: 'https://picsum.photos/seed/215/512/512.png',  label: 'Dog' },
  { id: 'fox',  img: 'https://picsum.photos/seed/435/512/512.png',  label: 'Fox' },
];

let cards = [];
let flippedCards = [];
let matchedCount = 0;
let moves = 0;
let locked = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function initGame() {
  document.getElementById('winBanner').classList.remove('show');
  const deck = [...SPRITES, ...SPRITES];
  shuffle(deck);
  cards = deck;
  flippedCards = [];
  matchedCount = 0;
  moves = 0;
  locked = false;
  document.getElementById('moves').textContent = 0;
  document.getElementById('matches').textContent = 0;

  const board = document.getElementById('board');
  board.innerHTML = '';
  deck.forEach((sprite, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front"></div>
        <div class="card-face card-back">
          <img src="${sprite.img}" alt="${sprite.label}" draggable="false">
        </div>
      </div>`;
    card.addEventListener('click', () => flipCard(card, i));
    board.appendChild(card);
  });
}

function flipCard(cardEl, index) {
  if (locked) return;
  if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
  if (flippedCards.length >= 2) return;

  cardEl.classList.add('flipped');
  flippedCards.push({ el: cardEl, index });

  if (flippedCards.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    locked = true;
    const [a, b] = flippedCards;
    if (cards[a.index].id === cards[b.index].id) {
      setTimeout(() => {
        a.el.classList.add('matched');
        b.el.classList.add('matched');
        matchedCount++;
        document.getElementById('matches').textContent = matchedCount;
        flippedCards = [];
        locked = false;
        if (matchedCount === 3) {
          document.getElementById('winMsg').textContent = `Completed in ${moves} moves!`;
          document.getElementById('winBanner').classList.add('show');
        }
      }, 400);
    } else {
      setTimeout(() => {
        a.el.classList.remove('flipped');
        b.el.classList.remove('flipped');
        flippedCards = [];
        locked = false;
      }, 900);
    }
  }
}

initGame();
</script>
</body>
</html>
