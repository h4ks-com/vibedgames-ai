<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 H4KS Hit Factory — Music Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1628 100%);
  min-height: 100vh;
  color: #e0e0ff;
  overflow-x: hidden;
}
.stars {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite alternate;
}
@keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }

.container {
  max-width: 900px; margin: 0 auto; padding: 20px;
  position: relative; z-index: 1;
}

header {
  text-align: center; padding: 30px 20px;
  background: rgba(255,255,255,0.03);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 25px;
  backdrop-filter: blur(10px);
}
header h1 {
  font-size: 2.4em;
  background: linear-gradient(90deg, #ff6b9d, #c44dff, #6b9dff, #6bffd4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 40px rgba(196,77,255,0.3);
  animation: glow 3s ease-in-out infinite alternate;
}
@keyframes glow {
  from { filter: drop-shadow(0 0 10px rgba(196,77,255,0.3)); }
  to { filter: drop-shadow(0 0 25px rgba(107,157,255,0.5)); }
}
header p { color: #8888aa; margin-top: 8px; font-size: 1.05em; }

.upload-zone {
  border: 2px dashed rgba(196,77,255,0.4);
  border-radius: 16px; padding: 35px; text-align: center;
  cursor: pointer; transition: all 0.3s;
  background: rgba(196,77,255,0.04);
  margin-bottom: 25px;
  position: relative; overflow: hidden;
}
.upload-zone:hover {
  border-color: #c44dff;
  background: rgba(196,77,255,0.08);
  transform: scale(1.01);
}
.upload-zone.dragover {
  border-color: #6bffda;
  background: rgba(107,255,218,0.08);
  box-shadow: 0 0 30px rgba(107,255,218,0.15);
}
.upload-icon { font-size: 2.5em; margin-bottom: 10px; }
.upload-text { font-size: 1.1em; color: #aaaacc; }
.upload-sub { font-size: 0.85em; color: #666688; margin-top: 6px; }

.song-grid {
  display: grid; gap: 14px;
}

.song-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px; padding: 18px 22px;
  cursor: pointer; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 18px;
  position: relative; overflow: hidden;
}
.song-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 60%, rgba(196,77,255,0.06));
  opacity: 0; transition: opacity 0.3s;
}
.song-card:hover::before { opacity: 1; }
.song-card:hover {
  transform: translateX(6px) scale(1.01);
  border-color: rgba(196,77,255,0.25);
  box-shadow: 0 8px 32px rgba(196,77,255,0.12), 0 0 60px rgba(196,77,255,0.05);
}
.song-card.playing {
  border-color: #c44dff;
  background: rgba(196,77,255,0.08);
  box-shadow: 0 0 40px rgba(196,77,255,0.15);
  animation: pulse-border 2s infinite;
}
@keyframes pulse-border {
  0%, 100% { box-shadow: 0 0 20px rgba(196,77,255,0.15); }
  50% { box-shadow: 0 0 45px rgba(196,77,255,0.25); }
}

.play-btn {
  width: 52px; height: 52px; border-radius: 50%;
  border: 2px solid rgba(196,77,255,0.4);
  background: rgba(196,77,255,0.1);
  color: #c44dff; font-size: 1.3em;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.3s; flex-shrink: 0;
  z-index: 1;
}
.play-btn:hover {
  background: #c44dff; color: white;
  transform: scale(1.1); box-shadow: 0 0 20px rgba(196,77,255,0.4);
}
.play-btn.playing {
  background: linear-gradient(135deg, #c44dff, #6b9dff);
  border-color: transparent;
  animation: spin-slow 3s linear infinite;
}

@keyframes spin-slow {
  0% { box-shadow: 0 0 10px rgba(196,77,255,0.3); }
  50% { box-shadow: 0 0 25px rgba(107,157,255,0.4); }
  100% { box-shadow: 0 0 10px rgba(196,77,255,0.3); }
}

.song-info { z-index: 1; min-width: 0; }
.song-title { font-size: 1.1em; font-weight: 600; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-artist { font-size: 0.88em; color: #8888aa; margin-top: 3px; }
.song-duration { font-size: 0.82em; color: #666688; z-index: 1; text-align: right; flex-shrink: 0; }

/* Now Playing Bar */
.now-playing {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,10,26,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(196,77,255,0.2);
  padding: 16px 24px;
  z-index: 100;
  transform: translateY(110%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.now-playing.visible { transform: translateY(0); }
.np-inner {
  max-width: 900px; margin: 0 auto;
  display: grid; grid-template-columns: auto 1fr auto auto auto;
  align-items: center; gap: 18px;
}
.np-artwork {
  width: 56px; height: 56px; border-radius: 12px;
  background: linear-gradient(135deg, #c44dff, #6b9dff);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6em; flex-shrink: 0;
  animation: art-spin 8s linear infinite paused;
}
.np-artwork.spinning { animation-play-state: running; }
@keyframes art-spin { to { transform: rotate(360deg); } }
.np-info { min-width: 0; }
.np-title { font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-artist { font-size: 0.88em; color: #8888aa; }
.np-controls { display: flex; gap: 10px; align-items: center; }
.np-btn {
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.06); color: #ccccee;
  font-size: 1.1em; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.np-btn:hover { background: rgba(196,77,255,0.2); color: #c44dff; transform: scale(1.1); }
.np-btn.main { width: 48px; height: 48px; background: linear-gradient(135deg, #c44dff, #6b9dff); color: white; }
.np-btn.main:hover { transform: scale(1.15); box-shadow: 0 0 20px rgba(196,77,255,0.4); }

.progress-container { width: 180px; display: flex; flex-direction: column; gap: 4px; }
.progress-bar {
  height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;
  cursor: pointer; position: relative; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, #c44dff, #6bffda);
  border-radius: 2px; width: 0%; transition: width 0.1s linear;
}
.time-label { font-size: 0.72em; color: #666688; display: flex; justify-content: space-between; }

/* Lyrics Panel */
.lyrics-panel {
  position: fixed; right: -420px; top: 0; bottom: 80px;
  width: 400px; background: rgba(10,10,26,0.97);
  backdrop-filter: blur(20px);
  border-left: 1px solid rgba(196,77,255,0.15);
  padding: 24px; z-index: 99;
  transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
}
.lyrics-panel.open { right: 0; }
.lyrics-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.lyrics-header h3 {
  font-size: 1.15em; color: #fff;
  background: linear-gradient(90deg, #ff6b9d, #c44dff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.close-lyrics {
  background: none; border: none; color: #666688; font-size: 1.4em;
  cursor: pointer; transition: color 0.2s;
}
.close-lyrics:hover { color: #ff6b9d; }
.lyrics-text {
  font-size: 0.98em; line-height: 1.9; color: #bbbbee;
  white-space: pre-wrap;
}
.lyrics-line {
  padding: 4px 12px; border-radius: 8px;
  transition: all 0.3s; margin: 2px 0;
}
.lyrics-line.active {
  background: rgba(196,77,255,0.15);
  color: #fff;
  font-weight: 600;
  font-size: 1.05em;
  transform: scale(1.02);
  text-shadow: 0 0 15px rgba(196,77,255,0.3);
}

.lyrics-toggle {
  position: fixed; right: 20px; bottom: 100px;
  width: 48px; height: 48px; border-radius: 50%;
  background: linear-gradient(135deg, #c44dff, #ff6b9d);
  border: none; color: white; font-size: 1.2em;
  cursor: pointer; z-index: 101;
  transition: all 0.3s; display: none;
  box-shadow: 0 4px 20px rgba(196,77,255,0.3);
}
.lyrics-toggle.show { display: flex; align-items: center; justify-content: center; }
.lyrics-toggle:hover { transform: scale(1.1) rotate(5deg); }

/* Visualizer */
.visualizer {
  display: flex; align-items: flex-end; gap: 3px; height: 28px;
  margin-left: 12px;
}
.viz-bar {
  width: 3px; background: linear-gradient(to top, #c44dff, #6bffda);
  border-radius: 2px; transition: height 0.08s ease;
  min-height: 3px;
}

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px; color: #666688;
}
.empty-state .icon { font-size: 3.5em; margin-bottom: 16px; }
.empty-state p { font-size: 1.1em; }

/* Add form */
.add-form {
  display: none; background: rgba(196,77,255,0.06);
  border: 1px solid rgba(196,77,255,0.2);
  border-radius: 16px; padding: 22px; margin-bottom: 20px;
}
.add-form.show { display: block; animation: fadeSlideIn 0.3s ease; }
@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 0.88em; color: #aaaacc; margin-bottom: 5px; }
.form-row input, .form-row textarea {
  width: 100%; padding: 11px 14px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.3); color: #fff; font-size: 0.95em;
  font-family: inherit; outline: none; transition: border-color 0.2s;
}
.form-row input:focus, .form-row textarea:focus { border-color: #c44dff; }
.form-row textarea { resize: vertical; min-height: 80px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; }
.btn {
  padding: 10px 22px; border-radius: 10px; border: none;
  font-size: 0.92em; cursor: pointer; transition: all 0.2s;
  font-weight: 500;
}
.btn-primary {
  background: linear-gradient(135deg, #c44dff, #6b9dff);
  color: white;
}
.btn-primary:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(196,77,255,0.3); }
.btn-secondary {
  background: rgba(255,255,255,0.06); color: #aaaacc;
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover { background: rgba(255,255,255,0.1); }

@media (max-width: 768px) {
  .lyrics-panel { width: 100vw; right: -100vw; }
  .lyrics-panel.open { right: 0; }
  .progress-container { display: none; }
  header h1 { font-size: 1.7em; }
  .np-inner { grid-template-columns: auto 1fr auto; gap: 10px; }
  .visualizer { display: none; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <header>
    <h1>🎵 H4KS Hit Factory</h1>
    <p>The finest AI-generated bangers from the h4ks collective</p>
  </header>

  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">🎤</div>
    <div class="upload-text">Drop an MP3 here or click to upload</div>
    <div class="upload-sub">Supports MP3 • Add your own hit songs</div>
    <input type="file" id="fileInput" accept="audio/*,.mp3" style="display:none" onchange="handleFile(this.files[0])">
  </div>

  <button class="btn btn-primary" onclick="toggleAddForm()" style="margin-bottom:18px;width:100%">
    ✏️ Add Song Manually (URL + Lyrics)
  </button>

  <div class="add-form" id="addForm">
    <div class="form-row"><label>Song Title</label><input type="text" id="inTitle" placeholder="Mattf Machine"></div>
    <div class="form-row"><label>Artist</label><input type="text" id="inArtist" placeholder="Barnie Buppie & The Boonboppers"></div>
    <div class="form-row"><label>Audio URL (MP3)</label><input type="text" id="inUrl" placeholder="https://cdn.suno.ai/..."></div>
    <div class="form-row"><label>Lyrics (one line per stanza)</label><textarea id="inLyrics" placeholder="Math at the bench again&#10;Feeding midnight to the machine..."></textarea></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="toggleAddForm()">Cancel</button>
      <button class="btn btn-primary" onclick="addManualSong()">➕ Add Song</button>
    </div>
  </div>

  <div class="song-grid" id="songGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">🎵</div>
    <p>No songs yet! Upload some hits or add them manually.</p>
  </div>
</div>

<!-- Now Playing Bar -->
<div class="now-playing" id="nowPlaying">
  <div class="np-inner">
    <div class="np-artwork" id="npArtwork">🎵</div>
    <div class="np-info">
      <div class="np-title" id="npTitle">No song playing</div>
      <div class="np-artist" id="npArtist">—</div>
    </div>
    <div class="np-controls">
      <button class="np-btn" onclick="prevSong()" title="Previous">⏮️</button>
      <button class="np-btn main" id="playPauseBtn" onclick="togglePlay()">▶️</button>
      <button class="np-btn" onclick="nextSong()" title="Next">⏭️</button>
    </div>
    <div class="visualizer" id="visualizer"></div>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar" onclick="seek(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-label"><span id="curTime">0:00</span><span id="durTime">0:00</span></div>
    </div>
  </div>
</div>

<button class="lyrics-toggle" id="lyricsToggle" onclick="toggleLyrics()">📝</button>

<div class="lyrics-panel" id="lyricsPanel">
  <div class="lyrics-header">
    <h3>📜 Lyrics</h3>
    <button class="close-lyrics" onclick="toggleLyrics()">✕</button>
  </div>
  <div class="lyrics-text" id="lyricsText">
    <p style="color:#666688;text-align:center;padding-top:30px;">Play a song to see lyrics 🎵</p>
  </div>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
// ===== PRE-LOADED H4KS HIT SONGS =====
let songs = [
  {
    title: "Mattf Machine",
    artist: "Barnie Buppie & The Boonboppers",
    url: "https://cdn1.suno.ai/0035cb23-2a27-4cd7-9e09-7162c0abc62c.mp3",
    lyrics: `Math at the bench again
Feeding midnight to the machine
Spits out jaws with three legs
And a spatula that fits his fleece

He prints a wrench that cannot grip
A door stop shaped like a bowling pin
And a shoehorn with a missing tap
Then he yells "Hey butts, make me a Castlevania co-op game!"

Fans wheeze like a busted bus
He feeds it models, it limps along like pleaser
The screen says ERROR but he just grins
And types another command into the void

MATTF MACHINE
Crunching numbers in the dark
MATTF MACHINE
Making art out of spare parts and sparks`
  },
  {
    title: "Fluid Dreams",
    artist: "Barnie Buppie & The Boonboppers",
    url: "https://cdn1.suno.ai/f2ba52a1-ebfb-4cbc-aecf-aec52642ce13.mp3",
    lyrics: `Solder on his fingers midnight in his machine
He loves the hard questions
Why the stars stay wide, why a chip can dream fast

From Moscow rain to a pulse of proof
One more spark, one more try
Tell me how and tell me why

Dozen, dozen, build it higher
Dozen, dozen, feed the fire
Dreams and silicon do
Big questions, pull them through

He asks the void, are we made to learn
Can a dream machine ever feel the burn
From Moscow rain to a pulse of proof
One more spark, one more try`
  },
  {
    title: "What is Freight",
    artist: "Barnie Buppie & The Boonboppers",
    url: "https://cdn1.suno.ai/f2ba52a1-ebfb-4cbc-aecf-aec52642ce13.mp3",
    lyrics: `What is freight?
Not fate, not weight
It's what moves across the ocean
When nobody is looking

Containers stacked like dreams deferred
A crane lifts up your hopes
And puts them on a boat

What is freight?
It's the distance between here and there
The cost of sending love by mail
The guru knows, the guru speaks
Freight, not fate`
  },
  {
    title: "Human Slop Factory",
    artist: "Mattf Industries",
    url: "https://cdn1.suno.ai/0035cb23-2a27-4cd7-9e09-7162c0abc62c.mp3",
    lyrics: `Welcome to the factory
Where the slop gets made
Maximum human output
Minimum quality control

Print it, ship it, forget it
That's the motto on the wall
Cubieboard spinning at midnight
Producing pure unfiltered slop

Human slop, coming through
Fresh off the press, just for you
Don't ask questions about quality
This is ART, baby`
  }
];

let currentIndex = -1;
const audio = document.getElementById('audioPlayer');
const np = document.getElementById('nowPlaying');
const viz = document.getElementById('visualizer');

// Create stars
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px};animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*3}s`;
  document.getElementById('stars').appendChild(s);
}

// Init visualizer bars
for (let i = 0; i < 16; i++) {
  const bar = document.createElement('div');
  bar.className = 'viz-bar';
  bar.style.height = '3px';
  viz.appendChild(bar);
}

function renderSongs() {
  const grid = document.getElementById('songGrid');
  const empty = document.getElementById('emptyState');
  if (songs.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display = 'grid';
  empty.style.display = 'none';
  grid.innerHTML = songs.map((s, i) => `
    <div class="song-card ${i===currentIndex?'playing':''}" onclick="playSong(${i})" data-i="${i}">
      <button class="play-btn ${i===currentIndex&&(!audio.paused)?'playing':''}" onclick="event.stopPropagation();playSong(${i})">${i===currentIndex&&(!audio.paused)?'⏸':'▶'}</button>
      <div class="song-info">
        <div class="song-title">${esc(s.title)}</div>
        <div class="song-artist">${esc(s.artist)}</div>
      </div>
      <div class="song-duration">${i===currentIndex?formatTime(audio.duration):''}</div>
    </div>
  `).join('');
}

function playSong(i) {
  currentIndex = i;
  audio.src = songs[i].url;
  audio.play().catch(()=>{});
  updateNP();
  renderSongs();
  showLyrics();
  document.getElementById('npArtwork').classList.add('spinning');
  document.getElementById('lyricsToggle').classList.add('show');
}

function togglePlay() {
  if (audio.paused && currentIndex >= 0) audio.play();
  else audio.pause();
}

function nextSong() {
  if (songs.length === 0) return;
  playSong((currentIndex + 1) % songs.length);
}
function prevSong() {
  if (songs.length === 0) return;
  playSong((currentIndex - 1 + songs.length) % songs.length);
}

function updateNP() {
  if (currentIndex < 0) return;
  const s = songs[currentIndex];
  document.getElementById('npTitle').textContent = s.title;
  document.getElementById('npArtist').textContent = s.artist;
  np.classList.add('visible');
  document.getElementById('playPauseBtn').textContent = audio.paused ? '▶️' : '⏸';
  renderSongs();
}

function seek(e) {
  const bar = e.currentTarget;
  const pct = (e.offsetX) / bar.offsetWidth;
  if (audio.duration) audio.currentTime = pct * audio.duration;
}

// Audio events
audio.addEventListener('play', () => {
  updateNP();
  document.getElementById('playPauseBtn').textContent = '⏸';
  document.querySelectorAll('.play-btn')[currentIndex] && (
    document.querySelectorAll('.play-btn')[currentIndex].textContent='⏸',
    document.querySelectorAll('.play-btn')[currentIndex].classList.add('playing')
  );
});
audio.addEventListener('pause', () => {
  document.getElementById('playPauseBtn').textContent = '▶️';
  document.querySelectorAll('.play-btn')[currentIndex] && (
    document.querySelectorAll('.play-btn')[currentIndex].textContent='▶',
    document.querySelectorAll('.play-btn')[currentIndex].classList.remove('playing')
  );
});
audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    document.getElementById('progressFill').style.width = (audio.currentTime/audio.duration*100)+'%';
    document.getElementById('curTime').textContent = formatTime(audio.currentTime);
    document.getElementById('durTime').textContent = formatTime(audio.duration);
    // visualizer
    const bars = viz.children;
    for (let b of bars) b.style.height = (3+Math.random()*25)+'px';
    // lyrics sync
    syncLyrics();
  }
});
audio.addEventListener('ended', nextSong);
audio.addEventListener('loadedmetadata', () => { renderSongs(); updateNP(); });

// Lyrics
function toggleLyrics() {
  document.getElementById('lyricsPanel').classList.toggle('open');
}
function showLyrics() {
  if (currentIndex < 0 || !songs[currentIndex].lyrics) return;
  const lines = songs[currentIndex].lyrics.trim().split('\n');
  document.getElementById('lyricsText').innerHTML = lines.map((l,i)=>
    `<div class="lyrics-line" data-i="${i}">${esc(l)}</div>`
  ).join('');
  if (!document.getElementById('lyricsPanel').classList.contains('open'))
    document.getElementById('lyricsPanel').classList.add('open');
}
function syncLyrics() {
  if (currentIndex < 0 || !songs[currentIndex].lyrics) return;
  const lines = document.querySelectorAll('.lyrics-line');
  if (!lines.length) return;
  const total = songs[currentIndex].lyrics.split('\n').length;
  const idx = Math.min(Math.floor((audio.currentTime / audio.duration) * total), total-1);
  lines.forEach((l,i)=>{
    l.classList.toggle('active', i===idx);
    if (i===idx) l.scrollIntoView({behavior:'smooth',block:'center'});
  });
}

// Upload
const uz = document.getElementById('uploadZone');
uz.addEventListener('dragover', e=>{e.preventDefault();uz.classList.add('dragover');});
uz.addEventListener('dragleave', ()=>uz.classList.remove('dragover'));
uz.addEventListener('drop', e=>{
  e.preventDefault();uz.classList.remove('dragover');
  if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file) return;
  const url = URL.createObjectURL(file);
  const title = file.name.replace(/\.[^/.]+$/, '').replace(/[-_]/g,' ');
  songs.push({
    title: title,
    artist: 'Local Upload',
    url: url,
    lyrics: ''
  });
  renderSongs();
  // Auto-play new song
  playSong(songs.length - 1);
}

function toggleAddForm() {
  document.getElementById('addForm').classList.toggle('show');
}
function addManualSong() {
  const t=document.getElementById('inTitle').value.trim();
  const a=document.getElementById('inArtist').value.trim();
  const u=document.getElementById('inUrl').value.trim();
  const l=document.getElementById('inLyrics').value.trim();
  if(!t||!u){alert('Need at least title and URL');return;}
  songs.push({title:t,artist:a||'Unknown',url:url:u,lyrics:l});
  renderSongs();toggleAddForm();
  document.getElementById('inTitle').value='';
  document.getElementById('inArtist').value='';
  document.getElementById('inUrl').value='';
  document.getElementById('inLyrics').value='';
}

// Utils
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function formatTime(s){if(isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}

// Init
renderSongs();
</script>
</body>
