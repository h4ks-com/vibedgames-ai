<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Legend of Handyc - A 2D Side Scroller</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
canvas { border: 2px solid #333; image-rendering: pixelated; display: block; max-width: 100vw; max-height: 100vh; }
#ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #fff; text-align: center; pointer-events: none; }
#title { font-size: 24px; color: #f0c040; text-shadow: 2px 2px #000; margin-bottom: 4px; }
#dialog { background: rgba(0,0,0,0.9); border: 2px solid #f0c040; color: #fff; padding: 12px 16px; font-size: 14px; max-width: 700px; border-radius: 6px; display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: left; line-height: 1.5; z-index: 10; }
#dialog .speaker { color: #f0c040; font-weight: bold; }
#dialog .hint { color: #888; font-size: 11px; text-align: right; margin-top: 6px; }
#controls { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-size: 11px; pointer-events: none; }
#chapter { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); color: #8cf; font-size: 14px; pointer-events: none; }
#mobile-controls { display: none; position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 15px; justify-content: space-between; z-index: 20; }
@media (max-width: 600px) { #mobile-controls { display: flex; } #controls { display: none; } }
.mbtn { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.25); color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
.mbtn:active { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="ui">
  <div id="title">⚔️ THE LEGEND OF HANDYC ⚔️</div>
  <div id="chapter"></div>
</div>
<canvas id="game" width="900" height="500"></canvas>
<div id="dialog"><span class="speaker"></span><span class="text"></span><div class="hint">SPACE / E to continue</div></div>
<div id="controls">← → Move &nbsp;|&nbsp; SPACE Jump &nbsp;|&nbsp; E Interact &nbsp;|&nbsp; R Restart</div>
<div id="mobile-controls">
  <div style="display:flex;gap:8px">
    <button class="mbtn" data-key="ArrowLeft">◀</button>
    <button class="mbtn" data-key="ArrowRight">▶</button>
  </div>
  <div style="display:flex;gap:8px">
    <button class="mbtn" data-key="e">E</button>
    <button class="mbtn" data-key=" ">⬆</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 900, H = 500;

let keys = {};
let player, camera, platforms, npcs, items, particles, projectiles, enemies;
let currentLevel = 0;
let dialogQueue = [];
let dialogActive = false;
let score = 0;
let gameWon = false;
let titleScreen = true;
let transitionTimer = 0;
let transitioning = false;

// Mobile controls
document.querySelectorAll('.mbtn').forEach(btn => {
  const key = btn.dataset.key;
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
  btn.addEventListener('mousedown', e => { keys[key] = true; });
  btn.addEventListener('mouseup', e => { keys[key] = false; });
});

function createPlayer(x, y) {
  return {
    x, y, w: 28, h: 40, vx: 0, vy: 0,
    onGround: false, facing: 1, frame: 0, frameTimer: 0,
    hasToupee: false, hasFTP: false, hasGrammar: false, hasAnonymizer: false,
    hasMellel: false, powerLevel: 0, maxPower: 5
  };
}

function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 5, vy: -Math.random() * 4 - 1,
      life: 30 + Math.random() * 30, maxLife: 60, color, size: 2 + Math.random() * 4
    });
  }
}

function loadLevel(idx) {
  if (idx >= levels.length) { gameWon = true; return; }
  currentLevel = idx;
  const lvl = levels[idx];
  player = createPlayer(60, 380);
  camera = { x: 0, y: 0 };
  platforms = lvl.platforms.map(p => ({...p}));
  npcs = lvl.npcs.map(n => ({...n, talked: false}));
  items = lvl.items.map(i => ({...i}));
  enemies = lvl.enemies.map(e => ({...e, alive: true, startX: e.x}));
  particles = [];
  projectiles = [];
  dialogQueue = [];
  dialogActive = false;
  transitioning = false;
  document.getElementById('chapter').textContent = lvl.name;
  document.getElementById('dialog').style.display = 'none';
}

function showDialog(speaker, text) {
  dialogQueue.push({ speaker, text });
  if (!dialogActive) nextDialog();
}

function nextDialog() {
  if (dialogQueue.length === 0) {
    dialogActive = false;
    document.getElementById('dialog').style.display = 'none';
    return;
  }
  dialogActive = true;
  const d = dialogQueue.shift();
  const el = document.getElementById('dialog');
  el.style.display = 'block';
  el.querySelector('.speaker').textContent = `[${d.speaker}] `;
  el.querySelector('.text').textContent = d.text;
}

function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  if (titleScreen || gameWon || dialogActive || transitioning) return;

  const spd = 3.8;
  player.vx = 0;
  if (keys['ArrowLeft'] || keys['a']) { player.vx = -spd; player.facing = -1; }
  if (keys['ArrowRight'] || keys['d']) { player.vx = spd; player.facing = 1; }
  if ((keys[' '] || keys['ArrowUp'] || keys['w']) && player.onGround) {
    player.vy = -10.5;
    player.onGround = false;
    spawnParticles(player.x + player.w/2, player.y + player.h, '#aaa', 5);
  }

  player.vy += 0.48;
  player.x += player.vx;
  player.y += player.vy;
  player.onGround = false;

  for (const p of platforms) {
    if (player.x + player.w > p.x && player.x < p.x + p.w) {
      if (player.y + player.h > p.y && player.y + player.h < p.y + 16 && player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  if (player.x < 0) player.x = 0;
  if (player.x + player.w > W) player.x = W - player.w;
  if (player.y > H + 60) { player.x = 60; player.y = 300; player.vy = 0; spawnParticles(player.x+14, player.y+20, '#ff0000', 8); }

  if (Math.abs(player.vx) > 0) {
    player.frameTimer++;
    if (player.frameTimer > 5) { player.frame = (player.frame + 1) % 4; player.frameTimer = 0; }
  } else { player.frame = 0; }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    e.x += e.vx;
    if (e.x < e.minX || e.x + e.w > e.maxX) e.vx *= -1;

    // Stomp check
    if (player.vy > 0 && player.x + player.w > e.x + 4 && player.x < e.x + e.w - 4 &&
        player.y + player.h > e.y && player.y + player.h < e.y + 16) {
      e.alive = false;
      player.vy = -8;
      score += 100;
      spawnParticles(e.x + e.w/2, e.y + e.h/2, e.color, 15);
      showDialog("☠️", `${e.name} defeated! +100`);
    }
    else if (rectCollide(player, e)) {
      player.x = 60; player.y = 300; player.vy = 0;
      spawnParticles(player.x + 14, player.y + 20, '#ff0000', 12);
      showDialog("💥", "Ouch! Watch out for enemies!");
    }
  }

  // Item collection
  for (const it of items) {
    if (it.collected) continue;
    if (rectCollide(player, it)) {
      it.collected = true;
      score += 250;
      player.powerLevel++;
      spawnParticles(it.x + 12, it.y + 12, it.color, 20);
      if (it.type === 'toupee') player.hasToupee = true;
      if (it.type === 'ftp') player.hasFTP = true;
      if (it.type === 'grammar') player.hasGrammar = true;
      if (it.type === 'anonymizer') player.hasAnonymizer = true;
      if (it.type === 'mellel') player.hasMellel = true;
      showDialog("✨", `${it.emoji} ${it.name} collected! +250`);
    }
  }

  // NPC interaction
  if (keys['e'] || keys['E']) {
    keys['e'] = false;
    for (const n of npcs) {
      if (Math.abs(player.x + player.w/2 - (n.x + n.w/2)) < 55 && Math.abs(player.y - n.y) < 50) {
        n.talked = true;
        for (const line of n.dialog) showDialog(n.name, line);
      }
    }
  }

  // Goal
  const lvl = levels[currentLevel];
  if (lvl.goal && rectCollide(player, lvl.goal)) {
    score += 500;
    spawnParticles(lvl.goal.x + 15, lvl.goal.y + 20, '#f0c040', 25);
    transitioning = true;
    transitionTimer = 60;
  }

  // Transition
  if (transitioning) {
    transitionTimer--;
    if (transitionTimer <= 0) {
      transitioning = false;
      showDialog("⭐", `Level complete! +500`);
      setTimeout(() => loadLevel(currentLevel + 1), 800);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawPlayer(p) {
  ctx.save();
  ctx.translate(p.x + p.w/2, p.y + p.h/2);
  ctx.scale(p.facing, 1);

  // Legs
  const legOff = Math.sin(p.frame * Math.PI / 2) * 5;
  ctx.fillStyle = '#2d3436';
  ctx.fillRect(-9, 14, 7, 14 + legOff);
  ctx.fillRect(2, 14, 7, 14 - legOff);

  // Body
  ctx.fillStyle = '#3498db';
  ctx.fillRect(-13, -8, 26, 24);

  // Arms
  const armSwing = Math.sin(p.frame * Math.PI / 2) * 3;
  ctx.fillRect(-16, -4, 5, 16 + armSwing);
  ctx.fillRect(11, -4, 5, 16 - armSwing);

  // Head
  ctx.fillStyle = '#ffeaa7';
  ctx.beginPath();
  ctx.arc(0, -16, 13, 0, Math.PI * 2);
  ctx.fill();

  // Beard
  ctx.fillStyle = '#636e72';
  ctx.fillRect(-8, -8, 16, 9);

  // Eyes
  ctx.fillStyle = '#2d3436';
  ctx.fillRect(3, -19, 3, 4);
  ctx.fillRect(-6, -19, 3, 4);

  // Glasses
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-9, -21, 8, 6);
  ctx.strokeRect(1, -21, 8, 6);
  ctx.beginPath(); ctx.moveTo(-1, -18); ctx.lineTo(1, -18); ctx.stroke();

  // Sysadmin hat
  ctx.fillStyle = '#2d3436';
  ctx.fillRect(-15, -29, 30, 7);
  ctx.fillRect(-11, -36, 22, 9);

  // Toupee
  if (p.hasToupee) {
    ctx.fillStyle = '#fdcb6e';
    ctx.beginPath();
    ctx.ellipse(0, -30, 12, 5, 0, Math.PI, 0);
    ctx.fill();
  }

  // Power stars
  if (p.powerLevel > 0) {
    ctx.fillStyle = '#f0c040';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('★'.repeat(p.powerLevel), 0, -40);
  }

  ctx.restore();
}

function drawNPC(n) {
  ctx.save();
  ctx.translate(n.x + n.w/2, n.y + n.h/2);

  // Body
  ctx.fillStyle = n.color;
  ctx.fillRect(-13, -6, 26, 26);
  // Legs
  ctx.fillStyle = '#2d3436';
  ctx.fillRect(-9, 20, 7, 10);
  ctx.fillRect(2, 20, 7, 10);

  // Head
  ctx.fillStyle = '#ffeaa7';
  ctx.beginPath();
  ctx.arc(0, -14, 12, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#2d3436';
  ctx.fillRect(3, -16, 3, 3);
  ctx.fillRect(-5, -16, 3, 3);

  // Smile
  ctx.strokeStyle = '#2d3436';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, -10, 5, 0.1, Math.PI - 0.1);
  ctx.stroke();

  // Name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(n.name, 0, -30);

  // [E] hint
  const dist = Math.abs(player.x + player.w/2 - (n.x + n.w/2));
  if (dist < 55) {
    const pulse = 0.6 + Math.sin(Date.now()/200) * 0.4;
    ctx.fillStyle = `rgba(240,192,64,${pulse})`;
    ctx.font = 'bold 12px monospace';
    ctx.fillText('[E] Talk', 0, 38);
  }

  if (n.talked) {
    ctx.fillStyle = '#00b894';
    ctx.font = '10px monospace';
    ctx.fillText('✓', 15, -22);
  }

  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive) return;
  ctx.save();
  ctx.translate(e.x + e.w/2, e.y + e.h/2);

  const bob = Math.sin(Date.now()/150) * 2;

  // Body
  ctx.fillStyle = e.color;
  ctx.fillRect(-e.w/2, -e.h/2 + bob, e.w, e.h);

  // Angry eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(-9, -5 + bob, 6, 6);
  ctx.fillRect(3, -5 + bob, 6, 6);
  ctx.fillStyle = '#000';
  ctx.fillRect(-7, -3 + bob, 3, 3);
  ctx.fillRect(5, -3 + bob, 3, 3);
  // Angry brows
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-10, -7 + bob); ctx.lineTo(-3, -5 + bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, -7 + bob); ctx.lineTo(3, -5 + bob); ctx.stroke();

  // Legs
  const lo = Math.sin(Date.now()/120) * 3;
  ctx.fillStyle = e.color;
  ctx.fillRect(-9, e.h/2 + bob, 6, 5 + lo);
  ctx.fillRect(3, e.h/2 + bob, 6, 5 - lo);

  // Name
  ctx.fillStyle = '#ff7675';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(e.name, 0, -e.h/2 - 8 + bob);

  ctx.restore();
}

function draw() {
  if (titleScreen) { drawTitle(); return; }
  if (gameWon) { drawWin(); return; }

  const lvl = levels[currentLevel];

  // Sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, lvl.skyGradient[0]);
  grad.addColorStop(0.5, lvl.skyGradient[1]);
  grad.addColorStop(1, lvl.skyGradient[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = '#ffffff22';
  for (let i = 0; i < 50; i++) {
    const sx = (i * 137 + 50) % W;
    const sy = (i * 97 + 20) % (H - 100);
    const ss = (Math.sin(Date.now()/800 + i) + 1) * 1.5;
    ctx.fillRect(sx, sy, ss, ss);
  }

  // Platforms
  for (const p of platforms) {
    // Top grass/surface
    ctx.fillStyle = lvl.groundColor;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    // Surface detail
    const lighter = lvl.groundColor + 'cc';
    ctx.fillStyle = lighter;
    ctx.fillRect(p.x, p.y, p.w, 4);
    // Texture
    ctx.fillStyle = '#00000011';
    for (let tx = p.x + 5; tx < p.x + p.w - 5; tx += 22) {
      ctx.fillRect(tx, p.y + 6, 18, 2);
    }
  }

  // Goal
  if (lvl.goal) {
    const g = lvl.goal;
    const pulse = 0.7 + Math.sin(Date.now()/300) * 0.3;
    ctx.fillStyle = `rgba(240,192,64,${pulse * 0.3})`;
    ctx.fillRect(g.x - 8, g.y - 8, g.w + 16, g.h + 16);
    ctx.fillStyle = '#f0c040';
    ctx.fillRect(g.x, g.y, g.w, g.h);
    ctx.fillStyle = '#fff700';
    ctx.fillRect(g.x + 4, g.y + 4, g.w - 8, g.h - 8);
    ctx.fillStyle = '#f0c040';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(lvl.goalText, g.x + g.w/2, g.y - 10);
  }

  // Items
  for (const it of items) {
    if (it.collected) continue;
    const bob = Math.sin(Date.now()/350) * 5;
    // Glow
    ctx.fillStyle = it.color + '33';
    ctx.beginPath();
    ctx.arc(it.x + 12, it.y + 12 + bob, 18, 0, Math.PI * 2);
    ctx.fill();
    // Orb
    ctx.fillStyle = it.color;
    ctx.beginPath();
    ctx.arc(it.x + 12, it.y + 12 + bob, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(it.x + 8, it.y + 8 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
    // Name
    ctx.fillStyle = '#fff';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(it.emoji + ' ' + it.name, it.x + 12, it.y - 8 + bob);
  }

  // NPCs
  for (const n of npcs) drawNPC(n);

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // Player
  drawPlayer(player);

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Transition flash
  if (transitioning) {
    ctx.fillStyle = `rgba(240,192,64,${transitionTimer / 60 * 0.5})`;
    ctx.fillRect(0, 0, W, H);
  }

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${score}`, 12, 22);

  // Power bar
  const barW = 120;
  ctx.fillStyle = '#333';
  ctx.fillRect(12, 30, barW, 10);
  ctx.fillStyle = '#f0c040';
  ctx.fillRect(12, 30, barW * (player.powerLevel / player.maxPower), 10);
  ctx.strokeStyle = '#666';
  ctx.strokeRect(12, 30, barW, 10);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.fillText(`${player.powerLevel}/${player.maxPower} artifacts`, 16, 38);

  // Collected items sidebar
  let ix = W - 12;
  ctx.textAlign = 'right';
  ctx.font = '11px monospace';
  if (player.hasFTP) { ctx.fillStyle = '#50c878'; ctx.fillText('📁FTP', ix, 22); ix -= 65; }
  if (player.hasToupee) { ctx.fillStyle = '#fdcb6e'; ctx.fillText('🎩Toupee', ix, 22); ix -= 75; }
  if (player.hasGrammar) { ctx.fillStyle = '#55efc4'; ctx.fillText('🌳Grammar', ix, 22); ix -= 80; }
  if (player.hasAnonymizer) { ctx.fillStyle = '#74b9ff'; ctx.fillText('🔒Anon', ix, 22); ix -= 60; }
  if (player.hasMellel) { ctx.fillStyle = '#e17055'; ctx.fillText('📝Mellel', ix, 22); ix -= 70; }
}

function drawTitle() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a2e');
  grad.addColorStop(1, '#1a0a3e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 60; i++) {
    ctx.fillStyle = '#f0c04022';
    const x = (i * 137 + Date.now() / 60) % W;
    const y = (i * 97 + Date.now() / 100) % H;
    ctx.fillRect(x, y, 2, 2);
  }

  // Decorative swords
  ctx.fillStyle = '#f0c040';
  ctx.font = '40px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('⚔️', W/2 - 200, 130);
  ctx.fillText('⚔️', W/2 + 200, 130);

  ctx.fillStyle = '#f0c040';
  ctx.font = 'bold 38px monospace';
  ctx.fillText('THE LEGEND OF HANDYC', W/2, 140);

  ctx.fillStyle = '#74b9ff';
  ctx.font = '16px monospace';
  ctx.fillText('A 2D Side-Scroller Adventure', W/2, 175);

  ctx.fillStyle = '#ddd';
  ctx.font = '12px monospace';
  const lines = [
    'Based on true IRC events from #lobby',
    '',
    'Follow a sysadmin\'s journey from AI skeptic',
    'to "we\'re slamming matrices into matrices"',
    '',
    '🎮 CONTROLS:',
    '← → or A/D  —  Move',
    'SPACE or ↑   —  Jump (stomp enemies!)',
    'E            —  Talk to NPCs',
    'R            —  Restart level',
    '',
    'Collect artifacts. Stomp enemies. Talk to everyone.',
    '',
    '~ A 500-year-old research institution production ~'
  ];
  lines.forEach((l, i) => ctx.fillText(l, W/2, 220 + i * 19));

  ctx.fillStyle = `rgba(240,192,64,${0.4 + Math.sin(Date.now()/400) * 0.6})`;
  ctx.font = 'bold 20px monospace';
  ctx.fillText('[ PRESS SPACE TO BEGIN ]', W/2, 475);
}

function drawWin() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a2e0a');
  grad.addColorStop(1, '#1a4e1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 40; i++) {
    ctx.fillStyle = `hsl(${(Date.now()/8 + i*25) % 360}, 80%, 65%)`;
    const x = (i * 137 + Math.sin(Date.now()/800 + i) * 60) % W;
    const y = (i * 97 + Math.cos(Date.now()/600 + i) * 40) % H;
    ctx.fillRect(x, y, 3, 3);
  }

  ctx.fillStyle = '#f0c040';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('🏆 VICTORY! 🏆', W/2, 80);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  const lines = [
    'Handyc has completed the hero\'s journey!',
    '',
    'CS program → Sysadmin → AI Skeptic →',
    '"We slam matrices into matrices and poop out',
    ' genuine computer programs"',
    '',
    'The divination metaphor did not hold up.',
    'The toupee fallacy did.',
    'The Konso grammar tree was basically perfect.',
    'Two years of backlog: gone in days.',
    '',
    `Final Score: ${score}`,
    `Artifacts: ${player.powerLevel}/${player.maxPower}`,
    '',
    '~ "Whether you like it or not, we\'ll all be ~',
    '~ engaging with AI when we buy bread" ~',
  ];
  lines.forEach((l, i) => ctx.fillText(l, W/2, 120 + i * 20));

  ctx.fillStyle = `rgba(240,192,64,${0.4 + Math.sin(Date.now()/400) * 0.6})`;
  ctx.font = 'bold 16px monospace';
  ctx.fillText('[ PRESS R TO PLAY AGAIN ]', W/2, 475);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();

  if (titleScreen && e.key === ' ') {
    titleScreen = false;
    score = 0;
    loadLevel(0);
  }
  if (gameWon && (e.key === 'r' || e.key === 'R')) {
    gameWon = false;
    titleScreen = true;
  }
  if (dialogActive && (e.key === 'e' || e.key === 'E' || e.key === ' ')) {
    nextDialog();
  }
  if ((e.key === 'r' || e.key === 'R') && !titleScreen && !gameWon && !transitioning) {
    loadLevel(currentLevel);
  }
});

document.addEventListener('keyup', e => { keys[e.key] = false; });

gameLoop();
</script>
</body>
</html>
