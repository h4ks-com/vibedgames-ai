<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 The Benenenenenene Saga — A Visual Novel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
  .game-container {
    position: relative; width: 100%; height: 100vh; max-width: 960px; margin: 0 auto;
    overflow: hidden;
  }
  .bg {
    position: absolute; inset: 0; background-size: cover; background-position: center;
    transition: opacity 1s ease, background-image 1s ease; opacity: 0;
  }
  .bg.active { opacity: 1; }

  .title-screen {
    position: absolute; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a0a2e 0%, #1a0a2e 50%, #0a1a2e 100%);
    transition: opacity 0.8s;
  }
  .title-screen.hidden { opacity: 0; pointer-events: none; }
  .title-screen h1 {
    font-family: 'Press Start 2P', monospace; font-size: 1.8rem; text-align: center;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bff6b, #6b9fff);
    background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: rainbow 4s linear infinite; margin-bottom: 10px;
  }
  @keyframes rainbow { to { background-position: 300% center; } }
  .title-screen .subtitle {
    font-size: 1rem; color: #aaa; margin-bottom: 40px; text-align: center; padding: 0 20px;
  }
  .title-screen .subtitle em { color: #ffd93d; font-style: normal; }
  .start-btn {
    font-family: 'Press Start 2P', monospace; padding: 16px 40px; font-size: 0.9rem;
    border: 2px solid #ff6b6b; background: transparent; color: #ff6b6b; cursor: pointer;
    transition: all 0.3s; border-radius: 4px;
  }
  .start-btn:hover { background: #ff6b6b; color: #0a0a1a; transform: scale(1.05); }

  .character {
    position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%);
    z-index: 5; transition: all 0.6s ease; opacity: 0;
  }
  .character.active { opacity: 1; }
  .character img { width: 160px; height: 200px; object-fit: cover; border-radius: 12px; border: 3px solid rgba(255,255,255,0.2); }
  .character.speaking { animation: speak-bounce 0.5s ease infinite alternate; }
  @keyframes speak-bounce { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(-6px); } }

  .dialogue-box {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    background: linear-gradient(to top, rgba(10,10,26,0.97) 0%, rgba(10,10,26,0.9) 80%, transparent 100%);
    padding: 30px 30px 24px; min-height: 180px;
  }
  .speaker-name {
    font-family: 'Press Start 2P', monospace; font-size: 0.75rem; margin-bottom: 8px;
    padding: 4px 12px; display: inline-block; border-radius: 4px;
  }
  .speaker-name.benen { background: #6b9fff; color: #fff; }
  .speaker-name.researcher { background: #ffd93d; color: #1a1a2e; }
  .speaker-name.student1 { background: #ff6b6b; color: #fff; }
  .speaker-name.student2 { background: #6bff6b; color: #1a1a2e; }
  .speaker-name.narrator { background: rgba(255,255,255,0.15); color: #ccc; }

  .dialogue-text {
    font-size: 1.05rem; line-height: 1.7; color: #e0e0e0; min-height: 50px;
    max-width: 700px; margin: 0 auto;
  }
  .dialogue-text .cursor {
    display: inline-block; width: 2px; height: 1.1em; background: #ffd93d;
    animation: blink 0.8s step-end infinite; vertical-align: text-bottom; margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .choices {
    position: absolute; bottom: 200px; left: 50%; transform: translateX(-50%);
    z-index: 15; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 500px;
  }
  .choice-btn {
    padding: 14px 20px; font-size: 0.95rem; background: rgba(10,10,26,0.9);
    border: 1px solid rgba(255,255,255,0.25); color: #fff; cursor: pointer;
    border-radius: 8px; transition: all 0.3s; text-align: left; backdrop-filter: blur(8px);
  }
  .choice-btn:hover { background: rgba(107,159,255,0.2); border-color: #6b9fff; transform: translateX(5px); }

  .progress-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 20;
    background: rgba(255,255,255,0.1);
  }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #6b9fff, #ff6b6b); transition: width 0.5s; width: 0%; }

  .controls {
    position: absolute; top: 16px; right: 16px; z-index: 20; display: flex; gap: 8px;
  }
  .ctrl-btn {
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; backdrop-filter: blur(4px);
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.15); }
  .ctrl-btn.off { opacity: 0.4; }

  .ending-screen {
    position: absolute; inset: 0; z-index: 50; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10,10,26,0.95); backdrop-filter: blur(10px);
  }
  .ending-screen.show { display: flex; }
  .ending-screen h2 { font-family: 'Press Start 2P', monospace; font-size: 1.2rem; margin-bottom: 20px; color: #ffd93d; }
  .ending-screen p { color: #aaa; font-size: 1rem; text-align: center; padding: 0 30px; line-height: 1.8; max-width: 600px; }
  .ending-screen .replay-btn {
    margin-top: 30px; font-family: 'Press Start 2P', monospace; padding: 12px 30px;
    font-size: 0.75rem; border: 2px solid #6bff6b; background: transparent;
    color: #6bff6b; cursor: pointer; border-radius: 4px; transition: all 0.3s;
  }
  .ending-screen .replay-btn:hover { background: #6bff6b; color: #0a0a1a; }

  .chapter-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 30; font-family: 'Press Start 2P', monospace; font-size: 1rem;
    color: #fff; opacity: 0; transition: opacity 0.5s; text-align: center;
    text-shadow: 0 0 20px rgba(107,159,255,0.5); pointer-events: none;
  }
  .chapter-label.show { opacity: 1; }

  .fade-overlay {
    position: absolute; inset: 0; background: #0a0a1a; z-index: 25;
    opacity: 0; pointer-events: none; transition: opacity 0.6s;
  }
  .fade-overlay.active { opacity: 1; }

  .stat-counter {
    position: absolute; top: 16px; left: 16px; z-index: 20;
    font-family: 'Press Start 2P', monospace; font-size: 0.6rem; color: #ffd93d;
    background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 4px;
  }

  .particle {
    position: absolute; pointer-events: none; z-index: 4; font-size: 20px;
    animation: float-up 3s ease-out forwards;
  }
  @keyframes float-up {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-200px) scale(0.3); }
  }
</style>
</head>
<body>
<div class="game-container" id="game">
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="stat-counter" id="statCounter">🙃 Patience: ██████████</div>

  <div class="controls">
    <button class="ctrl-btn" id="voiceBtn" onclick="toggleVoice()" title="Toggle Voice">🗣️</button>
    <button class="ctrl-btn" id="skipBtn" onclick="skipTypewriter()" title="Skip">⏩</button>
  </div>

  <div class="title-screen" id="titleScreen">
    <h1>THE BENENENENENENE SAGA</h1>
    <p class="subtitle">A visual novel about thumbnails, PHP, and the futility of delegating simple tasks<br><br>Based on a true story from <em>#lobby</em></p>
    <button class="start-btn" onclick="startGame()">START GAME</button>
  </div>

  <div class="bg" id="bg1"></div>
  <div class="bg" id="bg2"></div>

  <div class="character" id="charBenen"><img src="dev-portrait.jpg" alt="Benen"></div>
  <div class="character" id="charResearcher"><img src="researcher-portrait.jpg" alt="Researcher"></div>
  <div class="character" id="charStudent1"><img src="student1-portrait.jpg" alt="Student 1"></div>
  <div class="character" id="charStudent2"><img src="student2-portrait.jpg" alt="Student 2"></div>

  <div class="chapter-label" id="chapterLabel"></div>
  <div class="fade-overlay" id="fadeOverlay"></div>

  <div class="choices" id="choices"></div>

  <div class="dialogue-box" id="dialogueBox" style="display:none;">
    <div class="speaker-name narrator" id="speakerName">Narrator</div>
    <div class="dialogue-text" id="dialogueText"></div>
  </div>

  <div class="ending-screen" id="ending">
    <h2>THE END</h2>
    <p id="endingText"></p>
    <button class="replay-btn" onclick="location.reload()">PLAY AGAIN</button>
  </div>
</div>

<script>
const ASSETS = {
  dev: 'dev-portrait.jpg',
  researcher: 'researcher-portrait.jpg',
  student1: 'student1-portrait.jpg',
  student2: 'student2-portrait.jpg',
  office: 'office-bg.jpg',
  hallway: 'hallway-bg.jpg'
};

let voiceEnabled = true, selectedVoice = null, typewriterTimer = null, currentText = '', typing = false;
let patience = 10, stepIndex = 0;

const voiceNames = ['Google UK English Female','Microsoft Zira','Samantha','Karen','Google US English','Victoria','Moira','Tessa','Fiona'];
function pickVoice() {
  if (!window.speechSynthesis) return null;
  const v = window.speechSynthesis.getVoices();
  for (const n of voiceNames) { const f = v.find(x => x.name.includes(n)); if (f) return f; }
  return v.find(x => x.lang.startsWith('en')) || v[0] || null;
}
if (window.speechSynthesis) {
  const lv = () => { window.speechSynthesis.getVoices(); selectedVoice = pickVoice(); };
  lv(); window.speechSynthesis.onvoiceschanged = lv;
}

function speak(text) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.95; u.pitch = 1.1; u.volume = 0.9;
  if (selectedVoice) u.voice = selectedVoice;
  window.speechSynthesis.speak(u);
}
function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  document.getElementById('voiceBtn').classList.toggle('off', !voiceEnabled);
  if (!voiceEnabled) window.speechSynthesis.cancel();
}
function skipTypewriter() {
  if (!typing) return;
  clearInterval(typewriterTimer);
  typing = false;
  document.getElementById('dialogueText').innerHTML = currentText;
}

function updatePatience(delta) {
  patience = Math.max(0, Math.min(10, patience + delta));
  const filled = '█'.repeat(patience);
  const empty = '░'.repeat(10 - patience);
  document.getElementById('statCounter').textContent = `🙃 Patience: ${filled}${empty}`;
}

function updateProgress(pct) {
  document.getElementById('progress').style.width = pct + '%';
}

function showChapter(text) {
  return new Promise(resolve => {
    const el = document.getElementById('chapterLabel');
    el.textContent = text; el.classList.add('show');
    setTimeout(() => { el.classList.remove('show'); setTimeout(resolve, 600); }, 2000);
  });
}

function fadeTransition(duration = 600) {
  return new Promise(resolve => {
    const el = document.getElementById('fadeOverlay');
    el.classList.add('active');
    setTimeout(() => { el.classList.remove('active'); setTimeout(resolve, 300); }, duration);
  });
}

function setBackground(which) {
  document.querySelectorAll('.bg').forEach(b => b.classList.remove('active'));
  const el = document.getElementById(which === 'office' ? 'bg1' : 'bg2');
  el.style.backgroundImage = which === 'office'
    ? `url(${ASSETS.office})` : `url(${ASSETS.hallway})`;
  el.classList.add('active');
}

function showCharacter(id) {
  document.querySelectorAll('.character').forEach(c => { c.classList.remove('active', 'speaking'); });
  if (id) document.getElementById(id).classList.add('active');
}

function showDialogue(speaker, text, speakerClass) {
  return new Promise(resolve => {
    const box = document.getElementById('dialogueBox');
    box.style.display = 'block';
    const nameEl = document.getElementById('speakerName');
    nameEl.textContent = speaker;
    nameEl.className = 'speaker-name ' + (speakerClass || 'narrator');
    const textEl = document.getElementById('dialogueText');
    currentText = text; typing = true;
    textEl.innerHTML = '';
    let i = 0;
    speak(text);
    const activeChar = document.querySelector('.character.active');
    if (activeChar) activeChar.classList.add('speaking');

    typewriterTimer = setInterval(() => {
      if (i < text.length) {
        textEl.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
        i++;
      } else {
        clearInterval(typewriterTimer);
        typing = false;
        textEl.innerHTML = text;
        if (activeChar) activeChar.classList.remove('speaking');
        resolve();
      }
    }, 30);

    const handler = () => {
      if (!typing) { document.removeEventListener('click', handler); resolve(); }
      else { skipTypewriter(); document.removeEventListener('click', handler); resolve(); }
    };
    setTimeout(() => document.addEventListener('click', handler), 200);
  });
}

function showChoices(choices) {
  return new Promise(resolve => {
    const el = document.getElementById('choices');
    el.innerHTML = '';
    choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.text;
      btn.onclick = () => { el.innerHTML = ''; resolve(i); };
      el.appendChild(btn);
    });
  });
}

function spawnParticles(emojis = ['📄', '📁', '💻', '😫', '⏰']) {
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 80 + 10 + '%';
      p.style.bottom = '200px';
      document.getElementById('game').appendChild(p);
      setTimeout(() => p.remove(), 3000);
    }, i * 200);
  }
}

// ===== STORY =====
async function startGame() {
  document.getElementById('titleScreen').classList.add('hidden');
  await fadeTransition(1000);

  // Chapter 1
  await showChapter('Chapter 1: The PHP Nightmare');
  setBackground('office');
  updateProgress(5);
  await showDialogue('Narrator', 'It was a dark time. A project loomed — a custom website built in Craft CMS...', 'narrator');
  updateProgress(10);
  await showDialogue('Narrator', 'Craft CMS. Which is like WordPress... but not. But it\'s still PHP. So it\'s basically just WordPress.', 'narrator');
  updateProgress(15);
  await showDialogue('Narrator', 'And they wanted... multilanguage support. Custom document handling. All sorts of cursed features.', 'narrator');

  showCharacter('charBenen');
  await showDialogue('Benen', 'The code part was taking so long that I didn\'t have time to make thumbnail images.', 'benen');
  updateProgress(20);
  await showDialogue('Benen', 'A simple task. Resize some images. How hard could it be to delegate?', 'benen');

  spawnParticles(['📄', '🖼️', '🔄']);

  const c1 = await showChoices([
    { text: '💡 Ask the researcher to do it themselves' },
    { text: '💡 Just do it yourself, it\'s faster' }
  ]);

  if (c1 === 0) {
    showCharacter('charBenen');
    await showDialogue('Benen', 'I told the researcher to do the thumbnail images himself. To save time.', 'benen');
    updateProgress(25);
    await fadeTransition();
    showCharacter('charResearcher');
    setBackground('hallway');
    await showDialogue('Researcher', 'I... don\'t know how to do that.', 'researcher');
    updatePatience(-2);
    spawnParticles(['🤡', '❓', '💀']);
    await showDialogue('Benen', '...You don\'t know how to resize an image.', 'benen');
    await showDialogue('Narrator', 'The researcher could not resize an image. The bar was underground.', 'narrator');
  } else {
    await showDialogue('Narrator', 'In another timeline, Benen did it himself in 5 minutes. But that\'s not the story we\'re telling today.', 'narrator');
    updatePatience(-1);
    await showDialogue('Narrator', 'No — in THIS timeline, the researcher was asked. And the researcher did not know how.', 'narrator');
    showCharacter('charResearcher');
    await showDialogue('Researcher', 'I... don\'t know how to do that.', 'researcher');
  }

  // Chapter 2
  updateProgress(35);
  await fadeTransition(1000);
  await showChapter('Chapter 2: The Student Assistant');

  showCharacter('charBenen');
  setBackground('office');
  await showDialogue('Benen', 'So someone else asked if I wanted to send this to a student assistant. Relief! Someone else could do it!', 'benen');
  updateProgress(40);

  await showDialogue('Narrator', 'A week passed...', 'narrator');
  spawnParticles(['📧', '⏰', '⏰', '⏰']);

  await showDialogue('Benen', 'Then she emailed me. Asking me to explain what needed to be done.', 'benen');
  updatePatience(-1);
  await showDialogue('Benen', '"Just make thumbnails of the attached images, in this resolution." Simple, right?', 'benen');

  const c2 = await showChoices([
    { text: '📧 She replies: "I don\'t know what that means"' },
    { text: '📧 She replies: "Done!" (just kidding, that didn\'t happen)' }
  ]);

  if (c2 === 0) {
    await showDialogue('Student #1', 'I don\'t know what that means.', 'student1');
  } else {
    await showDialogue('Narrator', 'Ha. As if. She didn\'t know what that meant.', 'narrator');
    showCharacter('charStudent1');
    await showDialogue('Student #1', 'I don\'t know what that means.', 'student1');
  }
  updatePatience(-2);

  await showDialogue('Benen', 'So I explained what it meant.', 'benen');
  showCharacter('charStudent1');
  await showDialogue('Student #1', 'I don\'t know how to get a program to do that.', 'student1');
  updatePatience(-2);
  spawnParticles(['🤦', '🫠', '🤯']);

  await showDialogue('Benen', 'So I told her a program to use.', 'benen');
  await showDialogue('Student #1', 'I don\'t know how to install it.', 'student1');
  updatePatience(-2);

  await showDialogue('Narrator', 'And then... she disappeared. Her student work program ended. Gone. Like a fart in the wind.', 'narrator');
  updateProgress(55);

  showCharacter(null);
  await fadeTransition();
  await showDialogue('Narrator', 'The project bounced around somewhere for a while...', 'narrator');
  spawnParticles(['🔄', '🔄', '❓']);

  // Chapter 3
  await showChapter('Chapter 3: The Second Coming');
  updateProgress(65);
  showCharacter('charBenen');
  setBackground('office');
  await showDialogue('Benen', 'Then the researcher asked about the project again. I said I never had time for the thumbnails.', 'benen');
  await showDialogue('Benen', 'Then they sent me ANOTHER student assistant. And I explained the entire thing again.', 'benen');
  updatePatience(-1);
  updateProgress(70);

  showCharacter('charStudent2');
  setBackground('hallway');
  await showDialogue('Student #2', 'I got this. Thumbnails. Easy.', 'student2');
  updateProgress(75);

  await showDialogue('Narrator', 'A week later, she sent back the files...', 'narrator');
  spawnParticles(['📦', '✅', '✅', '❌', '❌']);

  await showDialogue('Benen', '95% were done correctly. And then a bunch were just... missing.', 'benen');
  updatePatience(-1);
  updateProgress(80);

  await showDialogue('Narrator', '95%. Not 100%. Not even close to 100%. 95%. The remaining 5%? Vanished into the ether.', 'narrator');

  // Final choice
  updateProgress(90);
  const c3 = await showChoices([
    { text: '🙃 Just do it yourself (acceptance)' },
    { text: '🤖 "In the time of me just explaining this story, Claude made that entire project obsolete"' },
    { text: '📧 Request a THIRD student assistant' }
  ]);

  await fadeTransition(1000);
  showCharacter('charBenen');
  setBackground('office');
  updateProgress(95);

  if (c3 === 0) {
    await showDialogue('Benen', 'You know what? Fine. I\'ll do it myself. Five minutes. ImageMagick. Done.', 'benen');
    updatePatience(3);
    spawnParticles(['✅', '🎉', '🖥️']);
  } else if (c3 === 1) {
    await showDialogue('Benen', 'In the time of me just explaining this story... Claude made that entire project obsolete.', 'benen');
    spawnParticles(['🤖', '💀', '⏰', '✨']);
    await showDialogue('Narrator', 'And so, the thumbnail problem was solved not by delegation, not by student assistants, but by the very thing that would eventually replace them all.', 'narrator');
  } else {
    await showDialogue('Narrator', 'You requested a third student assistant. The university cut the program budget. Nobody came. The thumbnails were never made.', 'narrator');
    updatePatience(-10);
    spawnParticles(['💀', '💀', '💀']);
    await showDialogue('Benen', 'Who needs humans at all?', 'benen');
  }

  updateProgress(100);
  showCharacter(null);

  // Ending
  await fadeTransition(1500);
  const endings = {
    0: 'Ending: Acceptance\n\nBenen did the thumbnails in 5 minutes. The student assistants went on to struggle with other simple tasks. The researcher still doesn\'t know how to resize images.\n\nPatience preserved. Sort of.',
    1: 'Ending: Obsolescence\n\nIn the time it took to explain this story, AI made the entire project — the CMS, the thumbnails, the student assistants — all obsolete.\n\nWho needs humans at all?',
    2: 'Ending: The Void\n\nNo more student assistants. No thumbnails. Just the cold embrace of PHP and the haunting memory of what could have been.\n\nPatience: obliterated.'
  };

  document.getElementById('endingText').textContent = endings[c3].replace(/\\n/g, '\n');
  document.getElementById('endingText').style.whiteSpace = 'pre-wrap';
  document.getElementById('ending').classList.add('show');
}

// Preload backgrounds
const img1 = new Image(); img1.src = ASSETS.office;
const img2 = new Image(); img2.src = ASSETS.hallway;
</script>
</body>
</html>
