<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❌ Valware Cannot Eat Burger Sauce</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    overflow: hidden;
  }
  .container {
    text-align: center;
    position: relative;
    z-index: 2;
  }
  .burger {
    font-size: 120px;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }
  h1 {
    font-size: 3rem;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d, #ff6b6b);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    to { background-position: 200% center; }
  }
  .subtitle {
    font-size: 1.4rem;
    color: #aaa;
    margin-bottom: 40px;
  }
  .sauce-btn {
    padding: 18px 50px;
    font-size: 1.3rem;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 8px 25px rgba(231,76,60,0.4);
    font-weight: bold;
    letter-spacing: 1px;
  }
  .sauce-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 35px rgba(231,76,60,0.6);
  }
  .sauce-btn:active { transform: scale(0.95); }
  .reaction {
    margin-top: 30px;
    font-size: 1.5rem;
    min-height: 50px;
    transition: opacity 0.3s;
  }
  .sauce-drip {
    position: fixed;
    top: -60px;
    font-size: 40px;
    animation: drip linear forwards;
    z-index: 1;
    pointer-events: none;
  }
  @keyframes drip {
    to { top: 110vh; opacity: 0; }
  }
  .counter {
    margin-top: 20px;
    font-size: 1rem;
    color: #888;
  }
  .counter span { color: #ffd93d; font-weight: bold; font-size: 1.3rem; }
  .banned-list {
    margin-top: 30px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .banned-tag {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.85rem;
    color: #ccc;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="burger">🍔</div>
    <h1>VALWARE CANNOT EAT BURGER SAUCE</h1>
    <p class="subtitle">A tragic tale of condiment intolerance</p>
    <button class="sauce-btn" onclick="offerSauce()">Feed Valware Burger Sauce</button>
    <div class="reaction" id="reaction"></div>
    <div class="counter">Sauce attempts: <span id="count">0</span></div>
    <div class="banned-list">
      <span class="banned-tag">🚫 Burger Sauce</span>
      <span class="banned-tag">🚫 Special Sauce</span>
      <span class="banned-tag">🚫 Mayo-Based Sauces</span>
      <span class="banned-tag">✅ Plain Burgers OK</span>
    </div>
  </div>
  <script>
    let count = 0;
    const reactions = [
      { emoji: "🤢", text: "Valware recoils in horror!" },
      { emoji: "😵", text: "Valware's eyes water uncontrollably!" },
      { emoji: "🚫", text: "ABSOLUTELY NOT. NO BURGER SAUCE." },
      { emoji: "😖", text: "Valware gags and pushes it away!" },
      { emoji: "💀", text: "Valware is now deceased (not really, but close)!" },
      { emoji: "😤", text: "Valware: 'WHY WOULD YOU DO THIS TO ME?!'" },
      { emoji: "🤮", text: "Valware is NOT having a good time!" },
      { emoji: "⛔", text: "DENIED. Burger sauce = bad. Always." },
      { emoji: "😰", text: "Valware is trembling at the sight of it!" },
      { emoji: "🧑‍⚕️", text: "Valware: 'CALL 999, I'VE BEEN POISONED!'" },
      { emoji: "🤯", text: "Valware's brain cannot comprehend this betrayal!" },
      { emoji: "😬", text: "Valware slowly backs away..." },
    ];

    function offerSauce() {
      count++;
      document.getElementById('count').textContent = count;
      const r = reactions[Math.floor(Math.random() * reactions.length)];
      const el = document.getElementById('reaction');
      el.style.opacity = 0;
      setTimeout(() => {
        el.innerHTML = `${r.emoji} ${r.text}`;
        el.style.opacity = 1;
      }, 150);
      dropSauce();
    }

    function dropSauce() {
      const sauces = ['🟡', '🟠', '🍦', '🫙'];
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'sauce-drip';
          el.textContent = sauces[Math.floor(Math.random() * sauces.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.animationDuration = (2 + Math.random() * 3) + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 5000);
        }, i * 200);
      }
    }
  </script>
</body>
</html>
