<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❌ Valware Cannot Eat Burger Sauce</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    overflow: hidden;
    background: #0a0a1a;
  }
  .bg-slider {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .bg-slider img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 2s ease-in-out;
  }
  .bg-slider img.active { opacity: 1; }
  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(2px);
  }
  .container {
    text-align: center;
    position: relative;
    z-index: 2;
  }
  .burger {
    font-size: 120px;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }
  h1 {
    font-size: 3rem;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d, #ff6b6b);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    to { background-position: 200% center; }
  }
  .subtitle {
    font-size: 1.4rem;
    color: #ccc;
    margin-bottom: 40px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  .sauce-btn {
    padding: 18px 50px;
    font-size: 1.3rem;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 8px 25px rgba(231,76,60,0.4);
    font-weight: bold;
    letter-spacing: 1px;
  }
  .sauce-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 35px rgba(231,76,60,0.6);
  }
  .sauce-btn:active { transform: scale(0.95); }
  .reaction {
    margin-top: 30px;
    font-size: 1.5rem;
    min-height: 50px;
    transition: opacity 0.3s;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
  }
  .sauce-drip {
    position: fixed;
    top: -60px;
    font-size: 40px;
    animation: drip linear forwards;
    z-index: 3;
    pointer-events: none;
  }
  @keyframes drip {
    to { top: 110vh; opacity: 0; }
  }
  .counter {
    margin-top: 20px;
    font-size: 1rem;
    color: #aaa;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .counter span { color: #ffd93d; font-weight: bold; font-size: 1.3rem; }
  .banned-list {
    margin-top: 30px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .banned-tag {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.85rem;
    color: #ddd;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
  }
  .audio-controls {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    display: flex;
    gap: 10px;
  }
  .audio-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  .audio-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
  .audio-btn.off { opacity: 0.4; }
  .speech-indicator {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,107,107,0.5);
    border-radius: 25px;
    padding: 8px 20px;
    font-size: 0.85rem;
    color: #ff6b6b;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .speech-indicator.show { opacity: 1; }
</style>
</head>
<body>
  <div class="bg-slider">
    <img src="bg1-burger.jpg" class="active">
    <img src="bg2-sauce.jpg">
    <img src="bg3-neon.jpg">
  </div>
  <div class="bg-overlay"></div>

  <div class="audio-controls">
    <button class="audio-btn" id="musicBtn" title="Toggle Music" onclick="toggleMusic()">🎵</button>
    <button class="audio-btn" id="sfxBtn" title="Toggle SFX" onclick="toggleSfx()">🔊</button>
    <button class="audio-btn" id="voiceBtn" title="Toggle Voice" onclick="toggleVoice()">🗣️</button>
  </div>

  <div class="container">
    <div class="burger">🍔</div>
    <h1>VALWARE CANNOT EAT BURGER SAUCE</h1>
    <p class="subtitle">A tragic tale of condiment intolerance</p>
    <button class="sauce-btn" onclick="offerSauce()">Feed Valware Burger Sauce</button>
    <div class="reaction" id="reaction"></div>
    <div class="counter">Sauce attempts: <span id="count">0</span></div>
    <div class="banned-list">
      <span class="banned-tag">🚫 Burger Sauce</span>
      <span class="banned-tag">🚫 Special Sauce</span>
      <span class="banned-tag">🚫 Mayo-Based Sauces</span>
      <span class="banned-tag">✅ Plain Burgers OK</span>
    </div>
  </div>

  <div class="speech-indicator" id="speechIndicator">🗣️ Valware is speaking...</div>

  <script>
    const images = document.querySelectorAll('.bg-slider img');
    let current = 0;
    setInterval(() => {
      images[current].classList.remove('active');
      current = (current + 1) % images.length;
      images[current].classList.add('active');
    }, 6000);

    let audioCtx = null, musicEnabled = true, sfxEnabled = true, voiceEnabled = true, musicPlaying = false, musicNodes = [];
    function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }

    function startMusic() {
      if (musicPlaying || !musicEnabled) return;
      const ctx = getAudioCtx(); musicPlaying = true;
      const notes = [261.6,293.7,329.6,293.7,261.6,220.0,246.9,261.6,293.7,261.6,246.9,220.0];
      const noteLen = 0.6; let noteIndex = 0;
      function playNote() {
        if (!musicPlaying) return;
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator(), gain = ctx.createGain(), filter = ctx.createBiquadFilter();
        osc.type = 'sine'; osc.frequency.value = notes[noteIndex % notes.length];
        filter.type = 'lowpass'; filter.frequency.value = 800;
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + noteLen * 0.9);
        osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + noteLen);
        musicNodes.push(osc); noteIndex++;
        if (noteIndex % 4 === 0) {
          const bass = ctx.createOscillator(), bg = ctx.createGain();
          bass.type = 'triangle'; bass.frequency.value = notes[(noteIndex-1)%notes.length]/2;
          bg.gain.setValueAtTime(0, ctx.currentTime); bg.gain.linearRampToValueAtTime(0.06, ctx.currentTime+0.05);
          bg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+noteLen*1.8);
          bass.connect(bg); bg.connect(ctx.destination); bass.start(ctx.currentTime); bass.stop(ctx.currentTime+noteLen*2);
        }
        if (musicPlaying && musicEnabled) setTimeout(playNote, noteLen*1000); else musicPlaying = false;
      }
      playNote();
    }
    function stopMusic() { musicPlaying = false; musicNodes.forEach(n=>{try{n.stop()}catch(e){}}); musicNodes=[]; }

    function playRejectSound() { if(!sfxEnabled)return; const ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(200,ctx.currentTime); o.frequency.linearRampToValueAtTime(80,ctx.currentTime+0.4); g.gain.setValueAtTime(0.15,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.4); }
    function playGagSound() { if(!sfxEnabled)return; const ctx=getAudioCtx(); for(let i=0;i<6;i++){const o=ctx.createOscillator(),g=ctx.createGain(),t=ctx.currentTime+i*0.08; o.type='square'; o.frequency.setValueAtTime(120+Math.random()*200,t); o.frequency.linearRampToValueAtTime(80+Math.random()*100,t+0.06); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.06); o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.07);} }
    function playAlarmSound() { if(!sfxEnabled)return; const ctx=getAudioCtx(); for(let i=0;i<4;i++){const o=ctx.createOscillator(),g=ctx.createGain(),t=ctx.currentTime+i*0.2; o.type='sine'; o.frequency.value=i%2===0?880:660; g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15); o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.16);} }
    function playDramaticSting() { if(!sfxEnabled)return; const ctx=getAudioCtx(); [330,415,494,330].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain(),t=ctx.currentTime+i*0.12; o.type=i===0?'triangle':'sine'; o.frequency.value=f; g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5); o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.5);}); }
    function playSplatSound() { if(!sfxEnabled)return; const ctx=getAudioCtx(),bs=ctx.sampleRate*0.15,b=ctx.createBuffer(1,bs,ctx.sampleRate),d=b.getChannelData(0); for(let i=0;i<bs;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(bs*0.1)); const s=ctx.createBufferSource(); s.buffer=b; const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=600; const g=ctx.createGain(); g.value=0.2; s.connect(f); f.connect(g); g.connect(ctx.destination); s.start(); }

    const femaleVoiceNames = ['Samantha','Victoria','Karen','Moira','Tessa','Fiona','Google UK English Female','Microsoft Zira','Microsoft Hazel','Microsoft Susan','Microsoft Linda','Microsoft Iris','Google US English','Google UK English','Alice','Anna','Vicki','rachel','nova','alloy','fable','shimmer','coral','bella','elli','charlotte','sarah','emily','lily'];
    function pickFemaleVoice() { if(!window.speechSynthesis)return null; const v=window.speechSynthesis.getVoices(); for(const n of femaleVoiceNames){const f=v.find(x=>x.name.toLowerCase().includes(n.toLowerCase()));if(f)return f;} return v.find(x=>x.lang.startsWith('en'))||v[0]||null; }
    let selectedVoice = null;
    function speak(text) { if(!voiceEnabled||!window.speechSynthesis)return; window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=1.0; u.pitch=1.3; u.volume=0.9; if(!selectedVoice)selectedVoice=pickFemaleVoice(); if(selectedVoice)u.voice=selectedVoice; const ind=document.getElementById('speechIndicator'); u.onstart=()=>ind.classList.add('show'); u.onend=()=>ind.classList.remove('show'); u.onerror=()=>ind.classList.remove('show'); window.speechSynthesis.speak(u); }

    function toggleMusic(){musicEnabled=!musicEnabled;document.getElementById('musicBtn').classList.toggle('off',!musicEnabled);if(musicEnabled)startMusic();else stopMusic();}
    function toggleSfx(){sfxEnabled=!sfxEnabled;document.getElementById('sfxBtn').classList.toggle('off',!sfxEnabled);}
    function toggleVoice(){voiceEnabled=!voiceEnabled;document.getElementById('voiceBtn').classList.toggle('off',!voiceEnabled);if(!voiceEnabled)window.speechSynthesis.cancel();}

    if(window.speechSynthesis){function lv(){window.speechSynthesis.getVoices();selectedVoice=pickFemaleVoice();}lv();window.speechSynthesis.onvoiceschanged=lv;}

    let count = 0;
    const reactions = [
      {emoji:"🤢",text:"Valware recoils in horror!",voice:"No! Get that away from me! I can smell it from here! Gross!",sfx:"gag"},
      {emoji:"😵",text:"Valware's eyes water uncontrollably!",voice:"My eyes! My eyes are burning! Why would you do this to me!",sfx:"alarm"},
      {emoji:"🚫",text:"ABSOLUTELY NOT. NO BURGER SAUCE.",voice:"Absolutely not. No burger sauce. I have made myself extremely clear on this matter.",sfx:"reject"},
      {emoji:"😖",text:"Valware gags and pushes it away!",voice:"Gross, gross, gross! Take it away! I'm going to be sick!",sfx:"gag"},
      {emoji:"💀",text:"Valware is now deceased (not really, but close)!",voice:"I am deceased. This is it. This is how I die. Death by burger sauce.",sfx:"sting"},
      {emoji:"😤",text:"Valware: 'WHY WOULD YOU DO THIS TO ME?!'",voice:"Why would you do this to me?! We were friends! Or at least acquaintances!",sfx:"reject"},
      {emoji:"🤮",text:"Valware is NOT having a good time!",voice:"I am not having a good time. I want everyone to know that. This is the worst day of my life.",sfx:"gag"},
      {emoji:"⛔",text:"DENIED. Burger sauce = bad. Always.",voice:"Denied. Request denied. Burger sauce equals bad. This has always been the case and always will be.",sfx:"alarm"},
      {emoji:"😰",text:"Valware is trembling at the sight of it!",voice:"I'm literally shaking right now. My hands are trembling. That sauce is a war crime.",sfx:"sting"},
      {emoji:"👨‍⚕️",text:"Valware: 'CALL 999, I'VE BEEN POISONED!'",voice:"Ring nine nine nine! I have been poisoned! Someone call an ambulance! It's the sauce!",sfx:"alarm"},
      {emoji:"🤯",text:"Valware's brain cannot comprehend this betrayal!",voice:"I trusted you. I genuinely trusted you. And you bring me sauce? This is the ultimate betrayal.",sfx:"sting"},
      {emoji:"😬",text:"Valware slowly backs away...",voice:"I'm just going to slowly back away now. Nobody make any sudden movements with that sauce.",sfx:"reject"},
    ];

    function offerSauce() {
      count++; document.getElementById('count').textContent=count;
      const r=reactions[Math.floor(Math.random()*reactions.length)];
      const el=document.getElementById('reaction'); el.style.opacity=0;
      setTimeout(()=>{el.innerHTML=`${r.emoji} ${r.text}`;el.style.opacity=1;},150);
      switch(r.sfx){case'gag':playGagSound();break;case'reject':playRejectSound();break;case'alarm':playAlarmSound();break;case'sting':playDramaticSting();break;}
      speak(r.voice); dropSauce();
    }
    function dropSauce(){const s=['🟡','🟠','🍦','🫙'];for(let i=0;i<5;i++){setTimeout(()=>{playSplatSound();const e=document.createElement('div');e.className='sauce-drip';e.textContent=s[Math.floor(Math.random()*s.length)];e.style.left=Math.random()*100+'vw';e.style.animationDuration=(2+Math.random()*3)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),5000);},i*300);}}
    document.addEventListener('click',()=>startMusic(),{once:true});
    document.addEventListener('touchstart',()=>startMusic(),{once:true});
  </script>
</body>
</html>
