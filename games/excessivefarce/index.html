<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        main {
            margin: 20px 0;
            padding: 20px;
            background: #ffffff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        button {
            padding: 10px 15px;
            background: #35424a;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #3a4b5d;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Web App</h1>
    </header>
    <main>
        <h2>Click the Button Below</h2>
        <button id="myButton">Click Me!</button>
        <p id="message" style="margin-top: 20px;"></p>
    </main>
    <script>
        document.getElementById('myButton').addEventListener('click', function() {
            document.getElementById('message').innerText = 'Hello, World! You clicked the button.';
        });
    </script>
</body>
</html>
