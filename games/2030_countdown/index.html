<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏰ Countdown to 2030</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a1a;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Stars background */
  .stars {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 20px;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    background: linear-gradient(135deg, #00d4ff, #7b2ff7, #f107a3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    text-shadow: none;
    animation: glow 3s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { filter: drop-shadow(0 0 10px rgba(0,212,255,0.5)); }
    to { filter: drop-shadow(0 0 30px rgba(247,7,163,0.8)); }
  }

  .subtitle {
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    color: #888;
    margin-bottom: 40px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .countdown {
    display: flex;
    gap: clamp(10px, 3vw, 30px);
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 40px;
  }

  .unit {
    background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: clamp(15px, 3vw, 30px) clamp(10px, 2vw, 25px);
    min-width: clamp(90px, 18vw, 140px);
    backdrop-filter: blur(10px);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .unit:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 10px 40px rgba(123,47,247,0.3);
  }

  .number {
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    background: linear-gradient(180deg, #fff 0%, #aaa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .label {
    font-size: clamp(0.65rem, 1.5vw, 0.9rem);
    color: #666;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 8px;
  }

  .progress-bar {
    width: min(600px, 85vw);
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 15px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00d4ff, #7b2ff7, #f107a3);
    border-radius: 3px;
    transition: width 1s linear;
  }
  .progress-text {
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 30px;
  }

  .fun-fact {
    max-width: 500px;
    font-size: 0.95rem;
    color: #777;
    line-height: 1.6;
    font-style: italic;
    padding: 15px 20px;
    border-left: 3px solid #7b2ff7;
    background: rgba(123,47,247,0.05);
    border-radius: 0 8px 8px 0;
  }

  .emoji-orbit {
    position: fixed;
    font-size: 2rem;
    animation: orbit var(--orbit-dur) linear infinite;
    z-index: 0;
    opacity: 0.6;
  }
  @keyframes orbit {
    from { transform: rotate(0deg) translateX(var(--radius)) rotate(0deg); }
    to { transform: rotate(360deg) translateX(var(--radius)) rotate(-360deg); }
  }

  .celebration {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(3rem, 10vw, 8rem);
    z-index: 100;
    display: none;
    animation: celebrateIn 1s ease-out forwards;
  }
  @keyframes celebrateIn {
    from { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  .confetti {
    position: fixed;
    width: 10px; height: 10px;
    top: -10px;
    z-index: 99;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  @media (max-width: 480px) {
    .unit { min-width: 75px; padding: 12px 15px; }
    .number { font-size: 2rem; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- Orbiting emojis -->
<div class="emoji-orbit" style="--orbit-dur: 15s; --radius: 35vmin; left: 50%; top: 50%;">🚀</div>
<div class="emoji-orbit" style="--orbit-dur: 20s; --radius: 28vmin; left: 50%; top: 50%; animation-delay: -5s;">🌙</div>
<div class="emoji-orbit" style="--orbit-dur: 25s; --radius: 42vmin; left: 50%; top: 50%; animation-delay: -10s;">✨</div>
<div class="emoji-orbit" style="--orbit-dur: 18s; --radius: 32vmin; left: 50%; top: 50%; animation-delay: -14s;">🎆</div>

<div class="container">
  <h1>🎯 2030</h1>
  <p class="subtitle">The future is coming...</p>

  <div class="countdown" id="countdown">
    <div class="unit"><div class="number" id="days">---</div><div class="label">Days</div></div>
    <div class="unit"><div class="number" id="hours">--</div><div class="label">Hours</div></div>
    <div class="unit"><div class="number" id="mins">--</div><div class="label">Minutes</div></div>
    <div class="unit"><div class="number" id="secs">--</div><div class="label">Seconds</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <p class="progress-text" id="progressText"></p>

  <div class="fun-fact" id="fact">
    💡 Loading cosmic wisdom...
  </div>
</div>

<div class="celebration" id="celebration">🎉🚀🌍 2030 IS HERE! 🌍🚀🎉</div>

<script>
// Generate stars
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 150; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  const size = Math.random() * 2.5 + 0.5;
  star.style.width = size + 'px';
  star.style.height = size + 'px';
  star.style.setProperty('--dur', (Math.random() * 3 + 1) + 's');
  starsContainer.appendChild(star);
}

const target = new Date('2030-01-01T00:00:00').getTime();
const startDecade = new Date('2020-01-01T00:00:00').getTime();
const decadeDuration = target - startDecade;

const facts = [
  "💡 In 2030, AI is projected to write most of this page's code.",
  "🚀 SpaceX aims to have landed humans on Mars by... well, soon-ish?",
  "🌍 The UN's SDGs deadline is 2030. How are we doing? 🫠",
  "💻 Windows 10 support ends in Oct 2025. Upgrade or perish!",
  "📱 By 2030, there could be 50+ billion connected devices worldwide.",
  "🦾 Humanoid robots might actually be a thing by then. Maybe. 🤖",
  "🎮 GTA VI should be out before 2030... right? RIGHT?!",
  "🌑 The Moon will be busy — multiple countries plan lunar bases!",
  "🧬 CRISPR gene editing could cure previously incurable diseases.",
  "☢️ Fun fact: Chernobyl won't be fully safe until ~the year 30000. So there's that.",
  "🔥 БГ said the train was on fire. It's still burning. Still no anthem status.",
  "🃏 doesnm already beat RKN. What will you achieve by 2030?"
];

let factIndex = 0;

function update() {
  const now = Date.now();
  const diff = target - now;

  if (diff <= 0) {
    // CELEBRATION MODE
    document.getElementById('countdown').style.display = 'none';
    document.querySelector('.progress-bar').parentElement.style.display = 'none';
    document.getElementById('fact').style.display = 'none';
    document.getElementById('celebration').style.display = 'block';
    launchConfetti();
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const secs = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById('days').textContent = days.toLocaleString();
  document.getElementById('hours').textContent = String(hours).padStart(2, '0');
  document.getElementById('mins').textContent = String(mins).padStart(2, '0');
  document.getElementById('secs').textContent = String(secs).padStart(2, '0');

  // Progress through the decade
  const elapsed = now - startDecade;
  const pct = Math.min(100, Math.max(0, (elapsed / decadeDuration) * 100));
  document.getElementById('progressFill').style.width = pct.toFixed(4) + '%';
  document.getElementById('progressText').textContent =
    `We're ${pct.toFixed(3)}% through the 2020s decade`;

  // Update fact every 15 seconds
  if (secs % 15 === 0 && secs !== lastFactSec) {
    lastFactSec = secs;
    factIndex = (factIndex + 1) % facts.length;
    document.getElementById('fact').textContent = facts[factIndex];
  }
}

let lastFactSec = -1;

function launchConfetti() {
  const colors = ['#00d4ff', '#7b2ff7', '#f107a3', '#ffd700', '#00ff88', '#ff4444'];
  for (let i = 0; i < 200; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
      c.style.width = (Math.random() * 8 + 4) + 'px';
      c.style.height = (Math.random() * 8 + 4) + 'px';
      c.style.animationDuration = (Math.random() * 3 + 2) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }, Math.random() * 3000);
  }
}

update();
setInterval(update, 1000);

// Set initial fact
document.getElementById('fact').textContent = facts[0];
</script>
</body>
</html>
