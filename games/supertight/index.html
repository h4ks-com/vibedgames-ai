<!doctype html><html><body><button id=n>New</button><div id=s style='position:fixed;inset:40px;overflow:hidden'></div><style>.w{position:absolute;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.6);min-width:180px;min-height:120px;resize:both;display:flex;flex-direction:column;overflow:hidden}.t{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 6px;cursor:grab}.c{padding:8px;overflow:auto;user-select:text}.b{width:28px;height:24px;border:0;background:rgba(255,255,255,.06);border-radius:6px}</style><script>
(function(){var s=document.getElementById('s'),n=document.getElementById('n'),z=100,i=0;
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function h(){return' hsl('+rnd(0,359)+' '+rnd(40,80)+'% '+rnd(18,70)+'%)'}
function create(){i++;var w=document.createElement('div');w.className='w';w.style.width=rnd(220,420)+'px';w.style.height=rnd(140,380)+'px';var R=s.getBoundingClientRect();w.style.left=rnd(8,Math.max(8,R.width-200))+'px';w.style.top=rnd(8,Math.max(8,R.height-150))+'px';var bg=h(),t=h(),txt=h(),fg=h(),fs=rnd(12,20)+'px',ff=['serif','sans-serif','monospace'][rnd(0,2)];w.style.background=bg;w.style.color=fg;w.style.fontFamily=ff;w.style.fontSize=fs;
w.innerHTML='<div class=t style="background:'+t+';color:'+fg+'"><span>Win '+i+'</span><span><button class=b id=add>＋</button><button class=b id=cl>✕</button></span></div><div class=c style="background:'+txt+';color:'+fg+';font-size:'+fs+'">Text '+i+'<br><button class=sp>Spawn</button> <button class=cc>Close</button></div>';w.style.zIndex=++z; s.appendChild(w);
var tb=w.querySelector('.t'),drag=false,ox=0,oy=0,pid=null;
tb.addEventListener('pointerdown',function(e){if(e.target.closest('button'))return;drag=true;pid=e.pointerId;var r=w.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;tb.setPointerCapture&&tb.setPointerCapture(pid);w.style.zIndex=++z});
tb.addEventListener('pointerup',function(e){drag=false;tb.releasePointerCapture&&tb.releasePointerCapture(e.pointerId);pid=null});
document.addEventListener('pointermove',function(e){if(!drag||pid!=null&&e.pointerId!==pid)return;var R=s.getBoundingClientRect(),nx=e.clientX-ox-R.left,ny=e.clientY-oy-R.top;w.style.left=Math.max(-120,Math.min(nx,R.width-80))+'px';w.style.top=Math.max(-120,Math.min(ny,R.height-40))+'px'});
w.querySelector('#cl').addEventListener('click',function(e){e.stopPropagation();w.remove()});
w.querySelector('.cc').addEventListener('click',function(e){e.stopPropagation();w.remove()});
w.querySelector('#add').addEventListener('click',function(e){e.stopPropagation();create()});
w.querySelector('.sp').addEventListener('click',function(e){e.stopPropagation();create()});
}
n.addEventListener('click',create);create();create();
})();
</script></body></html>
