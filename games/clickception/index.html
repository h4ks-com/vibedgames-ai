<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker-Ception</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; user-select: none; }
#main-btn {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 200px; height: 200px; border-radius: 50%;
  background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
  border: 4px solid #fff; cursor: pointer;
  font-size: 24px; font-weight: bold; color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  transition: transform 0.1s, box-shadow 0.1s;
  z-index: 9999; display: flex; align-items: center; justify-content: center;
  text-align: center; line-height: 1.2;
}
#main-btn:hover { box-shadow: 0 0 40px rgba(255,0,110,0.6); }
#main-btn:active { transform: translate(-50%, -50%) scale(0.92); }
#stats {
  position: fixed; top: 10px; left: 10px; z-index: 10000;
  background: rgba(0,0,0,0.85); padding: 15px 20px; border-radius: 12px;
  border: 1px solid #333; font-size: 14px; min-width: 220px;
}
#stats div { margin: 4px 0; }
#stats span { color: #00ff88; font-weight: bold; }
.mini-clicker {
  position: absolute; min-width: 140px; min-height: 140px;
  border-radius: 12px; background: rgba(20,20,35,0.95);
  border: 2px solid; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: move;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100;
  font-size: 11px;
}
.mini-clicker .mc-btn {
  width: 70px; height: 70px; border-radius: 50%;
  border: 2px solid #fff; cursor: pointer;
  font-size: 11px; font-weight: bold; color: #fff;
  display: flex; align-items: center; justify-content: center;
  text-align: center; line-height: 1.1; transition: transform 0.08s;
}
.mini-clicker .mc-btn:active { transform: scale(0.88); }
.mini-clicker .mc-count { margin-top: 4px; font-size: 13px; font-weight: bold; }
.mini-clicker .mc-depth { position: absolute; top: 4px; left: 4px; font-size: 9px; opacity: 0.7; }
.mini-clicker .mc-close {
  position: absolute; top: 2px; right: 4px; cursor: pointer;
  font-size: 14px; opacity: 0.5; line-height: 1;
}
.mini-clicker .mc-close:hover { opacity: 1; color: #ff4444; }
.float-text {
  position: absolute; pointer-events: none; font-weight: bold;
  font-size: 16px; animation: floatUp 1s ease-out forwards;
  text-shadow: 0 2px 6px rgba(0,0,0,0.8); z-index: 99999;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
}
</style>
</head>
<body>

<div id="main-btn">CLICK<br><small style="font-size:12px">make clicker</small></div>
<div id="stats">
  <div>Total Clicks: <span id="s-clicks">0</span></div>
  <div>Clickers Alive: <span id="s-clickers">0</span></div>
  <div>Clicks/sec: <span id="s-cps">0.0</span></div>
  <div>Max Depth: <span id="s-depth">0</span></div>
</div>

<script>
let totalClicks = 0;
let clickerCount = 0;
let maxDepthReached = 0;
const colors = ['#ff006e','#8338ec','#3a86ff','#06d6a0','#ffd166','#ef476f','#118ab2'];
const names = ['CLICK','TAP','PRESS','HIT','SMASH','BONK','POKE','BOOP'];

function rand(min,max){ return Math.random()*(max-min)+min; }

function spawnFloat(x,y,text,color){
  const el=document.createElement('div');
  el.className='float-text'; el.textContent=text;
  el.style.left=x+'px'; el.style.top=y+'px'; el.style.color=color||'#fff';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

// Main button
const mainBtn=document.getElementById('mainBtn') || document.getElementById('main-btn');
mainBtn.addEventListener('click',function(e){
  totalClicks++;
  createMiniClicker(e.clientX-70,e.clientY-120,1);
  spawnFloat(e.clientX,e.clientY,'+🖱️ CLICKER','#00ff88');
  updateStats();
});

function createMiniClicker(x,y,depth){
  if(depth>25) return; // safety cap
  if(clickerCount>=80) return; // perf cap
  clickerCount++;
  if(depth>maxDepthReached) maxDepthReached=depth;

  const mc=document.createElement('div');
  mc.className='mini-clicker';
  const color=colors[depth%colors.length];
  mc.style.borderColor=color;
  mc.style.left=Math.max(0,Math.min(x,window.innerWidth-150))+'px';
  mc.style.top=Math.max(0,Math.min(y,window.innerHeight-160))+'px';

  const dLabel=document.createElement('div'); dLabel.className='mc-depth'; dLabel.textContent='L'+depth;
  const closeBtn=document.createElement('div'); closeBtn.className='mc-close'; closeBtn.textContent='✕';
  const btn=document.createElement('div'); btn.className='mc-btn';
  btn.style.background=`linear-gradient(135deg,${color},${color}88)`;
  btn.textContent=names[depth%names.length];
  const cnt=document.createElement('div'); cnt.className='mc-count'; cnt.textContent='0';
  let clicks=0;

  mc.appendChild(dLabel); mc.appendChild(closeBtn); mc.appendChild(btn); mc.appendChild(cnt);

  // Drag
  let dragging=false,dx,dy;
  mc.addEventListener('mousedown',function(e){
    if(e.target===btn||e.target===closeBtn) return;
    dragging=true; dx=e.clientX-mc.offsetLeft; dy=e.clientY-mc.offsetTop;
  });
  document.addEventListener('mousemove',function(e){
    if(!dragging)return;
    mc.style.left=(e.clientX-dx)+'px'; mc.style.top=(e.clientY-dy)+'px';
  });
  document.addEventListener('mouseup',()=>dragging=false);

  // Close
  closeBtn.addEventListener('click',function(e){ e.stopPropagation(); mc.remove(); clickerCount--; updateStats(); });

  // Click the mini clicker
  btn.addEventListener('click',function(e){
    e.stopPropagation();
    clicks++; totalClicks++;
    cnt.textContent=clicks;
    spawnFloat(e.clientX,e.clientY,'+1',color);

    // Every N clicks in this mini-clicker, spawn a NEW deeper clicker
    if(clicks % Math.max(2,5-depth) === 0 && depth<25){
      const nx=e.clientX+rand(-80,80);
      const ny=e.clientY+rand(30,100);
      createMiniClicker(nx,ny,depth+1);
      spawnFloat(e.clientX,e.clientY,'+🔄 NEW!','#ffd166');
    }
    updateStats();
  });

  document.body.appendChild(mc);
  updateStats();
}

let lastCpsTime=Date.now(); let lastCpsClicks=0;
function updateStats(){
  document.getElementById('s-clicks').textContent=totalClicks;
  document.getElementById('s-clickers').textContent=clickerCount;
  const now=Date.now();
  const dt=(now-lastCpsTime)/1000;
  if(dt>=1){
    const cps=(totalClicks-lastCpsClicks)/dt;
    document.getElementById('s-cps').textContent=cps.toFixed(1);
    lastCpsClicks=totalClicks; lastCpsTime=now;
  }
  document.getElementById('s-depth').textContent=maxDepthReached;
}

setInterval(updateStats,500);
</script>
</body>
</html>
