// === DRAW HELPERS ===
function clr(c){G.fillStyle=PAL[c]||'#000';G.fillRect(0,0,W,H);}
function rect(x,y,w,h,c){const v=PAL[c];if(!v&&c!==0&&c!=='0')return;G.fillStyle=v||PAL['0'];G.fillRect(x|0,y|0,w|0,h|0);}
function pxl(x,y,c){const v=PAL[c];if(v){G.fillStyle=v;G.fillRect(x|0,y|0,1,1);}}
function frame(x,y,w,h,hi,lo,fill){if(fill)rect(x+2,y+2,w-4,h-4,fill);rect(x,y,w,1,hi);rect(x,y,1,h,hi);rect(x+1,y+1,w-2,1,lo);rect(x+1,y+1,1,h-2,lo);rect(x,y+h-1,w,1,lo);rect(x+w-1,y,1,h,lo);}
function line(x0,y0,x1,y1,c){const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1;let err=dx-dy,x=x0,y=y0;while(true){pxl(x,y,c);if(x===x1&&y===y1)break;const e2=err*2;if(e2>-dy){err-=dy;x+=sx;}if(e2<dx){err+=dx;y+=sy;}}}
function sprT(s,x,y,sc){sc=sc||1;for(let r=0;r<s.length;r++){const row=s[r];for(let i=0;i<row.length;i++){const c=row[i];if(c===' ')continue;const v=PAL[c];if(!v)continue;G.fillStyle=v;G.fillRect((x+i*sc)|0,(y+r*sc)|0,sc,sc);}}}
function sprFlip(s,x,y,sc){sc=sc||1;for(let r=0;r<s.length;r++){const row=s[r];const ww=row.length;for(let i=0;i<ww;i++){const c=row[ww-1-i];if(c===' ')continue;const v=PAL[c];if(!v)continue;G.fillStyle=v;G.fillRect((x+i*sc)|0,(y+r*sc)|0,sc,sc);}}}
function dither(x,y,w,h,c1,c2){for(let j=0;j<h;j++){for(let i=0;i<w;i++){pxl(x+i,y+j,((i+j)&1)?c1:c2);}}}
function gradV(x,y,w,h,colors){const n=colors.length;for(let j=0;j<h;j++){const t=j/(h-1);const idx=Math.min(n-2,Math.floor(t*(n-1)));const f=t*(n-1)-idx;const c=(f<.5)?colors[idx]:colors[idx+1];if((j&1)&&f>.25&&f<.75){rect(x,y+j,w,1,colors[idx]);}else{rect(x,y+j,w,1,c);}}}

}

// === AUDIO (SNES-like multi-voice + effects) ===
let AC=null;let MASTER=null;let REVERB=null;
function ac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();MASTER=AC.createGain();MASTER.gain.value=.7;MASTER.connect(AC.destination);}catch(e){}}return AC;}
function beep(f,d,t,v,a,r,detune){
  const a2=ac();if(!a2)return;
  const o=a2.createOscillator(),g=a2.createGain();
  o.type=t||'square';o.frequency.value=f;
  if(detune)o.detune.value=detune;
  const now=a2.currentTime;
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(v==null?.14:v,now+(a||.008));
  g.gain.exponentialRampToValueAtTime(.0001,now+d);
  if(r)o.frequency.linearRampToValueAtTime(r,now+d);
  o.connect(g);g.connect(MASTER||a2.destination);
  o.start(now);o.stop(now+d+.05);
}
function chord(freqs,d,t,v){freqs.forEach((f,i)=>beep(f,d,t,(v||.1)*.8,.01+i*.002));}
function fm(carrier,mod,modDepth,d,v){
  const a2=ac();if(!a2)return;
  const c=a2.createOscillator(),m=a2.createOscillator(),g=a2.createGain(),mg=a2.createGain();
  c.frequency.value=carrier;m.frequency.value=mod;mg.gain.value=modDepth;
  const now=a2.currentTime;
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(v||.12,now+.01);
  g.gain.exponentialRampToValueAtTime(.0001,now+d);
  m.connect(mg);mg.connect(c.frequency);c.connect(g);g.connect(MASTER||a2.destination);
  m.start(now);c.start(now);m.stop(now+d+.05);c.stop(now+d+.05);
}
function noise(d,v,f,q){
  const a2=ac();if(!a2)return;
  const sz=Math.max(1,(a2.sampleRate*d)|0);
  const buf=a2.createBuffer(1,sz,a2.sampleRate);
  const dt=buf.getChannelData(0);
  for(let i=0;i<dt.length;i++){dt[i]=(Math.random()*2-1)*(1-i/dt.length);}
  const src=a2.createBufferSource();src.buffer=buf;
  const flt=a2.createBiquadFilter();flt.type='bandpass';flt.frequency.value=f||900;flt.Q.value=q||1.2;
  const g=a2.createGain();g.gain.value=v||.22;
  src.connect(flt);flt.connect(g);g.connect(MASTER||a2.destination);
  src.start();src.stop(a2.currentTime+d);
}
function pluck(f,d,v){fm(f,f*2,f*.5,d||.3,v||.14);}

function bgmStart(b){
  bgmStop();BGM_ACT=b;
  const id=++BGM_ID;
  const step=60/b.tempo/2;let idx=0,t0=Date.now()/1000;
  const tick=()=>{
    if(id!==BGM_ID||BGM_ACT!==b)return;
    const a2=ac();if(!a2)return;
    b.tracks.forEach(tr=>{
      const n=tr.notes[idx%tr.notes.length];
      if(n&&NT[n])beep(NT[n],step*.95,tr.type,tr.vol);
    });
    idx++;
    const nxt=t0+idx*step;
    setTimeout(tick,Math.max(10,(nxt-Date.now()/1000)*1000));
  };
  tick();
}

// === EVENTS ===
const EV=[];
function defEv(o){EV.push(o);}
function addI(st,k,n){n=n||1;const it=ITEMS[k];if(!it)return;const e=st.items.find(x=>x.k===k);if(e)e.n+=n;else st.items.push({k,n});if(it.wep){const cur=st.weapon?ITEMS[st.weapon]:null;if(!cur||(it.atk||0)>(cur.atk||0))st.weapon=k;}}
function takeI(st,k,n){n=n||1;const e=st.items.find(x=>x.k===k);if(!e)return false;e.n-=n;if(e.n<=0)st.items=st.items.filter(x=>x!==e);if(st.weapon===k&&!st.items.find(x=>x.k===k)){st.weapon=null;st.items.forEach(x=>{const it=ITEMS[x.k];if(it&&it.wep){if(!st.weapon||(it.atk||0)>(ITEMS[st.weapon].atk||0))st.weapon=x.k;}});}return true;}
function hasI(st,k){return !!st.items.find(x=>x.k===k);}
function countI(st,k){const e=st.items.find(x=>x.k===k);return e?e.n:0;}
function sk(st,s){return (st.pack?st.pack.stats[s]||0:0)+(st.statBonus&&st.statBonus[s]||0);}
function hurtMsg(st,s){msg(st,s);}
function hurt(st,n,target){
  if(target==='mate'){st.mateHp-=n;if(st.mateHp<=0){st.mateHp=0;st.mateAlive=false;msg(st,st.mateName+' has fallen.');}}
  else if(target==='child'){st.childHp-=n;if(st.childHp<=0){st.childHp=0;st.childAlive=false;msg(st,st.childName+' has fallen.');}}
  else{st.hp-=n;if(st.hp<=0){st.hp=0;st.alive=false;G_STATE.screen='dead';}}
  G_STATE.shake=10;
}
function msg(st,s){st.log=st.log||[];st.log.unshift(s);if(st.log.length>8)st.log.pop();G_STATE.msg=s;G_STATE.msgTime=200;}

// === GAME STATE FACTORY ===
function newGame(name,packIdx){
  const pack=PACKS[packIdx];
  const mateName=NAMES_F[rnd(NAMES_F.length)];
  const childName=NAMES_C[rnd(NAMES_C.length)];
  const st={
    name:name||'NGAI',
    pack:pack, packIdx:packIdx,
    hp:30+pack.hp*0+pack.hp,  hpMax:0,
    mateName, mateHp:0, mateHpMax:0, mateAlive:true,
    childName, childHp:0, childHpMax:0, childAlive:true,
    hunger:12, hungerMax:12,
    thirst:10, thirstMax:10,
    energy:10, energyMax:10,
    day:1, stage:0, progress:0, distance:0,
    items:[], weapon:null,
    xp:0, charm:0, statBonus:{atk:0,def:0,spd:0,kn:0,sp:0},
    log:[], alive:true,
    fever:0, parasite:0,
  };
  st.hpMax=pack.hp; st.hp=pack.hp;
  st.mateHpMax=Math.floor(pack.hp*.85); st.mateHp=st.mateHpMax;
  st.childHpMax=Math.floor(pack.hp*.55); st.childHp=st.childHpMax;
  pack.items.forEach(k=>addI(st,k,1));
  st.log.push('You set out from the forest edge.');
  return st;
}

// === TICK (advance state) ===
function tick(st,days){
  days=days||.5;
  st.distance+=days*2;
  st.progress+=days*2;
  const stDef=STAGES[st.stage];
  while(stDef && st.progress>=stDef.end){
    st.stage++;
    if(st.stage>=STAGES.length){G_STATE.screen='victory';st.victory=true;return;}
    msg(st,'You enter '+STAGES[st.stage].n+'.');
    break;
  }
  const td=st.day+days;
  st.day=td;
  st.hunger-=days*1.2;
  st.thirst-=days*1.5;
  st.energy-=days*.6;
  if(st.hunger<0){hurt(st,2);msg(st,'Hunger bites.');st.hunger=0;}
  if(st.thirst<0){hurt(st,3);msg(st,'Tongue dry.');st.thirst=0;}
  if(st.energy<0){hurt(st,1);st.energy=0;}
  if(st.mateAlive){st.mateHp=Math.min(st.mateHpMax,st.mateHp+.4);if(st.thirst<2)st.mateHp-=1;}
  if(st.childAlive){st.childHp=Math.min(st.childHpMax,st.childHp+.3);if(st.hunger<2)st.childHp-=1;if(st.mateHp<=0)st.childAlive=false;}
  if(st.fever>0){hurt(st,1);st.fever--;if(rnd(3)===0)msg(st,'Fever shakes you.');}
  if(st.parasite>0){st.hunger=Math.max(0,st.hunger-.5);st.parasite--;}
}

function fgTint(kind,j){

// === EVENT / COMBAT ===
function pickEvent(st){
  const terr=STAGES[st.stage].kind;
  const pool=EV.filter(e=>e.terr.includes(terr));
  if(!pool.length)return null;
  let total=0;pool.forEach(e=>total+=e.wt||1);
  let r=Math.random()*total;
  for(const e of pool){r-=e.wt||1;if(r<=0)return e;}
  return pool[0];
}
function triggerEvent(ev){
  if(!ev)return;
  G_STATE.event=ev;G_STATE.eventIdx=0;G_STATE.screen='event';SFX.blip();
}
function chooseOption(i){
  const ev=G_STATE.event;if(!ev||!ev.opts[i])return;
  const st=G_STATE.player;
  try{ev.opts[i].fn(st);}catch(e){console.error(e);}
  if(G_STATE.screen==='event')G_STATE.screen='travel';
}

function startCombat(st,enemyKey,intro){
  const e=ENEMIES[enemyKey];if(!e)return;
  G_STATE.combat={
    enemy:Object.assign({},e,{hp:e.hp,hpMax:e.hp}),
    turn:'player',
    log:[intro||(e.taunt||'A threat.')],
    round:0, fled:false, escapeChance:0,
    actionIdx:0,
  };
  G_STATE.screen='combat';bgmStart(BGM_HUNT);SFX.roar();
}
function endCombat(win){
  const c=G_STATE.combat;const st=G_STATE.player;
  if(win&&c){
    msg(st,'You defeat the '+c.enemy.n+'.');
    st.xp+=c.enemy.xp;
    (c.enemy.drops||[]).forEach(k=>{if(rnd(3)<2)addI(st,k,1);});
    SFX.victory();
  }else if(!win){
    msg(st,'You escaped.');
  }
  G_STATE.combat=null;
  G_STATE.screen='travel';bgmStart(BGM_WALK);
}
function playerAttack(){
  const c=G_STATE.combat;if(!c||c.turn!=='player')return;
  const st=G_STATE.player;
  const atk=d(20)+sk(st,'atk')+(st.weapon?ITEMS[st.weapon].atk||0:1);
  const hit=atk>=c.enemy.def;
  if(hit){
    const dmg=d(6)+sk(st,'atk')+(st.weapon?Math.floor((ITEMS[st.weapon].atk||0)/2):1);
    c.enemy.hp-=dmg;
    c.log.unshift('You hit for '+dmg+'.');
    SFX.hit();G_STATE.shake=8;
  }else{c.log.unshift('You miss.');SFX.miss();}
  if(c.enemy.hp<=0){endCombat(true);return;}
  c.turn='enemy';setTimeout(enemyTurn,500);
}
function playerThrow(){
  const c=G_STATE.combat;if(!c||c.turn!=='player')return;
  const st=G_STATE.player;
  if(!hasI(st,'HEAVY_STONE')){c.log.unshift('No stones to throw.');return;}
  takeI(st,'HEAVY_STONE',1);
  const atk=d(20)+sk(st,'atk')+2;
  if(atk>=c.enemy.def){
    const dmg=d(4)+3;c.enemy.hp-=dmg;c.log.unshift('Stone strikes: '+dmg+'.');SFX.throw_();SFX.hit();
  }else{c.log.unshift('Stone flies wide.');SFX.throw_();}
  if(c.enemy.hp<=0){endCombat(true);return;}
  c.turn='enemy';setTimeout(enemyTurn,500);
}
function playerFlee(){
  const c=G_STATE.combat;if(!c)return;
  const st=G_STATE.player;
  const r=d(20)+sk(st,'spd');
  if(r>=c.enemy.spd+8){c.log.unshift('You slip away.');SFX.swoosh();endCombat(false);return;}
  c.log.unshift('No escape!');SFX.nope();
  c.turn='enemy';setTimeout(enemyTurn,500);
}
function playerMatePush(){
  const c=G_STATE.combat;if(!c||!G_STATE.player.mateAlive)return;
  const st=G_STATE.player;
  const atk=d(20)+sk(st,'atk')+1;
  if(atk>=c.enemy.def){
    const dmg=d(4)+1;c.enemy.hp-=dmg;
    c.log.unshift(st.mateName+' strikes: '+dmg+'.');SFX.hit();
  }else{
    c.log.unshift(st.mateName+' is batted aside.');hurt(st,2,'mate');SFX.hurt();
  }
  if(c.enemy.hp<=0){endCombat(true);return;}
  c.turn='enemy';setTimeout(enemyTurn,500);
}
function enemyTurn(){
  const c=G_STATE.combat;if(!c)return;
  const st=G_STATE.player;
  const atk=d(20)+c.enemy.atk/2;
  const def=10+sk(st,'def')+(hasI(st,'HIDE')?1:0);
  if(atk>=def){
    const dmg=Math.max(1,d(6)+Math.floor(c.enemy.atk/3));
    let tgt='player';
    if(st.childAlive&&rnd(6)===0)tgt='child';
    else if(st.mateAlive&&rnd(4)===0)tgt='mate';
    hurt(st,dmg,tgt==='player'?null:tgt);
    c.log.unshift((tgt==='player'?'You':(tgt==='mate'?st.mateName:st.childName))+' hit: '+dmg+'.');
    SFX.hit();G_STATE.shake=10;
  }else{c.log.unshift('It misses.');SFX.miss();}
  c.round++;
  if(!st.alive){G_STATE.screen='dead';G_STATE.combat=null;return;}
  c.turn='player';c.actionIdx=0;
}

  const n=Math.min(G_STATE.introLine+1,INTRO_LINES.length);
  for(let i=0;i<n;i++){
    text(INTRO_LINES[i],50,82+i*18,'c',15);
  }
  textC('[ENTER] CONTINUE    [ESC] SKIP',H-28,'8',13);
}
function drawName(){
  gradV(0,0,W,H,['0','2','5','q','r']);
  textBigC('NAME THE WALKER',40,':','~',36);
  sprT(SPR.player,W/2-16,100,4);
  const buf=G_STATE.nameBuf||'';
  rect(W/2-120,200,240,36,'2');
  frame(W/2-120,200,240,36,'8','4');
  text(buf+((G_STATE.t/20|0)%2?'_':' '),W/2-112,208,'E',22);
  textC('TYPE A NAME   [ENTER] CONFIRM   [BACKSPACE]',260,'B',14);
  textC('(UP / DOWN for a suggested name)',285,'7',12);
  textC('OR [ENTER] BLANK TO USE: '+NAMES_M[G_STATE.nameIdx%NAMES_M.length],310,'a',14);
}
function drawSetup(){
  gradV(0,0,W,H,['0','2','4','g','h']);
  textBigC('CHOOSE YOUR PACK',20,':','~',30);
  PACKS.forEach((p,i)=>{
    const y=70+i*72, sel=(G_STATE.packIdx===i);
    rect(40,y,W-80,62,sel?'3':'2');
    frame(40,y,W-80,62,sel?':':'7',sel?'"':'4');
    sprT([SPR.player,SPR.player_walk,SPR.player_climb,SPR.player][i],56,y+8,2);
    text(p.n,110,y+8,sel?':':'E',20);
    text(p.d,110,y+30,'B',14);
    const ss=p.stats;
    text('ATK+'+ss.atk+' DEF+'+ss.def+' SPD+'+ss.spd+' KNAP+'+ss.kn+' SPIRIT+'+ss.sp+'  HP '+p.hp,110,y+46,'a',12);
  });
  textC('[UP/DOWN] CHOOSE   [ENTER] BEGIN',H-28,':',14);
}
function drawTravel(){
  const st=G_STATE.player;if(!st)return;
  drawLandscape(STAGES[st.stage].kind);
  drawTroop(st,W/2-16,180);
  // sun/moon
  const h=(st.day%1);
  const sx=60+h*(W-120), sy=30+Math.sin(h*Math.PI)*-20+20;
  rect(sx-6,sy-6,12,12,'.');rect(sx-8,sy-2,16,4,'.');rect(sx-2,sy-8,4,16,'.');
  drawHUD(st);
  if(G_STATE.msgTime>0){
    rect(20,40,W-40,30,'2');frame(20,40,W-40,30,':','4');
    text(G_STATE.msg,34,48,'E',15);
  }
}
function drawEvent(){
  const st=G_STATE.player,ev=G_STATE.event;if(!ev)return;
  drawLandscape(STAGES[st.stage].kind);
  G.fillStyle='rgba(0,0,0,.55)';G.fillRect(0,0,W,H-HUD_H);
  rect(30,30,W-60,H-HUD_H-60,'2');
  frame(30,30,W-60,H-HUD_H-60,':','4');
  const art=SPR[ev.art]||SPR.mountain;
  sprT(art,46,46,3);
  const txt=typeof ev.txt==='function'?ev.txt(st):ev.txt;
  // wrap
  const words=txt.split(' ');let lines=[],cur='';
  for(const w of words){if((cur+' '+w).length>42){lines.push(cur);cur=w;}else cur=cur?cur+' '+w:w;}
  if(cur)lines.push(cur);
  lines.forEach((l,i)=>text(l,180,50+i*20,'E',15));
  ev.opts.forEach((op,i)=>{
    const y=180+i*28, sel=(G_STATE.eventIdx===i);
    rect(46,y,W-92,24,sel?'5':'3');
    frame(46,y,W-92,24,sel?':':'7',sel?'"':'4');
    text((sel?'> ':'  ')+op.lbl,58,y+4,sel?':':'E',15);
  });
  drawHUD(st);
  textC('[UP/DOWN] SELECT   [ENTER] CHOOSE',H-HUD_H-14,'a',12);
}
function drawCombat(){
  const st=G_STATE.player,c=G_STATE.combat;if(!c)return;
  drawLandscape(STAGES[st.stage].kind);
  G.fillStyle='rgba(0,0,0,.4)';G.fillRect(0,0,W,H-HUD_H);
  const art=SPR[c.enemy.art]||SPR.mountain;
  sprT(art,W-160,60,4);
  text(c.enemy.n,W-260,40,':',20);
  bar(W-260,68,180,8,c.enemy.hp/c.enemy.hpMax,'L','J',Math.max(0,Math.ceil(c.enemy.hp))+'/'+c.enemy.hpMax);
  drawTroop(st,60,180);
  // actions
  const acts=['ATTACK','THROW STONE','MATE ASSIST','FLEE'];
  acts.forEach((a,i)=>{
    const y=40+i*26, sel=(c.actionIdx===i);
    rect(40,y,160,22,sel?'5':'3');frame(40,y,160,22,sel?':':'7',sel?'"':'4');
    text((sel?'> ':'  ')+a,50,y+3,sel?':':'E',14);
  });
  // log
  (c.log||[]).slice(0,5).forEach((l,i)=>{text(l,40,170+i*16,'B',13);});
  drawHUD(st);
  textC('[UP/DOWN] SELECT   [ENTER] ACT',H-HUD_H-14,'a',12);
}
function drawInventory(){
  const st=G_STATE.player;if(!st)return;
  drawLandscape(STAGES[st.stage].kind);
  G.fillStyle='rgba(0,0,0,.7)';G.fillRect(0,0,W,H-HUD_H);
  textBigC('INVENTORY',10,':','~',28);
  const cols=2, maxRows=9;
  const total=st.items.length;
  const selRow=Math.floor(G_STATE.invIdx/cols);
  const scroll=Math.max(0,Math.min(selRow-maxRows+1,Math.ceil(total/cols)-maxRows));
  const offset=Math.max(0,scroll)*cols;
  for(let i=offset;i<Math.min(total,offset+maxRows*cols);i++){
    const e=st.items[i];
    const r=Math.floor((i-offset)/cols);
    const cx=40+(i%cols)*290, cy=60+r*22, sel=(G_STATE.invIdx===i);
    rect(cx,cy,280,20,sel?'5':'3');frame(cx,cy,280,20,sel?':':'7',sel?'"':'4');
    const it=ITEMS[e.k]||{n:e.k};
    text((sel?'>':' ')+it.n+' x'+e.n,cx+6,cy+3,sel?':':'E',13);
    if(st.weapon===e.k)text('[WEAPON]',cx+200,cy+3,'.',11);
  }
  if(st.items.length===0)textC('— empty —',200,'7',16);
  const sel=st.items[G_STATE.invIdx];
  if(sel){
    const it=ITEMS[sel.k];
    rect(20,H-HUD_H-90,W-40,80,'2');frame(20,H-HUD_H-90,W-40,80,':','4');
    text(it.n,30,H-HUD_H-82,':',16);
    text(it.d,30,H-HUD_H-62,'B',13);
    let hints=[];
    if(it.food)hints.push('[E]AT (+'+it.food+' food)');
    if(it.drink&&!it.food)hints.push('[D]RINK (+'+it.drink+' drink)');
    if(it.heal)hints.push('[H]EAL (+'+it.heal+' hp)');
    if(it.wep)hints.push('[W]IELD');
    if(it.risk)hints.push('RISK '+Math.floor(it.risk*100)+'%');
    text(hints.join('   '),30,H-HUD_H-42,'a',12);
  }
  drawHUD(st);
  textC('[UP/DOWN] [E]AT [D]RINK [H]EAL [W]IELD [ESC] BACK',H-HUD_H-14,'a',12);
}
function drawCraft(){
  const st=G_STATE.player;if(!st)return;
  drawLandscape(STAGES[st.stage].kind);
  G.fillStyle='rgba(0,0,0,.75)';G.fillRect(0,0,W,H-HUD_H);
  textBigC('CRAFT (PERCUSSION)',10,':','~',24);
  RECIPES.forEach((r,i)=>{
    const y=50+i*17, sel=(G_STATE.craftIdx===i);
    const can=canCraft(st,r);
    rect(20,y,W-40,16,sel?'5':'3');frame(20,y,W-40,16,sel?':':'7',sel?'"':'4');
    text((sel?'>':' ')+r.n,26,y+1,sel?':':(can?'E':'7'),12);
    const needs=Object.keys(r.need).map(k=>k+' x'+r.need[k]).join(', ');
    text(needs,280,y+1,can?'a':'6',11);
  });
  const sel=RECIPES[G_STATE.craftIdx];
  if(sel){
    rect(20,H-HUD_H-60,W-40,52,'2');frame(20,H-HUD_H-60,W-40,52,':','4');
    text(sel.txt,30,H-HUD_H-52,'B',13);
    const gives=Object.keys(sel.give).map(k=>k+' x'+sel.give[k]).join(', ');
    text('YIELDS: '+(gives||'(effect)'),30,H-HUD_H-34,'.',12);
    text('CHECK: '+(sel.check||'kn')+' vs '+sel.diff,30,H-HUD_H-20,'a',11);
  }
  drawHUD(st);
  textC('[UP/DOWN] [ENTER] KNAP  [ESC] BACK',H-HUD_H-14,'a',12);
}
function canCraft(st,r){
  for(const k in r.need)if(countI(st,k)<r.need[k])return false;
  return true;
}
function doCraft(){
  const st=G_STATE.player, r=RECIPES[G_STATE.craftIdx];
  if(!r||!canCraft(st,r)){SFX.nope();return;}
  const keep=r.keep||[];
  for(const k in r.need){if(!keep.includes(k))takeI(st,k,r.need[k]);}
  const roll=d(20)+sk(st,r.check||'kn');
  if(roll>=r.diff){
    for(const k in r.give)addI(st,k,r.give[k]);
    if(r.charm)st.charm+=r.charm;
    if(r.heal)st.hp=Math.min(st.hpMax,st.hp+r.heal);
    msg(st,r.txt);SFX.pluckStone();
  }else{
    msg(st,'The stone cracks wrong.');SFX.nope();
    if(rnd(3)===0)hurt(st,1);
  }
  tick(st,.3);
}
function useItem(k,how){
  const st=G_STATE.player;const it=ITEMS[k];if(!it)return;
  if(how==='eat'&&it.food){
    if(it.risk&&Math.random()<it.risk){st.parasite+=4;msg(st,'Something writhes in your gut.');SFX.hurt();}
    st.hunger=Math.min(st.hungerMax,st.hunger+it.food);
    if(it.drink)st.thirst=Math.min(st.thirstMax,st.thirst+it.drink);
    if(it.heal)st.hp=Math.min(st.hpMax,st.hp+it.heal);
    takeI(st,k,1);SFX.eat();msg(st,'Eaten.');
  }else if(how==='drink'&&it.drink){
    st.thirst=Math.min(st.thirstMax,st.thirst+it.drink);
    if(k!=='GOURD')takeI(st,k,1);
    SFX.drink();msg(st,'You drink.');
  }else if(how==='heal'&&it.heal){
    st.hp=Math.min(st.hpMax,st.hp+it.heal);
    if(st.mateAlive)st.mateHp=Math.min(st.mateHpMax,st.mateHp+Math.floor(it.heal/2));
    takeI(st,k,1);SFX.heal();msg(st,'Tended.');
  }else if(how==='wield'&&it.wep){
    st.weapon=k;msg(st,'Wielding '+it.n);SFX.click();
  }else SFX.nope();
}
function drawDead(){
  gradV(0,0,W,H,['0','F','G','I','K']);
  const st=G_STATE.player;
  textBigC('YOU HAVE FALLEN',50,'L','~',36);
  sprT(SPR.vulture,W/2-30,120,4);
  text('Day '+Math.floor(st.day||0)+' — '+(STAGES[st.stage]||{n:''}).n,W/2-120,240,'E',16);
  text('The troop walks on without you.',W/2-160,270,'B',15);
  text('Your stones scatter. The wind takes their edge.',W/2-200,290,'9',14);
  textC('[ENTER] NEW WALKER',H-50,':',18);
  bgmStop();
}
function drawVictory(){
  gradV(0,0,W,H,[':','.','\'','"','T','`','~']);
  textBigC('LOMEKWI 3',40,'E','~',60);
  textBigC('— THE RING OF ANVILS —',110,'.','~',24);
  const st=G_STATE.player;
  sprT(SPR.anvil,W/2-32,160,8);
  text('You reach the ring where ancestors knapped.',W/2-220,260,'E',16);
  text('The stone remembers your hand. The flake is a promise.',W/2-260,284,'c',15);
  if(st.mateAlive)text('Beside you: '+st.mateName,W/2-80,310,'E',14);
  if(st.childAlive)text('Beside you: '+st.childName,W/2-80,326,'E',14);
  text('Day '+Math.floor(st.day)+'   XP '+st.xp+'   Charm '+st.charm,W/2-120,356,'a',14);
  textC('[ENTER] NEW WALKER',H-50,':',18);
  if((G_STATE.t|0)===1)bgmStart(BGM_TRIUMPH);
}

// === INPUT HANDLING ===
function handleKey(e){
  const k=e.key;
  const s=G_STATE.screen;
  if(s==='title'){
    if(k==='Enter'){G_STATE.screen='intro';G_STATE.introLine=0;G_STATE.introTimer=0;bgmStart(BGM_DAWN);SFX.select();}
  }else if(s==='intro'){
    if(k==='Enter'){
      if(G_STATE.introLine<INTRO_LINES.length-1){G_STATE.introLine++;SFX.blip();}
      else{G_STATE.screen='name';SFX.select();}
    }else if(k==='Escape'){G_STATE.screen='name';SFX.select();}
  }else if(s==='name'){
    if(k==='Enter'){
      if(!G_STATE.nameBuf)G_STATE.nameBuf=NAMES_M[G_STATE.nameIdx%NAMES_M.length];
      G_STATE.screen='setup';G_STATE.packIdx=0;SFX.select();
    }else if(k==='Backspace'){G_STATE.nameBuf=G_STATE.nameBuf.slice(0,-1);SFX.click();}
    else if(k==='ArrowUp'){G_STATE.nameIdx=(G_STATE.nameIdx+1)%NAMES_M.length;SFX.blip();}
    else if(k==='ArrowDown'){G_STATE.nameIdx=(G_STATE.nameIdx-1+NAMES_M.length)%NAMES_M.length;SFX.blip();}
    else if(k.length===1&&/[a-zA-Z ]/.test(k)&&G_STATE.nameBuf.length<12){G_STATE.nameBuf+=k.toUpperCase();SFX.click();}
  }else if(s==='setup'){
    if(k==='ArrowUp'){G_STATE.packIdx=(G_STATE.packIdx-1+PACKS.length)%PACKS.length;SFX.blip();}
    else if(k==='ArrowDown'){G_STATE.packIdx=(G_STATE.packIdx+1)%PACKS.length;SFX.blip();}
    else if(k==='Enter'){
      G_STATE.player=newGame(G_STATE.nameBuf,G_STATE.packIdx);
      G_STATE.screen='travel';bgmStart(BGM_WALK);SFX.select();
    }
  }else if(s==='travel'){
    if(k==='Enter'||k===' '){
      const st=G_STATE.player;
      tick(st,.4);
      if(G_STATE.screen!=='travel')return;
      SFX.step();
      if(Math.random()<.5){const ev=pickEvent(st);if(ev)triggerEvent(ev);}
    }else if(k==='i'||k==='I'){G_STATE.screen='inventory';G_STATE.invIdx=0;SFX.select();}
    else if(k==='c'||k==='C'){G_STATE.screen='craft';G_STATE.craftIdx=0;SFX.select();}
    else if(k==='e'||k==='E'){const ev=pickEvent(G_STATE.player);if(ev)triggerEvent(ev);}
    else if(k==='r'||k==='R'){restCamp();}
  }else if(s==='event'){
    const ev=G_STATE.event;if(!ev)return;
    if(k==='ArrowUp'){G_STATE.eventIdx=(G_STATE.eventIdx-1+ev.opts.length)%ev.opts.length;SFX.blip();}
    else if(k==='ArrowDown'){G_STATE.eventIdx=(G_STATE.eventIdx+1)%ev.opts.length;SFX.blip();}
    else if(k==='Enter'){chooseOption(G_STATE.eventIdx);SFX.select();}
    else if(k==='Escape'){G_STATE.screen='travel';}
  }else if(s==='combat'){
    const c=G_STATE.combat;if(!c)return;
    if(c.turn!=='player')return;
    if(k==='ArrowUp'){c.actionIdx=(c.actionIdx-1+4)%4;SFX.blip();}
    else if(k==='ArrowDown'){c.actionIdx=(c.actionIdx+1)%4;SFX.blip();}
    else if(k==='Enter'){
      if(c.actionIdx===0)playerAttack();
      else if(c.actionIdx===1)playerThrow();
      else if(c.actionIdx===2)playerMatePush();
      else if(c.actionIdx===3)playerFlee();
    }
  }else if(s==='inventory'){
    const st=G_STATE.player;const item=st.items[G_STATE.invIdx];
    if(k==='ArrowUp'){G_STATE.invIdx=Math.max(0,G_STATE.invIdx-1);SFX.blip();}
    else if(k==='ArrowDown'){G_STATE.invIdx=Math.min(st.items.length-1,G_STATE.invIdx+1);SFX.blip();}
    else if(k==='Escape'){G_STATE.screen='travel';SFX.select();}
    else if(item&&(k==='e'||k==='E'))useItem(item.k,'eat');
    else if(item&&(k==='d'||k==='D'))useItem(item.k,'drink');
    else if(item&&(k==='h'||k==='H'))useItem(item.k,'heal');
    else if(item&&(k==='w'||k==='W'))useItem(item.k,'wield');
  }else if(s==='craft'){
    if(k==='ArrowUp'){G_STATE.craftIdx=(G_STATE.craftIdx-1+RECIPES.length)%RECIPES.length;SFX.blip();}
    else if(k==='ArrowDown'){G_STATE.craftIdx=(G_STATE.craftIdx+1)%RECIPES.length;SFX.blip();}
    else if(k==='Enter'){doCraft();SFX.select();}
    else if(k==='Escape'){G_STATE.screen='travel';SFX.select();}
  }else if(s==='dead'||s==='victory'){
    if(k==='Enter'){G_STATE.screen='title';G_STATE.player=null;G_STATE.nameBuf='';bgmStart(BGM_TITLE);SFX.select();}
  }
}
function restCamp(){
  const st=G_STATE.player;
  st.hp=Math.min(st.hpMax,st.hp+6);
  if(st.mateAlive)st.mateHp=Math.min(st.mateHpMax,st.mateHp+6);
  if(st.childAlive)st.childHp=Math.min(st.childHpMax,st.childHp+4);
  st.energy=Math.min(st.energyMax,st.energy+5);
  tick(st,1);
  if(rnd(4)===0){const ev=pickEvent(st);if(ev){triggerEvent(ev);return;}}
  msg(st,'You camp. Dreams of stone.');SFX.day();
}

// === MAIN LOOP ===
function loop(){
  G_STATE.t++;
  if(G_STATE.msgTime>0)G_STATE.msgTime--;
  const shake=G_STATE.shake;
  if(shake>0)G_STATE.shake--;
  const s=G_STATE.screen;
  if(s==='title')drawTitle();
  else if(s==='intro')drawIntro();
  else if(s==='name')drawName();
  else if(s==='setup')drawSetup();
  else if(s==='travel')drawTravel();
  else if(s==='event')drawEvent();
  else if(s==='combat')drawCombat();
  else if(s==='inventory')drawInventory();
  else if(s==='craft')drawCraft();
  else if(s==='dead')drawDead();
  else if(s==='victory')drawVictory();
  if(shake>0){
    BG.clearRect(0,0,W,H);BG.drawImage(CV,0,0);
    G.clearRect(0,0,W,H);
    G.drawImage(BC,(rnd(shake)-shake/2)|0,(rnd(shake)-shake/2)|0);
  }
  requestAnimationFrame(loop);
}
bgmStart(BGM_TITLE);
loop();
})();
</script>
