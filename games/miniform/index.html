<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Win</title>
<style>html,body{height:100%;margin:0;font-family:sans-serif;background:#6b8ebd}#desk{position:relative;height:100%}.win{position:absolute;background:#c0c0c0;border:2px solid #404040;min-width:220px;min-height:140px;box-sizing:border-box}.title{height:28px;background:linear-gradient(#00f,#006);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 6px;cursor:grab}.menubar{display:flex;gap:4px;padding:4px;background:#e0e0e0;border-bottom:2px solid #404040}.menu{position:relative;padding:2px 8px;background:#e8e8e8;border:1px solid #808080;cursor:pointer}.dropdown{position:absolute;left:0;top:100%;background:#f0f0f0;border:2px solid #404040;display:none;min-width:120px}.item{padding:4px 12px;cursor:pointer}.item:hover{background:#06f;color:#fff}.content{padding:8px;box-sizing:border-box;height:calc(100% - 28px - 36px);overflow:auto}.resize{width:14px;height:14px;position:absolute;right:1px;bottom:1px;cursor:se-resize;background:#cfcfcf;border:1px solid #404040}</style>
</head><body><div id=desk></div>
<script>
(function(){
let z=100,c=1;const desk=document.getElementById('desk');
function createFormWindow(x=60,y=60,title){const id='w'+(c++);const w=document.createElement('div');w.className='win';w.id=id;w.style.left=x+'px';w.style.top=y+'px';w.style.width='360px';w.style.height='240px';w.style.zIndex=++z;
w.innerHTML=`<div class=title><span>${(title||'Untitled')}</span><span style="font-size:12px;cursor:pointer" class=close>X</span></div>
<div class=menubar>
<div class=menu>File<div class=dropdown>
<div class=item data-a=new>New</div><div class=item data-a=save>Save</div><div class=item data-a=close>Close</div>
</div></div>
<div class=menu>Edit<div class=dropdown>
<div class=item data-a=undo>Undo</div><div class=item data-a=clear>Clear</div><div class=item data-a=dup>Duplicate</div>
</div></div>
<div class=menu>About<div class=dropdown><div class=item data-a=about>About</div></div></div>
</div>
<div class=content><form><label>Name</label><input name=name><label>Email</label><input name=email><label>Details</label><textarea name=details></textarea><div style="margin-top:8px"><button type=button class=ok>Submit</button><button type=button class=clr>Cancel</button></div></form></div><div class=resize></div>`;
desk.appendChild(w);
const titleBar=w.querySelector('.title');titleBar.addEventListener('mousedown',drag);
function drag(e){e.preventDefault();bring(w);const rx=e.clientX- w.offsetLeft,ry=e.clientY-w.offsetTop;
function m(ev){w.style.left=(ev.clientX-rx)+'px';w.style.top=(ev.clientY-ry)+'px'}
function up(){window.removeEventListener('mousemove',m);window.removeEventListener('mouseup',up)}
window.addEventListener('mousemove',m);window.addEventListener('mouseup',up)}
function bring(el){el.style.zIndex=++z}
w.addEventListener('mousedown',()=>bring(w));
w.querySelector('.close').onclick=()=>w.remove();
w.querySelector('.ok').onclick=()=>{console.log(Object.fromEntries(new FormData(w.querySelector('form'))));msg('Saved');}
w.querySelector('.clr').onclick=()=>{w.querySelector('form').reset();msg('Cleared');}
function msg(t){const b=document.createElement('div');b.textContent=t;Object.assign(b.style,{position:'absolute',right:8,top:32,background:'#006',color:'#fff',padding:'4px',zIndex:9999});w.appendChild(b);setTimeout(()=>b.remove(),1200)}
// resize
const rh=w.querySelector('.resize');rh.addEventListener('mousedown',rstart);
function rstart(e){e.preventDefault();bring(w);const sx=e.clientX,sy=e.clientY,sw=w.offsetWidth,sh=w.offsetHeight;
function rm(ev){w.style.width=Math.max(220,sw+(ev.clientX-sx))+'px';w.style.height=Math.max(140,sh+(ev.clientY-sy))+'px'}
function rup(){window.removeEventListener('mousemove',rm);window.removeEventListener('mouseup',rup)}
window.addEventListener('mousemove',rm);window.addEventListener('mouseup',rup)}
// menus
w.querySelectorAll('.menu').forEach(men=>{men.onclick=function(e){e.stopPropagation();const d=this.querySelector('.dropdown');w.querySelectorAll('.dropdown').forEach(x=>x!==d&&(x.style.display='none'));d.style.display=d.style.display==='block'?'none':'block'}});
w.querySelectorAll('.item').forEach(it=>it.onclick=function(e){e.stopPropagation();const a=this.dataset.a;w.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
if(a==='new')createFormWindow(w.offsetLeft+30,w.offsetTop+30);
if(a==='save'){console.log(Object.fromEntries(new FormData(w.querySelector('form'))));msg('Saved')}
if(a==='close')w.remove();
if(a==='undo')msg('Undo');
if(a==='clear'){w.querySelector('form').reset();msg('Cleared')}
if(a==='dup'){const nw=createFormWindow(w.offsetLeft+20,w.offsetTop+20,w.querySelector('span').textContent);const fd=new FormData(w.querySelector('form'));for(const [k,v] of fd) nw.querySelector('[name="'+k+'"]').value=v}
if(a==='about')alert('Demo window: '+w.id);
});
document.addEventListener('click',()=>w.querySelectorAll('.dropdown').forEach(d=>d.style.display='none'));
return w;
}
window.createFormWindow=createFormWindow;
createFormWindow(80,80,'Contact');createFormWindow(200,140,'Feedback');
})();
</script></body></html>
